<style>
.geo-layout{display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start;}
.shape-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:1.5rem;}
.shape-tab{padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--gray-200);border-radius:8px;background:white;color:var(--gray-600);transition:all 0.15s;}
.shape-tab.active{background:var(--sbs-blue);color:white;border-color:var(--sbs-blue);}
.result-big{font-size:2rem;font-weight:700;color:var(--sbs-blue);font-family:var(--font-mono);}
.formula-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:1rem;}
.dim-input{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.dim-input label{font-size:13px;color:var(--gray-700);width:120px;flex-shrink:0;}
.dim-input input{width:100px;}
.dim-input span{font-size:12px;color:var(--gray-400);}
canvas{display:block;border:1px solid var(--gray-200);border-radius:8px;background:#FAFBFD;}
.net-canvas{display:block;border:1px solid var(--gray-200);border-radius:8px;background:white;margin-top:12px;}
@media(max-width:700px){.geo-layout{grid-template-columns:1fr;}.formula-grid{grid-template-columns:1fr;}}
</style>

  <div class="lab-container">

      <button class="shape-tab" onclick="setShape('cylinder')">🥫 Cylinder</button>

          <div class="formula-grid">

              <div style="font-size:11px;color:var(--gray-400);font-weight:600;text-transform:uppercase;margin-bottom:4px">Surface area</div>
              <div class="result-big" id="sa-result">—</div>

            </div>

<script>
const PI=Math.PI;
let currentShape='cuboid';
let angle=0;
let animId=null;

const SHAPES={
  cuboid:{
    dims:[{id:'l',label:'Length (l)',default:5},{id:'w',label:'Width (w)',default:3},{id:'h',label:'Height (h)',default:4}],
    calc(d){const V=d.l*d.w*d.h;const SA=2*(d.l*d.w+d.l*d.h+d.w*d.h);
      return {V,SA,extra:`Diagonal = ${r2(Math.sqrt(d.l**2+d.w**2+d.h**2))} units\nFace areas: Top/bottom=${d.l*d.w}, Front/back=${d.l*d.h}, Sides=${d.w*d.h}`};},
    formula:'V = l × w × h\nSA = 2(lw + lh + wh)',
    draw(ctx,W,H,d){drawCuboid(ctx,W,H,d.l,d.w,d.h);},
    net(ctx,W,H,d){drawCuboidNet(ctx,W,H,d.l,d.w,d.h);}
  },
  cylinder:{
    dims:[{id:'r',label:'Radius (r)',default:3},{id:'h',label:'Height (h)',default:7}],
    calc(d){const V=PI*d.r**2*d.h;const SA=2*PI*d.r*(d.r+d.h);
      return {V,SA,extra:`Base area = π×${d.r}² = ${r2(PI*d.r**2)}\nLateral area = 2π×${d.r}×${d.h} = ${r2(2*PI*d.r*d.h)}`};},
    formula:'V = πr²h\nSA = 2πr(r + h)',
    draw(ctx,W,H,d){drawCylinder(ctx,W,H,d.r,d.h);},
    net(ctx,W,H,d){drawCylinderNet(ctx,W,H,d.r,d.h);}
  },
  cone:{
    dims:[{id:'r',label:'Radius (r)',default:3},{id:'h',label:'Height (h)',default:6}],
    calc(d){const l=Math.sqrt(d.r**2+d.h**2);const V=PI*d.r**2*d.h/3;const SA=PI*d.r*(d.r+l);
      return {V,SA,extra:`Slant height l = √(r²+h²) = ${r2(l)}\nBase area = ${r2(PI*d.r**2)}\nLateral area = π×r×l = ${r2(PI*d.r*l)}`};},
    formula:'V = ⅓πr²h\nSA = πr(r + l), where l = √(r²+h²)',
    draw(ctx,W,H,d){drawCone(ctx,W,H,d.r,d.h);},
    net(ctx,W,H,d){drawConeNet(ctx,W,H,d.r,d.h);}
  },
  sphere:{
    dims:[{id:'r',label:'Radius (r)',default:4}],
    calc(d){const V=4/3*PI*d.r**3;const SA=4*PI*d.r**2;
      return {V,SA,extra:`Diameter = ${2*d.r}\nV = 4/3 × π × ${d.r}³\nSA = 4 × π × ${d.r}²`};},
    formula:'V = 4/3 πr³\nSA = 4πr²',
    draw(ctx,W,H,d){drawSphere(ctx,W,H,d.r);},
    net(ctx,W,H,d){drawSphereInfo(ctx,W,H);}
  },
  pyramid:{
    dims:[{id:'b',label:'Base side (b)',default:4},{id:'h',label:'Height (h)',default:6}],
    calc(d){const V=d.b**2*d.h/3;const sl=Math.sqrt((d.b/2)**2+d.h**2);const SA=d.b**2+2*d.b*sl;
      return {V,SA,extra:`Slant height = ${r2(sl)}\nBase area = ${d.b}² = ${d.b**2}\nLateral face area = ½×${d.b}×${r2(sl)} (×4 faces)`};},
    formula:'V = ⅓ × b² × h\nSA = b² + 2b×l, where l = slant height',
    draw(ctx,W,H,d){drawPyramid(ctx,W,H,d.b,d.h);},
    net(ctx,W,H,d){drawPyramidNet(ctx,W,H,d.b,d.h);}
  },
  prism:{
    dims:[{id:'a',label:'Triangle base (a)',default:4},{id:'htri',label:'Triangle height',default:3},{id:'l',label:'Prism length (l)',default:8}],
    calc(d){const triA=0.5*d.a*d.htri;const hyp=Math.sqrt(d.a**2+d.htri**2);const V=triA*d.l;
      const SA=2*triA+(d.a+d.htri+hyp)*d.l;
      return {V,SA,extra:`Triangle area = ½×${d.a}×${d.htri} = ${triA}\nHypotenuse = ${r2(hyp)}\nLateral SA = perimeter × length = ${r2((d.a+d.htri+hyp)*d.l)}`};},
    formula:'V = ½ × base × height × length\nSA = 2×(triangle area) + perimeter×length',
    draw(ctx,W,H,d){drawTriPrism(ctx,W,H,d.a,d.htri,d.l);},
    net(ctx,W,H,d){}
  }
};

function r2(n){return Math.round(n*100)/100;}

function setShape(s){
  currentShape=s;
  document.querySelectorAll('.shape-tab').forEach(t=>t.classList.toggle('active',t.textContent.includes(s[0].toUpperCase())||t.onclick.toString().includes(`'${s}'`)));
  document.querySelectorAll('.shape-tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  renderInputs();
  compute();
}

function renderInputs(){
  const sh=SHAPES[currentShape];
  let html=`<div style="font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px">Dimensions</div>`;
  sh.dims.forEach(d=>{
    html+=`<div class="dim-input">
      <label>${d.label}</label>
      <input type="number" id="dim-${d.id}" value="${d.default}" min="0.1" step="0.5" oninput="compute()" style="width:80px">
      <span>units</span>
    </div>`;
  });
  document.getElementById('inputs-panel').innerHTML=html;
}

function getDims(){
  const sh=SHAPES[currentShape];const d={};
  sh.dims.forEach(dim=>{d[dim.id]=parseFloat(document.getElementById('dim-'+dim.id).value)||dim.default;});
  return d;
}

function compute(){
  const sh=SHAPES[currentShape];const d=getDims();
  const {V,SA,extra}=sh.calc(d);
  document.getElementById('vol-result').textContent=r2(V);
  document.getElementById('sa-result').textContent=r2(SA);
  document.getElementById('formula-display').innerHTML=`<strong>Formulae:</strong><br>${sh.formula.replace(/\n/g,'<br>')}`;
  document.getElementById('extra-info').innerHTML=extra.replace(/\n/g,'<br>');
  drawShape();
  drawNet();
}

function drawShape(){
  const c=document.getElementById('shape-canvas');
  const ctx=c.getContext('2d');
  const W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);
  const sh=SHAPES[currentShape];
  sh.draw(ctx,W,H,getDims());
}

function drawNet(){
  const c=document.getElementById('net-canvas');
  const ctx=c.getContext('2d');
  const W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='white';ctx.fillRect(0,0,W,H);
  const sh=SHAPES[currentShape];
  sh.net(ctx,W,H,getDims());
}

// ─── DRAW FUNCTIONS ──────────────────────────────────────────────────────────
function iso(x,y,z,W,H,scale){
  const ox=W/2,oy=H*0.55;
  const ix=(x-z)*Math.cos(Math.PI/6)*scale;
  const iy=(x+z)*Math.sin(Math.PI/6)*scale-y*scale;
  return {x:ox+ix,y:oy+iy};
}

function drawCuboid(ctx,W,H,l,w,h){
  const s=Math.min(W,H)/(Math.max(l,w,h)*3.5);
  const face=(pts,fill,stroke)=>{
    ctx.beginPath();pts.forEach(([x,y,z],i)=>{const p=iso(x,y,z,W,H,s);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});
    ctx.closePath();ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.stroke();
  };
  face([[0,0,0],[l,0,0],[l,h,0],[0,h,0]],'rgba(27,79,138,0.4)','#1B4F8A');
  face([[0,0,0],[0,0,w],[l,0,w],[l,0,0]],'rgba(27,79,138,0.2)','#1B4F8A');
  face([[l,0,0],[l,0,w],[l,h,w],[l,h,0]],'rgba(27,79,138,0.3)','#1B4F8A');
  // Labels
  const label=(x,y,z,t)=>{const p=iso(x,y,z,W,H,s);ctx.fillStyle='#475569';ctx.font='bold 13px Inter';ctx.textAlign='center';ctx.fillText(t,p.x,p.y);};
  label(l/2,0,w/2,'w='+w);label(l,-0.8,w/2,'h='+h);label(l/2,-0.5,0,'l='+l);
}

function drawCylinder(ctx,W,H,r,h){
  const s=Math.min(W/(r*4),H/(h*1.6+r));
  const cx=W/2,cy=H*0.6,rX=r*s*1.2,rY=r*s*0.4,hs=h*s;
  ctx.fillStyle='rgba(139,26,26,0.2)';ctx.beginPath();ctx.ellipse(cx,cy,rX,rY,0,0,2*Math.PI);ctx.fill();
  ctx.strokeStyle='#8B1A1A';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(cx-rX,cy);ctx.lineTo(cx-rX,cy-hs);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+rX,cy);ctx.lineTo(cx+rX,cy-hs);ctx.stroke();
  ctx.beginPath();ctx.ellipse(cx,cy,rX,rY,0,Math.PI,2*Math.PI);ctx.strokeStyle='#8B1A1A';ctx.stroke();
  ctx.beginPath();ctx.ellipse(cx,cy,rX,rY,0,0,Math.PI);ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(139,26,26,0.3)';ctx.beginPath();ctx.ellipse(cx,cy-hs,rX,rY,0,0,2*Math.PI);ctx.fill();
  ctx.strokeStyle='#8B1A1A';ctx.stroke();
  // Labels
  ctx.strokeStyle='#475569';ctx.lineWidth=1;ctx.setLineDash([3,2]);
  ctx.beginPath();ctx.moveTo(cx,cy-hs);ctx.lineTo(cx+rX,cy-hs);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#475569';ctx.font='bold 13px Inter';ctx.textAlign='left';
  ctx.fillText('r = '+r,cx+rX+4,cy-hs);
  ctx.textAlign='right';ctx.fillText('h = '+h,cx-rX-4,(cy+cy-hs)/2);
}

function drawCone(ctx,W,H,r,h){
  const s=Math.min(W/(r*4),H/(h*1.4+r));
  const cx=W/2,cy=H*0.65,rX=r*s*1.2,rY=r*s*0.4,hs=h*s;
  const tip={x:cx,y:cy-hs};
  ctx.fillStyle='rgba(5,150,105,0.2)';
  ctx.beginPath();ctx.moveTo(tip.x,tip.y);ctx.lineTo(cx-rX,cy);ctx.lineTo(cx+rX,cy);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#059669';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(tip.x,tip.y);ctx.lineTo(cx-rX,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(tip.x,tip.y);ctx.lineTo(cx+rX,cy);ctx.stroke();
  ctx.beginPath();ctx.ellipse(cx,cy,rX,rY,0,0,2*Math.PI);ctx.fillStyle='rgba(5,150,105,0.15)';ctx.fill();ctx.stroke();
  // Height line
  ctx.strokeStyle='#475569';ctx.setLineDash([3,2]);
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx,cy-hs);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#475569';ctx.font='bold 13px Inter';ctx.textAlign='left';
  ctx.fillText('h='+h,cx+4,(cy+cy-hs)/2);
  ctx.fillText('r='+r,cx+rX/2+4,cy+14);
  const l=Math.sqrt(r**2+h**2);
  ctx.fillStyle='#059669';ctx.textAlign='right';ctx.fillText('l='+r2(l),cx-4,cy-hs/2);
}

function drawSphere(ctx,W,H,r){
  const s=Math.min((W-40),(H-40))/(r*2.4);
  const cx=W/2,cy=H/2,rs=r*s;
  const grad=ctx.createRadialGradient(cx-rs*0.3,cy-rs*0.3,rs*0.1,cx,cy,rs);
  grad.addColorStop(0,'rgba(37,99,235,0.5)');grad.addColorStop(1,'rgba(27,79,138,0.2)');
  ctx.beginPath();ctx.arc(cx,cy,rs,0,2*Math.PI);ctx.fillStyle=grad;ctx.fill();
  ctx.strokeStyle='#1B4F8A';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.ellipse(cx,cy,rs,rs*0.35,0,0,2*Math.PI);ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);
  ctx.strokeStyle='#475569';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+rs,cy);ctx.stroke();
  ctx.fillStyle='#475569';ctx.font='bold 13px Inter';ctx.textAlign='left';ctx.fillText('r = '+r,cx+rs+4,cy-4);
}

function drawPyramid(ctx,W,H,b,h){
  const s=Math.min(W,H)/(Math.max(b,h)*3);
  const tip=iso(b/2,h,b/2,W,H,s);
  const c1=iso(0,0,0,W,H,s),c2=iso(b,0,0,W,H,s),c3=iso(b,0,b,W,H,s),c4=iso(0,0,b,W,H,s);
  // Base
  ctx.beginPath();[c1,c2,c3,c4].forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.closePath();ctx.fillStyle='rgba(217,119,6,0.2)';ctx.fill();ctx.strokeStyle='#D97706';ctx.lineWidth=1.5;ctx.stroke();
  // Faces
  [[c1,c2],[c2,c3],[c3,c4],[c4,c1]].forEach(([a,b2],i)=>{
    ctx.beginPath();ctx.moveTo(tip.x,tip.y);ctx.lineTo(a.x,a.y);ctx.lineTo(b2.x,b2.y);ctx.closePath();
    ctx.fillStyle=`rgba(217,119,6,${0.15+i*0.05})`;ctx.fill();ctx.strokeStyle='#D97706';ctx.stroke();
  });
  ctx.fillStyle='#475569';ctx.font='bold 12px Inter';ctx.textAlign='center';
  ctx.fillText('b='+b,c2.x+10,c2.y+10);ctx.fillText('h='+h,tip.x+20,tip.y);
}

function drawTriPrism(ctx,W,H,a,ht,l){
  const s=Math.min(W,H)/(Math.max(a,ht,l)*3);
  const face=(pts,fill)=>{
    ctx.beginPath();pts.forEach(([x,y,z],i)=>{const p=iso(x,y,z,W,H,s);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});
    ctx.closePath();ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle='#7C3AED';ctx.lineWidth=1.5;ctx.stroke();
  };
  face([[0,0,0],[a,0,0],[0,ht,0]],'rgba(124,58,237,0.2)');
  face([[0,0,l],[a,0,l],[0,ht,l]],'rgba(124,58,237,0.15)');
  face([[0,0,0],[a,0,0],[a,0,l],[0,0,l]],'rgba(124,58,237,0.1)');
  face([[0,0,0],[0,ht,0],[0,ht,l],[0,0,l]],'rgba(124,58,237,0.2)');
  face([[a,0,0],[0,ht,0],[0,ht,l],[a,0,l]],'rgba(124,58,237,0.25)');
}

function drawCuboidNet(ctx,W,H,l,w,h){
  const s=Math.min(W/(2*l+2*w),H/(2*h+w))*0.8;
  const ox=W/2-l*s,oy=10;
  const rect=(x,y,ww,hh,fill)=>{
    ctx.fillStyle=fill;ctx.fillRect(x,y,ww,hh);
    ctx.strokeStyle='#1B4F8A';ctx.lineWidth=1;ctx.strokeRect(x,y,ww,hh);
    ctx.fillStyle='#475569';ctx.font='10px Inter';ctx.textAlign='center';
    ctx.fillText(`${ww/s}×${hh/s}`,x+ww/2,y+hh/2+4);
  };
  rect(ox,oy,l*s,h*s,'rgba(27,79,138,0.15)');
  rect(ox,oy+h*s,l*s,w*s,'rgba(27,79,138,0.25)');
  rect(ox,oy+h*s+w*s,l*s,h*s,'rgba(27,79,138,0.15)');
  rect(ox-w*s,oy+h*s,w*s,w*s,'rgba(27,79,138,0.1)');
  rect(ox+l*s,oy+h*s,w*s,w*s,'rgba(27,79,138,0.1)');
  ctx.fillStyle='#475569';ctx.font='bold 11px Inter';ctx.textAlign='center';ctx.fillText('Net of cuboid (fold to make 3D)',W/2,H-8);
}

function drawCylinderNet(ctx,W,H,r,h){
  const s=Math.min(W/(2*PI*r+r*2+20),H/(h+r*2+20));
  const circ=2*PI*r*s*0.7,rs=r*s*0.7,hs=h*s*0.7;
  const ox=W/2,oy=10;
  // Rectangle (lateral)
  ctx.fillStyle='rgba(139,26,26,0.15)';ctx.fillRect(ox-circ/2,oy+rs,circ,hs);
  ctx.strokeStyle='#8B1A1A';ctx.lineWidth=1.5;ctx.strokeRect(ox-circ/2,oy+rs,circ,hs);
  ctx.fillStyle='#475569';ctx.font='11px Inter';ctx.textAlign='center';
  ctx.fillText('2πr × h',ox,oy+rs+hs/2+4);
  // Circles
  ctx.beginPath();ctx.arc(ox,oy+rs-rs,rs,0,2*Math.PI);ctx.fillStyle='rgba(139,26,26,0.2)';ctx.fill();ctx.strokeStyle='#8B1A1A';ctx.stroke();
  ctx.beginPath();ctx.arc(ox,oy+rs+hs+rs,rs,0,2*Math.PI);ctx.fillStyle='rgba(139,26,26,0.2)';ctx.fill();ctx.stroke();
  ctx.fillStyle='#475569';ctx.textAlign='center';ctx.fillText('Net of cylinder',W/2,H-8);
}

function drawConeNet(ctx,W,H,r,h){
  const l=Math.sqrt(r**2+h**2);
  const s=Math.min(W,H)/(l*2.4);
  const cx=W*0.35,cy=H/2+l*s*0.2;
  const theta=(r/l);const ang=2*Math.PI*theta;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,l*s,-Math.PI/2-ang/2,-Math.PI/2+ang/2);ctx.closePath();
  ctx.fillStyle='rgba(5,150,105,0.2)';ctx.fill();ctx.strokeStyle='#059669';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='#475569';ctx.font='11px Inter';ctx.textAlign='center';ctx.fillText(`sector radius = l = ${r2(l)}`,cx,H-8);
  // Base circle
  const bx=W*0.75,by=H/2;
  ctx.beginPath();ctx.arc(bx,by,r*s,0,2*Math.PI);
  ctx.fillStyle='rgba(5,150,105,0.15)';ctx.fill();ctx.strokeStyle='#059669';ctx.stroke();
  ctx.fillStyle='#475569';ctx.textAlign='center';ctx.fillText(`r = ${r}`,bx,by+r*s+14);
}

function drawSphereInfo(ctx,W,H){
  ctx.fillStyle='#475569';ctx.font='13px Inter';ctx.textAlign='center';
  ctx.fillText('A sphere has no flat net — it cannot be unfolded.',W/2,H/2-10);
  ctx.fillText('(Like trying to flatten an orange peel perfectly!)',W/2,H/2+14);
}

function drawPyramidNet(ctx,W,H,b,h){
  const l=Math.sqrt((b/2)**2+h**2);
  const s=Math.min(W/(b*3),H/(l*2+b))*0.8;
  const cx=W/2,cy=H/2;
  const rect2=(x,y,w,h2,fill)=>{ctx.fillStyle=fill;ctx.fillRect(x,y,w,h2);ctx.strokeStyle='#D97706';ctx.lineWidth=1;ctx.strokeRect(x,y,w,h2);};
  // Square base
  rect2(cx-b*s/2,cy-b*s/2,b*s,b*s,'rgba(217,119,6,0.2)');
  // Triangular faces (simplified as triangles around square)
  [[cx-b*s/2,cy-b*s/2,-1,0],[cx+b*s/2,cy-b*s/2,0,-1],[cx+b*s/2,cy+b*s/2,1,0],[cx-b*s/2,cy+b*s/2,0,1]].forEach(([tx,ty,dx,dy])=>{
    ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx+dx*l*s,ty+dy*l*s);ctx.lineTo(tx,ty+(b*s*(dy===0?1:0)));
    ctx.closePath();ctx.fillStyle='rgba(217,119,6,0.15)';ctx.fill();ctx.strokeStyle='#D97706';ctx.stroke();
  });
  ctx.fillStyle='#475569';ctx.font='11px Inter';ctx.textAlign='center';ctx.fillText('Net of square pyramid',W/2,H-8);
}

renderInputs();
compute();
</script>
