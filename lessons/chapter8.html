  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

d:radial-gradient(120% 120% at 80% -10%,#2a2d72 0%,#16183f 55%);color:#fff;width:100%;height:100%;box-sizing:border-box;padding:88px 110px;display:flex;flex-direction:column;justify-content:center;font-family:'Space Grotesk',sans-serif;position:relative;overflow:hidden;\">\n  <div style=\"position:absolute;right:-60px;top:60px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#ffe9a8,#ffd23f);opacity:.16;\"><\/div>\n  <div style=\"position:absolute;right:120px;bottom:80px;font-size:240px;animation:floaty 5s ease-in-out infinite;opacity:.9;\">\ud83c\udfb2<\/div>\n  <div style=\"display:inline-flex;align-items:center;gap:16px;background:#4d6bff;align-self:flex-start;padding:14px 30px;border-radius:40px;font-weight:700;font-size:30px;letter-spacing:2px;\">CHAPTER 8<\/div>\n  <h1 style=\"font-size:128px;font-weight:700;line-height:1.02;margin:34px 0 0;max-width:1200px;letter-spacing:-2px;\">Introduction to <span style=\"color:#22d3ee;\">Probability<\/span><\/h1>\n  <p style=\"font-size:38px;font-weight:500;margin:30px 0 0;color:#c7caff;max-width:1000px;\">Coin flips, dice rolls and a bit of luck \u2014 let's learn how to measure how likely things are.<\/p>\n  <div style=\"display:flex;gap:18px;margin-top:54px;flex-wrap:wrap;max-width:1180px;\">\n    <span style=\"background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);padding:16px 26px;border-radius:14px;font-size:26px;\">Express probabilities mathematically<\/span>\n    <span style=\"background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);padding:16px 26px;border-radius:14px;font-size:26px;\">Calculate simple probabilities<\/span>\n    <span style=\"background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);padding:16px 26px;border-radius:14px;font-size:26px;\">Use sample space diagrams<\/span>\n    <span style=\"background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);padding:16px 26px;border-radius:14px;font-size:26px;\">Independent events<\/span>\n    <span style=\"background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);padding:16px 26px;border-radius:14px;font-size:26px;\">Mutually exclusive events<\/span>\n  <\/div>\n<\/section>\n\n<!-- 2 VOCAB: EVENTS -->\n<section data-label=\"Key Word \u00b7 Events\" data-screen-label=\"02\" data-speaker-notes=\"An event is what we're interested in happening \u2014 like rolling an even number. It can be one outcome or several.\" style=\"background:#16183f;color:#fff;width:100%;height:100%;box-sizing:border-box;padding:80px 110px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:3px;color:#22d3ee;font-size:28px;\">KEY WORD \u00b7 01<\/div>\n  <h2 style=\"font-size:96px;font-weight:700;margin:10px 0 0;\">Events<\/h2>\n  <div style=\"display:flex;gap:70px;align-items:center;margin-top:30px;flex:1;\">\n    <div style=\"flex:1;\">\n      <p style=\"font-size:40px;line-height:1.4;font-weight:500;margin:0;\">One or more <span style=\"color:#22d3ee;\">outcomes<\/span> you are interested in.<\/p>\n      <p style=\"font-size:32px;line-height:1.5;color:#c7caff;margin:30px 0 0;\">Example: \"getting an even number\" when you roll a dice is an event \u2014 it happens if you roll a <b style=\"color:#ffd23f;\">2<\/b>, <b style=\"color:#ffd23f;\">4<\/b> or <b style=\"color:#ffd23f;\">6<\/b>.<\/p>\n    <\/div>\n    <div style=\"display:flex;gap:22px;\">\n      <div style=\"width:130px;height:130px;background:#fff;border-radius:22px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:18px;box-sizing:border-box;box-shadow:0 12px 28px rgba(0,0,0,.35);\"><span><\/span><span><\/span><span style=\"background:#16183f;border-radius:50%;align-self:start;justify-self:end;width:24px;height:24px;\"><\/span><span><\/span><span><\/span><span><\/span><span style=\"background:#16183f;border-radius:50%;align-self:end;width:24px;height:24px;\"><\/span><span><\/span><span><\/span><\/div>\n      <div style=\"width:130px;height:130px;background:#ffd23f;border-radius:22px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:18px;box-sizing:border-box;box-shadow:0 12px 28px rgba(0,0,0,.35);\"><span style=\"background:#16183f;border-radius:50%;width:24px;height:24px;\"><\/span><span><\/span><span style=\"background:#16183f;border-radius:50%;justify-self:end;width:24px;height:24px;\"><\/span><span><\/span><span style=\"background:#16183f;border-radius:50%;justify-self:center;width:24px;height:24px;\"><\/span><span><\/span><span style=\"background:#16183f;border-radius:50%;width:24px;height:24px;\"><\/span><span><\/span><span style=\"background:#16183f;border-radius:50%;justify-self:end;width:24px;height:24px;\"><\/span><\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 3 VOCAB: BIAS -->\n<section data-label=\"Key Word \u00b7 Bias\" data-screen-label=\"03\" data-speaker-notes=\"Bias means the outcomes are NOT equally likely \u2014 a weighted or unfair dice/coin. A biased coin might land heads more often.\" style=\"background:#16183f;color:#fff;width:100%;height:100%;box-sizing:border-box;padding:80px 110px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:3px;color:#fb7185;font-size:28px;\">KEY WORD \u00b7 02<\/div>\n  <h2 style=\"font-size:96px;font-weight:700;margin:10px 0 0;\">Bias<\/h2>\n  <div style=\"display:flex;gap:70px;align-items:center;margin-top:30px;flex:1;\">\n    <div style=\"flex:1;\">\n      <p style=\"font-size:40px;line-height:1.4;font-weight:500;margin:0;\">When outcomes are <span style=\"color:#fb7185;\">not equally likely<\/span> \u2014 the object is weighted or imperfectly made.<\/p>\n      <p style=\"font-size:32px;line-height:1.5;color:#c7caff;margin:30px 0 0;\">A biased dice, coin or spinner is \"loaded\". For a biased object you often need <b style=\"color:#22d3ee;\">experimental probability<\/b>, not theoretical.<\/p>\n    <\/div>\n    <div style=\"display:flex;flex-direction:column;align-items:center;gap:18px;\">\n      <div style=\"width:170px;height:170px;background:linear-gradient(135deg,#fb7185,#8b5cf6);border-radius:26px;transform:rotate(-12deg) skewX(-6deg);box-shadow:0 16px 34px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:80px;font-weight:700;\">6<\/div>\n      <span style=\"font-size:26px;color:#fb7185;font-weight:600;\">lands on 6 too often!<\/span>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 4 VOCAB: COMBINED EVENTS -->\n<section data-label=\"Key Word \u00b7 Combined events\" data-screen-label=\"04\" data-speaker-notes=\"Combined events: two or more events happening together, one after another \u2014 like flipping a coin AND rolling a dice.\" style=\"background:#16183f;color:#fff;width:100%;height:100%;box-sizing:border-box;padding:80px 110px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:3px;color:#8b5cf6;font-size:28px;\">KEY WORD \u00b7 03<\/div>\n  <h2 style=\"font-size:96px;font-weight:700;margin:10px 0 0;\">Combined events<\/h2>\n  <div style=\"display:flex;gap:70px;align-items:center;margin-top:30px;flex:1;\">\n    <div style=\"flex:1;\">\n      <p style=\"font-size:40px;line-height:1.4;font-weight:500;margin:0;\">Two or more events happening <span style=\"color:#8b5cf6;\">together<\/span>, often one after the other.<\/p>\n      <p style=\"font-size:32px;line-height:1.5;color:#c7caff;margin:30px 0 0;\">Example: flip a coin <b>and<\/b> roll a dice. We use sample space diagrams to list every possible result.<\/p>\n    <\/div>\n    <div style=\"display:flex;align-items:center;gap:30px;\">\n      <div style=\"width:150px;height:150px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#ffe9a8,#ffd23f);display:flex;align-items:center;justify-content:center;font-size:64px;font-weight:700;color:#16183f;box-shadow:0 14px 30px rgba(0,0,0,.35);\">H<\/div>\n      <span style=\"font-size:60px;font-weight:700;color:#8b5cf6;\">+<\/span>\n      <div style=\"width:150px;height:150px;background:#fff;border-radius:24px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:20px;box-sizing:border-box;box-shadow:0 14px 30px rgba(0,0,0,.35);\"><span style=\"background:#16183f;border-radius:50%;width:26px;height:26px;\"><\/span><span><\/span><span style=\"background:#16183f;border-radius:50%;justify-self:end;width:26px;height:26px;\"><\/span><span><\/span><span style=\"background:#16183f;border-radius:50%;justify-self:center;width:26px;height:26px;\"><\/span><span><\/span><span style=\"background:#16183f;border-radius:50%;width:26px;height:26px;\"><\/span><span><\/span><span style=\"background:#16183f;border-radius:50%;justify-self:end;width:26px;height:26px;\"><\/span><\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 5 VOCAB: EXPERIMENTAL PROBABILITY -->\n<section data-label=\"Key Word \u00b7 Experimental probability\" data-screen-label=\"05\" data-speaker-notes=\"Experimental probability comes from actually doing the experiment and recording results. Roll the dice live and watch the numbers build up.\" style=\"background:#16183f;color:#fff;width:100%;height:100%;box-sizing:border-box;padding:70px 110px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:3px;color:#22d3ee;font-size:28px;\">KEY WORD \u00b7 04<\/div>\n  <h2 style=\"font-size:84px;font-weight:700;margin:8px 0 0;\">Experimental probability<\/h2>\n  <p style=\"font-size:34px;line-height:1.4;font-weight:500;margin:18px 0 0;max-width:1200px;\">Worked out by <span style=\"color:#22d3ee;\">actually doing trials<\/span> and recording what happens. Try it \u2014 roll the dice a few times!<\/p>\n  <div style=\"background:#fff;border-radius:24px;padding:40px 46px;margin-top:30px;box-shadow:0 16px 40px rgba(0,0,0,.3);\">\n    <dice-roller><\/dice-roller>\n  <\/div>\n<\/section>\n\n<!-- 6 VOCAB: INDEPENDENT EVENTS -->\n<section data-label=\"Key Word \u00b7 Independent events\" data-screen-label=\"06\" data-speaker-notes=\"Independent events: one result has no effect on the other. Flip a coin twice \u2014 the first flip doesn't change the second.\" style=\"background:#16183f;color:#fff;width:100%;height:100%;box-sizing:border-box;padding:80px 110px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:3px;color:#34d399;font-size:28px;\">KEY WORD \u00b7 05<\/div>\n  <h2 style=\"font-size:96px;font-weight:700;margin:10px 0 0;\">Independent events<\/h2>\n  <div style=\"display:flex;gap:70px;align-items:center;margin-top:30px;flex:1;\">\n    <div style=\"flex:1;\">\n      <p style=\"font-size:40px;line-height:1.4;font-weight:500;margin:0;\">The result of one event has <span style=\"color:#34d399;\">no effect<\/span> on the other.<\/p>\n      <p style=\"font-size:32px;line-height:1.5;color:#c7caff;margin:30px 0 0;\">Flip a coin twice: the first flip can't influence the second. For independent events, <span style=\"font-family:Georgia,serif;font-style:italic;\">P(A and B) = P(A) \u00d7 P(B)<\/span>.<\/p>\n    <\/div>\n    <div style=\"display:flex;align-items:center;gap:26px;\">\n      <div style=\"width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#bff3ff,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:60px;font-weight:700;color:#16183f;box-shadow:0 14px 30px rgba(0,0,0,.35);\">H<\/div>\n      <span style=\"font-size:40px;color:#8b8fce;\">then<\/span>\n      <div style=\"width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#e3d4ff,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:60px;font-weight:700;color:#fff;box-shadow:0 14px 30px rgba(0,0,0,.35);\">T<\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 7 VOCAB: MUTUALLY EXCLUSIVE -->\n<section data-label=\"Key Word \u00b7 Mutually exclusive\" data-screen-label=\"07\" data-speaker-notes=\"Mutually exclusive events cannot happen at the same time \u2014 a number can't be both odd and even. No overlap.\" style=\"background:#16183f;color:#fff;width:100%;height:100%;box-sizing:border-box;padding:80px 110px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:3px;color:#ffd23f;font-size:28px;\">KEY WORD \u00b7 06<\/div>\n  <h2 style=\"font-size:90px;font-weight:700;margin:10px 0 0;\">Mutually exclusive<\/h2>\n  <div style=\"display:flex;gap:70px;align-items:center;margin-top:30px;flex:1;\">\n    <div style=\"flex:1;\">\n      <p style=\"font-size:40px;line-height:1.4;font-weight:500;margin:0;\">Events that <span style=\"color:#ffd23f;\">cannot happen at the same time<\/span>.<\/p>\n      <p style=\"font-size:32px;line-height:1.5;color:#c7caff;margin:30px 0 0;\">A single dice roll can't be odd <b>and<\/b> even at once. For these, <span style=\"font-family:Georgia,serif;font-style:italic;\">P(A or B) = P(A) + P(B)<\/span>.<\/p>\n    <\/div>\n    <div style=\"position:relative;width:360px;height:180px;\">\n      <div style=\"position:absolute;left:0;top:0;width:180px;height:180px;border-radius:50%;background:rgba(34,211,238,.7);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;\">EVEN<\/div>\n      <div style=\"position:absolute;right:0;top:0;width:180px;height:180px;border-radius:50%;background:rgba(139,92,246,.8);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;\">ODD<\/div>\n      <div style=\"position:absolute;left:50%;top:-46px;transform:translateX(-50%);font-size:26px;color:#ffd23f;font-weight:600;white-space:nowrap;\">no overlap<\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 8 VOCAB: OUTCOMES -->\n<section data-label=\"Key Word \u00b7 Outcomes\" data-screen-label=\"08\" data-speaker-notes=\"Outcomes are the possible results of an experiment. A dice has six possible outcomes: 1 to 6.\" style=\"background:#16183f;color:#fff;width:100%;height:100%;box-sizing:border-box;padding:70px 110px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:3px;color:#4d6bff;font-size:28px;\">KEY WORD \u00b7 07<\/div>\n  <h2 style=\"font-size:96px;font-weight:700;margin:8px 0 0;\">Outcomes<\/h2>\n  <p style=\"font-size:40px;line-height:1.4;font-weight:500;margin:18px 0 0;max-width:1200px;\">The possible <span style=\"color:#4d6bff;\">results<\/span> of an experiment. Rolling a dice has six possible outcomes:<\/p>\n  <div style=\"display:flex;gap:26px;margin-top:46px;justify-content:center;\">\n    <div style=\"width:150px;height:150px;background:#fff;color:#16183f;border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:80px;font-weight:700;box-shadow:0 12px 26px rgba(0,0,0,.3);\">1<\/div>\n    <div style=\"width:150px;height:150px;background:#4d6bff;border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:80px;font-weight:700;box-shadow:0 12px 26px rgba(0,0,0,.3);\">2<\/div>\n    <div style=\"width:150px;height:150px;background:#fff;color:#16183f;border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:80px;font-weight:700;box-shadow:0 12px 26px rgba(0,0,0,.3);\">3<\/div>\n    <div style=\"width:150px;height:150px;background:#22d3ee;color:#16183f;border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:80px;font-weight:700;box-shadow:0 12px 26px rgba(0,0,0,.3);\">4<\/div>\n    <div style=\"width:150px;height:150px;background:#fff;color:#16183f;border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:80px;font-weight:700;box-shadow:0 12px 26px rgba(0,0,0,.3);\">5<\/div>\n    <div style=\"width:150px;height:150px;background:#8b5cf6;border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:80px;font-weight:700;box-shadow:0 12px 26px rgba(0,0,0,.3);\">6<\/div>\n  <\/div>\n<\/section>\n\n<!-- 9 VOCAB: PROBABILITY -->\n<section data-label=\"Key Word \u00b7 Probability\" data-screen-label=\"09\" data-speaker-notes=\"Probability measures how likely an event is, on a scale from 0 (impossible) to 1 (certain). Drag the marker to feel the scale.\" style=\"background:#16183f;color:#fff;width:100%;height:100%;box-sizing:border-box;padding:70px 110px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:3px;color:#22d3ee;font-size:28px;\">KEY WORD \u00b7 08<\/div>\n  <h2 style=\"font-size:96px;font-weight:700;margin:8px 0 0;\">Probability<\/h2>\n  <p style=\"font-size:36px;line-height:1.4;font-weight:500;margin:16px 0 0;max-width:1300px;\">A measure of how likely an event is to happen \u2014 always between <b style=\"color:#fb7185;\">0 (impossible)<\/b> and <b style=\"color:#34d399;\">1 (certain)<\/b>. <span style=\"color:#ffd23f;\">Drag the dial!<\/span><\/p>\n  <div style=\"background:#fff;border-radius:24px;padding:54px 60px 40px;margin-top:34px;box-shadow:0 16px 40px rgba(0,0,0,.3);\">\n    <prob-scale><\/prob-scale>\n  <\/div>\n<\/section>\n\n<!-- 10 VOCAB: RELATIVE FREQUENCY -->\n<section data-label=\"Key Word \u00b7 Relative frequency\" data-screen-label=\"10\" data-speaker-notes=\"Relative frequency = number of times an event happened divided by the number of trials. It's experimental probability written as a fraction.\" style=\"background:#16183f;color:#fff;width:100%;height:100%;box-sizing:border-box;padding:80px 110px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:3px;color:#34d399;font-size:28px;\">KEY WORD \u00b7 09<\/div>\n  <h2 style=\"font-size:90px;font-weight:700;margin:10px 0 0;\">Relative frequency<\/h2>\n  <div style=\"display:flex;gap:70px;align-items:center;margin-top:36px;flex:1;\">\n    <p style=\"flex:1;font-size:38px;line-height:1.45;font-weight:500;margin:0;\">How often an event <span style=\"color:#34d399;\">actually happened<\/span>, divided by the number of trials.<\/p>\n    <div style=\"font-family:Georgia,serif;font-style:italic;font-size:46px;display:flex;align-items:center;gap:18px;color:#fff;\">\n      relative frequency =\n      <span style=\"display:inline-flex;flex-direction:column;text-align:center;font-size:38px;\">\n        <span style=\"border-bottom:3px solid #fff;padding:4px 16px;\">times it happened<\/span>\n        <span style=\"padding:4px 16px;\">number of trials<\/span>\n      <\/span>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 11 VOCAB: SAMPLE SPACE -->\n<section data-label=\"Key Word \u00b7 Sample space\" data-screen-label=\"11\" data-speaker-notes=\"The sample space is the set of ALL possible outcomes. For a dice it is the numbers 1 to 6.\" style=\"background:#16183f;color:#fff;width:100%;height:100%;box-sizing:border-box;padding:80px 110px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:3px;color:#4d6bff;font-size:28px;\">KEY WORD \u00b7 10<\/div>\n  <h2 style=\"font-size:96px;font-weight:700;margin:10px 0 0;\">Sample space<\/h2>\n  <div style=\"display:flex;gap:70px;align-items:center;margin-top:30px;flex:1;\">\n    <p style=\"flex:1;font-size:40px;line-height:1.45;font-weight:500;margin:0;\">The set of <span style=\"color:#4d6bff;\">all possible outcomes<\/span> of an experiment.<\/p>\n    <div style=\"font-size:56px;font-weight:700;background:#fff;color:#16183f;border-radius:22px;padding:34px 46px;box-shadow:0 14px 32px rgba(0,0,0,.3);\">{ 1, 2, 3, 4, 5, 6 }<\/div>\n  <\/div>\n<\/section>\n\n<!-- 12 VOCAB: SAMPLE SPACE DIAGRAM -->\n<section data-label=\"Key Word \u00b7 Sample space diagram\" data-screen-label=\"12\" data-speaker-notes=\"A sample space diagram is a table or grid that shows every possible outcome clearly, so you can count them.\" style=\"background:#16183f;color:#fff;width:100%;height:100%;box-sizing:border-box;padding:70px 110px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:3px;color:#8b5cf6;font-size:28px;\">KEY WORD \u00b7 11<\/div>\n  <h2 style=\"font-size:84px;font-weight:700;margin:8px 0 0;\">Sample space diagram<\/h2>\n  <div style=\"display:flex;gap:70px;align-items:center;margin-top:24px;flex:1;\">\n    <p style=\"flex:1;font-size:38px;line-height:1.45;font-weight:500;margin:0;\">A <span style=\"color:#8b5cf6;\">table or grid<\/span> showing every outcome clearly \u2014 perfect for combined events.<\/p>\n    <div style=\"display:grid;grid-template-columns:repeat(3,84px);grid-template-rows:repeat(3,76px);gap:10px;font-size:34px;color:#16183f;\">\n      <div style=\"background:#1b1d4d;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;\">\u00d7<\/div>\n      <div style=\"background:#fb7185;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;\">1<\/div>\n      <div style=\"background:#fb7185;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;\">2<\/div>\n      <div style=\"background:#4d6bff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;\">1<\/div>\n      <div style=\"background:#fff;color:#16183f;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;\">2<\/div>\n      <div style=\"background:#fff;color:#16183f;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;\">3<\/div>\n      <div style=\"background:#4d6bff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;\">2<\/div>\n      <div style=\"background:#fff;color:#16183f;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;\">3<\/div>\n      <div style=\"background:#ffd23f;color:#16183f;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;\">4<\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 13 VOCAB: THEORETICAL PROBABILITY -->\n<section data-label=\"Key Word \u00b7 Theoretical probability\" data-screen-label=\"13\" data-speaker-notes=\"Theoretical probability is worked out by reasoning, not experimenting: favourable outcomes divided by total possible outcomes.\" style=\"background:#16183f;color:#fff;width:100%;height:100%;box-sizing:border-box;padding:70px 110px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:3px;color:#22d3ee;font-size:28px;\">KEY WORD \u00b7 12<\/div>\n  <h2 style=\"font-size:84px;font-weight:700;margin:8px 0 0;\">Theoretical probability<\/h2>\n  <div style=\"display:flex;gap:70px;align-items:center;margin-top:24px;flex:1;\">\n    <p style=\"flex:1;font-size:38px;line-height:1.45;font-weight:500;margin:0;\">Worked out by <span style=\"color:#22d3ee;\">reasoning<\/span> when all outcomes are equally likely \u2014 no experiment needed.<\/p>\n    <div style=\"font-family:Georgia,serif;font-style:italic;font-size:46px;display:flex;align-items:center;gap:18px;color:#fff;\">\n      <span>P(A) =<\/span>\n      <span style=\"display:inline-flex;flex-direction:column;text-align:center;font-size:36px;\">\n        <span style=\"border-bottom:3px solid #22d3ee;padding:4px 16px;color:#22d3ee;\">favourable outcomes<\/span>\n        <span style=\"padding:4px 16px;\">possible outcomes<\/span>\n      <\/span>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 14 VOCAB: TRIAL -->\n<section data-label=\"Key Word \u00b7 Trial\" data-screen-label=\"14\" data-speaker-notes=\"A trial is one go of an experiment \u2014 one roll of the dice, one flip of the coin. Many trials build up experimental data.\" style=\"background:#16183f;color:#fff;width:100%;height:100%;box-sizing:border-box;padding:80px 110px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:3px;color:#ffd23f;font-size:28px;\">KEY WORD \u00b7 13<\/div>\n  <h2 style=\"font-size:96px;font-weight:700;margin:10px 0 0;\">Trial<\/h2>\n  <div style=\"display:flex;gap:70px;align-items:center;margin-top:30px;flex:1;\">\n    <p style=\"flex:1;font-size:40px;line-height:1.45;font-weight:500;margin:0;\"><span style=\"color:#ffd23f;\">One go<\/span> of an experiment \u2014 a single roll of the dice or flip of the coin.<\/p>\n    <div style=\"width:170px;height:170px;background:#fff;border-radius:26px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:24px;box-sizing:border-box;box-shadow:0 14px 32px rgba(0,0,0,.35);animation:floaty 4s ease-in-out infinite;\"><span><\/span><span><\/span><span><\/span><span><\/span><span style=\"background:#16183f;border-radius:50%;justify-self:center;align-self:center;width:34px;height:34px;\"><\/span><span><\/span><span><\/span><span><\/span><span><\/span><\/div>\n  <\/div>\n<\/section>\n\n<!-- 15 SECTION 8.1 -->\n<section data-label=\"8.1 Basic probability\" data-screen-label=\"15\" data-speaker-notes=\"Section 8.1. Think about rolling dice \u2014 you can't predict the exact number, but you DO know the possible outcomes: 1 to 6. That set is the sample space, and any subset is an event.\" style=\"background:radial-gradient(120% 120% at 12% 0%,#2a2d72,#16183f 60%);color:#fff;width:100%;height:100%;box-sizing:border-box;padding:88px 110px;display:flex;flex-direction:column;justify-content:center;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-size:200px;font-weight:700;line-height:.9;color:#4d6bff;\">8.1<\/div>\n  <h2 style=\"font-size:84px;font-weight:700;margin:6px 0 0;\">Understanding basic probability<\/h2>\n  <p style=\"font-size:34px;line-height:1.5;color:#c7caff;margin:30px 0 0;max-width:1300px;\">You can't predict the number you'll roll, but you know the possible <b style=\"color:#22d3ee;\">outcomes<\/b>: 1, 2, 3, 4, 5 or 6. The whole set is the <b style=\"color:#22d3ee;\">sample space<\/b>, and any subset \u2014 like \"an even number\" \u2014 is an <b style=\"color:#ffd23f;\">event<\/b>. Probability runs from <b style=\"color:#fb7185;\">0 (impossible)<\/b> to <b style=\"color:#34d399;\">1 (certain)<\/b>.<\/p>\n<\/section>\n\n<!-- 16 PROBABILITY FORMULA -->\n<section data-label=\"The probability formula\" data-screen-label=\"16\" data-speaker-notes=\"The core formula. P of A equals the number of times the desired event happens over the number of trials \u2014 or successes over trials.\" style=\"background:#f4f5ff;color:#1b1d4d;width:100%;height:100%;box-sizing:border-box;padding:80px 110px;display:flex;flex-direction:column;justify-content:center;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:2px;color:#4d6bff;font-size:30px;\">THE FORMULA<\/div>\n  <h2 style=\"font-size:72px;font-weight:700;margin:8px 0 50px;\">Writing probability mathematically<\/h2>\n  <div style=\"display:flex;gap:90px;align-items:center;flex-wrap:wrap;\">\n    <div style=\"font-family:Georgia,serif;font-style:italic;font-size:54px;display:flex;align-items:center;gap:22px;background:#fff;padding:44px 56px;border-radius:24px;box-shadow:0 14px 34px rgba(27,29,77,.12);\">\n      <span style=\"font-size:64px;\">P(A) =<\/span>\n      <span style=\"display:inline-flex;flex-direction:column;text-align:center;font-size:42px;\">\n        <span style=\"border-bottom:4px solid #1b1d4d;padding:6px 18px;\">number of desired outcomes<\/span>\n        <span style=\"padding:6px 18px;\">number of trials<\/span>\n      <\/span>\n    <\/div>\n    <div style=\"font-family:Georgia,serif;font-style:italic;font-size:42px;display:flex;align-items:center;gap:18px;color:#8b5cf6;\">\n      <span>or, P(A) =<\/span>\n      <span style=\"display:inline-flex;flex-direction:column;text-align:center;font-size:36px;\">\n        <span style=\"border-bottom:4px solid #8b5cf6;padding:6px 16px;\">successes<\/span>\n        <span style=\"padding:6px 16px;\">trials<\/span>\n      <\/span>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 17 EXPERIMENTAL: DARTBOARD -->\n<section data-label=\"Experimental \u00b7 dartboard\" data-screen-label=\"17\" data-speaker-notes=\"A person is blindfolded and asked to throw darts. If they hit the dartboard 15 out of 125 throws, the experimental probability is 15 over 125 = 0.12. Spin the wheel to feel randomness.\" style=\"background:#f4f5ff;color:#1b1d4d;width:100%;height:100%;box-sizing:border-box;padding:64px 90px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:2px;color:#fb7185;font-size:28px;\">EXPERIMENTAL PROBABILITY<\/div>\n  <h2 style=\"font-size:60px;font-weight:700;margin:6px 0 0;\">Blindfold darts<\/h2>\n  <div style=\"display:flex;gap:56px;align-items:center;margin-top:24px;flex:1;\">\n    <div style=\"flex:1;\">\n      <p style=\"font-size:30px;line-height:1.45;margin:0 0 24px;\">A blindfolded player throws darts. They hit the board <b>15<\/b> times out of <b>125<\/b> throws, so the experimental probability of a hit is:<\/p>\n      <div style=\"font-family:Georgia,serif;font-style:italic;font-size:34px;display:flex;align-items:center;gap:16px;background:#fff;padding:26px 32px;border-radius:18px;box-shadow:0 10px 24px rgba(27,29,77,.1);width:fit-content;\">\n        P(hit) =\n        <span style=\"display:inline-flex;flex-direction:column;text-align:center;font-size:28px;\"><span style=\"border-bottom:3px solid #1b1d4d;padding:3px 12px;\">hits<\/span><span style=\"padding:3px 12px;\">throws<\/span><\/span>\n        = <span style=\"display:inline-flex;flex-direction:column;text-align:center;font-size:28px;\"><span style=\"border-bottom:3px solid #1b1d4d;padding:3px 12px;\">15<\/span><span style=\"padding:3px 12px;\">125<\/span><\/span>\n        = <b style=\"color:#8b5cf6;\">0.12<\/b>\n      <\/div>\n      <div style=\"margin-top:32px;\"><spin-wheel segments=\"HIT,MISS,MISS,HIT,MISS,MISS,MISS,MISS\"><\/spin-wheel><\/div>\n    <\/div>\n    <img src=\"f90650f0-43d0-4aac-8a03-4b6bbcff55a4\" alt=\"dartboard\" style=\"width:360px;border-radius:16px;background:#fff;padding:18px;box-shadow:0 12px 28px rgba(27,29,77,.14);\">\n  <\/div>\n<\/section>\n\n<!-- 18 RELATIVE FREQUENCY -->\n<section data-label=\"Relative frequency\" data-screen-label=\"18\" data-speaker-notes=\"Relative frequency lets you predict how many times something will occur over many trials. If P of a four is 18%, then over 80 rolls you expect 18% of 80 = about 14 fours. Roll to test it.\" style=\"background:#f4f5ff;color:#1b1d4d;width:100%;height:100%;box-sizing:border-box;padding:62px 90px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:2px;color:#34d399;font-size:28px;\">RELATIVE FREQUENCY &amp; EXPECTED OCCURRENCES<\/div>\n  <h2 style=\"font-size:56px;font-weight:700;margin:6px 0 0;\">How many times should it happen?<\/h2>\n  <div style=\"display:flex;gap:50px;margin-top:24px;flex:1;align-items:center;\">\n    <div style=\"width:540px;\">\n      <p style=\"font-size:28px;line-height:1.5;margin:0;\">If the relative frequency of rolling a four is <b style=\"color:#34d399;\">18%<\/b>, you can predict how many fours to expect over many trials.<\/p>\n      <div style=\"background:#fff;border-radius:18px;padding:26px 30px;margin-top:24px;box-shadow:0 10px 24px rgba(27,29,77,.1);font-size:28px;line-height:1.7;\">\n        18% of 80 = 14.4 \u2192 about <b style=\"color:#8b5cf6;\">14 fours<\/b><br>\n        18% of 200 = 36 \u2192 about <b style=\"color:#8b5cf6;\">36 fours<\/b>\n      <\/div>\n      <p style=\"font-size:24px;color:#6c6fa6;margin:22px 0 0;\">Remember: even if you expect 36 fours, your real results may differ \u2014 that's chance!<\/p>\n    <\/div>\n    <div style=\"flex:1;background:#fff;border-radius:22px;padding:34px 40px;box-shadow:0 12px 30px rgba(27,29,77,.12);\">\n      <dice-roller target=\"4\" label=\"Rolling a 4\"><\/dice-roller>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 19 THEORETICAL PROBABILITY -->\n<section data-label=\"Theoretical probability\" data-screen-label=\"19\" data-speaker-notes=\"When outcomes are equally likely you can calculate theoretical probability by counting favourable outcomes over total. A coin has two outcomes, so P of heads is one half. Flip to check it settles near 0.5.\" style=\"background:#f4f5ff;color:#1b1d4d;width:100%;height:100%;box-sizing:border-box;padding:62px 90px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:2px;color:#22d3ee;font-size:28px;\">THEORETICAL PROBABILITY<\/div>\n  <h2 style=\"font-size:56px;font-weight:700;margin:6px 0 0;\">Count, don't experiment<\/h2>\n  <p style=\"font-size:28px;line-height:1.45;margin:18px 0 0;max-width:1300px;\">When all outcomes are equally likely, count the <b style=\"color:#22d3ee;\">favourable outcomes<\/b> and divide by the <b>total possible<\/b>. A coin has two outcomes, so P(head) = <b style=\"color:#8b5cf6;\">\u00bd<\/b>. Flip many times \u2014 experimental results close in on the theory.<\/p>\n  <div style=\"background:#fff;border-radius:22px;padding:36px 44px;margin-top:24px;box-shadow:0 12px 30px rgba(27,29,77,.12);\">\n    <coin-flip><\/coin-flip>\n  <\/div>\n<\/section>\n\n<!-- 20 FAIR / BIASED / EQUALLY LIKELY -->\n<section data-label=\"Fair, biased &amp; equally likely\" data-screen-label=\"20\" data-speaker-notes=\"For a fair dice, P of an even number is 3 over 6 = one half. Outcomes are equally likely because the faces are identical. A weighted dice is biased \u2014 outcomes are no longer equally likely.\" style=\"background:#f4f5ff;color:#1b1d4d;width:100%;height:100%;box-sizing:border-box;padding:64px 90px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:2px;color:#4d6bff;font-size:28px;\">FAIR \u00b7 EQUALLY LIKELY \u00b7 BIASED<\/div>\n  <h2 style=\"font-size:56px;font-weight:700;margin:6px 0 0;\">Is it a fair game?<\/h2>\n  <div style=\"display:flex;gap:60px;align-items:center;margin-top:28px;flex:1;\">\n    <div style=\"flex:1;\">\n      <p style=\"font-size:30px;line-height:1.45;margin:0;\">Roll a <b>fair<\/b> dice for an even number. Favourable outcomes are <b style=\"color:#4d6bff;\">2, 4, 6<\/b> \u2014 three of the six:<\/p>\n      <div style=\"font-family:Georgia,serif;font-style:italic;font-size:36px;display:flex;align-items:center;gap:16px;background:#fff;padding:28px 34px;border-radius:18px;box-shadow:0 10px 24px rgba(27,29,77,.1);margin-top:22px;width:fit-content;\">\n        P(even) =\n        <span style=\"display:inline-flex;flex-direction:column;text-align:center;font-size:30px;\"><span style=\"border-bottom:3px solid #1b1d4d;padding:3px 12px;\">3<\/span><span style=\"padding:3px 12px;\">6<\/span><\/span>\n        = <span style=\"display:inline-flex;flex-direction:column;text-align:center;font-size:30px;\"><span style=\"border-bottom:3px solid #1b1d4d;padding:3px 12px;\">1<\/span><span style=\"padding:3px 12px;\">2<\/span><\/span>\n      <\/div>\n      <p style=\"font-size:25px;color:#6c6fa6;margin:24px 0 0;line-height:1.45;\">Fair = every face the same size and shape, so outcomes are <b>equally likely<\/b>. A weighted or imperfect object is <b style=\"color:#fb7185;\">biased<\/b>.<\/p>\n    <\/div>\n    <div style=\"display:flex;flex-direction:column;gap:24px;align-items:center;\">\n      <div style=\"display:flex;gap:18px;align-items:center;\"><div style=\"width:120px;height:120px;background:#fff;border-radius:18px;box-shadow:0 8px 20px rgba(27,29,77,.16);display:flex;align-items:center;justify-content:center;font-size:60px;font-weight:700;color:#34d399;\">\u2713<\/div><span style=\"font-size:30px;font-weight:600;color:#34d399;\">Fair<\/span><\/div>\n      <div style=\"display:flex;gap:18px;align-items:center;\"><div style=\"width:120px;height:120px;background:linear-gradient(135deg,#fb7185,#8b5cf6);border-radius:18px;transform:skewX(-8deg);box-shadow:0 8px 20px rgba(27,29,77,.16);display:flex;align-items:center;justify-content:center;font-size:54px;font-weight:700;color:#fff;\">!<\/div><span style=\"font-size:30px;font-weight:600;color:#fb7185;\">Biased<\/span><\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 21 WORKED: ROLLING A DICE -->\n<section data-label=\"Worked \u00b7 rolling a dice\" data-screen-label=\"21\" data-speaker-notes=\"Numbers 1 to 6 on identical cards, shuffled and one picked at random. Find P of a 5, an even number, and a prime number. Let students try, then reveal.\" style=\"background:#f4f5ff;color:#1b1d4d;width:100%;height:100%;box-sizing:border-box;padding:60px 90px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:2px;color:#8b5cf6;font-size:28px;\">WORKED EXAMPLE \u00b7 YOUR TURN<\/div>\n  <h2 style=\"font-size:54px;font-weight:700;margin:6px 0 0;\">Pick a card, 1 to 6<\/h2>\n  <div style=\"display:flex;gap:50px;margin-top:24px;flex:1;\">\n    <div style=\"width:560px;\">\n      <p style=\"font-size:28px;line-height:1.45;margin:0;\">Cards numbered <b>1\u20136<\/b> are shuffled and placed face down. One is picked at random. Find the probability of choosing:<\/p>\n      <ul style=\"font-size:30px;line-height:1.9;margin:20px 0 0;padding-left:30px;\"><li>a five<\/li><li>an even number<\/li><li>a prime number<\/li><\/ul>\n      <div style=\"margin-top:26px;\"><reveal-answer label=\"Show the answers\">\n        <div style=\"font-family:Georgia,serif;font-style:italic;font-size:32px;line-height:2;background:#fff;border-radius:16px;padding:24px 30px;box-shadow:0 10px 24px rgba(27,29,77,.1);\">\n          a&nbsp; P(5) = 1/6<br>\n          b&nbsp; P(even) = 3/6 = 1/2<br>\n          c&nbsp; P(prime) = 3/6 = 1/2 &nbsp;<span style=\"font-style:normal;font-family:'Space Grotesk';font-size:24px;color:#6c6fa6;\">(2, 3, 5)<\/span>\n        <\/div>\n      <\/reveal-answer><\/div>\n    <\/div>\n    <div style=\"flex:1;background:#fff;border-radius:22px;padding:30px 36px;box-shadow:0 12px 30px rgba(27,29,77,.12);display:flex;align-items:center;\">\n      <dice-roller><\/dice-roller>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 22 WORKED: DRAWING A CARD -->\n<section data-label=\"Worked \u00b7 drawing a card\" data-screen-label=\"22\" data-speaker-notes=\"A card is drawn from an ordinary pack of 52. What is the probability it is a king? There are 4 kings, so 4 over 52 = 1 over 13.\" style=\"background:#f4f5ff;color:#1b1d4d;width:100%;height:100%;box-sizing:border-box;padding:64px 90px;display:flex;flex-direction:column;justify-content:center;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:2px;color:#fb7185;font-size:28px;\">WORKED EXAMPLE<\/div>\n  <h2 style=\"font-size:58px;font-weight:700;margin:6px 0 34px;\">Drawing a King<\/h2>\n  <p style=\"font-size:34px;line-height:1.4;margin:0 0 30px;max-width:1200px;\">A card is drawn from an ordinary pack of <b>52<\/b>. What is the probability the card is a <b style=\"color:#fb7185;\">king<\/b>? There are 4 kings in the pack.<\/p>\n  <reveal-answer label=\"Reveal P(king)\">\n    <div style=\"font-family:Georgia,serif;font-style:italic;font-size:52px;display:flex;align-items:center;gap:18px;background:#fff;padding:34px 44px;border-radius:20px;box-shadow:0 12px 30px rgba(27,29,77,.12);width:fit-content;\">\n      P(king) =\n      <span style=\"display:inline-flex;flex-direction:column;text-align:center;font-size:42px;\"><span style=\"border-bottom:4px solid #1b1d4d;padding:5px 16px;\">4<\/span><span style=\"padding:5px 16px;\">52<\/span><\/span>\n      = <span style=\"display:inline-flex;flex-direction:column;text-align:center;font-size:42px;color:#8b5cf6;\"><span style=\"border-bottom:4px solid #8b5cf6;padding:5px 16px;\">1<\/span><span style=\"padding:5px 16px;\">13<\/span><\/span>\n    <\/div>\n  <\/reveal-answer>\n<\/section>\n\n<!-- 23 WORKED: COLOURED MARBLES -->\n<section data-label=\"Worked \u00b7 marbles\" data-screen-label=\"23\" data-speaker-notes=\"20 marbles in a bag: some red, some green. A marble is drawn at random. The probability green is 2 over 20 = 1 over 10.\" style=\"background:#f4f5ff;color:#1b1d4d;width:100%;height:100%;box-sizing:border-box;padding:64px 90px;display:flex;flex-direction:column;justify-content:center;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:2px;color:#34d399;font-size:28px;\">WORKED EXAMPLE<\/div>\n  <h2 style=\"font-size:58px;font-weight:700;margin:6px 0 30px;\">A bag of marbles<\/h2>\n  <div style=\"display:flex;gap:60px;align-items:center;\">\n    <div style=\"flex:1;\">\n      <p style=\"font-size:32px;line-height:1.45;margin:0 0 28px;\">A marble is drawn from a bag holding <b>20<\/b> marbles. <b style=\"color:#34d399;\">2<\/b> are green and the rest red. If one is drawn at random, what is the probability it is green?<\/p>\n      <reveal-answer label=\"Reveal P(green)\">\n        <div style=\"font-family:Georgia,serif;font-style:italic;font-size:48px;display:flex;align-items:center;gap:18px;background:#fff;padding:30px 40px;border-radius:20px;box-shadow:0 12px 30px rgba(27,29,77,.12);width:fit-content;\">\n          P(green) =\n          <span style=\"display:inline-flex;flex-direction:column;text-align:center;font-size:38px;\"><span style=\"border-bottom:4px solid #1b1d4d;padding:5px 16px;\">2<\/span><span style=\"padding:5px 16px;\">20<\/span><\/span>\n          = <span style=\"display:inline-flex;flex-direction:column;text-align:center;font-size:38px;color:#34d399;\"><span style=\"border-bottom:4px solid #34d399;padding:5px 16px;\">1<\/span><span style=\"padding:5px 16px;\">10<\/span><\/span>\n        <\/div>\n      <\/reveal-answer>\n    <\/div>\n    <div style=\"display:grid;grid-template-columns:repeat(5,58px);gap:14px;background:#fff;padding:28px;border-radius:22px;box-shadow:0 12px 30px rgba(27,29,77,.12);\">\n      <span style=\"width:58px;height:58px;border-radius:50%;background:#34d399;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#34d399;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#fb7185;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#fb7185;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#fb7185;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#fb7185;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#fb7185;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#fb7185;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#fb7185;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#fb7185;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#fb7185;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#fb7185;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#fb7185;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#fb7185;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#fb7185;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#fb7185;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#fb7185;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#fb7185;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#fb7185;\"><\/span><span style=\"width:58px;height:58px;border-radius:50%;background:#fb7185;\"><\/span>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 24 WORKED: HOLLYWOOD -->\n<section data-label=\"Worked \u00b7 HOLLYWOOD\" data-screen-label=\"24\" data-speaker-notes=\"Nine teams each given one letter from HOLLYWOOD. Find P of Y, O, H-or-L, and Z. HOLLYWOOD has 9 letters: H,O,L,L,Y,W,O,O,D.\" style=\"background:#f4f5ff;color:#1b1d4d;width:100%;height:100%;box-sizing:border-box;padding:58px 90px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:2px;color:#4d6bff;font-size:28px;\">WORKED EXAMPLE<\/div>\n  <h2 style=\"font-size:52px;font-weight:700;margin:4px 0 0;\">Spelling HOLLYWOOD<\/h2>\n  <div style=\"display:flex;gap:10px;margin:22px 0 0;\">\n    <span style=\"width:78px;height:78px;background:#4d6bff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;color:#fff;\">H<\/span><span style=\"width:78px;height:78px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;box-shadow:0 6px 14px rgba(27,29,77,.1);\">O<\/span><span style=\"width:78px;height:78px;background:#4d6bff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;color:#fff;\">L<\/span><span style=\"width:78px;height:78px;background:#4d6bff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;color:#fff;\">L<\/span><span style=\"width:78px;height:78px;background:#ffd23f;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;\">Y<\/span><span style=\"width:78px;height:78px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;box-shadow:0 6px 14px rgba(27,29,77,.1);\">W<\/span><span style=\"width:78px;height:78px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;box-shadow:0 6px 14px rgba(27,29,77,.1);\">O<\/span><span style=\"width:78px;height:78px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;box-shadow:0 6px 14px rgba(27,29,77,.1);\">O<\/span><span style=\"width:78px;height:78px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;box-shadow:0 6px 14px rgba(27,29,77,.1);\">D<\/span>\n  <\/div>\n  <p style=\"font-size:26px;margin:18px 0 0;color:#6c6fa6;\">9 teams, one letter each at random. Find P(Y), P(O), P(H or L), P(Z).<\/p>\n  <div style=\"margin-top:20px;\"><reveal-answer label=\"Show all four answers\">\n    <div style=\"font-family:Georgia,serif;font-style:italic;font-size:30px;line-height:1.9;display:flex;gap:60px;flex-wrap:wrap;background:#fff;border-radius:16px;padding:26px 34px;box-shadow:0 10px 24px rgba(27,29,77,.1);\">\n      <div>a&nbsp; P(Y) = 1/9<br>b&nbsp; P(O) = 3/9 = 1/3<\/div>\n      <div>c&nbsp; P(H or L) = 3/9 = 1/3<br>d&nbsp; P(Z) = 0/9 = 0<\/div>\n    <\/div>\n  <\/reveal-answer><\/div>\n<\/section>\n\n<!-- 25 EVENT DOES NOT HAPPEN -->\n<section data-label=\"When it does NOT happen\" data-screen-label=\"25\" data-speaker-notes=\"The probability an event happens and the probability it does not always add to 1. So P of not-A equals 1 minus P of A. We write not-A as A prime.\" style=\"background:#f4f5ff;color:#1b1d4d;width:100%;height:100%;box-sizing:border-box;padding:64px 90px;display:flex;flex-direction:column;justify-content:center;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:2px;color:#fb7185;font-size:28px;\">THE COMPLEMENT<\/div>\n  <h2 style=\"font-size:62px;font-weight:700;margin:6px 0 30px;\">When an event does NOT happen<\/h2>\n  <p style=\"font-size:32px;line-height:1.45;margin:0 0 34px;max-width:1250px;\">\"Happens\" and \"does not happen\" always add up to <b>1<\/b>. So if A is an event, the probability it does <i>not<\/i> happen \u2014 written <b style=\"color:#fb7185;\">A\u2032<\/b> (\"not A\") \u2014 is:<\/p>\n  <div style=\"display:flex;gap:40px;align-items:center;flex-wrap:wrap;\">\n    <div style=\"font-family:Georgia,serif;font-style:italic;font-size:56px;background:#fff;padding:34px 50px;border-radius:20px;box-shadow:0 12px 30px rgba(27,29,77,.12);\">P(A\u2032) = 1 \u2212 P(A)<\/div>\n    <div style=\"display:flex;height:80px;width:520px;border-radius:14px;overflow:hidden;box-shadow:0 10px 24px rgba(27,29,77,.12);font-weight:700;font-size:30px;color:#fff;\">\n      <div style=\"flex:1;background:#4d6bff;display:flex;align-items:center;justify-content:center;\">P(A)<\/div>\n      <div style=\"flex:2;background:#fb7185;display:flex;align-items:center;justify-content:center;\">P(A\u2032)<\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 26 WORKED: DRIVING TEST -->\n<section data-label=\"Worked \u00b7 driving test\" data-screen-label=\"26\" data-speaker-notes=\"The probability Jas passes a driving test is 2 over 3. The probability of failing is 1 minus 2 over 3 = 1 over 3.\" style=\"background:#f4f5ff;color:#1b1d4d;width:100%;height:100%;box-sizing:border-box;padding:64px 90px;display:flex;flex-direction:column;justify-content:center;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:2px;color:#8b5cf6;font-size:28px;\">WORKED EXAMPLE<\/div>\n  <h2 style=\"font-size:58px;font-weight:700;margin:6px 0 30px;\">Passing a driving test<\/h2>\n  <p style=\"font-size:34px;line-height:1.4;margin:0 0 34px;max-width:1200px;\">The probability that Jas <b style=\"color:#34d399;\">passes<\/b> a driving test is <b>2/3<\/b>. What is the probability that Jas <b style=\"color:#fb7185;\">fails<\/b>?<\/p>\n  <reveal-answer label=\"Reveal P(fails)\">\n    <div style=\"font-family:Georgia,serif;font-style:italic;font-size:42px;background:#fff;padding:30px 44px;border-radius:20px;box-shadow:0 12px 30px rgba(27,29,77,.12);width:fit-content;line-height:1.7;\">\n      P(fails) = 1 \u2212 P(passing)<br>\n      P(fails) = 1 \u2212 <span style=\"display:inline-flex;flex-direction:column;text-align:center;font-size:34px;vertical-align:middle;\"><span style=\"border-bottom:3px solid #1b1d4d;padding:2px 12px;\">2<\/span><span style=\"padding:2px 12px;\">3<\/span><\/span>\n      = <span style=\"display:inline-flex;flex-direction:column;text-align:center;font-size:34px;vertical-align:middle;color:#fb7185;\"><span style=\"border-bottom:3px solid #fb7185;padding:2px 12px;\">1<\/span><span style=\"padding:2px 12px;\">3<\/span><\/span>\n    <\/div>\n  <\/reveal-answer>\n<\/section>\n\n<!-- 27 SECTION 8.2 -->\n<section data-label=\"8.2 Sample space diagrams\" data-screen-label=\"27\" data-speaker-notes=\"Section 8.2. The sample space is the set of all possible outcomes. A sample space diagram shows them all clearly so you can work out probabilities of combined events.\" style=\"background:radial-gradient(120% 120% at 12% 0%,#2a2d72,#16183f 60%);color:#fff;width:100%;height:100%;box-sizing:border-box;padding:88px 110px;display:flex;flex-direction:column;justify-content:center;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-size:200px;font-weight:700;line-height:.9;color:#8b5cf6;\">8.2<\/div>\n  <h2 style=\"font-size:84px;font-weight:700;margin:6px 0 0;\">Sample space diagrams<\/h2>\n  <p style=\"font-size:34px;line-height:1.5;color:#c7caff;margin:30px 0 0;max-width:1300px;\">A <b style=\"color:#22d3ee;\">sample space diagram<\/b> shows every possible outcome in a grid, so you can count favourable outcomes and find the probability of <b style=\"color:#ffd23f;\">combined events<\/b>.<\/p>\n<\/section>\n\n<!-- 28 TWO DICE GRID -->\n<section data-label=\"Two dice \u00b7 sample space\" data-screen-label=\"28\" data-speaker-notes=\"One red dice and one blue dice are thrown and the numbers added. Use the grid to find P of: sum is 7, sum less than 5, sum 8 or more, sum less than 8. Click the buttons to highlight.\" style=\"background:#f4f5ff;color:#1b1d4d;width:100%;height:100%;box-sizing:border-box;padding:54px 80px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:2px;color:#fb7185;font-size:26px;\">SAMPLE SPACE \u00b7 TWO DICE<\/div>\n  <h2 style=\"font-size:48px;font-weight:700;margin:4px 0 0;\">Red + Blue dice \u2014 find the totals<\/h2>\n  <p style=\"font-size:25px;margin:12px 0 18px;color:#6c6fa6;\">Two dice are thrown and the numbers added. Tap a question to highlight the favourable outcomes \u2014 there are 36 in all.<\/p>\n  <div style=\"background:#fff;border-radius:22px;padding:30px 34px;box-shadow:0 12px 30px rgba(27,29,77,.12);\">\n    <dice-grid><\/dice-grid>\n  <\/div>\n<\/section>\n\n<!-- 29 TWO DICE ANSWERS -->\n<section data-label=\"Two dice \u00b7 answers\" data-screen-label=\"29\" data-speaker-notes=\"The worked answers: P sum 7 is 6 over 36 = 1 over 6. Less than 5 is 6 over 36 = 1 over 6. 8 or more is 15 over 36 = 5 over 12. Less than 8 is 1 minus 5 over 12 = 7 over 12.\" style=\"background:#f4f5ff;color:#1b1d4d;width:100%;height:100%;box-sizing:border-box;padding:62px 90px;display:flex;flex-direction:column;justify-content:center;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:2px;color:#8b5cf6;font-size:28px;\">TWO DICE \u00b7 WORKING IT OUT<\/div>\n  <h2 style=\"font-size:54px;font-weight:700;margin:6px 0 30px;\">The four answers<\/h2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;font-family:Georgia,serif;font-style:italic;font-size:34px;\">\n    <div style=\"background:#fff;border-radius:16px;padding:26px 32px;box-shadow:0 10px 24px rgba(27,29,77,.1);\">a&nbsp; P(7) = 6/36 = <b style=\"color:#8b5cf6;\">1/6<\/b><\/div>\n    <div style=\"background:#fff;border-radius:16px;padding:26px 32px;box-shadow:0 10px 24px rgba(27,29,77,.1);\">b&nbsp; P(&lt; 5) = 6/36 = <b style=\"color:#8b5cf6;\">1/6<\/b><\/div>\n    <div style=\"background:#fff;border-radius:16px;padding:26px 32px;box-shadow:0 10px 24px rgba(27,29,77,.1);\">c&nbsp; P(\u2265 8) = 15/36 = <b style=\"color:#8b5cf6;\">5/12<\/b><\/div>\n    <div style=\"background:#fff;border-radius:16px;padding:26px 32px;box-shadow:0 10px 24px rgba(27,29,77,.1);\">d&nbsp; P(&lt; 8) = 1 \u2212 5/12 = <b style=\"color:#8b5cf6;\">7/12<\/b><\/div>\n  <\/div>\n<\/section>\n\n<!-- 30 SECTION 8.3 -->\n<section data-label=\"8.3 Combining events\" data-screen-label=\"30\" data-speaker-notes=\"Section 8.3. Sometimes you need the probability of two events happening one after the other, or of either of two events happening. Here are the rules for combined events.\" style=\"background:radial-gradient(120% 120% at 12% 0%,#2a2d72,#16183f 60%);color:#fff;width:100%;height:100%;box-sizing:border-box;padding:80px 110px;display:flex;flex-direction:column;justify-content:center;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-size:170px;font-weight:700;line-height:.9;color:#22d3ee;\">8.3<\/div>\n  <h2 style=\"font-size:70px;font-weight:700;margin:6px 0 0;line-height:1.05;\">Combining independent &amp;<br>mutually exclusive events<\/h2>\n  <p style=\"font-size:34px;line-height:1.5;color:#c7caff;margin:28px 0 0;max-width:1300px;\">Rules for the probability of <b style=\"color:#34d399;\">combined events<\/b> \u2014 two things happening one after the other, or either of two things happening.<\/p>\n<\/section>\n\n<!-- 31 INDEPENDENT EVENTS -->\n<section data-label=\"Independent events\" data-screen-label=\"31\" data-speaker-notes=\"For independent events, the result of one has no influence on the other. To find both happening, multiply: P of A and B = P of A times P of B. Two heads = one half times one half = one quarter.\" style=\"background:#f4f5ff;color:#1b1d4d;width:100%;height:100%;box-sizing:border-box;padding:60px 90px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:2px;color:#34d399;font-size:28px;\">INDEPENDENT EVENTS \u2014 THE \u00d7 RULE<\/div>\n  <h2 style=\"font-size:54px;font-weight:700;margin:6px 0 0;\">When one can't affect the other<\/h2>\n  <p style=\"font-size:28px;line-height:1.45;margin:16px 0 0;max-width:1300px;\">Flip a coin twice \u2014 the first result has no influence on the second. For independent events A and B, <b>multiply<\/b>:<\/p>\n  <div style=\"display:flex;gap:50px;align-items:center;margin-top:24px;flex:1;\">\n    <div style=\"font-family:Georgia,serif;font-style:italic;font-size:40px;background:#fff;padding:30px 40px;border-radius:20px;box-shadow:0 12px 30px rgba(27,29,77,.12);line-height:1.9;\">\n      P(A and B) = P(A) \u00d7 P(B)<br>\n      <span style=\"font-size:32px;color:#34d399;\">P(two heads) = \u00bd \u00d7 \u00bd = \u00bc<\/span>\n    <\/div>\n    <div style=\"flex:1;background:#fff;border-radius:22px;padding:30px 36px;box-shadow:0 12px 30px rgba(27,29,77,.12);\">\n      <coin-flip><\/coin-flip>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 32 MUTUALLY EXCLUSIVE -->\n<section data-label=\"Mutually exclusive events\" data-screen-label=\"32\" data-speaker-notes=\"If two events cannot happen together they are mutually exclusive. To find either one happening, add: P of A or B = P of A + P of B. Even or odd = one half plus one half = 1.\" style=\"background:#f4f5ff;color:#1b1d4d;width:100%;height:100%;box-sizing:border-box;padding:60px 90px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:2px;color:#ffd23f;font-size:28px;\">MUTUALLY EXCLUSIVE \u2014 THE + RULE<\/div>\n  <h2 style=\"font-size:54px;font-weight:700;margin:6px 0 0;\">When both can't happen at once<\/h2>\n  <p style=\"font-size:28px;line-height:1.45;margin:16px 0 0;max-width:1300px;\">On one dice roll, \"even\" and \"odd\" can't both happen. For mutually exclusive events, <b>add<\/b>:<\/p>\n  <div style=\"display:flex;gap:50px;align-items:center;margin-top:24px;flex:1;\">\n    <div style=\"font-family:Georgia,serif;font-style:italic;font-size:40px;background:#fff;padding:30px 40px;border-radius:20px;box-shadow:0 12px 30px rgba(27,29,77,.12);line-height:1.9;\">\n      P(A or B) = P(A) + P(B)<br>\n      <span style=\"font-size:30px;color:#8b5cf6;\">P(even or odd) = \u00bd + \u00bd = 1<\/span>\n    <\/div>\n    <div style=\"position:relative;width:380px;height:200px;\">\n      <div style=\"position:absolute;left:0;top:10px;width:190px;height:190px;border-radius:50%;background:rgba(34,211,238,.75);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#16183f;\">EVEN<\/div>\n      <div style=\"position:absolute;right:0;top:10px;width:190px;height:190px;border-radius:50%;background:rgba(139,92,246,.85);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff;\">ODD<\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 33 WORKED: MUSIC EXAM -->\n<section data-label=\"Worked \u00b7 music exam\" data-screen-label=\"33\" data-speaker-notes=\"Noa and Sunja take a music exam independently. P Noa passes = 3 over 4, P Sunja passes = 5 over 6. Find both pass, neither passes, at least one passes, exactly one passes. Independent, so multiply.\" style=\"background:#f4f5ff;color:#1b1d4d;width:100%;height:100%;box-sizing:border-box;padding:54px 80px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:2px;color:#4d6bff;font-size:26px;\">WORKED EXAMPLE \u00b7 INDEPENDENT<\/div>\n  <h2 style=\"font-size:48px;font-weight:700;margin:4px 0 0;\">The music exam<\/h2>\n  <p style=\"font-size:27px;line-height:1.4;margin:14px 0 0;max-width:1350px;\">Noa and Sunja sit a music exam independently. P(Noa passes) = <b>3/4<\/b>, P(Sunja passes) = <b>5/6<\/b>. Find P(both pass), P(neither), P(at least one), P(exactly one).<\/p>\n  <div style=\"display:flex;gap:30px;margin-top:20px;align-items:flex-start;flex:1;\">\n    <reveal-answer label=\"Show worked solution\">\n      <img src=\"46398af4-0d04-4933-9e53-e5119358f12a\" alt=\"music exam worked solution\" style=\"max-width:1180px;width:100%;background:#fff;border-radius:16px;padding:24px;box-shadow:0 12px 30px rgba(27,29,77,.12);box-sizing:border-box;\">\n    <\/reveal-answer>\n  <\/div>\n<\/section>\n\n<!-- 34 WORKED: BASKETBALL -->\n<section data-label=\"Worked \u00b7 basketball\" data-screen-label=\"34\" data-speaker-notes=\"Simone and Rami play basketball. P Simone scores = 0.1, P Rami scores = 0.2, independent. Find both score, Simone scores but Rami misses, exactly one scores.\" style=\"background:#f4f5ff;color:#1b1d4d;width:100%;height:100%;box-sizing:border-box;padding:54px 80px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"font-weight:700;letter-spacing:2px;color:#fb7185;font-size:26px;\">WORKED EXAMPLE \u00b7 INDEPENDENT<\/div>\n  <h2 style=\"font-size:48px;font-weight:700;margin:4px 0 0;\">Basketball shots<\/h2>\n  <div style=\"display:flex;gap:40px;margin-top:18px;flex:1;\">\n    <div style=\"width:560px;\">\n      <img src=\"f63cdc64-2bed-4cd1-9f3e-11c05878b9cb\" alt=\"basketball players\" style=\"width:100%;border-radius:16px;box-shadow:0 12px 30px rgba(27,29,77,.14);\">\n      <p style=\"font-size:25px;line-height:1.4;margin:18px 0 0;\">P(Simone scores) = <b>0.1<\/b>, P(Rami scores) = <b>0.2<\/b>, independent. Find P(both score), P(Simone scores but Rami misses), P(exactly one scores).<\/p>\n    <\/div>\n    <div style=\"flex:1;\"><reveal-answer label=\"Show worked solution\">\n      <img src=\"10b31686-add3-4112-9cc4-abdf7ff1bbca\" alt=\"basketball worked solution\" style=\"width:100%;background:#fff;border-radius:16px;padding:24px;box-shadow:0 12px 30px rgba(27,29,77,.12);box-sizing:border-box;\">\n    <\/reveal-answer><\/div>\n  <\/div>\n<\/section>\n\n<!-- 35 QUICK QUIZ -->\n<section data-label=\"Quick quiz\" data-screen-label=\"35\" data-speaker-notes=\"Quick quiz to finish! Click an answer \u2014 green means correct. Great for a whole-class vote.\" style=\"background:radial-gradient(120% 120% at 80% 0%,#2a2d72,#16183f 60%);color:#fff;width:100%;height:100%;box-sizing:border-box;padding:64px 110px;display:flex;flex-direction:column;font-family:'Space Grotesk',sans-serif;\">\n  <div style=\"display:inline-flex;align-self:flex-start;background:#ffd23f;color:#16183f;font-weight:700;font-size:28px;letter-spacing:2px;padding:12px 28px;border-radius:40px;\">QUICK QUIZ \u00b7 TEST YOURSELF<\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:40px;flex:1;align-content:center;\">\n    <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:22px;padding:36px 40px;\">\n      <quiz-poll question=\"A fair dice is rolled. What is P(an even number)?\" options=\"1/6|1/3|1/2|2/3\" answer=\"2\"><\/quiz-poll>\n    <\/div>\n    <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:22px;padding:36px 40px;\">\n      <quiz-poll question=\"P(rain) = 0.3. What is P(no rain)?\" options=\"0.3|0.7|0.5|1.3\" answer=\"1\"><\/quiz-poll>\n    <\/div>\n    <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:22px;padding:36px 40px;\">\n      <quiz-poll question=\"Two fair coins are flipped. What is P(two heads)?\" options=\"1/2|1/3|1/4|1\" answer=\"2\"><\/quiz-poll>\n    <\/div>\n    <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:22px;padding:36px 40px;\">\n      <quiz-poll question=\"Which probability is impossible?\" options=\"0|0.5|1|0.99\" answer=\"0\"><\/quiz-poll>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- 36 THANK YOU -->\n<section data-label=\"Thank you\" data-screen-label=\"36\" data-speaker-notes=\"That's Chapter 8! You can now express, calculate and combine probabilities. Thanks for playing!\" style=\"background:radial-gradient(120% 120% at 50% 0%,#2a2d72,#16183f 62%);color:#fff;width:100%;height:100%;box-sizing:border-box;padding:80px 110px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:'Space Grotesk',sans-serif;\">\n  <img src=\"fef5b42f-1a99-42c5-a94f-476bb567f28e\" alt=\"thank you cat\" style=\"width:300px;filter:invert(1) drop-shadow(0 8px 20px rgba(0,0,0,.4));\">\n  <h2 style=\"font-size:96px;font-weight:700;margin:20px 0 0;\">Thank you!<\/h2>\n  <p style=\"font-size:36px;color:#c7caff;margin:18px 0 0;max-width:1000px;\">You can now express, calculate and combine probabilities \u2014 from a single coin flip to two dice. Keep rolling!<\/p>\n<\/section>\n\n\n<\/x-import>\n<\/x-dc>\n\n\n\n<script>\n(function () {\n  if (window.__sbsSlideGuard) return; window.__sbsSlideGuard = true;\n  var DECK_SAFE = 'a[href],button,input,select,textarea,summary,label,'\n                + 'video[controls],audio[controls],[role=\"button\"],[onclick],'\n                + '[tabindex]:not([tabindex^=\"-\"]),[contenteditable]:not([contenteditable=\"false\" i])';\n  var WIDGET = '[data-quiz],[data-quiz-opt],[data-flip],[data-flip-inner],[data-reveal],'\n             + '[data-step],[data-step-btn],[data-step-reset],[data-mark],[data-drop],'\n             + '[data-term],[data-anim4],[data-toggle],[data-card],[data-match],'\n             + '[style*=\"cursor:pointer\"],[style*=\"cursor: pointer\"],'\n             + '[style*=\"cursor:grab\"],[style*=\"cursor: grab\"]';\n  function m(n, sel){ return n && n.matches && n.matches(sel); }\n  document.addEventListener('click', function (e) {\n    var path = (e.composedPath && e.composedPath()) || [e.target];\n    for (var i = 0; i < path.length; i++) {\n      var n = path[i];\n      if (!n || n === document || n === window) break;\n      if (m(n, DECK_SAFE)) return;\n      if (m(n, WIDGET)) { e.preventDefault(); return; }\n    }\n  }, true);\n})();\n<\/script>\n\n<style>\n#penCanvas{position:fixed;inset:0;z-index:2147483640;pointer
