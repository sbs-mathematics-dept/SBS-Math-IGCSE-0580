  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));

    return btoa(bin);

    // events at the element — warn only; real JS errors carry message/error.

        e.target.tagName, String(e.target.src || e.target.href || ''));

    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';

    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;

    let template = JSON.parse(templateEl.textContent);

    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};

      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);

            (entry.compressed ? toBase64(finalBytes) : entry.data);

          const blob = new Blob([finalBytes], { type: entry.mime });

        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });

        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

02Fspan><span style=\"width:80px;text-align:center\">11<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Worked: nth term\" data-screen-label=\"Worked nth term\" data-speaker-notes=\"Reveal the worked solution after students attempt it. Answer is 5n + 2.\" style=\"background:#FFF9F0;color:#2c2440;font-family:Nunito,sans-serif;display:flex;flex-direction:column;justify-content:center;padding:70px 130px;box-sizing:border-box\">\n  <div style=\"display:inline-block;background:#FF6B6B;color:#fff;font-family:Fredoka;font-weight:600;font-size:29px;padding:8px 22px;border-radius:999px;align-self:flex-start;margin-bottom:22px\">Worked example<\u002Fdiv>\n  <h2 class=\"ch9-anim\" style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:56px;margin:0 0 10px\">Find the nth term of 7, 12, 17, 22…<\u002Fh2>\n  <div data-example=\"\" style=\"margin-top:18px\">\n    <button data-reveal=\"\" style=\"font-family:Fredoka;font-weight:600;font-size:36px;background:#2c2440;color:#fff;border:none;border-radius:14px;padding:18px 34px;cursor:pointer\" style-hover=\"background:#46395f\">👁️ Show solution<\u002Fbutton>\n    <div data-solution=\"\" style=\"display:none;margin-top:26px;background:#fff;border-radius:20px;padding:34px 40px;box-shadow:0 8px 24px rgba(44,36,64,.1);font-size:34px;line-height:1.8\">\n      Common difference d = 12 − 7 = <b>5<\u002Fb><br>\n      Try 5n → 5, 10, 15, 20 — each is <b>2 too small<\u002Fb><br>\n      Add 2: <span style=\"color:#E04F4F;font-weight:700;font-size:44px\">nth term = 5n + 2<\u002Fspan><br>\n      <span style=\"font-size:34px;color:#6b6480\">Check: n = 1 → 5(1)+2 = 7 ✓ &nbsp; n = 4 → 5(4)+2 = 22 ✓<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Special sequences\" data-screen-label=\"Special sequences\" data-speaker-notes=\"Square, triangular, cube and Fibonacci sequences — recognise them on sight.\" style=\"background:#FFF9F0;color:#2c2440;font-family:N r<\u002Fdiv>\n      <div style=\"font-size:31px;color:#E04F4F;font-weight:700;margin-bottom:14px\">n(n+1)/2<\u002Fdiv>\n      <div style=\"font-size:34px\">1, 3, 6, 10, 15…<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:5px;margin-top:18px\"><div style=\"display:flex;gap:5px\"><span style=\"width:16px;height:16px;background:#FFB3B3;border-radius:50%\"><\u002Fspan><\u002Fdiv><div style=\"display:flex;gap:5px\"><span style=\"width:16px;height:16px;background:#FFB3B3;border-radius:50%\"><\u002Fspan><span style=\"width:16px;height:16px;background:#FFB3B3;border-radius:50%\"><\u002Fspan><\u002Fdiv><div style=\"display:flex;gap:5px\"><span style=\"width:16px;height:16px;background:#FFB3B3;border-radius:50%\"><\u002Fspan><span style=\"width:16px;height:16px;background:#FFB3B3;border-radius:50%\"><\u002Fspan><span style=\"width:16px;height:16px;background:#FFB3B3;border-radius:50%\"><\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:20px;padding:26px;box-shadow:0 6px 18px rgba(44,36,64,.08);text-align:center\">\n      <div style=\"font-family:Fredoka;font-weight:600;font-size:36px;margin-bottom:6px\">Cube<\u002Fdiv>\n      <div style=\"font-size:31px;color:#E04F4F;font-weight:700;margin-bottom:14px\">nth term = n³<\u002Fdiv>\n      <div style=\"font-size:34px\">1, 8, 27, 64…<\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;margin-top:18px;font-size:46px\">🧊<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:20px;padding:26px;box-shadow:0 6px 18px rgba(44,36,64,.08);text-align:center\">\n      <div style=\"font-family:Fredoka;font-weight:600;font-size:36px;margin-bottom:6px\">Fibonacci<\u002Fdiv>\n      <div style=\"font-size:31px;color:#E04F4F;font-weight:700;margin-bottom:14px\">add last two<\u002Fdiv>\n      <div style=\"font-size:34px\">1, 1, 2, 3, 5, 8…<\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;margin-top:18px;font-size:46px\">🌀<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Quadratic sequences\" data-screen-label=\"Quadratic sequences\" data-speaker-notes=\"The key Extended skill: when the SECOND differences are constant the sequence is quadratic, nth term = an² + bn + c with 2a = second difference.\" style=\"background:#FFF9F0;color:#2c2440;font-family:Nunito,sans-serif;display:flex;flex-direction:column;justify-content:center;padding:56px 100px;box-sizing:border-box\">\n  <div style=\"display:inline-block;background:#E04F4F;color:#fff;font-family:Fredoka;font-weight:600;font-size:28px;padding:7px 20px;border-radius:999px;align-self:flex-start;margin-bottom:16px\">Extended · harder<\u002Fdiv>\n  <h2 class=\"ch9-anim\" style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:58px;margin:0 0 8px;color:#E04F4F\">Quadratic sequences<\u002Fh2>\n  <p class=\"ch9-anim\" style=\"font-size:36px;margin:0 0 26px;max-width:1300px\">When the <b>first<\u002Fb> differences keep changing but the <b>second<\u002Fb> differences are equal, the rule is <b>an² + bn + c<\u002Fb>, with <b>2a = second difference<\u002Fb>.<\u002Fp>\n  <div class=\"ch9-anim2\" style=\"display:flex;gap:46px;align-items:center;flex-wrap:wrap\">\n    <div style=\"background:#fff;border-radius:20px;padding:30px 34px;box-shadow:0 8px 24px rgba(44,36,64,.1)\">\n      <div style=\"display:flex;gap:30px;font-size:34px;font-weight:700;color:#2c2440\"><span style=\"width:44px;text-align:center\">3<\u002Fspan><span style=\"width:44px;text-align:center\">8<\u002Fspan><span style=\"width:44px;text-align:center\">15<\u002Fspan><span style=\"width:44px;text-align:center\">24<\u002Fspan><span style=\"width:44px;text-align:center\">35<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:30px;margin:12px 0;font-size:31px;font-weight:700;color:#E04F4F;padding-left:34px\"><span style=\"width:44px;text-align:center\">5<\u002Fspan><span style=\"width:44px;text-align:center\">7<\u002Fspan><span style=\"width:44px;text-align:center\">9<\u002Fspan><span style=\"width:44px;text-align:center\">11<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:30px;font-size:31px;font-weight:700;color:#0E9488;padding-left:68px\"><span style=\"width:44px;text-align:center\">2<\u002Fspan><span style=\"width:44px;text-align:center\">2<\u002Fspan><span style=\"width:44px;text-align:center\">2<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:18px;margin-top:14px;font-size:26px;color:#9a93ab\"><span style=\"color:#E04F4F;font-weight:700\">↑ first differences<\u002Fspan> &nbsp; <span style=\"color:#0E9488;font-weight:700\">↑ second differences (constant = 2)<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;min-width:380px;font-size:35px;line-height:1.7\">\n      Second difference = 2, so <b>2a = 2 → a = 1<\u002Fb>.<br>\n      Subtract <b>n²<\u002Fb> (1, 4, 9, 16, 25) from the sequence:<br>\n      <span style=\"color:#E04F4F;font-weight:700\">3−1, 8−4, 15−9, 24−16 = 2, 4, 6, 8 = 2n<\u002Fspan><br>\n      So nth term = <span style=\"color:#E04F4F;font-weight:700;font-size:36px\">n² + 2n<\u002Fspan> &nbsp;<span style=\"font-size:29px;color:#6b6480\">(check n=3: 9+6 = 15 ✓)<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Challenge zone\" data-screen-label=\"Challenge zone\" data-speaker-notes=\"Four harder sequences. Let students attempt each, then reveal. Mix of quadratic, geometric, powers-based and fraction sequences.\" style=\"background:#FFF1EE;color:#2c2440;font-family:Nunito,sans-serif;display:flex;flex-direction:column;justify-content:center;padding:48px 90px;box-sizing:border-box\">\n  <h2 class=\"ch9-anim\" style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:52px;margin:0 0 6px;color:#E04F4F\">🔥 Challenge zone — try before you reveal<\u002Fh2>\n  <p style=\"font-size:30px;margin:0 0 24px;color:#6b6480\">Work each one out on paper first, then tap to check.<\u002Fp>\n  <div class=\ erif;font-weight:700;font-size:84px;margin:6px 0 0\">Rational, irrational<br>&amp; recurring decimals<\u002Fh2>\n  <p class=\"ch9-anim3\" style=\"font-size:38px;margin:20px 0 0;max-width:1000px\">Which numbers are fractions in disguise — and which go on forever with no pattern?<\u002Fp>\n<\u002Fsection>\n\n<section data-label=\"Rational vs irrational\" data-screen-label=\"Rational vs irrational\" data-speaker-notes=\"Rational = can be written as a fraction p/q. Irrational = cannot. π and most roots are irrational.\" style=\"background:#FFF9F0;color:#2c2440;font-family:Nunito,sans-serif;display:flex;flex-direction:column;justify-content:center;padding:64px 100px;box-sizing:border-box\">\n  <h2 class=\"ch9-anim\" style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:60px;margin:0 0 30px;color:#0E9488\">Rational vs irrational<\u002Fh2>\n  <div class=\"ch9-anim2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px\">\n    <div style=\"background:#fff;border-radius:22px;padding:34px 38px;box-shadow:0 8px 24px rgba(44,36,64,.1);border-top:8px solid #14B8A6\">\n      <div style=\"font-family:Fredoka;font-weight:600;font-size:38px;color:#0E9488;margin-bottom:12px\">Rational ✅<\u002Fdiv>\n      <p style=\"font-size:36px;margin:0 0 16px\">Can be written as a fraction <b>p/q<\u002Fb> (whole numbers, q ≠ 0).<\u002Fp>\n      <p style=\"font-size:36px;margin:0\">Decimals that <b>terminate<\u002Fb> or <b>recur<\u002Fb>.<\u002Fp>\n      <div style=\"font-size:36px;margin-top:18px;color:#0E9488;font-weight:700\">7,&nbsp; −3,&nbsp; ½,&nbsp; 0.25,&nbsp; 0.333…,&nbsp; √9<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:34px 38px;box-shadow:0 8px 24px rgba(44,36,64,.1);border-top:8px solid #F59E0B\">\n      <div style=\"font-family:Fredoka;font-weight:600;font-size:38px;color:#C2770A;margin-bottom:12px\">Irrational ❌<\u002Fdiv>\n      <p style=\"font-size:36px;margin:0 0 16px\"><b>Cannot<\u002Fb> be written as a fraction.<\u002Fp>\n      <p style=\"font-size:36px;margin:0\">Decimals go on forever with <b>no repeating pattern<\u002Fb>.<\u002Fp>\n      <div style=\"font-size:36px;margin-top:18px;color:#C2770A;font-weight:700\">π,&nbsp; √2,&nbsp; √5,&nbsp; √7<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p class=\"ch9-anim3\" style=\"font-size:34px;margin:28px 0 0;color:#6b6480\">💡 A surd like √9 is <b>rational<\u002Fb> because it simplifies to 3 — but √2 stays irrational.<\u002Fp>\n<\u002Fsection>\n\n<section data-label=\"Terminating vs recurring\" data-screen-label=\"Terminating vs recurring\" data-speaker-notes=\"Terminating decimals stop. Recurring decimals repeat forever, shown with a dot over the repeating digit(s).\" style=\"background:#FFF9F0;color:#2c2440;font-family:Nunito,sans-serif;display:flex;flex-direction:column;justify-content:center;padding:64px 110px;box-sizing:border-box\">\n  <h2 class=\"ch9-anim\" style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:60px;margin:0 0 30px;color:#0E9488\">Terminating vs recurring decimals<\u002Fh2>\n  <div class=\"ch9-anim2\" style=\"display:flex;gap:34px;flex-wrap:wrap\">\n    <div style=\"flex:1;min-width:480px;background:#E6FAF7;border-radius:22px;padding:34px 38px\">\n      <div style=\"font-family:Fredoka;font-weight:600;font-size:34px;margin-bottom:14px\">Terminating — it stops<\u002Fdiv>\n      <div style=\"font-size:34px;line-height:1.8\">¼ = <b>0.25<\u002Fb><br>⅜ = <b>0.375<\u002Fb><br>7/8 = <b>0.875<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;min-width:480px;background:#FFF4E0;border-radius:22px;padding:34px 38px\">\n      <div style=\"font-family:Fredoka;font-weight:600;font-size:34px;margin-bottom:14px\">Recurring — it repeats<\u002Fdiv>\n      <div style=\"font-size:34px;line-height:1.8\">⅓ = 0.333… = <b>0.<span style=\"display:inline-block;position:relative\">3<span style=\"position:absolute;top:-.3em;left:0;right:0;margin:auto;width:.15em;height:.15em;border-radius:50%;background:currentColor\"  <div data-example=\"\">\n    <button data-reveal=\"\" style=\"font-family:Fredoka;font-weight:600;font-size:36px;background:#2c2440;color:#fff;border:none;border-radius:14px;padding:16px 32px;cursor:pointer\">👁️ Show solution<\u002Fbutton>\n    <div data-solution=\"\" style=\"display:none;margin-top:24px;display:none\">\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:30px\">\n        <div style=\"background:#fff;border-radius:20px;padding:30px 36px;box-shadow:0 8px 24px rgba(44,36,64,.1);font-size:37px;line-height:1.9\">\n          <b>One repeating digit → ×10<\u002Fb><br>\n          Let x = 0.444…<br>\n          10x = 4.444…<br>\n          10x − x = 4.444… − 0.444…<br>\n          9x = 4 &nbsp;→&nbsp; <span style=\"color:#0E9488;font-weight:700;font-size:38px\">x = 4/9<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border-radius:20px;padding:30px 36px;box-shadow:0 8px 24px rgba(44,36,64,.1);font-size:37px;line-height:1.9\">\n          <b>Two repeating digits → ×100<\u002Fb><br>\n          x = 0.2727…&nbsp; (0.<span style=\"display:inline-block;position:relative\">2<span style=\"position:absolute;top:-.3em;left:0;right:0;margin:auto;width:.15em;height:.15em;border-radius:50%;background:currentColor\"><\u002Fspan><\u002Fspan><span style=\"display:inline-block;position:relative\">7<span style=\"position:absolute;top:-.3em;left:0;right:0;margin:auto;width:.15em;height:.15em;border-radius:50%;background:currentColor\"><\u002Fspan><\u002Fspan>)<br>\n          100x = 27.2727…<br>\n          99x = 27<br>\n          x = 27/99 = <span style=\"color:#0E9488;font-weight:700;font-size:38px\">3/11<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Quiz: sort numbers\" data-screen-label=\"Quiz sort rational\" data-speaker-notes=\"Click a number then click a bucket. Each correct placement earns a star.\" style=\"background:#E9FBF8;color:#2c2440;font-family:Nunito,s iv data-solution=\"\" style=\"display:none;margin-top:16px;font-size:30px;line-height:1.8\">x = 0.3636…&nbsp; (two repeating digits → ×100)<br>100x = 36.3636…&nbsp; → &nbsp;100x − x = 36&nbsp; → &nbsp;99x = 36<br>x = 36/99 = <b>4/11<\u002Fb> &nbsp;(divide top and bottom by 9) ✓<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Surds\" data-screen-label=\"Section Surds\" data-speaker-notes=\"Section 3 of 4. Surds: simplifying roots and rationalising denominators.\" style=\"background:linear-gradient(135deg,#FFC15E 0%,#F59E0B 60%,#D98008 100%);color:#fff;font-family:Nunito,sans-serif;display:flex;flex-direction:column;justify-content:center;padding:0 130px;box-sizing:border-box;position:relative;overflow:hidden\">\n  <div style=\"position:absolute;top:90px;right:140px;font-size:150px;opacity:.4;font-family:Fredoka;animation:ch9float 5s ease-in-out infinite\">√<\u002Fdiv>\n  <div style=\"position:absolute;bottom:80px;right:230px;font-size:90px;opacity:.28;font-family:Fredoka;animation:ch9drift 7s ease-in-out infinite\">√2<\u002Fdiv>\n  <div class=\"ch9-anim\" style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:150px;line-height:1;opacity:.45\">03<\u002Fdiv>\n  <h2 class=\"ch9-anim2\" style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:96px;margin:6px 0 0\">Surds<\u002Fh2>\n  <p class=\"ch9-anim3\" style=\"font-size:38px;margin:20px 0 0;max-width:1000px\">Roots left in <b>exact form<\u002Fb>. Simplify them, multiply them, and clear them from the bottom of a fraction.<\u002Fp>\n<\u002Fsection>\n\n<section data-label=\"What is a surd\" data-screen-label=\"What is a surd\" data-speaker-notes=\"A surd is an irrational root. The key rules: root of a product splits into a product of roots.\" style=\"background:#FFF9F0;color:#2c2440;font-family:Nunito,sans-serif;display:flex;flex-direction:column;justify-content:center;padding:64px 110px;box-sizing:border-box\">\n  <h2 class=\"ch9-anim\" style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:60px;margin:0 0 24px;color:#C2770A\">What is a surd?<\u002Fh2>\n  <p class=\"ch9-anim\" style=\"font-size:38px;margin:0 0 32px;max-width:1300px\">A <b>surd<\u002Fb> is a root that can’t be written as a whole number — so we leave it exact, like <b>√2<\u002Fb> instead of 1.414…<\u002Fp>\n  <div class=\"ch9-anim2\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:26px\">\n    <div style=\"background:#fff;border-radius:20px;padding:30px;box-shadow:0 6px 18px rgba(44,36,64,.08);text-align:center\">\n      <div style=\"font-size:29px;color:#9a93ab;margin-bottom:12px\">Multiply<\u002Fdiv>\n      <div style=\"font-size:40px;font-weight:700;color:#C2770A\">√a × √b = √(ab)<\u002Fdiv>\n      <div style=\"font-size:34px;margin-top:14px;color:#6b6480\">√2 × √3 = √6<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:20px;padding:30px;box-shadow:0 6px 18px rgba(44,36,64,.08);text-align:center\">\n      <div style=\"font-size:29px;color:#9a93ab;margin-bottom:12px\">Divide<\u002Fdiv>\n      <div style=\"font-size:40px;font-weight:700;color:#C2770A\">√a ÷ √b = √(a/b)<\u002Fdiv>\n      <div style=\"font-size:34px;margin-top:14px;color:#6b6480\">√20 ÷ √5 = √4 = 2<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:20px;padding:30px;box-shadow:0 6px 18px rgba(44,36,64,.08);text-align:center\">\n      <div style=\"font-size:29px;color:#9a93ab;margin-bottom:12px\">Square it<\u002Fdiv>\n      <div style=\"font-size:40px;font-weight:700;color:#C2770A\">(√a)² = a<\u002Fdiv>\n      <div style=\"font-size:34px;margin-top:14px;color:#6b6480\">(√7)² = 7<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Simplifying surds\" data-screen-label=\"Simplifying surds\" data-speaker-notes=\"Find the largest square factor. Reveal the worked steps.\" style=\"background:#FFF9F0;color:#2c2440;font-family:Nunito,sans-serif;display:flex;flex-direction:column;justify-content:center;padding:60px 110 div style=\"display:flex;gap:16px;margin-top:18px\">\n        <button id=\"resDownload\" style=\"flex:1;font-family:Fredoka;font-weight:600;font-size:34px;background:#6C4AB6;color:#fff;border:none;border-radius:16px;padding:18px;cursor:pointer;box-shadow:0 8px 22px rgba(108,74,182,.4)\" style-hover=\"background:#5a3aa0\">⬇️ Download my result<\u002Fbutton>\n        <button id=\"resReset\" style=\"font-family:Fredoka;font-weight:600;font-size:29px;background:#fff;color:#6C4AB6;border:3px solid #d8ccef;border-radius:16px;padding:0 28px;cursor:pointer\" style-hover=\"background:#f3eefb\">↺ Reset<\u002Fbutton>\n      <\u002Fdiv>\n      <p style=\"font-size:24px;color:#9a93ab;margin:16px 0 0\">Your answers are saved automatically on this device. Download opens a printable certificate you can save as PDF.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}\">\nclass Component extends DCLogic {\n  componentDidMount(){\n    const D=document, OK='#16a34a', NO='#dc2626', OKB='#dcfce7', NOB='#fee2e2', BR='#6C4AB6';\n    const KEY='ch9_progress_v1';\n    let st={answered:{},name:''};\n    try{const s=JSON.parse(localStorage.getItem(KEY)||'null'); if(s&&typeof s==='object')st=Object.assign(st,s);}catch(e){}\n    const save=()=>{try{localStorage.setItem(KEY,JSON.stringify(st));}catch(e){}};\n    const quizzes=()=>[...D.querySelectorAll('[data-quiz]')].filter(q=>!q.closest('[data-omelette-chrome]'));\n    const live=el=>el&&!el.closest('[data-omelette-chrome]');\n\n    // ---------- GLOSSARY flip (cards are static markup) ----------\n    D.addEventListener('click',e=>{\n      const c=e.target.closest('[data-flip]'); if(!c||!live(c))return;\n      const front=c.querySelector('[data-face=\"front\"]'), back=c.querySelector('[data-face=\"back\"]');\n      if(!front||!back)return;\n      const showBack=c.dataset.f!=='1'; c.dataset.f=showBack?'1':'';\n      front.style.display=showBack?'none':'flex'; back.style.display=showBack?'flex':'none';\n      c.style.transform='scale(1.04)'; setTimeout(()=>{c.style.transform='';},160);\n    });\n\n    // ---------- SCORING ----------\n    function totals(){\n      let got=0,poss=0,bySec={};\n      quizzes().forEach(q=>{\n        const pts=+(q.dataset.points||1), sec=q.dataset.section||'General';\n        (bySec[sec]=bySec[sec]||{got:0,poss:0}).poss+=pts; poss+=pts;\n        const a=st.answered[q.dataset.qid];\n        if(a){ if(a.right!=null){got+=a.right;bySec[sec].got+=a.right;} else if(a.correct){got+=pts;bySec[sec].got+=pts;} }\n      });\n      return {got,poss,bySec,answered:Object.keys(st.answered).length,count:quizzes().length};\n    }\n    function grade(p){\n      if(p>=90)return['A*','#a855f7','🏆 Outstanding!'];\n      if(p>=80)return['A','#16a34a','🌟 Excellent work!'];\n      if(p>=70)return['B','#3b82f6','👍 Well done!'];\n      if(p>=60)return['C','#0d9488','🙂 Good effort!'];\n      if(p>=50)return['D','#f59e0b','📈 Keep practising!'];\n      return['U','#ef4444','💪 Review and try again!'];\n    }\n    function updateHUD(){\n      const t=totals();\n      const s=D.getElementById('hudScore'); if(s)s.textContent=t.got;\n      const tt=D.getElementById('hudTotal'); if(tt)tt.textContent=t.poss;\n      renderResults(t);\n    }\n    function renderResults(t){\n      t=t||totals();\n      const pct=t.poss?Math.round(t.got/t.poss*100):0, g=grade(pct);\n      const set=(id,v)=>{const el=D.getElementById(id); if(el)el.textContent=v;};\n      set('resScore',t.got); set('resTotal',t.poss); set('resPct',pct+'%'); set('resAnswered',t.answered+' / '+t.count);\n      const ge=D.getElementById('resGrade'); if(ge){ge.textContent=g[0];ge.style.color=g[1];}\n      const gm=D.getElementById('resMsg'); if(gm)gm.textContent=g[2];\n      const ring=D.getElementById('resRing'); if(ring)ring.style.background='conic-gradient('+g[1]+' '+(pct*3.6)+'deg,#ece7f6 0)';\n      const wrap=D.getElementById('resSections');\n      if(wrap){ wrap.innerHTML='';\n        Object.keys(t.bySec).forEach(sec=>{ const s=t.bySec[sec]; const p=s.poss?Math.round(s.got/s.poss*100):0;\n          const row=D.createElement('div'); row.style.cssText='margin-bottom:14px';\n          row.innerHTML='<div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:14px;font-size:22px;font-weight:700;color:#3a2f5a;margin-bottom:7px;line-height:1.1\"><span style=\"white-space:nowrap\">'+sec+'<\u002Fspan><span style=\"white-space:nowrap\">'+s.got+'/'+s.poss+'<\u002Fspan><\u002Fdiv><div style=\"height:15px;background:#ece7f6;border-radius:999px;overflow:hidden\"><div style=\"height:100%;width:'+p+'%;background:'+g[1]+';border-radius:999px;transition:width .6s\"><\u002Fdiv><\u002Fdiv>';\n          wrap.appendChild(row);\n        });\n      }\n      const ni=D.getElementById('resName'); if(ni&&D.activeElement!==ni&&!ni.value&&st.name)ni.value=st.name;\n    }\n\n    function burst(el){ if(!el)return; const r=el.getBoundingClientRect(), em=['⭐','✨','🎉','🟣','🟢','🟡'];\n      for(let i=0;i<11;i++){ const s=D.createElement('span'); s.textContent=em[i%em.length];\n        s.style.cssText='position:fixed;left:'+(r.left+r.width/2)+'px;top:'+(r.top+r.height/2)+'px;font-size:18px;pointer-events:none;z-index:99999;transition:transform .8s ease-out,opacity .8s';\n        D.body.appendChild(s); const a=Math.random()*6.283,d=60+Math.random()*90;\n        requestAnimationFrame(()=>{s.style.transform='translate('+Math.cos(a)*d+'px,'+(Math.sin(a)*d+30)+'px) rotate('+(Math.random()*360)+'deg)';s.style.opacity='0';});\n        setTimeout(()=>s.remove(),850);\n      }\n    }\n\n    // ---------- MCQ ----------\n    function lockMCQ(q,chosen){\n      [...q.querySelectorAll('[data-opt]')].forEach(b=>{ b.style.cursor='default'; b.style.pointerEvents='none';\n        const c=b.dataset.correct==='1';\n        if(c){b.style.background=OKB;b.style.borderColor=OK;b.style.color='#14532d';}\n        if(b===chosen&&!c){b.style.background=NOB;b.style.borderColor=NO;b.style.color='#7f1d1d';}\n      });\n      const a=st.answered[q.dataset.qid], fb=q.querySelector('[data-fb]');\n      if(fb){fb.style.display='block';fb.style.color=a.correct?OK:NO; fb.textContent=(a.correct?'Correct! ':'Not quite — ')+(q.dataset.explain||'');}\n    }\n    D.addEventListener('click',e=>{\n      const opt=e.target.closest('[data-opt]'); if(!opt)return;\n      const q=opt.closest('[data-quiz=\"mcq\"]'); if(!q||!live(q))return;\n      if(st.answered[q.dataset.qid])return;\n      const correct=opt.dataset.correct==='1';\n      st.answered[q.dataset.qid]={correct,val:opt.dataset.val||opt.textContent.trim()}; save();\n      lockMCQ(q,opt); updateHUD(); if(correct)burst(opt);\n    });\n\n    // ---------- TYPE-IN ----------\n    function norm(s){return (s||'').toString().toLowerCase().replace(/\\s+/g,'').replace(/sqrt|root/g,'\\u221a').replace(/[*x×·]/g,'').replace(/^\\+/,'');}\n    function lockType(q,a){\n      const inp=q.querySelector('input'); if(inp){inp.value=a.val;inp.disabled=true;inp.style.borderColor=a.correct?OK:NO;inp.style.background=a.correct?OKB:NOB;}\n      const btn=q.querySelector('[data-check]'); if(btn)btn.style.display='none';\n      const fb=q.querySelector('[data-fb]');\n      if(fb){fb.style.display='block';fb.style.color=a.correct?OK:NO; fb.textContent=a.correct?('Correct! '+(q.dataset.explain||'')):('Answer: '+(q.dataset.answer||'').split('|')[0]+'.  '+(q.dataset.explain||''));}\n    }\n    function checkType(q){\n      if(st.answered[q.dataset.qid])return;\n      const inp=q.querySelector('input'); const val=inp?inp.value:'';\n      if(!val.trim())return;\n      const accepts=(q.dataset.answer||'').split('|').map(norm);\n      const correct=accepts.includes(norm(val));\n      st.answered[q.dataset.qid]={correct,val}; save();\n      lockType(q,st.answered[q.dataset.qid]); updateHUD(); if(correct)burst(inp);\n    }\n    D.addEventListener('click',e=>{ const b=e.target.closest('[data-check]'); if(!b)return; const q=b.closest('[data-quiz=\"type\"]'); if(q&&live(q))checkType(q); });\n    D.addEventListener('keydown',e=>{ if(e.key!=='Enter')return; const i=e.target; if(!i.matches||!i.matches('[data-quiz=\"type\"] input'))return; const q=i.closest('[data-quiz=\"type\"]'); if(q&&live(q)){e.preventDefault();checkType(q);} });\n\n    // ---------- PLACE (click chip then click bin) ----------\n    let picked=null;\n    function setPicked(c){ if(picked){picked.style.outline='';picked.style.boxShadow='';picked.style.transform='';} picked=c; if(c){c.style.outline='3px solid '+BR;c.style.transform='scale(1.08)';} }\n    function placeChip(chip,bin,silent){\n      const grp=chip.closest('[data-quiz=\"place\"]');\n      const correct=chip.dataset.home===bin.dataset.bin;\n      chip.dataset.placed='1'; chip.style.outline='';chip.style.transform='';chip.style.cursor='default';\n      chip.style.background=correct?OKB:NOB; chip.style.borderColor=correct?OK:NO; chip.style.color=correct?'#14532d':'#7f1d1d';\n      (bin.querySelector('[data-drop]')||bin).appendChild(chip);\n      const id=grp.dataset.qid, total=grp.querySelectorAll('[data-chip]').length;\n      const a=st.answered[id]||{map:{},right:0,placed:0,total};\n      a.map[chip.dataset.val]=bin.dataset.bin; a.total=total;\n      a.placed=Object.keys(a.map).length;\n      a.right=Object.keys(a.map).reduce((n,k)=>{const ch=grp.querySelector('[data-val=\"'+CSS.escape(k)+'\"]');return n+(ch&&ch.dataset.home===a.map[k]?1:0);},0);\n      a.correct=a.right===total;\n      st.answered[id]=a; save();\n      if(!silent){ if(correct)burst(chip);\n        if(a.placed===total){ const fb=grp.querySelector('[data-fb]'); if(fb){fb.style.display='block';fb.style.color=a.right===total?OK:NO;fb.textContent=a.right+' / '+total+' placed correctly. '+(grp.dataset.explain||'');} }\n        updateHUD();\n      }\n    }\n    D.addEventListener('click',e=>{\n      const chip=e.target.closest('[data-chip]');\n      if(chip&&live(chip)&&!chip.dataset.placed){ setPicked(picked===chip?null:chip); return; }\n      const bin=e.target.closest('[data-bin]');\n      if(bin&&live(bin)&&picked){ const g1=bin.closest('[data-quiz=\"place\"]'), g2=picked.closest('[data-quiz=\"place\"]'); if(g1!==g2)return; const c=picked; setPicked(null); placeChip(c,bin); }\n    });\n\n    // ---------- REVEAL worked examples ----------\n    D.addEventListener('click',e=>{\n      const b=e.target.closest('[data-reveal]'); if(!b||!live(b))return;\n      const card=b.closest('[data-example]')||D; const sol=card.querySelector('[data-solution]'); if(!sol)return;\n      const show=getComputedStyle(sol).display==='none';\n      sol.style.display=show?'block':'none'; b.textContent=show?'🙈 Hide solution':'👁️ Show solution';\n    });\n\n    // ---------- RESULTS controls ----------\n    D.addEventListener('input',e=>{ if(e.target&&e.target.id==='resName'){st.name=e.target.value;save();} });\n    D.addEventListener('click',e=>{\n      if(e.target.closest('#resReset')){ if(confirm('Clear all your answers and start again?')){ st={answered:{},name:st.name}; save(); location.reload(); } }\n      if(e.target.closest('#resDownload')){ downloadCert(); }\n    });\n    function downloadCert(){\n      const t=totals(), pct=t.poss?Math.round(t.got/t.poss*100):0, g=grade(pct);\n      const nm=((D.getElementById('resName')||{}).value||st.name||'Student').trim()||'Student';\n      const date=new Date().toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'});\n      const rows=Object.keys(t.bySec).map(s=>{const x=t.bySec[s];const p=x.poss?Math.round(x.got/x.poss*100):0;return '<tr><td>'+s+'<\u002Ftd><td style=\"text-align:right\">'+x.got+' / '+x.poss+'<\u002Ftd><td style=\"text-align:right\">'+p+'%<\u002Ftd><\u002Ftr>';}).join('');\n      const html='<!doctype html><html><head><meta charset=\"utf-8\"><title>Chapter 9 Result — '+nm+'<\u002Ftitle>'\n        +'<style>body{font-family:Georgia,serif;background:#f4f1fb;margin:0;padding:40px;color:#2c2440}'\n        +'.cert{max-width:760px;margin:0 auto;background:#fff;border:10px solid '+g[1]+';border-radius:20px;padding:48px 56px;box-shadow:0 14px 40px rgba(0,0,0,.12);text-align:center}'\n        +'h1{font-size:30px;letter-spacing:2px;text-transform:uppercase;color:'+g[1]+';margin:0 0 4px}'\n        +'.name{font-size:44px;margin:18px 0 4px;font-weight:bold}'\n        +'.big{font-size:84px;font-weight:bold;color:'+g[1]+';margin:14px 0}'\n        +'.grade{font-size:40px;font-weight:bold}table{width:100%;border-collapse:collapse;margin:28px 0;font-size:17px}'\n        +'td,th{padding:9px 6px;border-bottom:1px solid #eee}th{text-align:left;color:#888}.msg{font-size:22px;margin:10px 0}.date{color:#999;font-size:15px;margin-top:18px}<\u002Fstyle><\u002Fhead><body>'\n        +'<div class=\"cert\"><h1>Cambridge IGCSE 0580 · Chapter 9<\u002Fh1><div style=\"color:#888;font-size:18px\">Sequences, Surds &amp; Sets — Interactive Result<\u002Fdiv>'\n        +'<div class=\"name\">'+nm+'<\u002Fdiv><div class=\"big\">'+pct+'%<\u002Fdiv><div class=\"grade\" style=\"color:'+g[1]+'\">Grade '+g[0]+'<\u002Fdiv>'\n        +'<div class=\"msg\">'+g[2]+'<\u002Fdiv><div style=\"font-size:19px;color:#555\">Score: '+t.got+' / '+t.poss+' &nbsp;·&nbsp; Questions answered: '+t.answered+' / '+t.count+'<\u002Fdiv>'\n        +'<table><tr><th>Topic<\u002Fth><th style=\"text-align:right\">Score<\u002Fth><th style=\"text-align:right\">%<\u002Fth><\u002Ftr>'+rows+'<\u002Ftable>'\n        +'<div class=\"date\">Completed '+date+'<\u002Fdiv><\u002Fdiv><\u002Fbody><\u002Fhtml>';\n      const blob=new Blob([html],{type:'text/html'}); const a=D.createElement('a');\n      a.href=URL.createObjectURL(blob); a.download='Chapter9_Result_'+nm.replace(/[^a-z0-9]+/gi,'_')+'.html';\n      D.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),3000);\n    }\n\n    // ---------- RESTORE ----------\n    function restore(){\n      quizzes().forEach(q=>{\n        const a=st.answered[q.dataset.qid]; if(!a)return; const type=q.dataset.quiz;\n        if(type==='mcq'){ const ch=[...q.querySelectorAll('[data-opt]')].find(b=>(b.dataset.val||b.textContent.trim())===a.val); lockMCQ(q,ch); }\n        else if(type==='type'){ lockType(q,a); }\n        else if(type==='place'&&a.map){ Object.keys(a.map).forEach(v=>{ const chip=q.querySelector('[data-val=\"'+CSS.escape(v)+'\"]'); const bin=q.querySelector('[data-bin=\"'+CSS.escape(a.map[v])+'\"]'); if(chip&&bin)placeChip(chip,bin,true); }); if(a.placed===a.total){const fb=q.querySelector('[data-fb]');if(fb){fb.style.display='block';fb.style.color=a.right===a.total?OK:NO;fb.textContent=a.right+' / '+a.total+' placed correctly. '+(q.dataset.explain||'');}} }\n      });\n      if(st.name){const ni=D.getElementById('resName');if(ni)ni.value=st.name;}\n      updateHUD();\n    }\n    // deck-stage slots the <section>s asynchronously; wait for them.\n    let tries=0;\n    function ready(){\n      const have=D.getElementById('resName');\n      if(!have){ if(tries++<80){return setTimeout(ready,50);} return; }\n      restore();\n      updateHUD();\n    }\n    ready();\n  }\n}\n<\u002Fscript>\n\n\n\n<style>\n#penCanvas{position:fixed;inset:0;z-index:2147483640;pointer-events:none;touch-action:auto;}\n#penBar{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:2147483647;\n  display:flex;flex-wrap:wrap;justify-content:center;align-items:stretch;gap:5px;padding:5px 7px;border-radius:14px;\n  background:linear-gradient(135deg,rgba(43,70,128,.62),rgba(27,79,138,.52) 45%,rgba(104,78,180,.57));\n  -webkit-backdrop-filter:blur(16px) saturate(165%);backdrop-filter:blur(16px) saturate(165%);\n  border:1px solid rgba(255,255,255,.4);\n  box-shadow:0 6px 26px rgba(48,62,150,.45),0 1px 6px rgba(0,0,0,.25),inset 0 1px 1px rgba(255,255,255,.55);\n  max-width:calc(100vw - 16px);font-family:'Inter',system-ui,sans-serif;}\n.
