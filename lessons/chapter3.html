          <li><b>Straight angle</b> — exactly 180°</li>
          <li><b>Reflex angle</b> — between 180° and 360°</li>
          <li><b>Revolution</b> — a full turn, exactly 360°</li>
        </ul>`,
      svg: `<svg viewBox="0 0 360 120" width="360" height="120" role="img" aria-label="Diagram of acute, right, obtuse and reflex angles">

    {
      type: "content",
      tag: "Parallel lines",
      title: "Angles formed by a transversal crossing parallel lines",
      html: `<p>When a straight line (a <b>transversal</b>) crosses two <b>parallel</b> lines, three special angle relationships are created:</p>
        <ul>
          <li><b>Corresponding angles</b> — in matching positions at each intersection; they are <b>equal</b> ("F-shape")</li>
          <li><b>Alternate angles</b> — on opposite sides of the transversal, between the two parallel lines; they are <b>equal</b> ("Z-shape")</li>
          <li><b>Co-interior angles</b> — on the same side of the transversal, between the two parallel lines; they <b>sum to 180°</b> ("C-shape" or "U-shape")</li>
        </ul>`,
