ans-serif;background:#5B3FD6;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:70px;bottom:-40px;font-family:Fredoka,system-ui,sans-serif;font-size:300px;line-height:1;color:rgba(255,194,60,.16);font-weight:700;\">15.6<\/div>\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-size:26px;font-weight:700;letter-spacing:.16em;color:#FFC23C;margin-bottom:18px;\">SECTION 15.6 \u00b7 EXTENDED<\/div>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:96px;line-height:1.02;margin-bottom:22px;\">The sine &amp; cosine rules<\/h2>\n    <p style=\"font-size:34px;color:#E7DEFF;max-width:1080px;line-height:1.4;\">Solve triangles that have <b style=\"color:#fff;\">no right angle<\/b> \u2014 find any missing side or angle.<\/p>\n  <\/div>\n<\/section>\n\n<section data-label=\"The sine rule\" data-screen-label=\"15.6 Sine rule\" data-speaker-notes=\"Sine rule: pair each side with its opposite angle. Put the unknown on top. Use when you have a matching side and angle pair.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"width:52px;height:6px;background:#7C5CFF;border-radius:3px;\"><\/span><span style=\"font-size:24px;font-weight:700;letter-spacing:.14em;color:#7C5CFF;\">CONCEPT<\/span><\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:54px;margin-bottom:20px;\">The sine rule<\/h2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:36px;flex:1;align-items:start;\">\n    <div style=\"display:flex;flex-direction:column;gap:22px;\">\n      <div style=\"background:#fff;border-radius:18px;padding:26px 32px;box-shadow:0 3px 20px rgba(31,41,51,.06);\"><div style=\"font-size:24px;color:#5A6B76;margin-bottom:10px;\">To find a <b style=\"color:#1F2933;\">side<\/b> (unknown on top):<\/div><div style=\"display:flex;align-items:center;gap:16px;font-size:34px;\"><span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;\"><span class=\"mvar\" style=\"padding:0 .3em 4px;border-bottom:3px solid #1F2933;\">a<\/span><span class=\"mvar\" style=\"padding:4px .3em 0;\">sin\u2009A<\/span><\/span>=<span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;\"><span class=\"mvar\" style=\"padding:0 .3em 4px;border-bottom:3px solid #1F2933;\">b<\/span><span class=\"mvar\" style=\"padding:4px .3em 0;\">sin\u2009B<\/span><\/span>=<span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;\"><span class=\"mvar\" style=\"padding:0 .3em 4px;border-bottom:3px solid #1F2933;\">c<\/span><span class=\"mvar\" style=\"padding:4px .3em 0;\">sin\u2009C<\/span><\/span><\/div><\/div>\n      <div style=\"background:#fff;border-radius:18px;padding:26px 32px;box-shadow:0 3px 20px rgba(31,41,51,.06);\"><div style=\"font-size:24px;color:#5A6B76;margin-bottom:10px;\">To find an <b style=\"color:#1F2933;\">angle<\/b> (flip it over):<\/div><div style=\"display:flex;align-items:center;gap:16px;font-size:34px;\"><span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;\"><span class=\"mvar\" style=\"padding:0 .3em 4px;border-bottom:3px solid #1F2933;\">sin\u2009A<\/span><span class=\"mvar\" style=\"padding:4px .3em 0;\">a<\/span><\/span>=<span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;\"><span class=\"mvar\" style=\"padding:0 .3em 4px;border-bottom:3px solid #1F2933;\">sin\u2009B<\/span><span class=\"mvar\" style=\"padding:4px .3em 0;\">b<\/span><\/span>=<span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;\"><span class=\"mvar\" style=\"padding:0 .3em 4px;border-bottom:3px solid #1F2933;\">sin\u2009C<\/span><span class=\"mvar\" style=\"padding:4px .3em 0;\">c<\/span><\/span><\/div><\/div>\n      <div style=\"background:#F1ECFF;border-radius:14px;padding:20px 30px;font-size:26px;color:#4a2fb0;\">Use it when you have a <b>side and the angle opposite it<\/b> as a matching pair.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:30px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;justify-content:center;\">\n      <svg viewBox=\"0 0 460 340\" style=\"width:100%;max-width:400px;height:auto;\">\n        <polygon points=\"60,290 420,270 190,60\" fill=\"#F7F5FF\" stroke=\"#5B3FD6\" stroke-width=\"4\" stroke-linejoin=\"round\"><\/polygon>\n        <text x=\"40\" y=\"302\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#7C5CFF\">A<\/text>\n        <text x=\"428\" y=\"278\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#7C5CFF\">B<\/text>\n        <text x=\"184\" y=\"48\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#7C5CFF\">C<\/text>\n        <text x=\"320\" y=\"160\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#B0730C\">a<\/text>\n        <text x=\"108\" y=\"168\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#B0730C\">b<\/text>\n        <text x=\"235\" y=\"300\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#B0730C\">c<\/text>\n      <\/svg>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Worked examples 16 &amp; 17\" data-screen-label=\"WE16 &amp; WE17\" data-speaker-notes=\"WE16 sine rule to find a side. WE17 sine rule to find an angle, which can have two answers because sine is positive for both an acute and an obtuse angle.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:50px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLES 16 &amp; 17<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">15.6 \u00b7 Sine rule<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:28px 34px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#7C5CFF;margin-bottom:10px;\">WE16 \u00b7 find a side<\/div>\n      <p style=\"font-size:27px;line-height:1.35;margin-bottom:14px;\">In triangle <span class=\"mvar\">PQR<\/span>: <span class=\"mvar\">P<\/span> = 30\u00b0, <span class=\"mvar\">Q<\/span> = 45\u00b0, side <span class=\"mvar\">p<\/span> = 8\u2009cm. Find side <span class=\"mvar\">q<\/span>.<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:24px;padding:14px 24px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal \u25be<\/span><span class=\"rv-open\">Hide \u25b4<\/span><\/span><\/summary><div style=\"margin-top:14px;background:#F7F5FF;border-radius:12px;padding:18px 24px;font-size:26px;line-height:1.55;\"><span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:21px;line-height:1;\"><span class=\"mvar\" style=\"padding:0 .3em 2px;border-bottom:2px solid #1F2933;\">q<\/span><span class=\"mvar\" style=\"padding:2px .3em 0;\">sin\u200945\u00b0<\/span><\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:21px;line-height:1;\"><span class=\"mvar\" style=\"padding:0 .3em 2px;border-bottom:2px solid #1F2933;\">8<\/span><span class=\"mvar\" style=\"padding:2px .3em 0;\">sin\u200930\u00b0<\/span><\/span><br><span class=\"mvar\">q<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:21px;line-height:1;\"><span class=\"mvar\" style=\"padding:0 .3em 2px;border-bottom:2px solid #1F2933;\">8\u2009sin\u200945\u00b0<\/span><span class=\"mvar\" style=\"padding:2px .3em 0;\">sin\u200930\u00b0<\/span><\/span> \u2248 <b>11.3\u2009cm<\/b><\/div><\/details>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:28px 34px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#7C5CFF;margin-bottom:10px;\">WE17 \u00b7 find an angle (2 answers)<\/div>\n      <p style=\"font-size:27px;line-height:1.35;margin-bottom:14px;\">Triangle with <span class=\"mvar\">a<\/span> = 8, <span class=\"mvar\">b<\/span> = 11 and <span class=\"mvar\">A<\/span> = 40\u00b0. Find angle <span class=\"mvar\">B<\/span>.<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:24px;padding:14px 24px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal \u25be<\/span><span class=\"rv-open\">Hide \u25b4<\/span><\/span><\/summary><div style=\"margin-top:14px;background:#F7F5FF;border-radius:12px;padding:18px 24px;font-size:26px;line-height:1.5;\"><span class=\"mvar\">sin\u2009B<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:20px;line-height:1;\"><span class=\"mvar\" style=\"padding:0 .3em 2px;border-bottom:2px solid #1F2933;\">11\u2009sin\u200940\u00b0<\/span><span class=\"mvar\" style=\"padding:2px .3em 0;\">8<\/span><\/span> = 0.884<br><span class=\"mvar\">B<\/span> = 62.1\u00b0 &nbsp;<b>or<\/b>&nbsp; 180\u00b0 \u2212 62.1\u00b0 = 117.9\u00b0<br><b style=\"color:#0F7A45;\">B \u2248 62.1\u00b0 or 117.9\u00b0<\/b><\/div><\/details>\n    <\/div>\n  <\/div>\n  <div style=\"margin-top:20px;background:#FFF6E0;border-radius:14px;padding:18px 32px;font-size:26px;color:#9A6A00;\"><b>Ambiguous case:<\/b> when you find an angle with the sine rule, always check if the <b>obtuse<\/b> partner (180\u00b0 \u2212 angle) also fits the triangle.<\/div>\n<\/section>\n\n<section data-label=\"The cosine rule\" data-screen-label=\"15.6 Cosine rule\" data-speaker-notes=\"Cosine rule: use with two sides and the included angle to find the third side, or with three sides to find an angle. Show both rearrangements.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"width:52px;height:6px;background:#7C5CFF;border-radius:3px;\"><\/span><span style=\"font-size:24px;font-weight:700;letter-spacing:.14em;color:#7C5CFF;\">CONCEPT<\/span><\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:54px;margin-bottom:20px;\">The cosine rule<\/h2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:36px;flex:1;align-items:start;\">\n    <div style=\"display:flex;flex-direction:column;gap:22px;\">\n      <div style=\"background:#fff;border-radius:18px;padding:26px 32px;box-shadow:0 3px 20px rgba(31,41,51,.06);\"><div style=\"font-size:24px;color:#5A6B76;margin-bottom:10px;\">To find a <b style=\"color:#1F2933;\">side<\/b> (know 2 sides + angle between):<\/div><div style=\"font-size:38px;\"><span class=\"mvar\">a<\/span><sup>2<\/sup> = <span class=\"mvar\">b<\/span><sup>2<\/sup> + <span class=\"mvar\">c<\/span><sup>2<\/sup> \u2212 2<span class=\"mvar\">bc<\/span>\u2009<span class=\"mvar\">cos\u2009A<\/span><\/div><\/div>\n      <div style=\"background:#fff;border-radius:18px;padding:26px 32px;box-shadow:0 3px 20px rgba(31,41,51,.06);\"><div style=\"font-size:24px;color:#5A6B76;margin-bottom:10px;\">To find an <b style=\"color:#1F2933;\">angle<\/b> (know all 3 sides):<\/div><div style=\"display:flex;align-items:center;gap:14px;font-size:34px;\"><span class=\"mvar\">cos\u2009A<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;\"><span class=\"mvar\" style=\"padding:0 .3em 4px;border-bottom:3px solid #1F2933;\">b\u00b2 + c\u00b2 \u2212 a\u00b2<\/span><span class=\"mvar\" style=\"padding:4px .3em 0;\">2bc<\/span><\/span><\/div><\/div>\n      <div style=\"background:#F1ECFF;border-radius:14px;padding:20px 30px;font-size:26px;color:#4a2fb0;\">The <b>angle<\/b> and the <b>side<\/b> in the formula are always <b>opposite<\/b> each other (<span class=\"mvar\">A<\/span> is across from <span class=\"mvar\">a<\/span>).<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:30px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;justify-content:center;\">\n      <svg viewBox=\"0 0 460 340\" style=\"width:100%;max-width:400px;height:auto;\">\n        <polygon points=\"60,290 420,270 190,60\" fill=\"#F7F5FF\" stroke=\"#5B3FD6\" stroke-width=\"4\" stroke-linejoin=\"round\"><\/polygon>\n        <path d=\"M88,288 A30,30 0 0,0 86,258\" fill=\"none\" stroke=\"#7C5CFF\" stroke-width=\"3\"><\/path>\n        <text x=\"40\" y=\"302\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#7C5CFF\">A<\/text>\n        <text x=\"428\" y=\"278\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#1F2933\">B<\/text>\n        <text x=\"184\" y=\"48\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#1F2933\">C<\/text>\n        <text x=\"320\" y=\"160\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#B0730C\">a<\/text>\n        <text x=\"108\" y=\"168\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#0F7A45\">b<\/text>\n        <text x=\"235\" y=\"300\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#0F7A45\">c<\/text>\n      <\/svg>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Worked examples 18 &amp; 19\" data-screen-label=\"WE18 &amp; WE19\" data-speaker-notes=\"WE18 cosine rule find a side, answer 14.0 cm. WE19 cosine rule with an obtuse angle 120 degrees, answer 51.3 m. A negative cosine makes the side longer.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:50px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLES 18 &amp; 19<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">15.6 \u00b7 Cosine rule<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:28px 34px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#7C5CFF;margin-bottom:10px;\">WE18 \u00b7 find a side<\/div>\n      <p style=\"font-size:27px;line-height:1.35;margin-bottom:14px;\">In triangle <span class=\"mvar\">ABC<\/span>: <span class=\"mvar\">B<\/span> = 50\u00b0, <span class=\"mvar\">AB<\/span> = 9\u2009cm, <span class=\"mvar\">BC<\/span> = 18\u2009cm. Find <span class=\"mvar\">AC<\/span>.<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:24px;padding:14px 24px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal \u25be<\/span><span class=\"rv-open\">Hide \u25b4<\/span><\/span><\/summary><div style=\"margin-top:14px;background:#F7F5FF;border-radius:12px;padding:18px 24px;font-size:25px;line-height:1.5;\"><span class=\"mvar\">AC<\/span>\u00b2 = 9\u00b2 + 18\u00b2 \u2212 2(9)(18)cos\u200950\u00b0<br>= 405 \u2212 208.25 = 196.75<br><span class=\"mvar\">AC<\/span> = \u221a196.75 \u2248 <b>14.0\u2009cm<\/b><\/div><\/details>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:28px 34px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#7C5CFF;margin-bottom:10px;\">WE19 \u00b7 obtuse angle<\/div>\n      <p style=\"font-size:27px;line-height:1.35;margin-bottom:14px;\">In triangle <span class=\"mvar\">DEF<\/span>: <span class=\"mvar\">F<\/span> = 120\u00b0, <span class=\"mvar\">EF<\/span> = 25\u2009m, <span class=\"mvar\">FD<\/span> = 34\u2009m. Find <span class=\"mvar\">DE<\/span>.<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:24px;padding:14px 24px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal \u25be<\/span><span class=\"rv-open\">Hide \u25b4<\/span><\/span><\/summary><div style=\"margin-top:14px;background:#F7F5FF;border-radius:12px;padding:18px 24px;font-size:25px;line-height:1.5;\"><span class=\"mvar\">DE<\/span>\u00b2 = 25\u00b2 + 34\u00b2 \u2212 2(25)(34)cos\u2009120\u00b0<br>= 1781 \u2212 (\u2212850) = 2631<br><span class=\"mvar\">DE<\/span> = \u221a2631 \u2248 <b>51.3\u2009m<\/b><\/div><\/details>\n    <\/div>\n  <\/div>\n  <div style=\"margin-top:20px;background:#FFF6E0;border-radius:14px;padding:18px 32px;font-size:26px;color:#9A6A00;\">Notice: cos\u2009120\u00b0 is <b>negative<\/b>, so subtracting it <b>adds<\/b> to the total \u2014 the side opposite an obtuse angle is long.<\/div>\n<\/section>\n\n<section data-label=\"Worked example 20\" data-screen-label=\"WE20\" data-speaker-notes=\"Combining rules. Part a uses the cosine rule to find PQ, 10.1 cm. Part b then uses the sine rule to find angle Q, 51 degrees.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:50px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 20<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">15.6 \u00b7 Combining the two rules<\/span><\/div>\n  <p style=\"font-size:29px;line-height:1.35;margin-bottom:18px;\">In triangle <span class=\"mvar\">PQR<\/span>: <span class=\"mvar\">R<\/span> = 100\u00b0, <span class=\"mvar\">PR<\/span> = 8\u2009cm, <span class=\"mvar\">RQ<\/span> = 5\u2009cm. &nbsp;(a) Find <span class=\"mvar\">PQ<\/span>. &nbsp;(b) Find angle <span class=\"mvar\">Q<\/span>.<\/p>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1;\">\n    <details style=\"background:#fff;border-radius:20px;box-shadow:0 3px 20px rgba(31,41,51,.06);overflow:hidden;border:2px solid #ECE6D6;\">\n      <summary style=\"background:#E4F8EC;padding:22px 30px;font-size:26px;font-weight:700;color:#0F7A45;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">(a) cosine rule \u25be<\/span><span class=\"rv-open\">(a) cosine rule \u25b4<\/span><\/span><\/summary>\n      <div style=\"padding:22px 30px;font-size:26px;line-height:1.55;\">2 sides + included angle \u2192 cosine rule.<br><span class=\"mvar\">PQ<\/span>\u00b2 = 8\u00b2 + 5\u00b2 \u2212 2(8)(5)cos\u2009100\u00b0<br>= 89 + 13.89 = 102.89<br><span class=\"mvar\">PQ<\/span> = \u221a102.89 \u2248 <b>10.1\u2009cm<\/b><\/div>\n    <\/details>\n    <details style=\"background:#fff;border-radius:20px;box-shadow:0 3px 20px rgba(31,41,51,.06);overflow:hidden;border:2px solid #ECE6D6;\">\n      <summary style=\"background:#E4F8EC;padding:22px 30px;font-size:26px;font-weight:700;color:#0F7A45;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">(b) sine rule \u25be<\/span><span class=\"rv-open\">(b) sine rule \u25b4<\/span><\/span><\/summary>\n      <div style=\"padding:22px 30px;font-size:26px;line-height:1.55;\">Now use the sine rule with PQ = 10.1.<br><span class=\"mvar\">sin\u2009Q<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:20px;line-height:1;\"><span class=\"mvar\" style=\"padding:0 .3em 2px;border-bottom:2px solid #1F2933;\">8\u2009sin\u2009100\u00b0<\/span><span class=\"mvar\" style=\"padding:2px .3em 0;\">10.1<\/span><\/span> = 0.777<br><span class=\"mvar\">Q<\/span> = sin\u207b\u00b9(0.777) \u2248 <b>51\u00b0<\/b><\/div>\n    <\/details>\n  <\/div>\n<\/section>\n\n<section data-label=\"Your turn: sine &amp; cosine rules\" data-screen-label=\"15.6 Your turn\" data-speaker-notes=\"Practice. Q1 choose cosine rule, two sides and included angle. Q2 choose sine rule, matching pair.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#0EA5A8;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">YOUR TURN<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">15.6 \u00b7 Which rule?<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:36px 40px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#0EA5A8;margin-bottom:14px;\">Question 1<\/div>\n      <p style=\"font-size:29px;line-height:1.4;margin-bottom:20px;\">A triangle has sides 7\u2009cm and 10\u2009cm with an angle of <b>55\u00b0<\/b> between them. Find the third side (3\u2009sf).<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E7F7F7;color:#0EA5A8;font-weight:700;font-size:25px;padding:16px 26px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show answer \u25be<\/span><span class=\"rv-open\">Hide answer \u25b4<\/span><\/span><\/summary><div style=\"margin-top:16px;background:#F7F5FF;border-radius:12px;padding:20px 26px;font-size:26px;line-height:1.5;\">Cosine rule: <span class=\"mvar\">x<\/span>\u00b2 = 7\u00b2 + 10\u00b2 \u2212 2(7)(10)cos\u200955\u00b0 = 68.7<br><span class=\"mvar\">x<\/span> = <b>8.29\u2009cm<\/b><\/div><\/details>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:36px 40px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#0EA5A8;margin-bottom:14px;\">Question 2<\/div>\n      <p style=\"font-size:29px;line-height:1.4;margin-bottom:20px;\">In triangle <span class=\"mvar\">ABC<\/span>, <span class=\"mvar\">A<\/span> = 35\u00b0, <span class=\"mvar\">a<\/span> = 9\u2009cm and <span class=\"mvar\">b<\/span> = 12\u2009cm. Find angle <span class=\"mvar\">B<\/span> (both values).<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E7F7F7;color:#0EA5A8;font-weight:700;font-size:25px;padding:16px 26px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show answer \u25be<\/span><span class=\"rv-open\">Hide answer \u25b4<\/span><\/span><\/summary><div style=\"margin-top:16px;background:#F7F5FF;border-radius:12px;padding:20px 26px;font-size:26px;line-height:1.5;\">Sine rule: sin\u2009<span class=\"mvar\">B<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.45em;font-size:20px;line-height:1;\"><span class=\"mvar\" style=\"padding:0 .3em 1px;border-bottom:2px solid #1F2933;\">12\u2009sin\u200935\u00b0<\/span><span class=\"mvar\" style=\"padding:1px .3em 0;\">9<\/span><\/span> = 0.765<br><span class=\"mvar\">B<\/span> = <b>49.9\u00b0 or 130.1\u00b0<\/b><\/div><\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Area of a triangle\" data-screen-label=\"Area concept\" data-speaker-notes=\"Area equals half a b sin C: two sides and the angle between them. WE22 finds two areas using this formula.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"width:52px;height:6px;background:#7C5CFF;border-radius:3px;\"><\/span><span style=\"font-size:24px;font-weight:700;letter-spacing:.14em;color:#7C5CFF;\">CONCEPT &amp; WORKED EXAMPLE 22 \u00b7 EXTENDED<\/span><\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:52px;margin-bottom:20px;\">Area of any triangle<\/h2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:36px;flex:1;align-items:start;\">\n    <div style=\"display:flex;flex-direction:column;gap:22px;\">\n      <div style=\"background:#fff;border-radius:20px;padding:28px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;align-items:center;gap:16px;\">\n        <div style=\"display:flex;align-items:center;gap:16px;font-size:44px;\"><span class=\"mvar\">Area<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:30px;line-height:1;\"><span style=\"padding:0 .3em 3px;border-bottom:3px solid #1F2933;\">1<\/span><span style=\"padding:3px .3em 0;\">2<\/span><\/span> <span class=\"mvar\">ab<\/span>\u2009<span class=\"mvar\">sin\u2009C<\/span><\/div>\n        <svg viewBox=\"0 0 440 280\" style=\"width:100%;max-width:470px;height:auto;\">\n          <polygon points=\"70,230 400,230 165,70\" fill=\"#F7F5FF\" stroke=\"#5B3FD6\" stroke-width=\"4\" stroke-linejoin=\"round\"><\/polygon>\n          <line x1=\"70\" y1=\"230\" x2=\"400\" y2=\"230\" stroke=\"#B0730C\" stroke-width=\"8\" stroke-linecap=\"round\"><\/line>\n          <line x1=\"70\" y1=\"230\" x2=\"165\" y2=\"70\" stroke=\"#B0730C\" stroke-width=\"8\" stroke-linecap=\"round\"><\/line>\n          <path d=\"M118,230 A48,48 0 0,0 100,187\" fill=\"none\" stroke=\"#7C5CFF\" stroke-width=\"4\"><\/path>\n          <text x=\"58\" y=\"248\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#7C5CFF\">C<\/text>\n          <text x=\"235\" y=\"266\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#B0730C\">a<\/text>\n          <text x=\"98\" y=\"150\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#B0730C\">b<\/text>\n        <\/svg>\n      <\/div>\n      <div style=\"background:#F1ECFF;border-radius:14px;padding:20px 30px;font-size:26px;color:#4a2fb0;\">The angle <span class=\"mvar\">C<\/span> must be <b>between<\/b> the two sides <span class=\"mvar\">a<\/span> and <span class=\"mvar\">b<\/span> (the \u201cincluded\u201d angle).<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:30px 36px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#0F7A45;margin-bottom:14px;\">WE22 \u00b7 Find each area (1\u2009dp)<\/div>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;flex:1;\">\n        <details><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:23px;padding:14px 20px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">(a) 8, 6, 68\u00b0 \u25be<\/span><span class=\"rv-open\">(a) \u25b4<\/span><\/span><\/summary><div style=\"margin-top:12px;background:#F7F5FF;border-radius:12px;padding:16px 20px;font-size:24px;line-height:1.5;\"><span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.45em;font-size:19px;line-height:1;\"><span style=\"padding:0 .3em 1px;border-bottom:2px solid #1F2933;\">1<\/span><span style=\"padding:1px .3em 0;\">2<\/span><\/span>(8)(6)sin\u200968\u00b0<br>\u2248 <b>22.3\u2009cm\u00b2<\/b><\/div><\/details>\n        <details><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:23px;padding:14px 20px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">(b) 14, 17, 58\u00b0 \u25be<\/span><span class=\"rv-open\">(b) \u25b4<\/span><\/span><\/summary><div style=\"margin-top:12px;background:#F7F5FF;border-radius:12px;padding:16px 20px;font-size:24px;line-height:1.5;\"><span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.45em;font-size:19px;line-height:1;\"><span style=\"padding:0 .3em 1px;border-bottom:2px solid #1F2933;\">1<\/span><span style=\"padding:1px .3em 0;\">2<\/span><\/span>(14)(17)sin\u200958\u00b0<br>\u2248 <b>100.9\u2009cm\u00b2<\/b><\/div><\/details>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Worked examples 21 &amp; 23\" data-screen-label=\"WE21 &amp; WE23\" data-speaker-notes=\"WE23 works backwards from a known area to find the included angle, 31.2 degrees. WE21 rearranges the cosine rule for cos C and finds the smallest angle of a 7-8-13 triangle, 27.8 degrees.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:50px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLES 21 &amp; 23<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">Working backwards to an angle<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:28px 34px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#7C5CFF;margin-bottom:10px;\">WE23 \u00b7 area \u2192 angle<\/div>\n      <p style=\"font-size:27px;line-height:1.35;margin-bottom:14px;\">A triangle has area <b>20\u2009cm\u00b2<\/b>. Two sides are 8.4\u2009cm and 9.2\u2009cm. Find the angle <span class=\"mvar\">F<\/span> between them.<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:24px;padding:14px 24px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal \u25be<\/span><span class=\"rv-open\">Hide \u25b4<\/span><\/span><\/summary><div style=\"margin-top:14px;background:#F7F5FF;border-radius:12px;padding:18px 24px;font-size:25px;line-height:1.5;\"><span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.45em;font-size:19px;line-height:1;\"><span style=\"padding:0 .3em 1px;border-bottom:2px solid #1F2933;\">1<\/span><span style=\"padding:1px .3em 0;\">2<\/span><\/span>(8.4)(9.2)sin\u2009<span class=\"mvar\">F<\/span> = 20<br>sin\u2009<span class=\"mvar\">F<\/span> = 0.5176<br><span class=\"mvar\">F<\/span> = sin\u207b\u00b9(0.5176) \u2248 <b>31.2\u00b0<\/b><\/div><\/details>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:28px 34px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#7C5CFF;margin-bottom:10px;\">WE21 \u00b7 smallest angle<\/div>\n      <p style=\"font-size:27px;line-height:1.35;margin-bottom:14px;\">A triangle has sides <b>7, 8 and 13<\/b>. Find its <b>smallest<\/b> angle.<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:24px;padding:14px 24px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal \u25be<\/span><span class=\"rv-open\">Hide \u25b4<\/span><\/span><\/summary><div style=\"margin-top:14px;background:#F7F5FF;border-radius:12px;padding:18px 24px;font-size:24px;line-height:1.5;\">Smallest angle faces the shortest side (7).<br><span class=\"mvar\">cos\u2009\u03b8<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:20px;line-height:1;\"><span style=\"padding:0 .3em 2px;border-bottom:2px solid #1F2933;\">8\u00b2 + 13\u00b2 \u2212 7\u00b2<\/span><span style=\"padding:2px .3em 0;\">2(8)(13)<\/span><\/span> = 0.885<br><span class=\"mvar\">\u03b8<\/span> = cos\u207b\u00b9(0.885) \u2248 <b>27.8\u00b0<\/b><\/div><\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"3D trigonometry\" data-screen-label=\"Section 3D\" data-speaker-notes=\"3D method: find a length in a flat plane first, often a base diagonal with Pythagoras, then work the angle in a vertical right triangle. WE24 gives 15.5 degrees.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#5B3FD6;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:70px;bottom:-30px;font-family:Fredoka,system-ui,sans-serif;font-size:260px;line-height:1;color:rgba(255,194,60,.16);font-weight:700;\">3D<\/div>\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-size:26px;font-weight:700;letter-spacing:.16em;color:#FFC23C;margin-bottom:18px;\">EXTENDED<\/div>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:96px;line-height:1.02;margin-bottom:22px;\">Trigonometry in 3D<\/h2>\n    <p style=\"font-size:34px;color:#E7DEFF;max-width:1080px;line-height:1.4;\">Find a length inside a flat face first (often a diagonal with <b style=\"color:#fff;\">Pythagoras<\/b>), then solve the right triangle that stands up from it.<\/p>\n  <\/div>\n<\/section>\n\n<section data-label=\"Worked example 24\" data-screen-label=\"WE24\" data-speaker-notes=\"Cuboid room 6 by 4 by 2 metres. Step 1 find the floor diagonal BD with Pythagoras, 7.21 m. Step 2 the angle of diagonal BS to the floor is inverse tan of 2 over 7.21, which is 15.5 degrees.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:50px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 24<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">3D \u00b7 The two-step method<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:.9fr 1.1fr;gap:44px;flex:1;align-items:start;\">\n    <div>\n      <p style=\"font-size:28px;line-height:1.4;margin-bottom:18px;\">A room is a cuboid with floor <b>6\u2009m \u00d7 4\u2009m<\/b> and height <b>2\u2009m<\/b>. Find the angle between the diagonal <span class=\"mvar\">BS<\/span> and the floor <span class=\"mvar\">ABCD<\/span>.<\/p>\n      <div style=\"background:#fff;border-radius:18px;padding:20px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;justify-content:center;\"><img src=\"9fcb01fd-68cb-4f42-a285-48070f8cdd73\" alt=\"cuboid room diagram\" style=\"width:100%;max-width:490px;height:auto;\"><\/div>\n    <\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;\">\n      <details style=\"background:#fff;border-radius:18px;box-shadow:0 3px 20px rgba(31,41,51,.06);overflow:hidden;border:2px solid #ECE6D6;\">\n        <summary style=\"background:#E4F8EC;padding:20px 26px;font-size:24px;font-weight:700;color:#0F7A45;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Step 1 \u25be<\/span><span class=\"rv-open\">Step 1 \u25b4<\/span><\/span><\/summary>\n        <div style=\"padding:22px 28px;font-size:25px;line-height:1.5;\"><b>Floor diagonal<\/b> <span class=\"mvar\">BD<\/span> by Pythagoras:<br><span class=\"mvar\">BD<\/span> = \u221a(6\u00b2 + 4\u00b2)<br>= \u221a52 \u2248 <b>7.21\u2009m<\/b><\/div>\n      <\/details>\n      <details style=\"background:#fff;border-radius:18px;box-shadow:0 3px 20px rgba(31,41,51,.06);overflow:hidden;border:2px solid #ECE6D6;\">\n        <summary style=\"background:#E4F8EC;padding:20px 26px;font-size:24px;font-weight:700;color:#0F7A45;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Step 2 \u25be<\/span><span class=\"rv-open\">Step 2 \u25b4<\/span><\/span><\/summary>\n        <div style=\"padding:22px 28px;font-size:25px;line-height:1.5;\"><b>Angle<\/b> with the floor (height 2 up, base 7.21):<br><span class=\"mvar\">tan\u2009\u03b8<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:20px;line-height:1;\"><span class=\"mvar\" style=\"padding:0 .3em 2px;border-bottom:2px solid #1F2933;\">2<\/span><span class=\"mvar\" style=\"padding:2px .3em 0;\">7.21<\/span><\/span><br><span class=\"mvar\">\u03b8<\/span> = tan\u207b\u00b9(0.277) \u2248 <b>15.5\u00b0<\/b><\/div>\n      <\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Part 3 \u00b7 Exam practice\" data-screen-label=\"Divider: Exam practice\" data-speaker-notes=\"Section divider. Eighteen Cambridge Extended style questions. Students try each, then reveal the answer.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#7C1F17;color:#FFF3F1;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:90px;top:40px;font-family:Fredoka,system-ui,sans-serif;font-size:340px;line-height:1;color:rgba(255,194,60,.14);font-weight:700;\">03<\/div>\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-size:26px;font-weight:700;letter-spacing:.16em;color:#FFC23C;margin-bottom:20px;\">PART 3 \u00b7 EXTENDED 0580<\/div>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:104px;line-height:1.02;margin-bottom:24px;\">Exam practice<\/h2>\n    <p style=\"font-size:34px;color:#F6D9D3;max-width:1080px;line-height:1.4;\"><b style=\"color:#fff;\">18 exam-style questions<\/b> across the whole chapter. Try each one on paper first \u2014 then click <b style=\"color:#fff;\">Show answer<\/b> to check your working.<\/p>\n  <\/div>\n<\/section>\n\n<section data-label=\"Quiz \u00b7 Scale &amp; bearings\" data-screen-label=\"Quiz set 1\" data-speaker-notes=\"Type an answer then press Check. Scale and bearings.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:48px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:18px;\"><span style=\"white-space:nowrap;background:#C23A2B;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">QUIZ \u00b7 TYPE YOUR ANSWER<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">Scale drawings &amp; bearings<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;flex:1;\">\n    <div style=\"background:#fff;border-radius:18px;padding:24px 26px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;border-top:6px solid #C23A2B;\">\n      <div style=\"font-size:24px;font-weight:700;color:#C23A2B;margin-bottom:10px;\">Q1<\/div>\n      <p style=\"font-size:25px;line-height:1.36;margin-bottom:14px;\">A map has scale <b>1 : 50\u2009000<\/b>. Two towns are <b>8\u2009cm<\/b> apart on the map. Find the real distance in km.<\/p>\n      <div class=\"quiz\" style=\"margin-top:auto;\">\n        <div style=\"display:flex;gap:10px;align-items:stretch;\">\n          <input class=\"quiz-input\" type=\"text\" placeholder=\"answer in km\" style=\"flex:1;min-width:0;font-family:Nunito,sans-serif;font-size:22px;padding:11px 14px;border:2px solid #ECE6D6;border-radius:10px;outline:none;color:#1F2933;background:#fff;\">\n          <button class=\"quiz-check\" data-answer=\"4\" data-tol=\"0.05\" style=\"flex-shrink:0;background:#C23A2B;color:#fff;font-family:Nunito,sans-serif;font-weight:700;font-size:22px;padding:11px 22px;border:none;border-radius:10px;cursor:pointer;\">Check<\/button>\n        <\/div>\n        <div class=\"quiz-feedback\" style=\"min-height:30px;font-size:21px;font-weight:700;margin-top:9px;\"><\/div>\n        <details class=\"quiz-sol\"><summary style=\"color:#8A97A4;font-weight:700;font-size:21px;cursor:pointer;list-style:none;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show working \u25be<\/span><span class=\"rv-open\">Hide working \u25b4<\/span><\/span><\/summary><div style=\"margin-top:10px;background:#F7F5FF;border-radius:12px;padding:15px 20px;font-size:23px;line-height:1.5;\">8 \u00d7 50\u2009000 = 400\u2009000\u2009cm = <b>4\u2009km<\/b><\/div><\/details>\n      <\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:24px 26px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;border-top:6px solid #C23A2B;\">\n      <div style=\"font-size:24px;font-weight:700;color:#C23A2B;margin-bottom:10px;\">Q2<\/div>\n      <p style=\"font-size:25px;line-height:1.36;margin-bottom:14px;\">The bearing of <span class=\"mvar\">Q<\/span> from <span class=\"mvar\">P<\/span> is <b>118\u00b0<\/b>. Find the bearing of <span class=\"mvar\">P<\/span> from <span class=\"mvar\">Q<\/span>.<\/p>\n      <div class=\"quiz\" style=\"margin-top:auto;\">\n        <div style=\"display:flex;gap:10px;align-items:stretch;\">\n          <input class=\"quiz-input\" type=\"text\" placeholder=\"bearing, e.g. 298\" style=\"flex:1;min-width:0;font-family:Nunito,sans-serif;font-size:22px;padding:11px 14px;border:2px solid #ECE6D6;border-radius:10px;outline:none;color:#1F2933;background:#fff;\">\n          <button class=\"quiz-check\" data-answer=\"298\" data-tol=\"0.6\" style=\"flex-shrink:0;background:#C23A2B;color:#fff;font-family:Nunito,sans-serif;font-weight:700;font-size:22px;padding:11px 22px;border:none;border-radius:10px;cursor:pointer;\">Check<\/button>\n        <\/div>\n        <div class=\"quiz-feedback\" style=\"min-height:30px;font-size:21px;font-weight:700;margin-top:9px;\"><\/div>\n        <details class=\"quiz-sol\"><summary style=\"color:#8A97A4;font-weight:700;font-size:21px;cursor:pointer;list-style:none;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show working \u25be<\/span><span class=\"rv-open\">Hide working \u25b4<\/span><\/span><\/summary><div style=\"margin-top:10px;background:#F7F5FF;border-radius:12px;padding:15px 20px;font-size:23px;line-height:1.5;\">118\u00b0 &lt; 180\u00b0, so add 180\u00b0: 118\u00b0 + 180\u00b0 = <b>298\u00b0<\/b><\/div><\/details>\n      <\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:24px 26px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;border-top:6px solid #C23A2B;\">\n      <div style=\"font-size:24px;font-weight:700;color:#C23A2B;margin-bottom:10px;\">Q3<\/div>\n      <p style=\"font-size:25px;line-height:1.36;margin-bottom:14px;\">A boat sails <b>15\u2009km<\/b> on a bearing of <b>040\u00b0<\/b>. How far <b>north<\/b> and how far <b>east<\/b> has it travelled?<\/p>\n      <div class=\"quiz\" style=\"margin-top:auto;\">\n        <div style=\"display:flex;gap:10px;align-items:stretch;\">\n          <input class=\"quiz-input\" type=\"text\" placeholder=\"both, e.g. 11.5, 9.64\" style=\"flex:1;min-width:0;font-family:Nunito,sans-serif;font-size:22px;padding:11px 14px;border:2px solid #ECE6D6;border-radius:10px;outline:none;color:#1F2933;background:#fff;\">\n          <button class=\"quiz-check\" data-answer=\"11.5,9.64\" data-tol=\"0.1\" style=\"flex-shrink:0;background:#C23A2B;color:#fff;font-family:Nunito,sans-serif;font-weight:700;font-size:22px;padding:11px 22px;border:none;border-radius:10px;cursor:pointer;\">Check<\/button>\n        <\/div>\n        <div class=\"quiz-feedback\" style=\"min-height:30px;font-size:21px;font-weight:700;margin-top:9px;\"><\/div>\n        <details class=\"quiz-sol\"><summary style=\"color:#8A97A4;font-weight:700;font-size:21px;cursor:pointer;list-style:none;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show working \u25be<\/span><span class=\"rv-open\">Hide working \u25b4<\/span><\/span><\/summary><div style=\"margin-top:10px;background:#F7F5FF;border-radius:12px;padding:15px 20px;font-size:23px;line-height:1.5;\">North = 15\u2009cos\u200940\u00b0 = <b>11.5\u2009km<\/b><br>East = 15\u2009sin\u200940\u00b0 = <b>9.64\u2009km<\/b><\/div><\/details>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Quiz \u00b7 Right-angled trig\" data-screen-label=\"Quiz set 2\" data-speaker-notes=\"Type an answer then press Check. SOH-CAH-TOA.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:48px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:18px;\"><span style=\"white-space:nowrap;background:#C23A2B;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">QUIZ \u00b7 TYPE YOUR ANSWER<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">Right-angled triangles<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;flex:1;\">\n    <div style=\"background:#fff;border-radius:18px;padding:24px 26px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;border-top:6px solid #C23A2B;\">\n      <div style=\"font-size:24px;font-weight:700;color:#C23A2B;margin-bottom:10px;\">Q4<\/div>\n      <p style=\"font-size:25px;line-height:1.36;margin-bottom:14px;\">A ramp rises <b>1.2\u2009m<\/b> over a horizontal distance of <b>8\u2009m<\/b>. Find the angle of the ramp (1\u2009dp).<\/p>\n      <div class=\"quiz\" style=\"margin-top:auto;\">\n        <div style=\"display:flex;gap:10px;align-items:stretch;\">\n          <input class=\"quiz-input\" type=\"text\" placeholder=\"angle in \u00b0\" style=\"flex:1;min-width:0;font-family:Nunito,sans-serif;font-size:22px;padding:11px 14px;border:2px solid #ECE6D6;border-radius:10px;outline:none;color:#1F2933;background:#fff;\">\n          <button class=\"quiz-check\" data-answer=\"8.5\" data-tol=\"0.2\" style=\"flex-shrink:0;background:#C23A2B;color:#fff;font-family:Nunito,sans-serif;font-weight:700;font-size:22px;padding:11px 22px;border:none;border-radius:10px;cursor:pointer;\">Check<\/button>\n        <\/div>\n        <div class=\"quiz-feedback\" style=\"min-height:30px;font-size:21px;font-weight:700;margin-top:9px;\"><\/div>\n        <details class=\"quiz-sol\"><summary style=\"color:#8A97A4;font-weight:700;font-size:21px;cursor:pointer;list-style:none;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show working \u25be<\/span><span class=\"rv-open\">Hide working \u25b4<\/span><\/span><\/summary><div style=\"margin-top:10px;background:#F7F5FF;border-radius:12px;padding:15px 20px;font-size:23px;line-height:1.5;\">tan\u207b\u00b9(1.2 \u00f7 8) = tan\u207b\u00b9(0.15) = <b>8.5\u00b0<\/b><\/div><\/details>\n      <\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:24px 26px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;border-top:6px solid #C23A2B;\">\n      <div style=\"font-size:24px;font-weight:700;color:#C23A2B;margin-bottom:10px;\">Q5<\/div>\n      <p style=\"font-size:25px;line-height:1.36;margin-bottom:14px;\">A right triangle has legs <b>9\u2009cm<\/b> and <b>12\u2009cm<\/b>. Find the hypotenuse and the smallest angle.<\/p>\n      <div class=\"quiz\" style=\"margin-top:auto;\">\n        <div style=\"display:flex;gap:10px;align-items:stretch;\">\n          <input class=\"quiz-input\" type=\"text\" placeholder=\"both, e.g. 15, 36.9\" style=\"flex:1;min-width:0;font-family:Nunito,sans-serif;font-size:22px;padding:11px 14px;border:2px solid #ECE6D6;border-radius:10px;outline:none;color:#1F2933;background:#fff;\">\n          <button class=\"quiz-check\" data-answer=\"15,36.9\" data-tol=\"0.2\" style=\"flex-shrink:0;background:#C23A2B;color:#fff;font-family:Nunito,sans-serif;font-weight:700;font-size:22px;padding:11px 22px;border:none;border-radius:10px;cursor:pointer;\">Check<\/button>\n        <\/div>\n        <div class=\"quiz-feedback\" style=\"min-height:30px;font-size:21px;font-weight:700;margin-top:9px;\"><\/div>\n        <details class=\"quiz-sol\"><summary style=\"color:#8A97A4;font-weight:700;font-size:21px;cursor:pointer;list-style:none;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show working \u25be<\/span><span class=\"rv-open\">Hide working \u25b4<\/span><\/span><\/summary><div style=\"margin-top:10px;background:#F7F5FF;border-radius:12px;padding:15px 20px;font-size:23px;line-height:1.5;\">hyp = \u221a(9\u00b2+12\u00b2) = <b>15\u2009cm<\/b><br>angle = tan\u207b\u00b9(9 \u00f7 12) = <b>36.9\u00b0<\/b><\/div><\/details>\n      <\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:24px 26px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;border-top:6px solid #C23A2B;\">\n      <div style=\"font-size:24px;font-weight:700;color:#C23A2B;margin-bottom:10px;\">Q6<\/div>\n      <p style=\"font-size:25px;line-height:1.36;margin-bottom:14px;\">A kite is on a straight string <b>40\u2009m<\/b> long at an angle of elevation of <b>55\u00b0<\/b>. How high is the kite?<\/p>\n      <div class=\"quiz\" style=\"margin-top:auto;\">\n        <div style=\"display:flex;gap:10px;align-items:stretch;\">\n          <input class=\"quiz-input\" type=\"text\" placeholder=\"height in m\" style=\"flex:1;min-width:0;font-family:Nunito,sans-serif;font-size:22px;padding:11px 14px;border:2px solid #ECE6D6;border-radius:10px;outline:none;color:#1F2933;background:#fff;\">\n          <button class=\"quiz-check\" data-answer=\"32.8\" data-tol=\"0.2\" style=\"flex-shrink:0;background:#C23A2B;color:#fff;font-family:Nunito,sans-serif;font-weight:700;font-size:22px;padding:11px 22px;border:none;border-radius:10px;cursor:pointer;\">Check<\/button>\n        <\/div>\n        <div class=\"quiz-feedback\" style=\"min-height:30px;font-size:21px;font-weight:700;margin-top:9px;\"><\/div>\n        <details class=\"quiz-sol\"><summary style=\"color:#8A97A4;font-weight:700;font-size:21px;cursor:pointer;list-style:none;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show working \u25be<\/span><span class=\"rv-open\">Hide working \u25b4<\/span><\/span><\/summary><div style=\"margin-top:10px;background:#F7F5FF;border-radius:12px;padding:15px 20px;font-size:23px;line-height:1.5;\">height = 40\u2009sin\u200955\u00b0 = <b>32.8\u2009m<\/b><\/div><\/details>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Quiz \u00b7 Elevation &amp; depression\" data-screen-label=\"Quiz set 3\" data-speaker-notes=\"Type an answer then press Check. Elevation and depression.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:48px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:18px;\"><span style=\"white-space:nowrap;background:#C23A2B;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">QUIZ \u00b7 TYPE YOUR ANSWER<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">Elevation &amp; depression<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;flex:1;\">\n    <div style=\"background:#fff;border-radius:18px;padding:24px 26px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;border-top:6px solid #C23A2B;\">\n      <div style=\"font-size:24px;font-weight:700;color:#C23A2B;margin-bottom:10px;\">Q7<\/div>\n      <p style=\"font-size:25px;line-height:1.36;margin-bottom:14px;\">From <b>50\u2009m<\/b> away, the angle of elevation of the top of a tower is <b>38\u00b0<\/b>. Find the tower\u2019s height.<\/p>\n      <div class=\"quiz\" style=\"margin-top:auto;\">\n        <div style=\"display:flex;gap:10px;align-items:stretch;\">\n          <input class=\"quiz-input\" type=\"text\" placeholder=\"height in m\" style=\"flex:1;min-width:0;font-family:Nunito,sans-serif;font-size:22px;padding:11px 14px;border:2px solid #ECE6D6;border-radius:10px;outline:none;color:#1F2933;background:#fff;\">\n          <button class=\"quiz-check\" data-answer=\"39.1\" data-tol=\"0.3\" style=\"flex-shrink:0;background:#C23A2B;color:#fff;font-family:Nunito,sans-serif;font-weight:700;font-size:22px;padding:11px 22px;border:none;border-radius:10px;cursor:pointer;\">Check<\/button>\n        <\/div>\n        <div class=\"quiz-feedback\" style=\"min-height:30px;font-size:21px;font-weight:700;margin-top:9px;\"><\/div>\n        <details class=\"quiz-sol\"><summary style=\"color:#8A97A4;font-weight:700;font-size:21px;cursor:pointer;list-style:none;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show working \u25be<\/span><span class=\"rv-open\">Hide working \u25b4<\/span><\/span><\/summary><div style=\"margin-top:10px;background:#F7F5FF;border-radius:12px;padding:15px 20px;font-size:23px;line-height:1.5;\">h = 50\u2009tan\u200938\u00b0 = <b>39.1\u2009m<\/b><\/div><\/details>\n      <\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:24px 26px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;border-top:6px solid #C23A2B;\">\n      <div style=\"font-size:24px;font-weight:700;color:#C23A2B;margin-bottom:10px;\">Q8<\/div>\n      <p style=\"font-size:25px;line-height:1.36;margin-bottom:14px;\">A cliff is <b>65\u2009m<\/b> high. The angle of depression of a boat is <b>22\u00b0<\/b>. How far is the boat from the base?<\/p>\n      <div class=\"quiz\" style=\"margin-top:auto;\">\n        <div style=\"display:flex;gap:10px;align-items:stretch;\">\n          <input class=\"quiz-input\" type=\"text\" placeholder=\"distance in m\" style=\"flex:1;min-width:0;font-family:Nunito,sans-serif;font-size:22px;padding:11px 14px;border:2px solid #ECE6D6;border-radius:10px;outline:none;color:#1F2933;background:#fff;\">\n          <button class=\"quiz-check\" data-answer=\"161\" data-tol=\"1.5\" style=\"flex-shrink:0;background:#C23A2B;color:#fff;font-family:Nunito,sans-serif;font-weight:700;font-size:22px;padding:11px 22px;border:none;border-radius:10px;cursor:pointer;\">Check<\/button>\n        <\/div>\n        <div class=\"quiz-feedback\" style=\"min-height:30px;font-size:21px;font-weight:700;margin-top:9px;\"><\/div>\n        <details class=\"quiz-sol\"><summary style=\"color:#8A97A4;font-weight:700;font-size:21px;cursor:pointer;list-style:none;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show working \u25be<\/span><span class=\"rv-open\">Hide working \u25b4<\/span><\/span><\/summary><div style=\"margin-top:10px;background:#F7F5FF;border-radius:12px;padding:15px 20px;font-size:23px;line-height:1.5;\">d = 65 \u00f7 tan\u200922\u00b0 = <b>161\u2009m<\/b><\/div><\/details>\n      <\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:24px 26px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;border-top:6px solid #C23A2B;\">\n      <div style=\"font-size:24px;font-weight:700;color:#C23A2B;margin-bottom:10px;\">Q9<\/div>\n      <p style=\"font-size:25px;line-height:1.36;margin-bottom:14px;\">Town <span class=\"mvar\">C<\/span> is <b>12\u2009km<\/b> from <span class=\"mvar\">A<\/span> on a bearing of <b>050\u00b0<\/b>. How far <b>north<\/b> of <span class=\"mvar\">A<\/span> is <span class=\"mvar\">C<\/span>?<\/p>\n      <div class=\"quiz\" style=\"margin-top:auto;\">\n        <div style=\"display:flex;gap:10px;align-items:stretch;\">\n          <input class=\"quiz-input\" type=\"text\" placeholder=\"distance in km\" style=\"flex:1;min-width:0;font-family:Nunito,sans-serif;font-size:22px;padding:11px 14px;border:2px solid #ECE6D6;border-radius:10px;outline:none;color:#1F2933;background:#fff;\">\n          <button class=\"quiz-check\" data-answer=\"7.71\" data-tol=\"0.1\" style=\"flex-shrink:0;background:#C23A2B;color:#fff;font-family:Nunito,sans-serif;font-weight:700;font-size:22px;padding:11px 22px;border:none;border-radius:10px;cursor:pointer;\">Check<\/button>\n        <\/div>\n        <div class=\"quiz-feedback\" style=\"min-height:30px;font-size:21px;font-weight:700;margin-top:9px;\"><\/div>\n        <details class=\"quiz-sol\"><summary style=\"color:#8A97A4;font-weight:700;font-size:21px;cursor:pointer;list-style:none;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show working \u25be<\/span><span class=\"rv-open\">Hide working \u25b4<\/span><\/span><\/summary><div style=\"margin-top:10px;background:#F7F5FF;border-radius:12px;padding:15px 20px;font-size:23px;line-height:1.5;\">North = 12\u2009cos\u200950\u00b0 = <b>7.71\u2009km<\/b><\/div><\/details>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Quiz \u00b7 Sine &amp; cosine rules\" data-screen-label=\"Quiz set 4\" data-speaker-notes=\"Type an answer then press Check. Sine and cosine rules.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:48px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:18px;\"><span style=\"white-space:nowrap;background:#C23A2B;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">QUIZ \u00b7 TYPE YOUR ANSWER<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">Sine &amp; cosine rules<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;flex:1;\">\n    <div style=\"background:#fff;border-radius:18px;padding:24px 26px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;border-top:6px solid #C23A2B;\">\n      <div style=\"font-size:24px;font-weight:700;color:#C23A2B;margin-bottom:10px;\">Q10<\/div>\n      <p style=\"font-size:25px;line-height:1.36;margin-bottom:14px;\">In triangle <span class=\"mvar\">ABC<\/span>, <span class=\"mvar\">A<\/span> = 52\u00b0, <span class=\"mvar\">B<\/span> = 61\u00b0 and <span class=\"mvar\">a<\/span> = 14\u2009cm. Find side <span class=\"mvar\">b<\/span> (3\u2009sf).<\/p>\n      <div class=\"quiz\" style=\"margin-top:auto;\">\n        <div style=\"display:flex;gap:10px;align-items:stretch;\">\n          <input class=\"quiz-input\" type=\"text\" placeholder=\"side in cm\" style=\"flex:1;min-width:0;font-family:Nunito,sans-serif;font-size:22px;padding:11px 14px;border:2px solid #ECE6D6;border-radius:10px;outline:none;color:#1F2933;background:#fff;\">\n          <button class=\"quiz-check\" data-answer=\"15.5\" data-tol=\"0.2\" style=\"flex-shrink:0;background:#C23A2B;color:#fff;font-family:Nunito,sans-serif;font-weight:700;font-size:22px;padding:11px 22px;border:none;border-r gin-top:9px;\"><\/div>\n        <details class=\"quiz-sol\"><summary style=\"color:#8A97A4;font-weight:700;font-size:21px;cursor:pointer;list-style:none;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show working \u25be<\/span><span class=\"rv-open\">Hide working \u25b4<\/span><\/span><\/summary><div style=\"margin-top:10px;background:#F7F5FF;border-radius:12px;padding:15px 20px;font-size:23px;line-height:1.5;\">Cosine rule: <span class=\"mvar\">x<\/span>\u00b2 = 11\u00b2 + 7\u00b2 \u2212 2(11)(7)cos\u200994\u00b0 \u2192 <span class=\"mvar\">x<\/span> = <b>13.4\u2009cm<\/b><\/div><\/details>\n      <\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:24px 26px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;border-top:6px solid #C23A2B;\">\n      <div style=\"font-size:24px;font-weight:700;color:#C23A2B;margin-bottom:10px;\">Q12<\/div>\n      <p style=\"font-size:25px;line-height:1.36;margin-bottom:14px;\">A triangle has sides <b>5, 6<\/b> and <b>9\u2009cm<\/b>. Find its <b>largest<\/b> angle (1\u2009dp).<\/p>\n      <div class=\"quiz\" style=\"margin-top:auto;\">\n        <div style=\"display:flex;gap:10px;align-items:stretch;\">\n          <input class=\"quiz-input\" type=\"text\" placeholder=\"angle in \u00b0\" style=\"flex:1;min-width:0;font-family:Nunito,sans-serif;font-size:22px;padding:11px 14px;border:2px solid #ECE6D6;border-radius:10px;outline:none;color:#1F2933;background:#fff;\">\n          <button class=\"quiz-check\" data-answer=\"109.5\" data-tol=\"0.6\" style=\"flex-shrink:0;background:#C23A2B;color:#fff;font-family:Nunito,sans-serif;font-weight:700;font-size:22px;padding:11px 22px;border:none;border-radius:10px;cursor:pointer;\">Check<\/button>\n        <\/div>\n        <div class=\"quiz-feedback\" style=\"min-height:30px;font-size:21px;font-weight:700;margin-top:9px;\"><\/div>\n        <details class=\"quiz-sol\"><summary style=\"color:#8A97A4;font-weight:700;font-size:21px;cursor:pointe area in cm\u00b2\" style=\"flex:1;min-width:0;font-family:Nunito,sans-serif;font-size:22px;padding:11px 14px;border:2px solid #ECE6D6;border-radius:10px;outline:none;color:#1F2933;background:#fff;\">\n          <button class=\"quiz-check\" data-answer=\"47.5\" data-tol=\"0.6\" style=\"flex-shrink:0;background:#C23A2B;color:#fff;font-family:Nunito,sans-serif;font-weight:700;font-size:22px;padding:11px 22px;border:none;border-radius:10px;cursor:pointer;\">Check<\/button>\n        <\/div>\n        <div class=\"quiz-feedback\" style=\"min-height:30px;font-size:21px;font-weight:700;margin-top:9px;\"><\/div>\n        <details class=\"quiz-sol\"><summary style=\"color:#8A97A4;font-weight:700;font-size:21px;cursor:pointer;list-style:none;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show working \u25be<\/span><span class=\"rv-open\">Hide working \u25b4<\/span><\/span><\/summary><div style=\"margin-top:10px;background:#F7F5FF;border-radius:12px;padding:15px 20px;font-size:23px;line-height:1.5;\">Area = \u00bd(13)(10)sin\u200947\u00b0 = <b>47.5\u2009cm\u00b2<\/b><\/div><\/details>\n      <\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:24px 26px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;border-top:6px solid #C23A2B;\">\n      <div style=\"font-size:24px;font-weight:700;color:#C23A2B;margin-bottom:10px;\">Q14<\/div>\n      <p style=\"font-size:25px;line-height:1.36;margin-bottom:14px;\">A triangle has area <b>35\u2009cm\u00b2<\/b>. Two sides are <b>10\u2009cm<\/b> and <b>9\u2009cm<\/b>. Find the included angle (acute).<\/p>\n      <div class=\"quiz\" style=\"margin-top:auto;\">\n        <div style=\"display:flex;gap:10px;align-items:stretch;\">\n          <input class=\"quiz-input\" type=\"text\" placeholder=\"angle in \u00b0\" style=\"flex:1;min-width:0;font-family:Nunito,sans-serif;font-size:22px;padding:11px 14px;border:2px solid #ECE6D6;border-radius:10px;outline:none;color:#1F2933;background:#fff;\"> 22px;padding:11px 22px;border:none;border-radius:10px;cursor:pointer;\">Check<\/button>\n        <\/div>\n        <div class=\"quiz-feedback\" style=\"min-height:30px;font-size:21px;font-weight:700;margin-top:9px;\"><\/div>\n        <details class=\"quiz-sol\"><summary style=\"color:#8A97A4;font-weight:700;font-size:21px;cursor:pointer;list-style:none;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show working \u25be<\/span><span class=\"rv-open\">Hide working \u25b4<\/span><\/span><\/summary><div style=\"margin-top:10px;background:#F7F5FF;border-radius:12px;padding:15px 20px;font-size:23px;line-height:1.5;\">Cosine rule: <span class=\"mvar\">x<\/span>\u00b2 = 9\u00b2 + 5\u00b2 \u2212 2(9)(5)cos\u200968\u00b0 \u2192 <span class=\"mvar\">x<\/span> = <b>8.50\u2009cm<\/b><\/div><\/details>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Quiz \u00b7 3D &amp; equations\" data-screen-label=\"Quiz set 6\" data-speaker-notes=\"Type an answer then press Check. 3D and solving from 0 to 360.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:48px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:18px;\"><span style=\"white-space:nowrap;background:#C23A2B;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">QUIZ \u00b7 TYPE YOUR ANSWER<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">3D &amp; solving 0\u00b0\u2013360\u00b0<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;flex:1;\">\n    <div style=\"background:#fff;border-radius:18px;padding:24px 26px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;border-top:6px solid #C23A2B;\">\n      <div style=\"font-size:24px;font-weight:700;color:#C23A2B;margin-bottom:10px;\">Q16<\/div>\n      <p style=\"font-size:25px;line-height:1.36;margin-bottom:14px;\">A box is <b>8 \u00d7 6 \u00d7 5\u2009cm<\/b>. Find its space diagonal, and the angle it makes with the base (1\u2009dp).<\/p>\n      <div class=\"quiz\" style=\"margin-top:auto;\">\n        <div style=\"display:flex;gap:10px;align-items:stretch;\">\n          <input class=\"quiz-input\" type=\"text\" placeholder=\"diagonal, angle\" style=\"flex:1;min-width:0;font-family:Nunito,sans-serif;font-size:22px;padding:11px 14px;border:2px solid #ECE6D6;border-radius:10px;outline:none;color:#1F2933;background:#fff;\">\n          <button class=\"quiz-check\" data-answer=\"11.2,26.6\" data-tol=\"0.3\" style=\"flex-shrink:0;background:#C23A2B;color:#fff;font-family:Nunito,sans-serif;font-weight:700;font-size:22px;padding:11px 22px;border:none;border-radius:10px;cursor:pointer;\">Check<\/button>\n        <\/div>\n        <div class=\"quiz-feedback\" style=\"min-height:30px;font-size:21px;font-weight:700;margin-top:9px;\"><\/div>\n        <details class=\"quiz-sol\"><summary style=\"color:#8A97A4;font-weight:700;font-size:21px;cursor:pointer;list-style:none;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show working \u25be<\/span><span class=\"rv-open\">Hide working \u25b4<\/span><\/span><\/summary><div style=\"margin-top:10px;background:#F7F5FF;border-radius:12px;padding:15px 20px;font-size:23px;line-height:1.5;\">Base = \u221a(8\u00b2+6\u00b2) = 10; diagonal = \u221a(10\u00b2+5\u00b2) = <b>11.2\u2009cm<\/b><br>angle = tan\u207b\u00b9(5 \u00f7 10) = <b>26.6\u00b0<\/b><\/div><\/details>\n      <\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:24px 26px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;border-top:6px solid #C23A2B;\">\n      <div style=\"font-size:24px;font-weight:700;color:#C23A2B;margin-bottom:10px;\">Q17<\/div>\n      <p style=\"font-size:25px;line-height:1.36;margin-bottom:14px;\">Solve <span class=\"mvar\">sin\u2009x<\/span> = 0.5 for <b>0\u00b0 \u2264 <span class=\"mvar\">x<\/span> \u2264 360\u00b0<\/b>.<\/p>\n      <div class=\"quiz\" style=\"margin-top:auto;\">\n        <div style=\"display:flex;gap:10px;align-items:stretch;\">\n          <input class=\"quiz-input\" type=\"text\" placeholder=\"both angles\" style=\"flex:1;min-width:0;font-family:Nunito,sans-serif;font-size:22px;padding:11px 14px;border:2px solid #ECE6D6;border-radius:10px;outline:none;color:#1F2933;background:#fff;\">\n          <button class=\"quiz-check\" data-answer=\"30,150\" data-tol=\"0.6\" style=\"flex-shrink:0;background:#C23A2B;color:#fff;font-family:Nunito,sans-serif;font-weight:700;font-size:22px;padding:11px 22px;border:none;border-radius:10px;cursor:pointer;\">Check<\/button>\n        <\/div>\n        <div class=\"quiz-feedback\" style=\"min-height:30px;font-size:21px;font-weight:700;margin-top:9px;\"><\/div>\n        <details class=\"quiz-sol\"><summary style=\"color:#8A97A4;font-weight:700;font-size:21px;cursor:pointer;list-style:none;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show working \u25be<\/span><span class=\"rv-open\">Hide working \u25b4<\/span><\/span><\/summary><div style=\"margin-top:10px;background:#F7F5FF;border-radius:12px;padding:15px 20px;font-size:23px;line-height:1.5;\">sin\u207b\u00b9(0.5) = 30\u00b0; second = 180\u00b0 \u2212 30\u00b0 = 150\u00b0 \u2192 <b>30\u00b0, 150\u00b0<\/b><\/div><\/details>\n      <\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:24px 26px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;border-top:6px solid #C23A2B;\">\n      <div style=\"font-size:24px;font-weight:700;color:#C23A2B;margin-bottom:10px;\">Q18<\/div>\n      <p style=\"font-size:25px;line-height:1.36;margin-bottom:14px;\">Solve <span class=\"mvar\">cos\u2009x<\/span> = 0.3 for <b>0\u00b0 \u2264 <span class=\"mvar\">x<\/span> \u2264 360\u00b0<\/b> (1\u2009dp).<\/p>\n      <div class=\"quiz\" style=\"margin-top:auto;\">\n        <div style=\"display:flex;gap:10px;align-items:stretch;\">\n          <input class=\"quiz-input\" type=\"text\" placeholder=\"both angles\" style=\"flex:1;min-width:0;font-family:Nunito,sans-serif;font-size:22px;padding:11px 14px;border:2px solid #ECE6D6;border-radius:10px;outline:none;color:#1F2933;background:#fff;\">\n          <button class=\"quiz-check\" data-answer=\"72.5,287.5\" data-tol=\"0.8\" style=\"flex-shrink:0;background:#C23A2B;color:#fff;font-family:Nunito,sans-serif;font-weight:700;font-size:22px;padding:11px 22px;border:none;border-radius:10px;cursor:pointer;\">Check<\/button>\n        <\/div>\n        <div class=\"quiz-feedback\" style=\"min-height:30px;font-size:21px;font-weight:700;margin-top:9px;\"><\/div>\n        <details class=\"quiz-sol\"><summary style=\"color:#8A97A4;font-weight:700;font-size:21px;cursor:pointer;list-style:none;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show working \u25be<\/span><span class=\"rv-open\">Hide working \u25b4<\/span><\/span><\/summary><div style=\"margin-top:10px;background:#F7F5FF;border-radius:12px;padding:15px 20px;font-size:23px;line-height:1.5;\">cos\u207b\u00b9(0.3) = 72.5\u00b0; second = 360\u00b0 \u2212 72.5\u00b0 = 287.5\u00b0 \u2192 <b>72.5\u00b0, 287.5\u00b0<\/b><\/div><\/details>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Formula cheat sheet\" data-screen-label=\"Cheat sheet\" data-speaker-notes=\"One-page summary of every formula and rule in the chapter. A good revision reference.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:48px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:18px;\"><span style=\"width:52px;height:6px;background:#7C5CFF;border-radius:3px;\"><\/span><span style=\"font-size:24px;font-weight:700;letter-spacing:.14em;color:#7C5CFF;\">REVISION<\/span><h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:46px;margin-left:8px;\">Everything on one page<\/h2><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:22px;flex:1;\">\n    <div style=\"background:#fff;border-radius:18px;padding:24px 28px;box-shadow:0 3px 18px rgba(31,41,51,.06);border-top:6px solid #7C5CFF;\">\n      <div style=\"font-size:24px;font-weight:700;color:#7C5CFF;margin-bottom:12px;\">Right-angled triangle<\/div>\n      <div style=\"font-size:26px;line-height:1.7;\">sin\u2009\u03b8 = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.45em;font-size:19px;line-height:1;\"><span style=\"padding:0 .3em 1px;border-bottom:2px solid currentColor;color:#B0730C;\">opp<\/span><span style=\"padding:1px .3em 0;color:#7C5CFF;\">hyp<\/span><\/span>&nbsp; cos\u2009\u03b8 = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.45em;font-size:19px;line-height:1;\"><span style=\"padding:0 .3em 1px;border-bottom:2px solid currentColor;color:#0F7A45;\">adj<\/span><span style=\"padding:1px .3em 0;color:#7C5CFF;\">hyp<\/span><\/span>&nbsp; tan\u2009\u03b8 = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.45em;font-size:19px;line-height:1;\"><span style=\"padding:0 .3em 1px;border-bottom:2px solid currentColor;color:#B0730C;\">opp<\/span><span style=\"padding:1px .3em 0;color:#0F7A45;\">adj<\/span><\/span><\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:24px 28px;box-shadow:0 3px 18px rgba(31,41,51,.06);border-top:6px solid #B0730C;\">\n      <div style=\"font-size:24px;font-weight:700;color:#B0730C;margin-bottom:12px;\">Bearings<\/div>\n      <div style=\"font-size:25px;line-height:1.5;\">From <b>North<\/b>, <b>clockwise<\/b>, <b>3 figures<\/b> (040\u00b0).<br>Back bearing: <b>\u00b1180\u00b0<\/b>.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:24px 28px;box-shadow:0 3px 18px rgba(31,41,51,.06);border-top:6px solid #0EA5A8;\">\n      <div style=\"font-size:24px;font-weight:700;color:#0EA5A8;margin-bottom:12px;\">Find an angle<\/div>\n      <div style=\"font-size:25px;line-height:1.5;\">Use the <b>inverse<\/b>: sin\u207b\u00b9, cos\u207b\u00b9, tan\u207b\u00b9<br>(press <b>SHIFT<\/b> then the function).<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:24px 28px;box-shadow:0 3px 18px rgba(31,41,51,.06);border-top:6px solid #7C5CFF;\">\n      <div style=\"font-size:24px;font-weight:700;color:#7C5CFF;margin-bottom:12px;\">Sine rule<\/div>\n      <div style=\"font-size:28px;\"><span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;\"><span class=\"mvar\" style=\"padding:0 .25em 3px;border-bottom:2px solid #1F2933;\">a<\/span><span class=\"mvar\" style=\"padding:3px .25em 0;\">sin\u2009A<\/span><\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;\"><span class=\"mvar\" style=\"padding:0 .25em 3px;border-bottom:2px solid #1F2933;\">b<\/span><span class=\"mvar\" style=\"padding:3px .25em 0;\">sin\u2009B<\/span><\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;\"><span class=\"mvar\" style=\"padding:0 .25em 3px;border-bottom:2px solid #1F2933;\">c<\/span><span class=\"mvar\" style=\"padding:3px .25em 0;\">sin\u2009C<\/span><\/span><\/div>\n      <div style=\"font-size:22px;color:#5A6B76;margin-top:10px;\">side + opposite angle<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:24px 28px;box-shadow:0 3px 18px rgba(31,41,51,.06);border-top:6px solid #0F7A45;\">\n      <div style=\"font-size:24px;font-weight:700;color:#0F7A45;margin-bottom:12px;\">Cosine rule<\/div>\n      <div style=\"font-size:28px;\"><span class=\"mvar\">a<\/span>\u00b2 = <span class=\"mvar\">b<\/span>\u00b2 + <span class=\"mvar\">c<\/span>\u00b2 \u2212 2<span class=\"mvar\">bc<\/span>\u2009cos\u2009<span class=\"mvar\">A<\/span><\/div>\n      <div style=\"font-size:22px;color:#5A6B76;margin-top:10px;\">2 sides + angle, or 3 sides<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:24px 28px;box-shadow:0 3px 18px rgba(31,41,51,.06);border-top:6px solid #C23A2B;\">\n      <div style=\"font-size:24px;font-weight:700;color:#C23A2B;margin-bottom:12px;\">Area &amp; 0\u00b0\u2013360\u00b0<\/div>\n      <div style=\"font-size:26px;line-height:1.5;\">Area = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.45em;font-size:19px;line-height:1;\"><span style=\"padding:0 .25em 1px;border-bottom:2px solid #1F2933;\">1<\/span><span style=\"padding:1px .25em 0;\">2<\/span><\/span><span class=\"mvar\">ab<\/span>\u2009sin\u2009<span class=\"mvar\">C<\/span><br><span style=\"font-size:22px;color:#5A6B76;\">sin(180\u2212\u03b8)=sin\u03b8 \u00b7 two answers<\/span><\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Well done\" data-screen-label=\"Closing\" data-speaker-notes=\"Closing slide. Recap the skills mastered and encourage regular practice with the reveal questions.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#5B3FD6;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:60px;bottom:-30px;font-family:Fredoka,system-ui,sans-serif;font-size:220px;line-height:1;color:rgba(255,194,60,.16);font-weight:700;\">\u2713<\/div>\n  <div style=\"position:relative;z-index:1;max-width:1250px;\">\n    <div style=\"font-size:26px;font-weight:700;letter-spacing:.16em;color:#FFC23C;margin-bottom:18px;\">CHAPTER 15 COMPLETE<\/div>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:96px;line-height:1.02;margin-bottom:28px;\">Well done!<\/h2>\n    <p style=\"font-size:33px;color:#E7DEFF;line-height:1.4;margin-bottom:34px;\">You can now make scale drawings, work with bearings, use SOH\u2011CAH\u2011TOA, solve any triangle with the sine and cosine rules, find areas, and handle trigonometry in 3D.<\/p>\n    <div style=\"display:flex;flex-wrap:wrap;gap:16px;\">\n      <span style=\"font-size:26px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);padding:12px 24px;border-radius:999px;\">\u2713 Scale &amp; bearings<\/span>\n      <span style=\"font-size:26px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);padding:12px 24px;border-radius:999px;\">\u2713 SOH\u2009CAH\u2009TOA<\/span>\n      <span style=\"font-size:26px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);padding:12px 24px;border-radius:999px;\">\u2713 Sine &amp; cosine rules<\/span>\n      <span style=\"font-size:26px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);padding:12px 24px;border-radius:999px;\">\u2713 Area &amp; 3D<\/span>\n    <\/div>\n    <p style=\"font-size:28px;color:#C9BCFF;margin-top:36px;\">Go back and re-try every <b style=\"color:#fff;\">Your turn<\/b> and <b style=\"color:#fff;\">Exam question<\/b> with the answers hidden. Practice makes permanent.<\/p>\n  <\/div>\n<\/section>\n\n<\/x-import>\n<\/x-dc>\n\n\n\n<style>\n#penCanvas{position:fixed;inset:0;z-index:2147483640;pointer-events:none;touch-action:auto;}\n#penBar{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:2147483647;\n  display:flex;flex-wrap:wrap;justify-content:center;align-items:stretch;gap:5px;padding:5px 7px;border-radius:14px;\n  background:linear-gradient(135deg,rgba(43,70,128,.62),rgba(27,79,138,.52) 45%,rgba(104,78,180,.57));\n  -webkit-backdrop-filter:blur(16px) saturate(165%);backdrop-filter:blur(16px) saturate(165%);\n  border:1px solid rgba(255,255,255,.4);\n  box-shadow:0 6px 26px rgba(48,62,150,.45),0 1px 6px rgba(0,0,0,.25),inset 0 1px 1p
