    {

      type: "content",
      tag: "Bearings",

      html: `<p>A bearing gives a direction as an angle measured <b>clockwise from north</b>, always written with <b>three digits</b> (e.g. 045°, not 45°).</p>`,
      svg: `<svg viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Bearing diagram showing angle measured clockwise from north">

    {

      title: "Apply it: back bearings",
      question: "The bearing of point B from point A is 110°. What is the bearing of point A from point B?",

      formula: "sin θ = O/H &nbsp;&nbsp; cos θ = A/H &nbsp;&nbsp; tan θ = O/A",
      callout: "SOH-CAH-TOA: Sine = Opposite/Hypotenuse, Cosine = Adjacent/Hypotenuse, Tangent = Opposite/Adjacent."

      type: "quiz",

    {
      type: "content",

      html: `<p>A 4.8 m ladder leans against a wall, making an angle of 70° with the ground. Find how far up the wall the ladder reaches, and how far the foot of the ladder is from the wall.</p>`,
      worked: [
        "Height up the wall = opposite side; the ladder = hypotenuse",
        "sin 70° = height / 4.8  →  height = 4.8 × sin 70° ≈ 4.5 m",
        "Distance from wall = adjacent side",
        "cos 70° = distance / 4.8  →  distance = 4.8 × cos 70° ≈ 1.64 m"

      formula: "Ladder reaches 4.5 m up the wall; foot is 1.64 m from the wall"
