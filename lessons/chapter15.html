ne-height:1.02;margin-bottom:22px;\">Scale drawings<\/h2>\n    <p style=\"font-size:34px;color:#E7DEFF;max-width:1050px;line-height:1.4;\">Turn real-life lengths into a drawing that fits on paper \u2014 and read real lengths back from a map or plan.<\/p>\n  <\/div>\n<\/section>\n\n<section data-label=\"Reading a scale\" data-screen-label=\"15.1 Concept\" data-speaker-notes=\"How a scale works as a ratio. Real to drawing: divide. Drawing to real: multiply. Keep units the same.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:64px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\"><span style=\"width:52px;height:6px;background:#7C5CFF;border-radius:3px;\"><\/span><span style=\"font-size:24px;font-weight:700;letter-spacing:.14em;color:#7C5CFF;\">CONCEPT<\/span><\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:56px;margin-bottom:8px;\">Reading a scale<\/h2>\n  <p style=\"font-size:29px;color:#5A6B76;margin-bottom:26px;\">A scale like <b style=\"color:#1F2933;\">1\u2009cm : 10\u2009m<\/b> means \u201c1\u2009cm on paper stands for 10\u2009m in real life.\u201d<\/p>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:28px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:34px 40px;box-shadow:0 3px 20px rgba(31,41,51,.06);border-top:8px solid #0EA5A8;display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"font-size:30px;font-weight:700;color:#0EA5A8;\">Real life \u2192 drawing<\/div>\n      <div style=\"font-size:30px;color:#5A6B76;line-height:1.35;\">The drawing is smaller, so <b style=\"color:#1F2933;\">divide<\/b> by the scale number.<\/div>\n      <div style=\"margin-top:auto;background:#E7F7F7;border-radius:14px;padding:22px 26px;font-size:29px;\">20\u2009m real \u2192 20 \u00f7 10 = <b>2\u2009cm<\/b> on paper<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:34px 40px;box-shadow:0 3px 20px rgba(31,41,51,.06);border-top:8px solid #B0730C;display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"font-size:30px;font-weight:700;color:#B0730C;\">Drawing \u2192 real life<\/div>\n      <div style=\"font-size:30px;color:#5A6B76;line-height:1.35;\">Real life is bigger, so <b style=\"color:#1F2933;\">multiply<\/b> by the scale number.<\/div>\n      <div style=\"margin-top:auto;background:#FFF6E0;border-radius:14px;padding:22px 26px;font-size:29px;\">7\u2009cm on paper \u2192 7 \u00d7 10 = <b>70\u2009m<\/b> real<\/div>\n    <\/div>\n  <\/div>\n  <div style=\"margin-top:24px;background:#F1ECFF;border-radius:16px;padding:22px 34px;font-size:28px;color:#4a2fb0;\"><b>Before you divide or multiply<\/b>, make both lengths the same unit (all cm, or all m).<\/div>\n<\/section>\n\n<section data-label=\"Worked example 1\" data-screen-label=\"WE1\" data-speaker-notes=\"Worked example 1: rectangular field 100m by 45m, scale 1cm to 10m. Divide each real length by 10. Answers 10 cm and 4.5 cm.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:60px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 1<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">15.1 \u00b7 Scale drawings<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:.95fr 1.05fr;gap:48px;flex:1;align-items:start;\">\n    <div>\n      <p style=\"font-size:32px;line-height:1.4;margin-bottom:26px;\">A rectangular field is <b>100\u2009m<\/b> long and <b>45\u2009m<\/b> wide. A scale drawing of the field uses a scale of <b>1\u2009cm : 10\u2009m<\/b>. What are the length and width of the field <b>in the drawing<\/b>?<\/p>\n      <div style=\"background:#fff;border-radius:18px;padding:30px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;justify-content:center;\">\n        <svg viewBox=\"0 0 460 240\" style=\"width:100%;max-width:420px;height:auto;\">\n          <rect x=\"30\" y=\"60\" width=\"240\" height=\"108\" rx=\"4\" fill=\"#F1ECFF\" stroke=\"#7C5CFF\" stroke-width=\"3\"><\/rect>\n          <text x=\"150\" y=\"46\" text-anchor=\"middle\" font-family=\"Nunito\" font-size=\"20\" fill=\"#5A6B76\">real field<\/text>\n          <text x=\"150\" y=\"122\" text-anchor=\"middle\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"22\" fill=\"#1F2933\">100 m<\/text>\n          <text x=\"150\" y=\"192\" text-anchor=\"middle\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"20\" fill=\"#1F2933\">45 m wide<\/text>\n          <rect x=\"330\" y=\"96\" width=\"96\" height=\"44\" rx=\"3\" fill=\"#FFF6E0\" stroke=\"#B0730C\" stroke-width=\"3\"><\/rect>\n          <text x=\"378\" y=\"86\" text-anchor=\"middle\" font-family=\"Nunito\" font-size=\"18\" fill=\"#5A6B76\">drawing<\/text>\n          <text x=\"378\" y=\"124\" text-anchor=\"middle\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"18\" fill=\"#1F2933\">?<\/text>\n        <\/svg>\n      <\/div>\n    <\/div>\n    <details style=\"background:#fff;border-radius:20px;box-shadow:0 3px 20px rgba(31,41,51,.06);overflow:hidden;border:2px solid #ECE6D6;\">\n      <summary style=\"background:#E4F8EC;padding:26px 34px;font-size:28px;font-weight:700;color:#0F7A45;display:flex;align-items:center;gap:14px;\"><span style=\"width:34px;height:34px;border-radius:50%;background:#0F7A45;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:22px;\">\u25b6<\/span><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal the solution<\/span><span class=\"rv-open\">Solution<\/span><\/span><\/summary>\n      <div style=\"padding:32px 40px;display:flex;flex-direction:column;gap:22px;font-size:30px;line-height:1.4;\">\n        <div><b style=\"color:#7C5CFF;\">Step 1 \u00b7 <\/b>The scale is 1\u2009cm : 10\u2009m. Going from real life to the drawing, we <b>divide by 10<\/b>.<\/div>\n        <div style=\"background:#F7F5FF;border-radius:12px;padding:20px 26px;\"><b style=\"color:#0F7A45;\">Step 2 \u00b7 Length<\/b><br>100\u2009m \u00f7 10 = <b>10\u2009cm<\/b><\/div>\n        <div style=\"background:#F7F5FF;border-radius:12px;padding:20px 26px;\"><b style=\"color:#0F7A45;\">Step 3 \u00b7 Width<\/b><br>45\u2009m \u00f7 10 = <b>4.5\u2009cm<\/b><\/div>\n        <div style=\"background:#E4F8EC;border-radius:12px;padding:20px 28px;font-weight:700;font-size:32px;color:#0F7A45;\">The drawing is 10\u2009cm long and 4.5\u2009cm wide.<\/div>\n      <\/div>\n    <\/details>\n  <\/div>\n<\/section>\n\n<section data-label=\"Your turn: scale drawings\" data-screen-label=\"15.1 Your turn\" data-speaker-notes=\"Practice. Q1 divide, Q2 multiply. Reveal answers.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:60px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#0EA5A8;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">YOUR TURN<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">15.1 \u00b7 Scale drawings<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:36px 40px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#0EA5A8;margin-bottom:14px;\">Question 1<\/div>\n      <p style=\"font-size:31px;line-height:1.4;margin-bottom:24px;\">A road is <b>250\u2009m<\/b> long. A map uses the scale <b>1\u2009cm : 25\u2009m<\/b>. How long is the road on the map?<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E7F7F7;color:#0EA5A8;font-weight:700;font-size:25px;padding:16px 26px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show answer \u25be<\/span><span class=\"rv-open\">Hide answer \u25b4<\/span><\/span><\/summary><div style=\"margin-top:16px;background:#F7F5FF;border-radius:12px;padding:22px 28px;font-size:29px;line-height:1.4;\">Real \u2192 drawing, so divide:<br>250 \u00f7 25 = <b>10\u2009cm<\/b> on the map.<\/div><\/details>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:36px 40px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#0EA5A8;margin-bottom:14px;\">Question 2<\/div>\n      <p style=\"font-size:31px;line-height:1.4;margin-bottom:24px;\">On the same map (<b>1\u2009cm : 25\u2009m<\/b>), a lake measures <b>6\u2009cm<\/b> across. What is the real width of the lake?<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E7F7F7;color:#0EA5A8;font-weight:700;font-size:25px;padding:16px 26px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show answer \u25be<\/span><span class=\"rv-open\">Hide answer \u25b4<\/span><\/span><\/summary><div style=\"margin-top:16px;background:#F7F5FF;border-radius:12px;padding:22px 28px;font-size:29px;line-height:1.4;\">Drawing \u2192 real, so multiply:<br>6 \u00d7 25 = <b>150\u2009m<\/b> in real life.<\/div><\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"15.2 Bearings\" data-screen-label=\"Section 15.2\" data-speaker-notes=\"Section header for 15.2 Bearings.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#5B3FD6;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:70px;bottom:-40px;font-family:Fredoka,system-ui,sans-serif;font-size:300px;line-height:1;color:rgba(255,194,60,.16);font-weight:700;\">15.2<\/div>\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-size:26px;font-weight:700;letter-spacing:.16em;color:#FFC23C;margin-bottom:18px;\">SECTION 15.2<\/div>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:100px;line-height:1.02;margin-bottom:22px;\">Bearings<\/h2>\n    <p style=\"font-size:34px;color:#E7DEFF;max-width:1050px;line-height:1.4;\">Describe any direction with a three-figure angle, measured clockwise from North.<\/p>\n  <\/div>\n<\/section>\n\n<section data-label=\"Stating a bearing\" data-screen-label=\"15.2 Concept\" data-speaker-notes=\"Reading two bearings. 118 degrees points south-east of North. 315 degrees points north-west. Always three figures, clockwise from North.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:60px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\"><span style=\"width:52px;height:6px;background:#7C5CFF;border-radius:3px;\"><\/span><span style=\"font-size:24px;font-weight:700;letter-spacing:.14em;color:#7C5CFF;\">CONCEPT<\/span><\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:56px;margin-bottom:6px;\">Stating a bearing<\/h2>\n  <p style=\"font-size:28px;color:#5A6B76;margin-bottom:22px;\">Start at the North line, turn <b>clockwise<\/b> to the direction, and read the angle as <b>three figures<\/b>.<\/p>\n  <div style=\"display:grid;grid-template-columns:1.06fr .94fr;gap:40px;flex:1;align-items:stretch;\">\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"font-size:26px;font-weight:700;color:#7C5CFF;\">Step by step<\/div>\n      <div style=\"display:flex;gap:16px;align-items:center;background:#fff;border-radius:14px;padding:16px 22px;box-shadow:0 2px 12px rgba(31,41,51,.05);\"><span style=\"flex-shrink:0;width:46px;height:46px;border-radius:50%;background:#F1ECFF;color:#7C5CFF;font-weight:700;font-size:24px;display:flex;align-items:center;justify-content:center;\">1<\/span><span style=\"font-size:26px;line-height:1.3;\">Mark your point and draw the <b>North<\/b> line, straight up.<\/span><\/div>\n      <div style=\"display:flex;gap:16px;align-items:center;background:#fff;border-radius:14px;padding:16px 22px;box-shadow:0 2px 12px rgba(31,41,51,.05);\"><span style=\"flex-shrink:0;width:46px;height:46px;border-radius:50%;background:#F1ECFF;color:#7C5CFF;font-weight:700;font-size:24px;display:flex;align-items:center;justify-content:center;\">2<\/span><span style=\"font-size:26px;line-height:1.3;\">Draw the line to the place you are looking at.<\/span><\/div>\n      <div style=\"display:flex;gap:16px;align-items:center;background:#fff;border-radius:14px;padding:16px 22px;box-shadow:0 2px 12px rgba(31,41,51,.05);\"><span style=\"flex-shrink:0;width:46px;height:46px;border-radius:50%;background:#F1ECFF;color:#7C5CFF;font-weight:700;font-size:24px;display:flex;align-items:center;justify-content:center;\">3<\/span><span style=\"font-size:26px;line-height:1.3;\">From North, turn <b>clockwise<\/b> until you reach that line.<\/span><\/div>\n      <div style=\"display:flex;gap:16px;align-items:center;background:#fff;border-radius:14px;padding:16px 22px;box-shadow:0 2px 12px rgba(31,41,51,.05);\"><span style=\"flex-shrink:0;width:46px;height:46px;border-radius:50%;background:#F1ECFF;color:#7C5CFF;font-weight:700;font-size:24px;display:flex;align-items:center;justify-content:center;\">4<\/span><span style=\"font-size:26px;line-height:1.3;\">Measure the angle. Write it with <b>three figures<\/b> (e.g. 118\u00b0).<\/span><\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:20px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;align-items:center;justify-content:center;\">\n      <svg viewBox=\"0 0 360 340\" style=\"width:100%;max-width:320px;height:auto;\">\n        <line x1=\"160\" y1=\"200\" x2=\"160\" y2=\"55\" stroke=\"#1F2933\" stroke-width=\"4\"><\/line>\n        <polygon points=\"160,36 150,60 170,60\" fill=\"#1F2933\"><\/polygon>\n        <text x=\"160\" y=\"26\" text-anchor=\"middle\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"22\" fill=\"#1F2933\">N<\/text>\n        <line x1=\"160\" y1=\"200\" x2=\"297\" y2=\"273\" stroke=\"#7C5CFF\" stroke-width=\"4\"><\/line>\n        <polygon points=\"297,273 279.7,271.7 286.3,259.3\" fill=\"#7C5CFF\"><\/polygon>\n        <path d=\"M160,138 A62,62 0 0,1 214.7,229.1\" fill=\"none\" stroke=\"#B0730C\" stroke-width=\"3.5\"><\/path>\n        <text x=\"188\" y=\"150\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"26\" fill=\"#B0730C\">118\u00b0<\/text>\n        <circle cx=\"160\" cy=\"200\" r=\"6\" fill=\"#1F2933\"><\/circle>\n        <text x=\"136\" y=\"222\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"24\" fill=\"#1F2933\">O<\/text>\n        <text x=\"305\" y=\"285\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"24\" fill=\"#7C5CFF\">P<\/text>\n      <\/svg>\n      <div style=\"font-size:26px;color:#5A6B76;margin-top:6px;text-align:center;\">Bearing of <b class=\"mvar\">P<\/b> from <b class=\"mvar\">O<\/b> = <b style=\"color:#B0730C;\">118\u00b0<\/b><\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Worked example 2\" data-screen-label=\"WE2\" data-speaker-notes=\"Worked example 2: back bearing. Bearing of B from A is 048 degrees. Because it is under 180, add 180 to get 228 degrees for the bearing of A from B. Uses co-interior angles between parallel North lines.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 2<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">15.2 \u00b7 Back bearing<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:.95fr 1.05fr;gap:44px;flex:1;align-items:start;\">\n    <div>\n      <p style=\"font-size:32px;line-height:1.4;margin-bottom:24px;\">The bearing of town <b class=\"mvar\">B<\/b> from city <b class=\"mvar\">A<\/b> is <b>048\u00b0<\/b>. What is the bearing of city <b class=\"mvar\">A<\/b> from town <b class=\"mvar\">B<\/b>?<\/p>\n      <div style=\"background:#fff;border-radius:18px;padding:24px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;justify-content:center;\">\n        <svg viewBox=\"0 0 440 340\" style=\"width:100%;max-width:390px;height:auto;\">\n          <line x1=\"110\" y1=\"275\" x2=\"110\" y2=\"60\" stroke=\"#8A97A4\" stroke-width=\"3\" stroke-dasharray=\"6 5\"><\/line>\n          <text x=\"110\" y=\"50\" text-anchor=\"middle\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"20\" fill=\"#5A6B76\">N<\/text>\n          <line x1=\"285\" y1=\"118\" x2=\"285\" y2=\"20\" stroke=\"#8A97A4\" stroke-width=\"3\" stroke-dasharray=\"6 5\"><\/line>\n          <text x=\"285\" y=\"12\" text-anchor=\"middle\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"20\" fill=\"#5A6B76\">N<\/text>\n          <line x1=\"110\" y1=\"275\" x2=\"285\" y2=\"118\" stroke=\"#7C5CFF\" stroke-width=\"4\"><\/line>\n          <path d=\"M110,217 A58,58 0 0,1 153.1,236.2\" fill=\"none\" stroke=\"#B0730C\" stroke-width=\"3\"><\/path>\n          <text x=\"120\" y=\"228\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"22\" fill=\"#B0730C\">048\u00b0<\/text>\n          <path d=\"M285,66 A52,52 0 1,1 246.4,152.8\" fill=\"none\" stroke=\"#C23A2B\" stroke-width=\"3\"><\/path>\n          <text x=\"320\" y=\"152\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"22\" fill=\"#C23A2B\">228\u00b0<\/text>\n          <circle cx=\"110\" cy=\"275\" r=\"6\" fill=\"#1F2933\"><\/circle><text x=\"84\" y=\"286\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"24\" fill=\"#1F2933\">A<\/text>\n          <circle cx=\"285\" cy=\"118\" r=\"6\" fill=\"#1F2933\"><\/circle><text x=\"295\" y=\"112\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"24\" fill=\"#1F2933\">B<\/text>\n        <\/svg>\n      <\/div>\n    <\/div>\n    <details style=\"background:#fff;border-radius:20px;box-shadow:0 3px 20px rgba(31,41,51,.06);overflow:hidden;border:2px solid #ECE6D6;\">\n      <summary style=\"background:#E4F8EC;padding:24px 34px;font-size:28px;font-weight:700;color:#0F7A45;display:flex;align-items:center;gap:14px;\"><span style=\"width:34px;height:34px;border-radius:50%;background:#0F7A45;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:22px;\">\u25b6<\/span><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal the solution<\/span><span class=\"rv-open\">Solution<\/span><\/span><\/summary>\n      <div style=\"padding:30px 40px;display:flex;flex-direction:column;gap:20px;font-size:30px;line-height:1.4;\">\n        <div><b style=\"color:#7C5CFF;\">Step 1 \u00b7 <\/b>The two North lines are parallel. To reverse a bearing, use the back-bearing trick.<\/div>\n        <div style=\"background:#F7F5FF;border-radius:12px;padding:20px 26px;\"><b style=\"color:#0F7A45;\">Step 2 \u00b7 <\/b>048\u00b0 is less than 180\u00b0, so <b>add 180\u00b0<\/b>.<\/div>\n        <div style=\"background:#F7F5FF;border-radius:12px;padding:20px 26px;font-size:32px;\">048\u00b0 + 180\u00b0 = <b>228\u00b0<\/b><\/div>\n        <div style=\"background:#E4F8EC;border-radius:12px;padding:20px 28px;font-weight:700;font-size:32px;color:#0F7A45;\">Bearing of A from B = 228\u00b0<\/div>\n      <\/div>\n    <\/details>\n  <\/div>\n<\/section>\n\n<section data-label=\"Your turn: bearings\" data-screen-label=\"15.2 Your turn\" data-speaker-notes=\"Practice. Q1 back bearing subtract 180. Q2 back bearing add 180.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:60px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#0EA5A8;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">YOUR TURN<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">15.2 \u00b7 Bearings<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:36px 40px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#0EA5A8;margin-bottom:14px;\">Question 1<\/div>\n      <p style=\"font-size:31px;line-height:1.4;margin-bottom:24px;\">The bearing of <b class=\"mvar\">Q<\/b> from <b class=\"mvar\">P<\/b> is <b>110\u00b0<\/b>. Find the bearing of <b class=\"mvar\">P<\/b> from <b class=\"mvar\">Q<\/b>.<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E7F7F7;color:#0EA5A8;font-weight:700;font-size:25px;padding:16px 26px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show answer \u25be<\/span><span class=\"rv-open\">Hide answer \u25b4<\/span><\/span><\/summary><div style=\"margin-top:16px;background:#F7F5FF;border-radius:12px;padding:22px 28px;font-size:29px;line-height:1.4;\">110\u00b0 &lt; 180\u00b0, so add 180\u00b0:<br>110\u00b0 + 180\u00b0 = <b>290\u00b0<\/b><\/div><\/details>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:36px 40px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#0EA5A8;margin-bottom:14px;\">Question 2<\/div>\n      <p style=\"font-size:31px;line-height:1.4;margin-bottom:24px;\">A ship sails from harbour <b class=\"mvar\">H<\/b> on a bearing of <b>250\u00b0<\/b>. On what bearing must it sail to return to <b class=\"mvar\">H<\/b>?<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E7F7F7;color:#0EA5A8;font-weight:700;font-size:25px;padding:16px 26px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show answer \u25be<\/span><span class=\"rv-open\">Hide answer \u25b4<\/span><\/span><\/summary><div style=\"margin-top:16px;background:#F7F5FF;border-radius:12px;padding:22px 28px;font-size:29px;line-height:1.4;\">250\u00b0 \u2265 180\u00b0, so subtract 180\u00b0:<br>250\u00b0 \u2212 180\u00b0 = <b>070\u00b0<\/b><\/div><\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"15.3 Sine, cosine &amp; tangent\" data-screen-label=\"Section 15.3\" data-speaker-notes=\"Section header 15.3 the tangent, cosine and sine ratios.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#5B3FD6;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:70px;bottom:-40px;font-family:Fredoka,system-ui,sans-serif;font-size:300px;line-height:1;color:rgba(255,194,60,.16);font-weight:700;\">15.3<\/div>\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-size:26px;font-weight:700;letter-spacing:.16em;color:#FFC23C;margin-bottom:18px;\">SECTION 15.3<\/div>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:92px;line-height:1.04;margin-bottom:22px;\">The tangent, cosine<br>&amp; sine ratios<\/h2>\n    <p style=\"font-size:34px;color:#E7DEFF;max-width:1080px;line-height:1.4;\">In a right-angled triangle, connect an angle to two sides \u2014 then find a missing side or a missing angle.<\/p>\n  <\/div>\n<\/section>\n\n<section data-label=\"Label &amp; choose the ratio\" data-screen-label=\"15.3 Concept\" data-speaker-notes=\"Two-step routine: first label Hyp Opp Adj from the angle, then choose the ratio that matches the two sides in the question.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\"><span style=\"width:52px;height:6px;background:#7C5CFF;border-radius:3px;\"><\/span><span style=\"font-size:24px;font-weight:700;letter-spacing:.14em;color:#7C5CFF;\">CONCEPT<\/span><\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:54px;margin-bottom:22px;\">Label the sides, then choose the ratio<\/h2>\n  <div style=\"display:grid;grid-template-columns:.9fr 1.1fr;gap:44px;flex:1;align-items:start;\">\n    <div style=\"background:#fff;border-radius:20px;padding:30px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;justify-content:center;\">\n      <svg viewBox=\"0 0 460 320\" style=\"width:100%;max-width:480px;height:auto;\">\n        <polygon points=\"50,260 380,260 380,60\" fill=\"#F7F5FF\"><\/polygon>\n        <line x1=\"50\" y1=\"260\" x2=\"380\" y2=\"260\" stroke=\"#0F7A45\" stroke-width=\"9\" stroke-linecap=\"round\"><\/line>\n        <line x1=\"380\" y1=\"260\" x2=\"380\" y2=\"60\" stroke=\"#B0730C\" stroke-width=\"9\" stroke-linecap=\"round\"><\/line>\n        <line x1=\"50\" y1=\"260\" x2=\"380\" y2=\"60\" stroke=\"#7C5CFF\" stroke-width=\"9\" stroke-linecap=\"round\"><\/line>\n        <path d=\"M358,260 L358,238 L380,238\" fill=\"none\" stroke=\"#7A8896\" stroke-width=\"3\"><\/path>\n        <path d=\"M104,260 A54,54 0 0,0 96,232\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3\"><\/path>\n        <text x=\"68\" y=\"252\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"28\" fill=\"#1F2933\">\u03b8<\/text>\n        <text x=\"185\" y=\"298\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"24\" fill=\"#0F7A45\">adjacent<\/text>\n        <text x=\"392\" y=\"168\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"24\" fill=\"#B0730C\">opposite<\/text>\n        <text x=\"150\" y=\"150\" transform=\"rotate(-31 150 150)\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"24\" fill=\"#7C5CFF\">hypotenuse<\/text>\n      <\/svg>\n    <\/div>\n    <div style=\"display:flex;flex-direction:column;gap:20px;\">\n      <div style=\"display:flex;gap:18px;align-items:center;background:#fff;border-radius:16px;padding:22px 28px;box-shadow:0 2px 14px rgba(31,41,51,.05);border-left:8px solid #7C5CFF;\"><span style=\"font-family:Fredoka;font-weight:700;font-size:34px;color:#7C5CFF;\">TOA<\/span><span style=\"font-size:28px;\">Have <b style=\"color:#B0730C;\">opposite<\/b> &amp; <b style=\"color:#0F7A45;\">adjacent<\/b>? Use <b class=\"mvar\">tan<\/b>.<\/span><\/div>\n      <div style=\"display:flex;gap:18px;align-items:center;background:#fff;border-radius:16px;padding:22px 28px;box-shadow:0 2px 14px rgba(31,41,51,.05);border-left:8px solid #7C5CFF;\"><span style=\"font-family:Fredoka;font-weight:700;font-size:34px;color:#7C5CFF;\">SOH<\/span><span style=\"font-size:28px;\">Have <b style=\"color:#B0730C;\">opposite<\/b> &amp; <b style=\"color:#7C5CFF;\">hypotenuse<\/b>? Use <b class=\"mvar\">sin<\/b>.<\/span><\/div>\n      <div style=\"display:flex;gap:18px;align-items:center;background:#fff;border-radius:16px;padding:22px 28px;box-shadow:0 2px 14px rgba(31,41,51,.05);border-left:8px solid #7C5CFF;\"><span style=\"font-family:Fredoka;font-weight:700;font-size:34px;color:#7C5CFF;\">CAH<\/span><span style=\"font-size:28px;\">Have <b style=\"color:#0F7A45;\">adjacent<\/b> &amp; <b style=\"color:#7C5CFF;\">hypotenuse<\/b>? Use <b class=\"mvar\">cos<\/b>.<\/span><\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Worked example 4\" data-screen-label=\"WE4\" data-speaker-notes=\"Worked example 4: find x to the nearest mm. Angle 56 degrees, adjacent 22.1 mm, opposite x. Have opposite and adjacent so use tan. x = 22.1 tan 56 = 32.76 rounds to 33 mm.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 4<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">15.3 \u00b7 Find a side (tan)<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:.9fr 1.1fr;gap:44px;flex:1;align-items:start;\">\n    <div>\n      <p style=\"font-size:31px;line-height:1.4;margin-bottom:20px;\">Find the value of <b class=\"mvar\">x<\/b> in the diagram. Give your answer to the nearest mm.<\/p>\n      <div style=\"background:#fff;border-radius:18px;padding:24px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;justify-content:center;\">\n        <svg viewBox=\"0 0 400 280\" style=\"width:100%;max-width:360px;height:auto;\">\n          <polygon points=\"50,230 350,230 350,60\" fill=\"#F7F5FF\"><\/polygon>\n          <line x1=\"50\" y1=\"230\" x2=\"350\" y2=\"230\" stroke=\"#0F7A45\" stroke-width=\"5\" stroke-linecap=\"round\"><\/line>\n          <line x1=\"350\" y1=\"230\" x2=\"350\" y2=\"60\" stroke=\"#B0730C\" stroke-width=\"5\" stroke-linecap=\"round\"><\/line>\n          <line x1=\"50\" y1=\"230\" x2=\"350\" y2=\"60\" stroke=\"#B7C0C7\" stroke-width=\"4\" stroke-linecap=\"round\"><\/line>\n          <path d=\"M330,230 L330,210 L350,210\" fill=\"none\" stroke=\"#7A8896\" stroke-width=\"2.5\"><\/path>\n          <path d=\"M96,230 A46,46 0 0,0 90,206\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3\"><\/path>\n          <text x=\"64\" y=\"222\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"24\" fill=\"#1F2933\">56\u00b0<\/text>\n          <text x=\"180\" y=\"262\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"23\" fill=\"#0F7A45\">22.1 mm<\/text>\n          <text x=\"360\" y=\"150\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"26\" fill=\"#B0730C\">x<\/text>\n        <\/svg>\n      <\/div>\n    <\/div>\n    <details style=\"background:#fff;border-radius:20px;box-shadow:0 3px 20px rgba(31,41,51,.06);overflow:hidden;border:2px solid #ECE6D6;\">\n      <summary style=\"background:#E4F8EC;padding:22px 34px;font-size:28px;font-weight:700;color:#0F7A45;display:flex;align-items:center;gap:14px;\"><span style=\"width:34px;height:34px;border-radius:50%;background:#0F7A45;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:22px;\">\u25b6<\/span><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal the solution<\/span><span class=\"rv-open\">Solution<\/span><\/span><\/summary>\n      <div style=\"padding:26px 40px;display:flex;flex-direction:column;gap:16px;font-size:29px;line-height:1.35;\">\n        <div><b style=\"color:#7C5CFF;\">Step 1 \u00b7 <\/b>We have the <b style=\"color:#B0730C;\">opposite<\/b> (x) and the <b style=\"color:#0F7A45;\">adjacent<\/b> (22.1). Opp &amp; Adj \u2192 use <b class=\"mvar\">tan<\/b> (TOA).<\/div>\n        <div style=\"display:flex;align-items:center;gap:14px;background:#F7F5FF;border-radius:12px;padding:18px 24px;font-size:30px;\"><span class=\"mvar\">tan\u200956\u00b0<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;font-size:26px;\"><span class=\"mvar\" style=\"padding:0 .3em 3px;border-bottom:3px solid #1F2933;color:#B0730C;\">x<\/span><span class=\"mvar\" style=\"padding:3px .3em 0;color:#0F7A45;\">22.1<\/span><\/span><\/div>\n        <div><b style=\"color:#7C5CFF;\">Step 2 \u00b7 <\/b>Rearrange: <span class=\"mvar\">x<\/span> = 22.1 \u00d7 tan\u200956\u00b0<\/div>\n        <div style=\"font-size:30px;\"><span class=\"mvar\">x<\/span> = 32.76459\u2026<\/div>\n        <div style=\"background:#E4F8EC;border-radius:12px;padding:18px 26px;font-weight:700;font-size:32px;color:#0F7A45;\"><span class=\"mvar\">x<\/span> \u2248 33\u2009mm (nearest mm)<\/div>\n      <\/div>\n    <\/details>\n  <\/div>\n<\/section>\n\n<section data-label=\"Find a side: sine &amp; cosine\" data-screen-label=\"15.3 Side sin/cos\" data-speaker-notes=\"Two more side examples: sine when you have the hypotenuse and want the opposite; cosine when you have the hypotenuse and want the adjacent.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 5<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">15.3 \u00b7 Find a side (sin &amp; cos)<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:28px 34px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#7C5CFF;margin-bottom:12px;\">(a) Using sine \u2014 SOH<\/div>\n      <p style=\"font-size:27px;line-height:1.35;margin-bottom:14px;\">Hypotenuse = 10\u2009cm, angle = 35\u00b0. Find the <b style=\"color:#B0730C;\">opposite<\/b> side <span class=\"mvar\">x<\/span>.<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:24px;padding:14px 24px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal \u25be<\/span><span class=\"rv-open\">Hide \u25b4<\/span><\/span><\/summary><div style=\"margin-top:14px;background:#F7F5FF;border-radius:12px;padding:18px 24px;font-size:27px;line-height:1.5;\"><span class=\"mvar\">sin\u200935\u00b0<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:22px;line-height:1;\"><span class=\"mvar\" style=\"padding:0 .3em 2px;border-bottom:2px solid #1F2933;\">x<\/span><span class=\"mvar\" style=\"padding:2px .3em 0;\">10<\/span><\/span> \u2192 <span class=\"mvar\">x<\/span> = 10\u2009sin\u200935\u00b0 = <b>5.7\u2009cm<\/b><\/div><\/details>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:28px 34px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#7C5CFF;margin-bottom:12px;\">(b) Using cosine \u2014 CAH<\/div>\n      <p style=\"font-size:27px;line-height:1.35;margin-bottom:14px;\">Hypotenuse = 8\u2009cm, angle = 40\u00b0. Find the <b style=\"color:#0F7A45;\">adjacent<\/b> side <span class=\"mvar\">x<\/span>.<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:24px;padding:14px 24px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal \u25be<\/span><span class=\"rv-open\">Hide \u25b4<\/span><\/span><\/summary><div style=\"margin-top:14px;background:#F7F5FF;border-radius:12px;padding:18px 24px;font-size:27px;line-height:1.5;\"><span class=\"mvar\">cos\u200940\u00b0<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:22px;line-height:1;\"><span class=\"mvar\" style=\"padding:0 .3em 2px;border-bottom:2px solid #1F2933;\">x<\/span><span class=\"mvar\" style=\"padding:2px .3em 0;\">8<\/span><\/span> \u2192 <span class=\"mvar\">x<\/span> = 8\u2009cos\u200940\u00b0 = <b>6.1\u2009cm<\/b><\/div><\/details>\n    <\/div>\n  <\/div>\n  <div style=\"margin-top:22px;background:#F1ECFF;border-radius:14px;padding:20px 32px;font-size:27px;color:#4a2fb0;\">The unknown side is on <b>top<\/b> of the fraction, so you <b>multiply<\/b>: side = hypotenuse \u00d7 sin (or cos) of the angle.<\/div>\n<\/section>\n\n<section data-label=\"Worked examples 6 &amp; 7\" data-screen-label=\"WE6 &amp; WE7\" data-speaker-notes=\"Finding an angle. WE6: use inverse tan on a given decimal. WE7: form the fraction opposite over adjacent, then inverse tan. Remember to press SHIFT then tan.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:50px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLES 6 &amp; 7<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">15.3 \u00b7 Find an angle (inverse)<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:28px 34px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#7C5CFF;margin-bottom:10px;\">WE6 \u00b7 Find the acute angle (1\u2009dp)<\/div>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:14px;\">Whose tangent is: (a) 0.1234&nbsp;&nbsp;(b) 5&nbsp;&nbsp;(c) 2.765<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:24px;padding:14px 24px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal answers \u25be<\/span><span class=\"rv-open\">Hide \u25b4<\/span><\/span><\/summary><div style=\"margin-top:14px;background:#F7F5FF;border-radius:12px;padding:18px 24px;font-size:26px;line-height:1.6;\">(a) tan\u207b\u00b9(0.1234) = <b>7.0\u00b0<\/b><br>(b) tan\u207b\u00b9(5) = <b>78.7\u00b0<\/b><br>(c) tan\u207b\u00b9(2.765) = <b>70.1\u00b0<\/b><\/div><\/details>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:28px 34px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#7C5CFF;margin-bottom:10px;\">WE7 \u00b7 Calculate the lettered angles (1\u2009dp)<\/div>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:14px;\">From the sides: tan = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:20px;line-height:1;\"><span style=\"padding:0 .3em 2px;border-bottom:2px solid currentColor;color:#B0730C;\">opp<\/span><span style=\"padding:2px .3em 0;color:#0F7A45;\">adj<\/span><\/span><\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:24px;padding:14px 24px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal answers \u25be<\/span><span class=\"rv-open\">Hide \u25b4<\/span><\/span><\/summary><div style=\"margin-top:14px;background:#F7F5FF;border-radius:12px;padding:18px 24px;font-size:26px;line-height:1.6;\"><span class=\"mvar\">a<\/span>: tan\u207b\u00b9(<span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.45em;font-size:19px;line-height:1;\"><span style=\"padding:0 .3em 1px;border-bottom:2px solid #1F2933;\">3<\/span><span style=\"padding:1px .3em 0;\">4<\/span><\/span>) = <b>36.9\u00b0<\/b>&nbsp;&nbsp;<span class=\"mvar\">b<\/span>: tan\u207b\u00b9(<span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.45em;font-size:19px;line-height:1;\"><span style=\"padding:0 .3em 1px;border-bottom:2px solid #1F2933;\">12<\/span><span style=\"padding:1px .3em 0;\">5<\/span><\/span>) = <b>67.4\u00b0<\/b><br><span class=\"mvar\">c<\/span>: tan\u207b\u00b9(<span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.45em;font-size:19px;line-height:1;\"><span style=\"padding:0 .3em 1px;border-bottom:2px solid #1F2933;\">24<\/span><span style=\"padding:1px .3em 0;\">7<\/span><\/span>) = <b>73.7\u00b0<\/b><\/div><\/details>\n    <\/div>\n  <\/div>\n  <div style=\"margin-top:22px;background:#FFF6E0;border-radius:14px;padding:20px 32px;font-size:27px;color:#9A6A00;\"><b>Calculator:<\/b> to find an angle press <b>SHIFT<\/b> then <b>tan<\/b> (that is tan\u207b\u00b9). The same idea works with sin\u207b\u00b9 and cos\u207b\u00b9.<\/div>\n<\/section>\n\n<section data-label=\"Worked examples 8 &amp; 9\" data-screen-label=\"WE8 &amp; WE9\" data-speaker-notes=\"WE8 find a side with cosine, answer 12.3 cm. WE9 find an angle with inverse tan of 7 over 24, answer 16.3 degrees.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:50px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLES 8 &amp; 9<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">15.3 \u00b7 Putting it together<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:28px 34px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#7C5CFF;margin-bottom:10px;\">WE8 \u00b7 Find the side (3\u2009sf)<\/div>\n      <p style=\"font-size:27px;line-height:1.35;margin-bottom:14px;\">Hypotenuse = 15\u2009cm, angle = 35\u00b0. Find the <b style=\"color:#0F7A45;\">adjacent<\/b> side <span class=\"mvar\">a<\/span>.<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:24px;padding:14px 24px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal \u25be<\/span><span class=\"rv-open\">Hide \u25b4<\/span><\/span><\/summary><div style=\"margin-top:14px;background:#F7F5FF;border-radius:12px;padding:18px 24px;font-size:27px;line-height:1.55;\"><span class=\"mvar\">cos\u200935\u00b0<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:22px;line-height:1;\"><span class=\"mvar\" style=\"padding:0 .3em 2px;border-bottom:2px solid #1F2933;\">a<\/span><span class=\"mvar\" style=\"padding:2px .3em 0;\">15<\/span><\/span><br><span class=\"mvar\">a<\/span> = 15\u2009cos\u200935\u00b0 = 12.287\u2026 \u2248 <b>12.3\u2009cm<\/b><\/div><\/details>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:28px 34px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#7C5CFF;margin-bottom:10px;\">WE9 \u00b7 Find the angle (1\u2009dp)<\/div>\n      <p style=\"font-size:27px;line-height:1.35;margin-bottom:14px;\"><b style=\"color:#B0730C;\">Opposite<\/b> = 7, <b style=\"color:#0F7A45;\">adjacent<\/b> = 24. Find the angle <span class=\"mvar\">d<\/span>.<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:24px;padding:14px 24px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal \u25be<\/span><span class=\"rv-open\">Hide \u25b4<\/span><\/span><\/summary><div style=\"margin-top:14px;background:#F7F5FF;border-radius:12px;padding:18px 24px;font-size:27px;line-height:1.55;\"><span class=\"mvar\">tan\u2009d<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:22px;line-height:1;\"><span class=\"mvar\" style=\"padding:0 .3em 2px;border-bottom:2px solid #1F2933;color:#B0730C;\">7<\/span><span class=\"mvar\" style=\"padding:2px .3em 0;color:#0F7A45;\">24<\/span><\/span><br><span class=\"mvar\">d<\/span> = tan\u207b\u00b9(<span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.45em;font-size:19px;line-height:1;\"><span style=\"padding:0 .3em 1px;border-bottom:2px solid #1F2933;\">7<\/span><span style=\"padding:1px .3em 0;\">24<\/span><\/span>) = 16.26\u2026 \u2248 <b>16.3\u00b0<\/b><\/div><\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Your turn: SOH-CAH-TOA\" data-screen-label=\"15.3 Your turn\" data-speaker-notes=\"Two mixed practice questions. Q1 find a side with sine, Q2 find an angle with inverse cos.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#0EA5A8;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">YOUR TURN<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">15.3 \u00b7 Right-angled triangles<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:36px 40px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#0EA5A8;margin-bottom:14px;\">Question 1 \u00b7 find a side<\/div>\n      <p style=\"font-size:30px;line-height:1.4;margin-bottom:22px;\">A right triangle has hypotenuse <b>18\u2009cm<\/b> and an angle of <b>52\u00b0<\/b>. Find the <b>opposite<\/b> side (3\u2009sf).<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E7F7F7;color:#0EA5A8;font-weight:700;font-size:25px;padding:16px 26px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show answer \u25be<\/span><span class=\"rv-open\">Hide answer \u25b4<\/span><\/span><\/summary><div style=\"margin-top:16px;background:#F7F5FF;border-radius:12px;padding:22px 28px;font-size:28px;line-height:1.45;\"><span class=\"mvar\">x<\/span> = 18\u2009sin\u200952\u00b0 = 14.18\u2026 \u2248 <b>14.2\u2009cm<\/b><\/div><\/details>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:36px 40px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#0EA5A8;margin-bottom:14px;\">Question 2 \u00b7 find an angle<\/div>\n      <p style=\"font-size:30px;line-height:1.4;margin-bottom:22px;\"><b>Adjacent<\/b> = 9\u2009cm and <b>hypotenuse<\/b> = 15\u2009cm. Find the angle (1\u2009dp).<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E7F7F7;color:#0EA5A8;font-weight:700;font-size:25px;padding:16px 26px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Show answer \u25be<\/span><span class=\"rv-open\">Hide answer \u25b4<\/span><\/span><\/summary><div style=\"margin-top:16px;background:#F7F5FF;border-radius:12px;padding:22px 28px;font-size:28px;line-height:1.45;\">cos\u2009\u03b8 = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.45em;font-size:22px;line-height:1;\"><span style=\"padding:0 .3em 2px;border-bottom:2px solid #1F2933;\">9<\/span><span style=\"padding:2px .3em 0;\">15<\/span><\/span> \u2192 \u03b8 = cos\u207b\u00b9(0.6) = <b>53.1\u00b0<\/b><\/div><\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"15.4 Elevation &amp; depression\" data-screen-label=\"Section 15.4\" data-speaker-notes=\"Section header 15.4 applying trig with angles of elevation and depression.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#5B3FD6;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:70px;bottom:-40px;font-family:Fredoka,system-ui,sans-serif;font-size:300px;line-height:1;color:rgba(255,194,60,.16);font-weight:700;\">15.4<\/div>\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-size:26px;font-weight:700;letter-spacing:.16em;color:#FFC23C;margin-bottom:18px;\">SECTION 15.4<\/div>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:88px;line-height:1.04;margin-bottom:22px;\">Angles of elevation<br>&amp; depression<\/h2>\n    <p style=\"font-size:34px;color:#E7DEFF;max-width:1080px;line-height:1.4;\">Use right-angled trigonometry to solve real problems: ladders, ramps, heights and distances.<\/p>\n  <\/div>\n<\/section>\n\n<section data-label=\"Elevation vs depression\" data-screen-label=\"15.4 Concept\" data-speaker-notes=\"Angle of elevation is measured up from the horizontal; angle of depression is measured down from the horizontal. WE5: a plane 305 m up approaching at 3 degrees is 5820 m away.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"width:52px;height:6px;background:#7C5CFF;border-radius:3px;\"><\/span><span style=\"font-size:24px;font-weight:700;letter-spacing:.14em;color:#7C5CFF;\">CONCEPT &amp; WORKED EXAMPLE 3<\/span><\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:52px;margin-bottom:20px;\">Looking up, looking down<\/h2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:36px;flex:1;align-items:stretch;\">\n    <div style=\"background:#fff;border-radius:20px;padding:28px 34px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"display:flex;justify-content:center;\">\n        <svg viewBox=\"0 0 400 240\" style=\"width:100%;max-width:560px;height:auto;\">\n          <line x1=\"40\" y1=\"130\" x2=\"360\" y2=\"130\" stroke=\"#B7C0C7\" stroke-width=\"3\" stroke-dasharray=\"6 5\"><\/line>\n          <text x=\"200\" y=\"150\" text-anchor=\"middle\" font-family=\"Nunito\" font-size=\"18\" fill=\"#8A97A4\">horizontal<\/text>\n          <line x1=\"60\" y1=\"130\" x2=\"330\" y2=\"50\" stroke=\"#0EA5A8\" stroke-width=\"4\"><\/line>\n          <path d=\"M120,130 A60,60 0 0,0 116,113\" fill=\"none\" stroke=\"#0EA5A8\" stroke-width=\"3\"><\/path>\n          <text x=\"128\" y=\"122\" font-family=\"Nunito\" font-size=\"19\" fill=\"#0EA5A8\">elevation<\/text>\n          <line x1=\"60\" y1=\"130\" x2=\"330\" y2=\"210\" stroke=\"#C23A2B\" stroke-width=\"4\"><\/line>\n          <path d=\"M120,130 A60,60 0 0,1 116,147\" fill=\"none\" stroke=\"#C23A2B\" stroke-width=\"3\"><\/path>\n          <text x=\"128\" y=\"158\" font-family=\"Nunito\" font-size=\"19\" fill=\"#C23A2B\">depression<\/text>\n          <circle cx=\"60\" cy=\"130\" r=\"6\" fill=\"#1F2933\"><\/circle>\n        <\/svg>\n      <\/div>\n      <div style=\"font-size:27px;line-height:1.4;margin-top:14px;\"><b style=\"color:#0EA5A8;\">Elevation<\/b> = angle measured <b>up<\/b> from the horizontal.<br><b style=\"color:#C23A2B;\">Depression<\/b> = angle measured <b>down<\/b> from the horizontal.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:28px 34px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#0F7A45;margin-bottom:10px;\">WE3 \u00b7 A plane approaching<\/div>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:12px;\">A plane is <b>305\u2009m<\/b> above the ground. Its angle of approach should be <b>3\u00b0<\/b>. How far (along the ground) should it be from the airfield?<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:24px;padding:14px 24px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal \u25be<\/span><span class=\"rv-open\">Hide \u25b4<\/span><\/span><\/summary><div style=\"margin-top:14px;background:#F7F5FF;border-radius:12px;padding:18px 24px;font-size:26px;line-height:1.55;\"><span class=\"mvar\">tan\u20093\u00b0<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:21px;line-height:1;\"><span class=\"mvar\" style=\"padding:0 .3em 2px;border-bottom:2px solid #1F2933;\">305<\/span><span class=\"mvar\" style=\"padding:2px .3em 0;\">x<\/span><\/span> \u2192 <span class=\"mvar\">x<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:21px;line-height:1;\"><span class=\"mvar\" style=\"padding:0 .3em 2px;border-bottom:2px solid #1F2933;\">305<\/span><span class=\"mvar\" style=\"padding:2px .3em 0;\">tan\u20093\u00b0<\/span><\/span><br>= 5819.7\u2026 \u2248 <b>5820\u2009m<\/b> (nearest m)<\/div><\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Worked example 10\" data-screen-label=\"WE10\" data-speaker-notes=\"Ladder 4.8 m at 70 degrees. Part a uses sine to find height up the wall, 4.5 m. Part b uses cosine to find the distance of the foot from the wall, 1.64 m.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:50px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 10<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">15.4 \u00b7 The ladder problem<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:.85fr 1.15fr;gap:44px;flex:1;align-items:start;\">\n    <div>\n      <p style=\"font-size:29px;line-height:1.4;margin-bottom:18px;\">A ladder <b>4.8\u2009m<\/b> long leans against a vertical wall. It makes an angle of <b>70\u00b0<\/b> with the ground.<\/p>\n      <div style=\"background:#fff;border-radius:18px;padding:20px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;justify-content:center;\">\n        <svg viewBox=\"0 0 300 260\" style=\"width:100%;max-width:330px;height:auto;\">\n          <line x1=\"70\" y1=\"230\" x2=\"70\" y2=\"40\" stroke=\"#0F7A45\" stroke-width=\"6\"><\/line>\n          <line x1=\"70\" y1=\"230\" x2=\"240\" y2=\"230\" stroke=\"#7A8896\" stroke-width=\"6\"><\/line>\n          <line x1=\"70\" y1=\"40\" x2=\"240\" y2=\"230\" stroke=\"#7C5CFF\" stroke-width=\"6\"><\/line>\n          <path d=\"M214,230 A24,24 0 0,1 224,214\" fill=\"none\" stroke=\"#C23A2B\" stroke-width=\"3\"><\/path>\n          <text x=\"176\" y=\"222\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"20\" fill=\"#1F2933\">70\u00b0<\/text>\n          <text x=\"150\" y=\"130\" transform=\"rotate(48 150 130)\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"20\" fill=\"#7C5CFF\">4.8 m<\/text>\n          <text x=\"28\" y=\"140\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"20\" fill=\"#0F7A45\">a<\/text>\n          <text x=\"150\" y=\"252\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"20\" fill=\"#7A8896\">b<\/text>\n        <\/svg>\n      <\/div>\n    <\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;\">\n      <details style=\"background:#fff;border-radius:18px;box-shadow:0 3px 20px rgba(31,41,51,.06);overflow:hidden;border:2px solid #ECE6D6;\">\n        <summary style=\"background:#E4F8EC;padding:20px 26px;font-size:24px;font-weight:700;color:#0F7A45;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">(a) up the wall \u25be<\/span><span class=\"rv-open\">(a) up the wall \u25b4<\/span><\/span><\/summary>\n        <div style=\"padding:22px 28px;font-size:26px;line-height:1.5;\">Opposite &amp; hypotenuse \u2192 <b class=\"mvar\">sin<\/b> (SOH).<br><span class=\"mvar\">sin\u200970\u00b0<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:21px;line-height:1;\"><span class=\"mvar\" style=\"padding:0 .3em 2px;border-bottom:2px solid #1F2933;\">a<\/span><span class=\"mvar\" style=\"padding:2px .3em 0;\">4.8<\/span><\/span><br><span class=\"mvar\">a<\/span> = 4.8\u2009sin\u200970\u00b0 = <b>4.5\u2009m<\/b><\/div>\n      <\/details>\n      <details style=\"background:#fff;border-radius:18px;box-shadow:0 3px 20px rgba(31,41,51,.06);overflow:hidden;border:2px solid #ECE6D6;\">\n        <summary style=\"background:#E4F8EC;padding:20px 26px;font-size:24px;font-weight:700;color:#0F7A45;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">(b) foot from wall \u25be<\/span><span class=\"rv-open\">(b) foot from wall \u25b4<\/span><\/span><\/summary>\n        <div style=\"padding:22px 28px;font-size:26px;line-height:1.5;\">Adjacent &amp; hypotenuse \u2192 <b class=\"mvar\">cos<\/b> (CAH).<br><span class=\"mvar\">cos\u200970\u00b0<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:21px;line-height:1;\"><span class=\"mvar\" style=\"padding:0 .3em 2px;border-bottom:2px solid #1F2933;\">b<\/span><span class=\"mvar\" style=\"padding:2px .3em 0;\">4.8<\/span><\/span><br><span class=\"mvar\">b<\/span> = 4.8\u2009cos\u200970\u00b0 = <b>1.64\u2009m<\/b><\/div>\n      <\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Worked examples 11 &amp; 12\" data-screen-label=\"WE11 &amp; WE12\" data-speaker-notes=\"WE11 area of an isosceles trapezium, split into a rectangle and two right triangles. WE12 Tower Bridge: each 38 m arm raised 35 degrees; gap is 76 minus twice 38 cos 35, giving 13.7 m.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:50px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLES 11 &amp; 12<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">15.4 \u00b7 Real-world shapes<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:28px 34px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#7C5CFF;margin-bottom:10px;\">WE11 \u00b7 Trapezium area<\/div>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:12px;\">An isosceles trapezium has a base of <b>12\u2009cm<\/b> and sloping sides of <b>5\u2009cm<\/b> at <b>70\u00b0<\/b> to the base. Find its area (3\u2009sf).<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:24px;padding:14px 24px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal \u25be<\/span><span class=\"rv-open\">Hide \u25b4<\/span><\/span><\/summary><div style=\"margin-top:14px;background:#F7F5FF;border-radius:12px;padding:18px 24px;font-size:25px;line-height:1.5;\">Height = 5\u2009sin\u200970\u00b0 = 4.698<br>Overhang = 5\u2009cos\u200970\u00b0 = 1.710<br>Top = 12 \u2212 2(1.710) = 8.580<br>Area = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.45em;font-size:20px;line-height:1;\"><span style=\"padding:0 .3em 1px;border-bottom:2px solid #1F2933;\">1<\/span><span style=\"padding:1px .3em 0;\">2<\/span><\/span>(12 + 8.58)(4.698) \u2248 <b>48.3\u2009cm\u00b2<\/b><\/div><\/details>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:28px 34px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#7C5CFF;margin-bottom:10px;\">WE12 \u00b7 Tower Bridge<\/div>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:12px;\">The span between the towers is <b>76\u2009m<\/b>. The two arms each raise to <b>35\u00b0<\/b>. How wide is the gap between their ends (3\u2009sf)?<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:24px;padding:14px 24px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal \u25be<\/span><span class=\"rv-open\">Hide \u25b4<\/span><\/span><\/summary><div style=\"margin-top:14px;background:#F7F5FF;border-radius:12px;padding:18px 24px;font-size:25px;line-height:1.5;\">Each arm = 76 \u00f7 2 = 38\u2009m.<br>Horizontal reach = 38\u2009cos\u200935\u00b0 = 31.13<br>Gap = 76 \u2212 2(31.13)<br>\u2248 <b>13.7\u2009m<\/b><\/div><\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"15.5 Angles 0\u00b0 to 360\u00b0\" data-screen-label=\"Section 15.5\" data-speaker-notes=\"Section header 15.5 trig ratios of angles between 0 and 360 and their graphs.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#5B3FD6;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:70px;bottom:-40px;font-family:Fredoka,system-ui,sans-serif;font-size:300px;line-height:1;color:rgba(255,194,60,.16);font-weight:700;\">15.5<\/div>\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-size:26px;font-weight:700;letter-spacing:.16em;color:#FFC23C;margin-bottom:18px;\">SECTION 15.5 \u00b7 EXTENDED<\/div>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:92px;line-height:1.04;margin-bottom:22px;\">Trig ratios from<br>0\u00b0 to 360\u00b0<\/h2>\n    <p style=\"font-size:34px;color:#E7DEFF;max-width:1080px;line-height:1.4;\">Angles bigger than 90\u00b0 still have sine, cosine and tangent values. The graphs show why some equations have <b style=\"color:#fff;\">two answers<\/b>.<\/p>\n  <\/div>\n<\/section>\n\n<section data-label=\"Interactive: circle &amp; wave\" data-screen-label=\"15.5 Interactive\" data-speaker-notes=\"Interactive. Choose sin, cos or tan, then drag the slider or press Play. The point moves around the unit circle on the left and traces the matching wave on the right, so students see where each graph comes from. The dotted line links the circle value to the wave height.\" class=\"uc-stage\" style=\"box-sizing:border-box;width:100%;height:100%;padding:44px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:10px;\"><span style=\"width:52px;height:6px;background:#7C5CFF;border-radius:3px;\"><\/span><span style=\"font-size:24px;font-weight:700;letter-spacing:.14em;color:#7C5CFF;\">INTERACTIVE<\/span><\/div>\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-end;gap:24px;margin-bottom:12px;flex-wrap:wrap;\">\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:46px;\">Where sin, cos &amp; tan come from<\/h2>\n    <div class=\"uc-read\" style=\"font-size:29px;color:#1F2933;background:#F1ECFF;border-radius:12px;padding:10px 22px;white-space:nowrap;\">\u03b8 = 35\u00b0<\/div>\n  <\/div>\n  <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:14px;flex-wrap:wrap;\">\n    <div style=\"display:flex;gap:10px;\">\n      <button class=\"uc-mode\" data-mode=\"sin\" style=\"font-family:Nunito,sans-serif;font-weight:700;font-size:25px;padding:11px 28px;border:2px solid #7C5CFF;border-radius:999px;background:#7C5CFF;color:#fff;cursor:pointer;\">sin \u03b8<\/button>\n      <button class=\"uc-mode\" data-mode=\"cos\" style=\"font-family:Nunito,sans-serif;font-weight:700;font-size:25px;padding:11px 28px;border:2px solid #7C5CFF;border-radius:999px;background:#fff;color:#7C5CFF;cursor:pointer;\">cos \u03b8<\/button>\n      <button class=\"uc-mode\" data-mode=\"tan\" style=\"font-family:Nunito,sans-serif;font-weight:700;font-size:25px;padding:11px 28px;border:2px solid #7C5CFF;border-radius:999px;background:#fff;color:#7C5CFF;cursor:pointer;\">tan \u03b8<\/button>\n    <\/div>\n    <button class=\"uc-play\" style=\"font-family:Nunito,sans-serif;font-weight:700;font-size:24px;padding:11px 26px;border:none;border-radius:999px;background:#0EA5A8;color:#fff;cursor:pointer;\">\u25b6 Play<\/button>\n    <div style=\"flex:1;min-width:280px;display:flex;align-items:center;gap:14px;\">\n      <span style=\"font-size:23px;color:#8A97A4;font-weight:700;white-space:nowrap;\">drag \u03b8<\/span>\n      <input class=\"uc-slider\" type=\"range\" min=\"0\" max=\"360\" value=\"35\" step=\"1\" style=\"flex:1;height:10px;accent-color:#7C5CFF;cursor:pointer;\">\n    <\/div>\n  <\/div>\n  <div style=\"flex:1;min-height:0;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:20px;box-shadow:0 3px 20px rgba(31,41,51,.06);padding:14px;\">\n    <canvas class=\"uc-canvas\" width=\"1600\" height=\"700\" style=\"max-width:100%;max-height:100%;width:auto;height:auto;display:block;\"><\/canvas>\n  <\/div>\n  <div style=\"font-size:22px;color:#5A6B76;margin-top:10px;line-height:1.35;\">Pick a ratio, then <b>drag the slider<\/b> or press <b>Play<\/b>. Watch the point travel round the <b>unit circle<\/b> (left) and trace the <b>wave<\/b> (right) \u2014 the dotted line shows they are the <b>same value<\/b>.<\/div>\n<\/section>\n\n<section data-label=\"Worked examples 13 &amp; 14\" data-screen-label=\"WE13 &amp; WE14\" data-speaker-notes=\"WE13: sin 120 equals sin 60, using sin of 180 minus theta. WE14: rewrite a cosine using cos 180 minus theta equals minus cos theta.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:50px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:10px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLES 13 &amp; 14<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">15.5 \u00b7 Equal ratios<\/span><\/div>\n  <div style=\"background:#F1ECFF;border-radius:14px;padding:16px 30px;font-size:26px;color:#4a2fb0;margin-bottom:18px;\">Two useful facts: &nbsp;<b>sin(180\u00b0 \u2212 \u03b8) = sin\u2009\u03b8<\/b>&nbsp;&nbsp;and&nbsp;&nbsp;<b>cos(180\u00b0 \u2212 \u03b8) = \u2212cos\u2009\u03b8<\/b><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:28px 34px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#7C5CFF;margin-bottom:12px;\">WE13<\/div>\n      <p style=\"font-size:29px;line-height:1.35;margin-bottom:16px;\">Which <b>acute<\/b> angle has the same sine as <b>120\u00b0<\/b>?<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:24px;padding:14px 24px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal \u25be<\/span><span class=\"rv-open\">Hide \u25b4<\/span><\/span><\/summary><div style=\"margin-top:14px;background:#F7F5FF;border-radius:12px;padding:18px 24px;font-size:27px;line-height:1.5;\">sin\u2009120\u00b0 = sin(180\u00b0 \u2212 120\u00b0)<br>= sin\u200960\u00b0<br>So the acute angle is <b>60\u00b0<\/b>.<\/div><\/details>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:28px 34px;box-shadow:0 3px 20px rgba(31,41,51,.06);display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:700;color:#7C5CFF;margin-bottom:12px;\">WE14<\/div>\n      <p style=\"font-size:29px;line-height:1.35;margin-bottom:16px;\">Write each as another angle between 0\u00b0 and 180\u00b0: (a) cos\u2009100\u00b0&nbsp;&nbsp;(b) \u2212cos\u200935\u00b0<\/p>\n      <details style=\"margin-top:16px;\"><summary style=\"background:#E4F8EC;color:#0F7A45;font-weight:700;font-size:24px;padding:14px 24px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal \u25be<\/span><span class=\"rv-open\">Hide \u25b4<\/span><\/span><\/summary><div style=\"margin-top:14px;background:#F7F5FF;border-radius:12px;padding:18px 24px;font-size:27px;line-height:1.5;\">(a) cos\u2009100\u00b0 = \u2212cos(180\u00b0 \u2212 100\u00b0) = <b>\u2212cos\u200980\u00b0<\/b><br>(b) \u2212cos\u200935\u00b0 = cos(180\u00b0 \u2212 35\u00b0) = <b>cos\u2009145\u00b0<\/b><\/div><\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Worked example 15\" data-screen-label=\"WE15\" data-speaker-notes=\"Solve trig equations giving all solutions from 0 t
