document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

   <svg viewBox=\"0 0 300 300\" width=\"300\" height=\"300\" style=\"flex-shrink:0;opacity:.95;\">\n      <polygon points=\"40,250 260,250 260,70\" fill=\"none\" stroke=\"#FFC23C\" stroke-width=\"6\" stroke-linejoin=\"round\"><\/polygon>\n      <rect x=\"234\" y=\"224\" width=\"26\" height=\"26\" fill=\"none\" stroke=\"#FFC23C\" stroke-width=\"4\"><\/rect>\n      <path d=\"M40,250 A70,70 0 0,0 108,232\" fill=\"none\" stroke=\"#D9CEFA\" stroke-width=\"4\"><\/path>\n      <text x=\"82\" y=\"238\" fill=\"#D9CEFA\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"26\">\u03b8<\/text>\n    <\/svg>\n  <\/div>\n  <div style=\"font-size:24px;color:#B9A9EE;\">Tap the arrows or press \u2192 to move through the deck \u00b7 click any \u201cReveal\u201d box to check your work<\/div>\n<\/section>\n\n<section data-label=\"What you'll learn\" data-screen-label=\"Objectives\" data-speaker-notes=\"The chapter objectives, split into Core skills and the Extended-only skills highlighted on the right.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:84px 96px 76px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:12px;\">\n    <span style=\"width:52px;height:6px;background:#7C5CFF;border-radius:3px;\"><\/span>\n    <span style=\"font-size:26px;font-weight:600;letter-spacing:.14em;color:#7C5CFF;\">CHAPTER GOALS<\/span>\n  <\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:60px;margin-bottom:40px;\">In this chapter you will learn how to\u2026<\/h2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:28px;flex:1;\">\n    <div style=\"background:#fff;border-radius:22px;padding:40px 44px;box-shadow:0 2px 20px rgba(22,55,95,.06);\">\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#0F7A45;margin-bottom:22px;\">CORE SKILLS<\/div>\n      <ul style=\"list-style:none;display:flex;flex-direction:column;gap:20px;font-size:32px;line-height:1.32;\">\n        <li style=\"display:flex;gap:16px;\"><span style=\"color:#0F7A45;font-weight:700;\">\u2713<\/span><span>Make and interpret <b>scale drawings<\/b><\/span><\/li>\n        <li style=\"display:flex;gap:16px;\"><span style=\"color:#0F7A45;font-weight:700;\">\u2713<\/span><span>Measure and calculate <b>bearings<\/b><\/span><\/li>\n        <li style=\"display:flex;gap:16px;\"><span style=\"color:#0F7A45;font-weight:700;\">\u2713<\/span><span>Use <b>sine, cosine and tangent<\/b> ratios in right-angled triangles<\/span><\/li>\n        <li style=\"display:flex;gap:16px;\"><span style=\"color:#0F7A45;font-weight:700;\">\u2713<\/span><span>Find unknown <b>sides and angles<\/b> with SOH\u2011CAH\u2011TOA<\/span><\/li>\n      <\/ul>\n    <\/div>\n    <div style=\"background:#5B3FD6;color:#FFFDF6;border-radius:22px;padding:40px 44px;box-shadow:0 2px 20px rgba(22,55,95,.14);\">\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#FFC23C;margin-bottom:22px;\">EXTENDED ONLY<\/div>\n      <ul style=\"list-style:none;display:flex;flex-direction:column;gap:20px;font-size:32px;line-height:1.32;\">\n        <li style=\"display:flex;gap:16px;\"><span style=\"color:#FFC23C;font-weight:700;\">\u2605<\/span><span>Solve trig equations for <b>all angles 0\u00b0\u2013360\u00b0<\/b><\/span><\/li>\n        <li style=\"display:flex;gap:16px;\"><span style=\"color:#FFC23C;font-weight:700;\">\u2605<\/span><span>Apply the <b>sine rule<\/b> and <b>cosine rule<\/b> to any triangle<\/span><\/li>\n        <li style=\"display:flex;gap:16px;\"><span style=\"color:#FFC23C;font-weight:700;\">\u2605<\/span><span>Find the area of a triangle using <b>\u00bd\u2009ab\u2009sin\u2009C<\/b><\/span><\/li>\n        <li style=\"display:flex;gap:16px;\"><span style=\"color:#FFC23C;font-weight:700;\">\u2605<\/span><span>Use trigonometry with Pythagoras in <b>3 dimensions<\/b><\/span><\/li>\n      <\/ul>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"How to use this deck\" data-screen-label=\"Legend\" data-speaker-notes=\"Explain the five coloured labels so students recognise them throughout the deck. The Reveal boxes are the interactive part.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:84px 96px 76px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:12px;\">\n    <span style=\"width:52px;height:6px;background:#7C5CFF;border-radius:3px;\"><\/span>\n    <span style=\"font-size:26px;font-weight:600;letter-spacing:.14em;color:#7C5CFF;\">READING GUIDE<\/span>\n  <\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:60px;margin-bottom:14px;\">How to use this deck<\/h2>\n  <p style=\"font-size:30px;color:#5A6B76;margin-bottom:34px;max-width:1250px;\">Look for these five coloured labels. They tell you what each slide is for.<\/p>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;flex:1;\">\n    <div style=\"background:#fff;border-radius:18px;padding:30px 34px;display:flex;gap:24px;align-items:center;box-shadow:0 2px 16px rgba(22,55,95,.05);\"><span style=\"flex-shrink:0;background:#7C5CFF;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:10px 18px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:29px;line-height:1.3;\">A maths word with a picture and a simple example.<\/span><\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:30px 34px;display:flex;gap:24px;align-items:center;box-shadow:0 2px 16px rgba(22,55,95,.05);\"><span style=\"flex-shrink:0;background:#B0730C;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:10px 18px;border-radius:999px;\">MEMORY DRILL<\/span><span style=\"font-size:29px;line-height:1.3;\">A trick to help you remember a formula or the steps.<\/span><\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:30px 34px;display:flex;gap:24px;align-items:center;box-shadow:0 2px 16px rgba(22,55,95,.05);\"><span style=\"flex-shrink:0;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:10px 18px;border-radius:999px;\">WORKED EXAMPLE<\/span><span style=\"font-size:29px;line-height:1.3;\">A full solution. Try it first, then reveal the steps.<\/span><\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:30px 34px;display:flex;gap:24px;align-items:center;box-shadow:0 2px 16px rgba(22,55,95,.05);\"><span style=\"flex-shrink:0;background:#0EA5A8;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:10px 18px;border-radius:999px;\">YOUR TURN<\/span><span style=\"font-size:29px;line-height:1.3;\">Practice for you. The answer hides until you click.<\/span><\/div>\n    <div style=\"grid-column:1 / -1;background:#FFEEEB;border:2px dashed #C23A2B;border-radius:18px;padding:26px 34px;display:flex;gap:24px;align-items:center;\"><span style=\"flex-shrink:0;background:#C23A2B;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:10px 18px;border-radius:999px;\">EXAM QUESTION<\/span><span style=\"font-size:29px;line-height:1.3;\">Cambridge Extended (0580) style question. Reveal the full mark-scheme answer when you are ready.<\/span><\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Part 1 \u00b7 Key vocabulary\" data-screen-label=\"Divider: Vocabulary\" data-speaker-notes=\"Section divider. These 12 words are the language of the whole chapter. Each gets its own slide with a picture and an example.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#5B3FD6;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:90px;top:40px;font-family:Fredoka,system-ui,sans-serif;font-size:340px;line-height:1;color:rgba(255,194,60,.16);font-weight:600;\">01<\/div>\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-size:26px;font-weight:600;letter-spacing:.16em;color:#FFC23C;margin-bottom:20px;\">PART 1<\/div>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:104px;line-height:1.02;margin-bottom:24px;\">Key vocabulary<\/h2>\n    <p style=\"font-size:34px;color:#E7DEFF;max-width:1050px;line-height:1.4;margin-bottom:44px;\">The 12 words below are the language of this chapter. Learn the word, the picture and one example for each.<\/p>\n    <div style=\"display:flex;flex-wrap:wrap;gap:16px;max-width:1400px;\">\n      <span style=\"font-size:27px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);padding:12px 22px;border-radius:999px;\">Scale drawing<\/span>\n      <span style=\"font-size:27px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);padding:12px 22px;border-radius:999px;\">Bearing<\/span>\n      <span style=\"font-size:27px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);padding:12px 22px;border-radius:999px;\">Hypotenuse<\/span>\n      <span style=\"font-size:27px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);padding:12px 22px;border-radius:999px;\">Opposite<\/span>\n      <span style=\"font-size:27px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);padding:12px 22px;border-radius:999px;\">Adjacent<\/span>\n      <span style=\"font-size:27px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);padding:12px 22px;border-radius:999px;\">Tangent ratio<\/span>\n      <span style=\"font-size:27px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);padding:12px 22px;border-radius:999px;\">Sine ratio<\/span>\n      <span style=\"font-size:27px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);padding:12px 22px;border-radius:999px;\">Cosine ratio<\/span>\n      <span style=\"font-size:27px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);padding:12px 22px;border-radius:999px;\">Inverse function<\/span>\n      <span style=\"font-size:27px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);padding:12px 22px;border-radius:999px;\">Sine rule<\/span>\n      <span style=\"font-size:27px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);padding:12px 22px;border-radius:999px;\">Cosine rule<\/span>\n      <span style=\"font-size:27px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);padding:12px 22px;border-radius:999px;\">Projection<\/span>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Scale drawing\" data-screen-label=\"Vocab: Scale drawing\" data-speaker-notes=\"Scale drawing. Stress that every real length is divided by the same number. Read the scale as a ratio: 1 cm on paper : 5 m in real life.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#7C5CFF;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">1 / 12 \u00b7 Scale drawings<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:82px;line-height:1;margin-bottom:10px;\">Scale drawing<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:28px;\">/ skayl DRAW-ing / \u00b7 noun<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#7C5CFF;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:26px;\">A smaller (or larger) picture of a real thing, where <b>every length is shrunk by the same amount<\/b>. The <b>scale<\/b> tells you how a length on paper matches a length in real life.<\/p>\n      <div style=\"background:#F1ECFF;border-radius:16px;padding:24px 28px;font-size:30px;line-height:1.4;\">\n        <span style=\"font-weight:700;color:#7C5CFF;\">Example&nbsp;&nbsp;<\/span>Scale <b>1\u2009cm : 5\u2009m<\/b> means 1\u2009cm on paper = 5\u2009m in real life. So <b>4\u2009cm<\/b> on paper = <b>20\u2009m<\/b> in real life.\n      <\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:38px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;flex-direction:column;align-items:center;gap:22px;\">\n      <svg viewBox=\"0 0 520 300\" style=\"width:100%;max-width:460px;height:auto;\">\n        <rect x=\"30\" y=\"60\" width=\"200\" height=\"130\" rx=\"6\" fill=\"#F1ECFF\" stroke=\"#7C5CFF\" stroke-width=\"3\"><\/rect>\n        <text x=\"130\" y=\"45\" text-anchor=\"middle\" font-family=\"Nunito\" font-size=\"20\" fill=\"#5A6B76\">real field<\/text>\n        <text x=\"130\" y=\"132\" text-anchor=\"middle\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"22\" fill=\"#5B3FD6\">20 m<\/text>\n        <text x=\"130\" y=\"215\" text-anchor=\"middle\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"20\" fill=\"#5B3FD6\">50 m wide<\/text>\n        <rect x=\"330\" y=\"110\" width=\"80\" height=\"52\" rx=\"4\" fill=\"#FFC23C\" stroke=\"#B0730C\" stroke-width=\"3\"><\/rect>\n        <text x=\"370\" y=\"98\" text-anchor=\"middle\" font-family=\"Nunito\" font-size=\"18\" fill=\"#5A6B76\">drawing<\/text>\n        <text x=\"370\" y=\"142\" text-anchor=\"middle\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"18\" fill=\"#5B3FD6\">4 cm<\/text>\n        <path d=\"M250,125 L318,132\" stroke=\"#8A97A4\" stroke-width=\"2.5\" stroke-dasharray=\"6 5\" marker-end=\"url(#ar)\"><\/path>\n        <defs><marker id=\"ar\" markerWidth=\"9\" markerHeight=\"9\" refX=\"7\" refY=\"4.5\" orient=\"auto\"><path d=\"M0,0 L9,4.5 L0,9 z\" fill=\"#8A97A4\"><\/path><\/marker><\/defs>\n        <text x=\"285\" y=\"105\" text-anchor=\"middle\" font-family=\"Nunito\" font-size=\"17\" fill=\"#8A97A4\">\u00f7 500<\/text>\n      <\/svg>\n      <div style=\"font-size:26px;font-weight:600;color:#5B3FD6;background:#FFFDF6;border-radius:999px;padding:12px 28px;\">Scale&nbsp;&nbsp;1\u2009cm : 5\u2009m<\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Bearing\" data-screen-label=\"Vocab: Bearing\" data-speaker-notes=\"Bearing: a direction as an angle, clockwise from North, always three figures. Due East is 090 degrees.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#7C5CFF;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">2 / 12 \u00b7 Bearings<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:82px;line-height:1;margin-bottom:10px;\">Bearing<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:28px;\">/ BAIR-ing / \u00b7 noun<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#7C5CFF;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:22px;\">A <b>direction<\/b> written as an angle. You always measure it <b>clockwise<\/b>, starting from <b>North<\/b>, and you always write <b>three figures<\/b>.<\/p>\n      <div style=\"display:flex;gap:16px;align-items:center;background:#FFF6E0;border:2px solid #E7C078;border-radius:14px;padding:16px 24px;font-size:27px;margin-bottom:20px;\"><span style=\"font-weight:700;color:#B0730C;\">Careful&nbsp;<\/span>Write <b>040\u00b0<\/b>, not 40\u00b0. Bearings need 3 digits.<\/div>\n      <div style=\"background:#F1ECFF;border-radius:16px;padding:22px 28px;font-size:30px;line-height:1.4;\"><span style=\"font-weight:700;color:#7C5CFF;\">Example&nbsp;&nbsp;<\/span>Due East = <b>090\u00b0<\/b> &nbsp;\u00b7&nbsp; Due South = <b>180\u00b0<\/b><\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:30px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;justify-content:center;\">\n      <svg viewBox=\"0 0 420 380\" style=\"width:100%;max-width:400px;height:auto;\">\n        <line x1=\"210\" y1=\"300\" x2=\"210\" y2=\"60\" stroke=\"#5B3FD6\" stroke-width=\"4\"><\/line><polygon points=\"210,40 201,66 219,66\" fill=\"#5B3FD6\"><\/polygon>\n        <defs><marker id=\"nb\" markerWidth=\"12\" markerHeight=\"12\" refX=\"6\" refY=\"9\" orient=\"auto\"><path d=\"M6,0 L12,12 L0,12 z\" fill=\"#5B3FD6\"><\/path><\/marker>\n        <marker id=\"rb\" markerWidth=\"12\" markerHeight=\"12\" refX=\"9\" refY=\"6\" orient=\"auto\"><path d=\"M0,0 L12,6 L0,12 z\" fill=\"#B0730C\"><\/path><\/marker><\/defs>\n        <text x=\"210\" y=\"38\" text-anchor=\"middle\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"24\" fill=\"#5B3FD6\">N<\/text>\n        <line x1=\"210\" y1=\"300\" x2=\"360\" y2=\"180\" stroke=\"#B0730C\" stroke-width=\"4\" marker-end=\"url(#rb)\"><\/line>\n        <path d=\"M210,220 A80,80 0 0,1 268,242\" fill=\"none\" stroke=\"#7C5CFF\" stroke-width=\"3.5\"><\/path>\n        <text x=\"252\" y=\"205\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#7C5CFF\">040\u00b0<\/text>\n        <circle cx=\"210\" cy=\"300\" r=\"6\" fill=\"#5B3FD6\"><\/circle>\n        <text x=\"196\" y=\"326\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"26\" fill=\"#5B3FD6\">O<\/text>\n        <text x=\"372\" y=\"176\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"26\" fill=\"#B0730C\">Q<\/text>\n      <\/svg>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Hypotenuse\" data-screen-label=\"Vocab: Hypotenuse\" data-speaker-notes=\"Hypotenuse: longest side, always opposite the right angle. Colour code for the whole deck: hypotenuse = blue.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#7C5CFF;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">3 / 12 \u00b7 Right-angled triangles<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:82px;line-height:1;margin-bottom:10px;\">Hypotenuse<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:28px;\">/ hy-POT-uh-nooz / \u00b7 noun<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#7C5CFF;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:26px;\">The <b>longest side<\/b> of a right-angled triangle. It is <b>always opposite the right angle<\/b> (the 90\u00b0 corner), and it never touches the little square.<\/p>\n      <div style=\"background:#F1ECFF;border-radius:16px;padding:24px 28px;font-size:30px;line-height:1.4;\"><span style=\"font-weight:700;color:#7C5CFF;\">Remember&nbsp;&nbsp;<\/span>Find the right angle first \u2014 the side <b>facing<\/b> it is the hypotenuse.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:34px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;justify-content:center;\">\n      <svg viewBox=\"0 0 560 400\" style=\"width:100%;max-width:470px;height:auto;\">\n        <polygon points=\"60,330 470,330 470,90\" fill=\"#F7F5FF\"><\/polygon>\n        <line x1=\"60\" y1=\"330\" x2=\"470\" y2=\"330\" stroke=\"#B3BEC9\" stroke-width=\"4\" stroke-linecap=\"round\"><\/line>\n        <line x1=\"470\" y1=\"330\" x2=\"470\" y2=\"90\" stroke=\"#B3BEC9\" stroke-width=\"4\" stroke-linecap=\"round\"><\/line>\n        <line x1=\"60\" y1=\"330\" x2=\"470\" y2=\"90\" stroke=\"#7C5CFF\" stroke-width=\"10\" stroke-linecap=\"round\"><\/line>\n        <path d=\"M446,330 L446,306 L470,306\" fill=\"none\" stroke=\"#7A8896\" stroke-width=\"3\"><\/path>\n        <path d=\"M120,330 A60,60 0 0,0 111,301\" fill=\"none\" stroke=\"#5B3FD6\" stroke-width=\"3\"><\/path>\n        <text x=\"80\" y=\"322\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#5B3FD6\">\u03b8<\/text>\n        <text x=\"188\" y=\"188\" transform=\"rotate(-30.4 188 188)\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"30\" fill=\"#7C5CFF\">hypotenuse<\/text>\n      <\/svg>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Opposite\" data-screen-label=\"Vocab: Opposite\" data-speaker-notes=\"Opposite: the side across from the angle theta, not touching it. Colour code: opposite = orange.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#7C5CFF;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">4 / 12 \u00b7 Right-angled triangles<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:82px;line-height:1;margin-bottom:10px;\">Opposite<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:28px;\">/ OP-uh-zit / \u00b7 adjective<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#B0730C;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:26px;\">The side that is <b>across from<\/b> the angle you are using (we call it <span class=\"mvar\">\u03b8<\/span>). It is the only side that <b>does not touch<\/b> that angle.<\/p>\n      <div style=\"background:#FFF6E0;border-radius:16px;padding:24px 28px;font-size:30px;line-height:1.4;\"><span style=\"font-weight:700;color:#B0730C;\">Tip&nbsp;&nbsp;<\/span>Stand at the angle <span class=\"mvar\">\u03b8<\/span> and look straight ahead \u2014 the side you point at is the <b>opposite<\/b>.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:34px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;justify-content:center;\">\n      <svg viewBox=\"0 0 560 400\" style=\"width:100%;max-width:470px;height:auto;\">\n        <polygon points=\"60,330 470,330 470,90\" fill=\"#F7F5FF\"><\/polygon>\n        <line x1=\"60\" y1=\"330\" x2=\"470\" y2=\"330\" stroke=\"#B3BEC9\" stroke-width=\"4\" stroke-linecap=\"round\"><\/line>\n        <line x1=\"470\" y1=\"330\" x2=\"470\" y2=\"90\" stroke=\"#B0730C\" stroke-width=\"10\" stroke-linecap=\"round\"><\/line>\n        <line x1=\"60\" y1=\"330\" x2=\"470\" y2=\"90\" stroke=\"#B3BEC9\" stroke-width=\"4\" stroke-linecap=\"round\"><\/line>\n        <path d=\"M446,330 L446,306 L470,306\" fill=\"none\" stroke=\"#7A8896\" stroke-width=\"3\"><\/path>\n        <path d=\"M120,330 A60,60 0 0,0 111,301\" fill=\"none\" stroke=\"#5B3FD6\" stroke-width=\"3\"><\/path>\n        <text x=\"80\" y=\"322\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#5B3FD6\">\u03b8<\/text>\n        <text x=\"490\" y=\"218\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"30\" fill=\"#B0730C\">opposite<\/text>\n      <\/svg>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Adjacent\" data-screen-label=\"Vocab: Adjacent\" data-speaker-notes=\"Adjacent means next to. It is the side beside theta that is NOT the hypotenuse. Colour code: adjacent = green.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#7C5CFF;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">5 / 12 \u00b7 Right-angled triangles<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:82px;line-height:1;margin-bottom:10px;\">Adjacent<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:28px;\">/ uh-JAY-sunt / \u00b7 adjective<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#0F7A45;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:26px;\">\u201cAdjacent\u201d means <b>next to<\/b>. It is the side that is <b>beside the angle <span class=\"mvar\">\u03b8<\/span><\/b> \u2014 but it is <b>not<\/b> the hypotenuse.<\/p>\n      <div style=\"background:#E4F8EC;border-radius:16px;padding:24px 28px;font-size:30px;line-height:1.4;\"><span style=\"font-weight:700;color:#0F7A45;\">Tip&nbsp;&nbsp;<\/span>Two sides touch the angle <span class=\"mvar\">\u03b8<\/span>. The long slanted one is the hypotenuse; the <b>other one<\/b> is the adjacent.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:34px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;justify-content:center;\">\n      <svg viewBox=\"0 0 560 400\" style=\"width:100%;max-width:470px;height:auto;\">\n        <polygon points=\"60,330 470,330 470,90\" fill=\"#F7F5FF\"><\/polygon>\n        <line x1=\"60\" y1=\"330\" x2=\"470\" y2=\"330\" stroke=\"#0F7A45\" stroke-width=\"10\" stroke-linecap=\"round\"><\/line>\n        <line x1=\"470\" y1=\"330\" x2=\"470\" y2=\"90\" stroke=\"#B3BEC9\" stroke-width=\"4\" stroke-linecap=\"round\"><\/line>\n        <line x1=\"60\" y1=\"330\" x2=\"470\" y2=\"90\" stroke=\"#B3BEC9\" stroke-width=\"4\" stroke-linecap=\"round\"><\/line>\n        <path d=\"M446,330 L446,306 L470,306\" fill=\"none\" stroke=\"#7A8896\" stroke-width=\"3\"><\/path>\n        <path d=\"M120,330 A60,60 0 0,0 111,301\" fill=\"none\" stroke=\"#5B3FD6\" stroke-width=\"3\"><\/path>\n        <text x=\"80\" y=\"322\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#5B3FD6\">\u03b8<\/text>\n        <text x=\"200\" y=\"370\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"30\" fill=\"#0F7A45\">adjacent<\/text>\n      <\/svg>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Tangent ratio\" data-screen-label=\"Vocab: Tangent ratio\" data-speaker-notes=\"Tangent ratio TOA: tan theta equals opposite over adjacent. Uses the two shorter sides. Point out the stacked fraction.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#7C5CFF;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">6 / 12 \u00b7 Trigonometric ratios<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:82px;line-height:1;margin-bottom:10px;\">Tangent ratio<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:24px;\">/ TAN-junt / \u00b7 noun \u00b7 short form \u201ctan\u201d<\/div>\n      <p style=\"font-size:32px;line-height:1.4;margin-bottom:22px;\">In a right-angled triangle, the tangent of the angle is the <b style=\"color:#B0730C;\">opposite<\/b> divided by the <b style=\"color:#0F7A45;\">adjacent<\/b>. Use it when the question has these two sides.<\/p>\n      <div style=\"display:flex;align-items:center;gap:22px;background:#fff;border:2px solid #ECE6D6;border-radius:18px;padding:22px 34px;\">\n        <span class=\"mvar\" style=\"font-size:52px;\">tan\u2009\u03b8<\/span><span style=\"font-size:52px;\">=<\/span>\n        <span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;font-size:40px;\"><span style=\"padding:0 .35em 5px;border-bottom:4px solid #1F2933;color:#B0730C;font-weight:600;\">opposite<\/span><span style=\"padding:5px .35em 0;color:#0F7A45;font-weight:600;\">adjacent<\/span><\/span>\n      <\/div>\n      <div style=\"margin-top:22px;font-size:27px;color:#8A97A4;\">Memory word: <b style=\"color:#B0730C;\">T<\/b><b style=\"color:#B0730C;\">O<\/b><b style=\"color:#0F7A45;\">A<\/b> \u2014 <b>T<\/b>an = <b style=\"color:#B0730C;\">O<\/b>pposite over <b style=\"color:#0F7A45;\">A<\/b>djacent.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:34px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;justify-content:center;\">\n      <svg viewBox=\"0 0 560 400\" style=\"width:100%;max-width:470px;height:auto;\">\n        <polygon points=\"60,330 470,330 470,90\" fill=\"#F7F5FF\"><\/polygon>\n        <line x1=\"60\" y1=\"330\" x2=\"470\" y2=\"330\" stroke=\"#0F7A45\" stroke-width=\"10\" stroke-linecap=\"round\"><\/line>\n        <line x1=\"470\" y1=\"330\" x2=\"470\" y2=\"90\" stroke=\"#B0730C\" stroke-width=\"10\" stroke-linecap=\"round\"><\/line>\n        <line x1=\"60\" y1=\"330\" x2=\"470\" y2=\"90\" stroke=\"#B3BEC9\" stroke-width=\"4\" stroke-linecap=\"round\"><\/line>\n        <path d=\"M446,330 L446,306 L470,306\" fill=\"none\" stroke=\"#7A8896\" stroke-width=\"3\"><\/path>\n        <path d=\"M120,330 A60,60 0 0,0 111,301\" fill=\"none\" stroke=\"#5B3FD6\" stroke-width=\"3\"><\/path>\n        <text x=\"80\" y=\"322\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#5B3FD6\">\u03b8<\/text>\n        <text x=\"490\" y=\"218\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"27\" fill=\"#B0730C\">opp<\/text>\n        <text x=\"212\" y=\"370\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"27\" fill=\"#0F7A45\">adj<\/text>\n      <\/svg>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Sine ratio\" data-screen-label=\"Vocab: Sine ratio\" data-speaker-notes=\"Sine ratio SOH: sin theta equals opposite over hypotenuse.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#7C5CFF;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">7 / 12 \u00b7 Trigonometric ratios<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:82px;line-height:1;margin-bottom:10px;\">Sine ratio<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:24px;\">/ syn / \u00b7 noun \u00b7 short form \u201csin\u201d<\/div>\n      <p style=\"font-size:32px;line-height:1.4;margin-bottom:22px;\">The sine of the angle is the <b style=\"color:#B0730C;\">opposite<\/b> divided by the <b style=\"color:#7C5CFF;\">hypotenuse<\/b>. Use it when the question has the opposite side and the hypotenuse.<\/p>\n      <div style=\"display:flex;align-items:center;gap:22px;background:#fff;border:2px solid #ECE6D6;border-radius:18px;padding:22px 34px;\">\n        <span class=\"mvar\" style=\"font-size:52px;\">sin\u2009\u03b8<\/span><span style=\"font-size:52px;\">=<\/span>\n        <span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;font-size:40px;\"><span style=\"padding:0 .35em 5px;border-bottom:4px solid #1F2933;color:#B0730C;font-weight:600;\">opposite<\/span><span style=\"padding:5px .35em 0;color:#7C5CFF;font-weight:600;\">hypotenuse<\/span><\/span>\n      <\/div>\n      <div style=\"margin-top:22px;font-size:27px;color:#8A97A4;\">Memory word: <b style=\"color:#B0730C;\">S<\/b><b style=\"color:#B0730C;\">O<\/b><b style=\"color:#7C5CFF;\">H<\/b> \u2014 <b>S<\/b>in = <b style=\"color:#B0730C;\">O<\/b>pposite over <b style=\"color:#7C5CFF;\">H<\/b>ypotenuse.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:34px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;justify-content:center;\">\n      <svg viewBox=\"0 0 560 400\" style=\"width:100%;max-width:470px;height:auto;\">\n        <polygon points=\"60,330 470,330 470,90\" fill=\"#F7F5FF\"><\/polygon>\n        <line x1=\"60\" y1=\"330\" x2=\"470\" y2=\"330\" stroke=\"#B3BEC9\" stroke-width=\"4\" stroke-linecap=\"round\"><\/line>\n        <line x1=\"470\" y1=\"330\" x2=\"470\" y2=\"90\" stroke=\"#B0730C\" stroke-width=\"10\" stroke-linecap=\"round\"><\/line>\n        <line x1=\"60\" y1=\"330\" x2=\"470\" y2=\"90\" stroke=\"#7C5CFF\" stroke-width=\"10\" stroke-linecap=\"round\"><\/line>\n        <path d=\"M446,330 L446,306 L470,306\" fill=\"none\" stroke=\"#7A8896\" stroke-width=\"3\"><\/path>\n        <path d=\"M120,330 A60,60 0 0,0 111,301\" fill=\"none\" stroke=\"#5B3FD6\" stroke-width=\"3\"><\/path>\n        <text x=\"80\" y=\"322\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#5B3FD6\">\u03b8<\/text>\n        <text x=\"490\" y=\"218\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"27\" fill=\"#B0730C\">opp<\/text>\n        <text x=\"188\" y=\"185\" transform=\"rotate(-30.4 188 185)\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"27\" fill=\"#7C5CFF\">hyp<\/text>\n      <\/svg>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Cosine ratio\" data-screen-label=\"Vocab: Cosine ratio\" data-speaker-notes=\"Cosine ratio CAH: cos theta equals adjacent over hypotenuse.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#7C5CFF;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">8 / 12 \u00b7 Trigonometric ratios<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:82px;line-height:1;margin-bottom:10px;\">Cosine ratio<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:24px;\">/ KOH-syn / \u00b7 noun \u00b7 short form \u201ccos\u201d<\/div>\n      <p style=\"font-size:32px;line-height:1.4;margin-bottom:22px;\">The cosine of the angle is the <b style=\"color:#0F7A45;\">adjacent<\/b> divided by the <b style=\"color:#7C5CFF;\">hypotenuse<\/b>. Use it when the question has the adjacent side and the hypotenuse.<\/p>\n      <div style=\"display:flex;align-items:center;gap:22px;background:#fff;border:2px solid #ECE6D6;border-radius:18px;padding:22px 34px;\">\n        <span class=\"mvar\" style=\"font-size:52px;\">cos\u2009\u03b8<\/span><span style=\"font-size:52px;\">=<\/span>\n        <span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;font-size:40px;\"><span style=\"padding:0 .35em 5px;border-bottom:4px solid #1F2933;color:#0F7A45;font-weight:600;\">adjacent<\/span><span style=\"padding:5px .35em 0;color:#7C5CFF;font-weight:600;\">hypotenuse<\/span><\/span>\n      <\/div>\n      <div style=\"margin-top:22px;font-size:27px;color:#8A97A4;\">Memory word: <b style=\"color:#0F7A45;\">C<\/b><b style=\"color:#0F7A45;\">A<\/b><b style=\"color:#7C5CFF;\">H<\/b> \u2014 <b>C<\/b>os = <b style=\"color:#0F7A45;\">A<\/b>djacent over <b style=\"color:#7C5CFF;\">H<\/b>ypotenuse.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:34px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;justify-content:center;\">\n      <svg viewBox=\"0 0 560 400\" style=\"width:100%;max-width:470px;height:auto;\">\n        <polygon points=\"60,330 470,330 470,90\" fill=\"#F7F5FF\"><\/polygon>\n        <line x1=\"60\" y1=\"330\" x2=\"470\" y2=\"330\" stroke=\"#0F7A45\" stroke-width=\"10\" stroke-linecap=\"round\"><\/line>\n        <line x1=\"470\" y1=\"330\" x2=\"470\" y2=\"90\" stroke=\"#B3BEC9\" stroke-width=\"4\" stroke-linecap=\"round\"><\/line>\n        <line x1=\"60\" y1=\"330\" x2=\"470\" y2=\"90\" stroke=\"#7C5CFF\" stroke-width=\"10\" stroke-linecap=\"round\"><\/line>\n        <path d=\"M446,330 L446,306 L470,306\" fill=\"none\" stroke=\"#7A8896\" stroke-width=\"3\"><\/path>\n        <path d=\"M120,330 A60,60 0 0,0 111,301\" fill=\"none\" stroke=\"#5B3FD6\" stroke-width=\"3\"><\/path>\n        <text x=\"80\" y=\"322\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#5B3FD6\">\u03b8<\/text>\n        <text x=\"200\" y=\"370\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"27\" fill=\"#0F7A45\">adj<\/text>\n        <text x=\"188\" y=\"185\" transform=\"rotate(-30.4 188 185)\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"27\" fill=\"#7C5CFF\">hyp<\/text>\n      <\/svg>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Inverse function\" data-screen-label=\"Vocab: Inverse function\" data-speaker-notes=\"Inverse trig functions undo sin cos tan to give the angle back. tan of 0.75 gives angle 36.9 degrees.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#7C5CFF;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">9 / 12 \u00b7 Finding an angle<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:76px;line-height:1;margin-bottom:10px;\">Inverse function<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:24px;\">/ IN-vurss / \u00b7 written sin\u207b\u00b9, cos\u207b\u00b9, tan\u207b\u00b9<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#7C5CFF;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:32px;line-height:1.4;margin-bottom:22px;\">\u201cInverse\u201d means <b>undo<\/b> or <b>go backwards<\/b>. Normal trig turns an <b>angle<\/b> into a <b>ratio<\/b>. The inverse turns a <b>ratio back into the angle<\/b>.<\/p>\n      <div style=\"background:#FFF6E0;border-radius:16px;padding:22px 28px;font-size:29px;line-height:1.4;\"><span style=\"font-weight:700;color:#B0730C;\">Careful&nbsp;&nbsp;<\/span>tan\u207b\u00b9 does <b>not<\/b> mean <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:24px;line-height:1;\"><span style=\"padding:0 .3em 2px;border-bottom:2px solid currentColor;\">1<\/span><span style=\"padding:2px .3em 0;\">tan<\/span><\/span>. It is the \u201cfind the angle\u201d button.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:34px 40px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;flex-direction:column;gap:20px;justify-content:center;\">\n      <div style=\"font-size:22px;font-weight:700;letter-spacing:.06em;color:#8A97A4;text-align:center;\">EXAMPLE \u00b7 TWO SIDES \u2192 THE ANGLE<\/div>\n      <div style=\"display:flex;align-items:center;gap:24px;\">\n        <svg viewBox=\"0 0 250 210\" style=\"width:44%;max-width:210px;height:auto;flex-shrink:0;\">\n          <polygon points=\"34,170 214,170 214,50\" fill=\"#F7F5FF\"><\/polygon>\n          <line x1=\"34\" y1=\"170\" x2=\"214\" y2=\"170\" stroke=\"#0F7A45\" stroke-width=\"8\" stroke-linecap=\"round\"><\/line>\n          <line x1=\"214\" y1=\"170\" x2=\"214\" y2=\"50\" stroke=\"#B0730C\" stroke-width=\"8\" stroke-linecap=\"round\"><\/line>\n          <line x1=\"34\" y1=\"170\" x2=\"214\" y2=\"50\" stroke=\"#B7C0C7\" stroke-width=\"5\" stroke-linecap=\"round\"><\/line>\n          <path d=\"M196,170 L196,152 L214,152\" fill=\"none\" stroke=\"#7A8896\" stroke-width=\"2.5\"><\/path>\n          <path d=\"M70,170 A36,36 0 0,0 64,151\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3\"><\/path>\n          <text x=\"45\" y=\"163\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"22\" fill=\"#1F2933\">\u03b8<\/text>\n          <text x=\"112\" y=\"196\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"23\" fill=\"#0F7A45\">4<\/text>\n          <text x=\"224\" y=\"117\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"23\" fill=\"#B0730C\">3<\/text>\n        <\/svg>\n        <div style=\"display:flex;flex-direction:column;gap:6px;\">\n          <div style=\"display:flex;align-items:center;gap:12px;font-size:32px;\"><span class=\"mvar\">tan\u2009\u03b8<\/span>=<span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;font-size:26px;\"><span style=\"padding:0 .3em 3px;border-bottom:3px solid #1F2933;color:#B0730C;font-weight:700;\">3<\/span><span style=\"padding:3px .3em 0;color:#0F7A45;font-weight:700;\">4<\/span><\/span>= 0.75<\/div>\n          <div style=\"font-size:23px;color:#5A6B76;\">(opposite \u00f7 adjacent)<\/div>\n        <\/div>\n      <\/div>\n      <div style=\"border-top:2px dashed #ECE6D6;\"><\/div>\n      <div style=\"display:flex;align-items:center;gap:12px;justify-content:center;font-size:32px;flex-wrap:wrap;\"><span class=\"mvar\">\u03b8<\/span> = <b style=\"color:#7C5CFF;\">tan\u207b\u00b9<\/b>(0.75) = <b style=\"color:#0F7A45;\">36.9\u00b0<\/b><\/div>\n      <div style=\"font-size:23px;color:#5A6B76;line-height:1.4;text-align:center;\">On your calculator press <b>SHIFT<\/b> then <b>tan<\/b> to get <b>tan\u207b\u00b9<\/b>.<\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Sine rule\" data-screen-label=\"Vocab: Sine rule\" data-speaker-notes=\"Sine rule works for ANY triangle, not only right-angled. Pair a side with its opposite angle.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#7C5CFF;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">10 / 12 \u00b7 Any triangle<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:82px;line-height:1;margin-bottom:10px;\">Sine rule<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:24px;\">for triangles with <b>no<\/b> right angle<\/div>\n      <p style=\"font-size:32px;line-height:1.4;margin-bottom:22px;\">Works for <b>any<\/b> triangle. Each side is paired with the angle <b>opposite<\/b> it. Use when you know a <b>side and its opposite angle<\/b>.<\/p>\n      <div style=\"display:flex;align-items:center;gap:20px;background:#fff;border:2px solid #ECE6D6;border-radius:18px;padding:22px 30px;\">\n        <span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;font-size:36px;\"><span class=\"mvar\" style=\"padding:0 .3em 5px;border-bottom:4px solid #1F2933;\">a<\/span><span class=\"mvar\" style=\"padding:5px .3em 0;\">sin\u2009A<\/span><\/span>\n        <span style=\"font-size:40px;\">=<\/span>\n        <span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;font-size:36px;\"><span class=\"mvar\" style=\"padding:0 .3em 5px;border-bottom:4px solid #1F2933;\">b<\/span><span class=\"mvar\" style=\"padding:5px .3em 0;\">sin\u2009B<\/span><\/span>\n        <span style=\"font-size:40px;\">=<\/span>\n        <span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;font-size:36px;\"><span class=\"mvar\" style=\"padding:0 .3em 5px;border-bottom:4px solid #1F2933;\">c<\/span><span class=\"mvar\" style=\"padding:5px .3em 0;\">sin\u2009C<\/span><\/span>\n      <\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:34px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;justify-content:center;\">\n      <svg viewBox=\"0 0 500 380\" style=\"width:100%;max-width:440px;height:auto;\">\n        <polygon points=\"70,320 440,300 210,70\" fill=\"#F7F5FF\" stroke=\"#5B3FD6\" stroke-width=\"4\" stroke-linejoin=\"round\"><\/polygon>\n        <text x=\"52\" y=\"332\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#7C5CFF\">A<\/text>\n        <text x=\"452\" y=\"308\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#7C5CFF\">B<\/text>\n        <text x=\"205\" y=\"56\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#7C5CFF\">C<\/text>\n        <text x=\"330\" y=\"170\" class=\"mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#B0730C\">a<\/text>\n mvar\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#0F7A45\">c<\/text>\n      <\/svg>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Projection\" data-screen-label=\"Vocab: Projection\" data-speaker-notes=\"Projection is the shadow of a line onto a flat plane. In 3D the angle between a line and a plane is measured to this shadow.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#7C5CFF;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">12 / 12 \u00b7 3D trigonometry<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:82px;line-height:1;margin-bottom:10px;\">Projection<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:24px;\">/ pruh-JEK-shun / \u00b7 noun<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#7C5CFF;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:32px;line-height:1.4;margin-bottom:22px;\">The projection of a line onto a flat surface (a <b>plane<\/b>) is its <b>\u201cshadow\u201d<\/b> straight down onto that surface.<\/p>\n      <div style=\"background:#F1ECFF;border-radius:16px;padding:22px 28px;font-size:29px;line-height:1.4;\"><span style=\"font-weight:700;color:#7C5CFF;\">Why it matters&nbsp;&nbsp;<\/span>In 3D, the <b>angle between a line and a plane<\/b> is the angle between the line and its <b>shadow<\/b> on the plane.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:34px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;justify-content:center;\">\n      <svg viewBox=\"0 0 500 380\" style=\"width:100%;max-width:440px;height:auto;\">\n        <polygon points=\"60,300 320,300 440,220 180,220\" fill=\"#F1ECFF\" stroke=\"#9AA7B4\" stroke-width=\"2.5\"><\/polygon>\n        <text x=\"330\" y=\"205\" font-family=\"Nunito\" font-size=\"20\" fill=\"#8A97A4\">plane (floor)<\/text>\n        <line x1=\"150\" y1=\"260\" x2=\"300\" y2=\"90\" stroke=\"#C23A2B\" stroke-width=\"6\" stroke-linecap=\"round\"><\/line>\n        <text x=\"238\" y=\"150\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"22\" fill=\"#C23A2B\">line<\/text>\n        <line x1=\"300\" y1=\"90\" x2=\"300\" y2=\"245\" stroke=\"#8A97A4\" stroke-width=\"3\" stroke-dasharray=\"7 6\"><\/line>\n        <line x1=\"150\" y1=\"260\" x2=\"300\" y2=\"245\" stroke=\"#0F7A45\" stroke-width=\"6\" stroke-linecap=\"round\"><\/line>\n        <text x=\"150\" y=\"290\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"22\" fill=\"#0F7A45\">shadow (projection)<\/text>\n        <path d=\"M182,258 A34,34 0 0,0 178,238\" fill=\"none\" stroke=\"#5B3FD6\" stroke-width=\"3\"><\/path>\n        <text x=\"196\" y=\"248\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"24\" fill=\"#5B3FD6\">\u03b8<\/text>\n        <circle cx=\"150\" cy=\"260\" r=\"6\" fill=\"#5B3FD6\"><\/circle><circle cx=\"300\" cy=\"90\" r=\"6\" fill=\"#C23A2B\"><\/circle>\n      <\/svg>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Part 2 \u00b7 Memory drills\" data-screen-label=\"Divider: Memory drills\" data-speaker-notes=\"Section divider for memory drills. These slides give tricks and step lists to remember formulas and methods.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#5B3FD6;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:90px;top:40px;font-family:Fredoka,system-ui,sans-serif;font-size:340px;line-height:1;color:rgba(255,194,60,.16);font-weight:600;\">02<\/div>\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-size:26px;font-weight:600;letter-spacing:.16em;color:#FFC23C;margin-bottom:20px;\">PART 2<\/div>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:104px;line-height:1.02;margin-bottom:24px;\">Memory drills<\/h2>\n    <p style=\"font-size:34px;color:#E7DEFF;max-width:1080px;line-height:1.4;\">Short tricks to hold the formulas and the method steps in your head. <b style=\"color:#fff;\">Tap a card to flip it<\/b> and check your memory.<\/p>\n  <\/div>\n<\/section>\n\n<section data-label=\"Drill: SOH-CAH-TOA\" data-screen-label=\"Drill: SOHCAHTOA\" data-speaker-notes=\"The core mnemonic. Ask students to say each triplet aloud, then flip the cards to check. The sentence gives the first letters.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:64px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:18px;\"><span style=\"white-space:nowrap;background:#B0730C;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">MEMORY DRILL<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">The three ratios<\/span><\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:60px;margin-bottom:8px;\">SOH\u2009\u2022\u2009CAH\u2009\u2022\u2009TOA<\/h2>\n  <p style=\"font-size:28px;color:#5A6B76;margin-bottom:30px;\">Tap each card to reveal the ratio. <b style=\"color:#B0730C;\">O<\/b> = opposite \u00b7 <b style=\"color:#7C5CFF;\">H<\/b> = hypotenuse \u00b7 <b style=\"color:#0F7A45;\">A<\/b> = adjacent.<\/p>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:28px;flex:1;\">\n    <details style=\"background:#fff;border-radius:20px;box-shadow:0 3px 20px rgba(22,55,95,.07);border:2px solid #ECE6D6;\">\n      <summary style=\"min-height:250px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:36px 32px;\">\n        <div style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:88px;letter-spacing:.04em;\"><span style=\"color:#C23A2B;\">S<\/span><span style=\"color:#B0730C;\">O<\/span><span style=\"color:#7C5CFF;\">H<\/span><\/div>\n        <span class=\"rvtoggle\"><span class=\"rv-shut\" style=\"font-size:24px;color:#B0730C;font-weight:600;\">tap to flip \u25be<\/span><span class=\"rv-open\" style=\"font-size:24px;color:#8A97A4;\">\u25b4 hide<\/span><\/span>\n      <\/summary>\n      <div style=\"padding:0 32px 34px;display:flex;flex-direction:column;align-items:center;gap:12px;\">\n        <div style=\"display:flex;align-items:center;gap:14px;font-size:38px;\"><span class=\"mvar\">sin\u2009\u03b8<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;font-size:32px;\"><span style=\"padding:0 .3em 4px;border-bottom:3px solid #1F2933;color:#B0730C;font-weight:600;\">Opp<\/span><span style=\"padding:4px .3em 0;color:#7C5CFF;font-weight:600;\">Hyp<\/span><\/span><\/div>\n      <\/div>\n    <\/details>\n    <details style=\"background:#fff;border-radius:20px;box-shadow:0 3px 20px rgba(22,55,95,.07);border:2px solid #ECE6D6;\">\n      <summary style=\"min-height:250px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:36px 32px;\">\n        <div style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:88px;letter-spacing:.04em;\"><span style=\"color:#C23A2B;\">C<\/span><span style=\"color:#0F7A45;\">A<\/span><span style=\"color:#7C5CFF;\">H<\/span><\/div>\n        <span class=\"rvtoggle\"><span class=\"rv-shut\" style=\"font-size:24px;color:#B0730C;font-weight:600;\">tap to flip \u25be<\/span><span class=\"rv-open\" style=\"font-size:24px;color:#8A97A4;\">\u25b4 hide<\/span><\/span>\n      <\/summary>\n      <div style=\"padding:0 32px 34px;display:flex;flex-direction:column;align-items:center;gap:12px;\">\n        <div style=\"display:flex;align-items:center;gap:14px;font-size:38px;\"><span class=\"mvar\">cos\u2009\u03b8<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;font-size:32px;\"><span style=\"padding:0 .3em 4px;border-bottom:3px solid #1F2933;color:#0F7A45;font-weight:600;\">Adj<\/span><span style=\"padding:4px .3em 0;color:#7C5CFF;font-weight:600;\">Hyp<\/span><\/span><\/div>\n      <\/div>\n    <\/details>\n    <details style=\"background:#fff;border-radius:20px;box-shadow:0 3px 20px rgba(22,55,95,.07);border:2px solid #ECE6D6;\">\n      <summary style=\"min-height:250px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:36px 32px;\">\n        <div style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:88px;letter-spacing:.04em;\"><span style=\"color:#C23A2B;\">T<\/span><span style=\"color:#B0730C;\">O<\/span><span style=\"color:#0F7A45;\">A<\/span><\/div>\n        <span class=\"rvtoggle\"><span class=\"rv-shut\" style=\"font-size:24px;color:#B0730C;font-weight:600;\">tap to flip \u25be<\/span><span class=\"rv-open\" style=\"font-size:24px;color:#8A97A4;\">\u25b4 hide<\/span><\/span>\n      <\/summary>\n      <div style=\"padding:0 32px 34px;display:flex;flex-direction:column;align-items:center;gap:12px;\">\n        <div style=\"display:flex;align-items:center;gap:14px;font-size:38px;\"><span class=\"mvar\">tan\u2009\u03b8<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;font-size:32px;\"><span style=\"padding:0 .3em 4px;border-bottom:3px solid #1F2933;color:#B0730C;font-weight:600;\">Opp<\/span><span style=\"padding:4px .3em 0;color:#0F7A45;font-weight:600;\">Adj<\/span><\/span><\/div>\n      <\/div>\n    <\/details>\n  <\/div>\n  <div style=\"margin-top:26px;background:#5B3FD6;color:#FFFDF6;border-radius:16px;padding:24px 34px;font-size:31px;text-align:center;\">Say the sentence: \u201c<b style=\"color:#FFC23C;\">S<\/b>illy <b style=\"color:#FFC23C;\">O<\/b>ld <b style=\"color:#FFC23C;\">H<\/b>arry \u2014 <b style=\"color:#FFC23C;\">C<\/b>aught <b style=\"color:#FFC23C;\">A<\/b> <b style=\"color:#FFC23C;\">H<\/b>erring \u2014 <b style=\"color:#FFC23C;\">T<\/b>rawling <b style=\"color:#FFC23C;\">O<\/b>ff <b style=\"color:#FFC23C;\">A<\/b>merica.\u201d<\/div>\n<\/section>\n\n<section data-label=\"Drill: Steps for a side / an angle\" data-screen-label=\"Drill: Method steps\" data-speaker-notes=\"Two method checklists. The only difference: to find an angle you finish with the inverse function. Reveal the worked mini-example under each.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:64px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:18px;\"><span style=\"white-space:nowrap;background:#B0730C;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">MEMORY DRILL<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">The method, step by step<\/span><\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:56px;margin-bottom:26px;\">Right-angled triangle: the 5 steps<\/h2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:34px 40px;box-shadow:0 3px 20px rgba(22,55,95,.07);border-top:8px solid #7C5CFF;\">\n      <div style=\"font-size:30px;font-weight:700;color:#7C5CFF;margin-bottom:22px;\">To find a SIDE<\/div>\n      <ol style=\"list-style:none;display:flex;flex-direction:column;gap:18px;font-size:29px;line-height:1.32;counter-reset:s;\">\n        <li style=\"display:flex;gap:16px;\"><span style=\"flex-shrink:0;width:40px;height:40px;border-radius:50%;background:#F1ECFF;color:#7C5CFF;font-weight:700;display:flex;align-items:center;justify-content:center;\">1<\/span><span><b>Label<\/b> the sides: Hyp, Opp, Adj (from the angle).<\/span><\/li>\n        <li style=\"display:flex;gap:16px;\"><span style=\"flex-shrink:0;width:40px;height:40px;border-radius:50%;background:#F1ECFF;color:#7C5CFF;font-weight:700;display:flex;align-items:center;justify-content:center;\">2<\/span><span><b>Choose<\/b> the ratio with your two sides (SOH/CAH/TOA).<\/span><\/li>\n        <li style=\"display:flex;gap:16px;\"><span style=\"flex-shrink:0;width:40px;height:40px;border-radius:50%;background:#F1ECFF;color:#7C5CFF;font-weight:700;display:flex;align-items:center;justify-content:center;\">3<\/span><span><b>Write<\/b> the equation and put in the numbers.<\/span><\/li>\n        <li style=\"display:flex;gap:16px;\"><span style=\"flex-shrink:0;width:40px;height:40px;border-radius:50%;background:#F1ECFF;color:#7C5CFF;font-weight:700;display:flex;align-items:center;justify-content:center;\">4<\/span><span><b>Rearrange<\/b> to make the unknown the subject.<\/span><\/li>\n        <li style=\"display:flex;gap:16px;\"><span style=\"flex-shrink:0;width:40px;height:40px;border-radius:50%;background:#F1ECFF;color:#7C5CFF;font-weight:700;display:flex;align-items:center;justify-content:center;\">5<\/span><span><b>Calculate<\/b> and round as the question asks.<\/span><\/li>\n      <\/ol>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:34px 40px;box-shadow:0 3px 20px rgba(22,55,95,.07);border-top:8px solid #0EA5A8;\">\n      <div style=\"font-size:30px;font-weight:700;color:#0EA5A8;margin-bottom:22px;\">To find an ANGLE<\/div>\n      <ol style=\"list-style:none;display:flex;flex-direction:column;gap:18px;font-size:29px;line-height:1.32;\">\n        <li style=\"display:flex;gap:16px;\"><span style=\"flex-shrink:0;width:40px;height:40px;border-radius:50%;background:#E7F7F7;color:#0EA5A8;font-weight:700;display:flex;align-items:center;justify-content:center;\">1<\/span><span><b>Label<\/b> the sides: Hyp, Opp, Adj (from the angle).<\/span><\/li>\n        <li style=\"display:flex;gap:16px;\"><span style=\"flex-shrink:0;width:40px;height:40px;border-radius:50%;background:#E7F7F7;color:#0EA5A8;font-weight:700;display:flex;align-items:center;justify-content:center;\">2<\/span><span><b>Choose<\/b> the ratio with your two known sides.<\/span><\/li>\n        <li style=\"display:flex;gap:16px;\"><span style=\"flex-shrink:0;width:40px;height:40px;border-radius:50%;background:#E7F7F7;color:#0EA5A8;font-weight:700;display:flex;align-items:center;justify-content:center;\">3<\/span><span><b>Write<\/b> ratio = number (as a stacked fraction).<\/span><\/li>\n        <li style=\"display:flex;gap:16px;\"><span style=\"flex-shrink:0;width:40px;height:40px;border-radius:50%;background:#E7F7F7;color:#0EA5A8;font-weight:700;display:flex;align-items:center;justify-content:center;\">4<\/span><span><b>Inverse:<\/b> use sin\u207b\u00b9, cos\u207b\u00b9 or tan\u207b\u00b9. \u2190 the key step!<\/span><\/li>\n        <li style=\"display:flex;gap:16px;\"><span style=\"flex-shrink:0;width:40px;height:40px;border-radius:50%;background:#E7F7F7;color:#0EA5A8;font-weight:700;display:flex;align-items:center;justify-content:center;\">5<\/span><span><b>Calculate<\/b> the angle and round.<\/span><\/li>\n      <\/ol>\n    <\/div>\n  <\/div>\n  <div style=\"margin-top:24px;background:#FFF6E0;border-radius:14px;padding:20px 32px;font-size:28px;text-align:center;color:#9A6A00;\">The steps are the same \u2014 finding an <b>angle<\/b> just adds one thing at the end: the <b>inverse function<\/b>.<\/div>\n<\/section>\n\n<section data-label=\"Drill: Bearings rules\" data-screen-label=\"Drill: Bearings\" data-speaker-notes=\"Three golden rules of bearings, plus the back-bearing trick: add or subtract 180. Reveal the back-bearing example.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:64px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:18px;\"><span style=\"white-space:nowrap;background:#B0730C;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">MEMORY DRILL<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">Bearings \u2014 never forget<\/span><\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:56px;margin-bottom:26px;\">The 3 golden rules (+ back bearing)<\/h2>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:26px;\">\n    <div style=\"background:#fff;border-radius:20px;padding:30px 32px;box-shadow:0 3px 20px rgba(22,55,95,.07);text-align:center;\"><div style=\"font-size:60px;\">\ud83e\udded<\/div><div style=\"font-size:30px;font-weight:700;margin:8px 0;color:#5B3FD6;\">From North<\/div><div style=\"font-size:25px;color:#5A6B76;line-height:1.35;\">Always start measuring at the North line.<\/div><\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:30px 32px;box-shadow:0 3px 20px rgba(22,55,95,.07);text-align:center;\"><div style=\"font-size:60px;\">\u21bb<\/div><div style=\"font-size:30px;font-weight:700;margin:8px 0;color:#5B3FD6;\">Clockwise<\/div><div style=\"font-size:25px;color:#5A6B76;line-height:1.35;\">Turn the same way as a clock\u2019s hands.<\/div><\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:30px 32px;box-shadow:0 3px 20px rgba(22,55,95,.07);text-align:center;\"><div style=\"font-size:56px;font-family:Fredoka,system-ui,sans-serif;font-weight:600;color:#B0730C;\">040\u00b0<\/div><div style=\"font-size:30px;font-weight:700;margin:10px 0;color:#5B3FD6;\">Three figures<\/div><div style=\"font-size:25px;color:#5A6B76;line-height:1.35;\">Always 3 digits: write 040\u00b0, not 40\u00b0.<\/div><\/div>\n  <\/div>\n  <div style=\"margin-top:26px;background:#5B3FD6;color:#FFFDF6;border-radius:20px;padding:30px 40px;display:flex;gap:40px;align-items:center;\">\n    <div style=\"flex:1;\"><div style=\"font-size:24px;font-weight:700;letter-spacing:.08em;color:#FFC23C;margin-bottom:10px;\">BACK BEARING TRICK<\/div><div style=\"font-size:31px;line-height:1.4;\">To turn a bearing around (from B to A instead of A to B): <b>add 180\u00b0<\/b> if it is under 180\u00b0, or <b>subtract 180\u00b0<\/b> if it is 180\u00b0 or more.<\/div><\/div>\n    <details style=\"flex-shrink:0;\">\n      <summary style=\"background:#FFC23C;color:#5B3FD6;font-weight:700;font-size:26px;padding:16px 30px;border-radius:12px;\"><span class=\"rvtoggle\"><span class=\"rv-shut\">Reveal example \u25be<\/span><span class=\"rv-open\">Hide example \u25b4<\/span><\/span><\/summary>\n      <div style=\"margin-top:18px;background:rgba(255,255,255,.10);border-radius:12px;padding:22px 28px;font-size:29px;line-height:1.5;\">Bearing of B from A = <b>040\u00b0<\/b><br>Since 040\u00b0 &lt; 180\u00b0, add 180\u00b0.<br>Bearing of A from B = 040\u00b0 + 180\u00b0 = <b style=\"color:#FFC23C;\">220\u00b0<\/b><\/div>\n    <\/details>\n  <\/div>\n<\/section>\n\n<section data-label=\"Drill: Which rule do I use?\" data-screen-label=\"Drill: Rule chooser\" data-speaker-notes=\"Decision guide. First ask: is there a right angle? If yes, SOHCAHTOA or Pythagoras. If no, choose sine or cosine rule by what you are given.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:64px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:18px;\"><span style=\"white-space:nowrap;background:#B0730C;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">MEMORY DRILL<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;white-space:nowrap;\">Choosing your method<\/span><\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:56px;margin-bottom:8px;\">Which rule should I use?<\/h2>\n  <p style=\"font-size:28px;color:#5A6B76;margin-bottom:26px;\">First question every time: <b>Is there a right angle?<\/b><\/p>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:26px;flex:1;\">\n    <div style=\"background:#E4F8EC;border-radius:20px;padding:30px 36px;border:2px solid #BEE0CD;\">\n      <div style=\"font-size:27px;font-weight:700;color:#0F7A45;margin-bottom:16px;\">\u2713 YES \u2014 right-angled triangle<\/div>\n      <div style=\"font-size:29px;line-height:1.4;\"><b>SOH\u2009CAH\u2009TOA<\/b> to find a side or angle.<br><span style=\"color:#5A6B76;\">Need the third side and no angle? Use <b>Pythagoras<\/b> (<span class=\"mvar\">a<\/span>\u00b2 + <span class=\"mvar\">b<\/span>\u00b2 = <span class=\"mvar\">c<\/span>\u00b2).<\/span><\/div>\n    <\/div>\n    <div style=\"background:#FFEEEB;border-radius:20px;padding:30px 36px;border:2px solid #EAC3BC;\">\n      <div style=\"font-size:27px;font-weight:700;color:#C23A2B;margin-bottom:16px;\">\u2717 NO \u2014 any other triangle<\/div>\n      <div style=\"font-size:29px;line-height:1.4;\">Choose the <b>sine rule<\/b> or <b>cosine rule<\/b> by what you are given \u2192<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:28px 36px;box-shadow:0 3px 20px rgba(22,55,95,.06);border-left:8px solid #7C5CFF;\">\n      <div style=\"font-size:27px;font-weight:700;color:#7C5CFF;margin-bottom:10px;\">Use the SINE rule when\u2026<\/div>\n      <div style=\"font-size:28px;line-height:1.38;\">you have a <b>side and the angle opposite it<\/b> (a matching pair), plus one more piece.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:20px;padding:28px 36px;box-shadow:0 3px 20px rgba(22,55,95,.06);border-left:8px solid #5B3FD6;\">\n      <div style=\"font-size:27px;font-weight:700;color:#5B3FD6;margin-bottom:10px;\">Use the COSINE rule when\u2026<\/div>\n      <div style=\"font-size:28px;line-height:1.38;\">you have <b>2 sides + the angle between them<\/b>, or <b>all 3 sides<\/b> (to find an angle).<\/div>\n    <\/div>\n    <div style=\"grid-column:1 / -1;background:#FFF6E0;border-radius:16px;padding:22px 34px;font-size:28px;text-align:center;color:#9A6A00;\"><b>Area<\/b> of any triangle with 2 sides and the angle between them: <span class=\"mvar\">Area<\/span> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:-.5em;font-size:22px;line-height:1;\"><span style=\"padding:0 .3em 2px;border-bottom:2px solid currentColor;\">1<\/span><span style=\"padding:2px .3em 0;\">2<\/span><\/span> <span class=\"mvar\">ab<\/span>\u2009<span class=\"mvar\">sin\u2009C<\/span><\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"15.1 Scale drawings\" data-screen-label=\"Section 15.1\" data-speaker-notes=\"Section header for 15.1 Scale drawings.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#5B3FD6;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:70px;bottom:-40px;font-family:Fredoka,system-ui,sans-serif;font-size:300px;line-height:1;color:rgba(255,194,60,.16);font-weight:700;\">15.1<\/div>\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-size:26px;font-weight:700;letter-spacing:.16em;color:#FFC23C;margin-bottom:18px;\">SECTION 15.1<\/div>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:100px;li
