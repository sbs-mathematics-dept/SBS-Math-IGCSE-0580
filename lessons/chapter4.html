document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

   <p style=\"font-size:46px; font-weight:600; margin:28px 0 0; max-width:1150px;\">Collecting, organising &amp; displaying data — the fun way.<\u002Fp>\n      <div style=\"display:flex; gap:16px; margin-top:48px; font-family:'Fredoka',sans-serif; font-weight:600; font-size:28px;\">\n        <span style=\"background:#fff; color:#3A63E0; padding:14px 28px; border-radius:14px;\">4.1 Classify<\u002Fspan>\n        <span style=\"background:#fff; color:#3A63E0; padding:14px 28px; border-radius:14px;\">4.2 Organise<\u002Fspan>\n        <span style=\"background:#fff; color:#3A63E0; padding:14px 28px; border-radius:14px;\">4.3 Display<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"margin-top:56px; font-size:26px; opacity:.85; font-weight:600;\">▸ Press the arrow keys to begin<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Chapter map\" data-speaker-notes=\"Three parts. First we classify data into types. Then we organise it into tables and stem-and-leaf diagrams. Finally we display it with charts. Each part has a game or build-your-own activity.\">\n    <div style=\"position:absolute; inset:0; background:#FFF7EC; font-family:'Nunito',sans-serif; color:#16223A; padding:88px 110px; display:flex; flex-direction:column;\">\n      <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:26px; letter-spacing:2px; color:#FF5D5D;\">YOUR LEARNING JOURNEY<\u002Fdiv>\n      <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:80px; margin:8px 0 0;\">What's in this chapter<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:34px; margin-top:64px; flex:1;\">\n        <div style=\"background:#fff; border-radius:28px; padding:44px; box-shadow:0 14px 34px rgba(22,34,58,.08); border-top:14px solid #4D7CFF; display:flex; flex-direction:column;\">\n          <div style=\"width:84px; height:84px; border-radius:22px; background:#4D7CFF; color:#fff; font-family:'Fredoka',sans-serif; font-weight:700; font-size:42px; display:flex; align-items:center; justify-content:center;\">4.1<\u002Fdiv>\n          <h3 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:42px; margin:28px 0 18px;\">Collecting &amp; Classifying<\u002Fh3>\n          <ul style=\"font-size:30px; font-weight:600; line-height:1.7; padding-left:26px; margin:0; color:#3a4761;\">\n            <li>Qualitative vs quantitative<\u002Fli>\n            <li>Discrete vs continuous<\u002Fli>\n            <li>Data-sorting game<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border-radius:28px; padding:44px; box-shadow:0 14px 34px rgba(22,34,58,.08); border-top:14px solid #9B5DE5; display:flex; flex-direction:column;\">\n          <div style=\"width:84px; height:84px; border-radius:22px; background:#9B5DE5; color:#fff; font-family:'Fredoka',sans-serif; font-weight:700; font-size:42px; display:flex; align-items:center; justify-content:center;\">4.2<\u002Fdiv>\n          <h3 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:42px; margin:28px 0 18px;\">Organising Data<\u002Fh3>\n          <ul style=\"font-size:29px; font-weight:600; line-height:1.55; padding-left:26px; margin:0; color:#3a4761;\">\n            <li>Tally &amp; frequency tables<\u002Fli>\n            <li>Grouping in class intervals<\u002Fli>\n            <li>Two-way tables<\u002Fli>\n            <li>Stem-and-leaf diagrams<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border-radius:28px; padding:44px; box-shadow:0 14px 34px rgba(22,34,58,.08); border-top:14px solid #FF5D5D; display:flex; flex-direction:column;\">\n          <div style=\"width:84px; height:84px; border-radius:22px; background:#FF5D5D; color:#fff; font-family:'Fredoka',sans-serif; font-weight:700; font-size:42px; display:flex; align-items:center; justify-content:center;\">4.3<\u002Fdiv>\n          <h3 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:42px; margin:28px 0 18px;\">Displaying Data<\u002Fh3>\n          <ul style=\"font-size:30px; font-weight:600; line-height:1.7; padding-left:26px; margin:0; color:#3a4761;\">\n            <li>Pictograms &amp; bar charts<\u002Fli>\n            <li>Pie charts &amp; line graphs<\u002Fli>\n            <li>Build-your-own charts<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"4.1 Section\" data-speaker-notes=\"Section 4.1. Before we can show data, we have to know what KIND of data it is. That changes which chart we're allowed to use.\">\n    <div style=\"position:absolute; inset:0; background:linear-gradient(135deg,#4D7CFF,#3A63E0); overflow:hidden; font-family:'Nunito',sans-serif; color:#fff; display:flex; flex-direction:column; justify-content:center; padding:0 130px;\">\n      <div style=\"position:absolute; right:-60px; bottom:-80px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:560px; color:rgba(255,255,255,.10); line-height:.8;\">4.1<\u002Fdiv>\n      <div style=\"position:relative;\">\n        <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:30px; letter-spacing:3px; opacity:.85;\">PART ONE<\u002Fdiv>\n        <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:118px; margin:18px 0 0; line-height:1;\">Collecting &amp;<br>Classifying Data<\u002Fh2>\n        <p style=\"font-size:42px; font-weight:600; margin:34px 0 0; max-width:1000px;\">What type is it — words, counts, or measurements?<\u002Fp>\n        <div style=\"margin-top:30px; background:rgba(255,255,255,.16); border-radius:16px; padding:18px 26px; max-width:1120px; font-size:27px; font-weight:600; line-height:1.4;\"><strong style=\"font-family:'Fredoka',sans-serif;\">Cambridge objective:<\u002Fstrong> classify data as categorical or numerical, and numerical data as discrete or continuous.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Qual vs Quant\" data-speaker-notes=\"First split: qualitative data describes qualities in words. Quantitative data is numbers — things you count or measure. Click each card to reveal examples.\">\n    <div style=\"position:absolute; inset:0; background:#FFF7EC; font-family:'Nunito',sans-serif; color:#16223A; padding:84px 110px; display:flex; flex-direction:column;\">\n      <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:26px; letter-spacing:2px; color:#4D7CFF;\">4.1 · TYPES OF DATA<\u002Fdiv>\n      <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:74px; margin:8px 0 0;\">Qualitative vs Quantitative<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:40px; margin-top:48px; flex:1;\">\n        <div style=\"background:#fff; border-radius:28px; padding:48px; box-shadow:0 14px 34px rgba(22,34,58,.08); border:3px solid #EFE6FF; display:flex; flex-direction:column;\">\n          <h3 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:50px; margin:0; color:#9B5DE5;\">Qualitative<\u002Fh3>\n          <p style=\"font-size:34px; font-weight:600; margin:18px 0 0; line-height:1.45;\">Describes <strong>qualities<\u002Fstrong> in words or categories. You can't add it up.<\u002Fp>\n          <button onclick=\"{{ onReveal }}\" data-rk=\"qual\" style=\"margin-top:auto; align-self:flex-start; cursor:pointer; font-family:'Fredoka',sans-serif; font-weight:600; font-size:28px; background:#9B5DE5; color:#fff; border:none; padding:16px 30px; border-radius:14px; box-shadow:0 4px 0 #7B3FD0;\">Show examples<\u002Fbutton>\n          <sc-if value=\"{{ r.qual }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; flex-wrap:wrap; gap:12px; margin-top:26px; animation:fadeUp .35s ease both;\">\n              <span style=\"background:#F4ECFF; color:#6B33C0; font-weight:700; font-size:28px; padding:12px 22px; border-radius:999px;\">Eye colour<\u002Fspan>\n              <span style=\"background:#F4ECFF; color:#6B33C0; font-weight:700; font-size:28px; padding:12px 22px; border-radius:999px;\">Favourite sport<\u002Fspan>\n              <span style=\"background:#F4ECFF; color:#6B33C0; font-weight:700; font-size:28px; padding:12px 22px; border-radius:999px;\">Country of birth<\u002Fspan>\n              <span style=\"background:#F4ECFF; color:#6B33C0; font-weight:700; font-size:28px; padding:12px 22px; border-radius:999px;\">Type of pet<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border-radius:28px; padding:48px; box-shadow:0 14px 34px rgba(22,34,58,.08); border:3px solid #E2EBFF; display:flex; flex-direction:column;\">\n          <h3 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:50px; margin:0; color:#4D7CFF;\">Quantitative<\u002Fh3>\n          <p style=\"font-size:34px; font-weight:600; margin:18px 0 0; line-height:1.45;\">Uses <strong>numbers<\u002Fstrong> — things you count or measure. Splits into discrete &amp; continuous.<\u002Fp>\n          <button onclick=\"{{ onReveal }}\" data-rk=\"quant\" style=\"margin-top:auto; align-self:flex-start; cursor:pointer; font-family:'Fredoka',sans-serif; font-weight:600; font-size:28px; background:#4D7CFF; color:#fff; border:none; padding:16px 30px; border-radius:14px; box-shadow:0 4px 0 #3A63E0;\">Show examples<\u002Fbutton>\n          <sc-if value=\"{{ r.quant }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; flex-wrap:wrap; gap:12px; margin-top:26px; animation:fadeUp .35s ease both;\">\n              <span style=\"background:#E8F0FF; color:#2C4FB0; font-weight:700; font-size:28px; padding:12px 22px; border-radius:999px;\">Height (cm)<\u002Fspan>\n              <span style=\"background:#E8F0FF; color:#2C4FB0; font-weight:700; font-size:28px; padding:12px 22px; border-radius:999px;\">Number of pets<\u002Fspan>\n              <span style=\"background:#E8F0FF; color:#2C4FB0; font-weight:700; font-size:28px; padding:12px 22px; border-radius:999px;\">Mass (kg)<\u002Fspan>\n              <span style=\"background:#E8F0FF; color:#2C4FB0; font-weight:700; font-size:28px; padding:12px 22px; border-radius:999px;\">Goals scored<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Discrete vs Continuous\" data-speaker-notes=\"Quantitative data splits again. Discrete data is counted — whole numbers with gaps, like shoe sizes or goals. Continuous data is measured and can take ANY value, like height or time. Reveal the examples and note the number line difference.\">\n    <div style=\"position:absolute; inset:0; background:#FFF7EC; font-family:'Nunito',sans-serif; color:#16223A; padding:84px 110px; display:flex; flex-direction:column;\">\n      <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:26px; letter-spacing:2px; color:#4D7CFF;\">4.1 · TYPES OF NUMERICAL DATA<\u002Fdiv>\n      <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:74px; margin:8px 0 0;\">Discrete vs Continuous<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:40px; margin-top:48px; flex:1;\">\n        <div style=\"background:#fff; border-radius:28px; padding:48px; box-shadow:0 14px 34px rgba(22,34,58,.08); display:flex; flex-direction:column;\">\n          <h3 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:50px; margin:0; color:#4D7CFF;\">Discrete<\u002Fh3>\n          <p style=\"font-size:34px; font-weight:600; margin:16px 0 22px; line-height:1.45;\"><strong>Counted<\u002Fstrong> — separate values with gaps. Often whole numbers.<\u002Fp>\n          <div style=\"display:flex; align-items:center; gap:18px; height:60px;\">\n            <div style=\"width:22px; height:22px; border-radius:50%; background:#4D7CFF;\"><\u002Fdiv>\n            <div style=\"width:22px; height:22px; border-radius:50%; background:#4D7CFF;\"><\u002Fdiv>\n            <div style=\"width:22px; height:22px; border-radius:50%; background:#4D7CFF;\"><\u002Fdiv>\n            <div style=\"width:22px; height:22px; border-radius:50%; background:#4D7CFF;\"><\u002Fdiv>\n            <span style=\"font-size:26px; font-weight:700; color:#7d8aa6;\">← clear gaps between values<\u002Fspan>\n          <\u002Fdiv>\n          <button onclick=\"{{ onReveal }}\" data-rk=\"disc\" style=\"margin-top:auto; align-self:flex-start; cursor:pointer; font-family:'Fredoka',sans-serif; font-weight:600; font-size:28px; background:#4D7CFF; color:#fff; border:none; padding:16px 30px; border-radius:14px; box-shadow:0 4px 0 #3A63E0;\">Show examples<\u002Fbutton>\n          <sc-if value=\"{{ r.disc }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; flex-wrap:wrap; gap:12px; margin-top:24px; animation:fadeUp .35s ease both;\">\n              <span style=\"background:#E8F0FF; color:#2C4FB0; font-weight:700; font-size:28px; padding:12px 22px; border-radius:999px;\">Number of siblings<\u002Fspan>\n              <span style=\"background:#E8F0FF; color:#2C4FB0; font-weight:700; font-size:28px; padding:12px 22px; border-radius:999px;\">Shoe size<\u002Fspan>\n              <span style=\"background:#E8F0FF; color:#2C4FB0; font-weight:700; font-size:28px; padding:12px 22px; border-radius:999px;\">Goals scored<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border-radius:28px; padding:48px; box-shadow:0 14px 34px rgba(22,34,58,.08); display:flex; flex-direction:column;\">\n          <h3 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:50px; margin:0; color:#16C79A;\">Continuous<\u002Fh3>\n          <p style=\"font-size:34px; font-weight:600; margin:16px 0 22px; line-height:1.45;\"><strong>Measured<\u002Fstrong> — can take any value on a scale, even decimals.<\u002Fp>\n          <div style=\"display:flex; align-items:center; gap:18px; height:60px;\">\n            <div style=\"height:14px; flex:1; max-width:300px; border-radius:999px; background:linear-gradient(90deg,#16C79A,#8FE9D4);\"><\u002Fdiv>\n            <span style=\"font-size:26px; font-weight:700; color:#7d8aa6;\">← no gaps, any value<\u002Fspan>\n          <\u002Fdiv>\n          <button onclick=\"{{ onReveal }}\" data-rk=\"cont\" style=\"margin-top:auto; align-self:flex-start; cursor:pointer; font-family:'Fredoka',sans-serif; font-weight:600; font-size:28px; background:#16C79A; color:#fff; border:none; padding:16px 30px; border-radius:14px; box-shadow:0 4px 0 #0E9C78;\">Show examples<\u002Fbutton>\n          <sc-if value=\"{{ r.cont }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; flex-wrap:wrap; gap:12px; margin-top:24px; animation:fadeUp .35s ease both;\">\n              <span style=\"background:#E2FAF3; color:#0C7A5C; font-weight:700; font-size:28px; padding:12px 22px; border-radius:999px;\">Height<\u002Fspan>\n              <span style=\"background:#E2FAF3; color:#0C7A5C; font-weight:700; font-size:28px; padding:12px 22px; border-radius:999px;\">Mass<\u002Fspan>\n              <span style=\"background:#E2FAF3; color:#0C7A5C; font-weight:700; font-size:28px; padding:12px 22px; border-radius:999px;\">Time to run 100 m<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Sort game\" data-speaker-notes=\"Activity. Tap a card then tap the bin you think it belongs in — or drag it. When all six are placed, hit Check answers. Great for cold-calling: ask a student to justify each placement before checking.\">\n    <div style=\"position:absolute; inset:0; background:#FFF7EC; font-family:'Nunito',sans-serif; color:#16223A; padding:70px 90px; display:flex; flex-direction:column;\">\n      <div style=\"display:flex; align-items:flex-end; justify-content:space-between;\">\n        <div>\n          <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:26px; letter-spacing:2px; color:#FF5D5D;\">4.1 · CHALLENGE<\u002Fdiv>\n          <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:66px; margin:6px 0 0;\">Sort It! — Data Type Challenge<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"font-size:27px; font-weight:700; color:#7d8aa6;\">Tap a card, then tap a bin (or drag it in)<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; gap:14px; flex-wrap:wrap; margin-top:30px; min-height:96px; align-items:center;\">\n        <sc-for list=\"{{ trayCards }}\" as=\"c\" hint-placeholder-count=\"6\">\n          <button onclick=\"{{ onSelectCard }}\" draggable=\"true\" ondragstart=\"{{ onDragCard }}\" data-card=\"{{ c.id }}\" style=\"{{ c.style }}\">{{ c.t }}<\u002Fbutton>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ trayEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <span style=\"font-size:28px; font-weight:700; color:#9aa6bd;\">All cards placed — hit Check answers ✓<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:30px; margin-top:26px; flex:1;\">\n        <sc-for list=\"{{ bins }}\" as=\"b\" hint-placeholder-count=\"3\">\n          <div onclick=\"{{ onPlaceBin }}\" ondragover=\"{{ onDragOver }}\" ondrop=\"{{ onDropBin }}\" data-bin=\"{{ b.id }}\" style=\"{{ b.style }}\">\n            <div style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:38px; color:{{ b.color }};\">{{ b.label }}<\u002Fdiv>\n            <div style=\"font-size:24px; font-weight:700; color:#9aa6bd; margin-top:2px;\">{{ b.hint }}<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:12px; margin-top:20px;\">\n              <sc-for list=\"{{ b.cards }}\" as=\"pc\" hint-placeholder-count=\"0\">\n                <div style=\"{{ pc.style }}\">{{ pc.t }}{{ pc.mark }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; gap:18px; margin-top:26px; align-items:center;\">\n        <button onclick=\"{{ onCheckSort }}\" style=\"cursor:pointer; font-family:'Fredoka',sans-serif; font-weight:700; font-size:30px; background:#16C79A; color:#fff; border:none; padding:18px 40px; border-radius:16px; box-shadow:0 5px 0 #0E9C78;\">Check answers<\u002Fbutton>\n        <button onclick=\"{{ onResetSort }}\" style=\"cursor:pointer; font-family:'Fredoka',sans-serif; font-weight:600; font-size:30px; background:#fff; color:#16223A; border:2px solid rgba(22,34,58,.15); padding:18px 36px; border-radius:16px;\">Reset<\u002Fbutton>\n        <sc-if value=\"{{ sortChecked }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"{{ sortScoreStyle }}\">{{ sortScoreText }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Quiz: types\" data-speaker-notes=\"Quick check. Let students vote with a show of hands first, then click. The feedback explains the rule, not just right or wrong.\">\n    <div style=\"position:absolute; inset:0; background:#FFF7EC; font-family:'Nunito',sans-serif; color:#16223A; padding:84px 110px; display:flex; flex-direction:column;\">\n      <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:26px; letter-spacing:2px; color:#4D7CFF;\">4.1 · QUICK CHECK<\u002Fdiv>\n      <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:60px; margin:8px 0 6px;\">Name That Data<\u002Fh2>\n      <p style=\"font-size:40px; font-weight:700; margin:18px 0 30px;\">{{ qTypes.q }}<\u002Fp>\n      <div style=\"display:flex; flex-direction:column; gap:18px; max-width:1300px;\">\n        <sc-for list=\"{{ qTypes.opts }}\" as=\"opt\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ onPick }}\" data-quiz=\"qTypes\" data-idx=\"{{ $index }}\" style=\"{{ opt.style }}\"><span>{{ opt.t }}<\u002Fspan><span style=\"font-size:34px; font-weight:800;\">{{ opt.mark }}<\u002Fspan><\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <sc-if value=\"{{ qTypes.answered }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"{{ qTypes.fbStyle }}\">{{ qTypes.fbText }}<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"4.2 Section\" data-speaker-notes=\"Section 4.2. Raw data is messy. We organise it so patterns jump out — two-way tables for two categories at once, and stem-and-leaf to keep every value while sorting it.\">\n    <div style=\"position:absolute; inset:0; background:linear-gradient(135deg,#9B5DE5,#7B3FD0); overflow:hidden; font-family:'Nunito',sans-serif; color:#fff; display:flex; flex-direction:column; justify-content:center; padding:0 130px;\">\n      <div style=\"position:absolute; right:-60px; bottom:-80px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:560px; color:rgba(255,255,255,.10); line-height:.8;\">4.2<\u002Fdiv>\n      <div style=\"position:relative;\">\n        <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:30px; letter-spacing:3px; opacity:.85;\">PART TWO<\u002Fdiv>\n        <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:118px; margin:18px 0 0; line-height:1;\">Organising Data<\u002Fh2>\n        <p style=\"font-size:42px; font-weight:600; margin:34px 0 0; max-width:1000px;\">Tidy it up so the patterns jump out.<\u002Fp>\n        <div style=\"margin-top:30px; background:rgba(255,255,255,.16); border-radius:16px; padding:18px 26px; max-width:1180px; font-size:27px; font-weight:600; line-height:1.4;\"><strong style=\"font-family:'Fredoka',sans-serif;\">Cambridge objective:<\u002Fstrong> record &amp; organise data using tally charts, frequency tables, grouped (class-interval) tables, two-way tables and stem-and-leaf diagrams.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Tally &amp; frequency\" data-speaker-notes=\"Cambridge Lower Secondary: record, organise and represent data. A tally chart collects data as it arrives — every 5th mark is a diagonal 'gate', which makes counting fast. The frequency is just the total of each row. Click +1 for each pet as you survey the class, then read off the frequencies and check they add to the total.\">\n    <div style=\"position:absolute; inset:0; background:#FFF7EC; font-family:'Nunito',sans-serif; color:#16223A; padding:64px 90px; display:flex; flex-direction:column;\">\n      <div style=\"display:flex; align-items:flex-start; justify-content:space-between;\">\n        <div>\n          <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:26px; letter-spacing:2px; color:#9B5DE5;\">4.2 · TALLY &amp; FREQUENCY TABLES<\u002Fdiv>\n          <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:62px; margin:6px 0 0;\">Collecting data with a tally chart<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"background:#EFE6FF; color:#6B33C0; font-family:'Fredoka',sans-serif; font-weight:600; font-size:25px; padding:12px 20px; border-radius:14px; max-width:430px; text-align:right; line-height:1.35;\">Cambridge objective: record &amp; organise data using tally charts and frequency tables<\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:30px; font-weight:600; color:#5a6680; margin:16px 0 0;\">Survey: <strong>\"Which pet do you have?\"<\u002Fstrong> — tap +1 for each student. Every 5th mark crosses the gate.<\u002Fp>\n\n      <div style=\"display:grid; grid-template-columns:1.55fr .9fr; gap:46px; margin-top:24px; flex:1; align-items:start;\">\n        <div style=\"background:#fff; border-radius:24px; padding:30px 40px; box-shadow:0 14px 34px rgba(22,34,58,.08);\">\n          <div style=\"display:flex; font-family:'Fredoka',sans-serif; font-weight:700; font-size:28px; color:#9B5DE5; border-bottom:3px solid #EFE6FF; padding-bottom:12px;\">\n            <div style=\"width:190px;\">Pet<\u002Fdiv>\n            <div style=\"flex:1;\">Tally<\u002Fdiv>\n            <div style=\"width:150px; text-align:center;\">Frequency<\u002Fdiv>\n            <div style=\"width:150px;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ tallyRows }}\" as=\"row\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; align-items:center; padding:16px 0; border-bottom:1px solid #F0ECF7; min-height:78px;\">\n              <div style=\"width:190px; display:flex; align-items:center; gap:12px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:32px;\"><span style=\"width:20px; height:20px; border-radius:6px; background:{{ row.color }};\"><\u002Fspan>{{ row.label }}<\u002Fdiv>\n              <div style=\"flex:1; display:flex; align-items:center; gap:16px; flex-wrap:wrap; min-height:46px;\">\n                <sc-for list=\"{{ row.groups }}\" as=\"g\" hint-placeholder-count=\"0\">\n                  <div style=\"position:relative; display:flex; gap:7px; padding:0 4px;\">\n                    <sc-for list=\"{{ g.bars }}\" as=\"bar\" hint-placeholder-count=\"0\">\n                      <div style=\"width:5px; height:42px; background:#16223A; border-radius:2px;\"><\u002Fdiv>\n                    <\u002Fsc-for>\n                    <sc-if value=\"{{ g.full }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"position:absolute; left:-6px; top:18px; width:52px; height:5px; background:#FF5D5D; border-radius:2px; transform:rotate(-20deg);\"><\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"width:150px; text-align:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:40px; color:#16223A;\">{{ row.count }}<\u002Fdiv>\n              <div style=\"width:150px; display:flex; gap:10px; justify-content:flex-end;\">\n                <button onclick=\"{{ onTally }}\" data-key=\"{{ row.key }}\" data-dir=\"down\" style=\"cursor:pointer; width:50px; height:50px; border-radius:13px; border:none; background:#F0ECF7; color:#16223A; font-size:30px; font-weight:800; line-height:1;\">−<\u002Fbutton>\n                <button onclick=\"{{ onTally }}\" data-key=\"{{ row.key }}\" data-dir=\"up\" style=\"cursor:pointer; width:50px; height:50px; border-radius:13px; border:none; background:#9B5DE5; color:#fff; font-size:30px; font-weight:800; line-height:1;\">+1<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"display:flex; align-items:center; padding:18px 0 4px;\">\n            <div style=\"width:190px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:32px; color:#9B5DE5;\">Total<\u002Fdiv>\n            <div style=\"flex:1;\"><\u002Fdiv>\n            <div style=\"width:150px; text-align:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:40px; color:#9B5DE5;\">{{ tallyTotal }}<\u002Fdiv>\n            <div style=\"width:150px;\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; flex-direction:column; gap:22px;\">\n          <div style=\"background:#fff; border-radius:22px; padding:30px 34px; box-shadow:0 10px 26px rgba(22,34,58,.06);\">\n            <div style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:34px; color:#16223A;\">The \"gate of five\"<\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:20px; margin-top:18px;\">\n              <div style=\"position:relative; display:flex; gap:7px;\">\n                <div style=\"width:5px; height:48px; background:#16223A; border-radius:2px;\"><\u002Fdiv>\n                <div style=\"width:5px; height:48px; background:#16223A; border-radius:2px;\"><\u002Fdiv>\n                <div style=\"width:5px; height:48px; background:#16223A; border-radius:2px;\"><\u002Fdiv>\n                <div style=\"width:5px; height:48px; background:#16223A; border-radius:2px;\"><\u002Fdiv>\n                <div style=\"position:absolute; left:-6px; top:21px; width:52px; height:5px; background:#FF5D5D; border-radius:2px; transform:rotate(-20deg);\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:30px; font-weight:800; color:#7d8aa6;\">= 5<\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"font-size:25px; font-weight:600; color:#5a6680; margin:18px 0 0; line-height:1.45;\">Grouping marks in fives makes a long count quick and accurate.<\u002Fp>\n          <\u002Fdiv>\n          <button onclick=\"{{ onResetTally }}\" style=\"cursor:pointer; font-family:'Fredoka',sans-serif; font-weight:600; font-size:28px; background:#fff; color:#16223A; border:2px solid rgba(22,34,58,.15); padding:16px 30px; border-radius:14px;\">↺ Reset the survey<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Class intervals\" data-speaker-notes=\"Cambridge Lower Secondary: organise data into a grouped frequency table using equal class intervals. With 20 different-ish marks, listing each one is messy — so we group them into equal classes of width 10. Click each class to reveal which marks fall in it and the frequency. Stress: classes must be equal width and must not overlap, and once grouped we no longer know the exact values.\">\n    <div style=\"position:absolute; inset:0; background:#FFF7EC; font-family:'Nunito',sans-serif; color:#16223A; padding:60px 90px; display:flex; flex-direction:column;\">\n      <div style=\"display:flex; align-items:flex-start; justify-content:space-between;\">\n        <div>\n          <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:26px; letter-spacing:2px; color:#9B5DE5;\">4.2 · GROUPING DATA<\u002Fdiv>\n          <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:60px; margin:6px 0 0;\">Grouping data into class intervals<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"background:#EFE6FF; color:#6B33C0; font-family:'Fredoka',sans-serif; font-weight:600; font-size:25px; padding:12px 20px; border-radius:14px; max-width:440px; text-align:right; line-height:1.35;\">Cambridge objective: organise data into a grouped frequency table with equal class intervals<\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:28px; font-weight:600; color:#5a6680; margin:14px 0 0;\">20 students sat a test marked out of 50. Too many values to list — so we group into equal classes of <strong>width 10<\u002Fstrong>.<\u002Fp>\n\n      <div style=\"background:#fff; border-radius:18px; padding:20px 28px; box-shadow:0 8px 22px rgba(22,34,58,.06); margin-top:16px;\">\n        <div style=\"font-size:24px; font-weight:700; color:#7d8aa6; margin-bottom:10px;\">Raw marks:<\u002Fdiv>\n        <div style=\"display:flex; flex-wrap:wrap; gap:10px;\">\n          <span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">12<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">7<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">23<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">35<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">41<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">28<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">19<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">44<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">9<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">31<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">26<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">38<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">15<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">47<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">22<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">33<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">5<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">18<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">29<\u002Fspan><span style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:27px; background:#F4F1EA; padding:8px 16px; border-radius:10px;\">40<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; align-items:center; gap:16px; margin:16px 0 8px;\">\n        <div style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:26px; color:#9B5DE5;\">Click a class to reveal its marks &amp; frequency ▾<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:18px; flex:1;\">\n        <div onclick=\"{{ onReveal }}\" data-rk=\"g1\" style=\"cursor:pointer; background:#fff; border-radius:18px; padding:24px 22px; box-shadow:0 8px 22px rgba(22,34,58,.06); display:flex; flex-direction:column;\">\n          <div style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:34px; color:#16223A;\">1 – 10<\u002Fdiv>\n          <sc-if value=\"{{ r.g1 }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"margin-top:14px; animation:fadeUp .3s both;\"><div style=\"font-size:25px; font-weight:700; color:#7d8aa6; line-height:1.5;\">7, 9, 5<\u002Fdiv><div style=\"margin-top:14px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:48px; color:#9B5DE5;\">3<\u002Fdiv><\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <div onclick=\"{{ onReveal }}\" data-rk=\"g2\" style=\"cursor:pointer; background:#fff; border-radius:18px; padding:24px 22px; box-shadow:0 8px 22px rgba(22,34,58,.06); display:flex; flex-direction:column;\">\n          <div style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:34px; color:#16223A;\">11 – 20<\u002Fdiv>\n          <sc-if value=\"{{ r.g2 }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"margin-top:14px; animation:fadeUp .3s both;\"><div style=\"font-size:25px; font-weight:700; color:#7d8aa6; line-height:1.5;\">12, 19, 15, 18<\u002Fdiv><div style=\"margin-top:14px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:48px; color:#9B5DE5;\">4<\u002Fdiv><\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <div onclick=\"{ 25px; font-weight:700; color:#7d8aa6; line-height:1.5;\">41, 44, 47<\u002Fdiv><div style=\"margin-top:14px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:48px; color:#9B5DE5;\">3<\u002Fdiv><\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:25px; font-weight:700; color:#7d8aa6; margin:18px 0 0;\">Rules: classes are <strong style=\"color:#16223A;\">equal width<\u002Fstrong> and <strong style=\"color:#16223A;\">never overlap<\u002Fstrong> — and the frequencies add up to 20.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Two-way tables\" data-speaker-notes=\"A two-way table shows two categories at once: here, gender against how students travel to school. The inside numbers are given. Click each grey total to reveal it — ask students to predict before each click. Every row and column total must agree, and both grand totals equal 42.\">\n    <div style=\"position:absolute; inset:0; background:#FFF7EC; font-family:'Nunito',sans-serif; color:#16223A; padding:78px 110px; display:flex; flex-direction:column;\">\n      <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:26px; letter-spacing:2px; color:#9B5DE5;\">4.2 · TWO-WAY TABLES<\u002Fdiv>\n      <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:66px; margin:8px 0 4px;\">How do 42 students travel to school?<\u002Fh2>\n      <p style=\"font-size:30px; font-weight:600; color:#5a6party; margin:6px 0 0; color:#5a6680;\">Click the grey cells to reveal the totals. Do the rows and columns agree?<\u002Fp>\n      <div style=\"display:flex; justify-content:center; margin-top:24px;\">\n        <table style=\"border-collapse:separate; border-spacing:14px; font-family:'Fredoka',sans-serif;\">\n          <tbody><tr>\n            <td style=\"width:230px;\"><\u002Ftd>\n            <td style=\"width:200px; text-align:center; font-weight:700; font-size:36px; background:#EFE6FF; color:#6B33C0; padding:22px; border-radius:16px;\">Walk<\u002Ftd>\n            <td style=\"width:200px; text-align:center; font-weight:700; font-size:36px; background:#EFE6FF; color:#6B33C0; padding:22px; border-radius:16px;\">Bus<\u002Ftd>\n            <td style=\"width:200px; text-align:center; font-weight:700; font-size:36px; background:#EFE6FF; color:#6B33C0; padding:22px; border-radius:16px;\">Car<\u002Ftd>\n            <td style=\"width:200px; text-align:center; font-weight:700; font-size:36px; background:#9B5DE5; color:#fff; padding:22px; border-radius:16px;\">Total<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"font-weight:700; font-size:36px; background:#EFE6FF; color:#6B33C0; padding:22px; border-radius:16px; text-align:center;\">Boys<\u002Ftd>\n            <td style=\"text-align:center; font-weight:700; font-size:40px; background:#fff; padding:22px; border-radius:16px; box-shadow:0 4px 14px rgba(22,34,58,.06);\">8<\u002Ftd>\n            <td style=\"text-align:center; font-weight:700; font-size:40px; background:#fff; padding:22px; border-radius:16px; box-shadow:0 4px 14px rgba(22,34,58,.06);\">7<\u002Ftd>\n            <td style=\"text-align:center; font-weight:700; font-size:40px; background:#fff; padding:22px; border-radius:16px; box-shadow:0 4px 14px rgba(22,34,58,.06);\">5<\u002Ftd>\n            <td onclick=\"{{ onReveal }}\" data-rk=\"t_b\" style=\"text-align:center; font-weight:800; font-size:40px; padding:22px; border-radius:16px; cursor:pointer; background:{{ cell.t_b_bg }}; color:#fff;\">{{ cell.t_b }}<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"font-weight:700; font-size:36px; background:#EFE6FF; color:#6B33C0; padding:22px; border-radius:16px; text-align:center;\">Girls<\u002Ftd>\n            <td style=\"text-align:center; font-weight:700; font-size:40px; background:#fff; padding:22px; border-radius:16px; box-shadow:0 4px 14px rgba(22,34,58,.06);\">9<\u002Ftd>\n            <td style=\"text-align:center; font-weight:700; font-size:40px; background:#fff; padding:22px; border-radius:16px; box-shadow:0 4px 14px rgba(22,34,58,.06);\">8<\u002Ftd>\n            <td style=\"text-align:center; font-weight:700; font-size:40px; background:#fff; padding:22px; border-radius:16px; box-shadow:0 4px 14px rgba(22,34,58,.06);\">5<\u002Ftd>\n            <td onclick=\"{{ onReveal }}\" data-rk=\"t_g\" style=\"text-align:center; font-weight:800; font-size:40px; padding:22px; border-radius:16px; cursor:pointer; background:{{ cell.t_g_bg }}; color:#fff;\">{{ cell.t_g }}<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"font-weight:700; font-size:36px; background:#9B5DE5; color:#fff; padding:22px; border-radius:16px; text-align:center;\">Total<\u002Ftd>\n            <td onclick=\"{{ onReveal }}\" data-rk=\"t_w\" style=\"text-align:center; font-weight:800; font-size:40px; padding:22px; border-radius:16px; cursor:pointer; background:{{ cell.t_w_bg }}; color:#fff;\">{{ cell.t_w }}<\u002Ftd>\n            <td onclick=\"{{ onReveal }}\" data-rk=\"t_bus\" style=\"text-align:center; font-weight:800; font-size:40px; padding:22px; border-radius:16px; cursor:pointer; background:{{ cell.t_bus_bg }}; color:#fff;\">{{ cell.t_bus }}<\u002Ftd>\n            <td onclick=\"{{ onReveal }}\" data-rk=\"t_car\" style=\"text-align:center; font-weight:800; font-size:40px; padding:22px; border-radius:16px; cursor:pointer; background:{{ cell.t_car_bg }}; color:#fff;\">{{ cell.t_car }}<\u002Ftd>\n            <td onclick=\"{{ onReveal }}\" data-rk=\"grand\" style=\"text-align:center; font-weight:800; font-size:40px; padding:22px; border-radius:16px; cursor:pointer; background:{{ cell.grand_bg }}; color:#fff;\">{{ cell.grand }}<\u002Ftd>\n          <\u002Ftr>\n        <\u002Ftbody><\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Quiz: table\" data-speaker-notes=\"Reading check using the same table. Answer is 15 — add the bus column, 7 plus 8. Encourage students to point at the
