size:26px; letter-spacing:2px; color:#9B5DE5;\">4.2 · STEM-AND-LEAF<\u002Fdiv>\n      <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:62px; margin:6px 0 0;\">Building a Stem-and-Leaf Diagram<\u002Fh2>\n      <p style=\"font-size:30px; font-weight:700; color:#6B33C0; margin:14px 0 0; min-height:42px;\">{{ stem.msg }}<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:1.15fr .85fr; gap:50px; margin-top:18px; flex:1;\">\n        <div>\n          <div style=\"font-size:26px; font-weight:700; color:#7d8aa6; margin-bottom:14px;\">Exam marks (sorted):<\u002Fdiv>\n          <div style=\"display:flex; flex-wrap:wrap; gap:12px;\">\n            <sc-for list=\"{{ stem.raw }}\" as=\"m\" hint-placeholder-count=\"11\">\n              <div style=\"{{ m.style }}\">{{ m.v }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:16px; margin-top:40px; align-items:center;\">\n            <button onclick=\"{{ onStem }}\" data-dir=\"prev\" style=\"cursor:pointer; font-family:'Fredoka',sans-serif; font-weight:700; font-size:30px; background:#fff; color:#16223A; border:2px solid rgba(22,34,58,.15); padding:16px 30px; border-radius:14px;\">‹ Back<\u002Fbutton>\n            <button onclick=\"{{ onStem }}\" data-dir=\"next\" style=\"cursor:pointer; font-family:'Fredoka',sans-serif; font-weight:700; font-size:30px; background:#9B5DE5; color:#fff; border:none; padding:16px 38px; border-radius:14px; box-shadow:0 5px 0 #7B3FD0;\">Next ›<\u002Fbutton>\n            <button onclick=\"{{ onStem }}\" data-dir=\"reset\" style=\"cursor:pointer; font-family:'Fredoka',sans-serif; font-weight:600; font-size:30px; background:transparent; color:#7d8aa6; border:none; padding:16px 18px;\">↺ Restart<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border-radius:24px; padding:36px 44px; box-shadow:0 14px 34px rgba(22,34,58,.08);\">\n          <div style=\"display:flex; gap:18px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:30px; color:#9B5DE5; border-bottom:3px solid #EFE6FF; padding-bottom:12px;\">\n            <div style=\"width:80px; text-align:right;\">Stem<\u002Fdiv>\n            <div>Leaf<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ stem.rows }}\" as=\"row\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; gap:18px; align-items:center; padding:14px 0; border-bottom:1px solid #F0ECF7;\">\n              <div style=\"width:80px; text-align:right; font-family:'Fredoka',sans-serif; font-weight:700; font-size:38px; color:#16223A;\">{{ row.stem }}<\u002Fdiv>\n              <div style=\"display:flex; gap:14px;\">\n                <sc-for list=\"{{ row.leaves }}\" as=\"lf\" hint-placeholder-count=\"0\">\n                  <span style=\"{{ lf.style }}\">{{ lf.d }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ stem.showKey }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:22px; font-size:26px; font-weight:700; color:#7d8aa6; animation:fadeUp .35s ease both;\">Key: 5 | 8 means <strong style=\"color:#16223A;\">58 marks<\u002Fstrong><\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Quiz: stem-leaf\" data-speaker-notes=\"Reading the finished diagram. There are 11 values, so the median is the 6th — which is 58. A good moment to revise how to find the middle position with n plus 1 over 2.\">\n    <div style=\"position:absolute; inset:0; background:#FFF7EC; font-family:'Nunito',sans-serif; color:#16223A; padding:84px 110px; display:flex; flex-direction:column;\">\n      <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:26px; letter-spacing:2px; color:#9B5DE5;\">4.2 · READING IT BACK<\u002Fdiv>\n      <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:60px; margin:8px 0 6px;\">Reading a Stem-and-Leaf Diagram<\u002Fh2>\n      <p style=\"font-size:40px; font-weight:700; margin:18px 0 8px;\">{{ qStem.q }}<\u002Fp>\n      <p style=\"font-size:28px; font-weight:600; color:#7d8aa6; margin:0 0 26px;\">Marks: 42, 45, 51, 53, 58, 58, 62, 64, 69, 71, 73<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:18px; max-width:1100px;\">\n        <sc-for list=\"{{ qStem.opts }}\" as=\"opt\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ onPick }}\" data-quiz=\"qStem\" data-idx=\"{{ $index }}\" style=\"{{ opt.style }}\"><span>{{ opt.t }}<\u002Fspan><span style=\"font-size:34px; font-weight:800;\">{{ opt.mark }}<\u002Fspan><\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <sc-if value=\"{{ qStem.answered }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"{{ qStem.fbStyle }}\">{{ qStem.fbText }}<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"4.3 Section\" data-speaker-notes=\"Section 4.3. Now the fun part — turning data into pictures. Pictograms, bar charts, pie charts and line graphs. We'll build three of them live.\">\n    <div style=\"position:absolute; inset:0; background:linear-gradient(135deg,#FF5D5D,#E03B3B); overflow:hidden; font-family:'Nunito',sans-serif; color:#fff; display:flex; flex-direction:column; justify-content:center; padding:0 130px;\">\n      <div style=\"position:absolute; right:-60px; bottom:-80px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:560px; color:rgba(255,255,255,.10); line-height:.8;\">4.3<\u002Fdiv>\n      <div style=\"position:relative;\">\n        <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:30px; letter-spacing:3px; opacity:.85;\">PART THREE<\u002Fdiv>\n        <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:118px; margin:18px 0 0; line-height:1;\">Displaying Data<br>with Charts<\u002Fh2>\n        <p style=\"font-size:42px; font-weight:600; margin:34px 0 0; max-width:1000px;\">Turn your numbers into pictures.<\u002Fp>\n        <div style=\"margin-top:30px; background:rgba(255,255,255,.16); border-radius:16px; padding:18px 26px; max-width:1140px; font-size:27px; font-weight:600; line-height:1.4;\"><strong style=\"font-family:'Fredoka',sans-serif;\">Cambridge objective:<\u002Fstrong> draw &amp; interpret pictograms, bar charts, pie charts and line graphs, and choose an appropriate chart.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Pictograms\" data-speaker-notes=\"A pictogram uses a symbol to stand for a number of items. Here one circle equals 2 books. The key is everything — half a symbol means half the value. Click to reveal how many books Year 10 read.\">\n    <div style=\"position:absolute; inset:0; background:#FFF7EC; font-family:'Nunito',sans-serif; color:#16223A; padding:80px 110px; display:flex; flex-direction:column;\">\n      <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:26px; letter-spacing:2px; color:#FF5D5D;\">4.3 · PICTOGRAMS<\u002Fdiv>\n      <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:66px; margin:8px 0 4px;\">Books read this term<\u002Fh2>\n      <div style=\"display:inline-flex; align-self:flex-start; align-items:center; gap:12px; background:#fff; padding:12px 24px; border-radius:999px; margin-top:14px; font-size:28px; font-weight:700; box-shadow:0 4px 14px rgba(22,34,58,.06);\">\n        <span style=\"width:30px; height:30px; border-radius:50%; background:#FF5D5D; display:inline-block;\"><\u002Fspan> = 2 books\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:30px; margin-top:40px; flex:1; justify-content:center;\">\n        <div style=\"display:flex; align-items:center; gap:30px;\">\n          <div style=\"width:200px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:36px;\">Year 9<\u002Fdiv>\n          <div style=\"display:flex; gap:16px;\"><span style=\"width:46px;height:46px;border-radius:50%;background:#FF5D5D;\"><\u002Fspan><span style=\"width:46px;height:46px;border-radius:50%;background:#FF5D5D;\"><\u002Fspan><span style=\"width:46px;height:46px;border-radius:50%;background:#FF5D5D;\"><\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:32px; font-weight:700; color:#7d8aa6;\">= 6 books<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:30px;\">\n          <div style=\"width:200px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:36px;\">Year 10<\u002Fdiv>\n          <div style=\"display:flex; gap:16px;\"><span style=\"width:46px;height:46px;border-radius:50%;background:#FF5D5D;\"><\u002Fspan><span style=\"width:46px;height:46px;border-radius:50%;background:#FF5D5D;\"><\u002Fspan><span style=\"width:46px;height:46px;border-radius:50%;background:#FF5D5D;\"><\u002Fspan><span style=\"width:46px;height:46px;border-radius:50%;background:#FF5D5D;\"><\u002Fspan><span style=\"width:23px;height:46px;border-radius:46px 0 0 46px;background:#FF5D5D;\"><\u002Fspan><\u002Fdiv>\n          <button onclick=\"{{ onReveal }}\" data-rk=\"picto\" style=\"cursor:pointer; font-family:'Fredoka',sans-serif; font-weight:700; font-size:28px; background:#FF5D5D; color:#fff; border:none; padding:12px 26px; border-radius:12px; box-shadow:0 4px 0 #C0392B;\">= ? books<\u002Fbutton>\n          <sc-if value=\"{{ r.picto }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:32px; font-weight:800; color:#16C79A; animation:pop .3s ease both;\">= 9 books!<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:30px;\">\n          <div style=\"width:200px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:36px;\">Year 11<\u002Fdiv>\n          <div style=\"display:flex; gap:16px;\"><span style=\"width:46px;height:46px;border-radius:50%;background:#FF5D5D;\"><\u002Fspan><span style=\"width:46px;height:46px;border-radius:50%;background:#FF5D5D;\"><\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:32px; font-weight:700; color:#7d8aa6;\">= 4 books<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Build a bar chart\" data-speaker-notes=\"Build-your-own bar chart. Tap plus and minus to change each fruit's votes and watch the bars grow and shrink. Bars are for comparing separate categories — note they have equal width and gaps between them. Ask: which fruit wins? What if two tie?\">\n    <div style=\"position:absolute; inset:0; background:#FFF7EC; font-family:'Nunito',sans-serif; color:#16223A; padding:70px 100px; display:flex; flex-direction:column;\">\n      <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:26px; letter-spacing:2px; color:#FF5D5D;\">4.3 · BAR CHARTS<\u002Fdiv>\n      <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:62px; margin:6px 0 0;\">Bar Charts — Build Your Own<\u002Fh2>\n      <p style=\"font-size:30px; font-weight:600; color:#5a6680; margin:10px 0 0;\">\"Favourite fruit\" — adjust the votes and watch the bars react.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:1.5fr 1fr; gap:50px; margin-top:24px; flex:1;\">\n        <div style=\"background:#fff; border-radius:24px; padding:36px 44px 28px; box-shadow:0 14px 34px rgba(22,34,58,.08); display:flex; flex-direction:column;\">\n          <div style=\"display:flex; align-items:flex-end; gap:40px; flex:1; border-left:3px solid #E5E0D6; border-bottom:3px solid #E5E0D6; padding:0 30px 0 20px;\">\n            <sc-for list=\"{{ bars }}\" as=\"bar\" hint-placeholder-count=\"4\">\n              <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:10px;\">\n                <div style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:30px; color:#16223A;\">{{ bar.count }}<\u002Fdiv>\n                <div style=\"width:100%; max-width:130px; border-radius:14px 14px 0 0; transition:height .45s cubic-bezier(.34,1.56,.64,1); background:{{ bar.color }}; height:{{ bar.h }};\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:40px; padding:14px 30px 0 20px;\">\n            <sc-for list=\"{{ bars }}\" as=\"bar\" hint-placeholder-count=\"4\">\n              <div style=\"flex:1; text-align:center; font-family:'Nunito',sans-serif; font-weight:800; font-size:28px;\">{{ bar.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; justify-content:center; gap:20px;\">\n          <sc-for list=\"{{ bars }}\" as=\"bar\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; align-items:center; gap:18px; background:#fff; border-radius:18px; padding:16px 22px; box-shadow:0 6px 18px rgba(22,34,58,.06);\">\n              <span style=\"width:24px; height:24px; border-radius:8px; background:{{ bar.color }};\"><\u002Fspan>\n              <span style=\"flex:1; font-family:'Fredoka',sans-serif; font-weight:700; font-size:32px;\">{{ bar.label }}<\u002Fspan>\n              <button onclick=\"{{ onBar }}\" data-key=\"{{ bar.key }}\" data-dir=\"down\" style=\"cursor:pointer; width:54px; height:54px; border-radius:14px; border:none; background:#F0ECF7; color:#16223A; font-size:34px; font-weight:800; line-height:1;\">−<\u002Fbutton>\n              <span style=\"width:54px; text-align:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:34px;\">{{ bar.count }}<\u002Fspan>\n              <button onclick=\"{{ onBar }}\" data-key=\"{{ bar.key }}\" data-dir=\"up\" style=\"cursor:pointer; width:54px; height:54px; border-radius:14px; border:none; background:#FF5D5D; color:#fff; font-size:34px; font-weight:800; line-height:1;\">+<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Pie chart from scratch\" data-speaker-notes=\"Cambridge Lower Secondary: construct a pie chart. The method: (1) find the total frequency; (2) each angle = frequency ÷ total × 360°; (3) draw a circle, mark one radius, then measure each angle in turn with a protractor, turning to the running total. Here total is 30, so each student is 12°. Step through to watch the angles measured out. Always check the angles add to 360°.\">\n    <div style=\"position:absolute; inset:0; background:#FFF7EC; font-family:'Nunito',sans-serif; color:#16223A; padding:54px 90px; display:flex; flex-direction:column;\">\n      <div style=\"display:flex; align-items:flex-start; justify-content:space-between;\">\n        <div>\n          <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:26px; letter-spacing:2px; color:#FF5D5D;\">4.3 · DRAWING A PIE CHART<\u002Fdiv>\n          <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:58px; margin:4px 0 0;\">Pie charts from scratch — with a protractor<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"background:#FFE4E4; color:#C0392B; font-family:'Fredoka',sans-serif; font-weight:600; font-size:25px; padding:12px 20px; border-radius:14px; max-width:440px; text-align:right; line-height:1.35;\">Cambridge objective: construct a pie chart by calculating sector angles<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; gap:16px; margin-top:18px;\">\n        <div style=\"flex:1; background:#fff; border-radius:16px; padding:16px 22px; box-shadow:0 6px 18px rgba(22,34,58,.06); display:flex; align-items:center; gap:16px;\"><span style=\"width:42px; height:42px; border-radius:50%; background:#FF5D5D; color:#fff; font-family:'Fredoka',sans-serif; font-weight:700; font-size:26px; display:flex; align-items:center; justify-content:center; flex:none;\">1<\u002Fspan><span style=\"font-size:26px; font-weight:700;\">Find the total frequency<\u002Fspan><\u002Fdiv>\n        <div style=\"flex:1.3; background:#fff; border-radius:16px; padding:16px 22px; box-shadow:0 6px 18px rgba(22,34,58,.06); display:flex; align-items:center; gap:16px;\"><span style=\"width:42px; height:42px; border-radius:50%; background:#FF5D5D; color:#fff; font-family:'Fredoka',sans-serif; font-weight:700; font-size:26px; display:flex; align-items:center; justify-content:center; flex:none;\">2<\u002Fspan><span style=\"font-size:26px; font-weight:700;\">Angle = (frequency ÷ total) × 360°<\u002Fspan><\u002Fdiv>\n        <div style=\"flex:1.2; background:#fff; border-radius:16px; padding:16px 22px; box-shadow:0 6px 18px rgba(22,34,58,.06); display:flex; align-items:center; gap:16px;\"><span style=\"width:42px; height:42px; border-radius:50%; background:#FF5D5D; color:#fff; font-family:'Fredoka',sans-serif; font-weight:700; font-size:26px; display:flex; align-items:center; justify-content:center; flex:none;\">3<\u002Fspan><span style=\"font-size:26px; font-weight:700;\">Measure each angle with a protractor<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"font-size:28px; font-weight:700; color:#C0392B; margin:18px 0 6px; min-height:38px;\">{{ pieDrawMsg }}<\u002Fp>\n\n      <div style=\"display:grid; grid-template-columns:1.05fr .95fr; gap:46px; flex:1; align-items:start; margin-top:4px;\">\n        <div>\n          <div style=\"background:#fff; border-radius:22px; padding:24px 30px; box-shadow:0 12px 30px rgba(22,34,58,.08);\">\n            <div style=\"display:flex; font-family:'Fredoka',sans-serif; font-weight:700; font-size:25px; color:#FF5D5D; border-bottom:3px solid #FFE4E4; padding-bottom:10px;\">\n              <div style=\"width:170px;\">Drink<\u002Fdiv>\n              <div style=\"width:130px; text-align:center;\">Frequency<\u002Fdiv>\n              <div style=\"flex:1; text-align:center;\">Angle = (f ÷ 30) × 360°<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:8px; margin-top:10px;\">\n              <sc-for list=\"{{ pieDrawRows }}\" as=\"row\" hint-placeholder-count=\"4\">\n                <div style=\"{{ row.rowStyle }}\">\n                  <div style=\"width:150px; display:flex; align-items:center; gap:12px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:30px;\"><span style=\"width:18px; height:18px; border-radius:5px; background:{{ row.color }};\"><\u002Fspan>{{ row.label }}<\u002Fdiv>\n                  <div style=\"width:130px; text-align:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:32px;\">{{ row.freq }}<\u002Fdiv>\n                  <div style=\"flex:1; text-align:center; font-weight:700; font-size:27px; color:#5a6680;\">\n                    <sc-if value=\"{{ row.shown }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#16223A;\">{{ row.calc }}<\u002Fspan><\u002Fsc-if>\n                    <sc-if value=\"{{ row.hidden }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#B9C0CE;\">— ? —<\u002Fspan><\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:center; padding:14px 18px 2px; border-top:2px solid #FFE4E4; margin-top:8px;\">\n              <div style=\"width:150px; font-family:'Fredoka',sans-serif; font-weight:700; font-size:30px; color:#FF5D5D;\">Total<\u002Fdiv>\n              <div style=\"width:130px; text-align:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:32px; color:#FF5D5D;\">30<\u002Fdiv>\n              <div style=\"flex:1; text-align:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:30px; color:#FF5D5D;\">\n                <sc-if value=\"{{ pieDrawDone }}\" hint-placeholder-val=\"{{ false }}\"><span>360° ✓<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:16px; margin-top:24px; align-items:center;\">\n            <button onclick=\"{{ onPieDraw }}\" data-dir=\"prev\" style=\"cursor:pointer; font-family:'Fredoka',sans-serif; font-weight:700; font-size:28px; background:#fff; color:#16223A; border:2px solid rgba(22,34,58,.15); padding:14px 28px; border-radius:14px;\">‹ Back<\u002Fbutton>\n            <button onclick=\"{{ onPieDraw }}\" data-dir=\"next\" style=\"cursor:pointer; font-family:'Fredoka',sans-serif; font-weight:700; font-size:28px; background:#FF5D5D; color:#fff; border:none; padding:14px 36px; border-radius:14px; box-shadow:0 5px 0 #C0392B;\">Next ›<\u002Fbutton>\n            <button onclick=\"{{ onPieDraw }}\" data-dir=\"reset\" style=\"cursor:pointer; font-family:'Fredoka',sans-serif; font-weight:600; font-size:28px; background:transparent; color:#7d8aa6; border:none; padding:14px 10px;\">↺ Restart<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; flex-direction:column; align-items:center; gap:18px;\">\n          <div style=\"position:relative; width:340px; height:340px;\">\n            <div style=\"width:340px; height:340px; border-radius:50%; box-shadow:0 14px 36px rgba(22,34,58,.16); transition:background .5s ease; background:{{ pieDrawBg }};\"><\u002Fdiv>\n            <div style=\"position:absolute; left:calc(50% - 2.5px); bottom:50%; width:5px; height:170px; background:#16223A; border-radius:3px; transform-origin:bottom center; transition:transform .5s cubic-bezier(.34,1.4,.64,1); transform:{{ pieDrawArm }};\"><\u002Fdiv>\n            <div style=\"position:absolute; left:calc(50% - 11px); top:calc(50% - 11px); width:22px; height:22px; border-radius:50%; background:#16223A; border:4px solid #fff;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width:100%; max-width:420px;\">\n            <div style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:24px; color:#7d8aa6; text-align:center; margin-bottom:4px;\">Your tool: the protractor<\u002Fdiv>\n            <svg viewBox=\"0 0 420 215\" style=\"width:100%; height:auto;\">\n              <path d=\"M20 205 A190 190 0 0 1 400 205\" fill=\"#F4F1EA\" stroke=\"#C9CFDB\" stroke-width=\"2\"><\u002Fpath>\n              <line x1=\"20\" y1=\"205\" x2=\"400\" y2=\"205\" stroke=\"#C9CFDB\" stroke-width=\"2\"><\u002Fline>\n              <sc-for list=\"{{ protTicks }}\" as=\"t\" hint-placeholder-count=\"13\">\n                <line x1=\"{{ t.x1 }}\" y1=\"{{ t.y1 }}\" x2=\"{{ t.x2 }}\" y2=\"{{ t.y2 }}\" stroke=\"#7d8aa6\" stroke-width=\"{{ t.sw }}\"><\u002Fline>\n              <\u002Fsc-for>\n              <sc-for list=\"{{ protTicks }}\" as=\"t\" hint-placeholder-count=\"5\">\n                <text x=\"{{ t.lx }}\" y=\"{{ t.ly }}\" font-family=\"Fredoka\" font-weight=\"600\" font-size=\"20\" fill=\"#16223A\" text-anchor=\"middle\">{{ t.label }}<\u002Ftext>\n              <\u002Fsc-for>\n              <circle cx=\"210\" cy=\"205\" r=\"6\" fill=\"#16223A\"><\u002Fcircle>\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Build a pie chart\" data-speaker-notes=\"Same idea, but a pie chart shows each group as a slice of the whole. Change the counts and watch the slices and percentages update. Pies are for proportions — what share of the total. Ask: roughly what fraction walks? Which is closest to a quarter?\">\n    <div style=\"position:absolute; inset:0; background:#FFF7EC; font-family:'Nunito',sans-serif; color:#16223A; padding:70px 100px; display:flex; flex-direction:column;\">\n      <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:26px; letter-spacing:2px; color:#FF5D5D;\">4.3 · PIE CHARTS<\u002Fdiv>\n      <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:62px; margin:6px 0 0;\">Pie Charts — Build Your Own<\u002Fh2>\n      <p style=\"font-size:30px; font-weight:600; color:#5a6680; margin:10px 0 0;\">\"How we get to school\" — each slice is a share of the whole.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:60px; margin-top:24px; flex:1; align-items:center;\">\n        <div style=\"display:flex; justify-content:center; align-items:center; position:relative;\">\n          <div style=\"width:430px; height:430px; border-radius:50%; box-shadow:0 16px 40px rgba(22,34,58,.15); transition:background .45s ease; background:{{ pieBg }};\"><\u002Fdiv>\n          <div style=\"position:absolute; width:150px; height:150px; border-radius:50%; background:#FFF7EC; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:30px; color:#16223A; text-align:center; line-height:1.1;\">{{ pieTotal }}<br><span style=\"font-size:24px; color:#7d8aa6;\">students<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; justify-content:center; gap:16px;\">\n          <sc-for list=\"{{ pie }}\" as=\"seg\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; align-items:center; gap:16px; background:#fff; border-radius:18px; padding:14px 22px; box-shadow:0 6px 18px rgba(22,34,58,.06);\">\n              <span style=\"width:24px; height:24px; border-radius:50%; background:{{ seg.color }};\"><\u002Fspan>\n              <span style=\"flex:1; font-family:'Fredoka',sans-serif; font-weight:700; font-size:30px;\">{{ seg.label }}<\u002Fspan>\n              <span style=\"width:96px; text-align:right; font-weight:800; font-size:28px; color:#7d8aa6;\">{{ seg.pct }}%<\u002Fspan>\n              <button onclick=\"{{ onPie }}\" data-key=\"{{ seg.key }}\" data-dir=\"down\" style=\"cursor:pointer; width:50px; height:50px; border-radius:13px; border:none; background:#F0ECF7; color:#16223A; font-size:32px; font-weight:800; line-height:1;\">−<\u002Fbutton>\n              <span style=\"width:46px; text-align:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:32px;\">{{ seg.count }}<\u002Fspan>\n              <button onclick=\"{{ onPie }}\" data-key=\"{{ seg.key }}\" data-dir=\"up\" style=\"cursor:pointer; width:50px; height:50px; border-radius:13px; border:none; background:#FF5D5D; color:#fff; font-size:32px; font-weight:800; line-height:1;\">+<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Line graphs\" data-speaker-notes=\"A line graph shows how one thing changes over time — temperature across a week. Press Plot to draw the line. Line graphs are only for continuous change over time; the line between points shows the trend. Then reveal the hottest day.\">\n    <div style=\"position:absolute; inset:0; background:#FFF7EC; font-family:'Nunito',sans-serif; color:#16223A; padding:74px 100px; display:flex; flex-direction:column;\">\n      <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:26px; letter-spacing:2px; color:#FF5D5D;\">4.3 · LINE GRAPHS<\u002Fdiv>\n      <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:62px; margin:6px 0 6px;\">Line Graphs — change over time<\u002Fh2>\n      <div style=\"background:#fff; border-radius:24px; padding:34px 44px; box-shadow:0 14px 34px rgba(22,34,58,.08); margin-top:14px; flex:1; display:flex; flex-direction:column;\">\n        <div style=\"flex:1;\">\n          <svg viewBox=\"0 0 1080 460\" style=\"width:100%; height:100%;\" preserveAspectRatio=\"xMidYMid meet\">\n            <line x1=\"80\" y1=\"40\" x2=\"80\" y2=\"400\" stroke=\"#E5E0D6\" stroke-width=\"3\"><\u002Fline>\n            <line x1=\"80\" y1=\"400\" x2=\"1040\" y2=\"400\" stroke=\"#E5E0D6\" stroke-width=\"3\"><\u002Fline>\n            <text x=\"40\" y=\"60\" font-family=\"Fredoka\" font-size=\"24\" fill=\"#7d8aa6\">25°<\u002Ftext>\n            <text x=\"40\" y=\"200\" font-family=\"Fredoka\" font-size=\"24\" fill=\"#7d8aa6\">18°<\u002Ftext>\n            <text x=\"40\" y=\"350\" font-family=\"Fredoka\" font-size=\"24\" fill=\"#7d8aa6\">11°<\u002Ftext>\n            <polyline points=\"{{ linePoints }}\" fill=\"none\" stroke=\"#FF5D5D\" stroke-width=\"7\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-dasharray=\"2400\" style=\"stroke-dashoffset:{{ lineOff }}; transition:stroke-dashoffset 1.5s ease;\"><\u002Fpolyline>\n            <sc-for list=\"{{ lineDots }}\" as=\"d\" hint-placeholder-count=\"0\">\n              <circle cx=\"{{ d.cx }}\" cy=\"{{ d.cy }}\" r=\"9\" fill=\"#FF5D5D\"><\u002Fcircle>\n            <\u002Fsc-for>\n            <sc-for list=\"{{ lineLabels }}\" as=\"L\" hint-placeholder-count=\"7\">\n              <text x=\"{{ L.x }}\" y=\"440\" font-family=\"Nunito\" font-weight=\"700\" font-size=\"26\" fill=\"#16223A\" text-anchor=\"middle\">{{ L.t }}<\u002Ftext>\n            <\u002Fsc-for>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:18px; align-items:center; margin-top:10px;\">\n          <button onclick=\"{{ onPlot }}\" style=\"cursor:pointer; font-family:'Fredoka',sans-serif; font-weight:700; font-size:30px; background:#FF5D5D; color:#fff; border:none; padding:16px 38px; border-radius:14px; box-shadow:0 5px 0 #C0392B;\">{{ plotLabel }}<\u002Fbutton>\n          <button onclick=\"{{ onReveal }}\" data-rk=\"hottest\" style=\"cursor:pointer; font-family:'Fredoka',sans-serif; font-weight:600; font-size:30px; background:#fff; color:#16223A; border:2px solid rgba(22,34,58,.15); padding:16px 30px; border-radius:14px;\">Which day was hottest?<\u002Fbutton>\n          <sc-if value=\"{{ r.hottest }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:30px; font-weight:800; color:#16C79A; animation:pop .3s ease both;\">Friday — 22°C 🔥<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Choosing a chart\" data-speaker-notes=\"The big skill: matching the chart to the job. Click each card to reveal when to use it. Pictogram and bar for comparing categories, pie for proportions, line for change over time. This is a common exam question — wrong chart, lost marks.\">\n    <div style=\"position:absolute; inset:0; background:#FFF7EC; font-family:'Nunito',sans-serif; color:#16223A; padding:80px 100px; display:flex; flex-direction:column;\">\n      <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:26px; letter-spacing:2px; color:#FF5D5D;\">4.3 · CHART CHOICE<\u002Fdiv>\n      <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:66px; margin:8px 0 4px;\">Choosing the Right Chart<\u002Fh2>\n      <p style=\"font-size:30px; font-weight:600; color:#5a6680; margin:8px 0 0;\">Click each card — when would you use it?<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:26px; margin-top:40px; flex:1;\">\n        <div onclick=\"{{ onReveal }}\" data-rk=\"c_picto\" style=\"cursor:pointer; background:#fff; border-radius:24px; padding:34px; box-shadow:0 12px 30px rgba(22,34,58,.08); border-top:12px solid #FFC53D; display:flex; flex-direction:column; align-items:center; text-align:center;\">\n          <div style=\"display:flex; gap:8px; margin-top:10px;\"><span style=\"width:30px;height:30px;border-radius:50%;background:#FFC53D;\"><\u002Fspan><span style=\"width:30px;height:30px;border-radius:50%;background:#FFC53D;\"><\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:38px; margin:24px 0 0;\">Pictogram<\u002Fh3>\n          <sc-if value=\"{{ r.c_picto }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:28px; font-weight:700; color:#B26A00; margin:18px 0 0; animation:fadeUp .3s both;\">Simple, friendly counts of categories<\u002Fp><\u002Fsc-if>\n        <\u002Fdiv>\n        <div onclick=\"{{ onReveal }}\" data-rk=\"c_bar\" style=\"cursor:pointer; background:#fff; border-radius:24px; padding:34px; box-shadow:0 12px 30px rgba(22,34,58,.08); border-top:12px solid #4D7CFF; display:flex; flex-direction:column; align-items:center; text-align:center;\">\n          <div style=\"display:flex; gap:8px; align-items:flex-end; margin-top:10px; height:56px;\"><span style=\"width:18px;height:30px;background:#4D7CFF;border-radius:4px;\"><\u002Fspan><span style=\"width:18px;height:50px;background:#4D7CFF;border-radius:4px;\"><\u002Fspan><span style=\"width:18px;height:40px;background:#4D7CFF;border-radius:4px;\"><\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:38px; margin:24px 0 0;\">Bar Chart<\u002Fh3>\n          <sc-if value=\"{{ r.c_bar }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:28px; font-weight:700; color:#2C4FB0; margin:18px 0 0; animation:fadeUp .3s both;\">Comparing separate categories<\u002Fp><\u002Fsc-if>\n        <\u002Fdiv>\n        <div onclick=\"{{ onReveal }}\" data-rk=\"c_pie\" style=\"cursor:pointer; background:#fff; border-radius:24px; padding:34px; box-shadow:0 12px 30px rgba(22,34,58,.08); border-top:12px solid #9B5DE5; display:flex; flex-direction:column; align-items:center; text-align:center;\">\n          <div style=\"width:56px; height:56px; border-radius:50%; margin-top:10px; background:conic-gradient(#9B5DE5 0deg 130deg,#C9A6F0 130deg 230deg,#E7D6FA 230deg 360deg);\"><\u002Fdiv>\n          <h3 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:38px; margin:24px 0 0;\">Pie Chart<\u002Fh3>\n          <sc-if value=\"{{ r.c_pie }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:28px; font-weight:700; color:#6B33C0; margin:18px 0 0; animation:fadeUp .3s both;\">Proportions / share of a whole<\u002Fp><\u002Fsc-if>\n        <\u002Fdiv>\n        <div onclick=\"{{ onReveal }}\" data-rk=\"c_line\" style=\"cursor:pointer; background:#fff; border-radius:24px; padding:34px; box-shadow:0 12px 30px rgba(22,34,58,.08); border-top:12px solid #FF5D5D; display:flex; flex-direction:column; align-items:center; text-align:center;\">\n          <svg width=\"64\" height=\"56\" style=\"margin-top:10px;\" viewBox=\"0 0 64 56\"><polyline points=\"4,44 22,24 40,34 60,8\" fill=\"none\" stroke=\"#FF5D5D\" stroke-width=\"6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg>\n          <h3 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:38px; margin:24px 0 0;\">Line Graph<\u002Fh3>\n          <sc-if value=\"{{ r.c_line }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:28px; font-weight:700; color:#C0392B; margin:18px 0 0; animation:fadeUp .3s both;\">Change over time<\u002Fp><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Exit ticket\" data-speaker-notes=\"Exit ticket. Three quick questions — answer all three to see your score. Use it as a plenary: thumbs up if you got all three. Answers: discrete, proportions of a whole, units digit.\">\n    <div style=\"position:absolute; inset:0; background:#16223A; font-family:'Nunito',sans-serif; color:#fff; padding:70px 90px; display:flex; flex-direction:column;\">\n      <div style=\"display:flex; align-items:flex-end; justify-content:space-between;\">\n        <div>\n          <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:26px; letter-spacing:2px; color:#FFC53D;\">CHAPTER RECAP<\u002Fdiv>\n          <h2 style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:64px; margin:6px 0 0;\">Exit Ticket<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"{{ exitScoreStyle }}\">{{ exitScoreText }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:28px; margin-top:36px; flex:1;\">\n        <div style=\"background:#1F2D4A; border-radius:24px; padding:34px; display:flex; flex-direction:column;\">\n          <p style=\"font-size:32px; font-weight:800; margin:0 0 22px; line-height:1.3;\">{{ qExit1.q }}<\u002Fp>\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <sc-for list=\"{{ qExit1.opts }}\" as=\"opt\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ onPick }}\" data-quiz=\"qExit1\" data-idx=\"{{ $index }}\" style=\"{{ opt.style }}\"><span>{{ opt.t }}<\u002Fspan><span style=\"font-size:28px; font-weight:800;\">{{ opt.mark }}<\u002Fspan><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#1F2D4A; border-radius:24px; padding:34px; display:flex; flex-direction:column;\">\n          <p style=\"font-size:32px; font-weight:800; margin:0 0 22px; line-height:1.3;\">{{ qExit2.q }}<\u002Fp>\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <sc-for list=\"{{ qExit2.opts }}\" as=\"opt\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ onPick }}\" data-quiz=\"qExit2\" data-idx=\"{{ $index }}\" style=\"{{ opt.style }}\"><span>{{ opt.t }}<\u002Fspan><span style=\"font-size:28px; font-weight:800;\">{{ opt.mark }}<\u002Fspan><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#1F2D4A; border-radius:24px; padding:34px; display:flex; flex-direction:column;\">\n          <p style=\"font-size:32px; font-weight:800; margin:0 0 22px; line-height:1.3;\">{{ qExit3.q }}<\u002Fp>\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <sc-for list=\"{{ qExit3.opts }}\" as=\"opt\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ onPick }}\" data-quiz=\"qExit3\" data-idx=\"{{ $index }}\" style=\"{{ opt.style }}\"><span>{{ opt.t }}<\u002Fspan><span style=\"font-size:28px; font-weight:800;\">{{ opt.mark }}<\u002Fspan><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"text-align:center; font-size:28px; font-weight:700; color:#9aa6bd; margin:26px 0 0;\">Great work — you can now collect, organise and display data! 🎉<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    reveals: {},\n    quiz: {},\n    sortSel: null,\n    placed: {},\n    sortChecked: false,\n    bars: { apple: 6, banana: 9, cherry: 3, grape: 7 },\n    pie: { walk: 9, bus: 6, car: 3, cycle: 2 },\n    stemStep: 0,\n    lineDrawn: false,\n    tally: { dog: 0, cat: 0, fish: 0, bird: 0 },\n    pieDrawStep: 0\n  };\n\n  quizzes = {\n    qTypes: {\n      q: 'Which of these is CONTINUOUS data?',\n      opts: [\n        { t: 'Number of pets a student owns', ok: false },\n        { t: 'The mass of a newborn puppy', ok: true },\n        { t: 'Favourite colour of car', ok: false },\n        { t: 'Goals scored in a football match', ok: false }\n      ],\n      yes: 'Correct! Mass is measured and can take ANY value (3.2 kg, 3.25 kg…) — that makes it continuous.',\n      no: 'Not quite. Continuous data is measured and can take any value. Counts (pets, goals) are discrete; colour is qualitative.'\n    },\n    qTable: {\n      q: 'How many students travel by bus altogether?',\n      opts: [\n        { t: '7', ok: false },\n        { t: '8', ok: false },\n        { t: '15', ok: true },\n        { t: '17', ok: false }\n      ],\n      yes: 'Yes! Add the whole bus column: 7 boys + 8 girls = 15.',\n      no: 'Look down the bus column and add it up: 7 + 8 = 15.'\n    },\n    qStem: {\n      q: 'What is the MEDIAN mark?',\n      opts: [\n        { t: '53', ok: false },\n        { t: '58', ok: true },\n        { t: '62', ok: false },\n        { t: '31 (the range)', ok: false }\n      ],\n      yes: 'Correct! With 11 values the median is the 6th one — that is 58.',\n      no: 'There are 11 marks, so the median is the 6th value (the (11+1)/2 th). Count along: it is 58.'\n    },\n    qExit1: {\n      q: 'Shoe size is an example of…',\n      opts: [\n        { t: 'Continuous data', ok: false },\n        { t: 'Discrete data', ok: true },\n        { t: 'Qualitative data', ok: false }\n      ],\n      yes: 'Yes — shoe sizes are counted in steps, so discrete.',\n      no: 'Shoe sizes come in fixed steps (you count them) — that is discrete.'\n    },\n    qExit2: {\n      q: 'A pie chart is best for showing…',\n      opts: [\n        { t: 'Change over time', ok: false },\n        { t: 'Proportions of a whole', ok: true },\n        { t: 'Exact measurements', ok: false }\n      ],\n      yes: 'Yes — each slice is a share of the total.',\n      no: 'A pie chart shows each group as a share of the whole — proportions.'\n    },\n    qExit3: {\n      q: 'In a stem-and-leaf diagram, the leaves are the…',\n      opts: [\n        { t: 'Tens digit', ok: false },\n        { t: 'Units (ones) digit', ok: true },\n        { t: 'Totals', ok: false }\n      ],\n      yes: 'Correct — the stem is the tens, the leaf is the units digit.',\n      no: 'The stem holds the tens digit; the leaf is the units (ones) digit.'\n    }\n  };\n\n  sortCards = [\n    { id: 'eye', t: 'Eye colour', cat: 'qual' },\n    { id: 'sport', t: 'Favourite sport', cat: 'qual' },\n    { id: 'sib', t: 'Number of siblings', cat: 'disc' },\n    { id: 'goals', t: 'Goals scored', cat: 'disc' },\n    { id: 'height', t: 'Height (cm)', cat: 'cont' },\n    { id: 'time', t: 'Time to run 100 m', cat: 'cont' }\n  ];\n\n  binDefs = [\n    { id: 'qual', label: 'Qualitative', color: '#9B5DE5', hint: 'words / categories' },\n    { id: 'disc', label: 'Discrete', color: '#4D7CFF', hint: 'counted, with gaps' },\n    { id: 'cont', label: 'Continuous', color: '#16C79A', hint: 'measured, any value' }\n  ];\n\n  barColors = { apple: '#FF5D5D', banana: '#FFC53D', cherry: '#9B5DE5', grape: '#16C79A' };\n  barLabels = { apple: 'Apple', banana: 'Banana', cherry: 'Cherry', grape: 'Grape' };\n  barOrder = ['apple', 'banana', 'cherry', 'grape'];\n\n  pieColors = { walk: '#FF5D5D', bus: '#4D7CFF', car: '#FFC53D', cycle: '#16C79A' };\n  pieLabels = { walk: 'Walk', bus: 'Bus', car: 'Car', cycle: 'Cycle' };\n  pieOrder = ['walk', 'bus', 'car', 'cycle'];\n\n  marks = [42, 45, 51, 53, 58, 58, 62, 64, 69, 71, 73];\n  temps = [14, 17, 16, 19, 22, 21, 18];\n  days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];\n\n  componentDidMount() {\n    this._key = (e) => {\n      if (e.key === ' ' || e.key === 'Enter') return;\n    };\n  }\n\n  toggle(k) { this.setState(s => ({ reveals: { ...s.reveals, [k]: !s.reveals[k] } })); }\n\n  _quiz(id) {\n    const q = this.quizzes[id];\n    const chosen = this.state.quiz[id];\n    const answered = chosen != null;\n    const base = {\n      display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '14px',\n      width: '100%', padding: '20px 26px', borderRadius: '16px', fontFamily: \"'Fredoka', sans-serif\",\n      fontWeight: 600, fontSize: '30px', cursor: 'pointer', textAlign: 'left', transition: 'all .15s',\n      background: '#fff', border: '2px solid rgba(22,34,58,.14)', color: '#16223A', boxShadow: '0 2px 0 rgba(22,34,58,.05)'\n    };\n    const opts = q.opts.map((o, i) => {\n      const st = { ...base };\n      let mark = '';\n      if (answered) {\n        if (o.ok) { st.background = '#E7FBF4'; st.border = '3px solid #16C79A'; st.color = '#0C7A5C'; mark = '✓'; }\n        if (i === chosen && !o.ok) { st.background = '#FFECEC'; st.border = '3px solid #FF5D5D'; st.color = '#C0392B'; mark = '✗'; }\n        if (!o.ok && i !== chosen) { st.opacity = 0.5; }\n      }\n      return { t: o.t, style: st, mark };\n    });\n    const correct = answered && q.opts[chosen].ok;\n    return {\n      q: q.q, opts, answered, correct,\n      fbText: answered ? (correct ? q.yes : q.no) : '',\n      fbStyle: {\n        marginTop: '26px', padding: '20px 26px', borderRadius: '14px', fontSize: '28px', fontWeight: 700,\n        fontFamily: \"'Nunito', sans-serif\", lineHeight: 1.4, maxWidth: '1300px',\n        background: correct ? '#E7FBF4' : '#FFF3E0', color: correct ? '#0C7A5C' : '#B26A00',\n        border: '2px solid ' + (correct ? '#16C79A' : '#FFC53D')\n      }\n    };\n  }\n\n  // ---- sort game ----\n  onSelect = (e) => {\n    const id = e.currentTarget.dataset.card;\n    this.setState(s => ({ sortSel: s.sortSel === id ? null : id }));\n  };\n  onPlace = (e) => {\n    const bin = e.currentTarget.dataset.bin;\n    const sel = this.state.sortSel;\n    if (!sel) return;\n    this.setState(s => ({ placed: { ...s.placed, [sel]: bin }, sortSel: null }));\n  };\n  onDragCard = (e) => {\n    this.setState({ sortSel: e.currentTarget.dataset.card });\n    if (e.dataTransfer) e.dataTransfer.setData('text/plain', e.currentTarget.dataset.card);\n  };\n  onDropBin = (e) => {\n    e.preventDefault();\n    const bin = e.currentTarget.dataset.bin;\n    const sel = this.state.sortSel || (e.dataTransfer && e.dataTransfer.getData('text/plain'));\n    if (!sel) return;\n    this.setState(s => ({ placed: { ...s.placed, [sel]: bin }, sortSel: null }));\n  };\n  onDragOver = (e) => { e.preventDefault(); };\n  onCheckSort = () => this.setState({ sortChecked: true });\n  onResetSort = () => this.setState({ placed: {}, sortChecked: false, sortSel: null });\n\n  _sortData() {\n    const { placed, sortSel, sortChecked } = this.state;\n    const cardBase = {\n      fontFamily: \"'Fredoka', sans-serif\", fontWeight: 600, fontSize: '30px', padding: '16px 26px',\n      borderRadius: '14px', cursor: 'pointer', border: '2px solid rgba(22,34,58,.14)', background: '#fff',\n      color: '#16223A', boxShadow: '0 3px 0 rgba(22,34,58,.06)', transition: 'all .15s'\n    };\n    const trayCards = this.sortCards.filter(c => !placed[c.id]).map(c => {\n      const st = { ...cardBase };\n      if (sortSel === c.id) { st.background = '#FFE9B8'; st.border = '3px solid #FFC53D'; st.transform = 'translateY(-3px)'; }\n      return { id: c.id, t: c.t, style: st };\n    });\n    const bins = this.binDefs.map(b => {\n      const cards = this.sortCards.filter(c => placed[c.id] === b.id).map(c => {\n        const st = {\n          fontFamily: \"'Fredoka', sans-serif\", fontWeight: 700, fontSize: '28px', padding: '14px 22px',\n          borderRadius: '12px', display: 'flex', justifyContent: 'space-between', alignItems: 'center'\n        };\n        let mark = '';\n        if (sortChecked) {\n          const right = c.cat === b.id;\n          st.background = right ? '#E7FBF4' : '#FFECEC';\n          st.color = right ? '#0C7A5C' : '#C0392B';\n          mark = right ? '  ✓' : '  ✗';\n        } else {\n          st.background = '#F4F1EA'; st.color = '#16223A';\n        }\n        return { t: c.t, style: st, mark };\n      });\n      const binStyle = {\n        background: '#fff', borderRadius: '22px', padding: '26px 28px', minHeight: '300px',\n        border: sortSel ? '3px dashed ' + b.color : '3px solid #ECE7DD',\n        boxShadow: '0 10px 26px rgba(22,34,58,.06)', cursor: sortSel ? 'pointer' : 'default', transition: 'all .15s'\n      };\n      return { id: b.id, label: b.label, color: b.color, hint: b.hint, cards, style: binStyle };\n    });\n    const placedCount = Object.keys(placed).length;\n    const correct = this.sortCards.filter(c => placed[c.id] === c.cat).length;\n    let scoreText = '', scoreStyle = {};\n    if (sortChecked) {\n      const all = correct === this.sortCards.length;\n      scoreText = all ? 'Perfect — ' + correct + ' / 6 correct! 🎉' : correct + ' / 6 correct — fix the red ones and check again';\n      scoreStyle = {\n        fontFamily: \"'Fredoka', sans-serif\", fontWeight: 700, fontSize: '30px', padding: '16px 28px',\n        borderRadius: '14px', background: all ? '#E7FBF4' : '#FFF3E0', color: all ? '#0C7A5C' : '#B26A00'\n      };\n    }\n    return { trayCards, bins, trayEmpty: placedCount === 6, sortChecked, sortScoreText: scoreText, sortScoreStyle: scoreStyle };\n  }\n\n  // ---- two-way table ----\n  _table() {\n    const r = this.state.reveals;\n    const vals = { t_b: 20, t_g: 22, t_w: 17, t_bus: 15, t_car: 10, grand: 42 };\n    const cell = {};\n    Object.keys(vals).forEach(k => {\n      cell[k] = r[k] ? vals[k] : '?';\n      cell[k + '_bg'] = r[k] ? (k === 'grand' ? '#16C79A' : '#9B5DE5') : '#C9BBDD';\n    });\n    return cell;\n  }\n\n  // ---- bar chart ----\n  onBar = (e) => {\n    const { key, dir } = e.currentTarget.dataset;\n    this.setState(s => {\n      const v = Math.max(0, Math.min(12, s.bars[key] + (dir === 'up' ? 1 : -1)));\n      return { bars: { ...s.bars, [key]: v } };\n    });\n  };\n  _bars() {\n    return this.barOrder.map(k => ({\n      key: k, label: this.barLabels[k], color: this.barColors[k],\n      count: this.state.bars[k], h: (this.state.bars[k] / 12 * 100) + '%'\n    }));\n  }\n\n  // ---- pie chart ----\n  onPie = (e) => {\n    const { key, dir } = e.currentTarget.dataset;\n    this.setState(s => {\n      const v = Math.max(0, Math.min(15, s.pie[key] + (dir === 'up' ? 1 : -1)));\n      return { pie: { ...s.pie, [key]: v } };\n    });\n  };\n  _pie() {\n    const total = this.pieOrder.reduce((a, k) => a + this.state.pie[k], 0);\n    let acc = 0;\n    const stops = [];\n    const segs = this.pieOrder.map(k => {\n      const c = this.state.pie[k];\n      const frac = total > 0 ? c / total : 0;\n      const start = acc * 360; acc += frac; const end = acc * 360;\n      stops.push(this.pieColors[k] + ' ' + start + 'deg ' + end + 'deg');\n      return { key: k, label: this.pieLabels[k], color: this.pieColors[k], count: c, pct: total > 0 ? Math.round(frac * 100) : 0 };\n    });\n    const pieBg = total > 0 ? 'conic-gradient(' + stops.join(',') + ')' : '#E5E0D6';\n    return { pie: segs, pieBg, pieTotal: total };\n  }\n\n  // ---- stem and leaf ----\n  onStem = (e) => {\n    const dir = e.currentTarget.dataset.dir;\n    const max = this.marks.length + 2;\n    this.setState(s => {\n      if (dir === 'reset') return { stemStep: 0 };\n      let v = s.stemStep + (dir === 'next' ? 1 : -1);\n      v = Math.max(0, Math.min(max, v));\n      return { stemStep: v };\n    });\n  };\n  _stem() {\n    const step = this.state.stemStep;\n    const n = this.marks.length;\n    const showFrame = step >= 1;\n    const placedCount = step >= 2 ? Math.min(step - 1, n) : 0;\n    const activeIdx = step >= 2 && step - 2 < n ? step - 2 : -1;\n    const complete = step >= n + 1;\n    const stems = [4, 5, 6, 7];\n    const rawBase = {\n      fontFamily: \"'Fredoka', sans-serif\", fontWeight: 700, fontSize: '32px', padding: '12px 18px',\n      borderRadius: '12px', transition: 'all .2s'\n    };\n    const raw = this.marks.map((v, i) => {\n      const st = { ...rawBase };\n      if (i === activeIdx) { st.background = '#FFC53D'; st.color = '#16223A'; st.transform = 'scale(1.12)'; }\n      else if (i < placedCount) { st.background = '#EFE6FF'; st.color = '#9B5DE5'; }\n      else { st.background = '#F4F1EA'; st.color = '#B9C0CE'; }\n      return { v, style: st };\n    });\n    const rows = stems.map(s => {\n      const leaves = [];\n      this.marks.forEach((v, i) => {\n        if (Math.floor(v / 10) === s && i < placedCount) {\n          const st = {\n            fontFamily: \"'Fredoka', sans-serif\", fontWeight: 700, fontSize: '36px', color: '#16223A',\n            display: 'inline-block'\n          };\n          if (i === activeIdx) { st.color = '#9B5DE5'; st.transform = 'scale(1.25)'; }\n          leaves.push({ d: v % 10, style: st });\n        }\n      });\n      return { stem: showFrame ? s : '', leaves };\n    });\n    let msg;\n    if (step === 0) msg = 'Here are 11 exam marks. Press Next to organise them.';\n    else if (step === 1) msg = 'Set up the stems — the tens digit of each mark: 4, 5, 6, 7.';\n    else if (!complete) msg = 'Placing ' + this.marks[activeIdx] + ' → stem ' + Math.floor(this.marks[activeIdx] / 10) + ', leaf ' + (this.marks[activeIdx] % 10) + '.';\n    else msg = 'Done! Every value is sorted and kept. Add a key to finish.';\n    return { rows, raw, msg, showKey: complete };\n  }\n\n  // ---- line graph ----\n  onPlot = () => this.setState(s => ({ lineDrawn: !s.lineDrawn }));\n  _line() {\n    const x0 = 80, x1 = 1040, y0 = 40, y1 = 400, tMin = 10, tMax = 25;\n    const xs = i => x0 + i * (x1 - x0) / (this.temps.length - 1);\n    const ys = t => y0 + (tMax - t) / (tMax - tMin) * (y1 - y0);\n    const pts = this.temps.map((t, i) => xs(i) + ',' + ys(t)).join(' ');\n    const dots = this.state.lineDrawn ? this.temps.map((t, i) => ({ cx: xs(i), cy: ys(t) })) : [];\n    const labels = this.days.map((d, i) => ({ x: xs(i), t: d }));\n    return {\n      linePoints: pts,\n      lineOff: this.state.lineDrawn ? '0' : '2400',\n      lineDots: dots,\n      lineLabels: labels,\n      plotLabel: this.state.lineDrawn ? '↺ Clear line' : '▶ Plot the temperatures'\n    };\n  }\n\n  // ---- exit score ----\n  _exit() {\n    const ids = ['qExit1', 'qExit2', 'qExit3'];\n    const answered = ids.filter(id => this.state.quiz[id] != null);\n    const correct = ids.filter(id => this.state.quiz[id] != null && this.quizzes[id].opts[this.state.quiz[id]].ok).length;\n    const done = answered.length === 3;\n    return {\n      exitScoreText: answered.length === 0 ? 'Answer all 3' : 'Score: ' + correct + ' / 3',\n      exitScoreStyle: {\n        fontFamily: \"'Fredoka', sans-serif\", fontWeight: 700, fontSize: '40px', padding: '14px 32px',\n        borderRadius: '16px',\n        background: done ? (correct === 3 ? '#16C79A' : '#FFC53D') : 'rgba(255,255,255,.12)',\n        color: done ? '#16223A' : '#fff'\n      }\n    };\n  }\n\n  // ---- tally / frequency table ----\n  tallyLabels = { dog: 'Dog', cat: 'Cat', fish: 'Fish', bird: 'Bird' };\n  tallyColors = { dog: '#FF5D5D', cat: '#FFC53D', fish: '#4D7CFF', bird: '#16C79A' };\n  tallyOrder = ['dog', 'cat', 'fish', 'bird'];\n  onTally = (e) => {\n    const { key, dir } = e.currentTarget.dataset;\n    this.setState(s => {\n      const v = Math.max(0, s.tally[key] + (dir === 'down' ? -1 : 1));\n      return { tally: { ...s.tally, [key]: v } };\n    });\n  };\n  onResetTally = () => this.setState({ tally: { dog: 0, cat: 0, fish: 0, bird: 0 } });\n  _tally() {\n    let total = 0;\n    const rows = this.tallyOrder.map(k => {\n      const c = this.state.tally[k];\n      total += c;\n      const groups = [];\n      let rem = c;\n      while (rem >= 5) { groups.push({ full: true, bars: [1, 1, 1, 1] }); rem -= 5; }\n      if (rem > 0) { const b = []; for (let i = 0; i < rem; i++) b.push(1); groups.push({ full: false, bars: b }); }\n      return { key: k, label: this.tallyLabels[k], color: this.tallyColors[k], count: c, groups };\n    });\n    return { tallyRows: rows, tallyTotal: total };\n  }\n\n  // ---- pie chart from scratch (protractor) ----\n  pieDrawCats = [\n    { label: 'Tea', freq: 10, color: '#FF5D5D' },\n    { label: 'Coffee', freq: 8, color: '#FFC53D' },\n    { label: 'Juice', freq: 7, color: '#4D7CFF' },\n    { label: 'Water', freq: 5, color: '#16C79A' }\n  ];\n  onPieDraw = (e) => {\n    const dir = e.currentTarget.dataset.dir;\n    const max = this.pieDrawCats.length + 1;\n    this.setState(s => {\n      if (dir === 'reset') return { pieDrawStep: 0 };\n      let v = s.pieDrawStep + (dir === 'next' ? 1 : -1);\n      return { pieDrawStep: Math.max(0, Math.min(max, v)) };\n    });\n  };\n  _pieDraw() {\n    const total = this.pieDrawCats.reduce((a, c) => a + c.freq, 0);\n    const per = 360 / total;\n    let cum = 0;\n    const cats = this.pieDrawCats.map(c => {\n      const angle = Math.round(c.freq * per);\n      const start = cum; cum += angle;\n      return { label: c.label, freq: c.freq, color: c.color, angle, start, end: cum };\n    });\n    const step = this.state.pieDrawStep;            // 0 = total only, 1..n draw sectors, n+1 = done\n    const drawn = Math.max(0, Math.min(step, cats.length));\n    const stops = [];\n    cats.forEach((c, i) => {\n      const col = i < drawn ? c.color : '#ECE7DD';\n      stops.push(col + ' ' + c.start + 'deg ' + c.end + 'deg');\n    });\n    const rows = cats.map((c, i) => ({\n      label: c.label, freq: c.freq, color: c.color, angle: c.angle,\n      calc: c.freq + '/' + total + ' × 360° = ' + c.angle + '°',\n      shown: i < drawn, hidden: i >= drawn, active: i === drawn - 1,\n      rowStyle: {\n        display: 'flex', alignItems: 'center', gap: '16px', padding: '14px 18px', borderRadius: '14px',\n        transition: 'all .2s',\n        background: i === drawn - 1 ? '#FFF3D6' : (i < drawn ? '#fff' : '#F4F1EA'),\n        opacity: i < drawn ? 1 : 0.5,\n        boxShadow: i < drawn ? '0 4px 14px rgba(22,34,58,.06)' : 'none'\n      }\n    }));\n    const armDeg = drawn > 0 ? cats[drawn - 1].end : 0;\n    let msg;\n    if (step === 0) msg = 'Step 1 — Count the total: 10 + 8 + 7 + 5 = 30 students.';\n    else if (drawn <= cats.length && step <= cats.length) msg = 'Measure ' + cats[drawn - 1].label + ': ' + cats[drawn - 1].freq + '/30 × 360° = ' + cats[drawn - 1].angle + '°, then turn the protractor to ' + cats[drawn - 1].end + '°.';\n    else msg = 'Done! The four angles add to 360° — a complete circle. Now label each sector.';\n    // protractor reference ticks (upper semicircle, 0° right → 180° left)\n    const cx = 210, cy = 205, R = 190;\n    const ticks = [];\n    for (let a = 0; a <= 180; a += 15) {\n      const rad = a * Math.PI / 180;\n      const major = a % 45 === 0;\n      const inner = R - (major ? 26 : 14);\n      ticks.push({\n        x1: cx + R * Math.cos(rad), y1: cy - R * Math.sin(rad),\n        x2: cx + inner * Math.cos(rad), y2: cy - inner * Math.sin(rad),\n        major, sw: major ? 3 : 1.5,\n        lx: cx + (R - 50) * Math.cos(rad), ly: cy - (R - 50) * Math.sin(rad) + 8,\n        label: major ? String(a) : ''\n      });\n    }\n    return {\n      pieDrawBg: 'conic-gradient(' + stops.join(',') + ')',\n      pieDrawRows: rows,\n      pieDrawArm: 'rotate(' + armDeg + 'deg)',\n      pieDrawMsg: msg,\n      pieDrawDone: step > cats.length,\n      pieDrawTotal: total,\n      protTicks: ticks\n    };\n  }\n\n  onReveal = (e) => this.toggle(e.currentTarget.dataset.rk);\n  onPick = (e) => {\n    const { quiz, idx } = e.currentTarget.dataset;\n    this.setState(s => ({ quiz: { ...s.quiz, [quiz]: +idx } }));\n  };\n\n  renderVals() {\n    return {\n      r: this.state.reveals,\n      onReveal: this.onReveal,\n      onPick: this.onPick,\n      qTypes: this._quiz('qTypes'),\n      qTable: this._quiz('qTable'),\n      qStem: this._quiz('qStem'),\n      qExit1: this._quiz('qExit1'),\n      qExit2: this._quiz('qExit2'),\n      qExit3: this._quiz('qExit3'),\n      onSelectCard: this.onSelect,\n      onPlaceBin: this.onPlace,\n      onDragCard: this.onDragCard,\n      onDropBin: this.onDropBin,\n      onDragOver: this.onDragOver,\n      onCheckSort: this.onCheckSort,\n      onResetSort: this.onResetSort,\n      ...this._sortData(),\n      cell: this._table(),\n      bars: this._bars(),\n      onBar: this.onBar,\n      ...this._pie(),\n      onPie: this.onPie,\n      ...this._pieDraw(),\n      onPieDraw: this.onPieDraw,\n      stem: this._stem(),\n      onStem: this.onStem,\n      onTally: this.onTally,\n      onResetTally: this.onResetTally,\n      ...this._tally(),\n      ...this._line(),\n      onPlot: this.onPlot,\n      ...this._exit()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"

<!-- SBS slide guard: stop interactive slide widgets (quiz taps, drag/drop, flip cards,
     step reveals and other tappable content) from advancing the deck on iPad / Apple
     Pencil. The deck advances on a tap unless the tapped element is already "interactive"
     to it, or the click's default was prevented. Real links/buttons are left untouched
     (they work + the deck already ignores them); div-based widgets are marked handled so
     the deck skips advancing while the widget still runs. -->
<script>
(function () {
  if (window.__sbsSlideGuard) return;
  window.__sbsSlideGuard = true;
  // Things the deck already leaves alone -> do NOT interfere (keeps links working).
  var DECK_SAFE = 'a[href],button,input,select,textarea,summary,label,'
                + 'video[controls],audio[controls],[role="button"],[onclick],'
                + '[tabindex]:not([tabindex^="-"]),[contenteditable]:not([contenteditable="false" i])';
  // Interactive slide content the deck does NOT recognise (plain divs with handlers).
  var WIDGET = '[data-quiz],[data-quiz-opt],[data-flip],[data-flip-inner],[data-reveal],'
             + '[data-step],[data-step-btn],[data-step-reset],[data-mark],[data-drop],'
             + '[data-term],[data-anim4],[data-toggle],[data-card],[data-match],'
             + '[style*="cursor:pointer"],[style*="cursor: pointer"],'
             + '[style*="cursor:grab"],[style*="cursor: grab"]';
  function m(n, sel) { return n && n.matches && n.matches(sel); }
  document.addEventListener('click', function (e) {
    var path = (e.composedPath && e.composedPath()) || [e.target];
    for (var i = 0; i < path.length; i++) {
      var n = path[i];
      if (!n || n === document || n === window) break;
      if (m(n, DECK_SAFE)) return;              // native control -> leave it alone
      if (m(n, WIDGET)) { e.preventDefault(); return; }  // widget -> don't advance slide
    }
  }, true);
})();
</script>
