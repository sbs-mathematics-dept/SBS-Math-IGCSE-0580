in a semicircle is 90 degrees. If the angle at the circumference is 35 degrees, the angle at the centre on the same arc is 70 degrees. If the angle at the centre is 140 degrees, the angle at the circumference is 70 degrees.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 72px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#FBBF24;color:#1F2933;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">QUIZ · ANGLES<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Questions 10–12 · answers in degrees<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:26px;flex:1;\">\n    <div class=\"quiz\" data-answer=\"90\" data-tol=\"0\" data-note=\"Angle in a semicircle.\" style=\"background:#fff;border-radius:20px;padding:28px;box-shadow:0 4px 20px rgba(31,41,51,.07);display:flex;flex-direction:column;\">\n      <div style=\"font-size:23px;font-weight:800;color:#7C3AED;margin-bottom:10px;\">Question 10<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:16px;\">AB is a diameter and C is on the circle. What is ∡ACB (degrees)?<\u002Fp>\n      <input class=\"quiz-input\" type=\"text\" inputmode=\"numeric\" placeholder=\"Type here…\" style=\"width:100%;font-family:Nunito,sans-serif;font-size:26px;padding:14px 16px;border:2px solid #CBD5E1;border-radius:12px;margin-bottom:14px;\">\n      <div style=\"display:flex;gap:10px;margin-bottom:12px;\"><button class=\"quiz-check\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:none;border-radius:12px;background:#10B981;color:#fff;cursor:pointer;\">Check<\u002Fbutton><button class=\"quiz-show\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:2px solid #7C3AED;border-radius:12px;background:#fff;color:#7C3AED;cursor:pointer;\">Show answer<\u002Fbutton><\u002Fdiv>\n      <div class=\"quiz-fb\" style=\"display:none;font-size:23px;font-weight:700;padding:12px 16px;border-radius:10px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"quiz\" data-answer=\"70\" data-tol=\"0\" data-note=\"Centre = 2 × 35°.\" style=\"background:#fff;border-radius:20px;padding:28px;box-shadow:0 4px 20px rgba(31,41,51,.07);display:flex;flex-direction:column;\">\n      <div style=\"font-size:23px;font-weight:800;color:#7C3AED;margin-bottom:10px;\">Question 11<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:16px;\">The angle at the circumference on an arc is <b>35°<\u002Fb>. Find the angle at the <b>centre<\u002Fb> on the same arc.<\u002Fp>\n      <input class=\"quiz-input\" type=\"text\" inputmode=\"numeric\" placeholder=\"Type here…\" style=\"width:100%;font-family:Nunito,sans-serif;font-size:26px;padding:14px 16px;border:2px solid #CBD5E1;border-radius:12px;margin-bottom:14px;\">\n      <div style=\"display:flex;gap:10px;margin-bottom:12px;\"><button class=\"quiz-check\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:none;border-radius:12px;background:#10B981;color:#fff;cursor:pointer;\">Check<\u002Fbutton><button class=\"quiz-show\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:2px solid #7C3AED;border-radius:12px;background:#fff;color:#7C3AED;cursor:pointer;\">Show answer<\u002Fbutton><\u002Fdiv>\n      <div class=\"quiz-fb\" style=\"display:none;font-size:23px;font-weight:700;padding:12px 16px;border-radius:10px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"quiz\" data-answer=\"70\" data-tol=\"0\" data-note=\"Circumference = 140° ÷ 2.\" style=\"background:#fff;border-radius:20px;padding:28px;box-shadow:0 4px 20px rgba(31,41,51,.07);display:flex;flex-direction:column;\">\n      <div style=\"font-size:23px;font-weight:800;color:#7C3AED;margin-bottom:10px;\">Question 12<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:16px;\">The angle at the <b>centre<\u002Fb> is <b>140°<\u002Fb>. Find the angle at the <b>circumference<\u002Fb> on the same arc.<\u002Fp>\n      <input class=\"quiz-input\" type=\"text\" inputmode=\"numeric\" placeholder=\"Type here…\" style=\"width:100%;font-family:Nunito,sans-serif;font-size:26px;padding:14px 16px;border:2px solid #CBD5E1;border-radius:12px;margin-bottom:14px;\">\n      <div style=\"display:flex;gap:10px;margin-bottom:12px;\"><button class=\"quiz-check\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:none;border-radius:12px;background:#10B981;color:#fff;cursor:pointer;\">Check<\u002Fbutton><button class=\"quiz-show\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:2px solid #7C3AED;border-radius:12px;background:#fff;color:#7C3AED;cursor:pointer;\">Show answer<\u002Fbutton><\u002Fdiv>\n      <div class=\"quiz-fb\" style=\"display:none;font-size:23px;font-weight:700;padding:12px 16px;border-radius:10px;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Quiz 13–15 · Angles II\" data-screen-label=\"Quiz set 5\" data-speaker-notes=\"Questions 13 to 15. In a cyclic quadrilateral one angle is 85 degrees; its opposite is 95 degrees. Angles in the same segment: if one is 48 degrees the other is 48 degrees. An exterior angle of a cyclic quadrilateral equals the interior opposite angle; if that is 110 degrees, the exterior angle is 110 degrees.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 72px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#FBBF24;color:#1F2933;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">QUIZ · ANGLES<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Questions 13–15 · cyclic quads &amp; segments<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:26px;flex:1;\">\n    <div class=\"quiz\" data-answer=\"95\" data-tol=\"0\" data-note=\"Opposite angles sum to 180°.\" style=\"background:#fff;border-radius:20px;padding:28px;box-shadow:0 4px 20px rgba(31,41,51,.07);display:flex;flex-direction:column;\">\n      <div style=\"font-size:23px;font-weight:800;color:#DB2777;margin-bottom:10px;\">Question 13<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:16px;\">One angle of a cyclic quadrilateral is <b>85°<\u002Fb>. Find its <b>opposite<\u002Fb> angle (degrees).<\u002Fp>\n      <input class=\"quiz-input\" type=\"text\" inputmode=\"numeric\" placeholder=\"Type here…\" style=\"width:100%;font-family:Nunito,sans-serif;font-size:26px;padding:14px 16px;border:2px solid #CBD5E1;border-radius:12px;margin-bottom:14px;\">\n      <div style=\"display:flex;gap:10px;margin-bottom:12px;\"><button class=\"quiz-check\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:none;border-radius:12px;background:#10B981;color:#fff;cursor:pointer;\">Check<\u002Fbutton><button class=\"quiz-show\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:2px solid #7C3AED;border-radius:12px;background:#fff;color:#7C3AED;cursor:pointer;\">Show answer<\u002Fbutton><\u002Fdiv>\n      <div class=\"quiz-fb\" style=\"display:none;font-size:23px;font-weight:700;padding:12px 16px;border-radius:10px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"quiz\" data-answer=\"48\" data-tol=\"0\" data-note=\"Same segment → equal.\" style=\"background:#fff;border-radius:20px;padding:28px;box-shadow:0 4px 20px rgba(31,41,51,.07);display:flex;flex-direction:column;\">\n      <div style=\"font-size:23px;font-weight:800;color:#DB2777;margin-bottom:10px;\">Question 14<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:16px;\">Two angles stand on the same arc, in the same segment. One is <b>48°<\u002Fb>. Find the other (degrees).<\u002Fp>\n      <input class=\"quiz-input\" type=\"text\" inputmode=\"numeric\" placeholder=\"Type here…\" style=\"width:100%;font-family:Nunito,sans-serif;font-size:26px;padding:14px 16px;border:2px solid #CBD5E1;border-radius:12px;margin-bottom:14px;\">\n      <div style=\"display:flex;gap:10px;margin-bottom:12px;\"><button class=\"quiz-check\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:none;border-radius:12px;background:#10B981;color:#fff;cursor:pointer;\">Check<\u002Fbutton><button class=\"quiz-show\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:2px solid #7C3AED;border-radius:12px;background:#fff;color:#7C3AED;cursor:pointer;\">Show answer<\u002Fbutton><\u002Fdiv>\n      <div class=\"quiz-fb\" style=\"display:none;font-size:23px;font-weight:700;padding:12px 16px;border-radius:10px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"quiz\" data-answer=\"110\" data-tol=\"0\" data-note=\"Exterior = interior opposite.\" style=\"background:#fff;border-radius:20px;padding:28px;box-shadow:0 4px 20px rgba(31,41,51,.07);display:flex;flex-direction:column;\">\n      <div style=\"font-size:23px;font-weight:800;color:#DB2777;margin-bottom:10px;\">Question 15<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:16px;\">The interior opposite angle of a cyclic quadrilateral is <b>110°<\u002Fb>. Find the <b>exterior<\u002Fb> angle (degrees).<\u002Fp>\n      <input class=\"quiz-input\" type=\"text\" inputmode=\"numeric\" placeholder=\"Type here…\" style=\"width:100%;font-family:Nunito,sans-serif;font-size:26px;padding:14px 16px;border:2px solid #CBD5E1;border-radius:12px;margin-bottom:14px;\">\n      <div style=\"display:flex;gap:10px;margin-bottom:12px;\"><button class=\"quiz-check\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:none;border-radius:12px;background:#10B981;color:#fff;cursor:pointer;\">Check<\u002Fbutton><button class=\"quiz-show\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:2px solid #7C3AED;border-radius:12px;background:#fff;color:#7C3AED;cursor:pointer;\">Show answer<\u002Fbutton><\u002Fdiv>\n      <div class=\"quiz-fb\" style=\"display:none;font-size:23px;font-weight:700;padding:12px 16px;border-radius:10px;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Quiz 16–18 · Mixed\" data-screen-label=\"Quiz set 6\" data-speaker-notes=\"Questions 16 to 18, mixed and higher demand. Alternate segment: the tangent-chord angle is 62 degrees, so the angle in the alternate segment is 62 degrees. Two tangents from a point with 50 degrees between them: the angle each makes with the line to the centre is 25 degrees, or the angle at the centre in the kite is 130 degrees; here answer the base angle 65. Name the theorem: angle in a semicircle.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 72px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#FBBF24;color:#1F2933;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">QUIZ · MIXED<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Questions 16–18 · the last three<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:26px;flex:1;\">\n    <div class=\"quiz\" data-answer=\"62\" data-tol=\"0\" data-note=\"Alternate segment theorem.\" style=\"background:#fff;border-radius:20px;padding:28px;box-shadow:0 4px 20px rgba(31,41,51,.07);display:flex;flex-direction:column;\">\n      <div style=\"font-size:23px;font-weight:800;color:#059669;margin-bottom:10px;\">Question 16<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:16px;\">The angle between a tangent and a chord is <b>62°<\u002Fb>. Find the angle in the <b>alternate segment<\u002Fb> (degrees).<\u002Fp>\n      <input class=\"quiz-input\" type=\"text\" inputmode=\"numeric\" placeholder=\"Type here…\" style=\"width:100%;font-family:Nunito,sans-serif;font-size:26px;padding:14px 16px;border:2px solid #CBD5E1;border-radius:12px;margin-bottom:14px;\">\n      <div style=\"display:flex;gap:10px;margin-bottom:12px;\"><button class=\"quiz-check\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:none;border-radius:12px;background:#10B981;color:#fff;cursor:pointer;\">Check<\u002Fbutton><button class=\"quiz-show\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:2px solid #7C3AED;border-radius:12px;background:#fff;color:#7C3AED;cursor:pointer;\">Show answer<\u002Fbutton><\u002Fdiv>\n      <div class=\"quiz-fb\" style=\"display:none;font-size:23px;font-weight:700;padding:12px 16px;border-radius:10px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"quiz\" data-answer=\"130\" data-tol=\"0\" data-note=\"Kite: 360−90−90−50 = 130° at the centre.\" style=\"background:#fff;border-radius:20px;padding:28px;box-shadow:0 4px 20px rgba(31,41,51,.07);display:flex;flex-direction:column;\">\n      <div style=\"font-size:23px;font-weight:800;color:#059669;margin-bottom:10px;\">Question 17<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:16px;\">Two tangents from P meet at <b>50°<\u002Fb>. Find the angle <b>AOB<\u002Fb> at the centre of the kite OAPB (degrees).<\u002Fp>\n      <input class=\"quiz-input\" type=\"text\" inputmode=\"numeric\" placeholder=\"Type here…\" style=\"width:100%;font-family:Nunito,sans-serif;font-size:26px;padding:14px 16px;border:2px solid #CBD5E1;border-radius:12px;margin-bottom:14px;\">\n      <div style=\"display:flex;gap:10px;margin-bottom:12px;\"><button class=\"quiz-check\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:none;border-radius:12px;background:#10B981;color:#fff;cursor:pointer;\">Check<\u002Fbutton><button class=\"quiz-show\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:2px solid #7C3AED;border-radius:12px;background:#fff;color:#7C3AED;cursor:pointer;\">Show answer<\u002Fbutton><\u002Fdiv>\n      <div class=\"quiz-fb\" style=\"display:none;font-size:23px;font-weight:700;padding:12px 16px;border-radius:10px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"quiz\" data-answer=\"semicircle|angle in a semicircle|angle in semicircle|thales\" data-note=\"The diameter subtends 90°.\" style=\"background:#fff;border-radius:20px;padding:28px;box-shadow:0 4px 20px rgba(31,41,51,.07);display:flex;flex-direction:column;\">\n      <div style=\"font-size:23px;font-weight:800;color:#059669;margin-bottom:10px;\">Question 18<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:16px;\">Which theorem says an angle drawn on the diameter is 90°? (name it in a few words)<\u002Fp>\n      <input class=\"quiz-input\" type=\"text\" placeholder=\"Type here…\" style=\"width:100%;font-family:Nunito,sans-serif;font-size:26px;padding:14px 16px;border:2px solid #CBD5E1;border-radius:12px;margin-bottom:14px;\">\n      <div style=\"display:flex;gap:10px;margin-bottom:12px;\"><button class=\"quiz-check\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:none;border-radius:12px;background:#10B981;color:#fff;cursor:pointer;\">Check<\u002Fbutton><button class=\"quiz-show\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:2px solid #7C3AED;border-radius:12px;background:#fff;color:#7C3AED;cursor:pointer;\">Show answer<\u002Fbutton><\u002Fdiv>\n      <div class=\"quiz-fb\" style=\"display:none;font-size:23px;font-weight:700;padding:12px 16px;border-radius:10px;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Cheat sheet\" data-screen-label=\"Cheat sheet\" data-speaker-notes=\"The one-page cheat sheet. All eight circle theorems and the symmetry rules in one place for quick revision before the exam.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:48px 68px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\"><span style=\"white-space:nowrap;background:#1F2933;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">CHEAT SHEET<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Everything on one page<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.5fr 1fr;gap:26px;flex:1;min-height:0;\">\n    <div style=\"background:#7C3AED;color:#fff;border-radius:20px;padding:26px 32px;display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:800;color:#FBBF24;margin-bottom:14px;\">CIRCLE THEOREMS<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;font-size:23px;line-height:1.32;\">\n        <div>• Semicircle angle = <b>90°<\u002Fb><\u002Fdiv>\n        <div>• Centre = <b>2 ×<\u002Fb> circumference<\u002Fdiv>\n        <div>• Same segment → <b>equal<\u002Fb><\u002Fdiv>\n        <div>• Cyclic quad opp. = <b>180°<\u002Fb><\u002Fdiv>\n        <div>• Exterior = interior opposite<\u002Fdiv>\n        <div>• Tangent ⊥ radius = <b>90°<\u002Fb><\u002Fdiv>\n        <div>• Two tangents are <b>equal<\u002Fb><\u002Fdiv>\n        <div>• ⊥ from centre <b>bisects<\u002Fb> chord<\u002Fdiv>\n        <div style=\"grid-column:1 / -1;\">• Alternate segment: tangent-chord = angle in alternate segment<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"height:2px;background:rgba(255,255,255,.2);margin:16px 0;\"><\u002Fdiv>\n      <div style=\"font-size:26px;font-weight:800;color:#34E0C4;margin-bottom:10px;\">PROBLEM STEPS<\u002Fdiv>\n      <div style=\"font-size:23px;line-height:1.4;\">Chord → drop ⊥ from O → half chord → Pythagoras.<br>Tangent → mark 90° → equal tangents / isosceles → solve.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#ECFDF5;border:3px solid #10B981;border-radius:20px;padding:26px 30px;display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:800;color:#059669;margin-bottom:14px;\">SYMMETRY<\u002Fdiv>\n      <div style=\"font-size:24px;line-height:1.5;\">\n        <div style=\"margin-bottom:10px;\"><b>Line symmetry<\u002Fb> = fold &amp; match.<\u002Fdiv>\n        <div style=\"margin-bottom:10px;\"><b>Rotational order<\u002Fb> = matches in one 360° turn.<\u002Fdiv>\n        <div style=\"margin-bottom:10px;\"><b>Regular <span class=\"mvar\">n<\u002Fspan>-gon<\u002Fb>: <span class=\"mvar\">n<\u002Fspan> lines, order <span class=\"mvar\">n<\u002Fspan>.<\u002Fdiv>\n        <div style=\"margin-bottom:10px;\"><b>Plane of symmetry<\u002Fb> = 3D mirror cut.<\u002Fdiv>\n        <div>Cuboid <b>3<\u002Fb> · cylinder <b>∞<\u002Fb> · sphere <b>∞<\u002Fb>.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Well done!\" data-screen-label=\"Closing\" data-speaker-notes=\"Closing slide. Well done. You now know the symmetry properties and all the circle theorems. Keep practising with the interactive spinner, the angle explorer, the circle theorems lab, and the quiz.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0;display:flex;font-family:Nunito,system-ui,sans-serif;background:#7C3AED;color:#fff;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;left:-120px;top:-120px;width:420px;height:420px;border-radius:50%;background:#8B5CF6;\"><\u002Fdiv>\n  <div style=\"position:absolute;right:-140px;bottom:-160px;width:520px;height:520px;border-radius:50%;background:#6D28D9;\"><\u002Fdiv>\n  <div style=\"margin:auto;text-align:center;position:relative;z-index:1;padding:0 60px;\">\n    <div style=\"font-size:120px;line-height:1;margin-bottom:20px;\">🎉<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:96px;line-height:1;margin-bottom:24px;\">Well done!<\u002Fh2>\n    <p style=\"font-size:34px;color:#EDE4FF;max-width:1100px;margin:0 auto;line-height:1.4;\">You can now recognise symmetry in 2D and 3D and use all <b style=\"color:#FBBF24;\">eight circle theorems<\u002Fb>. Keep practising with the <b style=\"color:#34E0C4;\">spinner<\u002Fb>, the <b style=\"color:#FF7AC6;\">angle explorer<\u002Fb>, the <b style=\"color:#FF7AC6;\">Circle Theorems Lab<\u002Fb>, and the quiz.<\u002Fp>\n    <div style=\"margin-top:40px;font-size:26px;color:#D8C7F8;font-weight:600;\">Cambridge IGCSE™ Mathematics 0580 · Chapter 19 · Symmetry &amp; circles<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
