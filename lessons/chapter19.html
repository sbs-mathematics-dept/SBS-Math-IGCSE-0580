      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const templateEl = document.querySelector('script[type="__bundler/template"]');

      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};

      const entry = manifest[uuid];

            const reader = ds.readable.getReader();

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);

      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;

      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

        s.textContent = await r.text();
        s.removeAttribute('src');

      old.replaceWith(s);
      if (p) await p;

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <div style=\"display:flex;align-items:center;gap:70px;position:relative;z-index:1;\">\n    <div style=\"flex:1;\">\n      <div style=\"display:inline-block;font-size:30px;font-weight:800;color:#1F2933;background:#FBBF24;letter-spacing:.02em;margin-bottom:24px;padding:8px 22px;border-radius:999px;\">Chapter 19<\u002Fdiv>\n      <h1 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:104px;line-height:0.98;letter-spacing:-.01em;\">Symmetry &amp; circles<\u002Fh1>\n      <p style=\"font-size:34px;font-weight:400;color:#EDE4FF;margin-top:32px;max-width:1050px;line-height:1.4;\">Line &amp; rotational symmetry and the <b style=\"color:#34E0C4;\">circle theorems<\u002Fb> — key words with pictures, memory drills, a <b style=\"color:#FFD84D;\">symmetry spinner<\u002Fb>, a live <b style=\"color:#FF7AC6;\">angle explorer<\u002Fb>, every worked example, and a <b style=\"color:#FF7AC6;\">type-your-answer<\u002Fb> quiz.<\u002Fp>\n    <\u002Fdiv>\n    <svg viewBox=\"0 0 300 300\" width=\"300\" height=\"300\" style=\"flex-shrink:0;\">\n      <rect x=\"26\" y=\"26\" width=\"248\" height=\"248\" rx=\"28\" fill=\"#FFFFFF\" opacity=\"0.1\"><\u002Frect>\n      <circle cx=\"150\" cy=\"150\" r=\"96\" fill=\"none\" stroke=\"#FBBF24\" stroke-width=\"7\"><\u002Fcircle>\n      <circle cx=\"150\" cy=\"150\" r=\"7\" fill=\"#fff\"><\u002Fcircle>\n      <line x1=\"70\" y1=\"188\" x2=\"230\" y2=\"112\" stroke=\"#34E0C4\" stroke-width=\"6\" stroke-linecap=\"round\"><\u002Fline>\n      <circle cx=\"70\" cy=\"188\" r=\"9\" fill=\"#FF7AC6\"><\u002Fcircle><circle cx=\"230\" cy=\"112\" r=\"9\" fill=\"#FF7AC6\"><\u002Fcircle>\n      <line x1=\"150\" y1=\"150\" x2=\"70\" y2=\"188\" stroke=\"#fff\" stroke-width=\"3\" opacity=\"0.7\"><\u002Fline>\n      <line x1=\"150\" y1=\"150\" x2=\"230\" y2=\"112\" stroke=\"#fff\" stroke-width=\"3\" opacity=\"0.7\"><\u002Fline>\n    <\u002Fsvg>\n  <\u002Fdiv>\n  <div style=\"font-size:24px;color:#D8C7F8;position:relative;z-index:1;\">Tap the arrows or press → to move · spin the shapes · drag point P on the circle · type into the quiz boxes and press Check<\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"What you'll learn\" data-screen-label=\"Objectives\" data-speaker-notes=\"Objectives: recognise line and rotational symmetry in two and three dimensions; use the symmetry properties of chords and tangents; and calculate unknown angles using the circle theorems, giving reasons.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:84px 96px 76px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:12px;\"><span style=\"width:52px;height:6px;background:#7C3AED;border-radius:3px;\"><\u002Fspan><span style=\"font-size:26px;font-weight:800;letter-spacing:.14em;color:#7C3AED;\">CHAPTER GOALS<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:60px;margin-bottom:40px;\">In this chapter you will learn how to…<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:28px;flex:1;\">\n    <div style=\"background:#ECFDF5;border:3px solid #10B981;border-radius:22px;padding:36px 42px;\">\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:.1em;color:#059669;margin-bottom:20px;\">SYMMETRY<\u002Fdiv>\n      <ul style=\"list-style:none;display:flex;flex-direction:column;gap:18px;font-size:29px;line-height:1.3;\">\n        <li style=\"display:flex;gap:16px;\"><span style=\"color:#10B981;font-weight:800;\">✓<\u002Fspan><span>Find <b>lines of symmetry<\u002Fb> and <b>order of rotational symmetry<\u002Fb><\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:16px;\"><span style=\"color:#10B981;font-weight:800;\">✓<\u002Fspan><span>Count <b>planes<\u002Fb> and <b>axes<\u002Fb> of symmetry of solids<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:16px;\"><span style=\"color:#10B981;font-weight:800;\">✓<\u002Fspan><span>Use the <b>symmetry of chords &amp; tangents<\u002Fb><\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div style=\"background:#7C3AED;color:#FFFFFF;border-radius:22px;padding:36px 42px;box-shadow:0 8px 26px rgba(124,58,237,.28);\">\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:.1em;color:#FBBF24;margin-bottom:20px;\">CIRCLE THEOREMS<\u002Fdiv>\n      <ul style=\"list-style:none;display:flex;flex-direction:column;gap:18px;font-size:29px;line-height:1.3;\">\n        <li style=\"display:flex;gap:16px;\"><span style=\"color:#FBBF24;font-weight:800;\">★<\u002Fspan><span>Angle in a <b>semicircle<\u002Fb> = 90°<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:16px;\"><span style=\"color:#FBBF24;font-weight:800;\">★<\u002Fspan><span>Angle at the <b>centre<\u002Fb> = 2 × angle at circumference<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:16px;\"><span style=\"color:#FBBF24;font-weight:800;\">★<\u002Fspan><span><b>Cyclic quadrilateral<\u002Fb> &amp; <b>alternate segment<\u002Fb> theorems<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Part 1 · Key vocabulary\" data-screen-label=\"Divider: Vocabulary\" data-speaker-notes=\"Section divider: the key words. Each term gets a plain-English meaning, a picture, and an example, to support English-as-a-second-language learners.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0;display:flex;font-family:Nunito,system-ui,sans-serif;background:#10B981;color:#fff;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:-140px;bottom:-160px;width:520px;height:520px;border-radius:50%;background:#0F9E74;\"><\u002Fdiv>\n  <div style=\"margin:auto 0;padding:0 110px;position:relative;z-index:1;\">\n    <div style=\"font-size:230px;font-weight:800;font-family:Fredoka,system-ui,sans-serif;line-height:1;color:rgba(255,255,255,.22);\">01<\u002Fdiv>\n    <div style=\"font-size:30px;font-weight:800;letter-spacing:.18em;color:#D1FAE5;margin:6px 0 14px;\">PART 1<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:82px;line-height:1.02;\">Key vocabulary<\u002Fh2>\n    <p style=\"font-size:31px;color:#E9FBF3;margin-top:22px;max-width:900px;line-height:1.4;\">Twelve words you need for this chapter — each with a simple meaning, a picture, and an example.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Line symmetry\" data-screen-label=\"Vocab: Line symmetry\" data-speaker-notes=\"Line symmetry, also called reflection symmetry: a shape has line symmetry if a fold line divides it into two identical mirror halves.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#7C3AED;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">KEY WORD 01<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Symmetry · 2D<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:52px;flex:1;align-items:center;\">\n    <div style=\"display:flex;flex-direction:column;justify-content:center;\">\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:80px;line-height:1;margin-bottom:10px;\">Line symmetry<\u002Fh2>\n      <div style=\"font-size:26px;color:#94A3B8;font-family:Georgia,serif;font-style:italic;margin-bottom:24px;\">a fold line · reflection symmetry<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:.1em;color:#7C3AED;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:31px;line-height:1.4;margin-bottom:22px;\">A shape has line symmetry if you can <b>fold<\u002Fb> it along a line so one half fits <b>exactly<\u002Fb> on top of the other.<\u002Fp>\n      <div style=\"background:#ECFDF5;border-radius:16px;padding:20px 28px;font-size:28px;line-height:1.4;\"><span style=\"font-weight:800;color:#059669;\">Example&nbsp;&nbsp;<\u002Fspan>A square has <b>4<\u002Fb> lines of symmetry; a circle has infinitely many.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:22px;box-shadow:0 6px 26px rgba(124,58,237,.12);display:flex;justify-content:center;align-items:center;\">\n      <svg viewBox=\"0 0 320 260\" style=\"width:100%;max-width:560px;height:auto;\">\n        <polygon points=\"160,36 260,222 60,222\" fill=\"#FDBA74\" stroke=\"#EA580C\" stroke-width=\"3\"><\u002Fpolygon>\n        <polygon points=\"160,36 160,222 60,222\" fill=\"#F97316\" opacity=\"0.55\"><\u002Fpolygon>\n        <line x1=\"160\" y1=\"18\" x2=\"160\" y2=\"240\" stroke=\"#7C3AED\" stroke-width=\"3.5\" stroke-dasharray=\"9 7\"><\u002Fline>\n        <text x=\"168\" y=\"30\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"20\" fill=\"#7C3AED\">fold line<\u002Ftext>\n        <path d=\"M120 150 A40 40 0 0 1 200 150\" fill=\"none\" stroke=\"#64748B\" stroke-width=\"2\" stroke-dasharray=\"4 4\"><\u002Fpath>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Axis of symmetry\" data-screen-label=\"Vocab: Axis of symmetry\" data-speaker-notes=\"An axis of symmetry is the actual mirror line itself — the straight line about which a shape is reflected onto itself.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#7C3AED;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">KEY WORD 02<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Symmetry · 2D<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:52px;flex:1;align-items:center;\">\n    <div style=\"display:flex;flex-direction:column;justify-content:center;\">\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:80px;line-height:1;margin-bottom:10px;\">Axis of symmetry<\u002Fh2>\n      <div style=\"font-size:26px;color:#94A3B8;font-family:Georgia,serif;font-style:italic;margin-bottom:24px;\">the mirror line<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:.1em;color:#7C3AED;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:31px;line-height:1.4;margin-bottom:22px;\">The <b>line<\u002Fb> itself that a shape is reflected across. Each point has a matching point the same distance on the other side.<\u002Fp>\n      <div style=\"background:#ECFDF5;border-radius:16px;padding:20px 28px;font-size:28px;line-height:1.4;\"><span style=\"font-weight:800;color:#059669;\">Example&nbsp;&nbsp;<\u002Fspan>A regular pentagon has <b>5<\u002Fb> axes of symmetry, one through each vertex.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:22px;box-shadow:0 6px 26px rgba(124,58,237,.12);display:flex;justify-content:center;align-items:center;\">\n      <svg viewBox=\"0 0 320 260\" style=\"width:100%;max-width:560px;height:auto;\">\n        <polygon points=\"160,32 268,120 226,238 94,238 52,120\" fill=\"#DDD6FE\" stroke=\"#7C3AED\" stroke-width=\"3\"><\u002Fpolygon>\n        <line x1=\"160\" y1=\"16\" x2=\"160\" y2=\"252\" stroke=\"#EC4899\" stroke-width=\"3.5\" stroke-dasharray=\"9 7\"><\u002Fline>\n        <line x1=\"120\" y1=\"130\" x2=\"200\" y2=\"130\" stroke=\"#64748B\" stroke-width=\"2.5\" marker-end=\"url(#ar19)\" marker-start=\"url(#ar19b)\"><\u002Fline>\n        <defs><marker id=\"ar19\" markerWidth=\"9\" markerHeight=\"9\" refX=\"7\" refY=\"4.5\" orient=\"auto\"><path d=\"M0 0 L8 4.5 L0 9 z\" fill=\"#64748B\"><\u002Fpath><\u002Fmarker><marker id=\"ar19b\" markerWidth=\"9\" markerHeight=\"9\" refX=\"1\" refY=\"4.5\" orient=\"auto\"><path d=\"M8 0 L0 4.5 L8 9 z\" fill=\"#64748B\"><\u002Fpath><\u002Fmarker><\u002Fdefs>\n        <text x=\"168\" y=\"28\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"20\" fill=\"#EC4899\">axis<\u002Ftext>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Rotational symmetry\" data-screen-label=\"Vocab: Rotational symmetry\" data-speaker-notes=\"Rotational symmetry: a shape has rotational symmetry if it fits onto itself more than once as it turns through a full 360 degrees. The number of times it fits is the order.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#7C3AED;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">KEY WORD 03<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Symmetry · 2D<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:52px;flex:1;align-items:center;\">\n    <div style=\"display:flex;flex-direction:column;justify-content:center;\">\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:74px;line-height:1;margin-bottom:10px;\">Rotational symmetry<\u002Fh2>\n      <div style=\"font-size:26px;color:#94A3B8;font-family:Georgia,serif;font-style:italic;margin-bottom:24px;\">turning &amp; matching<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:.1em;color:#7C3AED;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:31px;line-height:1.4;margin-bottom:22px;\">A shape has rotational symmetry if it looks the <b>same<\u002Fb> more than once as it <b>turns<\u002Fb> through 360°. The number of matches is the <b>order<\u002Fb>.<\u002Fp>\n      <div style=\"background:#ECFDF5;border-radius:16px;padding:20px 28px;font-size:28px;line-height:1.4;\"><span style=\"font-weight:800;color:#059669;\">Example&nbsp;&nbsp;<\u002Fspan>An equilateral triangle has <b>order 3<\u002Fb>; a square has <b>order 4<\u002Fb>.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:22px;box-shadow:0 6px 26px rgba(124,58,237,.12);display:flex;justify-content:center;align-items:center;\">\n      <svg viewBox=\"0 0 320 260\" style=\"width:100%;max-width:560px;height:auto;\">\n        <polygon points=\"160,44 262,222 58,222\" fill=\"#A7F3D0\" stroke=\"#059669\" stroke-width=\"3\"><\u002Fpolygon>\n        <circle cx=\"160\" cy=\"163\" r=\"6\" fill=\"#1F2933\"><\u002Fcircle>\n        <path d=\"M214 96 A80 80 0 0 1 236 172\" fill=\"none\" stroke=\"#EC4899\" stroke-width=\"4\" marker-end=\"url(#rot19)\"><\u002Fpath>\n        <path d=\"M106 96 A80 80 0 0 0 84 172\" fill=\"none\" stroke=\"#EC4899\" stroke-width=\"4\" marker-end=\"url(#rot19b)\"><\u002Fpath>\n        <defs><marker id=\"rot19\" markerWidth=\"11\" markerHeight=\"11\" refX=\"5\" refY=\"5\" orient=\"auto\"><path d=\"M0 0 L10 5 L0 10 z\" fill=\"#EC4899\"><\u002Fpath><\u002Fmarker><marker id=\"rot19b\" markerWidth=\"11\" markerHeight=\"11\" refX=\"5\" refY=\"5\" orient=\"auto\"><path d=\"M0 0 L10 5 L0 10 z\" fill=\"#EC4899\"><\u002Fpath><\u002Fmarker><\u002Fdefs>\n        <text x=\"132\" y=\"176\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"30\" fill=\"#059669\">3<\u002Ftext>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Centre of rotation\" data-screen-label=\"Vocab: Centre of rotation\" data-speaker-notes=\"The centre of rotation is the fixed point that a shape turns around. It stays still while every other point moves in a circle around it.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#7C3AED;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">KEY WORD 04<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Symmetry · 2D<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:52px;flex:1;align-items:center;\">\n    <div style=\"display:flex;flex-direction:column;justify-content:center;\">\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:74px;line-height:1;margin-bottom:10px;\">Centre of rotation<\u002Fh2>\n      <div style=\"font-size:26px;color:#94A3B8;font-family:Georgia,serif;font-style:italic;margin-bottom:24px;\">the fixed pivot point<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:.1em;color:#7C3AED;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:31px;line-height:1.4;margin-bottom:22px;\">The <b>point that stays still<\u002Fb> when a shape turns. Every other point moves in a circle around it.<\u002Fp>\n      <div style=\"background:#ECFDF5;border-radius:16px;padding:20px 28px;font-size:28px;line-height:1.4;\"><span style=\"font-weight:800;color:#059669;\">Example&nbsp;&nbsp;<\u002Fspan>For a regular polygon the centre of rotation is its <b>centre<\u002Fb>.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:22px;box-shadow:0 6px 26px rgba(124,58,237,.12);display:flex;justify-content:center;align-items:center;\">\n      <svg viewBox=\"0 0 320 260\" style=\"width:100%;max-width:560px;height:auto;\">\n        <rect x=\"150\" y=\"60\" width=\"86\" height=\"86\" rx=\"8\" fill=\"#BAE6FD\" stroke=\"#0891B2\" stroke-width=\"3\"><\u002Frect>\n        <rect x=\"150\" y=\"60\" width=\"86\" height=\"86\" rx=\"8\" fill=\"none\" stroke=\"#7C3AED\" stroke-width=\"3\" stroke-dasharray=\"7 6\" transform=\"rotate(55 130 200)\"><\u002Frect>\n        <path d=\"M120 90 A95 95 0 0 1 210 60\" fill=\"none\" stroke=\"#EC4899\" stroke-width=\"3.5\" marker-end=\"url(#cr19)\"><\u002Fpath>\n        <defs><marker id=\"cr19\" markerWidth=\"11\" markerHeight=\"11\" refX=\"5\" refY=\"5\" orient=\"auto\"><path d=\"M0 0 L10 5 L0 10 z\" fill=\"#EC4899\"><\u002Fpath><\u002Fmarker><\u002Fdefs>\n        <circle cx=\"130\" cy=\"200\" r=\"9\" fill=\"#1F2933\"><\u002Fcircle>\n        <text x=\"118\" y=\"232\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"22\" fill=\"#1F2933\">centre<\u002Ftext>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Plane symmetry\" data-screen-label=\"Vocab: Plane symmetry\" data-speaker-notes=\"Plane symmetry is the 3D version of line symmetry. A plane of symmetry is a flat surface that cuts a solid into two mirror-image halves.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#7C3AED;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">KEY WORD 05<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Symmetry · 3D<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:52px;flex:1;align-items:center;\">\n    <div style=\"display:flex;flex-direction:column;justify-content:center;\">\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:80px;line-height:1;margin-bottom:10px;\">Plane symmetry<\u002Fh2>\n      <div style=\"font-size:26px;color:#94A3B8;font-family:Georgia,serif;font-style:italic;margin-bottom:24px;\">a cut into mirror halves<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:.1em;color:#7C3AED;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:31px;line-height:1.4;margin-bottom:22px;\">A flat <b>plane<\u002Fb> that slices a solid into two <b>identical<\u002Fb> mirror halves. It is the 3D version of a line of symmetry.<\u002Fp>\n      <div style=\"background:#ECFDF5;border-radius:16px;padding:20px 28px;font-size:28px;line-height:1.4;\"><span style=\"font-weight:800;color:#059669;\">Example&nbsp;&nbsp;<\u002Fspan>A cuboid has <b>3<\u002Fb> planes of symmetry; a sphere has infinitely many.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:22px;box-shadow:0 6px 26px rgba(124,58,237,.12);display:flex;justify-content:center;align-items:center;\">\n      <svg viewBox=\"0 0 320 260\" style=\"width:100%;max-width:560px;height:auto;\">\n        <polygon points=\"70,110 210,110 210,210 70,210\" fill=\"#E9D5FF\" stroke=\"#7C3AED\" stroke-width=\"3\"><\u002Fpolygon>\n        <polygon points=\"70,110 112,70 252,70 210,110\" fill=\"#DDD6FE\" stroke=\"#7C3AED\" stroke-width=\"3\"><\u002Fpolygon>\n        <polygon points=\"210,110 252,70 252,170 210,210\" fill=\"#C4B5FD\" stroke=\"#7C3AED\" stroke-width=\"3\"><\u002Fpolygon>\n        <polygon points=\"140,110 182,70 182,170 140,210\" fill=\"#F9A8D4\" opacity=\"0.55\" stroke=\"#DB2777\" stroke-width=\"3\" stroke-dasharray=\"7 5\"><\u002Fpolygon>\n        <text x=\"150\" y=\"228\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"21\" fill=\"#DB2777\">plane of symmetry<\u002Ftext>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Perpendicular bisector\" data-screen-label=\"Vocab: Perpendicular bisector\" data-speaker-notes=\"A perpendicular bisector cuts a line segment exactly in half at a right angle. For a chord, the perpendicular bisector always passes through the centre of the circle.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#06B6D4;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">KEY WORD 06<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Circles<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:52px;flex:1;align-items:center;\">\n    <div style=\"display:flex;flex-direction:column;justify-content:center;\">\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:66px;line-height:1.05;margin-bottom:10px;\">Perpendicular bisector<\u002Fh2>\n      <div style=\"font-size:26px;color:#94A3B8;font-family:Georgia,serif;font-style:italic;margin-bottom:24px;\">cuts in half at 90°<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:.1em;color:#0891B2;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:31px;line-height:1.4;margin-bottom:22px;\">A line that cuts another line exactly in <b>half<\u002Fb> and meets it at a <b>right angle<\u002Fb> (90°).<\u002Fp>\n      <div style=\"background:#ECFEFF;border-radius:16px;padding:20px 28px;font-size:28px;line-height:1.4;\"><span style=\"font-weight:800;color:#0891B2;\">Example&nbsp;&nbsp;<\u002Fspan>The perpendicular bisector of a <b>chord<\u002Fb> always passes through the <b>centre<\u002Fb>.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:22px;box-shadow:0 6px 26px rgba(6,182,212,.14);display:flex;justify-content:center;align-items:center;\">\n      <svg viewBox=\"0 0 320 260\" style=\"width:100%;max-width:560px;height:auto;\">\n        <circle cx=\"160\" cy=\"130\" r=\"98\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3.5\"><\u002Fcircle>\n        <line x1=\"76\" y1=\"180\" x2=\"244\" y2=\"180\" stroke=\"#7C3AED\" stroke-width=\"4\"><\u002Fline>\n        <line x1=\"160\" y1=\"130\" x2=\"160\" y2=\"180\" stroke=\"#EC4899\" stroke-width=\"4\"><\u002Fline>\n        <rect x=\"160\" y=\"164\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"#EC4899\" stroke-width=\"2.5\"><\u002Frect>\n        <circle cx=\"160\" cy=\"130\" r=\"6\" fill=\"#1F2933\"><\u002Fcircle><text x=\"168\" y=\"126\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"24\" fill=\"#1F2933\">O<\u002Ftext>\n        <circle cx=\"76\" cy=\"180\" r=\"5\" fill=\"#7C3AED\"><\u002Fcircle><circle cx=\"244\" cy=\"180\" r=\"5\" fill=\"#7C3AED\"><\u002Fcircle>\n        <text x=\"150\" y=\"212\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"20\" fill=\"#7C3AED\">chord<\u002Ftext>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Chord\" data-screen-label=\"Vocab: Chord\" data-speaker-notes=\"A chord is a straight line joining two points on the circle. A diameter is the longest chord because it passes through the centre.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#06B6D4;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">KEY WORD 07<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Circles<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:52px;flex:1;align-items:center;\">\n    <div style=\"display:flex;flex-direction:column;justify-content:center;\">\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:80px;line-height:1;margin-bottom:10px;\">Chord<\u002Fh2>\n      <div style=\"font-size:26px;color:#94A3B8;font-family:Georgia,serif;font-style:italic;margin-bottom:24px;\">a line across the circle<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:.1em;color:#0891B2;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:31px;line-height:1.4;margin-bottom:22px;\">A straight line joining <b>two points<\u002Fb> on the circle. It does not have to pass through the centre.<\u002Fp>\n      <div style=\"background:#ECFEFF;border-radius:16px;padding:20px 28px;font-size:28px;line-height:1.4;\"><span style=\"font-weight:800;color:#0891B2;\">Example&nbsp;&nbsp;<\u002Fspan>The <b>diameter<\u002Fb> is the longest chord — it passes through the centre.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:22px;box-shadow:0 6px 26px rgba(6,182,212,.14);display:flex;justify-content:center;align-items:center;\">\n      <svg viewBox=\"0 0 320 260\" style=\"width:100%;max-width:560px;height:auto;\">\n        <circle cx=\"160\" cy=\"130\" r=\"98\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3.5\"><\u002Fcircle>\n        <line x1=\"71\" y1=\"89\" x2=\"252\" y2=\"97\" stroke=\"#7C3AED\" stroke-width=\"5\"><\u002Fline>\n        <circle cx=\"71\" cy=\"89\" r=\"6\" fill=\"#EC4899\"><\u002Fcircle><circle cx=\"252\" cy=\"97\" r=\"6\" fill=\"#EC4899\"><\u002Fcircle>\n        <text x=\"46\" y=\"86\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"24\" fill=\"#1F2933\">A<\u002Ftext>\n        <text x=\"258\" y=\"98\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"24\" fill=\"#1F2933\">B<\u002Ftext>\n        <text x=\"128\" y=\"80\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"22\" fill=\"#7C3AED\">chord<\u002Ftext>\n        <circle cx=\"160\" cy=\"130\" r=\"5\" fill=\"#1F2933\"><\u002Fcircle>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Tangent\" data-screen-label=\"Vocab: Tangent\" data-speaker-notes=\"A tangent is a straight line that touches the circle at exactly one point. The tangent is always perpendicular to the radius at that point of contact.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#06B6D4;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">KEY WORD 08<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Circles<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:52px;flex:1;align-items:center;\">\n    <div style=\"display:flex;flex-direction:column;justify-content:center;\">\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:80px;line-height:1;margin-bottom:10px;\">Tangent<\u002Fh2>\n      <div style=\"font-size:26px;color:#94A3B8;font-family:Georgia,serif;font-style:italic;margin-bottom:24px;\">a line that just touches<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:.1em;color:#0891B2;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:31px;line-height:1.4;margin-bottom:22px;\">A straight line that <b>touches<\u002Fb> the circle at exactly <b>one point<\u002Fb> and never goes inside.<\u002Fp>\n      <div style=\"background:#ECFEFF;border-radius:16px;padding:20px 28px;font-size:28px;line-height:1.4;\"><span style=\"font-weight:800;color:#0891B2;\">Example&nbsp;&nbsp;<\u002Fspan>A tangent is always at <b>90°<\u002Fb> to the radius at the point of contact.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:22px;box-shadow:0 6px 26px rgba(6,182,212,.14);display:flex;justify-content:center;align-items:center;\">\n      <svg viewBox=\"0 0 320 260\" style=\"width:100%;max-width:560px;height:auto;\">\n        <circle cx=\"150\" cy=\"140\" r=\"88\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3.5\"><\u002Fcircle>\n        <line x1=\"60\" y1=\"52\" x2=\"290\" y2=\"52\" stroke=\"#7C3AED\" stroke-width=\"5\"><\u002Fline>\n        <line x1=\"150\" y1=\"140\" x2=\"150\" y2=\"52\" stroke=\"#EC4899\" stroke-width=\"4\"><\u002Fline>\n        <rect x=\"150\" y=\"52\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"#EC4899\" stroke-width=\"2.5\"><\u002Frect>\n        <circle cx=\"150\" cy=\"52\" r=\"6\" fill=\"#F97316\"><\u002Fcircle>\n        <circle cx=\"150\" cy=\"140\" r=\"5\" fill=\"#1F2933\"><\u002Fcircle><text x=\"158\" y=\"140\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"22\" fill=\"#1F2933\">O<\u002Ftext>\n        <text x=\"196\" y=\"44\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"21\" fill=\"#7C3AED\">tangent<\u002Ftext>\n        <text x=\"158\" y=\"104\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"20\" fill=\"#EC4899\">radius<\u002Ftext>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Subtended angle\" data-screen-label=\"Vocab: Subtended angle\" data-speaker-notes=\"An angle subtended by an arc or chord is the angle formed when two lines are drawn from the ends of that arc to a point. The same arc can subtend an angle at the centre and at the circumference.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#EC4899;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">KEY WORD 09<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Circle angles<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:52px;flex:1;align-items:center;\">\n    <div style=\"display:flex;flex-direction:column;justify-content:center;\">\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:66px;line-height:1.05;margin-bottom:10px;\">Subtended angle<\u002Fh2>\n      <div style=\"font-size:26px;color:#94A3B8;font-family:Georgia,serif;font-style:italic;margin-bottom:24px;\">an angle \"held up\" by an arc<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:.1em;color:#DB2777;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:31px;line-height:1.4;margin-bottom:22px;\">The angle <b>made<\u002Fb> when you draw two lines from the ends of an <b>arc<\u002Fb> (or chord) to a single point.<\u002Fp>\n      <div style=\"background:#FCE7F3;border-radius:16px;padding:20px 28px;font-size:28px;line-height:1.4;\"><span style=\"font-weight:800;color:#DB2777;\">Example&nbsp;&nbsp;<\u002Fspan>Arc AB <b>subtends<\u002Fb> an angle at the centre and a smaller one at the circumference.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:22px;box-shadow:0 6px 26px rgba(236,72,153,.14);display:flex;justify-content:center;align-items:center;\">\n      <svg viewBox=\"0 0 320 260\" style=\"width:100%;max-width:560px;height:auto;\">\n        <circle cx=\"160\" cy=\"140\" r=\"96\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3.5\"><\u002Fcircle>\n        <line x1=\"80\" y1=\"192\" x2=\"160\" y2=\"140\" stroke=\"#EC4899\" stroke-width=\"4\"><\u002Fline>\n        <line x1=\"240\" y1=\"192\" x2=\"160\" y2=\"140\" stroke=\"#EC4899\" stroke-width=\"4\"><\u002Fline>\n        <line x1=\"80\" y1=\"192\" x2=\"160\" y2=\"46\" stroke=\"#7C3AED\" stroke-width=\"4\"><\u002Fline>\n        <line x1=\"240\" y1=\"192\" x2=\"160\" y2=\"46\" stroke=\"#7C3AED\" stroke-width=\"4\"><\u002Fline>\n        <circle cx=\"80\" cy=\"192\" r=\"6\" fill=\"#1F2933\"><\u002Fcircle><text x=\"56\" y=\"200\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"22\">A<\u002Ftext>\n        <circle cx=\"240\" cy=\"192\" r=\"6\" fill=\"#1F2933\"><\u002Fcircle><text x=\"250\" y=\"200\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"22\">B<\u002Ftext>\n        <circle cx=\"160\" cy=\"140\" r=\"6\" fill=\"#EC4899\"><\u002Fcircle><text x=\"150\" y=\"132\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\" fill=\"#DB2777\">O<\u002Ftext>\n        <circle cx=\"160\" cy=\"46\" r=\"6\" fill=\"#7C3AED\"><\u002Fcircle><text x=\"168\" y=\"42\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\" fill=\"#7C3AED\">P<\u002Ftext>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Cyclic quadrilateral\" data-screen-label=\"Vocab: Cyclic quadrilateral\" data-speaker-notes=\"A cyclic quadrilateral is a four-sided shape whose four vertices all lie on the circumference of one circle. Its opposite angles add up to 180 degrees.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#EC4899;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">KEY WORD 10<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Circle angles<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:52px;flex:1;align-items:center;\">\n    <div style=\"display:flex;flex-direction:column;justify-content:center;\">\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:60px;line-height:1.05;margin-bottom:10px;\">Cyclic quadrilateral<\u002Fh2>\n      <div style=\"font-size:26px;color:#94A3B8;font-family:Georgia,serif;font-style:italic;margin-bottom:24px;\">4 corners on the circle<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:.1em;color:#DB2777;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:31px;line-height:1.4;margin-bottom:22px;\">A <b>four-sided<\u002Fb> shape whose <b>four corners<\u002Fb> all sit on the circumference of one circle.<\u002Fp>\n      <div style=\"background:#FCE7F3;border-radius:16px;padding:20px 28px;font-size:28px;line-height:1.4;\"><span style=\"font-weight:800;color:#DB2777;\">Example&nbsp;&nbsp;<\u002Fspan>Opposite angles add to <b>180°<\u002Fb>: here <span class=\"mvar\">a<\u002Fspan> + <span class=\"mvar\">c<\u002Fspan> = 180°.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:22px;box-shadow:0 6px 26px rgba(236,72,153,.14);display:flex;justify-content:center;align-items:center;\">\n      <svg viewBox=\"0 0 320 260\" style=\"width:100%;max-width:560px;height:auto;\">\n        <circle cx=\"160\" cy=\"130\" r=\"98\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3.5\"><\u002Fcircle>\n        <polygon points=\"85,67 226,57 233,196 83,190\" fill=\"#FBCFE8\" opacity=\"0.6\" stroke=\"#DB2777\" stroke-width=\"3\"><\u002Fpolygon>\n        <text x=\"60\" y=\"62\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"24\" fill=\"#7C3AED\">a<\u002Ftext>\n        <text x=\"234\" y=\"52\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"24\" fill=\"#1F2933\">b<\u002Ftext>\n        <text x=\"240\" y=\"212\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"24\" fill=\"#7C3AED\">c<\u002Ftext>\n        <text x=\"58\" y=\"210\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"24\" fill=\"#1F2933\">d<\u002Ftext>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Alternate segment\" data-screen-label=\"Vocab: Alternate segment\" data-speaker-notes=\"The alternate segment theorem: the angle between a tangent and a chord equals the angle in the alternate segment — the angle subtended by that chord on the far side of the circle.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#EC4899;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">KEY WORD 11<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Circle angles<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:52px;flex:1;align-items:center;\">\n    <div style=\"display:flex;flex-direction:column;justify-content:center;\">\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:60px;line-height:1.05;margin-bottom:10px;\">Alternate segment<\u002Fh2>\n      <div style=\"font-size:26px;color:#94A3B8;font-family:Georgia,serif;font-style:italic;margin-bottom:24px;\">tangent-chord angle<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:.1em;color:#DB2777;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:31px;line-height:1.4;margin-bottom:22px;\">The angle between a <b>tangent<\u002Fb> and a <b>chord<\u002Fb> equals the angle in the <b>other (alternate) segment<\u002Fb>.<\u002Fp>\n      <div style=\"background:#FCE7F3;border-radius:16px;padding:20px 28px;font-size:28px;line-height:1.4;\"><span style=\"font-weight:800;color:#DB2777;\">Example&nbsp;&nbsp;<\u002Fspan>Here the two marked angles <span class=\"mvar\">x<\u002Fspan> are <b>equal<\u002Fb>.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:22px;box-shadow:0 6px 26px rgba(236,72,153,.14);display:flex;justify-content:center;align-items:center;\">\n      <svg viewBox=\"0 0 320 260\" style=\"width:100%;max-width:560px;height:auto;\">\n        <circle cx=\"160\" cy=\"132\" r=\"92\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3.5\"><\u002Fcircle>\n        <line x1=\"44\" y1=\"224\" x2=\"276\" y2=\"224\" stroke=\"#7C3AED\" stroke-width=\"5\"><\u002Fline>\n        <circle cx=\"160\" cy=\"224\" r=\"6\" fill=\"#F97316\"><\u002Fcircle><text x=\"150\" y=\"248\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\">T<\u002Ftext>\n        <line x1=\"160\" y1=\"224\" x2=\"199\" y2=\"49\" stroke=\"#EC4899\" stroke-width=\"4\"><\u002Fline>\n        <circle cx=\"199\" cy=\"49\" r=\"6\" fill=\"#1F2933\"><\u002Fcircle><text x=\"206\" y=\"46\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\">B<\u002Ftext>\n        <line x1=\"160\" y1=\"224\" x2=\"101\" y2=\"62\" stroke=\"#10B981\" stroke-width=\"3.5\"><\u002Fline>\n        <line x1=\"199\" y1=\"49\" x2=\"101\" y2=\"62\" stroke=\"#10B981\" stroke-width=\"3.5\"><\u002Fline>\n        <circle cx=\"101\" cy=\"62\" r=\"6\" fill=\"#1F2933\"><\u002Fcircle><text x=\"78\" y=\"58\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\">C<\u002Ftext>\n        <text x=\"170\" y=\"212\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"22\" fill=\"#DB2777\">x<\u002Ftext>\n        <text x=\"114\" y=\"88\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"22\" fill=\"#DB2777\">x<\u002Ftext>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Equidistant\" data-screen-label=\"Vocab: Equidistant\" data-speaker-notes=\"Equidistant means the same distance away. Two chords that are equal in length are equidistant from the centre of the circle.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#06B6D4;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">KEY WORD 12<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Circles<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:52px;flex:1;align-items:center;\">\n    <div style=\"display:flex;flex-direction:column;justify-content:center;\">\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:80px;line-height:1;margin-bottom:10px;\">Equidistant<\u002Fh2>\n      <div style=\"font-size:26px;color:#94A3B8;font-family:Georgia,serif;font-style:italic;margin-bottom:24px;\">the same distance away<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:.1em;color:#0891B2;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:31px;line-height:1.4;margin-bottom:22px;\"><b>Equal distance<\u002Fb> from a point. Two things are equidistant if they are <b>the same distance<\u002Fb> away.<\u002Fp>\n      <div style=\"background:#ECFEFF;border-radius:16px;padding:20px 28px;font-size:28px;line-height:1.4;\"><span style=\"font-weight:800;color:#0891B2;\">Example&nbsp;&nbsp;<\u002Fspan><b>Equal chords<\u002Fb> are equidistant from the centre: here <span class=\"mvar\">d<\u002Fspan>₁ = <span class=\"mvar\">d<\u002Fspan>₂.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:22px;box-shadow:0 6px 26px rgba(6,182,212,.14);display:flex;justify-content:center;align-items:center;\">\n      <svg viewBox=\"0 0 320 260\" style=\"width:100%;max-width:560px;height:auto;\">\n        <circle cx=\"160\" cy=\"130\" r=\"98\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3.5\"><\u002Fcircle>\n        <line x1=\"70\" y1=\"90\" x2=\"250\" y2=\"90\" stroke=\"#7C3AED\" stroke-width=\"4.5\"><\u002Fline>\n        <line x1=\"70\" y1=\"170\" x2=\"250\" y2=\"170\" stroke=\"#7C3AED\" stroke-width=\"4.5\"><\u002Fline>\n        <line x1=\"160\" y1=\"130\" x2=\"160\" y2=\"90\" stroke=\"#EC4899\" stroke-width=\"3.5\"><\u002Fline>\n        <line x1=\"160\" y1=\"130\" x2=\"160\" y2=\"170\" stroke=\"#EC4899\" stroke-width=\"3.5\"><\u002Fline>\n        <circle cx=\"160\" cy=\"130\" r=\"6\" fill=\"#1F2933\"><\u002Fcircle><text x=\"166\" y=\"126\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\">O<\u002Ftext>\n        <text x=\"168\" y=\"114\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\" fill=\"#DB2777\">d₁<\u002Ftext>\n        <text x=\"168\" y=\"156\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\" fill=\"#DB2777\">d₂<\u002Ftext>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Part 2 · Memory drills\" data-screen-label=\"Divider: Memory drills\" data-speaker-notes=\"Section divider: memory drills. Short, repeatable rules and mnemonics so students can recall the symmetry rules and all the circle theorems under exam pressure.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0;display:flex;font-family:Nunito,system-ui,sans-serif;background:#F59E0B;color:#1F2933;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:-140px;bottom:-160px;width:520px;height:520px;border-radius:50%;background:#EAB308;\"><\u002Fdiv>\n  <div style=\"margin:auto 0;padding:0 110px;position:relative;z-index:1;\">\n    <div style=\"font-size:230px;font-weight:800;font-family:Fredoka,system-ui,sans-serif;line-height:1;color:rgba(255,255,255,.34);\">02<\u002Fdiv>\n    <div style=\"font-size:30px;font-weight:800;letter-spacing:.18em;color:#7C2D12;margin:6px 0 14px;\">PART 2<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:82px;line-height:1.02;color:#3B2410;\">Memory drills<\u002Fh2>\n    <p style=\"font-size:31px;color:#5B3A16;margin-top:22px;max-width:940px;line-height:1.4;\">Fast rules and picture-mnemonics so the theorems stay in your head when it matters.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Drill: Symmetry rules\" data-screen-label=\"Drill: Symmetry\" data-speaker-notes=\"Memory drill for symmetry. Line symmetry: fold and match. Order of rotational symmetry: count how many times the shape fits onto itself in one full turn. Planes of symmetry: slice a solid into mirror halves.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:64px 88px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:18px;\"><span style=\"white-space:nowrap;background:#F59E0B;color:#1F2933;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">MEMORY DRILL<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Symmetry in a nutshell<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:54px;margin-bottom:28px;\">Three rules to remember<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:26px;flex:1;\">\n    <div style=\"background:#F3E8FF;border-radius:20px;padding:32px;display:flex;flex-direction:column;\">\n      <div style=\"font-size:56px;\">🪨<\u002Fdiv>\n      <div style=\"font-size:32px;font-weight:800;color:#7C3AED;margin:10px 0 12px;\">LINE symmetry<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.38;\"><b>Fold &amp; match.<\u002Fb> If the two halves land exactly on top of each other, the fold line is a line of symmetry.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#FCE7F3;border-radius:20px;padding:32px;display:flex;flex-direction:column;\">\n      <div style=\"font-size:56px;\">🔄<\u002Fdiv>\n      <div style=\"font-size:32px;font-weight:800;color:#DB2777;margin:10px 0 12px;\">ROTATIONAL order<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.38;\"><b>Count the matches<\u002Fb> in one full 360° turn. That count is the <b>order<\u002Fb>. Order 1 = no rotational symmetry.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#ECFEFF;border-radius:20px;padding:32px;display:flex;flex-direction:column;\">\n      <div style=\"font-size:56px;\">🍳<\u002Fdiv>\n      <div style=\"font-size:32px;font-weight:800;color:#0891B2;margin:10px 0 12px;\">PLANE of symmetry<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.38;\"><b>Slice the solid<\u002Fb> so the two pieces are mirror images. Each such cut is a plane of symmetry.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Drill: 8 circle theorems\" data-screen-label=\"Drill: Circle theorems card\" data-speaker-notes=\"The eight circle theorems on one card. Semicircle angle is ninety. Angle at the centre is double the angle at the circumference. Angles in the same segment are equal. Opposite angles of a cyclic quadrilateral sum to one hundred and eighty. Tangent meets radius at ninety. Two tangents from a point are equal. Perpendicular from centre bisects a chord. Alternate segment: tangent-chord angle equals the angle in the alternate segment.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 72px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#7C3AED;color:#fff;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#FBBF24;color:#1F2933;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">MEMORY CARD<\u002Fspan><span style=\"font-size:24px;color:#E9D5FF;font-weight:600;\">The 8 circle theorems · one line each<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:48px;margin-bottom:22px;\">Snapshot every theorem<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px 26px;flex:1;\">\n    <div style=\"background:rgba(255,255,255,.12);border-radius:14px;padding:16px 22px;display:flex;align-items:center;gap:18px;\"><svg width=\"72\" height=\"60\" viewBox=\"0 0 72 60\"><path d=\"M6 42 A30 30 0 0 1 66 42\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.5\"><\u002Fpath><line x1=\"6\" y1=\"42\" x2=\"66\" y2=\"42\" stroke=\"#FBBF24\" stroke-width=\"2.5\"><\u002Fline><line x1=\"6\" y1=\"42\" x2=\"40\" y2=\"16\" stroke=\"#34E0C4\" stroke-width=\"2.5\"><\u002Fline><line x1=\"66\" y1=\"42\" x2=\"40\" y2=\"16\" stroke=\"#34E0C4\" stroke-width=\"2.5\"><\u002Fline><rect x=\"34\" y=\"24\" width=\"9\" height=\"9\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.6\"><\u002Frect><\u002Fsvg><div style=\"font-size:24px;line-height:1.25;\"><b>1.<\u002Fb> Angle in a <b>semicircle<\u002Fb> = 90°<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:rgba(255,255,255,.12);border-radius:14px;padding:16px 22px;display:flex;align-items:center;gap:18px;\"><svg width=\"72\" height=\"60\" viewBox=\"0 0 72 60\"><circle cx=\"36\" cy=\"34\" r=\"24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.5\"><\u002Fcircle><line x1=\"18\" y1=\"50\" x2=\"36\" y2=\"34\" stroke=\"#FBBF24\" stroke-width=\"2.5\"><\u002Fline><line x1=\"54\" y1=\"50\" x2=\"36\" y2=\"34\" stroke=\"#FBBF24\" stroke-width=\"2.5\"><\u002Fline><line x1=\"18\" y1=\"50\" x2=\"36\" y2=\"12\" stroke=\"#34E0C4\" stroke-width=\"2.5\"><\u002Fline><line x1=\"54\" y1=\"50\" x2=\"36\" y2=\"12\" stroke=\"#34E0C4\" stroke-width=\"2.5\"><\u002Fline><\u002Fsvg><div style=\"font-size:24px;line-height:1.25;\"><b>2.<\u002Fb> Angle at <b>centre<\u002Fb> = 2 × angle at circumference<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:rgba(255,255,255,.12);border-radius:14px;padding:16px 22px;display:flex;align-items:center;gap:18px;\"><svg width=\"72\" height=\"60\" viewBox=\"0 0 72 60\"><circle cx=\"36\" cy=\"30\" r=\"24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.5\"><\u002Fcircle><line x1=\"20\" y1=\"48\" x2=\"30\" y2=\"8\" stroke=\"#FBBF24\" stroke-width=\"2.5\"><\u002Fline><line x1=\"52\" y1=\"48\" x2=\"30\" y2=\"8\" stroke=\"#FBBF24\" stroke-width=\"2.5\"><\u002Fline><line x1=\"20\" y1=\"48\" x2=\"52\" y2=\"14\" stroke=\"#34E0C4\" stroke-width=\"2.5\"><\u002Fline><line x1=\"52\" y1=\"48\" x2=\"52\" y2=\"14\" stroke=\"#34E0C4\" stroke-width=\"2.5\"><\u002Fline><\u002Fsvg><div style=\"font-size:24px;line-height:1.25;\"><b>3.<\u002Fb> Angles in the <b>same segment<\u002Fb> are equal<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:rgba(255,255,255,.12);border-radius:14px;padding:16px 22px;display:flex;align-items:center;gap:18px;\"><svg width=\"72\" height=\"60\" viewBox=\"0 0 72 60\"><circle cx=\"36\" cy=\"30\" r=\"24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.5\"><\u002Fcircle><polygon points=\"16,22 40,10 58,32 30,50\" fill=\"none\" stroke=\"#FBBF24\" stroke-width=\"2.5\"><\u002Fpolygon><\u002Fsvg><div style=\"font-size:24px;line-height:1.25;\"><b>4.<\u002Fb> <b>Cyclic quad<\u002Fb>: opposite angles = 180°<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:rgba(255,255,255,.12);border-radius:14px;padding:16px 22px;display:flex;align-items:center;gap:18px;\"><svg width=\"72\" height=\"60\" viewBox=\"0 0 72 60\"><circle cx=\"34\" cy=\"28\" r=\"22\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.5\"><\u002Fcircle><line x1=\"8\" y1=\"52\" x2=\"64\" y2=\"52\" stroke=\"#34E0C4\" stroke-width=\"2.5\"><\u002Fline><line x1=\"34\" y1=\"28\" x2=\"34\" y2=\"52\" stroke=\"#FBBF24\" stroke-width=\"2.5\"><\u002Fline><rect x=\"34\" y=\"44\" width=\"8\" height=\"8\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.6\"><\u002Frect><\u002Fsvg><div style=\"font-size:24px;line-height:1.25;\"><b>5.<\u002Fb> <b>Tangent<\u002Fb> meets radius at 90°<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:rgba(255,255,255,.12);border-radius:14px;padding:16px 22px;display:flex;align-items:center;gap:18px;\"><svg width=\"72\" height=\"60\" viewBox=\"0 0 72 60\"><circle cx=\"30\" cy=\"30\" r=\"20\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.5\"><\u002Fcircle><line x1=\"62\" y1=\"30\" x2=\"30\" y2=\"14\" stroke=\"#FBBF24\" stroke-width=\"2.5\"><\u002Fline><line x1=\"62\" y1=\"30\" x2=\"30\" y2=\"46\" stroke=\"#FBBF24\" stroke-width=\"2.5\"><\u002Fline><circle cx=\"62\" cy=\"30\" r=\"3.4\" fill=\"#34E0C4\"><\u002Fcircle><\u002Fsvg><div style=\"font-size:24px;line-height:1.25;\"><b>6.<\u002Fb> Two <b>tangents<\u002Fb> from a point are equal<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:rgba(255,255,255,.12);border-radius:14px;padding:16px 22px;display:flex;align-items:center;gap:18px;\"><svg width=\"72\" height=\"60\" viewBox=\"0 0 72 60\"><circle cx=\"36\" cy=\"30\" r=\"24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.5\"><\u002Fcircle><line x1=\"12\" y1=\"40\" x2=\"60\" y2=\"40\" stroke=\"#FBBF24\" stroke-width=\"2.5\"><\u002Fline><line x1=\"36\" y1=\"30\" x2=\"36\" y2=\"40\" stroke=\"#34E0C4\" stroke-width=\"2.5\"><\u002Fline><rect x=\"36\" y=\"32\" width=\"8\" height=\"8\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.6\"><\u002Frect><\u002Fsvg><div style=\"font-size:24px;line-height:1.25;\"><b>7.<\u002Fb> ⊥ from <b>centre bisects a chord<\u002Fb><\u002Fdiv><\u002Fdiv>\n    <div style=\"background:rgba(255,255,255,.12);border-radius:14px;padding:16px 22px;display:flex;align-items:center;gap:18px;\"><svg width=\"72\" height=\"60\" viewBox=\"0 0 72 60\"><circle cx=\"36\" cy=\"28\" r=\"22\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.5\"><\u002Fcircle><line x1=\"8\" y1=\"52\" x2=\"64\" y2=\"52\" stroke=\"#34E0C4\" stroke-width=\"2.5\"><\u002Fline><line x1=\"26\" y1=\"52\" x2=\"48\" y2=\"12\" stroke=\"#FBBF24\" stroke-width=\"2.5\"><\u002Fline><line x1=\"26\" y1=\"52\" x2=\"22\" y2=\"16\" stroke=\"#FBBF24\" stroke-width=\"2.5\"><\u002Fline><line x1=\"48\" y1=\"12\" x2=\"22\" y2=\"16\" stroke=\"#FBBF24\" stroke-width=\"2.5\"><\u002Fline><\u002Fsvg><div style=\"font-size:24px;line-height:1.25;\"><b>8.<\u002Fb> <b>Alternate segment<\u002Fb>: tangent-chord = far angle<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Drill: Chord &amp; tangent steps\" data-screen-label=\"Drill: Problem steps\" data-speaker-notes=\"Method drill. For chord problems: drop a perpendicular from the centre to the chord, which bisects it, then use Pythagoras in the right triangle. For tangent problems: mark the radius-tangent right angle and use equal tangents, then Pythagoras or isosceles triangles.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:64px 88px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:18px;\"><span style=\"white-space:nowrap;background:#F59E0B;color:#1F2933;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">METHOD DRILL<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">A reliable order of steps<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:52px;margin-bottom:26px;\">How to attack a circle problem<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:28px;flex:1;\">\n    <div style=\"background:#ECFEFF;border:3px solid #06B6D4;border-radius:20px;padding:30px 36px;\">\n      <div style=\"font-size:26px;font-weight:800;color:#0891B2;margin-bottom:18px;\">CHORD problems<\u002Fdiv>\n      <ol style=\"list-style:none;display:flex;flex-direction:column;gap:16px;font-size:27px;line-height:1.32;counter-reset:s;\">\n        <li style=\"display:flex;gap:14px;\"><span style=\"flex-shrink:0;width:38px;height:38px;border-radius:50%;background:#06B6D4;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;\">1<\u002Fspan><span>Drop a <b>perpendicular<\u002Fb> from the centre O to the chord.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:14px;\"><span style=\"flex-shrink:0;width:38px;height:38px;border-radius:50%;background:#06B6D4;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;\">2<\u002Fspan><span>It <b>bisects<\u002Fb> the chord — half the chord on each side.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:14px;\"><span style=\"flex-shrink:0;width:38px;height:38px;border-radius:50%;background:#06B6D4;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;\">3<\u002Fspan><span>Use <b>Pythagoras<\u002Fb> in the right triangle: <span class=\"mvar\">r<\u002Fspan>² = <span class=\"mvar\">d<\u002Fspan>² + (half-chord)².<\u002Fspan><\u002Fli>\n      <\u002Fol>\n    <\u002Fdiv>\n    <div style=\"background:#FEF3C7;border:3px solid #F59E0B;border-radius:20px;padding:30px 36px;\">\n      <div style=\"font-size:26px;font-weight:800;color:#B45309;margin-bottom:18px;\">TANGENT problems<\u002Fdiv>\n      <ol style=\"list-style:none;display:flex;flex-direction:column;gap:16px;font-size:27px;line-height:1.32;\">\n        <li style=\"display:flex;gap:14px;\"><span style=\"flex-shrink:0;width:38px;height:38px;border-radius:50%;background:#F59E0B;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;\">1<\u002Fspan><span>Mark the <b>90°<\u002Fb> between the radius and the tangent.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:14px;\"><span style=\"flex-shrink:0;width:38px;height:38px;border-radius:50%;background:#F59E0B;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;\">2<\u002Fspan><span>Two tangents from one point are <b>equal<\u002Fb> → isosceles.<\u002Fspan><\u002Fli>\n        <li style=\"display:flex;gap:14px;\"><span style=\"flex-shrink:0;width:38px;height:38px;border-radius:50%;background:#F59E0B;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;\">3<\u002Fspan><span>Use <b>Pythagoras<\u002Fb> or angle sums to finish.<\u002Fspan><\u002Fli>\n      <\u002Fol>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"spin-stage\" data-label=\"Interactive: Rotation spinner\" data-screen-label=\"Interactive: Spinner\" data-speaker-notes=\"Interactive rotational-symmetry spinner. Pick a shape, then press Rotate. The shape turns by one step and the counter shows how many times it has mapped onto itself. After a full turn the count equals the order of rotational symmetry. Try the square (order 4), the equilateral triangle (order 3), and the isosceles triangle (order 1, no rotational symmetry).\" style=\"box-sizing:border-box;width:100%;height:100%;padding:44px 72px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:10px;\"><span style=\"white-space:nowrap;background:#EC4899;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">INTERACTIVE<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Rotational symmetry spinner<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.05fr 1fr;gap:36px;flex:1;min-height:0;\">\n    <div style=\"background:#fff;border-radius:22px;box-shadow:0 6px 26px rgba(31,41,51,.09);padding:16px;display:flex;align-items:center;justify-content:center;min-height:0;\">\n      <canvas class=\"spin-canvas\" width=\"560\" height=\"560\" style=\"max-width:100%;max-height:100%;width:auto;height:auto;display:block;\"><\u002Fcanvas>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:18px;min-height:0;\">\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:44px;line-height:1;\">Turn the shape — count the matches<\u002Fh2>\n      <div style=\"font-size:26px;font-weight:800;color:#64748B;\">Pick a shape<\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;\">\n        <button class=\"spin-shape\" data-shape=\"tri\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:22px;padding:12px 18px;border:2px solid #7C3AED;border-radius:12px;background:#fff;color:#7C3AED;cursor:pointer;\">Triangle<\u002Fbutton>\n        <button class=\"spin-shape\" data-shape=\"sq\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:22px;padding:12px 18px;border:2px solid #7C3AED;border-radius:12px;background:#fff;color:#7C3AED;cursor:pointer;\">Square<\u002Fbutton>\n        <button class=\"spin-shape\" data-shape=\"pent\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:22px;padding:12px 18px;border:2px solid #7C3AED;border-radius:12px;background:#fff;color:#7C3AED;cursor:pointer;\">Pentagon<\u002Fbutton>\n        <button class=\"spin-shape\" data-shape=\"hex\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:22px;padding:12px 18px;border:2px solid #7C3AED;border-radius:12px;background:#fff;color:#7C3AED;cursor:pointer;\">Hexagon<\u002Fbutton>\n        <button class=\"spin-shape\" data-shape=\"rect\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:22px;padding:12px 18px;border:2px solid #7C3AED;border-radius:12px;background:#fff;color:#7C3AED;cursor:pointer;\">Rectangle<\u002Fbutton>\n        <button class=\"spin-shape\" data-shape=\"para\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:22px;padding:12px 18px;border:2px solid #7C3AED;border-radius:12px;background:#fff;color:#7C3AED;cursor:pointer;\">Parallelogram<\u002Fbutton>\n        <button class=\"spin-shape\" data-shape=\"iso\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:22px;padding:12px 18px;border:2px solid #7C3AED;border-radius:12px;background:#fff;color:#7C3AED;cursor:pointer;\">Isosceles<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:16px;\">\n        <div style=\"flex:1;background:#F3E8FF;border-radius:16px;padding:18px 22px;text-align:center;\"><div style=\"font-size:22px;font-weight:800;color:#7C3AED;letter-spacing:.04em;\">SHAPE<\u002Fdiv><div class=\"spin-name\" style=\"font-size:28px;font-weight:800;margin-top:6px;\">Square<\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1;background:#FCE7F3;border-radius:16px;padding:18px 22px;text-align:center;\"><div style=\"font-size:22px;font-weight:800;color:#DB2777;letter-spacing:.04em;\">MATCHES SO FAR<\u002Fdiv><div class=\"spin-fits\" style=\"font-size:40px;font-weight:800;font-family:Fredoka,sans-serif;line-height:1;margin-top:4px;\">0<\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1;background:#ECFDF5;border-radius:16px;padding:18px 22px;text-align:center;\"><div style=\"font-size:22px;font-weight:800;color:#059669;letter-spacing:.04em;\">ORDER<\u002Fdiv><div class=\"spin-order\" style=\"font-size:40px;font-weight:800;font-family:Fredoka,sans-serif;line-height:1;margin-top:4px;\">4<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:14px;margin-top:auto;\">\n        <button class=\"spin-go\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:26px;padding:16px 34px;border:none;border-radius:14px;background:#10B981;color:#fff;cursor:pointer;\">↻ Rotate one step<\u002Fbutton>\n        <button class=\"spin-reset\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:26px;padding:16px 28px;border:none;border-radius:14px;background:#EC4899;color:#fff;cursor:pointer;\">Reset<\u002Fbutton>\n      <\u002Fdiv>\n      <p style=\"font-size:23px;color:#64748B;line-height:1.35;\">Each press turns the shape by <b>360° ÷ order<\u002Fb>. Count how many presses bring it back to the start — that is the <b>order of rotational symmetry<\u002Fb>.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Part 3 · Symmetry\" data-screen-label=\"Divider: Symmetry\" data-speaker-notes=\"Section divider: symmetry in two and three dimensions. Line symmetry and order of rotational symmetry for flat shapes, then planes and axes of symmetry for solids.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0;display:flex;font-family:Nunito,system-ui,sans-serif;background:#06B6D4;color:#fff;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:-140px;bottom:-160px;width:520px;height:520px;border-radius:50%;background:#0891B2;\"><\u002Fdiv>\n  <div style=\"margin:auto 0;padding:0 110px;position:relative;z-index:1;\">\n    <div style=\"font-size:230px;font-weight:800;font-family:Fredoka,system-ui,sans-serif;line-height:1;color:rgba(255,255,255,.24);\">03<\u002Fdiv>\n    <div style=\"font-size:30px;font-weight:800;letter-spacing:.18em;color:#CFFAFE;margin:6px 0 14px;\">PART 3 · SECTIONS 19.1–19.2<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:82px;line-height:1.02;\">Symmetry in 2D &amp; 3D<\u002Fh2>\n    <p style=\"font-size:31px;color:#ECFEFF;margin-top:22px;max-width:960px;line-height:1.4;\">Lines &amp; order of rotational symmetry for shapes; planes &amp; axes of symmetry for solids.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"19.1 Symmetry of 2D shapes\" data-screen-label=\"Concept: 2D symmetry\" data-speaker-notes=\"Two-dimensional symmetry. A line of symmetry is a fold line. The order of rotational symmetry is the number of times a shape maps onto itself in one full turn. A regular polygon with n sides has n lines of symmetry and rotational symmetry of order n.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:60px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\"><span style=\"white-space:nowrap;background:#06B6D4;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">19.1<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Symmetry of 2D shapes<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:52px;margin-bottom:26px;\">Lines &amp; order of rotational symmetry<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:22px;flex:1;\">\n    <div style=\"background:#fff;border-radius:18px;box-shadow:0 4px 18px rgba(31,41,51,.07);padding:22px;display:flex;flex-direction:column;align-items:center;text-align:center;\">\n      <svg viewBox=\"0 0 140 140\" style=\"width:130px;height:130px;\"><polygon points=\"70,20 120,110 20,110\" fill=\"#A7F3D0\" stroke=\"#059669\" stroke-width=\"3\"><\u002Fpolygon><line x1=\"70\" y1=\"8\" x2=\"70\" y2=\"122\" stroke=\"#7C3AED\" stroke-width=\"2\" stroke-dasharray=\"6 5\"><\u002Fline><line x1=\"35\" y1=\"38\" x2=\"108\" y2=\"92\" stroke=\"#7C3AED\" stroke-width=\"2\" stroke-dasharray=\"6 5\"><\u002Fline><line x1=\"105\" y1=\"38\" x2=\"32\" y2=\"92\" stroke=\"#7C3AED\" stroke-width=\"2\" stroke-dasharray=\"6 5\"><\u002Fline><\u002Fsvg>\n      <div style=\"font-size:25px;font-weight:800;margin-top:12px;\">Equilateral △<\u002Fdiv>\n      <div style=\"font-size:23px;color:#0891B2;margin-top:6px;\">3 lines · order 3<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:18px;box-shadow:0 4px 18px rgba(31,41,51,.07);padding:22px;display:flex;flex-direction:column;align-items:center;text-align:center;\">\n      <svg viewBox=\"0 0 140 140\" style=\"width:130px;height:130px;\"><rect x=\"28\" y=\"28\" width=\"84\" height=\"84\" fill=\"#BAE6FD\" stroke=\"#0891B2\" stroke-width=\"3\"><\u002Frect><line x1=\"70\" y1=\"16\" x2=\"70\" y2=\"124\" stroke=\"#7C3AED\" stroke-width=\"2\" stroke-dasharray=\"6 5\"><\u002Fline><line x1=\"16\" y1=\"70\" x2=\"124\" y2=\"70\" stroke=\"#7C3AED\" stroke-width=\"2\" stroke-dasharray=\"6 5\"><\u002Fline><line x1=\"24\" y1=\"24\" x2=\"116\" y2=\"116\" stroke=\"#7C3AED\" stroke-width=\"2\" stroke-dasharray=\"6 5\"><\u002Fline><line x1=\"116\" y1=\"24\" x2=\"24\" y2=\"116\" stroke=\"#7C3AED\" stroke-width=\"2\" stroke-dasharray=\"6 5\"><\u002Fline><\u002Fsvg>\n      <div style=\"font-size:25px;font-weight:800;margin-top:12px;\">Square<\u002Fdiv>\n      <div style=\"font-size:23px;color:#0891B2;margin-top:6px;\">4 lines · order 4<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:18px;box-shadow:0 4px 18px rgba(31,41,51,.07);padding:22px;display:flex;flex-direction:column;align-items:center;text-align:center;\">\n      <svg viewBox=\"0 0 140 140\" style=\"width:130px;height:130px;\"><rect x=\"20\" y=\"44\" width=\"100\" height=\"52\" fill=\"#FDE68A\" stroke=\"#D97706\" stroke-width=\"3\"><\u002Frect><line x1=\"70\" y1=\"34\" x2=\"70\" y2=\"106\" stroke=\"#7C3AED\" stroke-width=\"2\" stroke-dasharray=\"6 5\"><\u002Fline><line x1=\"10\" y1=\"70\" x2=\"130\" y2=\"70\" stroke=\"#7C3AED\" stroke-width=\"2\" stroke-dasharray=\"6 5\"><\u002Fline><\u002Fsvg>\n      <div style=\"font-size:25px;font-weight:800;margin-top:12px;\">Rectangle<\u002Fdiv>\n      <div style=\"font-size:23px;color:#0891B2;margin-top:6px;\">2 lines · order 2<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:18px;box-shadow:0 4px 18px rgba(31,41,51,.07);padding:22px;display:flex;flex-direction:column;align-items:center;text-align:center;\">\n      <svg viewBox=\"0 0 140 140\" style=\"width:130px;height:130px;\"><polygon points=\"46,44 120,44 94,96 20,96\" fill=\"#FBCFE8\" stroke=\"#DB2777\" stroke-width=\"3\"><\u002Fpolygon><circle cx=\"70\" cy=\"70\" r=\"4\" fill=\"#1F2933\"><\u002Fcircle><\u002Fsvg>\n      <div style=\"font-size:25px;font-weight:800;margin-top:12px;\">Parallelogram<\u002Fdiv>\n      <div style=\"font-size:23px;color:#DB2777;margin-top:6px;\">0 lines · order 2<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:22px;background:#ECFEFF;border-radius:14px;padding:18px 28px;font-size:27px;line-height:1.35;\"><b style=\"color:#0891B2;\">Rule&nbsp;&nbsp;<\u002Fb>A regular polygon with <span class=\"mvar\">n<\u002Fspan> sides has <b><span class=\"mvar\">n<\u002Fspan> lines<\u002Fb> of symmetry and rotational symmetry of <b>order <span class=\"mvar\">n<\u002Fspan><\u002Fb>.<\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Exercise: Order of rotational symmetry\" data-screen-label=\"Exercise: Rotational order\" data-speaker-notes=\"Exercise. State the order of rotational symmetry of each shape. Reveal to check: the answers are 2, 5, 2, 6, 2, and 1.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#10B981;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">EXERCISE<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">State the order of rotational symmetry<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:46px;margin-bottom:22px;\">How many matches in one full turn?<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:repeat(6,1fr);gap:18px;flex:0 1 auto;min-height:0;\">\n    <div style=\"background:#fff;border-radius:16px;box-shadow:0 3px 14px rgba(31,41,51,.06);padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;\">\n      <svg viewBox=\"0 0 120 120\" style=\"width:100%;max-width:110px;\"><rect x=\"18\" y=\"38\" width=\"84\" height=\"44\" fill=\"#DDD6FE\" stroke=\"#7C3AED\" stroke-width=\"3\"><\u002Frect><\u002Fsvg>\n      <div style=\"font-size:24px;font-weight:800;margin-top:10px;color:#64748B;\">(a)<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:16px;box-shadow:0 3px 14px rgba(31,41,51,.06);padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;\">\n      <svg viewBox=\"0 0 120 120\" style=\"width:100%;max-width:110px;\"><polygon points=\"60,16 100,46 84,94 36,94 20,46\" fill=\"#A7F3D0\" stroke=\"#059669\" stroke-width=\"3\"><\u002Fpolygon><\u002Fsvg>\n      <div style=\"font-size:24px;font-weight:800;margin-top:10px;color:#64748B;\">(b)<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:16px;box-shadow:0 3px 14px rgba(31,41,51,.06);padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;\">\n      <svg viewBox=\"0 0 120 120\" style=\"width:100%;max-width:110px;\"><path d=\"M60 20 L72 48 L60 40 L48 48 Z M100 60 L72 72 L80 60 L72 48 Z M60 100 L48 72 L60 80 L72 72 Z M20 60 L48 48 L40 60 L48 72 Z\" fill=\"#FDE68A\" stroke=\"#D97706\" stroke-width=\"2.5\"><\u002Fpath><\u002Fsvg>\n      <div style=\"font-size:24px;font-weight:800;margin-top:10px;color:#64748B;\">(c)<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:16px;box-shadow:0 3px 14px rgba(31,41,51,.06);padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;\">\n      <svg viewBox=\"0 0 120 120\" style=\"width:100%;max-width:110px;\"><polygon points=\"60,14 90,32 90,68 60,86 30,68 30,32\" fill=\"#FBCFE8\" stroke=\"#DB2777\" stroke-width=\"3\"><\u002Fpolygon><polygon points=\"60,32 76,42 76,62 60,72 44,62 44,42\" fill=\"#fff\" stroke=\"#DB2777\" stroke-width=\"2\"><\u002Fpolygon><\u002Fsvg>\n      <div style=\"font-size:24px;font-weight:800;margin-top:10px;color:#64748B;\">(d)<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:16px;box-shadow:0 3px 14px rgba(31,41,51,.06);padding:16px;display:flex;flex-direction:column;align-items:cent
