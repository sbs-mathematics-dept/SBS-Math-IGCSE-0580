er;justify-content:center;text-align:center;\">\n      <svg viewBox=\"0 0 120 120\" style=\"width:100%;max-width:110px;\"><path d=\"M60 24 C40 24 40 56 60 56 C80 56 80 88 60 88\" fill=\"none\" stroke=\"#0891B2\" stroke-width=\"6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n      <div style=\"font-size:24px;font-weight:800;margin-top:10px;color:#64748B;\">(e)<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:16px;box-shadow:0 3px 14px rgba(31,41,51,.06);padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;\">\n      <svg viewBox=\"0 0 120 120\" style=\"width:100%;max-width:110px;\"><polygon points=\"60,20 70,50 60,44 50,50\" fill=\"#F97316\" stroke=\"#C2410C\" stroke-width=\"2.5\"><\u002Fpolygon><polygon points=\"60,100 50,70 60,76 70,70\" fill=\"#93C5FD\" stroke=\"#2563EB\" stroke-width=\"2.5\"><\u002Fpolygon><\u002Fsvg>\n      <div style=\"font-size:24px;font-weight:800;margin-top:10px;color:#64748B;\">(f)<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <details style=\"margin-top:20px;\"><summary class=\"rvtoggle\" style=\"background:#ECFDF5;color:#059669;font-weight:800;font-size:26px;padding:14px 30px;border-radius:12px;display:inline-block;\"><span class=\"rv-shut\">▶ Reveal the orders<\u002Fspan><span class=\"rv-open\">▼ Hide the orders<\u002Fspan><\u002Fsummary>\n    <div style=\"margin-top:14px;background:#D1FAE5;border-radius:14px;padding:20px 28px;font-size:29px;font-weight:700;color:#065F46;\">(a) 2 &nbsp;·&nbsp; (b) 5 &nbsp;·&nbsp; (c) 2 &nbsp;·&nbsp; (d) 6 &nbsp;·&nbsp; (e) 2 &nbsp;·&nbsp; (f) 1 (no rotational symmetry)<\u002Fdiv>\n  <\u002Fdetails>\n<\u002Fsection>\n\n<section data-label=\"19.2 Symmetry of solids\" data-screen-label=\"Concept: 3D symmetry\" data-speaker-notes=\"Three-dimensional symmetry. A plane of symmetry slices a solid into two mirror halves. An axis of rotational symmetry is a line the solid can spin around and look the same. Reveal to check the planes of symmetry for the listed solids.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#06B6D4;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">19.2<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Symmetry of 3D solids<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:48px;margin-bottom:22px;\">Planes &amp; axes of symmetry<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:30px;flex:0 1 auto;min-height:0;\">\n    <div style=\"background:#ECFEFF;border-radius:20px;padding:28px 34px;\">\n      <div style=\"font-size:25px;font-weight:800;color:#0891B2;margin-bottom:14px;\">PLANE of symmetry<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.35;margin-bottom:16px;\">A flat cut that gives two <b>mirror halves<\u002Fb>.<\u002Fp>\n      <svg viewBox=\"0 0 300 175\" style=\"width:100%;max-width:300px;\"><polygon points=\"55,85 175,85 175,155 55,155\" fill=\"#E9D5FF\" stroke=\"#7C3AED\" stroke-width=\"2.5\"><\u002Fpolygon><polygon points=\"55,85 92,56 212,56 175,85\" fill=\"#DDD6FE\" stroke=\"#7C3AED\" stroke-width=\"2.5\"><\u002Fpolygon><polygon points=\"175,85 212,56 212,126 175,155\" fill=\"#C4B5FD\" stroke=\"#7C3AED\" stroke-width=\"2.5\"><\u002Fpolygon><polygon points=\"115,85 152,56 152,126 115,155\" fill=\"#F9A8D4\" opacity=\"0.55\" stroke=\"#DB2777\" stroke-width=\"2.5\" stroke-dasharray=\"6 4\"><\u002Fpolygon><\u002Fsvg>\n    <\u002Fdiv>\n    <div style=\"background:#F3E8FF;border-radius:20px;padding:28px 34px;\">\n      <div style=\"font-size:25px;font-weight:800;color:#7C3AED;margin-bottom:14px;\">AXIS of rotational symmetry<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.35;margin-bottom:16px;\">A line the solid <b>spins around<\u002Fb> and still looks the same.<\u002Fp>\n      <svg viewBox=\"0 0 300 150\" style=\"width:100%;max-width:280px;\"><ellipse cx=\"120\" cy=\"52\" rx=\"52\" ry=\"16\" fill=\"#DDD6FE\" stroke=\"#7C3AED\" stroke-width=\"2.5\"><\u002Fellipse><path d=\"M68 52 L68 112 A52 16 0 0 0 172 112 L172 52\" fill=\"#E9D5FF\" stroke=\"#7C3AED\" stroke-width=\"2.5\"><\u002Fpath><line x1=\"120\" y1=\"20\" x2=\"120\" y2=\"140\" stroke=\"#EC4899\" stroke-width=\"3\" stroke-dasharray=\"8 6\"><\u002Fline><text x=\"200\" y=\"90\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"20\" fill=\"#DB2777\">axis<\u002Ftext><\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <details style=\"margin-top:20px;\"><summary class=\"rvtoggle\" style=\"background:#ECFDF5;color:#059669;font-weight:800;font-size:26px;padding:14px 30px;border-radius:12px;display:inline-block;\"><span class=\"rv-shut\">▶ Reveal planes of symmetry<\u002Fspan><span class=\"rv-open\">▼ Hide<\u002Fspan><\u002Fsummary>\n    <div style=\"margin-top:14px;background:#D1FAE5;border-radius:14px;padding:18px 26px;font-size:26px;font-weight:700;color:#065F46;line-height:1.4;\">Cuboid <b>3<\u002Fb> · Cylinder <b>infinite<\u002Fb> (+1 through the middle) · Square-based pyramid <b>4<\u002Fb> · Equilateral triangular prism <b>4<\u002Fb> · Sphere <b>infinite<\u002Fb><\u002Fdiv>\n  <\u002Fdetails>\n<\u002Fsection>\n\n<section data-label=\"Part 4 · Chord &amp; tangent\" data-screen-label=\"Divider: Chord &amp; tangent\" data-speaker-notes=\"Section divider: the symmetry properties of chords and tangents. Three theorems: the perpendicular from the centre bisects a chord; equal chords are equidistant from the centre; and two tangents from an external point are equal.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0;display:flex;font-family:Nunito,system-ui,sans-serif;background:#DB2777;color:#fff;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:-140px;bottom:-160px;width:520px;height:520px;border-radius:50%;background:#BE185D;\"><\u002Fdiv>\n  <div style=\"margin:auto 0;padding:0 110px;position:relative;z-index:1;\">\n    <div style=\"font-size:230px;font-weight:800;font-family:Fredoka,system-ui,sans-serif;line-height:1;color:rgba(255,255,255,.24);\">04<\u002Fdiv>\n    <div style=\"font-size:30px;font-weight:800;letter-spacing:.18em;color:#FBCFE8;margin:6px 0 14px;\">PART 4 · SECTION 19.3<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:82px;line-height:1.02;\">Chords &amp; tangents<\u002Fh2>\n    <p style=\"font-size:31px;color:#FCE7F3;margin-top:22px;max-width:960px;line-height:1.4;\">Three symmetry properties that turn circle problems into right-angled triangles.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"T1: Perpendicular bisects chord\" data-screen-label=\"Theorem 1\" data-speaker-notes=\"Theorem 1. The perpendicular drawn from the centre of a circle to a chord bisects the chord. Equivalently, the perpendicular bisector of any chord passes through the centre. This creates a right-angled triangle for Pythagoras.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:60px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\"><span style=\"white-space:nowrap;background:#DB2777;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">THEOREM 1<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Perpendicular from centre<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.15fr 1fr;gap:48px;flex:1;align-items:center;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:54px;line-height:1.05;margin-bottom:20px;\">The ⊥ from the centre <span style=\"color:#DB2777;\">bisects the chord<\u002Fspan><\u002Fh2>\n      <p style=\"font-size:30px;line-height:1.4;margin-bottom:20px;\">If OM is perpendicular to chord AB, then <b>AM = MB<\u002Fb>. The perpendicular bisector of a chord always passes through the centre O.<\u002Fp>\n      <div style=\"background:#FCE7F3;border-radius:16px;padding:22px 30px;font-size:28px;line-height:1.4;\"><b style=\"color:#DB2777;\">Why it helps&nbsp;&nbsp;<\u002Fb>It makes a right-angled triangle OMA → use <b>Pythagoras<\u002Fb>.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:26px;box-shadow:0 6px 26px rgba(219,39,119,.14);display:flex;justify-content:center;\">\n      <svg viewBox=\"0 0 340 300\" style=\"width:100%;max-width:460px;height:auto;\">\n        <circle cx=\"170\" cy=\"150\" r=\"118\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3.5\"><\u002Fcircle>\n        <line x1=\"70\" y1=\"212\" x2=\"270\" y2=\"212\" stroke=\"#7C3AED\" stroke-width=\"4.5\"><\u002Fline>\n        <line x1=\"170\" y1=\"150\" x2=\"170\" y2=\"212\" stroke=\"#EC4899\" stroke-width=\"4\"><\u002Fline>\n        <line x1=\"170\" y1=\"150\" x2=\"70\" y2=\"212\" stroke=\"#64748B\" stroke-width=\"2.5\" stroke-dasharray=\"6 5\"><\u002Fline>\n        <line x1=\"170\" y1=\"150\" x2=\"270\" y2=\"212\" stroke=\"#64748B\" stroke-width=\"2.5\" stroke-dasharray=\"6 5\"><\u002Fline>\n        <rect x=\"170\" y=\"196\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"#EC4899\" stroke-width=\"2.5\"><\u002Frect>\n        <circle cx=\"170\" cy=\"150\" r=\"6\" fill=\"#1F2933\"><\u002Fcircle><text x=\"178\" y=\"146\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"24\">O<\u002Ftext>\n        <circle cx=\"70\" cy=\"212\" r=\"5\" fill=\"#7C3AED\"><\u002Fcircle><text x=\"48\" y=\"212\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"22\">A<\u002Ftext>\n        <circle cx=\"270\" cy=\"212\" r=\"5\" fill=\"#7C3AED\"><\u002Fcircle><text x=\"278\" y=\"212\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"22\">B<\u002Ftext>\n        <circle cx=\"170\" cy=\"212\" r=\"5\" fill=\"#EC4899\"><\u002Fcircle><text x=\"176\" y=\"236\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"22\" fill=\"#DB2777\">M<\u002Ftext>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"T2 &amp; T3: Equal chords / two tangents\" data-screen-label=\"Theorems 2 &amp; 3\" data-speaker-notes=\"Theorem 2: equal chords are equidistant from the centre, and chords equidistant from the centre are equal. Theorem 3: the two tangents drawn from an external point are equal in length, and the line from that point to the centre bisects the angle between them.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\"><span style=\"white-space:nowrap;background:#DB2777;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">THEOREMS 2 &amp; 3<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Equal chords &amp; equal tangents<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:30px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;box-shadow:0 4px 20px rgba(31,41,51,.07);padding:26px 32px;display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:800;color:#0891B2;margin-bottom:12px;\">T2 · Equal chords are equidistant<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:14px;min-height:76px;\">Chords of <b>equal length<\u002Fb> are the <b>same distance<\u002Fb> from the centre.<\u002Fp>\n      <div style=\"flex:1;display:flex;align-items:center;justify-content:center;\">\n        <svg viewBox=\"0 0 260 240\" style=\"height:340px;width:auto;max-width:100%;\">\n          <circle cx=\"130\" cy=\"120\" r=\"98\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3.5\"><\u002Fcircle>\n          <line x1=\"42\" y1=\"78\" x2=\"219\" y2=\"78\" stroke=\"#7C3AED\" stroke-width=\"4\"><\u002Fline>\n          <line x1=\"42\" y1=\"162\" x2=\"219\" y2=\"162\" stroke=\"#7C3AED\" stroke-width=\"4\"><\u002Fline>\n          <line x1=\"130\" y1=\"120\" x2=\"130\" y2=\"78\" stroke=\"#EC4899\" stroke-width=\"3.5\"><\u002Fline>\n          <line x1=\"130\" y1=\"120\" x2=\"130\" y2=\"162\" stroke=\"#EC4899\" stroke-width=\"3.5\"><\u002Fline>\n          <circle cx=\"130\" cy=\"120\" r=\"5\" fill=\"#1F2933\"><\u002Fcircle><text x=\"138\" y=\"118\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\">O<\u002Ftext>\n          <text x=\"96\" y=\"72\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\" fill=\"#DB2777\">d<\u002Ftext>\n          <text x=\"96\" y=\"182\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\" fill=\"#DB2777\">d<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:20px;box-shadow:0 4px 20px rgba(31,41,51,.07);padding:26px 32px;display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:800;color:#B45309;margin-bottom:12px;\">T3 · Two tangents are equal<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:14px;min-height:76px;\">From an external point P: <b>PA = PB<\u002Fb>, and OP <b>bisects<\u002Fb> angle APB.<\u002Fp>\n      <div style=\"flex:1;display:flex;align-items:center;justify-content:center;\">\n        <svg viewBox=\"0 0 300 240\" style=\"height:340px;width:auto;max-width:100%;\">\n          <circle cx=\"110\" cy=\"120\" r=\"72\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3.5\"><\u002Fcircle>\n          <circle cx=\"110\" cy=\"120\" r=\"5\" fill=\"#1F2933\"><\u002Fcircle><text x=\"90\" y=\"118\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\">O<\u002Ftext>\n          <line x1=\"266\" y1=\"120\" x2=\"150\" y2=\"57\" stroke=\"#F59E0B\" stroke-width=\"4\"><\u002Fline>\n          <line x1=\"266\" y1=\"120\" x2=\"150\" y2=\"183\" stroke=\"#F59E0B\" stroke-width=\"4\"><\u002Fline>\n          <line x1=\"110\" y1=\"120\" x2=\"150\" y2=\"57\" stroke=\"#64748B\" stroke-width=\"2.5\" stroke-dasharray=\"5 4\"><\u002Fline>\n          <line x1=\"110\" y1=\"120\" x2=\"150\" y2=\"183\" stroke=\"#64748B\" stroke-width=\"2.5\" stroke-dasharray=\"5 4\"><\u002Fline>\n          <line x1=\"110\" y1=\"120\" x2=\"266\" y2=\"120\" stroke=\"#7C3AED\" stroke-width=\"2.5\" stroke-dasharray=\"7 5\"><\u002Fline>\n          <circle cx=\"266\" cy=\"120\" r=\"6\" fill=\"#1F2933\"><\u002Fcircle><text x=\"272\" y=\"118\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\">P<\u002Ftext>\n          <circle cx=\"150\" cy=\"57\" r=\"5\" fill=\"#F59E0B\"><\u002Fcircle><text x=\"156\" y=\"52\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\">A<\u002Ftext>\n          <circle cx=\"150\" cy=\"183\" r=\"5\" fill=\"#F59E0B\"><\u002Fcircle><text x=\"156\" y=\"196\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\">B<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"WE1: Chord length\" data-screen-label=\"Worked example 1\" data-speaker-notes=\"Worked example 1. A chord is 3 cm from the centre of a circle of radius 7 cm. Find the length of the chord. Drop a perpendicular from the centre; it bisects the chord. Half the chord is the square root of 7 squared minus 3 squared, which is the square root of 40. The full chord is twice that, 12.65 cm to two decimal places.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#7C3AED;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">WORKED EXAMPLE 1<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Chord &amp; Pythagoras<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:44px;flex:1;min-height:0;\">\n    <div style=\"display:flex;flex-direction:column;\">\n      <p style=\"font-size:30px;line-height:1.4;margin-bottom:18px;\">A chord is <b>3 cm<\u002Fb> from the centre of a circle of radius <b>7 cm<\u002Fb>. Find the length of the chord AB.<\u002Fp>\n      <div style=\"background:#fff;border-radius:20px;padding:20px;box-shadow:0 5px 22px rgba(124,58,237,.12);display:flex;align-items:center;justify-content:center;flex:1;min-height:0;\">\n        <svg viewBox=\"0 0 320 280\" style=\"width:100%;max-width:440px;height:auto;\">\n          <circle cx=\"160\" cy=\"140\" r=\"112\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3.5\"><\u002Fcircle>\n          <line x1=\"66\" y1=\"200\" x2=\"254\" y2=\"200\" stroke=\"#7C3AED\" stroke-width=\"4.5\"><\u002Fline>\n          <line x1=\"160\" y1=\"140\" x2=\"160\" y2=\"200\" stroke=\"#EC4899\" stroke-width=\"4\"><\u002Fline>\n          <line x1=\"160\" y1=\"140\" x2=\"66\" y2=\"200\" stroke=\"#F59E0B\" stroke-width=\"3.5\"><\u002Fline>\n          <rect x=\"160\" y=\"184\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"#EC4899\" stroke-width=\"2.5\"><\u002Frect>\n          <circle cx=\"160\" cy=\"140\" r=\"6\" fill=\"#1F2933\"><\u002Fcircle><text x=\"168\" y=\"136\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"22\">O<\u002Ftext>\n          <circle cx=\"66\" cy=\"200\" r=\"5\" fill=\"#7C3AED\"><\u002Fcircle><text x=\"44\" y=\"200\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\">A<\u002Ftext>\n          <circle cx=\"254\" cy=\"200\" r=\"5\" fill=\"#7C3AED\"><\u002Fcircle><text x=\"262\" y=\"200\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\">B<\u002Ftext>\n          <circle cx=\"160\" cy=\"200\" r=\"5\" fill=\"#EC4899\"><\u002Fcircle><text x=\"166\" y=\"222\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\" fill=\"#DB2777\">M<\u002Ftext>\n          <text x=\"98\" y=\"158\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"19\" fill=\"#B45309\">7<\u002Ftext>\n          <text x=\"168\" y=\"176\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"19\" fill=\"#DB2777\">3<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;\">\n      <details open=\"\" style=\"\"><summary class=\"rvtoggle\" style=\"background:#ECFDF5;color:#059669;font-weight:800;font-size:24px;padding:12px 26px;border-radius:12px;display:inline-block;margin-bottom:16px;\"><span class=\"rv-shut\">▶ Show solution<\u002Fspan><span class=\"rv-open\">▼ Hide solution<\u002Fspan><\u002Fsummary>\n        <div style=\"background:#fff;border-radius:18px;padding:26px 32px;box-shadow:0 4px 18px rgba(31,41,51,.07);font-size:29px;line-height:1.7;\">\n          <div style=\"margin-bottom:12px;\">The ⊥ from O bisects AB, so AM = MB.<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:10px;\">AM = <span style=\"color:#7C3AED;\">√(7² − 3²)<\u002Fspan> = √40<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:10px;\">AM = 6.324… cm<\u002Fdiv>\n          <div style=\"height:2px;background:#EAE3D6;margin:14px 0;\"><\u002Fdiv>\n          <div style=\"font-weight:800;color:#059669;\">AB = 2 × √40 = <span style=\"background:#D1FAE5;padding:2px 12px;border-radius:8px;\">12.65 cm<\u002Fspan> (2 d.p.)<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"WE2: Two parallel chords\" data-screen-label=\"Worked example 2\" data-speaker-notes=\"Worked example 2. Two equal chords AB and CD are both 14 cm long in a circle of radius 11 cm. Find the distance of each chord from the centre. Half a chord is 7 cm. The distance is the square root of 11 squared minus 7 squared, the square root of 72, which is 8.49 cm.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#7C3AED;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">WORKED EXAMPLE 2<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Equal chords equidistant<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:44px;flex:1;min-height:0;\">\n    <div style=\"display:flex;flex-direction:column;\">\n      <p style=\"font-size:30px;line-height:1.4;margin-bottom:18px;\">Chord CD is <b>14 cm<\u002Fb> long in a circle of radius <b>11 cm<\u002Fb>. Find its distance OY from the centre.<\u002Fp>\n      <div style=\"background:#fff;border-radius:20px;padding:20px;box-shadow:0 5px 22px rgba(124,58,237,.12);display:flex;align-items:center;justify-content:center;flex:1;min-height:0;\">\n        <svg viewBox=\"0 0 320 280\" style=\"width:100%;max-width:440px;height:auto;\">\n          <circle cx=\"160\" cy=\"140\" r=\"112\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3.5\"><\u002Fcircle>\n          <line x1=\"66\" y1=\"196\" x2=\"254\" y2=\"196\" stroke=\"#7C3AED\" stroke-width=\"4.5\"><\u002Fline>\n          <line x1=\"160\" y1=\"140\" x2=\"160\" y2=\"196\" stroke=\"#EC4899\" stroke-width=\"4\"><\u002Fline>\n          <line x1=\"160\" y1=\"140\" x2=\"254\" y2=\"196\" stroke=\"#F59E0B\" stroke-width=\"3.5\"><\u002Fline>\n          <rect x=\"144\" y=\"180\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"#EC4899\" stroke-width=\"2.5\"><\u002Frect>\n          <circle cx=\"160\" cy=\"140\" r=\"6\" fill=\"#1F2933\"><\u002Fcircle><text x=\"168\" y=\"136\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"22\">O<\u002Ftext>\n          <circle cx=\"66\" cy=\"196\" r=\"5\" fill=\"#7C3AED\"><\u002Fcircle><text x=\"44\" y=\"196\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\">C<\u002Ftext>\n          <circle cx=\"254\" cy=\"196\" r=\"5\" fill=\"#7C3AED\"><\u002Fcircle><text x=\"262\" y=\"196\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\">D<\u002Ftext>\n          <circle cx=\"160\" cy=\"196\" r=\"5\" fill=\"#EC4899\"><\u002Fcircle><text x=\"150\" y=\"220\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\" fill=\"#DB2777\">Y<\u002Ftext>\n          <text x=\"206\" y=\"156\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"19\" fill=\"#B45309\">11<\u002Ftext>\n          <text x=\"200\" y=\"192\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"19\" fill=\"#7C3AED\">7<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;\">\n      <details open=\"\" style=\"\"><summary class=\"rvtoggle\" style=\"background:#ECFDF5;color:#059669;font-weight:800;font-size:24px;padding:12px 26px;border-radius:12px;display:inline-block;margin-bottom:16px;\"><span class=\"rv-shut\">▶ Show solution<\u002Fspan><span class=\"rv-open\">▼ Hide solution<\u002Fspan><\u002Fsummary>\n        <div style=\"background:#fff;border-radius:18px;padding:26px 32px;box-shadow:0 4px 18px rgba(31,41,51,.07);font-size:29px;line-height:1.7;\">\n          <div style=\"margin-bottom:12px;\">OY ⊥ CD, so CY = ½ × 14 = <b>7 cm<\u002Fb>.<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:10px;\">OY = <span style=\"color:#7C3AED;\">√(11² − 7²)<\u002Fspan> = √72<\u002Fdiv>\n          <div style=\"height:2px;background:#EAE3D6;margin:14px 0;\"><\u002Fdiv>\n          <div style=\"font-weight:800;color:#059669;\">OY = <span style=\"background:#D1FAE5;padding:2px 12px;border-radius:8px;\">8.49 cm<\u002Fspan> (2 d.p.)<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"WE3: Tangents from a point\" data-screen-label=\"Worked example 3\" data-speaker-notes=\"Worked example 3. Two tangents NM and PM are drawn from an external point M. NM equals 25 cm because equal tangents, giving x equals 25. The radius ON equals 12 cm and is perpendicular to the tangent, so OM equals the square root of 25 squared plus 12 squared, the square root of 769, which is 27.73 cm.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#7C3AED;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">WORKED EXAMPLE 3<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Tangents &amp; Pythagoras<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:44px;flex:1;min-height:0;\">\n    <div style=\"display:flex;flex-direction:column;\">\n      <p style=\"font-size:29px;line-height:1.4;margin-bottom:18px;\">PM = <b>25 cm<\u002Fb> is a tangent; the radius is <b>12 cm<\u002Fb>. Find <span class=\"mvar\">x<\u002Fspan> = NM and <span class=\"mvar\">y<\u002Fspan> = OM.<\u002Fp>\n      <div style=\"background:#fff;border-radius:20px;padding:20px;box-shadow:0 5px 22px rgba(124,58,237,.12);display:flex;align-items:center;justify-content:center;flex:1;min-height:0;\">\n        <svg viewBox=\"0 0 340 280\" style=\"width:100%;max-width:450px;height:auto;\">\n          <circle cx=\"112\" cy=\"140\" r=\"7 play:flex;justify-content:space-between;align-items:center;\"><span style=\"font-size:26px;font-weight:800;color:#059669;\">Ratio (centre ÷ P)<\u002Fspan><span class=\"ace-ratio\" style=\"font-size:40px;font-weight:800;font-family:Fredoka,sans-serif;\">–<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:auto;background:#FEF3C7;border-radius:14px;padding:18px 24px;font-size:25px;line-height:1.35;\"><b style=\"color:#B45309;\">Notice&nbsp;&nbsp;<\u002Fb>The ratio stays at <b>2.00<\u002Fb> wherever P goes — that is the theorem.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Part 5 · Angle theorems\" data-screen-label=\"Divider: Angle theorems\" data-speaker-notes=\"Section divider: the circle angle theorems. Angle in a semicircle, angle at the centre, angles in the same segment, cyclic quadrilaterals, tangent-radius, and the alternate segment theorem.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0;display:flex;font-family:Nunito,system-ui,sans-serif;background:#7C3AED;color:#fff;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:-140px;bottom:-160px;width:520px;height:520px;border-radius:50%;background:#6D28D9;\"><\u002Fdiv>\n  <div style=\"margin:auto 0;padding:0 110px;position:relative;z-index:1;\">\n    <div style=\"font-size:230px;font-weight:800;font-family:Fredoka,system-ui,sans-serif;line-height:1;color:rgba(255,255,255,.22);\">05<\u002Fdiv>\n    <div style=\"font-size:30px;font-weight:800;letter-spacing:.18em;color:#E9D5FF;margin:6px 0 14px;\">PART 5 · SECTION 19.4<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:82px;line-height:1.02;\">Angle theorems<\u002Fh2>\n    <p style=\"font-size:31px;color:#EDE4FF;margin-top:22px;max-width:960px;line-height:1.4;\">Six angle rules that unlock almost every circle question in the exam.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"T4 &amp; T5: Semicircle / centre\" data-screen-label=\"Theorems 4 &amp; 5\" data-speaker-notes=\"Theorem 4: the angle in a semicircle is 90 degrees, because the diameter subtends a right angle at the circumference. Theorem 5: the angle subtended at the centre is twice the angle subtended at the circumference by the same arc.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\"><span style=\"white-space:nowrap;background:#7C3AED;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">THEOREMS 4 &amp; 5<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Semicircle &amp; centre<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:30px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;box-shadow:0 4px 20px rgba(31,41,51,.07);padding:26px 32px;display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:800;color:#7C3AED;margin-bottom:10px;\">T4 · Angle in a semicircle = 90°<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:14px;min-height:76px;\">Any angle drawn on the <b>diameter<\u002Fb> from the circumference is a <b>right angle<\u002Fb>.<\u002Fp>\n      <div style=\"flex:1;display:flex;align-items:center;justify-content:center;\">\n        <svg viewBox=\"0 0 260 220\" style=\"height:340px;width:auto;max-width:100%;\">\n          <circle cx=\"130\" cy=\"120\" r=\"90\" fill=\"none\" stroke=\"#CBD5E1\" stroke-width=\"2\"><\u002Fcircle>\n          <path d=\"M40 120 A90 90 0 0 1 220 120\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3.5\"><\u002Fpath>\n          <line x1=\"40\" y1=\"120\" x2=\"220\" y2=\"120\" stroke=\"#FBBF24\" stroke-width=\"3.5\"><\u002Fline>\n          <line x1=\"40\" y1=\"120\" x2=\"130\" y2=\"30\" stroke=\"#7C3AED\" stroke-width=\"3.5\"><\u002Fline>\n          <line x1=\"220\" y1=\"120\" x2=\"130\" y2=\"30\" stroke=\"#7C3AED\" stroke-width=\"3.5\"><\u002Fline>\n          <polyline points=\"116,43 129,56 142,43\" fill=\"none\" stroke=\"#EC4899\" stroke-width=\"2.6\"><\u002Fpolyline>\n          <circle cx=\"40\" cy=\"120\" r=\"5\" fill=\"#1F2933\"><\u002Fcircle><text x=\"20\" y=\"120\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\">A<\u002Ftext>\n          <circle cx=\"220\" cy=\"120\" r=\"5\" fill=\"#1F2933\"><\u002Fcircle><text x=\"228\" y=\"120\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\">B<\u002Ftext>\n          <circle cx=\"130\" cy=\"30\" r=\"5\" fill=\"#7C3AED\"><\u002Fcircle><text x=\"120\" y=\"24\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\" fill=\"#7C3AED\">C<\u002Ftext>\n          <circle cx=\"130\" cy=\"120\" r=\"4\" fill=\"#1F2933\"><\u002Fcircle><text x=\"136\" y=\"137\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"17\">O<\u002Ftext>\n          <text x=\"150\" y=\"70\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\" fill=\"#EC4899\">90°<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:20px;box-shadow:0 4px 20px rgba(31,41,51,.07);padding:26px 32px;display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:800;color:#DB2777;margin-bottom:10px;\">T5 · Centre = 2 × circumference<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:14px;min-height:76px;\">The angle at the <b>centre<\u002Fb> is <b>double<\u002Fb> the angle at the circumference (same arc).<\u002Fp>\n      <div style=\"flex:1;display:flex;align-items:center;justify-content:center;\">\n        <svg viewBox=\"0 0 260 220\" style=\"height:340px;width:auto;max-width:100%;\">\n          <circle cx=\"130\" cy=\"120\" r=\"90\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3.5\"><\u002Fcircle>\n          <line x1=\"70\" y1=\"186\" x2=\"130\" y2=\"120\" stroke=\"#EC4899\" stroke-width=\"3.5\"><\u002Fline><line x1=\"190\" y1=\"186\" x2=\"130\" y2=\"120\" stroke=\"#EC4899\" stroke-width=\"3.5\"><\u002Fline>\n          <line x1=\"70\" y1=\"186\" x2=\"130\" y2=\"34\" stroke=\"#7C3AED\" stroke-width=\"3.5\"><\u002Fline><line x1=\"190\" y1=\"186\" x2=\"130\" y2=\"34\" stroke=\"#7C3AED\" stroke-width=\"3.5\"><\u002Fline>\n          <circle cx=\"130\" cy=\"120\" r=\"5\" fill=\"#DB2777\"><\u002Fcircle><text x=\"138\" y=\"116\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\" fill=\"#DB2777\">O<\u002Ftext>\n          <text x=\"120\" y=\"150\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\" fill=\"#DB2777\">2x<\u002Ftext>\n          <circle cx=\"130\" cy=\"34\" r=\"5\" fill=\"#7C3AED\"><\u002Fcircle><text x=\"120\" y=\"30\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\" fill=\"#7C3AED\">P<\u002Ftext>\n          <text x=\"122\" y=\"60\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\" fill=\"#7C3AED\">x<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"T6 &amp; T7: Same segment / cyclic quad\" data-screen-label=\"Theorems 6 &amp; 7\" data-speaker-notes=\"Theorem 6: angles in the same segment, subtended by the same arc, are equal. Theorem 7: opposite angles of a cyclic quadrilateral add to 180 degrees, and the exterior angle equals the interior opposite angle.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\"><span style=\"white-space:nowrap;background:#7C3AED;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">THEOREMS 6 &amp; 7<\u002Fspan><span fill=\"#0891B2\">x<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:20px;box-shadow:0 4px 20px rgba(31,41,51,.07);padding:26px 32px;display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:800;color:#DB2777;margin-bottom:10px;\">T7 · Cyclic quadrilateral<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:14px;min-height:76px;\">Opposite angles add to <b>180°<\u002Fb>: <span class=\"mvar\">a<\u002Fspan>+<span class=\"mvar\">c<\u002Fspan>=180°, <span class=\"mvar\">b<\u002Fspan>+<span class=\"mvar\">d<\u002Fspan>=180°.<\u002Fp>\n      <div style=\"flex:1;display:flex;align-items:center;justify-content:center;\">\n        <svg viewBox=\"0 0 260 220\" style=\"height:340px;width:auto;max-width:100%;\">\n          <circle cx=\"130\" cy=\"112\" r=\"92\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3.5\"><\u002Fcircle>\n          <polygon points=\"60,53 192,44 198,174 58,169\" fill=\"#FBCFE8\" opacity=\"0.55\" stroke=\"#DB2777\" stroke-width=\"3\"><\u002Fpolygon>\n          <text x=\"40\" y=\"48\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"22\" fill=\"#7C3AED\">a<\u002Ftext>\n          <text x=\"200\" y=\"40\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"22\" fill=\"#1F2933\">b<\u002Ftext>\n          <text x=\"204\" y=\"190\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"22\" fill=\"#7C3AED\">c<\u002Ftext>\n          <text x=\"38\" y=\"186\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"22\" fill=\"#1F2933\">d<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"T8 &amp; T9: Tangent-radius / alt segment\" data-screen-label=\"Theorems 8 &amp; 9\" data-speaker-notes=\"Theorem 8: a tangent is perpendicular to the radius at the point of contact, making a 90 degree angle. Theorem 9, the alternate segment theorem: the angle between a tangent and a chord equals the angle in the alternate segment.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\"><span style=\"white-space:nowrap;background:#7C3AED;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">THEOREMS 8 &amp; 9<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Tangent-radius &amp; alternate segment<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:30px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;box-shadow:0 4px 20px rgba(31,41,51,.07);padding:26px 32px;display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:800;color:#B45309;margin-bottom:10px;\">T8 · Tangent ⊥ radius<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:14px;min-height:76px;\">A tangent meets the radius at the point of contact at <b>90°<\u002Fb>.<\u002Fp>\n      <div style=\"flex:1;display:flex;align-items:center;justify-content:center;\">\n        <svg viewBox=\"0 0 260 220\" style=\"height:340px;width:auto;max-width:100%;\">\n          <circle cx=\"130\" cy=\"100\" r=\"72\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3.5\"><\u002Fcircle>\n          <line x1=\"40\" y1=\"172\" x2=\"220\" y2=\"172\" stroke=\"#F59E0B\" stroke-width=\"4\"><\u002Fline>\n          <line x1=\"130\" y1=\"100\" x2=\"130\" y2=\"172\" stroke=\"#EC4899\" stroke-width=\"3.5\"><\u002Fline>\n          <rect x=\"130\" y=\"156\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"#EC4899\" stroke-width=\"2.5\"><\u002Frect>\n          <circle cx=\"130\" cy=\"100\" r=\"5\" fill=\"#1F2933\"><\u002Fcircle><text x=\"138\" y=\"98\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\">O<\u002Ftext>\n          <circle cx=\"130\" cy=\"172\" r=\"5\" fill=\"#F59E0B\"><\u002Fcircle><text x=\"112\" y=\"196\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\">T<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:20px;box-shadow:0 4px 20px rgba(31,41,51,.07);padding:26px 32px;display:flex;flex-direction:column;\">\n      <div style=\"font-size:26px;font-weight:800;color:#DB2777;margin-bottom:10px;\">T9 · Alternate segment<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:14px;min-height:76px;\">Tangent-chord angle = angle in the <b>alternate segment<\u002Fb> (both <span class=\"mvar\">x<\u002Fspan>).<\u002Fp>\n      <div style=\"flex:1;display:flex;align-items:center;justify-content:center;\">\n        <svg viewBox=\"0 0 260 220\" style=\"height:340px;width:auto;max-width:100%;\">\n          <circle cx=\"130\" cy=\"100\" r=\"80\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3.5\"><\u002Fcircle>\n          <line x1=\"40\" y1=\"180\" x2=\"220\" y2=\"180\" stroke=\"#F59E0B\" stroke-width=\"4\"><\u002Fline>\n          <circle cx=\"110\" cy=\"180\" r=\"5\" fill=\"#F59E0B\"><\u002Fcircle><text x=\"98\" y=\"200\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\">T<\u002Ftext>\n          <line x1=\"110\" y1=\"180\" x2=\"190\" y2=\"52\" stroke=\"#EC4899\" stroke-width=\"3.5\"><\u002Fline>\n          <circle cx=\"190\" cy=\"52\" r=\"5\" fill=\"#1F2933\"><\u002Fcircle><text x=\"196\" y=\"48\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\">B<\u002Ftext>\n          <line x1=\"110\" y1=\"180\" x2=\"72\" y2=\"58\" stroke=\"#0891B2\" stroke-width=\"3\"><\u002Fline><line x1=\"190\" y1=\"52\" x2=\"72\" y2=\"58\" stroke=\"#0891B2\" stroke-width=\"3\"><\u002Fline>\n          <circle cx=\"72\" cy=\"58\" r=\"5\" fill=\"#1F2933\"><\u002Fcircle><text x=\"52\" y=\"54\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\">C<\u002Ftext>\n          <text x=\"118\" y=\"172\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\" fill=\"#DB2777\">x<\u002Ftext>\n          <text x=\"92\" y=\"82\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\" fill=\"#DB2777\">x<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"WE4: Tangent &amp; angle\" data-screen-label=\"Worked example 4\" data-speaker-notes=\"Worked example 4. OC is a radius meeting tangent CB, so angle OCB is 90 degrees. In triangle OCB, angle y equals 180 minus 90 minus 30, which is 60 degrees. Because two tangents subtend equal angles at the centre, x equals y equals 60 degrees.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#7C3AED;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">WORKED EXAMPLE 4<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Tangent-radius angle<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:44px;flex:1;min-height:0;\">\n    <div style=\"display:flex;flex-direction:column;\">\n      <p style=\"font-size:29px;line-height:1.4;margin-bottom:18px;\">CB and BA are tangents from B, with ∡OBC = <b>30°<\u002Fb>. Find <span class=\"mvar\">x<\u002Fspan> = ∡AOB and <span class=\"mvar\">y<\u002Fspan> = ∡COB.<\u002Fp>\n      <div style=\"background:#fff;border-radius:20px;padding:20px;box-shadow:0 5px 22px rgba(124,58,237,.12);display:flex;align-items:center;justify-content:center;flex:1;min-height:0;\">\n        <svg viewBox=\"0 0 320 260\" style=\"width:100%;max-width:440px;height:auto;\">\n          <circle cx=\"118\" cy=\"130\" r=\"66\" fill=\"none\" stroke=\"#1F2         <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;\">\n      <details open=\"\"><summary class=\"rvtoggle\" style=\"background:#ECFDF5;color:#059669;font-weight:800;font-size:24px;padding:12px 26px;border-radius:12px;display:inline-block;margin-bottom:16px;\"><span class=\"rv-shut\">▶ Show solution<\u002Fspan><span class=\"rv-open\">▼ Hide solution<\u002Fspan><\u002Fsummary>\n        <div style=\"background:#fff;border-radius:18px;padding:26px 32px;box-shadow:0 4px 18px rgba(31,41,51,.07);font-size:29px;line-height:1.7;\">\n          <div style=\"margin-bottom:12px;\">Radius ⊥ tangent → ∡OCB = 90°.<\u002Fdiv>\n          <div style=\"margin-bottom:10px;\">Angles in △OCB: <span class=\"mvar\">y<\u002Fspan> = 180° − 90° − 30°<\u002Fdiv>\n          <div style=\"font-weight:800;color:#059669;margin-bottom:12px;\"><span class=\"mvar\">y<\u002Fspan> = ∡COB = <span style=\"background:#D1FAE5;padding:2px 12px;border-radius:8px;\">60°<\u002Fspan><\u002Fdiv>\n          <div style=\"height:2px;background:#EAE3D6;margin:12px 0;\"><\u002Fdiv>\n          <div>Equal tangents subtend equal angles at O, so <b><span class=\"mvar\">x<\u002Fspan> = <span class=\"mvar\">y<\u002Fspan> = 60°<\u002Fb>.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"WE6: Alternate segment\" data-screen-label=\"Worked example 6\" data-speaker-notes=\"Worked example 6. AC and BC are tangents from C, so triangle ABC is isosceles with the base angles equal. Each base angle is 180 minus 40, all over 2, which is 70 degrees. By the alternate segment theorem, angle ADB equals the tangent-chord angle, so x equals 70 degrees.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px; <\u002Fcircle><text x=\"130\" y=\"34\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\" fill=\"#7C3AED\">D<\u002Ftext>\n          <line x1=\"90\" y1=\"60\" x2=\"140\" y2=\"40\" stroke=\"#0891B2\" stroke-width=\"2.5\"><\u002Fline><line x1=\"228\" y1=\"78\" x2=\"140\" y2=\"40\" stroke=\"#0891B2\" stroke-width=\"2.5\"><\u002Fline>\n          <text x=\"140\" y=\"210\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\" fill=\"#B45309\">40°<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;\">\n      <details open=\"\"><summary class=\"rvtoggle\" style=\"background:#ECFDF5;color:#059669;font-weight:800;font-size:24px;padding:12px 26px;border-radius:12px;display:inline-block;margin-bottom:16px;\"><span class=\"rv-shut\">▶ Show solution<\u002Fspan><span class=\"rv-open\">▼ Hide solution<\u002Fspan><\u002Fsummary>\n        <div style=\"background:#fff;border-radius:18px;padding:26px 32px;box-shadow:0 4px 18px rgba(31,41,51,.07);font-size:28px;line-height:1.65;\">\n          <div style=\"margin-bottom:12px;\">Equal tangents → △ABC is isosceles.<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:10px;\">∡CAB = ∡CBA = <span class=\"frac\"><span class=\"num\">180° − 40°<\u002Fspan><span class=\"den\">2<\u002Fspan><\u002Fspan> = 70°<\u002Fdiv>\n          <div style=\"height:2px;background:#EAE3D6;margin:12px 0;\"><\u002Fdiv>\n          <div style=\"font-weight:800;color:#059669;\">Alternate segment: <span class=\"mvar\">x<\u002Fspan> = ∡ADB = <span style=\"background:#D1FAE5;padding:2px 12px;border-radius:8px;\">70°<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"WE7: Prove CD is a diameter\" data-screen-label=\"Worked example 7\" data-speaker-notes=\"Worked example 7, a proof. TA is a tangent. Using the triangle at T, angle BTC is 180 minus 30 minus 120, which is 30 degrees. By the alternate segment theorem angle TDC equals 30 degrees. Then in triangle TCD, angle CTD equals 180 minus 60 minus 30, which is 90 degrees. An angle of 90 in the semicircle means CD must be a diameter.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#DB2777;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">WORKED EXAMPLE 7 · PROOF<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Extended<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1.15fr;gap:44px;flex:1;min-height:0;\">\n    <div style=\"display:flex;flex-direction:column;\">\n      <p style=\"font-size:28px;line-height:1.4;margin-bottom:16px;\">TA is a tangent at T; B, C, D lie on a straight line. With the angles shown, <b>prove CD is a diameter.<\u002Fb><\u002Fp>\n      <div style=\"background:#fff;border-radius:20px;padding:18px;box-shadow:0 5px 22px rgba(124,58,237,.12);display:flex;align-items:center;justify-content:center;flex:1;min-height:0;\">\n        <img src=\"c0a78fd1-43b1-415e-a839-2c47bc88c19a\" alt=\"Tangent TA and secant BCD\" style=\"max-width:100%;max-height:100%;object-fit:contain;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;\">\n      <details open=\"\"><summary class=\"rvtoggle\" style=\"background:#ECFDF5;color:#059669;font-weight:800;font-size:24px;padding:12px 26px;border-radius:12px;display:inline-block;margin-bottom:14px;\"><span class=\"rv-shut\">▶ Show proof<\u002Fspan><span class=\"rv-open\">▼ Hide proof<\u002Fspan><\u002Fsummary>\n        <div style=\"background:#fff;border-radius:18px;padding:24px 30px;box-shadow:0 4px 18px rgba(31,41,51,.07);font-size:25px;line-height:1.55;\">\n          <div style=\"margin-bottom:10px;\"><b>1.<\u002Fb> In △BTC: ∡BTC = 180° − 30° − (180° − 60°) = <b>30°<\u002Fb> &nbsp;<span style=\"color:#64748B;\">(angles in a triangle; ∡BCT = 180°−60° on line BCD)<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-bottom:10px;\"><b>2.<\u002Fb> ∡TDC = <b>30°<\u002Fb> &nbsp;<span style=\"color:#64748B;\">(alternate segment theorem)<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-bottom:10px;\"><b>3.<\u002Fb> In △TCD: ∡CTD = 180° − 60° − 30° = <b>90°<\u002Fb><\u002Fdiv>\n          <div style=\"height:2px;background:#EAE3D6;margin:12px 0;\"><\u002Fdiv>\n          <div style=\"font-weight:800;color:#059669;\"><b>4.<\u002Fb> ∡CTD = 90° is the angle in a <b>semicircle<\u002Fb> → <span style=\"background:#D1FAE5;padding:2px 10px;border-radius:8px;\">CD is a diameter<\u002Fspan>. ∎<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"WE8: Prove 2x − y = 90\" data-screen-label=\"Worked example 8\" data-speaker-notes=\"Worked example 8, a harder proof. Using the tangent-chord and alternate segment relationships and the angle sum of a triangle, show that two x minus y equals 90 degrees. This is the kind of reasoning question that stretches Extended students toward AS level.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#DB2777;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">WORKED EXAMPLE 8 · PROOF<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Extended challenge<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1.15fr;gap:44px;flex:1;min-height:0;\">\n    <div style=\"display:flex;flex-direction:column;\">\n      <p style=\"font-size:28px;line-height:1.4;margin-bottom:16px;\">BT is a tangent at T. Angle <span class=\"mvar\">x<\u002Fspan> = ∡DTC and <span class=\"mvar\">y<\u002Fspan> = ∡DCT. <b>Show that 2<span class=\"mvar\">x<\u002Fspan> − <span class=\"mvar\">y<\u002Fspan> = 90°.<\u002Fb><\u002Fp>\n      <div style=\"background:#fff;border-radius:20px;padding:18px;box-shadow:0 5px 22px rgba(124,58,237,.12);display:flex;align-items:center;justify-content:center;flex:1;min-height:0;\">\n        <img src=\"ced41028-e8f5-45d1-8659-909361ec3336\" alt=\"Tangent BT and secant through the centre O\" style=\"max-width:100%;max-height:100%;object-fit:contain;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;\">\n      <details open=\"\"><summary class=\"rvtoggle\" style=\"background:#ECFDF5;color:#059669;font-weight:800;font-size:24px;padding:12px 26px;border-radius:12px;display:inline-block;margin-bottom:14px;\"><span class=\"rv-shut\">▶ Show proof<\u002Fspan><span class=\"rv-open\">▼ Hide proof<\u002Fspan><\u002Fsummary>\n        <div style=\"background:#fff;border-radius:18px;padding:24px 30px;box-shadow:0 4px 18px rgba(31,41,51,.07);font-size:25px;line-height:1.55;\">\n          <div style=\"margin-bottom:9px;\"><b>1.<\u002Fb> ∡CTD = 90° &nbsp;<span style=\"color:#64748B;\">(CD passes through centre O → angle in a semicircle)<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-bottom:9px;\"><b>2.<\u002Fb> ∡TDC = 180° − 90° − <span class=\"mvar\">x<\u002Fspan> = <b>90° − <span class=\"mvar\">x<\u002Fspan><\u002Fb> &nbsp;<span style=\"color:#64748B;\">(△CTD)<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-bottom:9px;\"><b>3.<\u002Fb> Alternate segment: ∡CTB = 90° − <span class=\"mvar\">x<\u002Fspan>; &nbsp;also ∡BCT = 180° − <span class=\"mvar\">x<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-bottom:9px;\"><b>4.<\u002Fb> △BCT: <span class=\"mvar\">y<\u002Fspan> + (180° − <span class=\"mvar\">x<\u002Fspan>) + (90° − <span class=\"mvar\">x<\u002Fspan>) = 180°<\u002Fdiv>\n          <div style=\"height:2px;background:#EAE3D6;margin:10px 0;\"><\u002Fdiv>\n          <div style=\"font-weight:800;color:#059669;\">So <span style=\"background:#D1FAE5;padding:2px 10px;border-radius:8px;\">2<span class=\"mvar\">x<\u002Fspan> − <span class=\"mvar\">y<\u002Fspan> = 90°<\u002Fspan>. ∎<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n\n<section data-label=\"Challenge: Prove x = a\" data-screen-label=\"Challenge 1\" data-speaker-notes=\"Advanced proof. ABCD is a cyclic quadrilateral with side DC extended to make an exterior angle x at C. Angle a is the interior opposite angle at A. Prove x equals a. On the straight line, x plus angle BCD is 180. In the cyclic quadrilateral, a plus angle BCD is also 180. Therefore x equals a: the exterior angle of a cyclic quadrilateral equals the interior opposite angle.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#DB2777;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">CHALLENGE · PROOF<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Exterior angle of a cyclic quadrilateral<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1.15fr;gap:44px;flex:1;min-height:0;\">\n    <div style=\"display:flex;flex-direction:column;\">\n      <p style=\"font-size:28px;line-height:1.4;margin-bottom:16px;\">ABCD is a cyclic quadrilateral. Side DC is extended to E. <b>Prove that <span class=\"mvar\">x<\u002Fspan> = <span class=\"mvar\">a<\u002Fspan>.<\u002Fb><\u002Fp>\n      <div style=\"background:#fff;border-radius:20px;padding:18px;box-shadow:0 5px 22px rgba(124,58,237,.12);display:flex;align-items:center;justify-content:center;flex:1;min-height:0;\">\n        <svg viewBox=\"0 0 320 300\" style=\"height:330px;width:auto;max-width:100%;\">\n          <circle cx=\"160\" cy=\"140\" r=\"95\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"3.5\"><\u002Fcircle>\n          <polygon points=\"131,50 249,108 208,222 74,180\" fill=\"#FBCFE8\" opacity=\"0.5\" stroke=\"#DB2777\" stroke-width=\"3\"><\u002Fpolygon>\n          <line x1=\"208\" y1=\"222\" x2=\"263\" y2=\"239\" stroke=\"#1F2933\" stroke-width=\"2.5\" stroke-dasharray=\"6 5\"><\u002Fline>\n          <line x1=\"74\" y1=\"180\" x2=\"208\" y2=\"222\" stroke=\"#7C3AED\" stroke-width=\"2.5\"><\u002Fline>\n          <circle cx=\"131\" cy=\"50\" r=\"5\" fill=\"#1F2933\"><\u002Fcircle><text x=\"120\" y=\"44\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\">A<\u002Ftext>\n          <circle cx=\"249\" cy=\"108\" r=\"5\" fill=\"#1F2933\"><\u002Fcircle><text x=\"256\" y=\"104\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\">B<\u002Ftext>\n          <circle cx=\"208\" cy=\"222\" r=\"5\" fill=\"#1F2933\"><\u002Fcircle><text x=\"196\" y=\"242\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\">C<\u002Ftext>\n          <circle cx=\"74\" cy=\"180\" r=\"5\" fill=\"#1F2933\"><\u002Fcircle><text x=\"54\" y=\"184\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\">D<\u002Ftext>\n          <text x=\"268\" y=\"243\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"18\">E<\u002Ftext>\n          <text x=\"132\" y=\"76\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\" fill=\"#7C3AED\">a<\u002Ftext>\n          <text x=\"224\" y=\"210\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\" fill=\"#DB2777\">x<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;\">\n      <details open=\"\"><summary class=\"rvtoggle\" style=\"background:#ECFDF5;color:#059669;font-weight:800;font-size:24px;padding:12px 26px;border-radius:12px;display:inline-block;margin-bottom:14px;\"><span class=\"rv-shut\">▶ Show proof<\u002Fspan><span class=\"rv-open\">▼ Hide proof<\u002Fspan><\u002Fsummary>\n        <div style=\"background:#fff;border-radius:18px;padding:24px 30px;box-shadow:0 4px 18px rgba(31,41,51,.07);font-size:26px;line-height:1.6;\">\n          <div style=\"margin-bottom:10px;\"><b>1.<\u002Fb> <span class=\"mvar\">x<\u002Fspan> + ∡BCD = 180° &nbsp;<span style=\"color:#64748B;\">(angles on the straight line DCE)<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-bottom:10px;\"><b>2.<\u002Fb> <span class=\"mvar\">a<\u002Fspan> + ∡BCD = 180° &nbsp;<span style=\"color:#64748B;\">(opposite angles of a cyclic quadrilateral)<\u002Fspan><\u002Fdiv>\n          <div style=\"height:2px;background:#EAE3D6;margin:12px 0;\"><\u002Fdiv>\n          <div style=\"font-weight:800;color:#059669;\"><b>3.<\u002Fb> Therefore <span style=\"background:#D1FAE5;padding:2px 10px;border-radius:8px;\"><span class=\"mvar\">x<\u002Fspan> = <span class=\"mvar\">a<\u002Fspan><\u002Fspan> — the exterior angle equals the interior opposite angle. ∎<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Challenge: Two circles, find x\" data-screen-label=\"Challenge 2\" data-speaker-notes=\"A tough exam question. Two circles sit on the same straight line A T S B, touching it at T and S, and meeting at D. Using the alternate segment theorem in each circle and the angles at D, the unknown angle x works out to 103 degrees.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:48px 72px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#DB2777;color:#fff;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">CHALLENGE · STRETCH<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Two circles on a common tangent line<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.15fr 1fr;gap:40px;flex:1;min-height:0;\">\n    <div style=\"display:flex;flex-direction:column;\">\n      <p style=\"font-size:27px;line-height:1.4;margin-bottom:14px;\">Two circles touch line AB at <b>T<\u002Fb> and <b>S<\u002Fb> and meet at <b>D<\u002Fb>. <b>Find <span class=\"mvar\">x<\u002Fspan>.<\u002Fb><\u002Fp>\n      <div style=\"background:#fff;border-radius:20px;padding:16px;box-shadow:0 5px 22px rgba(124,58,237,.12);display:flex;align-items:center;justify-content:center;flex:1;min-height:0;\">\n        <img src=\"2a2b3222-833e-4ca3-ba2d-5877742a131d\" alt=\"Two circles on a common tangent line, find x\" style=\"max-width:100%;max-height:100%;object-fit:contain;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;\">\n      <details open=\"\"><summary class=\"rvtoggle\" style=\"background:#ECFDF5;color:#059669;font-weight:800;font-size:24px;padding:12px 26px;border-radius:12px;display:inline-block;margin-bottom:14px;\"><span class=\"rv-shut\">▶ Show solution<\u002Fspan><span class=\"rv-open\">▼ Hide solution<\u002Fspan><\u002Fsummary>\n        <div style=\"background:#fff;border-radius:18px;padding:24px 30px;box-shadow:0 4px 18px rgba(31,41,51,.07);font-size:25px;line-height:1.55;\">\n          <div style=\"margin-bottom:10px;\"><b>Left circle<\u002Fb> (alternate segment at T): ∡TDE and the 37° &amp; 60° angles give ∡EDT = <b>60°<\u002Fb>.<\u002Fdiv>\n          <div style=\"margin-bottom:10px;\"><b>Right circle<\u002Fb> (alternate segment at S): the 80° angle gives ∡TDC = <b>43°<\u002Fb>.<\u002Fdiv>\n          <div style=\"height:2px;background:#EAE3D6;margin:12px 0;\"><\u002Fdiv>\n          <div style=\"font-weight:800;color:#059669;\">Angles at D: <span class=\"mvar\">x<\u002Fspan> = ∡EDT + ∡TDC = 60° + 43° = <span style=\"background:#D1FAE5;padding:2px 10px;border-radius:8px;\">103°<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection><section data-label=\"Explore: Circle Theorems Lab\" data-screen-label=\"Circle Theorems Lab\" data-speaker-notes=\"Explore the interactive Circle Theorems Lab. This is the SBS Mathematics Department's online lab. Drag the points to see each theorem update live. If the embedded view does not load on your network, use the Open in new tab button.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:36px 56px 28px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#0F172A;color:#fff;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:14px;\">\n    <div style=\"display:flex;align-items:center;gap:18px;\"><span style=\"white-space:nowrap;background:#34E0C4;color:#083344;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">LIVE LAB<\u002Fspan><span style=\"font-size:26px;color:#94A3B8;font-weight:600;\">SBS Mathematics · Circle Theorems<\u002Fspan><\u002Fdiv>\n    <a href=\"https://sbs-mathematics-dept.github.io/SBS-Math-IGCSE-0580/labs/circle-theorems.html\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;background:#7C3AED;color:#fff;font-weight:800;font-size:24px;padding:14px 26px;border-radius:12px;display:inline-flex;align-items:center;gap:10px;\">Open in new tab ↗<\u002Fa>\n  <\u002Fdiv>\n  <div style=\"flex:1;min-height:0;border-radius:20px;overflow:hidden;background:#fff;box-shadow:0 10px 40px rgba(0,0,0,.4);position:relative;\">\n    <iframe src=\"https://sbs-mathematics-dept.github.io/SBS-Math-IGCSE-0580/labs/circle-theorems.html\" title=\"Circle Theorems Lab\" loading=\"lazy\" style=\"width:100%;height:100%;border:0;display:block;\"><\u002Fiframe>\n  <\u002Fdiv>\n  <p style=\"font-size:22px;color:#94A3B8;margin-top:12px;text-align:center;\">Drag the points on the circle to watch each theorem update in real time. If your network blocks the embed, tap <b style=\"color:#34E0C4;\">Open in new tab<\u002Fb>.<\u002Fp>\n<\u002Fsection>\n\n<section data-label=\"Part 6 · Exam quiz\" data-screen-label=\"Divider: Exam quiz\" data-speaker-notes=\"Section divider: the exam practice quiz. Eighteen Cambridge-style questions where students type their own answers and press Check. They can also reveal the answer. Angles, chord and tangent lengths, symmetry orders, and naming theorems.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0;display:flex;font-family:Nunito,system-ui,sans-serif;background:#1F2933;color:#fff;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:-150px;top:-150px;width:480px;height:480px;border-radius:50%;background:#2B3644;\"><\u002Fdiv>\n  <div style=\"margin:auto 0;padding:0 110px;position:relative;z-index:1;\">\n    <div style=\"font-size:230px;font-weight:800;font-family:Fredoka,system-ui,sans-serif;line-height:1;color:rgba(255,255,255,.12);\">06<\u002Fdiv>\n    <div style=\"font-size:30px;font-weight:800;letter-spacing:.18em;color:#FBBF24;margin:6px 0 14px;\">PART 6 · EXAM PRACTICE<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:82px;line-height:1.02;\">Type-your-answer quiz<\u002Fh2>\n    <p style=\"font-size:31px;color:#CBD5E1;margin-top:22px;max-width:1000px;line-height:1.4;\"><b style=\"color:#34E0C4;\">18 questions.<\u002Fb> Type your answer, press <b>Check<\u002Fb>, and get instant feedback. Stuck? Press <b>Show answer<\u002Fb>.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Quiz 1–3 · Symmetry\" data-screen-label=\"Quiz set 1\" data-speaker-notes=\"Quiz questions 1 to 3 on symmetry. Order of rotational symmetry of a regular hexagon is 6. Number of lines of symmetry of a regular pentagon is 5. Number of planes of symmetry of a cuboid with three different edge lengths is 3.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 72px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:22px;\"><span style=\"white-space:nowrap;background:#FBBF24;color:#1F2933;font-weight:800;font-size:24px;letter-spacing:.04em;padding:9px 22px;border-radius:999px;\">QUIZ · SYMMETRY<\u002Fspan><span style=\"font-size:24px;color:#94A3B8;font-weight:600;\">Questions 1–3 · type &amp; check<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:26px;flex:1;\">\n    <div class=\"quiz\" data-answer=\"6\" data-tol=\"0\" style=\"background:#fff;border-radius:20px;padding:28px;box-shadow:0 4px 20px rgba(31,41,51,.07);display:flex;flex-direction:column;\">\n      <div style=\"font-size:23px;font-weight:800;color:#7C3AED;margin-bottom:10px;\">Question 1<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:16px;\">What is the <b>order of rotational symmetry<\u002Fb> of a regular hexagon?<\u002Fp>\n      <input class=\"quiz-input\" type=\"text\" inputmode=\"numeric\" placeholder=\"Type here…\" style=\"width:100%;font-family:Nunito,sans-serif;font-size:26px;padding:14px 16px;border:2px solid #CBD5E1;border-radius:12px;margin-bottom:14px;\">\n      <div style=\"display:flex;gap:10px;margin-bottom:12px;\"><button class=\"quiz-check\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:none;border-radius:12px;background:#10B981;color:#fff;cursor:pointer;\">Check<\u002Fbutton><button class=\"quiz-show\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:2px solid #7C3AED;border to the centre (cm).<\u002Fp>\n      <input class=\"quiz-input\" type=\"text\" inputmode=\"decimal\" placeholder=\"Type here…\" style=\"width:100%;font-family:Nunito,sans-serif;font-size:26px;padding:14px 16px;border:2px solid #CBD5E1;border-radius:12px;margin-bottom:14px;\">\n      <div style=\"display:flex;gap:10px;margin-bottom:12px;\"><button class=\"quiz-check\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:none;border-radius:12px;background:#10B981;color:#fff;cursor:pointer;\">Check<\u002Fbutton><button class=\"quiz-show\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:2px solid #7C3AED;border-radius:12px;background:#fff;color:#7C3AED;cursor:pointer;\">Show answer<\u002Fbutton><\u002Fdiv>\n      <div class=\"quiz-fb\" style=\"display:none;font-size:23px;font-weight:700;padding:12px 16px;border-radius:10px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"quiz\" data-answer=\"9\" data-tol=\"0\" data-note=\"Two tangents from one point are equal.\" style=\"background:#fff;border-radius:20px;padding:28px;box-shadow:0 4px 20px rgba(31,41,51,.07);display:flex;flex-direction:column;\">\n      <div style=\"font-size:23px;font-weight:800;color:#B45309;margin-bottom:10px;\">Question 8<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.35;margin-bottom:16px;\">Two tangents are drawn from a point M. One is <b>9 cm<\u002Fb> long. How long is the other (cm)?<\u002Fp>\n      <input class=\"quiz-input\" type=\"text\" inputmode=\"decimal\" placeholder=\"Type here…\" style=\"width:100%;font-family:Nunito,sans-serif;font-size:26px;padding:14px 16px;border:2px solid #CBD5E1;border-radius:12px;margin-bottom:14px;\">\n      <div style=\"display:flex;gap:10px;margin-bottom:12px;\"><button class=\"quiz-check\" style=\"font-family:Nunito,sans-serif;font-weight:800;font-size:23px;padding:12px 22px;border:none;border-radius:12px;background:#10B981;color:#fff;cursor:pointer;\">Check<\u002
