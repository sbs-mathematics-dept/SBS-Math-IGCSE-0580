rd flow and the reversed flow. For f of x equals 3x minus 4 the inverse is x plus 4 over 3. For g of x equals 5 minus 2x the inverse is 5 minus x over 2.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 76px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLES 17 &amp; 18<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Method 1 · reverse the flow diagram<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:30px;flex:1;min-height:0;\">\n    <div style=\"background:#fff;border-radius:18px;padding:20px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:10px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#0F7A45;\">WE17 · f(<span class=\"mvar\">x<\u002Fspan>) = 3<span class=\"mvar\">x<\u002Fspan> − 4<\u002Fdiv>\n      <div style=\"flex:1;display:flex;align-items:center;justify-content:center;min-height:0;\"><img src=\"91265957-de45-4b79-8856-17ce3e02cee3\" alt=\"Flow diagram for the inverse of 3x-4\" style=\"max-width:100%;max-height:100%;object-fit:contain;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:18px;padding:20px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:10px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#0F7A45;\">WE18 · g(<span class=\"mvar\">x<\u002Fspan>) = 5 − 2<span class=\"mvar\">x<\u002Fspan><\u002Fdiv>\n      <div style=\"flex:1;display:flex;align-items:center;justify-content:center;min-height:0;\"><img src=\"7e566ec2-6d07-4dc2-bb3a-fb2b49496fbf\" alt=\"Flow diagram for the inverse of 5-2x\" style=\"max-width:100%;max-height:100%;object-fit:contain;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Worked examples 19 &amp; 20\" data-screen-label=\"WE19-20 inverse mapping\" data-speaker-notes=\"Worked examples 19 and 20 find the same inverses using method 2, reversing the mapping. Set y equals the rule, make x the subject, then write in terms of x. For 3x minus 4 the inverse is x plus 4 over 3; for 5 minus 2x the inverse is 5 minus x over 2 - the same answers as the flow method.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLES 19 &amp; 20<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Method 2 · reverse the mapping — same answers<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:28px 32px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;justify-content:center;\">\n      <div style=\"font-size:25px;font-weight:800;color:#0F7A45;\">WE19 · f(<span class=\"mvar\">x<\u002Fspan>) = 3<span class=\"mvar\">x<\u002Fspan> − 4<\u002Fdiv>\n      <div style=\"font-size:28px;line-height:1.9;\">\n        <span class=\"mvar\">y<\u002Fspan> = 3<span class=\"mvar\">x<\u002Fspan> − 4<br>\n        <span class=\"mvar\">y<\u002Fspan> + 4 = 3<span class=\"mvar\">x<\u002Fspan><br>\n        <span class=\"mvar\">x<\u002Fspan> = <span class=\"frac\"><span class=\"num\"><span class=\"mvar\">y<\u002Fspan> + 4<\u002Fspan><span class=\"den\">3<\u002Fspan><\u002Fspan><br>\n        <b style=\"color:#0F7A45;\">f<sup>−1<\u002Fsup>(<span class=\"mvar\">x<\u002Fspan>) = <span class=\"frac\"><span class=\"num\"><span class=\"mvar\">x<\u002Fspan> + 4<\u002Fspan><span class=\"den\">3<\u002Fspan><\u002Fspan><\u002Fb>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:20px;padding:28px 32px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;justify-content:center;\">\n      <div style=\"font-size:25px;font-weight:800;color:#0F7A45;\">WE20 · g(<span class=\"mvar\">x<\u002Fspan>) = 5 − 2<span class=\"mvar\">x<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:28px;line-height:1.9;\">\n        <span class=\"mvar\">y<\u002Fspan> = 5 − 2<span class=\"mvar\">x<\u002Fspan><br>\n        2<span class=\"mvar\">x<\u002Fspan> = 5 − <span class=\"mvar\">y<\u002Fspan><br>\n        <span class=\"mvar\">x<\u002Fspan> = <span class=\"frac\"><span class=\"num\">5 − <span class=\"mvar\">y<\u002Fspan><\u002Fspan><span class=\"den\">2<\u002Fspan><\u002Fspan><br>\n        <b style=\"color:#0F7A45;\">g<sup>−1<\u002Fsup>(<span class=\"mvar\">x<\u002Fspan>) = <span class=\"frac\"><span class=\"num\">5 − <span class=\"mvar\">x<\u002Fspan><\u002Fspan><span class=\"den\">2<\u002Fspan><\u002Fspan><\u002Fb>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Your turn: functions\" data-screen-label=\"YT functions\" data-speaker-notes=\"Your turn on functions. Evaluate, form a composite, and find an inverse. Reveal to check.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:60px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\"><span style=\"white-space:nowrap;background:#0EA5A8;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">YOUR TURN<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">f(<span class=\"mvar\">x<\u002Fspan>) = 2<span class=\"mvar\">x<\u002Fspan> + 3, &nbsp;g(<span class=\"mvar\">x<\u002Fspan>) = <span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup><\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;flex:1;\">\n    <div style=\"background:#fff;border-radius:18px;padding:28px 30px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#0EA5A8;\">Q1 · evaluate<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.5;\">Find <b>f(−4)<\u002Fb> and <b>g(−4)<\u002Fb>.<\u002Fp>\n      <details class=\"rvtoggle\" style=\"margin-top:auto;\"><summary style=\"background:#E6F6F6;border:2px solid #0EA5A8;border-radius:12px;padding:14px 20px;font-size:24px;font-weight:800;color:#0B7E80;display:inline-flex;gap:10px;align-items:center;\"><span style=\"font-size:18px;\">▶<\u002Fspan><span class=\"rv-shut\">Reveal answer<\u002Fspan><span class=\"rv-open\">Answer ↓<\u002Fspan><\u002Fsummary><div style=\"margin-top:12px;font-size:26px;line-height:1.6;background:#F5FBFB;border-radius:12px;padding:16px 20px;\">f(−4)=2(−4)+3 = <b>−5<\u002Fb><br>g(−4)=(−4)<sup>2<\u002Fsup> = <b>16<\u002Fb><\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:18px;padding:28px 30px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#0EA5A8;\">Q2 · composite<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.5;\">Find <b>fg(<span class=\"mvar\">x<\u002Fspan>)<\u002Fb> and <b>gf(<span class=\"mvar\">x<\u002Fspan>)<\u002Fb>.<\u002Fp>\n      <details class=\"rvtoggle\" style=\"margin-top:auto;\"><summary style=\"background:#E6F6F6;border:2px solid #0EA5A8;border-radius:12px;padding:14px 20px;font-size:24px;font-weight:800;color:#0B7E80;display:inline-flex;gap:10px;align-items:center;\"><span style=\"font-size:18px;\">▶<\u002Fspan><span class=\"rv-shut\">Reveal answer<\u002Fspan><span class=\"rv-open\">Answer ↓<\u002Fspan><\u002Fsummary><div style=\"margin-top:12px;font-size:25px;line-height:1.6;background:#F5FBFB;border-radius:12px;padding:16px 20px;\">fg(<span class=\"mvar\">x<\u002Fspan>)=2<span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup>+3<br>gf(<span class=\"mvar\">x<\u002Fspan>)=(2<span class=\"mvar\">x<\u002Fspan>+3)<sup>2<\u002Fsup><\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:18px;padding:28px 30px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#0EA5A8;\">Q3 · inverse<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.5;\">Find <b>f<sup>−1<\u002Fsup>(<span class=\"mvar\">x<\u002Fspan>)<\u002Fb>.<\u002Fp>\n      <details class=\"rvtoggle\" style=\"margin-top:auto;\"><summary style=\"background:#E6F6F6;border:2px solid #0EA5A8;border-radius:12px;padding:14px 20px;font-size:24px;font-weight:800;color:#0B7E80;display:inline-flex;gap:10px;align-items:center;\"><span style=\"font-size:18px;\">▶<\u002Fspan><span class=\"rv-shut\">Reveal answer<\u002Fspan><span class=\"rv-open\">Answer ↓<\u002Fspan><\u002Fsummary><div style=\"margin-top:12px;font-size:25px;line-height:1.6;background:#F5FBFB;border-radius:12px;padding:16px 20px;\"><span class=\"mvar\">y<\u002Fspan>=2<span class=\"mvar\">x<\u002Fspan>+3 → <span class=\"mvar\">x<\u002Fspan>=<span class=\"frac\"><span class=\"num\"><span class=\"mvar\">y<\u002Fspan>−3<\u002Fspan><span class=\"den\">2<\u002Fspan><\u002Fspan><br>f<sup>−1<\u002Fsup>(<span class=\"mvar\">x<\u002Fspan>)=<span class=\"frac\"><span class=\"num\"><span class=\"mvar\">x<\u002Fspan>−3<\u002Fspan><span class=\"den\">2<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Part 5 · Exam practice\" data-screen-label= x;gap:12px;align-items:center;margin-top:auto;\"><input class=\"quiz-input\" placeholder=\"cm\" style=\"flex:1;font-size:26px;padding:12px 18px;border:2px solid #CBD5DE;border-radius:12px;outline:none;font-family:Nunito;\"><button class=\"quiz-check\" data-answer=\"4\" style=\"background:#C23A2B;color:#fff;font-weight:800;font-size:24px;padding:12px 26px;border:none;border-radius:12px;cursor:pointer;\">Check<\u002Fbutton><\u002Fdiv>\n      <details class=\"rvtoggle\"><summary style=\"font-size:22px;color:#C23A2B;font-weight:700;cursor:pointer;\"><span class=\"rv-shut\">Show working<\u002Fspan><span class=\"rv-open\">w(w+3)=28 → (w−4)(w+7)=0 → w=4<\u002Fspan><\u002Fsummary><\u002Fdetails>\n      <div class=\"quiz-feedback\" style=\"font-size:23px;font-weight:700;min-height:26px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"quiz\" style=\"background:#fff;border-radius:18px;padding:24px 30px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#C23A2B;\">Q6<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.4;\">Solve <b><span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup> + 2<span class=\"mvar\">x<\u002Fspan> − 15 = 0<\u002Fb>. Give the <b>positive<\u002Fb> solution.<\u002Fp>\n      <div style=\"display:flex;gap:12px;align-items:center;margin-top:auto;\"><input class=\"quiz-input\" placeholder=\"x =\" style=\"flex:1;font-size:26px;padding:12px 18px;border:2px solid #CBD5DE;border-radius:12px;outline:none;font-family:Nunito;\"><button class=\"quiz-check\" data-answer=\"3\" style=\"background:#C23A2B;color:#fff;font-weight:800;font-size:24px;padding:12px 26px;border:none;border-radius:12px;cursor:pointer;\">Check<\u002Fbutton><\u002Fdiv>\n      <details class=\"rvtoggle\"><summary style=\"font-size:22px;color:#C23A2B;font-weight:700;cursor:pointer;\"><span class=\"rv-shut\">Show working<\u002Fspan><span class=\"rv-open\">(x+5)(x−3)=0 → x = 3 or −5<\u002Fspan><\u002Fsummary><\u002Fdetails>\n      <div class=\"quiz-feedback\" style=\"font-size:23px;font-weight:700;min-height:26px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"quiz\" style=\"background:#fff;border-radius:18px;padding:24px 30px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#C23A2B;\">Q7<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.4;\">Using <b><span class=\"mvar\">v<\u002Fspan> = <span class=\"mvar\">u<\u002Fspan> + <span class=\"mvar\">at<\u002Fspan><\u002Fb> with <span class=\"mvar\">v<\u002Fspan>=30, <span class=\"mvar\">a<\u002Fspan>=4, <span class=\"mvar\">t<\u002Fspan>=5, find <b><span class=\"mvar\">u<\u002Fspan><\u002Fb>.<\u002Fp>\n      <div style=\"display:flex;gap:12px;align-items:center;margin-top:auto;\"><input class=\"quiz-input\" placeholder=\"u =\" style=\"flex:1;font-size:26px;padding:12px 18px;border:2px solid #CBD5DE;border-radius:12px;outline:none;font-family:Nunito;\"><button class=\"quiz-check\" data-answer=\"10\" style=\"background:#C23A2B;color:#fff;font-weight:800;font-size:24px;padding:12px 26px;border:none;border-radius:12px;cursor:pointer;\">Check<\u002Fbutton><\u002Fdiv>\n      <details class=\"rvtoggle\"><summary style=\"font-size:22px;color:#C23A2B;font-weight:700;cursor:pointer;\"><span class=\"rv-shut\">Show working<\u002Fspan><span class=\"rv-open\">u = v − at = 30 − 20 = 10<\u002Fspan><\u002Fsummary><\u002Fdetails>\n      <div class=\"quiz-feedback\" style=\"font-size:23px;font-weight:700;min-height:26px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"quiz\" style=\"background:#fff;border-radius:18px;padding:24px 30px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#C23A2B;\">Q8<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.4;\">The area of a circle is <b><span class=\"mvar\">A<\u002Fspan> = π<span class=\"mvar\">r<\u002Fspan><sup>2<\u002Fsup><\u002Fb>. If <span class=\"mvar\">A<\u002Fspan> = <b>36π<\u002Fb>, find the <b>radius <span class=\"mvar\">r<\u002Fspan><\u002Fb>.<\u002Fp>\n      <div style=\"display:flex;gap:12px;align-items:center;margin-top:auto;\"><input class=\"quiz-input\" placeholder=\"r =\" style=\"flex:1;font-size:26px;padding:12px 18px;border:2px solid #CBD5DE;border-radius:12px;outline:none;font-family:Nunito;\"><button class=\"quiz-check\" data-answer=\"6\" style=\"background:#C23A2B;color:#fff;font-weight:800;font-size:24px;padding:12px 26px;border:none;border-radius:12px;cursor:pointer;\">Check<\u002Fbutton><\u002Fdiv>\n      <details class=\"rvtoggle\"><summary style=\"font-size:22px;color:#C23A2B;font-weight:700;cursor:pointer;\"><span class=\"rv-shut\">Show working<\u002Fspan><span class=\"rv-open\">r² = 36 → r = 6<\u002Fspan><\u002Fsummary><\u002Fdetails>\n      <div class=\"quiz-feedback\" style=\"font-size:23px;font-weight:700;min-height:26px;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Exam quiz · Q9–12\" data-screen-label=\"Quiz Q9-12\" data-speaker-notes=\"Exam quiz questions 9 to 12 on rearranging and evaluating functions.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 76px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\"><span style=\"white-space:nowrap;background:#C23A2B;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">QUIZ · TYPE YOUR ANSWER<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Formulae &amp; f(<span class=\"mvar\">x<\u002Fspan>) · 9–12 of 18<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;flex:1;\">\n    <div class=\"quiz\" style=\"background:#fff;border-radius:18px;padding:24px 30px; Fdiv>\n    <div class=\"quiz\" style=\"background:#fff;border-radius:18px;padding:24px 30px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#C23A2B;\">Q12<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.4;\"><b>h(<span class=\"mvar\">x<\u002Fspan>) = 9 − <span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup>.<\u002Fb> &nbsp;Find <b>h(4)<\u002Fb>.<\u002Fp>\n      <div style=\"display:flex;gap:12px;align-items:center;margin-top:auto;\"><input class=\"quiz-input\" placeholder=\"answer\" style=\"flex:1;font-size:26px;padding:12px 18px;border:2px solid #CBD5DE;border-radius:12px;outline:none;font-family:Nunito;\"><button class=\"quiz-check\" data-answer=\"-7\" style=\"background:#C23A2B;color:#fff;font-weight:800;font-size:24px;padding:12px 26px;border:none;border-radius:12px;cursor:pointer;\">Check<\u002Fbutton><\u002Fdiv>\n      <details class=\"rvtoggle\"><summary style=\"font-size:22px;color:#C23A2B;font-weight:700;cursor:pointer;\"><span class=\"rv-shut\">Show working<\u002Fspan><span class=\"rv-open\">9 − 16 = −7<\u002Fspan><\u002Fsummary><\u002Fdetails>\n      <div class=\"quiz-feedback\" style=\"font-size:23px;font-weight:700;min-height:26px;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Exam quiz · Q13–15\" data-screen-label=\"Quiz Q13-15\" data-speaker-notes=\"Exam quiz questions 13 to 15 on composite and inverse functions.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 76px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\"><span style=\"white-space:nowrap;background:#C23A2B;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">QUIZ · TYPE YOUR ANSWER<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Composite &amp; inverse · 13–15 of 18<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;flex:1;\">\n    <div class=\"quiz\" style=\"background:#fff;border-radius:18px;padding:24px 28px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#C23A2B;\">Q13<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.4;\">f(<span class=\"mvar\">x<\u002Fspan>)=2<span class=\"mvar\">x<\u002Fspan>−1, g(<span class=\"mvar\">x<\u002Fspan>)=<span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup>+6. Find <b>fg(2)<\u002Fb>.<\u002Fp>\n      <div style=\"display:flex;gap:10px;align-items:center;margin-top:auto;\"><input class=\"quiz-input\" placeholder=\"answer\" style=\"flex:1;min-width:0;font-size:25px;padding:12px 14px;border:2px solid #CBD5DE;border-radius:12px;outline:none;font-family:Nunito;\"><button class=\"quiz-check\" data-answer=\"19\" style=\"background:#C23A2B;color:#fff;font-weight:800;font-size:23px;padding:12px 20px;border:none;border-radius:12px;cursor:pointer;\">Check<\u002Fbutton><\u002Fdiv>\n      <details class=\"rvtoggle\"><summary style=\"font-size:22px;color:#C23A2B;font-weight:700;cursor:pointer;\"><span class=\"rv-shut\">Show working<\u002Fspan><span class=\"rv-open\">g(2)=10 → f(10)=19<\u002Fspan><\u002Fsummary><\u002Fdetails>\n      <div class=\"quiz-feedback\" style=\"font-size:22px;font-weight:700;min-height:26px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"quiz\" style=\"background:#fff;border-radius:18px;padding:24px 28px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#C23A2B;\">Q14<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.4;\">f(<span class=\"mvar\">x<\u002Fspan>) = 2<span class=\"mvar\">x<\u002Fspan> − 1. Find <b>ff(3)<\u002Fb>.<\u002Fp>\n      <div style=\"display:flex;gap:10px;align-items:center;margin-top:auto;\"><input class=\"quiz-input\" placeholder=\"answer\" style=\"flex:1;min-width:0;font-size:25px;padding:12px 14px;border:2px solid #CBD5DE;border-radius:12px;outline:none;font-family:Nunito;\"><button class=\"quiz-check\" data-answer=\"9\" style=\"background:#C23A2B;color:#fff;font-weight:800;font-size:23px;padding:12px 20px;border:none;border-radius:12px;cursor:pointer;\">Check<\u002Fbutton><\u002Fdiv>\n      <details class=\"rvtoggle\"><summary style=\"font-size:22px;color:#C23A2B;font-weight:700;cursor:pointer;\"><span class=\"rv-shut\">Show working<\u002Fspan><span class=\"rv-open\">f(3)=5 → f(5)=9<\u002Fspan><\u002Fsummary><\u002Fdetails>\n      <div class=\"quiz-feedback\" style=\"font-size:22px;font-weight:700;min-height:26px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"quiz\" style=\"background:#fff;border-radius:18px;padding:24px 28px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#C23A2B;\">Q15<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.4;\">f(<span class=\"mvar\">x<\u002Fspan>)=3<span class=\"mvar\">x<\u002Fspan>−4. Find <b>f<sup>−1<\u002Fsup>(11)<\u002Fb>.<\u002Fp>\n      <div style=\"display:flex;gap:10px;align-items:center;margin-top:auto;\"><input class=\"quiz-input\" placeholder=\"answer\" style=\"flex:1;min-width:0;font-size:25px;padding:12px 14px;border:2px solid #CBD5DE;border-radius:12px;outline:none;font-family:Nunito;\"><button class=\"quiz-check\" data-answer=\"5\" style=\"background:#C23A2B;color:#fff;font-weight:800;font-size:23px;padding:12px 20px;border:none;border-radius:12px;cursor:pointer;\">Check<\u002Fbutton><\u002Fdiv>\n      <details class=\"rvtoggle\"><summary style=\"font-size:22px;color:#C23A2B;font-weight:700;cursor:pointer;\"><span class=\"rv-shut\">Show working<\u002Fspan><span class=\"rv-open\">f⁻¹(x)=(x+4)/3 → (11+4)/3 = 5<\u002Fspan><\u002Fsummary><\u002Fdetails>\n      <div class=\"quiz-feedback\" style=\"font-size:22px;font-weight:700;min-height:26px;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Exam quiz · Q16–18\" data-screen-label=\"Quiz Q16-18\" data-speaker-notes=\"Exam quiz questions 16 to 18 on inverses and domain and range. Decimal answers accepted.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 76px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\"><span style=\"white-space:nowrap;background:#C23A2B;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">QUIZ · TYPE YOUR ANSWER<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Inverse &amp; domain · 16–18 of 18<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;flex:1;\">\n    <div class=\"quiz\" style=\"background:#fff;border-radius:18px;padding:24px 28px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#C23A2B;\">Q16<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.4;\">g(<span class=\"mvar\">x<\u002Fspan>) = 5 − 2<span class=\"mvar\">x<\u002Fspan>. Find <b>g<sup>−1<\u002Fsup>(1)<\u002Fb>.<\u002Fp>\n      <div style=\"display:flex;gap:10px;align-items:center;margin-top:auto;\"><input class=\"quiz-input\" placeholder=\"answer\" style=\"flex:1;min-width:0;font-size:25px;padding:12px 14px;border:2px solid #CBD5DE;border-radius:12px;outline:none;font-family:Nunito;\"><button class=\"quiz-check\" data-answer=\"2\" style=\"background:#C23A2B;color:#fff;font-weight:800;font-size:23px;padding:12px 20px;border:none;border-radius:12px;cursor:pointer;\">Check<\u002Fbutton><\u002Fdiv>\n      <details class=\"rvtoggle\"><summary style=\"font-size:22px;color:#C23A2B;font-weight:700;cursor:pointer;\"><span class=\"rv-shut\">Show working<\u002Fspan><span class=\"rv-open\">g⁻¹(x)=(5−x)/2 → (5−1)/2 = 2<\u002Fspan><\u002Fsummary><\u002Fdetails>\n      <div class=\"quiz-feedback\" style=\"font-size:22px;font-weight:700;min-height:26px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"quiz\" style=\"background:#fff;border-radius:18px;padding:24px 28px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#C23A2B;\">Q17<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.4;\">For <span class=\"mvar\">y<\u002Fspan> = <span style=\"font-size:1.15em;line-height:1;vertical-align:-.05em;\">√<\u002Fspan><span style=\"border-top:2px solid currentColor;padding:2px 3px 0;\">2<span class=\"mvar\">x<\u002Fspan>−1<\u002Fspan>, the <b>least value<\u002Fb> of <span class=\"mvar\">x<\u002Fspan> in the domain is?<\u002Fp>\n      <div style=\"display:flex;gap:10px;align-items:center;margin-top:auto;\"><input class=\"quiz-input\" placeholder=\"e.g. 0.5\" style=\"flex:1;min-width:0;font-size:25px;padding:12px 14px;border:2px solid #CBD5DE;border-radius:12px;outline:none;font-family:Nunito;\"><button class=\"quiz-check\" data-answer=\"0.5\" style=\"background:#C23A2B;color:#fff;font-weight:800;font-size:23px;padding:12px 20px;border:none;border-radius:12px;cursor:pointer;\">Check<\u002Fbutton><\u002Fdiv>\n      <details class=\"rvtoggle\"><summary style=\"font-size:22px;color:#C23A2B;font-weight:700;cursor:pointer;\"><span class=\"rv-shut\">Show working<\u002Fspan><span class=\"rv-open\">2x−1 ≥ 0 → x ≥ ½ = 0.5<\u002Fspan><\u002Fsummary><\u002Fdetails>\n      <div class=\"quiz-feedback\" style=\"font-size:22px;font-weight:700;min-height:26px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"quiz\" style=\"background:#fff;border-radius:18px;padding:24px 28px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#C23A2B;\">Q18<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.4;\">For <span class=\"mvar\">y<\u002Fspan> = <span class=\"frac\"><span class=\"num\">3<span class=\"mvar\">x<\u002Fspan><\u002Fspan><span class=\"den\">2<span class=\"mvar\">x<\u002Fspan>+1<\u002Fspan><\u002Fspan>, which value can <span class=\"mvar\">x<\u002Fspan> <b>not<\u002Fb> take?<\u002Fp>\n      <div style=\"display:flex;gap:10px;align-items:center;margin-top:auto;\"><input class=\"quiz-input\" placeholder=\"e.g. -0.5\" style=\"flex:1;min-width:0;font-size:25px;padding:12px 14px;border:2px solid #CBD5DE;border-radius:12px;outline:none;font-family:Nunito;\"><button class=\"quiz-check\" data-answer=\"-0.5\" style=\"background:#C23A2B;color:#fff;font-weight:800;font-size:23px;padding:12px 20px;border:none;border-radius:12px;cursor:pointer;\">Check<\u002Fbutton><\u002Fdiv>\n      <details class=\"rvtoggle\"><summary style=\"font-size:22px;color:#C23A2B;font-weight:700;cursor:pointer;\"><span class=\"rv-shut\">Show working<\u002Fspan><span class=\"rv-open\">2x+1 ≠ 0 → x ≠ −½ = −0.5<\u002Fspan><\u002Fsummary><\u002Fdetails>\n      <div class=\"quiz-feedback\" style=\"font-size:22px;font-weight:700;min-height:26px;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Formula cheat sheet\" data-screen-label=\"Cheat sheet\" data-speaker-notes=\"A one-page summary of the chapter's key methods and formulae for quick revision.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#0B2E45;color:#EAF4FB;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:20px;\"><span style=\"width:52px;height:6px;background:#FFC23C;border-radius:3px;\"><\u002Fspan><span style=\"font-size:26px;font-weight:700;letter-spacing:.14em;color:#FFC23C;\">CHEAT SHEET<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:52px;margin-bottom:28px;color:#fff;\">Everything on one page<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;flex:1;\">\n    <div style=\"background:#08475f;border-radius:18px;padding:26px 30px;display:flex;flex-direction:column;gap:10px;\"><div style=\"font-size:25px;font-weight:800;color:#7FC4F5;\">Setting up equations<\u002Fdiv><div style=\"font-size:24px;line-height:1.5;\">READ · LET a letter · BUILD an equation · SOLVE, then answer in words.<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#08475f;border-radius:18px;padding:26px 30px;display:flex;flex-direction:column;gap:10px;\"><div style=\"font-size:25px;font-weight:800;color:#7FC4F5;\">Quadratics from words<\u002Fdiv><div style=\"font-size:24px;line-height:1.5;\">Make one side <b>= 0<\u002Fb>, factorise, read both roots, <b>reject<\u002Fb> impossible ones.<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#08475f;border-radius:18px;padding:26px 30px;display:flex;flex-direction:column;gap:10px;\"><div style=\"font-size:25px;font-weight:800;color:#7FC4F5;\">Change the subject<\u002Fdiv><div style=\"font-size:24px;line-height:1.5;\">Expand → clear fractions → collect &amp; factorise the letter → inverse ops. √ undoes ² (write <b>±<\u002Fb>).<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#08475f;border-radius:18px;padding:26px 30px;display:flex;flex-direction:column;gap:10px;\"><div style=\"font-size:25px;font-weight:800;color:#7FC4F5;\">Function notation<\u002Fdiv><div style=\"font-size:24px;line-height:1.5;\">f(<span class=\"mvar\">a<\u002Fspan>) = substitute <span class=\"mvar\">a<\u002Fspan> for <span class=\"mvar\">x<\u002Fspan>. Negatives go in brackets.<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#08475f;border-radius:18px;padding:26px 30px;display:flex;flex-direction:column;gap:10px;\"><div style=\"font-size:25px;font-weight:800;color:#7FC4F5;\">Composite &amp; inverse<\u002Fdiv><div style=\"font-size:24px;line-height:1.5;\"><b>fg(<span class=\"mvar\">x<\u002Fspan>)<\u002Fb>: do g first. <b>f<sup>−1<\u002Fsup><\u002Fb>: let <span class=\"mvar\">y<\u002Fspan>=f(<span class=\"mvar\">x<\u002Fspan>), make <span class=\"mvar\">x<\u002Fspan> the subject, swap to <span class=\"mvar\">x<\u002Fspan>.<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#08475f;border-radius:18px;padding:26px 30px;display:flex;flex-direction:column;gap:10px;\"><div style=\"font-size:25px;font-weight:800;color:#7FC4F5;\">Domain &amp; range<\u002Fdiv><div style=\"font-size:24px;line-height:1.5;\">√ needs inside ≥ 0; a fraction's bottom ≠ 0. Domain = inputs, range = outputs.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Well done!\" data-screen-label=\"Well done\" data-speaker-notes=\"Closing slide. Recap the four chapter skills and encourage students to revise with the cheat sheet and the exam questions.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 120px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#1F6FB2;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:70px;bottom:-70px;font-family:Fredoka,system-ui,sans-serif;font-size:300px;line-height:1;color:rgba(255,255,255,.10);font-weight:700;\">✓<\u002Fdiv>\n  <div style=\"position:relative;z-index:1;max-width:1180px;\">\n    <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:20px;\"><span style=\"width:52px;height:6px;background:#FFC23C;border-radius:3px;\"><\u002Fspan><span style=\"font-size:26px;font-weight:700;letter-spacing:.16em;color:#FFC23C;\">CHAPTER 22 COMPLETE<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:700;font-size:104px;line-height:1.0;margin-bottom:26px;\">Well done!<\u002Fh2>\n    <p style=\"font-size:33px;line-height:1.45;color:#DCEEF9;margin-bottom:30px;\">You've worked through equations, formulae and functions from first principles to exam-level questions. You can now:<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px 40px;font-size:28px;line-height:1.4;\">\n      <div style=\"display:flex;gap:14px;\"><span style=\"color:#FFC23C;font-weight:800;\">✓<\u002Fspan><span>Turn worded problems into equations and solve them<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:14px;\"><span style=\"color:#FFC23C;font-weight:800;\">✓<\u002Fspan><span>Form and solve quadratic equations<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:14px;\"><span style=\"color:#FFC23C;font-weight:800;\">✓<\u002Fspan><span>Change the subject of a formula<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:14px;\"><span style=\"color:#FFC23C;font-weight:800;\">✓<\u002Fspan><span>Evaluate f(<span class=\"mvar\">x<\u002Fspan>) and find domain &amp; range<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:14px;\"><span style=\"color:#FFC23C;font-weight:800;\">✓<\u002Fspan><span>Form composite functions like fg(<span class=\"mvar\">x<\u002Fspan>)<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:14px;\"><span style=\"color:#FFC23C;font-weight:800;\">✓<\u002Fspan><span>Find inverse functions f<sup>−1<\u002Fsup>(<span class=\"mvar\">x<\u002Fspan>)<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:27px;line-height:1.5;color:#DCEEF9;margin-top:34px;\">Revise with the <b style=\"color:#fff;\">cheat sheet<\u002Fb>, then test yourself on the <b style=\"color:#fff;\">18 exam-practice questions<\u002Fb>. Type an answer, press Check, and reveal the working whenever you get stuck.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const nums = (s) => ((s||'').toString().match(/-?\\d+(\\.\\d+)?/g) || []).map(Number);\n    document.addEventListener('click', (e) => {\n      // ----- Type-your-answer quiz -----\n      const btn = e.target.closest('.quiz-check');\n      if (btn) {\n        const box = btn.closest('.quiz');\n        const input = box.querySelector('.quiz-input');\n        const fb = box.querySelector('.quiz-feedback');\n        const mode = btn.dataset.mode || 'num';\n        let ok = false;\n        if (mode === 'text') {\n          const norm = (s) => (s||'').toLowerCase().replace(/\\s+/g,'').replace(/[×xX]/g,'*');\n          const wants = (btn.dataset.answer||'').split('|').map(norm);\n          ok = wants.includes(norm(input.value));\n        } else {\n          const want = nums(btn.dataset.answer);\n          const tol = parseFloat(btn.dataset.tol || '0.05');\n          const got = nums(input.value);\n          ok = got.length >= want.length && want.length > 0;\n          if (ok) {\n            const g = [...got].sort((a,b)=>a-b), w = [...want].sort((a,b)=>a-b);\n            ok = w.every((v,i) => Math.abs(v - g[i]) <= tol + Math.abs(v)*0.001);\n          }\n        }\n        if (ok) {\n          input.style.borderColor = '#0F7A45'; input.style.background = '#E4F8EC';\n          fb.style.color = '#0F7A45'; fb.textContent = '✓ Correct — well done!';\n        } else {\n          input.style.borderColor = '#C23A2B'; input.style.background = '#FFF1EE';\n          fb.style.color = '#C23A2B';\n          fb.textContent = input.value.trim() ? '✗ Not yet — try again or reveal the working.' : 'Type your answer first.';\n        }\n        return;\n      }\n      // ----- Generic step-by-step tutorial -----\n      const nav = e.target.closest('.stut-next, .stut-prev');\n      if (nav) {\n        const tut = nav.closest('.stut');\n        const max = parseInt(tut.dataset.max || '1', 10);\n        let step = parseInt(tut.dataset.step || '0', 10);\n        step += nav.classList.contains('stut-next') ? 1 : -1;\n        step = Math.max(0, Math.min(max, step));\n        this.setStep(tut, step);\n      }\n    });\n    document.querySelectorAll('.stut').forEach((t) => this.setStep(t, parseInt(t.dataset.step||'0',10)));\n  }\n\n  setStep(tut, step) {\n    tut.dataset.step = step;\n    const max = parseInt(tut.dataset.max || '1', 10);\n    tut.querySelectorAll('.sl').forEach((l) => {\n      const min = parseInt(l.dataset.min || '0', 10);\n      l.style.opacity = step >= min ? '1' : '0';\n    });\n    tut.querySelectorAll('.snote').forEach((n) => {\n      n.style.display = parseInt(n.dataset.step,10) === step ? 'block' : 'none';\n    });\n    const prev = tut.querySelector('.stut-prev');\n    const next = tut.querySelector('.stut-next');\n    if (prev) prev.style.opacity = step === 0 ? '.4' : '1';\n    if (next) next.style.opacity = step === max ? '.4' : '1';\n    const badge = tut.querySelector('.stut-badge');\n    if (badge) badge.textContent = 'Step ' + step + ' / ' + max;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
