document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ing:border-box;width:100%;height:100%;padding:96px 110px;display:flex;flex-direction:column;justify-content:space-between;font-family:Nunito,system-ui,sans-serif;background:#1F6FB2;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:center;font-size:26px;font-weight:600;letter-spacing:.04em;color:#BFE0F5;\">\n    <span>CAMBRIDGE IGCSE™ · MATHEMATICS 0580<\u002Fspan>\n    <span>EXTENDED · YEAR 11<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"display:flex;align-items:center;gap:70px;\">\n    <div style=\"flex:1;\">\n      <div style=\"font-size:34px;font-weight:600;color:#FFC23C;letter-spacing:.02em;margin-bottom:18px;\">Chapter 22<\u002Fdiv>\n      <h1 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:100px;line-height:1.02;letter-spacing:-.01em;\">More equations, formulae &amp; functions<\u002Fh1>\n      <p style=\"font-size:34px;font-weight:400;color:#DCEEF9;margin-top:34px;max-width:1080px;line-height:1.4;\">An interactive study deck — key words with pictures, memory drills, step-by-step builders for rearranging formulae &amp; inverse functions, every worked example, and exam-style practice you type answers into.<\u002Fp>\n    <\u002Fdiv>\n    <svg viewBox=\"0 0 300 300\" width=\"300\" height=\"300\" style=\"flex-shrink:0;opacity:.95;\">\n      <rect x=\"34\" y=\"120\" width=\"90\" height=\"60\" rx=\"8\" fill=\"none\" stroke=\"#FFC23C\" stroke-width=\"6\"><\u002Frect>\n      <text x=\"79\" y=\"162\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"34\" fill=\"#FFFDF6\" text-anchor=\"middle\">×4<\u002Ftext>\n      <rect x=\"176\" y=\"120\" width=\"90\" height=\"60\" rx=\"8\" fill=\"none\" stroke=\"#BFE0F5\" stroke-width=\"6\"><\u002Frect>\n      <text x=\"221\" y=\"162\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"34\" fill=\"#FFFDF6\" text-anchor=\"middle\">−1<\u002Ftext>\n      <line x1=\"124\" y1=\"150\" x2=\"176\" y2=\"150\" stroke=\"#FFFDF6\" stroke-width=\"5\"><\u002Fline>\n      <path d=\"M168,143 L178,150 L168,157 Z\" fill=\"#FFFDF6\"><\u002Fpath>\n      <text x=\"150\" y=\"235\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"40\" fill=\"#FFC23C\" text-anchor=\"middle\">f(x)<\u002Ftext>\n    <\u002Fsvg>\n  <\u002Fdiv>\n  <div style=\"font-size:24px;color:#9CC9E6;\">Tap the arrows or press → to move through the deck · click any “Reveal” box, or type into a quiz and press Check<\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"What you'll learn\" data-screen-label=\"Objectives\" data-speaker-notes=\"The chapter objectives from the syllabus: make your own equations to solve worded problems, construct and transform more complex formulae, use function notation to describe simple functions and their inverses, and form composite functions.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:84px 96px 76px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\">\n    <span style=\"width:52px;height:6px;background:#1F6FB2;border-radius:3px;\"><\u002Fspan>\n    <span style=\"font-size:26px;font-weight:700;letter-spacing:.14em;color:#1F6FB2;\">IN THIS CHAPTER YOU WILL<\u002Fspan>\n  <\u002Fdiv>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:56px;margin-bottom:34px;\">Four skills to master<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:26px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:34px 38px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\"><span style=\"font-family:Fredoka;font-weight:700;font-size:44px;color:#1F6FB2;line-height:1;\">1<\u002Fspan><div style=\"font-size:32px;font-weight:800;\">Set up equations<\u002Fdiv><p style=\"font-size:26px;color:#5A6B76;line-height:1.35;\">Turn a worded problem into an equation and solve it — including quadratic equations.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:20px;padding:34px 38px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\"><span style=\"font-family:Fredoka;font-weight:700;font-size:44px;color:#0F7A45;line-height:1;\">2<\u002Fspan><div style=\"font-size:32px;font-weight:800;\">Rearrange formulae<\u002Fdiv><p style=\"font-size:26px;color:#5A6B76;line-height:1.35;\">Change the subject of a formula, including squares, roots and repeated variables.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:20px;padding:34px 38px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\"><span style=\"font-family:Fredoka;font-weight:700;font-size:44px;color:#0EA5A8;line-height:1;\">3<\u002Fspan><div style=\"font-size:32px;font-weight:800;\">Use function notation<\u002Fdiv><p style=\"font-size:26px;color:#5A6B76;line-height:1.35;\">Read and evaluate f(x), find the domain and range, and find inverse functions.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:20px;padding:34px 38px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\"><span style=\"font-family:Fredoka;font-weight:700;font-size:44px;color:#C23A2B;line-height:1;\">4<\u002Fspan><div style=\"font-size:32px;font-weight:800;\">Composite functions<\u002Fdiv><p style=\"font-size:26px;color:#5A6B76;line-height:1.35;\">Combine two functions, feeding the output of one into the other, e.g. fg(x).<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"How to use this deck\" data-screen-label=\"Legend\" data-speaker-notes=\"Explain the five coloured labels. Reveal boxes, the type-your-answer quizzes and the step-by-step builders are the interactive parts.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:84px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\">\n    <span style=\"width:52px;height:6px;background:#1F6FB2;border-radius:3px;\"><\u002Fspan>\n    <span style=\"font-size:26px;font-weight:700;letter-spacing:.14em;color:#1F6FB2;\">LEGEND<\u002Fspan>\n  <\u002Fdiv>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:58px;margin-bottom:36px;\">Five kinds of slide<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;flex:1;\">\n    <div style=\"background:#fff;border-radius:18px;padding:30px 34px;display:flex;gap:24px;align-items:center;box-shadow:0 2px 16px rgba(22,55,95,.05);\"><span style=\"flex-shrink:0;background:#1F6FB2;color:#fff;font-weight:700;font-size:22px;letter-spacing:.06em;padding:10px 20px;border-radius:999px;\">KEY WORD<\u002Fspan><span style=\"font-size:29px;color:#5A6B76;\">A maths word explained simply, with a picture and an example.<\u002Fspan><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:18px;padding:30px 34px;display:flex;gap:24px;align-items:center;box-shadow:0 2px 16px rgba(22,55,95,.05);\"><span style=\"flex-shrink:0;background:#B0730C;color:#fff;font-weight:700;font-size:22px;letter-spacing:.06em;padding:10px 20px;border-radius:999px;\">DRILL<\u002Fspan><span style=\"font-size:29px;color:#5A6B76;\">A trick or step-list to help you remember a formula or method.<\u002Fspan><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:18px;padding:30px 34px;display:flex;gap:24px;align-items:center;box-shadow:0 2px 16px rgba(22,55,95,.05);\"><span style=\"flex-shrink:0;background:#0F7A45;color:#fff;font-weight:700;font-size:22px;letter-spacing:.06em;padding:10px 20px;border-radius:999px;\">WORKED EXAMPLE<\u002Fspan><span style=\"font-size:29px;color:#5A6B76;\">A full solution. Click <b>Reveal working<\u002Fb> to see each step.<\u002Fspan><\u002Fdiv>\n    <div style=\"background:#fff;border-radius:18px;padding:30px 34px;display:flex;gap:24px;align-items:center;box-shadow:0 2px 16px rgba(22,55,95,.05);\"><span style=\"flex-shrink:0;background:#0EA5A8;color:#fff;font-weight:700;font-size:22px;letter-spacing:.06em;padding:10px 20px;border-radius:999px;\">YOUR TURN<\u002Fspan><span style=\"font-size:29px;color:#5A6B76;\">Try it yourself, then reveal the answer to check.<\u002Fspan><\u002Fdiv>\n    <div style=\"grid-column:1 / -1;background:#FFEEEB;border:2px dashed #C23A2B;border-radius:18px;padding:26px 34px;display:flex;gap:24px;align-items:center;\"><span style=\"flex-shrink:0;background:#C23A2B;color:#fff;font-weight:700;font-size:22px;letter-spacing:.06em;padding:10px 20px;border-radius:999px;\">QUIZ · TYPE YOUR ANSWER<\u002Fspan><span style=\"font-size:29px;color:#8B4034;\"><b>Type<\u002Fb> your answer in the box and press <b>Check<\u002Fb> — the box turns green if you are right. There are also blue <b>step-by-step builders<\u002Fb> for rearranging a formula &amp; finding an inverse.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Part 1 · Key vocabulary\" data-screen-label=\"Divider: Vocabulary\" data-speaker-notes=\"Section divider. These key words are the language of the whole chapter. Each gets its own slide with a picture and an example.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#1F6FB2;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:90px;top:40px;font-family:Fredoka,system-ui,sans-serif;font-size:340px;line-height:1;color:rgba(255,194,60,.16);font-weight:600;\">01<\u002Fdiv>\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-size:26px;font-weight:600;letter-spacing:.16em;color:#FFC23C;margin-bottom:20px;\">PART 1<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:104px;line-height:1.02;margin-bottom:24px;\">Key vocabulary<\u002Fh2>\n    <p style=\"font-size:34px;color:#DCEEF9;max-width:1080px;line-height:1.4;\">The 12 words you need for this chapter, each explained in plain English with a picture and an example.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Equation\" data-screen-label=\"Vocab: Equation\" data-speaker-notes=\"An equation says two things are equal, and it contains an unknown letter. Solving means finding the value of the letter that makes both sides balance.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#1F6FB2;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">1 / 12 · Equations<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:82px;line-height:1;margin-bottom:10px;\">Equation<\u002Fh2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:28px;\">/ ee-KWAY-zhun / · noun<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#1F6FB2;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">A number sentence that says two things are <b>equal<\u002Fb> (it has an <b>= sign<\u002Fb>) and contains an <b>unknown letter<\u002Fb>. <b>Solving<\u002Fb> means finding the letter's value.<\u002Fp>\n      <div style=\"background:#E4F0F9;border-radius:16px;padding:24px 28px;font-size:30px;line-height:1.4;\"><span style=\"font-weight:700;color:#1F6FB2;\">Example&nbsp;&nbsp;<\u002Fspan><span class=\"mvar\">x<\u002Fspan> + 12 = 55 is an equation. Its solution is <span class=\"mvar\">x<\u002Fspan> = 43.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:40px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;flex-direction:column;justify-content:center;gap:26px;align-items:center;\">\n      <div style=\"font-size:24px;font-weight:700;color:#8A97A4;letter-spacing:.08em;\">THINK OF A BALANCE<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:22px;font-size:44px;font-weight:800;\"><span style=\"background:#E4F0F9;border-radius:14px;padding:16px 26px;\"><span class=\"mvar\">x<\u002Fspan> + 12<\u002Fspan><span style=\"color:#C23A2B;\">=<\u002Fspan><span style=\"background:#FDEBD0;border-radius:14px;padding:16px 26px;\">55<\u002Fspan><\u002Fdiv>\n      <svg viewBox=\"0 0 240 60\" width=\"240\" height=\"60\"><line x1=\"20\" y1=\"30\" x2=\"220\" y2=\"30\" stroke=\"#5A6B76\" stroke-width=\"4\"><\u002Fline><polygon points=\"120,10 140,45 100,45\" fill=\"#1F6FB2\"><\u002Fpolygon><\u002Fsvg>\n      <div style=\"font-size:25px;color:#8A97A4;text-align:center;line-height:1.4;\">Both sides must stay <b>balanced<\u002Fb>. Do the same to each side.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Variable\" data-screen-label=\"Vocab: Variable\" data-speaker-notes=\"A variable is a letter that stands for a number we do not know yet, or one that can change. Common ones are x, y and n.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#1F6FB2;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">2 / 12 · Equations<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:82px;line-height:1;margin-bottom:10px;\">Variable<\u002Fh2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:28px;\">/ VAIR-ee-uh-bul / · noun<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#1F6FB2;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">A <b>letter<\u002Fb> that stands for a number we do <b>not know yet<\u002Fb>, or a number that can <b>change<\u002Fb>. Common variables are <span class=\"mvar\">x<\u002Fspan>, <span class=\"mvar\">y<\u002Fspan> and <span class=\"mvar\">n<\u002Fspan>.<\u002Fp>\n      <div style=\"background:#E4F0F9;border-radius:16px;padding:24px 28px;font-size:30px;line-height:1.4;\"><span style=\"font-weight:700;color:#1F6FB2;\">Example&nbsp;&nbsp;<\u002Fspan>In 4<span class=\"mvar\">x<\u002Fspan> = 32, the variable <span class=\"mvar\">x<\u002Fspan> hides the number 8.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:40px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;flex-direction:column;justify-content:center;gap:22px;align-items:center;\">\n      <div style=\"font-size:24px;font-weight:700;color:#8A97A4;letter-spacing:.08em;\">A LETTER IS A HIDDEN NUMBER<\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:center;\"><span style=\"width:100px;height:100px;border-radius:18px;background:#1F6FB2;color:#fff;font-family:Georgia,serif;font-style:italic;font-size:56px;display:flex;align-items:center;justify-content:center;\">x<\u002Fspan><span style=\"font-size:44px;color:#5A6B76;\">=<\u002Fspan><span style=\"width:100px;height:100px;border-radius:18px;background:#FFC23C;color:#1F2933;font-weight:800;font-size:56px;display:flex;align-items:center;justify-content:center;\">8<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:25px;color:#8A97A4;text-align:center;line-height:1.4;\">The box <span class=\"mvar\">x<\u002Fspan> holds a number we must find.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Expression\" data-screen-label=\"Vocab: Expression\" data-speaker-notes=\"An expression is a group of numbers and letters joined by operations, but with NO equals sign. You cannot solve an expression, only simplify or evaluate it.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#1F6FB2;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">3 / 12 · Equations<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:78px;line-height:1;margin-bottom:10px;\">Expression<\u002Fh2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:28px;\">/ ik-SPRESH-un / · noun<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#1F6FB2;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">Numbers and letters joined by + − × ÷, but with <b>no = sign<\u002Fb>. You cannot <i>solve<\u002Fi> it — only <b>simplify<\u002Fb> or <b>evaluate<\u002Fb> it.<\u002Fp>\n      <div style=\"background:#E4F0F9;border-radius:16px;padding:24px 28px;font-size:30px;line-height:1.4;\"><span style=\"font-weight:700;color:#1F6FB2;\">Example&nbsp;&nbsp;<\u002Fspan>3<span class=\"mvar\">x<\u002Fspan> + 2 is an expression. 3<span class=\"mvar\">x<\u002Fspan> + 2 = 8 is an equation.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:40px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;flex-direction:column;justify-content:center;gap:22px;\">\n      <div style=\"display:flex;align-items:center;gap:18px;background:#EAF6EE;border-radius:14px;padding:20px 26px;\"><span style=\"font-size:26px;font-weight:800;color:#0F7A45;min-width:150px;\">EXPRESSION<\u002Fspan><span style=\"font-size:36px;font-weight:700;\">3<span class=\"mvar\">x<\u002Fspan> + 2<\u002Fspan><span style=\"margin-left:auto;font-size:24px;color:#0F7A45;\">no = sign<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:18px;background:#E4F0F9;border-radius:14px;padding:20px 26px;\"><span style=\"font-size:26px;font-weight:800;color:#1F6FB2;min-width:150px;\">EQUATION<\u002Fspan><span style=\"font-size:36px;font-weight:700;\">3<span class=\"mvar\">x<\u002Fspan> + 2 <span style=\"color:#C23A2B;\">=<\u002Fspan> 8<\u002Fspan><span style=\"margin-left:auto;font-size:24px;color:#1F6FB2;\">has = sign<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Formula\" data-screen-label=\"Vocab: Formula\" data-speaker-notes=\"A formula is a rule written with letters that shows how quantities are related. You put numbers in to work something out, for example area equals length times width.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#1F6FB2;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">4 / 12 · Formulae<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:82px;line-height:1;margin-bottom:10px;\">Formula<\u002Fh2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:28px;\">/ FOR-myuu-luh / · noun · plural: formulae<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#1F6FB2;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">A <b>rule written with letters<\u002Fb> that shows how quantities are related. You <b>put numbers in<\u002Fb> to work something out.<\u002Fp>\n      <div style=\"background:#E4F0F9;border-radius:16px;padding:24px 28px;font-size:30px;line-height:1.4;\"><span style=\"font-weight:700;color:#1F6FB2;\">Example&nbsp;&nbsp;<\u002Fspan><span class=\"mvar\">A<\u002Fspan> = <span class=\"mvar\">l<\u002Fspan> × <span class=\"mvar\">w<\u002Fspan> gives the area of a rectangle.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:40px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;flex-direction:column;justify-content:center;gap:24px;align-items:center;\">\n      <svg viewBox=\"0 0 260 150\" width=\"260\" height=\"150\"><rect x=\"20\" y=\"25\" width=\"220\" height=\"100\" fill=\"#E4F0F9\" stroke=\"#1F6FB2\" stroke-width=\"4\"><\u002Frect><text x=\"130\" y=\"18\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"26\" fill=\"#1F2933\" text-anchor=\"middle\">l<\u002Ftext><text x=\"252\" y=\"80\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"26\" fill=\"#1F2933\" text-anchor=\"middle\">w<\u002Ftext><text x=\"130\" y=\"88\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"30\" fill=\"#1F6FB2\" text-anchor=\"middle\">A = l × w<\u002Ftext><\u002Fsvg>\n      <div style=\"font-size:27px;font-weight:800;\">Put in <span class=\"mvar\">l<\u002Fspan> = 5, <span class=\"mvar\">w<\u002Fspan> = 3 → <span class=\"mvar\">A<\u002Fspan> = 15<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Subject of a formula\" data-screen-label=\"Vocab: Subject\" data-speaker-notes=\"The subject of a formula is the single letter alone on one side of the equals sign. Rearranging a formula means making a different letter the subject.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#1F6FB2;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">5 / 12 · Formulae<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:66px;line-height:1.05;margin-bottom:10px;\">Subject of a formula<\u002Fh2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:26px;\">/ SUB-jikt / · noun phrase<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#1F6FB2;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">The single letter that sits <b>alone on one side<\u002Fb> of the = sign. <b>Rearranging<\u002Fb> means making a <b>different<\u002Fb> letter the subject.<\u002Fp>\n      <div style=\"background:#E4F0F9;border-radius:16px;padding:24px 28px;font-size:30px;line-height:1.4;\"><span style=\"font-weight:700;color:#1F6FB2;\">Example&nbsp;&nbsp;<\u002Fspan>In <span class=\"mvar\">C<\u002Fspan> = π<span class=\"mvar\">d<\u002Fspan>, the subject is <span class=\"mvar\">C<\u002Fspan>. Rearranged: <span class=\"mvar\">d<\u002Fspan> = <span class=\"frac\"><span class=\"num\"><span class=\"mvar\">C<\u002Fspan><\u002Fspan><span class=\"den\">π<\u002Fspan><\u002Fspan>.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:40px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;flex-direction:column;justify-content:center;gap:26px;align-items:center;\">\n      <div style=\"font-size:52px;font-weight:800;\"><span style=\"background:#FDEBD0;border-radius:12px;padding:8px 20px;\"><span class=\"mvar\">C<\u002Fspan><\u002Fspan> = π<span class=\"mvar\">d<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:25px;color:#8A97A4;\">↓ make <span class=\"mvar\">d<\u002Fspan> the subject ↓<\u002Fdiv>\n      <div style=\"font-size:52px;font-weight:800;\"><span style=\"background:#FDEBD0;border-radius:12px;padding:8px 20px;\"><span class=\"mvar\">d<\u002Fspan><\u002Fspan> = <span class=\"frac\"><span class=\"num\"><span class=\"mvar\">C<\u002Fspan><\u002Fspan><span class=\"den\">π<\u002Fspan><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Quadratic equation\" data-screen-label=\"Vocab: Quadratic\" data-speaker-notes=\"A quadratic equation has a squared term, x squared, as its highest power. It usually has two solutions. We often solve it by factorising to zero.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#1F6FB2;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">6 / 12 · Equations<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:64px;line-height:1.05;margin-bottom:10px;\">Quadratic equation<\u002Fh2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:26px;\">/ kwod-RAT-ik / · noun phrase<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#1F6FB2;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">An equation whose highest power is a <b>squared<\u002Fb> term (<span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup>). It usually has <b>two solutions<\u002Fb>. Solve it by making one side <b>= 0<\u002Fb> and factorising.<\u002Fp>\n      <div style=\"background:#E4F0F9;border-radius:16px;padding:24px 28px;font-size:29px;line-height:1.4;\"><span style=\"font-weight:700;color:#1F6FB2;\">Example&nbsp;&nbsp;<\u002Fspan><span class=\"mvar\">n<\u002Fspan><sup>2<\u002Fsup> + <span class=\"mvar\">n<\u002Fspan> − 42 = 0 gives <span class=\"mvar\">n<\u002Fspan> = 6 or <span class=\"mvar\">n<\u002Fspan> = −7.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:40px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;flex-direction:column;justify-content:center;gap:20px;align-items:center;\">\n      <div style=\"font-size:24px;font-weight:700;color:#8A97A4;letter-spacing:.08em;\">THE SQUARED TERM IS THE CLUE<\u002Fdiv>\n      <div style=\"font-size:46px;font-weight:800;letter-spacing:.02em;\"><span style=\"color:#C23A2B;background:#FFEEEB;border-radius:10px;padding:4px 12px;\"><span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup><\u002Fspan> + <span class=\"mvar\">bx<\u002Fspan> + <span class=\"mvar\">c<\u002Fspan> = 0<\u002Fdiv>\n      <div style=\"display:flex;gap:16px;font-size:30px;font-weight:700;\"><span style=\"background:#EAF6EE;border-radius:10px;padding:8px 18px;color:#0F7A45;\">solution 1<\u002Fspan><span style=\"background:#EAF6EE;border-radius:10px;padding:8px 18px;color:#0F7A45;\">solution 2<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:24px;color:#8A97A4;text-align:center;\">Two brackets → two answers.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Function\" data-screen-label=\"Vocab: Function\" data-speaker-notes=\"A function is a rule that changes one input number into exactly one output number. Put a number in, get one number out. Like a machine.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#1F6FB2;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">7 / 12 · Functions<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:82px;line-height:1;margin-bottom:10px;\">Function<\u002Fh2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:28px;\">/ FUNK-shun / · noun<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#1F6FB2;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">A <b>rule<\u002Fb> that changes one <b>input<\u002Fb> number into exactly <b>one output<\u002Fb> number. Put a number in — get one number out, like a <b>machine<\u002Fb>.<\u002Fp>\n      <div style=\"background:#E4F0F9;border-radius:16px;padding:24px 28px;font-size:30px;line-height:1.4;\"><span style=\"font-weight:700;color:#1F6FB2;\">Example&nbsp;&nbsp;<\u002Fspan>“multiply by 4, then subtract 1”: input 3 → output 11.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:40px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;flex-direction:column;justify-content:center;gap:20px;align-items:center;\">\n      <div style=\"font-size:24px;font-weight:700;color:#8A97A4;letter-spacing:.08em;\">A FUNCTION MACHINE<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:14px;\">\n        <span style=\"width:70px;height:70px;border-radius:14px;background:#FFC23C;color:#1F2933;font-weight:800;font-size:34px;display:flex;align-items:center;justify-content:center;\">3<\u002Fspan>\n        <span style=\"font-size:30px;color:#5A6B76;\">→<\u002Fspan>\n        <span style=\"height:70px;border-radius:14px;background:#1F6FB2;color:#fff;font-weight:700;font-size:26px;display:flex;align-items:center;justify-content:center;padding:0 20px;\">×4 − 1<\u002Fspan>\n        <span style=\"font-size:30px;color:#5A6B76;\">→<\u002Fspan>\n        <span style=\"width:70px;height:70px;border-radius:14px;background:#0F7A45;color:#fff;font-weight:800;font-size:34px;display:flex;align-items:center;justify-content:center;\">11<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:24px;color:#8A97A4;text-align:center;\">One input gives exactly one output.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Function notation\" data-screen-label=\"Vocab: Function notation\" data-speaker-notes=\"Function notation writes f of x instead of y. f(5) means put 5 in place of x and work out the answer. It is a short way to name a rule.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#1F6FB2;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">8 / 12 · Functions<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:62px;line-height:1.05;margin-bottom:10px;\">Function notation<\u002Fh2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:26px;\">/ FUNK-shun no-TAY-shun / · noun phrase<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#1F6FB2;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">A short way of writing a rule: we write <b>f(<span class=\"mvar\">x<\u002Fspan>)<\u002Fb> instead of <span class=\"mvar\">y<\u002Fspan>. Then <b>f(5)<\u002Fb> means “put <b>5<\u002Fb> in place of <span class=\"mvar\">x<\u002Fspan>”.<\u002Fp>\n      <div style=\"background:#E4F0F9;border-radius:16px;padding:24px 28px;font-size:29px;line-height:1.4;\"><span style=\"font-weight:700;color:#1F6FB2;\">Example&nbsp;&nbsp;<\u002Fspan>f(<span class=\"mvar\">x<\u002Fspan>) = 4<span class=\"mvar\">x<\u002Fspan> − 1, so f(5) = 4×5 − 1 = 19.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:36px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;flex-direction:column;justify-content:center;gap:16px;align-items:center;\">\n      <div style=\"font-size:56px;font-weight:800;\"><span style=\"color:#1F6FB2;\">f(<\u002Fspan><span style=\"color:#C23A2B;background:#FFEEEB;border-radius:8px;padding:2px 10px;\"><span class=\"mvar\">x<\u002Fspan><\u002Fspan><span style=\"color:#1F6FB2;\">)<\u002Fspan> = 4<span class=\"mvar\">x<\u002Fspan> − 1<\u002Fdiv>\n      <div style=\"font-size:24px;color:#8A97A4;\">↓ replace <span class=\"mvar\">x<\u002Fspan> with 5 ↓<\u002Fdiv>\n      <div style=\"font-size:44px;font-weight:800;\">f(<span style=\"color:#C23A2B;\">5<\u002Fspan>) = 4×<span style=\"color:#C23A2B;\">5<\u002Fspan> − 1 = <span style=\"color:#0F7A45;\">19<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Domain\" data-screen-label=\"Vocab: Domain\" data-speaker-notes=\"The domain of a function is the set of allowed input values, the x-values you are allowed to put in.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#1F6FB2;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">9 / 12 · Functions<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:82px;line-height:1;margin-bottom:10px;\">Domain<\u002Fh2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:28px;\">/ doh-MAYN / · noun<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#1F6FB2;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">The set of <b>input values<\u002Fb> you are <b>allowed to put in<\u002Fb> — the <span class=\"mvar\">x<\u002Fspan>-values. (Think: the letter <b>d<\u002Fb> for <b>d<\u002Fb>omain and <b>d<\u002Fb>ata going <b>in<\u002Fb>.)<\u002Fp>\n      <div style=\"background:#E4F0F9;border-radius:16px;padding:24px 28px;font-size:29px;line-height:1.4;\"><span style=\"font-weight:700;color:#1F6FB2;\">Example&nbsp;&nbsp;<\u002Fspan>For <span class=\"mvar\">y<\u002Fspan> = <span class=\"rt\">√<span style=\"border-top:2.5px solid;\">2<span class=\"mvar\">x<\u002Fspan>−1<\u002Fspan><\u002Fspan>, the domain is <span class=\"mvar\">x<\u002Fspan> ≥ <span class=\"frac\"><span class=\"num\">1<\u002Fspan><span class=\"den\">2<\u002Fspan><\u002Fspan>.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:40px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;flex-direction:column;justify-content:center;gap:22px;align-items:center;\">\n      <div style=\"display:flex;align-items:center;gap:18px;\"><span style=\"background:#E4F0F9;color:#1F6FB2;font-weight:800;font-size:28px;border-radius:12px;padding:14px 22px;\">INPUT<br><span style=\"font-size:22px;\">domain<\u002Fspan><\u002Fspan><span style=\"font-size:30px;color:#5A6B76;\">→<\u002Fspan><span style=\"height:74px;border-radius:12px;background:#1F6FB2;color:#fff;font-weight:700;font-size:26px;display:flex;align-items:center;padding:0 20px;\">f<\u002Fspan><span style=\"font-size:30px;color:#5A6B76;\">→<\u002Fspan><span style=\"background:#EAF6EE;color:#0F7A45;font-weight:800;font-size:28px;border-radius:12px;padding:14px 22px;\">OUTPUT<br><span style=\"font-size:22px;\">range<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:25px;color:#8A97A4;text-align:center;\">Domain = what goes <b>in<\u002Fb>.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Range\" data-screen-label=\"Vocab: Range\" data-speaker-notes=\"The range of a function is the set of output values that come out, the possible y-values.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#1F6FB2;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">10 / 12 · Functions<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:82px;line-height:1;margin-bottom:10px;\">Range<\u002Fh2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:28px;\">/ RAYNJ / · noun<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#1F6FB2;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">The set of <b>output values<\u002Fb> that come <b>out<\u002Fb> of the rule — the possible <span class=\"mvar\">y<\u002Fspan>-values.<\u002Fp>\n      <div style=\"background:#E4F0F9;border-radius:16px;padding:24px 28px;font-size:29px;line-height:1.4;\"><span style=\"font-weight:700;color:#1F6FB2;\">Example&nbsp;&nbsp;<\u002Fspan>A square root only gives 0 or more, so its range is <span class=\"mvar\">y<\u002Fspan> ≥ 0.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:40px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;flex-direction:column;justify-content:center;gap:22px;align-items:center;\">\n      <div style=\"font-size:24px;font-weight:700;color:#8A97A4;letter-spacing:.08em;\">OUTPUTS THAT CAN COME OUT<\u002Fdiv>\n      <svg viewBox=\"0 0 260 150\" width=\"260\" height=\"150\"><line x1=\"30\" y1=\"120\" x2=\"240\" y2=\"120\" stroke=\"#5A6B76\" stroke-width=\"3\"><\u002Fline><line x1=\"40\" y1=\"20\" x2=\"40\" y2=\"130\" stroke=\"#5A6B76\" stroke-width=\"3\"><\u002Fline><path d=\"M40,120 Q120,20 230,20\" fill=\"none\" stroke=\"#1F6FB2\" stroke-width=\"5\"><\u002Fpath><line x1=\"40\" y1=\"120\" x2=\"40\" y2=\"120\" stroke=\"#0F7A45\" stroke-width=\"6\"><\u002Fline><rect x=\"30\" y=\"20\" width=\"10\" height=\"100\" fill=\"rgba(15,122,69,.18)\"><\u002Frect><text x=\"20\" y=\"70\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"22\" fill=\"#0F7A45\" text-anchor=\"middle\">y<\u002Ftext><\u002Fsvg>\n      <div style=\"font-size:25px;color:#8A97A4;text-align:center;\">Range = what comes <b>out<\u002Fb> (the green <span class=\"mvar\">y<\u002Fspan> values).<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Composite function\" data-screen-label=\"Vocab: Composite\" data-speaker-notes=\"A composite function combines two functions. fg(x) means do g first, then put that answer into f. Work from the inside out.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#1F6FB2;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">11 / 12 · Functions<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:60px;line-height:1.05;margin-bottom:10px;\">Composite function<\u002Fh2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:26px;\">/ KOM-puh-zit / · noun phrase<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#1F6FB2;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\"><b>Two functions joined together.<\u002Fb> <b>fg(<span class=\"mvar\">x<\u002Fspan>)<\u002Fb> means do <b>g first<\u002Fb>, then put that answer into <b>f<\u002Fb>. Work from the <b>inside out<\u002Fb>.<\u002Fp>\n      <div style=\"background:#E4F0F9;border-radius:16px;padding:24px 28px;font-size:29px;line-height:1.4;\"><span style=\"font-weight:700;color:#1F6FB2;\">Example&nbsp;&nbsp;<\u002Fspan>fg(<span class=\"mvar\">x<\u002Fspan>): the output of g becomes the input of f.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:40px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;flex-direction:column;justify-content:center;gap:20px;align-items:center;\">\n      <div style=\"font-size:24px;font-weight:700;color:#8A97A4;letter-spacing:.08em;\">fg(x) — INSIDE FIRST<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:64px;height:64px;border-radius:14px;background:#FFC23C;color:#1F2933;font-weight:800;font-size:28px;display:flex;align-items:center;justify-content:center;\">x<\u002Fspan><span style=\"font-size:26px;color:#5A6B76;\">→<\u002Fspan><span style=\"height:64px;border-radius:14px;background:#0EA5A8;color:#fff;font-weight:700;font-size:30px;display:flex;align-items:center;padding:0 20px;\">g<\u002Fspan><span style=\"font-size:26px;color:#5A6B76;\">→<\u002Fspan><span style=\"height:64px;border-radius:14px;background:#1F6FB2;color:#fff;font-weight:700;font-size:30px;display:flex;align-items:center;padding:0 20px;\">f<\u002Fspan><span style=\"font-size:26px;color:#5A6B76;\">→<\u002Fspan><span style=\"width:80px;height:64px;border-radius:14px;background:#0F7A45;color:#fff;font-weight:800;font-size:22px;display:flex;align-items:center;justify-content:center;\">fg(x)<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:24px;color:#8A97A4;text-align:center;\">The letter <b>nearest x<\u002Fb> (g) acts first.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Word: Inverse function\" data-screen-label=\"Vocab: Inverse\" data-speaker-notes=\"The inverse function undoes a function. If f maps 4 onto 13, the inverse maps 13 back onto 4. It is written f to the power minus one.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#1F6FB2;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">12 / 12 · Functions<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:66px;line-height:1.05;margin-bottom:10px;\">Inverse function<\u002Fh2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:26px;\">/ IN-verss / · noun phrase<\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#1F6FB2;margin-bottom:10px;\">IN SIMPLE WORDS<\u002Fdiv>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">The function that <b>undoes<\u002Fb> another one. If f turns 4 into 13, then <b>f<sup>−1<\u002Fsup><\u002Fb> turns 13 <b>back<\u002Fb> into 4.<\u002Fp>\n      <div style=\"background:#E4F0F9;border-radius:16px;padding:24px 28px;font-size:29px;line-height:1.4;\"><span style=\"font-weight:700;color:#1F6FB2;\">Example&nbsp;&nbsp;<\u002Fspan>If f(<span class=\"mvar\">x<\u002Fspan>) = <span class=\"mvar\">x<\u002Fspan> + 5, then f<sup>−1<\u002Fsup>(<span class=\"mvar\">x<\u002Fspan>) = <span class=\"mvar\">x<\u002Fspan> − 5.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:22px;padding:40px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;flex-direction:column;justify-content:center;gap:22px;align-items:center;\">\n      <div style=\"display:flex;align-items:center;gap:16px;\"><span style=\"width:78px;height:78px;border-radius:50%;background:#FFC23C;color:#1F2933;font-weight:800;font-size:32px;display:flex;align-items:center;justify-content:center;\">4<\u002Fspan><div style=\"display:flex;flex-direction:column;align-items:center;\"><span style=\"font-size:22px;color:#1F6FB2;font-weight:700;\">f →<\u002Fspan><span style=\"font-size:22px;color:#C23A2B;font-weight:700;\">← f<sup>−1<\u002Fsup><\u002Fspan><\u002Fdiv><span style=\"width:78px;height:78px;border-radius:50%;background:#0F7A45;color:#fff;font-weight:800;font-size:32px;display:flex;align-items:center;justify-content:center;\">13<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:25px;color:#8A97A4;text-align:center;line-height:1.4;\">f goes forwards; <b>f<sup>−1<\u002Fsup><\u002Fb> goes <b>backwards<\u002Fb>.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"22.1 · Setting up equations\" data-screen-label=\"Divider: 22.1\" data-speaker-notes=\"Section divider for 22.1. You will learn to read a worded problem, choose a letter, and build an equation you can solve.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#1F6FB2;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:90px;top:40px;font-family:Fredoka,system-ui,sans-serif;font-size:340px;line-height:1;color:rgba(255,194,60,.16);font-weight:600;\">02<\u002Fdiv>\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-size:26px;font-weight:600;letter-spacing:.16em;color:#FFC23C;margin-bottom:20px;\">SECTION 22.1<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:96px;line-height:1.02;margin-bottom:24px;\">Setting up equations<\u002Fh2>\n    <p style=\"font-size:34px;color:#DCEEF9;max-width:1120px;line-height:1.4;\">Read the words, choose a letter for the unknown, build an equation — then solve it. This is the heart of every worded problem.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Drill: Form an equation\" data-screen-label=\"Drill: 4 steps\" data-speaker-notes=\"Memory drill: the four steps for turning a word problem into an equation. READ, LET, BUILD, SOLVE.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#B0730C;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">DRILL<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Turning words into an equation<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:58px;margin-bottom:14px;\">Four steps: <span style=\"color:#B0730C;\">READ · LET · BUILD · SOLVE<\u002Fspan><\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:22px;flex:1;\">\n    <div style=\"background:#FFF6E6;border-radius:20px;padding:30px;border-top:6px solid #B0730C;display:flex;flex-direction:column;gap:12px;\"><span style=\"font-family:Fredoka;font-weight:700;font-size:40px;color:#B0730C;\">READ<\u002Fspan><p style=\"font-size:27px;line-height:1.4;\">Read carefully. Note every number and what it describes.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#FFF6E6;border-radius:20px;padding:30px;border-top:6px solid #B0730C;display:flex;flex-direction:column;gap:12px;\"><span style=\"font-family:Fredoka;font-weight:700;font-size:40px;color:#B0730C;\">LET<\u002Fspan><p style=\"font-size:27px;line-height:1.4;\">Let a letter (usually <span class=\"mvar\">x<\u002Fspan>) stand for the thing you must find.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#FFF6E6;border-radius:20px;padding:30px;border-top:6px solid #B0730C;display:flex;flex-direction:column;gap:12px;\"><span style=\"font-family:Fredoka;font-weight:700;font-size:40px;color:#B0730C;\">BUILD<\u002Fspan><p style=\"font-size:27px;line-height:1.4;\">Write the other amounts in terms of <span class=\"mvar\">x<\u002Fspan>, then form an equation.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#EAF6EE;border-radius:20px;padding:30px;border-top:6px solid #0F7A45;display:flex;flex-direction:column;gap:12px;\"><span style=\"font-family:Fredoka;font-weight:700;font-size:40px;color:#0F7A45;\">SOLVE<\u002Fspan><p style=\"font-size:27px;line-height:1.4;\">Solve for <span class=\"mvar\">x<\u002Fspan>, then answer the actual question in words.<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:22px;background:#E4F0F9;border-radius:14px;padding:20px 28px;font-size:26px;color:#1F6FB2;\"><b>Tip&nbsp;<\u002Fb> A quick sketch or bar model often makes the equation obvious.<\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Worked example 1\" data-screen-label=\"WE1 ages\" data-speaker-notes=\"Worked example 1. My mother was 26 when I was born. Now she is three times as old as me. Let my age be x, so mother is 3x. The age gap is always 26, so 3x minus x equals 26, giving 2x equals 26 and x equals 13. I am 13, mother is 39.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:60px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 1<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Age problem<\u002Fspan><\u002Fdiv>\n  <div style=\"background:#fff;border-radius:18px;padding:24px 34px;box-shadow:0 3px 20px rgba(22,55,95,.06);border-left:6px solid #0F7A45;margin-bottom:22px;\"><p style=\"font-size:30px;line-height:1.45;\">My mother was <b>26 years old<\u002Fb> when I was born. Now she is <b>three times<\u002Fb> as old as I am. What are our ages now?<\u002Fp><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1.1fr .9fr;gap:40px;flex:1;\">\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"font-size:25px;font-weight:800;letter-spacing:.08em;color:#0F7A45;\">SET IT UP<\u002Fdiv>\n      <p style=\"font-size:29px;line-height:1.5;\">Let my age now be <span class=\"mvar\">x<\u002Fspan>.<br>∴ my mother's age now is <b>3<span class=\"mvar\">x<\u002Fspan><\u002Fb> &nbsp;<span style=\"color:#8A97A4;font-size:24px;\">(she is 3× as old)<\u002Fspan><\u002Fp>\n      <p style=\"font-size:29px;line-height:1.5;\">The age gap is always 26 years, so:<\u002Fp>\n      <details class=\"rvtoggle\" style=\"margin-top:6px;\"><summary style=\"background:#EAF6EE;border:2px solid #0F7A45;border-radius:14px;padding:18px 26px;font-size:27px;font-weight:800;color:#0F7A45;display:inline-flex;align-items:center;gap:12px;\"><span style=\"font-size:22px;\">▶<\u002Fspan><span class=\"rv-shut\">Reveal working<\u002Fspan><span class=\"rv-open\">Working ↓<\u002Fspan><\u002Fsummary>\n        <div style=\"margin-top:16px;background:#fff;border:1px solid #D7E7DD;border-radius:14px;padding:24px 30px;font-size:30px;line-height:1.9;\">\n          3<span class=\"mvar\">x<\u002Fspan> − <span class=\"mvar\">x<\u002Fspan> = 26<br>\n          ∴ 2<span class=\"mvar\">x<\u002Fspan> = 26<br>\n          ∴ <span class=\"mvar\">x<\u002Fspan> = <b>13<\u002Fb>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n    <div style=\"background:#EAF6EE;border-radius:20px;padding:34px;display:flex;flex-direction:column;justify-content:center;gap:20px;align-items:center;\">\n      <div style=\"font-size:24px;font-weight:800;color:#0F7A45;letter-spacing:.06em;\">ANSWER<\u002Fdiv>\n      <div style=\"display:flex;gap:26px;\">\n        <div style=\"text-align:center;\"><div style=\"width:110px;height:110px;border-radius:50%;background:#1F6FB2;color:#fff;font-weight:800;font-size:44px;display:flex;align-items:center;justify-content:center;\">13<\u002Fdiv><div style=\"margin-top:10px;font-size:24px;font-weight:700;\">Me<\u002Fdiv><\u002Fdiv>\n        <div style=\"text-align:center;\"><div style=\"width:110px;height:110px;border-radius:50%;background:#C23A2B;color:#fff;font-weight:800;font-size:44px;display:flex;align-items:center;justify-content:center;\">39<\u002Fdiv><div style=\"margin-top:10px;font-size:24px;font-weight:700;\">Mother<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:25px;color:#5A6B76;text-align:center;\">39 = 3 × 13 ✓ and 39 − 13 = 26 ✓<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Worked example 2\" data-screen-label=\"WE2 parallelogram\" data-speaker-notes=\"Worked example 2. The long sides of a parallelogram are five times the short sides. Perimeter is 9.6 m. Let short side be x, long side 5x. Perimeter 5x plus x plus 5x plus x equals 12x equals 9.6, so x equals 0.8 m and the long side is 4 m.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:60px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 2<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Perimeter · draw a sketch<\u002Fspan><\u002Fdiv>\n  <div style=\"background:#fff;border-radius:18px;padding:22px 34px;box-shadow:0 3px 20px rgba(22,55,95,.06);border-left:6px solid #0F7A45;margin-bottom:20px;\"><p style=\"font-size:29px;line-height:1.4;\">The longest sides of a parallelogram are <b>five times<\u002Fb> longer than its shorter sides. If it has a <b>perimeter of 9.6 m<\u002Fb>, what are the lengths of the long and short sides?<\u002Fp><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:.95fr 1.05fr;gap:40px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:30px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;flex-direction:column;justify-content:center;gap:18px;align-items:center;\">\n      <div style=\"font-size:24px;font-weight:800;color:#8A97A4;letter-spacing:.06em;\">SKETCH IT<\u002Fdiv>\n      <svg viewBox=\"0 0 320 150\" width=\"320\" height=\"150\"><polygon points=\"70,120 250,120 260,40 90,40\" fill=\"#E4F0F9\" stroke=\"#1F6FB2\" stroke-width=\"4\"><\u002Fpolygon><text x=\"175\" y=\"138\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"26\" fill=\"#1F2933\" text-anchor=\"middle\">5x<\u002Ftext><text x=\"175\" y=\"32\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"26\" fill=\"#1F2933\" text-anchor=\"middle\">5x<\u002Ftext><text x=\"58\" y=\"85\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"26\" fill=\"#1F2933\" text-anchor=\"middle\">x<\u002Ftext><text x=\"268\" y=\"85\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"26\" fill=\"#1F2933\" text-anchor=\"middle\">x<\u002Ftext><\u002Fsvg>\n      <div style=\"font-size:26px;line-height:1.4;text-align:center;\">Short side = <span class=\"mvar\">x<\u002Fspan>, long side = 5<span class=\"mvar\">x<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:14px;justify-content:center;\">\n      <div style=\"font-size:25px;font-weight:800;letter-spacing:.08em;color:#0F7A45;\">SOLVE<\u002Fdiv>\n      <p style=\"font-size:28px;line-height:1.5;\">Perimeter = sum of all four sides:<\u002Fp>\n      <details class=\"rvtoggle\"><summary style=\"background:#EAF6EE;border:2px solid #0F7A45;border-radius:14px;padding:16px 26px;font-size:26px;font-weight:800;color:#0F7A45;display:inline-flex;align-items:center;gap:12px;\"><span style=\"font-size:20px;\">▶<\u002Fspan><span class=\"rv-shut\">Reveal working<\u002Fspan><span class=\"rv-open\">Working ↓<\u002Fspan><\u002Fsummary>\n        <div style=\"margin-top:14px;background:#fff;border:1px solid #D7E7DD;border-radius:14px;padding:22px 28px;font-size:28px;line-height:1.8;\">\n          5<span class=\"mvar\">x<\u002Fspan> + <span class=\"mvar\">x<\u002Fspan> + 5<span class=\"mvar\">x<\u002Fspan> + <span class=\"mvar\">x<\u002Fspan> = 9.6<br>\n          ∴ 12<span class=\"mvar\">x<\u002Fspan> = 9.6<br>\n          ∴ <span class=\"mvar\">x<\u002Fspan> = <span class=\"frac\"><span class=\"num\">9.6<\u002Fspan><span class=\"den\">12<\u002Fspan><\u002Fspan> = <b>0.8 m<\u002Fb><br>\n          <span style=\"color:#0F7A45;\">Short = 0.8 m, &nbsp;Long = 5 × 0.8 = 4 m<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Your turn: worded equations\" data-screen-label=\"YT worded equations\" data-speaker-notes=\"Your turn. Three worded problems from Exercise 22.2. Students form an equation and solve. Answers hidden under reveal boxes.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:60px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\"><span style=\"white-space:nowrap;background:#0EA5A8;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">YOUR TURN<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Exercise 22.2 · form an equation and solve<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;flex:1;\">\n    <div style=\"background:#fff;border-radius:18px;padding:28px 30px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#0EA5A8;\">Q1<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.4;\">Jess and Silvia have <b>420 marbles<\u002Fb> between them. Jess has <b>five times<\u002Fb> as many as Silvia. How many does each have?<\u002Fp>\n      <details class=\"rvtoggle\" style=\"margin-top:auto;\"><summary style=\"background:#E6F6F6;border:2px solid #0EA5A8;border-radius:12px;padding:14px 20px;font-size:24px;font-weight:800;color:#0B7E80;display:inline-flex;gap:10px;align-items:center;\"><span style=\"font-size:18px;\">▶<\u002Fspan><span class=\"rv-shut\">Reveal answer<\u002Fspan><span class=\"rv-open\">Answer ↓<\u002Fspan><\u002Fsummary><div style=\"margin-top:12px;font-size:25px;line-height:1.6;background:#F5FBFB;border-radius:12px;padding:16px 20px;\"><span class=\"mvar\">x<\u002Fspan> + 5<span class=\"mvar\">x<\u002Fspan> = 420 → 6<span class=\"mvar\">x<\u002Fspan> = 420<br><b>Silvia 70, Jess 350<\u002Fb><\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:18px;padding:28px 30px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#0EA5A8;\">Q2<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.4;\">A rectangle with <b>perimeter 74 cm<\u002Fb> is <b>7 cm longer<\u002Fb> than it is wide. What is the length of each side?<\u002Fp>\n      <details class=\"rvtoggle\" style=\"margin-top:auto;\"><summary style=\"background:#E6F6F6;border:2px solid #0EA5A8;border-radius:12px;padding:14px 20px;font-size:24px;font-weight:800;color:#0B7E80;display:inline-flex;gap:10px;align-items:center;\"><span style=\"font-size:18px;\">▶<\u002Fspan><span class=\"rv-shut\">Reveal answer<\u002Fspan><span class=\"rv-open\">Answer ↓<\u002Fspan><\u002Fsummary><div style=\"margin-top:12px;font-size:25px;line-height:1.6;background:#F5FBFB;border-radius:12px;padding:16px 20px;\">2(<span class=\"mvar\">w<\u002Fspan> + <span class=\"mvar\">w<\u002Fspan>+7) = 74 → 4<span class=\"mvar\">w<\u002Fspan>+14 = 74<br><b>width 15 cm, length 22 cm<\u002Fb><\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:18px;padding:28px 30px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#0EA5A8;\">Q3<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.4;\">Amira is <b>twice<\u002Fb> as old as Pam. <b>Nine years ago<\u002Fb>, their combined age was <b>18<\u002Fb>. What are their present ages?<\u002Fp>\n      <details class=\"rvtoggle\" style=\"margin-top:auto;\"><summary style=\"background:#E6F6F6;border:2px solid #0EA5A8;border-radius:12px;padding:14px 20px;font-size:24px;font-weight:800;color:#0B7E80;display:inline-flex;gap:10px;align-items:center;\"><span style=\"font-size:18px;\">▶<\u002Fspan><span class=\"rv-shut\">Reveal answer<\u002Fspan><span class=\"rv-open\">Answer ↓<\u002Fspan><\u002Fsummary><div style=\"margin-top:12px;font-size:25px;line-height:1.6;background:#F5FBFB;border-radius:12px;padding:16px 20px;\">(2<span class=\"mvar\">x<\u002Fspan>−9)+(<span class=\"mvar\">x<\u002Fspan>−9)=18 → 3<span class=\"mvar\">x<\u002Fspan>=36<br><b>Pam 12, Amira 24<\u002Fb><\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Deriving quadratic equations\" data-screen-label=\"Quadratics concept\" data-speaker-notes=\"Some worded problems, especially about products or areas, lead to a quadratic equation. Collect everything on one side to equal zero, factorise, then read off the two solutions. Reject any answer that does not fit the context, like a negative length.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"width:52px;height:6px;background:#1F6FB2;border-radius:3px;\"><\u002Fspan><span style=\"font-size:26px;font-weight:700;letter-spacing:.14em;color:#1F6FB2;\">CONCEPT<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:56px;margin-bottom:26px;\">Deriving quadratic equations<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1.05fr .95fr;gap:44px;flex:1;align-items:center;\">\n    <div style=\"display:flex;flex-direction:column;gap:20px;\">\n      <p style=\"font-size:30px;line-height:1.5;\">Problems about a <b>product<\u002Fb> of two numbers or an <b>area<\u002Fb> often give a <b>quadratic<\u002Fb> equation. To solve:<\u002Fp>\n      <div style=\"display:flex;gap:16px;align-items:flex-start;\"><span style=\"flex-shrink:0;width:40px;height:40px;border-radius:50%;background:#1F6FB2;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:22px;\">1<\u002Fspan><p style=\"font-size:28px;line-height:1.4;\">Collect every term on <b>one side<\u002Fb> so the other side is <b>0<\u002Fb>.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;gap:16px;align-items:flex-start;\"><span style=\"flex-shrink:0;width:40px;height:40px;border-radius:50%;background:#1F6FB2;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:22px;\">2<\u002Fspan><p style=\"font-size:28px;line-height:1.4;\"><b>Factorise<\u002Fb> into two brackets.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;gap:16px;align-items:flex-start;\"><span style=\"flex-shrink:0;width:40px;height:40px;border-radius:50%;background:#1F6FB2;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:22px;\">3<\u002Fspan><p style=\"font-size:28px;line-height:1.4;\">Each bracket = 0 gives a solution. <b>Reject<\u002Fb> any that doesn't fit (e.g. a negative length).<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#E4F0F9;border-radius:20px;padding:36px;display:flex;flex-direction:column;gap:16px;font-size:30px;line-height:1.7;\">\n      <div style=\"font-size:23px;font-weight:800;color:#1F6FB2;letter-spacing:.06em;\">THE PATTERN<\u002Fdiv>\n      <div><span class=\"mvar\">n<\u002Fspan>(<span class=\"mvar\">n<\u002Fspan> + 1) = 42<\u002Fdiv>\n      <div>⇒ <span class=\"mvar\">n<\u002Fspan><sup>2<\u002Fsup> + <span class=\"mvar\">n<\u002Fspan> − 42 = 0 &nbsp;<span style=\"color:#8A97A4;font-size:24px;\">(= 0)<\u002Fspan><\u002Fdiv>\n      <div>⇒ (<span class=\"mvar\">n<\u002Fspan> + 7)(<span class=\"mvar\">n<\u002Fspan> − 6) = 0 &nbsp;<span style=\"color:#8A97A4;font-size:24px;\">(factorise)<\u002Fspan><\u002Fdiv>\n      <div>⇒ <span class=\"mvar\">n<\u002Fspan> = −7 &nbsp;<b>or<\u002Fb>&nbsp; <span class=\"mvar\">n<\u002Fspan> = 6<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Worked example 3\" data-screen-label=\"WE3 consecutive\" data-speaker-notes=\"Worked example 3. The product of two consecutive integers is 42. Let the smaller be n, the larger n plus 1. n times n plus 1 equals 42 gives n squared plus n minus 42 equals 0, which factorises to n plus 7 times n minus 6. So n is minus 7 or 6. The pairs are 6 and 7, and minus 7 and minus 6.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:60px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 3<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Consecutive integers<\u002Fspan><\u002Fdiv>\n  <div style=\"background:#fff;border-radius:18px;padding:22px 34px;box-shadow:0 3px 20px rgba(22,55,95,.06);border-left:6px solid #0F7A45;margin-bottom:20px;\"><p style=\"font-size:29px;line-height:1.4;\">The <b>product of two consecutive integers is 42<\u002Fb>. Form and solve a quadratic equation to find <b>both<\u002Fb> possible pairs of integers.<\u002Fp><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:40px;flex:1;\">\n    <div style=\"display:flex;flex-direction:column;gap:14px;justify-content:center;\">\n      <div style=\"font-size:25px;font-weight:800;letter-spacing:.08em;color:#0F7A45;\">SET IT UP<\u002Fdiv>\n      <p style=\"font-size:28px;line-height:1.5;\">Let the smaller number be <span class=\"mvar\">n<\u002Fspan>. Then the larger is <span class=\"mvar\">n<\u002Fspan> + 1.<br>Their product is 42, so:<\u002Fp>\n      <details class=\"rvtoggle\"><summary style=\"background:#EAF6EE;border:2px solid #0F7A45;border-radius:14px;padding:16px 26px;font-size:26px;font-weight:800;color:#0F7A45;display:inline-flex;align-items:center;gap:12px;\"><span style=\"font-size:20px;\">▶<\u002Fspan><span class=\"rv-shut\">Reveal working<\u002Fspan><span class=\"rv-open\">Working ↓<\u002Fspan><\u002Fsummary>\n        <div style=\"margin-top:14px;background:#fff;border:1px solid #D7E7DD;border-radius:14px;padding:22px 28px;font-size:27px;line-height:1.75;\">\n          <span class=\"mvar\">n<\u002Fspan>(<span class=\"mvar\">n<\u002Fspan> + 1) = 42<br>\n          ⇒ <span class=\"mvar\">n<\u002Fspan><sup>2<\u002Fsup> + <span class=\"mvar\">n<\u002Fspan> − 42 = 0<br>\n          ⇒ (<span class=\"mvar\">n<\u002Fspan> + 7)(<span class=\"mvar\">n<\u002Fspan> − 6) = 0<br>\n          ⇒ <span class=\"mvar\">n<\u002Fspan> = −7 &nbsp;or&nbsp; <span class=\"mvar\">n<\u002Fspan> = 6\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n    <div style=\"background:#EAF6EE;border-radius:20px;padding:34px;display:flex;flex-direction:column;justify-content:center;gap:22px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#0F7A45;letter-spacing:.06em;\">THE TWO PAIRS<\u002Fdiv>\n      <div style=\"display:flex;gap:16px;align-items:center;\"><span style=\"background:#fff;border-radius:12px;padding:14px 24px;font-size:34px;font-weight:800;\">6<\u002Fspan><span style=\"font-size:28px;\">and<\u002Fspan><span style=\"background:#fff;border-radius:12px;padding:14px 24px;font-size:34px;font-weight:800;\">7<\u002Fspan><span style=\"font-size:24px;color:#5A6B76;\">6×7 = 42 ✓<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:16px;align-items:center;\"><span style=\"background:#fff;border-radius:12px;padding:14px 24px;font-size:34px;font-weight:800;\">−7<\u002Fspan><span style=\"font-size:28px;\">and<\u002Fspan><span style=\"background:#fff;border-radius:12px;padding:14px 24px;font-size:34px;font-weight:800;\">−6<\u002Fspan><span style=\"font-size:24px;color:#5A6B76;\">−7×−6 = 42 ✓<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Worked example 4\" data-screen-label=\"WE4 rectangle\" data-speaker-note
