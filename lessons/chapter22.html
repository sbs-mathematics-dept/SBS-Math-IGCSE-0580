s=\"Worked example 4. A rectangle's length is 2 cm more than its width, area 15 cm squared. Let width be x, length x plus 2. x times x plus 2 equals 15 gives x squared plus 2x minus 15 equals 0, factorising to x plus 5 times x minus 3. x is minus 5 or 3, but width cannot be negative, so x equals 3. Sides 3 and 5, perimeter 16 cm.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:60px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 4<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Area · reject the negative root<\u002Fspan><\u002Fdiv>\n  <div style=\"background:#fff;border-radius:18px;padding:22px 34px;box-shadow:0 3px 20px rgba(22,55,95,.06);border-left:6px solid #0F7A45;margin-bottom:18px;\"><p style=\"font-size:28px;line-height:1.4;\">The length of a rectangle is <b>2 cm greater<\u002Fb> than its width. The area is <b>15 cm²<\u002Fb>. Find its <b>perimeter<\u002Fb>.<\u002Fp><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:.85fr 1.15fr;gap:36px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:26px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;flex-direction:column;justify-content:center;gap:16px;align-items:center;\">\n      <svg viewBox=\"0 0 240 170\" width=\"240\" height=\"170\"><rect x=\"30\" y=\"30\" width=\"180\" height=\"110\" fill=\"#E4F0F9\" stroke=\"#1F6FB2\" stroke-width=\"4\"><\u002Frect><text x=\"120\" y=\"22\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"24\" fill=\"#1F2933\" text-anchor=\"middle\">x + 2<\u002Ftext><text x=\"224\" y=\"90\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"24\" fill=\"#1F2933\" text-anchor=\"middle\">x<\u002Ftext><text x=\"120\" y=\"95\" font-family=\"sans-serif\" font-size=\"24\" fill=\"#1F6FB2\" text-anchor=\"middle\" font-weight=\"700\">15 cm²<\u002Ftext><\u002Fsvg>\n      <div style=\"font-size:25px;text-align:center;\">width = <span class=\"mvar\">x<\u002Fspan>, length = <span class=\"mvar\">x<\u002Fspan> + 2<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:12px;justify-content:center;\">\n      <div style=\"font-size:25px;font-weight:800;letter-spacing:.08em;color:#0F7A45;\">SOLVE<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.4;\">Area = length × width, so <span class=\"mvar\">x<\u002Fspan>(<span class=\"mvar\">x<\u002Fspan> + 2) = 15.<\u002Fp>\n      <details class=\"rvtoggle\"><summary style=\"background:#EAF6EE;border:2px solid #0F7A45;border-radius:14px;padding:16px 26px;font-size:26px;font-weight:800;color:#0F7A45;display:inline-flex;align-items:center;gap:12px;\"><span style=\"font-size:20px;\">▶<\u002Fspan><span class=\"rv-shut\">Reveal working<\u002Fspan><span class=\"rv-open\">Working ↓<\u002Fspan><\u002Fsummary>\n        <div style=\"margin-top:12px;background:#fff;border:1px solid #D7E7DD;border-radius:14px;padding:20px 26px;font-size:26px;line-height:1.7;\">\n          <span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup> + 2<span class=\"mvar\">x<\u002Fspan> = 15 ⇒ <span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup> + 2<span class=\"mvar\">x<\u002Fspan> − 15 = 0<br>\n          ⇒ (<span class=\"mvar\">x<\u002Fspan> + 5)(<span class=\"mvar\">x<\u002Fspan> − 3) = 0<br>\n          ⇒ <span class=\"mvar\">x<\u002Fspan> = −5 &nbsp;or&nbsp; <span class=\"mvar\">x<\u002Fspan> = 3<br>\n          <span style=\"color:#C23A2B;\">Width can't be negative → <span class=\"mvar\">x<\u002Fspan> = 3<\u002Fspan><br>\n          <span style=\"color:#0F7A45;\">Sides 3 cm and 5 cm → Perimeter = 3+5+3+5 = <b>16 cm<\u002Fb><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Worked example 5\" data-screen-label=\"WE5 triangle\" data-speaker-notes=\"Worked example 5. A right-angled triangle has height h, base b, hypotenuse root 13, area 3. From area, half b h equals 3 so b h equals 6 and h equals 6 over b. Pythagoras gives b squared plus h squared equals 13. Substitute to get b squared plus 36 over b squared equals 13, a hidden quadratic in b squared. Solving, b squared is 9 or 4, so b is 3 or 2 and h is 2 or 3.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 5<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Harder · substitute one unknown into another<\u002Fspan><\u002Fdiv>\n  <div style=\"background:#fff;border-radius:18px;padding:18px 30px;box-shadow:0 3px 20px rgba(22,55,95,.06);border-left:6px solid #0F7A45;margin-bottom:16px;\"><p style=\"font-size:27px;line-height:1.4;\">A right-angled triangle has height <span class=\"mvar\">h<\u002Fspan> cm and base <span class=\"mvar\">b<\u002Fspan> cm. The hypotenuse is <span class=\"rt\">√<span style=\"border-top:2.5px solid;\">13<\u002Fspan><\u002Fspan> cm and the area is <b>3 cm²<\u002Fb>. Find the possible values of <span class=\"mvar\">b<\u002Fspan> and <span class=\"mvar\">h<\u002Fspan>.<\u002Fp><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:.8fr 1.2fr;gap:34px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:24px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;flex-direction:column;justify-content:center;gap:14px;align-items:center;\">\n      <svg viewBox=\"0 0 220 170\" width=\"220\" height=\"170\"><polygon points=\"40,150 190,150 40,40\" fill=\"#E4F0F9\" stroke=\"#1F6FB2\" stroke-width=\"4\"><\u002Fpolygon><rect x=\"40\" y=\"130\" width=\"20\" height=\"20\" fill=\"none\" stroke=\"#1F6FB2\" stroke-width=\"2\"><\u002Frect><text x=\"28\" y=\"100\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"24\" fill=\"#1F2933\" text-anchor=\"middle\">h<\u002Ftext><text x=\"115\" y=\"168\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"24\" fill=\"#1F2933\" text-anchor=\"middle\">b<\u002Ftext><text x=\"128\" y=\"88\" font-family=\"sans-serif\" font-size=\"20\" fill=\"#1F6FB2\" text-anchor=\"middle\" transform=\"rotate(-32 128 88)\">√13<\u002Ftext><\u002Fsvg>\n      <div style=\"font-size:23px;text-align:center;color:#5A6B76;\">Make one unknown the subject, then substitute.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:10px;justify-content:center;\">\n      <div style=\"font-size:28px;line-height:1.5;\">Area: <span class=\"frac\"><span class=\"num\">1<\u002Fspan><span class=\"den\">2<\u002Fspan><\u002Fspan><span class=\"mvar\">bh<\u002Fspan> = 3 ⇒ <span class=\"mvar\">bh<\u002Fspan> = 6 ⇒ <span class=\"mvar\">h<\u002Fspan> = <span class=\"frac\"><span class=\"num\">6<\u002Fspan><span class=\"den\"><span class=\"mvar\">b<\u002Fspan><\u002Fspan><\u002Fspan> &nbsp;<b style=\"color:#1F6FB2;\">[1]<\u002Fb><\u002Fdiv>\n      <div style=\"font-size:28px;line-height:1.5;\">Pythagoras: <span class=\"mvar\">b<\u002Fspan><sup>2<\u002Fsup> + <span class=\"mvar\">h<\u002Fspan><sup>2<\u002Fsup> = 13 &nbsp;<b style=\"color:#1F6FB2;\">[2]<\u002Fb><\u002Fdiv>\n      <details class=\"rvtoggle\"><summary style=\"background:#EAF6EE;border:2px solid #0F7A45;border-radius:14px;padding:14px 24px;font-size:25px;font-weight:800;color:#0F7A45;display:inline-flex;align-items:center;gap:10px;margin-top:6px;\"><span style=\"font-size:18px;\">▶<\u002Fspan><span class=\"rv-shut\">Reveal working<\u002Fspan><span class=\"rv-open\">Working ↓<\u002Fspan><\u002Fsummary>\n        <div style=\"margin-top:12px;background:#fff;border:1px solid #D7E7DD;border-radius:14px;padding:18px 24px;font-size:25px;line-height:1.7;\">\n          Sub [1] into [2]: <span class=\"mvar\">b<\u002Fspan><sup>2<\u002Fsup> + <span class=\"frac\"><span class=\"num\">36<\u002Fspan><span class=\"den\"><span class=\"mvar\">b<\u002Fspan><sup>2<\u002Fsup><\u002Fspan><\u002Fspan> = 13<br>\n          × <span class=\"mvar\">b<\u002Fspan><sup>2<\u002Fsup>: (<span class=\"mvar\">b<\u002Fspan><sup>2<\u002Fsup>)<sup>2<\u002Fsup> − 13<span class=\"mvar\">b<\u002Fspan><sup>2<\u002Fsup> + 36 = 0<br>\n          ⇒ (<span class=\"mvar\">b<\u002Fspan><sup>2<\u002Fsup> − 9)(<span class=\"mvar\">b<\u002Fspan><sup>2<\u002Fsup> − 4) = 0<br>\n          ⇒ <span class=\"mvar\">b<\u002Fspan> = 3 or 2, &nbsp;<span class=\"mvar\">h<\u002Fspan> = 2 or 3\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Your turn: quadratic problems\" data-screen-label=\"YT quadratics\" data-speaker-notes=\"Your turn with two quadratic-forming problems. Reveal the answers to check.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:60px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\"><span style=\"white-space:nowrap;background:#0EA5A8;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">YOUR TURN<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Form and solve a quadratic<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:28px;flex:1;\">\n    <div style=\"background:#fff;border-radius:18px;padding:30px 34px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:16px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#0EA5A8;\">Q1<\u002Fdiv>\n      <p style=\"font-size:28px;line-height:1.45;\">The product of two <b>consecutive<\u002Fb> integers is <b>72<\u002Fb>. Find both possible pairs.<\u002Fp>\n      <details class=\"rvtoggle\" style=\"margin-top:auto;\"><summary style=\"background:#E6F6F6;border:2px solid #0EA5A8;border-radius:12px;padding:14px 22px;font-size:25px;font-weight:800;color:#0B7E80;display:inline-flex;gap:10px;align-items:center;\"><span style=\"font-size:18px;\">▶<\u002Fspan><span class=\"rv-shut\">Reveal answer<\u002Fspan><span class=\"rv-open\">Answer ↓<\u002Fspan><\u002Fsummary><div style=\"margin-top:12px;font-size:26px;line-height:1.6;background:#F5FBFB;border-radius:12px;padding:18px 22px;\"><span class=\"mvar\">n<\u002Fspan>(<span class=\"mvar\">n<\u002Fspan>+1)=72 → <span class=\"mvar\">n<\u002Fspan><sup>2<\u002Fsup>+<span class=\"mvar\">n<\u002Fspan>−72=0 → (<span class=\"mvar\">n<\u002Fspan>+9)(<span class=\"mvar\">n<\u002Fspan>−8)=0<br><b>8 &amp; 9, or −9 &amp; −8<\u002Fb><\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:18px;padding:30px 34px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:16px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#0EA5A8;\">Q2<\u002Fdiv>\n      <p style=\"font-size:28px;line-height:1.45;\">A rectangle's length is <b>3 cm more<\u002Fb> than its width and its area is <b>40 cm²<\u002Fb>. Find its <b>perimeter<\u002Fb>.<\u002Fp>\n      <details class=\"rvtoggle\" style=\"margin-top:auto;\"><summary style=\"background:#E6F6F6;border:2px solid #0EA5A8;border-radius:12px;padding:14px 22px;font-size:25px;font-weight:800;color:#0B7E80;display:inline-flex;gap:10px;align-items:center;\"><span style=\"font-size:18px;\">▶<\u002Fspan><span class=\"rv-shut\">Reveal answer<\u002Fspan><span class=\"rv-open\">Answer ↓<\u002Fspan><\u002Fsummary><div style=\"margin-top:12px;font-size:26px;line-height:1.6;background:#F5FBFB;border-radius:12px;padding:18px 22px;\"><span class=\"mvar\">x<\u002Fspan>(<span class=\"mvar\">x<\u002Fspan>+3)=40 → (<span class=\"mvar\">x<\u002Fspan>+8)(<span class=\"mvar\">x<\u002Fspan>−5)=0 → <span class=\"mvar\">x<\u002Fspan>=5<br>Sides 5 &amp; 8 → <b>Perimeter 26 cm<\u002Fb><\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"22.2 · Rearranging formulae\" data-screen-label=\"Divider: 22.2\" data-speaker-notes=\"Section divider for 22.2. Changing the subject of a formula uses inverse operations, exactly like solving an equation.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#0F7A45;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:90px;top:40px;font-family:Fredoka,system-ui,sans-serif;font-size:340px;line-height:1;color:rgba(255,194,60,.16);font-weight:600;\">03<\u002Fdiv>\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-size:26px;font-weight:600;letter-spacing:.16em;color:#FFC23C;margin-bottom:20px;\">SECTION 22.2<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:92px;line-height:1.02;margin-bottom:24px;\">Using &amp; rearranging formulae<\u002Fh2>\n    <p style=\"font-size:34px;color:#DFF3E6;max-width:1120px;line-height:1.4;\">Make a different letter the subject using inverse operations — including formulae with squares, roots, and the subject appearing more than once.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Drill: Change the subject\" data-screen-label=\"Drill: inverse ops\" data-speaker-notes=\"Memory drill for rearranging: undo operations in reverse order, doing the same to both sides. Remember the phrase change the subject means isolate that letter.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#B0730C;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">DRILL<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Isolate the letter you want<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:54px;margin-bottom:20px;\">Undo in <span style=\"color:#B0730C;\">reverse order<\u002Fspan>, both sides<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1.1fr .9fr;gap:40px;flex:1;align-items:center;\">\n    <div style=\"display:flex;flex-direction:column;gap:16px;\">\n      <div style=\"background:#FFF6E6;border-radius:16px;padding:22px 28px;font-size:28px;line-height:1.4;\"><b style=\"color:#B0730C;\">1.<\u002Fb> Expand any brackets first, if needed.<\u002Fdiv>\n      <div style=\"background:#FFF6E6;border-radius:16px;padding:22px 28px;font-size:28px;line-height:1.4;\"><b style=\"color:#B0730C;\">2.<\u002Fb> If the subject is in a fraction, <b>multiply<\u002Fb> to clear it.<\u002Fdiv>\n      <div style=\"background:#FFF6E6;border-radius:16px;padding:22px 28px;font-size:28px;line-height:1.4;\"><b style=\"color:#B0730C;\">3.<\u002Fb> If the subject appears twice, <b>collect<\u002Fb> and <b>factorise<\u002Fb> it out.<\u002Fdiv>\n      <div style=\"background:#EAF6EE;border-radius:16px;padding:22px 28px;font-size:28px;line-height:1.4;\"><b style=\"color:#0F7A45;\">4.<\u002Fb> Use inverse operations (÷ undoes ×, √ undoes ²) to finish.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#E4F0F9;border-radius:20px;padding:34px;display:flex;flex-direction:column;gap:18px;align-items:center;\">\n      <div style=\"font-size:23px;font-weight:800;color:#1F6FB2;letter-spacing:.06em;\">INVERSE PAIRS<\u002Fdiv>\n      <div style=\"display:flex;gap:14px;align-items:center;font-size:30px;font-weight:800;\"><span style=\"background:#fff;border-radius:10px;padding:10px 20px;\">+<\u002Fspan><span>↔<\u002Fspan><span style=\"background:#fff;border-radius:10px;padding:10px 20px;\">−<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:14px;align-items:center;font-size:30px;font-weight:800;\"><span style=\"background:#fff;border-radius:10px;padding:10px 20px;\">×<\u002Fspan><span>↔<\u002Fspan><span style=\"background:#fff;border-radius:10px;padding:10px 20px;\">÷<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:14px;align-items:center;font-size:30px;font-weight:800;\"><span style=\"background:#fff;border-radius:10px;padding:10px 20px;\"><span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup><\u002Fspan><span>↔<\u002Fspan><span style=\"background:#fff;border-radius:10px;padding:10px 20px;\">√<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Builder: Change the subject\" data-screen-label=\"22.2 subject builder\" data-speaker-notes=\"Interactive step-by-step builder for changing the subject when the letter appears more than once. Press Next to reveal each step: clear the fraction, collect the x terms, factorise, then divide. This is worked example 9.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#0B2E45;color:#EAF4FB;overflow:hidden;\">\n  <div class=\"stut\" data-step=\"0\" data-max=\"4\" style=\"display:flex;flex-direction:column;height:100%;\">\n    <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:8px;\"><span style=\"white-space:nowrap;background:#3E9BE0;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">STEP-BY-STEP BUILDER<\u002Fspan><span style=\"font-size:24px;color:#8FB8D6;font-weight:500;\">Make <span class=\"mvar\">p<\u002Fspan> the subject when it appears twice<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:46px;margin-bottom:6px;color:#fff;\">Rearrange &nbsp;<span class=\"mvar\">m<\u002Fspan> = 6 − <span class=\"frac\"><span class=\"num\">12<\u002Fspan><span class=\"den\"><span class=\"mvar\">p<\u002Fspan><\u002Fspan><\u002Fspan>&nbsp; for <span class=\"mvar\">p<\u002Fspan><\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1.15fr .85fr;gap:36px;flex:1;min-height:0;\">\n      <div style=\"background:#08475f;border-radius:22px;padding:36px 44px;display:flex;flex-direction:column;justify-content:center;gap:22px;position:relative;\">\n        <div class=\"sl\" data-min=\"0\" style=\"font-size:44px;font-weight:800;color:#fff;\"><span class=\"mvar\">m<\u002Fspan> = 6 − <span class=\"frac\"><span class=\"num\">12<\u002Fspan><span class=\"den\"><span class=\"mvar\">p<\u002Fspan><\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"sl\" data-min=\"1\" style=\"font-size:40px;font-weight:700;color:#BFE3FF;\"><span style=\"color:#7FC4F5;\">×<span class=\"mvar\">p<\u002Fspan>:<\u002Fspan>&nbsp; <span class=\"mvar\">mp<\u002Fspan> = 6<span class=\"mvar\">p<\u002Fspan> − 12<\u002Fdiv>\n        <div class=\"sl\" data-min=\"2\" style=\"font-size:40px;font-weight:700;color:#BFE3FF;\"><span style=\"color:#7FC4F5;\">collect:<\u002Fspan>&nbsp; <span class=\"mvar\">mp<\u002Fspan> − 6<span class=\"mvar\">p<\u002Fspan> = −12<\u002Fdiv>\n        <div class=\"sl\" data-min=\"3\" style=\"font-size:40px;font-weight:700;color:#BFE3FF;\"><span style=\"color:#7FC4F5;\">factorise:<\u002Fspan>&nbsp; <span class=\"mvar\">p<\u002Fspan>(<span class=\"mvar\">m<\u002Fspan> − 6) = −12<\u002Fdiv>\n        <div class=\"sl\" data-min=\"4\" style=\"font-size:42px;font-weight:800;color:#FFE08A;\"><span class=\"mvar\">p<\u002Fspan> = <span class=\"frac\"><span class=\"num\">−12<\u002Fspan><span class=\"den\"><span class=\"mvar\">m<\u002Fspan> − 6<\u002Fspan><\u002Fspan> = <span class=\"frac\"><span class=\"num\">12<\u002Fspan><span class=\"den\">6 − <span class=\"mvar\">m<\u002Fspan><\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"background:#08475f;border-radius:18px;padding:26px 30px;flex:1;display:flex;flex-direction:column;justify-content:center;\">\n          <div class=\"snote\" data-step=\"0\" style=\"display:block;\"><b style=\"color:#7FC4F5;font-size:26px;\">Start.<\u002Fb><div style=\"font-size:27px;line-height:1.5;margin-top:10px;\"><span class=\"mvar\">p<\u002Fspan> is stuck in the bottom of a fraction and we want it alone. Press <b>Next<\u002Fb> to build the answer.<\u002Fdiv><\u002Fdiv>\n          <div class=\"snote\" data-step=\"1\"><b style=\"color:#7FC4F5;font-size:26px;\">Step 1 · clear the fraction.<\u002Fb><div style=\"font-size:27px;line-height:1.5;margin-top:10px;\">Multiply <b>every term<\u002Fb> by <span class=\"mvar\">p<\u002Fspan> so it is no longer a denominator.<\u002Fdiv><\u002Fdiv>\n          <div class=\"snote\" data-step=\"2\"><b style=\"color:#7FC4F5;font-size:26px;\">Step 2 · collect.<\u002Fb><div style=\"font-size:27px;line-height:1.5;margin-top:10px;\">Get both <span class=\"mvar\">p<\u002Fspan>-terms onto <b>one side<\u002Fb>, everything else on the other.<\u002Fdiv><\u002Fdiv>\n          <div class=\"snote\" data-step=\"3\"><b style=\"color:#7FC4F5;font-size:26px;\">Step 3 · factorise.<\u002Fb><div style=\"font-size:27px;line-height:1.5;margin-top:10px;\">Take <span class=\"mvar\">p<\u002Fspan> out as a common factor so it appears <b>only once<\u002Fb>.<\u002Fdiv><\u002Fdiv>\n          <div class=\"snote\" data-step=\"4\"><b style=\"color:#FFE08A;font-size:26px;\">Step 4 · divide.<\u002Fb><div style=\"font-size:27px;line-height:1.5;margin-top:10px;\">Divide both sides by (<span class=\"mvar\">m<\u002Fspan> − 6). Multiplying top and bottom by −1 tidies the signs. <span class=\"mvar\">p<\u002Fspan> is now the subject! ✓<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:16px;\">\n          <button class=\"stut-prev\" style=\"flex:1;background:#0B2E45;border:2px solid #3E9BE0;color:#BFE3FF;font-weight:800;font-size:26px;padding:16px;border-radius:14px;cursor:pointer;\">‹ Back<\u002Fbutton>\n          <span class=\"stut-badge\" style=\"font-size:24px;font-weight:800;color:#8FB8D6;min-width:120px;text-align:center;\">Step 0 / 4<\u002Fspan>\n          <button class=\"stut-next\" style=\"flex:1;background:#3E9BE0;border:2px solid #3E9BE0;color:#fff;font-weight:800;font-size:26px;padding:16px;border-radius:14px;cursor:pointer;\">Next ›<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Worked example 6\" data-screen-label=\"WE6 solve for h\" data-speaker-notes=\"Worked example 6. Solve for h if A equals 2 pi r times bracket r plus h. Expand to A equals 2 pi r squared plus 2 pi r h. Subtract 2 pi r squared, then divide by 2 pi r to get h equals A minus 2 pi r squared all over 2 pi r.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:60px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 6<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Expand, then isolate<\u002Fspan><\u002Fdiv>\n  <div style=\"background:#fff;border-radius:18px;padding:22px 34px;box-shadow:0 3px 20px rgba(22,55,95,.06);border-left:6px solid #0F7A45;margin-bottom:22px;\"><p style=\"font-size:30px;line-height:1.4;\">Solve for <span class=\"mvar\">h<\u002Fspan> if &nbsp;<span class=\"mvar\">A<\u002Fspan> = 2π<span class=\"mvar\">r<\u002Fspan>(<span class=\"mvar\">r<\u002Fspan> + <span class=\"mvar\">h<\u002Fspan>).<\u002Fp><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:40px;flex:1;\">\n    <div style=\"display:flex;flex-direction:column;gap:14px;justify-content:center;\">\n      <div style=\"font-size:25px;font-weight:800;letter-spacing:.08em;color:#0F7A45;\">METHOD<\u002Fdiv>\n      <p style=\"font-size:28px;line-height:1.5;\">Expand the bracket so <span class=\"mvar\">h<\u002Fspan> is free, move the other term across, then divide.<\u002Fp>\n      <details class=\"rvtoggle\"><summary style=\"background:#EAF6EE;border:2px solid #0F7A45;border-radius:14px;padding:16px 26px;font-size:26px;font-weight:800;color:#0F7A45;display:inline-flex;align-items:center;gap:12px;\"><span style=\"font-size:20px;\">▶<\u002Fspan><span class=\"rv-shut\">Reveal working<\u002Fspan><span class=\"rv-open\">Working ↓<\u002Fspan><\u002Fsummary>\n        <div style=\"margin-top:14px;background:#fff;border:1px solid #D7E7DD;border-radius:14px;padding:22px 28px;font-size:27px;line-height:1.9;\">\n          <span class=\"mvar\">A<\u002Fspan> = 2π<span class=\"mvar\">r<\u002Fspan><sup>2<\u002Fsup> + 2π<span class=\"mvar\">rh<\u002Fspan><br>\n          <span class=\"mvar\">A<\u002Fspan> − 2π<span class=\"mvar\">r<\u002Fspan><sup>2<\u002Fsup> = 2π<span class=\"mvar\">rh<\u002Fspan><br>\n          <span class=\"mvar\">h<\u002Fspan> = <span class=\"frac\"><span class=\"num\"><span class=\"mvar\">A<\u002Fspan> − 2π<span class=\"mvar\">r<\u002Fspan><sup>2<\u002Fsup><\u002Fspan><span class=\"den\">2π<span class=\"mvar\">r<\u002Fspan><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n    <div style=\"background:#E4F0F9;border-radius:20px;padding:34px;display:flex;flex-direction:column;justify-content:center;gap:18px;align-items:center;\">\n      <div style=\"font-size:24px;font-weight:800;color:#1F6FB2;letter-spacing:.06em;\">SUBJECT CHANGED<\u002Fdiv>\n      <div style=\"font-size:26px;color:#5A6B76;\">from<\u002Fdiv>\n      <div style=\"font-size:34px;font-weight:800;\"><span style=\"background:#fff;border-radius:10px;padding:6px 16px;\"><span class=\"mvar\">A<\u002Fspan><\u002Fspan> = 2π<span class=\"mvar\">r<\u002Fspan>(<span class=\"mvar\">r<\u002Fspan>+<span class=\"mvar\">h<\u002Fspan>)<\u002Fdiv>\n      <div style=\"font-size:26px;color:#5A6B76;\">to<\u002Fdiv>\n      <div style=\"font-size:32px;font-weight:800;\"><span style=\"background:#fff;border-radius:10px;padding:6px 16px;\"><span class=\"mvar\">h<\u002Fspan><\u002Fspan> = <span class=\"frac\"><span class=\"num\"><span class=\"mvar\">A<\u002Fspan> − 2π<span class=\"mvar\">r<\u002Fspan><sup>2<\u002Fsup><\u002Fspan><span class=\"den\">2π<span class=\"mvar\">r<\u002Fspan><\u002Fspan><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Worked examples 7 &amp; 8\" data-screen-label=\"WE7-8 squares roots\" data-speaker-notes=\"Worked examples 7 and 8 deal with squares and square roots. In WE7, make x the subject of a x squared equals b: divide by a, then square root both sides, remembering plus or minus. In WE8, given r equals root of A over pi, square both sides then multiply by pi to get A equals pi r squared.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLES 7 &amp; 8<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Squares &amp; square roots — remember ±<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:30px 34px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:16px;\">\n      <div style=\"font-size:26px;font-weight:800;color:#0F7A45;\">WE7 · make <span class=\"mvar\">x<\u002Fspan> the subject of <span class=\"mvar\">ax<\u002Fspan><sup>2<\u002Fsup> = <span class=\"mvar\">b<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:29px;line-height:1.9;\">\n        <span class=\"mvar\">ax<\u002Fspan><sup>2<\u002Fsup> = <span class=\"mvar\">b<\u002Fspan><br>\n        <span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup> = <span class=\"frac\"><span class=\"num\"><span class=\"mvar\">b<\u002Fspan><\u002Fspan><span class=\"den\"><span class=\"mvar\">a<\u002Fspan><\u002Fspan><\u002Fspan> &nbsp;<span style=\"color:#8A97A4;font-size:23px;\">(÷ <span class=\"mvar\">a<\u002Fspan>)<\u002Fspan><br>\n        <span class=\"mvar\">x<\u002Fspan> = ±<span class=\"sqrt\"><i>√<\u002Fi><span class=\"rad\"><span class=\"frac\"><span class=\"num\"><span class=\"mvar\">b<\u002Fspan><\u002Fspan><span class=\"den\"><span class=\"mvar\">a<\u002Fspan><\u002Fspan><\u002Fspan><\u002Fspan><\u002Fspan> &nbsp;<span style=\"color:#8A97A4;font-size:23px;\">(√ both sides)<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"margin-top:auto;background:#FFF6E6;border-radius:12px;padding:16px 22px;font-size:24px;color:#8A5A08;\">A squared term has a <b>positive and a negative<\u002Fb> root — always write <b>±<\u002Fb>.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:20px;padding:30px 34px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:16px;\">\n      <div style=\"font-size:26px;font-weight:800;color:#0F7A45;\">WE8 · given <span class=\"mvar\">r<\u002Fspan> = <span class=\"sqrt\"><i>√<\u002Fi><span class=\"rad\"><span class=\"frac\"><span class=\"num\"><span class=\"mvar\">A<\u002Fspan><\u002Fspan><span class=\"den\">π<\u002Fspan><\u002Fspan><\u002Fspan><\u002Fspan>, express in terms of <span class=\"mvar\">A<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:29px;line-height:1.9;\">\n        <span class=\"mvar\">r<\u002Fspan> = <span class=\"sqrt\"><i>√<\u002Fi><span class=\"rad\"><span class=\"frac\"><span class=\"num\"><span class=\"mvar\">A<\u002Fspan><\u002Fspan><span class=\"den\">π<\u002Fspan><\u002Fspan><\u002Fspan><\u002Fspan><br>\n        <span class=\"mvar\">r<\u002Fspan><sup>2<\u002Fsup> = <span class=\"frac\"><span class=\"num\"><span class=\"mvar\">A<\u002Fspan><\u002Fspan><span class=\"den\">π<\u002Fspan><\u002Fspan> &nbsp;<span style=\"color:#8A97A4;font-size:23px;\">(square both sides)<\u002Fspan><br>\n        π<span class=\"mvar\">r<\u002Fspan><sup>2<\u002Fsup> = <span class=\"mvar\">A<\u002Fspan> &nbsp;<span style=\"color:#8A97A4;font-size:23px;\">(× π)<\u002Fspan><br>\n        <b style=\"color:#0F7A45;\"><span class=\"mvar\">A<\u002Fspan> = π<span class=\"mvar\">r<\u002Fspan><sup>2<\u002Fsup><\u002Fb>\n      <\u002Fdiv>\n      <div style=\"margin-top:auto;background:#EAF6EE;border-radius:12px;padding:16px 22px;font-size:24px;color:#0F7A45;\">Squaring is the inverse of a square root — it removes the √.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Worked example 9\" data-screen-label=\"WE9 subject twice\" data-speaker-notes=\"Worked example 9. Given m equals 6 minus 12 over p, make p the subject. Multiply by p, collect the p terms, factorise, then divide. This is the same problem as the interactive builder, shown fully.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:60px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 9<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Subject appears more than once<\u002Fspan><\u002Fdiv>\n  <div style=\"background:#fff;border-radius:18px;padding:22px 34px;box-shadow:0 3px 20px rgba(22,55,95,.06);border-left:6px solid #0F7A45;margin-bottom:20px;\"><p style=\"font-size:30px;line-height:1.4;\">Given that &nbsp;<span class=\"mvar\">m<\u002Fspan> = 6 − <span class=\"frac\"><span class=\"num\">12<\u002Fspan><span class=\"den\"><span class=\"mvar\">p<\u002Fspan><\u002Fspan><\u002Fspan>, &nbsp;make <span class=\"mvar\">p<\u002Fspan> the subject of the formula.<\u002Fp><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:44px;flex:1;align-items:center;\">\n    <div style=\"font-size:30px;line-height:2.1;\">\n      <span class=\"mvar\">m<\u002Fspan> = 6 − <span class=\"frac\"><span class=\"num\">12<\u002Fspan><span class=\"den\"><span class=\"mvar\">p<\u002Fspan><\u002Fspan><\u002Fspan><br>\n      <span class=\"mvar\">mp<\u002Fspan> = 6<span class=\"mvar\">p<\u002Fspan> − 12 &nbsp;<span style=\"color:#8A97A4;font-size:24px;\">multiply by <span class=\"mvar\">p<\u002Fspan><\u002Fspan><br>\n      <span class=\"mvar\">mp<\u002Fspan> − 6<span class=\"mvar\">p<\u002Fspan> = −12 &nbsp;<span style=\"color:#8A97A4;font-size:24px;\">collect<\u002Fspan><br>\n      <span class=\"mvar\">p<\u002Fspan>(<span class=\"mvar\">m<\u002Fspan> − 6) = −12 &nbsp;<span style=\"color:#8A97A4;font-size:24px;\">factorise<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"background:#EAF6EE;border-radius:20px;padding:36px;display:flex;flex-direction:column;justify-content:center;gap:16px;align-items:center;\">\n      <div style=\"font-size:24px;font-weight:800;color:#0F7A45;letter-spacing:.06em;\">DIVIDE TO FINISH<\u002Fdiv>\n      <div style=\"font-size:40px;font-weight:800;\"><span class=\"mvar\">p<\u002Fspan> = <span class=\"frac\"><span class=\"num\">−12<\u002Fspan><span class=\"den\"><span class=\"mvar\">m<\u002Fspan> − 6<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:28px;color:#5A6B76;\">or, tidying signs:<\u002Fdiv>\n      <div style=\"font-size:40px;font-weight:800;color:#0F7A45;\"><span class=\"mvar\">p<\u002Fspan> = <span class=\"frac\"><span class=\"num\">12<\u002Fspan><span class=\"den\">6 − <span class=\"mvar\">m<\u002Fspan><\u002Fspan><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Your turn: rearrange formulae\" data-screen-label=\"YT rearrange\" data-speaker-notes=\"Your turn. Three rearranging tasks covering a simple isolate, a square root, and the subject appearing twice.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:60px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:16px;\"><span style=\"white-space:nowrap;background:#0EA5A8;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">YOUR TURN<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Change the subject to the bold letter<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;flex:1;\">\n    <div style=\"background:#fff;border-radius:18px;padding:28px 30px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#0EA5A8;\">Q1<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.5;\">Make <b><span class=\"mvar\">u<\u002Fspan><\u002Fb> the subject of &nbsp;<span class=\"mvar\">v<\u002Fspan> = <span class=\"mvar\">u<\u002Fspan> + <span class=\"mvar\">at<\u002Fspan>.<\u002Fp>\n      <details class=\"rvtoggle\" style=\"margin-top:auto;\"><summary style=\"background:#E6F6F6;border:2px solid #0EA5A8;border-radius:12px;padding:14px 20px;font-size:24px;font-weight:800;color:#0B7E80;display:inline-flex;gap:10px;align-items:center;\"><span style=\"font-size:18px;\">▶<\u002Fspan><span class=\"rv-shut\">Reveal answer<\u002Fspan><span class=\"rv-open\">Answer ↓<\u002Fspan><\u002Fsummary><div style=\"margin-top:12px;font-size:27px;line-height:1.6;background:#F5FBFB;border-radius:12px;padding:16px 20px;\"><span class=\"mvar\">u<\u002Fspan> = <span class=\"mvar\">v<\u002Fspan> − <span class=\"mvar\">at<\u002Fspan><\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:18px;padding:28px 30px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#0EA5A8;\">Q2<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.5;\">Make <b><span class=\"mvar\">t<\u002Fspan><\u002Fb> the subject of &nbsp;<span class=\"mvar\">v<\u002Fspan><sup>2<\u002Fsup> = <span class=\"mvar\">u<\u002Fspan><sup>2<\u002Fsup> + 2<span class=\"mvar\">gt<\u002Fspan>.<\u002Fp>\n      <details class=\"rvtoggle\" style=\"margin-top:auto;\"><summary style=\"background:#E6F6F6;border:2px solid #0EA5A8;border-radius:12px;padding:14px 20px;font-size:24px;font-weight:800;color:#0B7E80;display:inline-flex;gap:10px;align-items:center;\"><span style=\"font-size:18px;\">▶<\u002Fspan><span class=\"rv-shut\">Reveal answer<\u002Fspan><span class=\"rv-open\">Answer ↓<\u002Fspan><\u002Fsummary><div style=\"margin-top:12px;font-size:26px;line-height:1.6;background:#F5FBFB;border-radius:12px;padding:16px 20px;\"><span class=\"mvar\">t<\u002Fspan> = <span class=\"frac\"><span class=\"num\"><span class=\"mvar\">v<\u002Fspan><sup>2<\u002Fsup> − <span class=\"mvar\">u<\u002Fspan><sup>2<\u002Fsup><\u002Fspan><span class=\"den\">2<span class=\"mvar\">g<\u002Fspan><\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:18px;padding:28px 30px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#0EA5A8;\">Q3<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.5;\">Make <b><span class=\"mvar\">y<\u002Fspan><\u002Fb> the subject of &nbsp;<span class=\"mvar\">x<\u002Fspan> = <span class=\"frac\"><span class=\"num\"><span class=\"mvar\">y<\u002Fspan> + 1<\u002Fspan><span class=\"den\"><span class=\"mvar\">y<\u002Fspan> − 1<\u002Fspan><\u002Fspan>.<\u002Fp>\n      <details class=\"rvtoggle\" style=\"margin-top:auto;\"><summary style=\"background:#E6F6F6;border:2px solid #0EA5A8;border-radius:12px;padding:14px 20px;font-size:24px;font-weight:800;color:#0B7E80;display:inline-flex;gap:10px;align-items:center;\"><span style=\"font-size:18px;\">▶<\u002Fspan><span class=\"rv-shut\">Reveal answer<\u002Fspan><span class=\"rv-open\">Answer ↓<\u002Fspan><\u002Fsummary><div style=\"margin-top:12px;font-size:24px;line-height:1.55;background:#F5FBFB;border-radius:12px;padding:16px 20px;\"><span class=\"mvar\">x<\u002Fspan>(<span class=\"mvar\">y<\u002Fspan>−1)=<span class=\"mvar\">y<\u002Fspan>+1 → <span class=\"mvar\">xy<\u002Fspan>−<span class=\"mvar\">y<\u002Fspan>=<span class=\"mvar\">x<\u002Fspan>+1<br><span class=\"mvar\">y<\u002Fspan> = <span class=\"frac\"><span class=\"num\"><span class=\"mvar\">x<\u002Fspan> + 1<\u002Fspan><span class=\"den\"><span class=\"mvar\">x<\u002Fspan> − 1<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"22.3 · Functions\" data-screen-label=\"Divider: 22.3\" data-speaker-notes=\"Section divider for 22.3. Function notation, evaluating functions, domain and range, composite functions, and inverse functions.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#0EA5A8;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:90px;top:40px;font-family:Fredoka,system-ui,sans-serif;font-size:340px;line-height:1;color:rgba(255,255,255,.14);font-weight:600;\">04<\u002Fdiv>\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-size:26px;font-weight:600;letter-spacing:.16em;color:#FFF3C4;margin-bottom:20px;\">SECTION 22.3<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:96px;line-height:1.02;margin-bottom:24px;\">Functions &amp; function notation<\u002Fh2>\n    <p style=\"font-size:34px;color:#E4FAFA;max-width:1120px;line-height:1.4;\">Read and evaluate f(<span class=\"mvar\">x<\u002Fspan>), find the domain and range, combine functions into composites, and find inverse functions.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Five ways to show a function\" data-screen-label=\"Function representations\" data-speaker-notes=\"A function can be shown in many ways: a function machine, a mapping diagram, a table of values, a set of coordinates, or a graph. These all describe the same rule, y equals 4x minus 1. This is the original figure from the textbook.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"width:52px;height:6px;background:#0EA5A8;border-radius:3px;\"><\u002Fspan><span style=\"font-size:26px;font-weight:700;letter-spacing:.14em;color:#0B7E80;\">CONCEPT<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:52px;margin-bottom:20px;\">The same rule, shown five ways<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1.25fr .75fr;gap:36px;flex:1;min-height:0;\">\n    <div style=\"background:#fff;border-radius:20px;padding:22px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;align-items:center;justify-content:center;\"><img src=\"ad2c0118-1dbb-4ead-ae2c-7fe6ec115ae9\" alt=\"Function machine, mapping diagram and table for y=4x-1\" style=\"max-width:100%;max-height:100%;object-fit:contain;\"><\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:16px;justify-content:center;\">\n      <div style=\"background:#E6F6F6;border-radius:16px;padding:22px 26px;font-size:27px;line-height:1.4;\">The rule <b><span class=\"mvar\">y<\u002Fspan> = 4<span class=\"mvar\">x<\u002Fspan> − 1<\u002Fb> can be drawn as a <b>machine<\u002Fb>, a <b>mapping<\u002Fb>, a <b>table<\u002Fb>, a set of <b>coordinates<\u002Fb>, or a <b>graph<\u002Fb>.<\u002Fdiv>\n      <div style=\"background:#FFF6E6;border-radius:16px;padding:22px 26px;font-size:27px;line-height:1.4;\">In set notation: <b>{(<span class=\"mvar\">x<\u002Fspan>, <span class=\"mvar\">y<\u002Fspan>) : <span class=\"mvar\">y<\u002Fspan> = 4<span class=\"mvar\">x<\u002Fspan> − 1}<\u002Fb><\u002Fdiv>\n      <div style=\"background:#E4F0F9;border-radius:16px;padding:22px 26px;font-size:27px;line-height:1.4;\">In <b>function notation<\u002Fb> it becomes <b>f(<span class=\"mvar\">x<\u002Fspan>) = 4<span class=\"mvar\">x<\u002Fspan> − 1<\u002Fb>.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Reading function notation\" data-screen-label=\"f(x) notation\" data-speaker-notes=\"Function notation names the rule. f is the function name, x is the input, and the expression is the rule. f of x is the output. If f of x equals 4x minus 1 then f of 5 equals 19 and f of minus 2 equals minus 9. This is the original annotated figure.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"width:52px;height:6px;background:#0EA5A8;border-radius:3px;\"><\u002Fspan><span style=\"font-size:26px;font-weight:700;letter-spacing:.14em;color:#0B7E80;\">CONCEPT<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:52px;margin-bottom:20px;\">What each part of f(<span class=\"mvar\">x<\u002Fspan>) means<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1.15fr .85fr;gap:36px;flex:1;min-height:0;\">\n    <div style=\"background:#fff;border-radius:20px;padding:26px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;align-items:center;justify-content:center;\"><img src=\"7dea3188-86cf-466f-acf7-36d0fd91c9f1\" alt=\"Annotated f(x)=4x-1 showing function name, input and rule\" style=\"max-width:100%;max-height:100%;object-fit:contain;\"><\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:16px;justify-content:center;\">\n      <div style=\"background:#E6F6F6;border-radius:16px;padding:20px 26px;font-size:26px;line-height:1.4;\">You read <b>f(<span class=\"mvar\">x<\u002Fspan>)<\u002Fb> as “<b>f of <span class=\"mvar\">x<\u002Fspan><\u002Fb>”. To find <b>f(5)<\u002Fb>, put <b>5<\u002Fb> in place of every <span class=\"mvar\">x<\u002Fspan>.<\u002Fdiv>\n      <div style=\"background:#EAF6EE;border-radius:16px;padding:20px 26px;font-size:27px;line-height:1.6;\">f(5) = 4×5 − 1 = <b>19<\u002Fb><br>f(−2) = 4×(−2) − 1 = <b>−9<\u002Fb><\u002Fdiv>\n      <div style=\"background:#FFF6E6;border-radius:16px;padding:20px 26px;font-size:25px;line-height:1.4;color:#8A5A08;\">A <b>negative<\u002Fb> input goes in <b>brackets<\u002Fb> so the signs stay correct.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Worked examples 10 &amp; 11\" data-screen-label=\"WE10-11 evaluate\" data-speaker-notes=\"Worked examples 10 and 11. Evaluating functions by substitution. For f of x equals x squared minus 3x and g of x equals 4x minus 6: f of 6 is 18, f of minus 3 is 18, g of a half is minus 4, g of 6 is 18. For h of x equals 9 minus x squared: h of 0 is 9, h of 3 is 0, h of 9 is minus 72, h of minus 9 is minus 72.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLES 10 &amp; 11<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Evaluate by substitution<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:28px 32px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:25px;font-weight:800;color:#0F7A45;\">WE10 · f(<span class=\"mvar\">x<\u002Fspan>) = <span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup> − 3<span class=\"mvar\">x<\u002Fspan>, &nbsp;g(<span class=\"mvar\">x<\u002Fspan>) = 4<span class=\"mvar\">x<\u002Fspan> − 6<\u002Fdiv>\n      <div style=\"font-size:27px;line-height:1.75;\">\n        f(6) = 6<sup>2<\u002Fsup> − 3(6) = 36 − 18 = <b>18<\u002Fb><br>\n        f(−3) = (−3)<sup>2<\u002Fsup> − 3(−3) = 9 + 9 = <b>18<\u002Fb><br>\n        g<span style=\"font-size:22px;\">(<\u002Fspan><span class=\"frac\"><span class=\"num\">1<\u002Fspan><span class=\"den\">2<\u002Fspan><\u002Fspan><span style=\"font-size:22px;\">)<\u002Fspan> = 4<span style=\"font-size:22px;\">(<\u002Fspan><span class=\"frac\"><span class=\"num\">1<\u002Fspan><span class=\"den\">2<\u002Fspan><\u002Fspan><span style=\"font-size:22px;\">)<\u002Fspan> − 6 = <b>−4<\u002Fb><br>\n        g(6) = 4(6) − 6 = <b>18<\u002Fb>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:20px;padding:28px 32px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:25px;font-weight:800;color:#0F7A45;\">WE11 · h(<span class=\"mvar\">x<\u002Fspan>) = 9 − <span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup><\u002Fdiv>\n      <div style=\"font-size:27px;line-height:1.75;\">\n        h(0) = 9 − 0<sup>2<\u002Fsup> = <b>9<\u002Fb><br>\n        h(3) = 9 − 3<sup>2<\u002Fsup> = 9 − 9 = <b>0<\u002Fb><br>\n        h(9) = 9 − 9<sup>2<\u002Fsup> = 9 − 81 = <b>−72<\u002Fb><br>\n        h(−9) = 9 − (−9)<sup>2<\u002Fsup> = 9 − 81 = <b>−72<\u002Fb>\n      <\u002Fdiv>\n      <div style=\"margin-top:auto;background:#FFF6E6;border-radius:12px;padding:14px 20px;font-size:23px;color:#8A5A08;\">h(9) and h(−9) are equal because the input is <b>squared<\u002Fb>.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Worked examples 12 &amp; 13\" data-screen-label=\"WE12-13 solve f(x)=\" data-speaker-notes=\"Worked examples 12 and 13. Solving an equation given in function notation. In WE12, f of x equals 3 plus 2x, solve f of x equals 6: 3 plus 2x equals 6 gives x equals 1.5. In WE13 with f of x equals x squared and g of x equals x plus 2, solve f equals g to get x equals 2 or minus 1, and solve 4g equals g minus 3 to get x equals minus 3.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLES 12 &amp; 13<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Solve an equation written with functions<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:.85fr 1.15fr;gap:34px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:28px 32px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:14px;justify-content:center;\">\n      <div style=\"font-size:25px;font-weight:800;color:#0F7A45;\">WE12 · f(<span class=\"mvar\">x<\u002Fspan>) = 3 + 2<span class=\"mvar\">x<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:27px;color:#5A6B76;\">Solve f(<span class=\"mvar\">x<\u002Fspan>) = 6.<\u002Fdiv>\n      <div style=\"font-size:29px;line-height:1.9;\">\n        3 + 2<span class=\"mvar\">x<\u002Fspan> = 6<br>\n        2<span class=\"mvar\">x<\u002Fspan> = 3<br>\n        <span class=\"mvar\">x<\u002Fspan> = <b>1.5<\u002Fb>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:20px;padding:28px 32px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:25px;font-weight:800;color:#0F7A45;\">WE13 · f(<span class=\"mvar\">x<\u002Fspan>) = <span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup>, &nbsp;g(<span class=\"mvar\">x<\u002Fspan>) = <span class=\"mvar\">x<\u002Fspan> + 2<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;\">\n        <div style=\"font-size:25px;line-height:1.7;\"><b style=\"color:#1F6FB2;\">a<\u002Fb> &nbsp;f(<span class=\"mvar\">x<\u002Fspan>) = g(<span class=\"mvar\">x<\u002Fspan>)<br><span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup> = <span class=\"mvar\">x<\u002Fspan> + 2<br><span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup> − <span class=\"mvar\">x<\u002Fspan> − 2 = 0<br>(<span class=\"mvar\">x<\u002Fspan>−2)(<span class=\"mvar\">x<\u002Fspan>+1) = 0<br><b>x = 2 or −1<\u002Fb><\u002Fdiv>\n        <div style=\"font-size:25px;line-height:1.7;\"><b style=\"color:#1F6FB2;\">b<\u002Fb> &nbsp;4g(<span class=\"mvar\">x<\u002Fspan>) = g(<span class=\"mvar\">x<\u002Fspan>) − 3<br>3g(<span class=\"mvar\">x<\u002Fspan>) = −3<br>g(<span class=\"mvar\">x<\u002Fspan>) = −1<br><span class=\"mvar\">x<\u002Fspan> + 2 = −1<br><b>x = −3<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Domain and range\" data-screen-label=\"Domain range concept\" data-speaker-notes=\"The domain is the set of allowed inputs, the x-values. The range is the set of outputs, the y-values. A square root needs a non-negative inside, and a fraction cannot have zero on the bottom - these restrict the domain.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"width:52px;height:6px;background:#0EA5A8;border-radius:3px;\"><\u002Fspan><span style=\"font-size:26px;font-weight:700;letter-spacing:.14em;color:#0B7E80;\">CONCEPT<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:50px;margin-bottom:18px;\">Domain (inputs) &amp; range (outputs)<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:22px;flex:1;min-height:0;\">\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:28px;\">\n      <div style=\"background:#E6F6F6;border-radius:18px;padding:22px 28px;display:flex;flex-direction:column;gap:8px;\">\n        <div style=\"font-size:27px;font-weight:800;color:#0B7E80;\">Domain <span style=\"font-weight:500;color:#5A6B76;font-size:23px;\">= the set of <span class=\"mvar\">x<\u002Fspan> you may put <b>in<\u002Fb><\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:27px;font-weight:800;color:#0B7E80;\">Range <span style=\"font-weight:500;color:#5A6B76;font-size:23px;\">= the set of <span class=\"mvar\">y<\u002Fspan> that come <b>out<\u002Fb><\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:23px;line-height:1.4;color:#5A6B76;margin-top:4px;\">Restrict a domain when there is a <b>√<\u002Fb> (inside ≥ 0) or a <b>fraction<\u002Fb> (bottom ≠ 0).<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:18px;padding:22px 28px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:8px;justify-content:center;\">\n        <div style=\"font-size:22px;font-weight:800;color:#8A97A4;letter-spacing:.06em;\">SET NOTATION<\u002Fdiv>\n        <div style=\"font-size:25px;line-height:1.45;\">{ <span class=\"mvar\">x<\u002Fspan> : <span class=\"mvar\">x<\u002Fspan> ≥ <span class=\"frac\"><span class=\"num\">1<\u002Fspan><span class=\"den\">2<\u002Fspan><\u002Fspan> } &nbsp;<span style=\"color:#8A97A4;font-size:21px;\">“<span class=\"mvar\">x<\u002Fspan> ≥ ½”<\u002Fspan>&nbsp;&nbsp;·&nbsp;&nbsp;{ <span class=\"mvar\">y<\u002Fspan> : <span class=\"mvar\">y<\u002Fspan> ≠ <span class=\"frac\"><span class=\"num\">3<\u002Fspan><span class=\"den\">2<\u002Fspan><\u002Fspan> } &nbsp;<span style=\"color:#8A97A4;font-size:21px;\">“<span class=\"mvar\">y<\u002Fspan> ≠ 1½”<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;min-height:0;background:#fff;border-radius:20px;border:1px solid #D4E8EC;box-shadow:0 3px 18px rgba(22,55,95,.06);padding:16px 24px;position:relative;overflow:hidden;display:flex;flex-direction:column;\">\n      <div style=\"font-size:20px;font-weight:800;letter-spacing:.06em;color:#8A97A4;margin-bottom:4px;\">ON A GRAPH · DOMAIN IS READ ACROSS THE <span style=\"color:#0B7E80;\">x<\u002Fspan>-AXIS, RANGE UP THE <span style=\"color:#0F7A45;\">y<\u002Fspan>-AXIS &nbsp;·&nbsp; f(<span class=\"mvar\" style=\"font-style:italic;\">x<\u002Fspan>) = √(2<span class=\"mvar\" style=\"font-style:italic;\">x<\u002Fspan> − 1)<\u002Fdiv>\n      <svg viewBox=\"0 0 960 300\" width=\"960\" height=\"300\" data-om-raster=\"\" preserveAspectRatio=\"xMidYMid meet\" style=\"flex:1;min-height:0;width:100%;height:auto;\">\n        <defs>\n          <marker id=\"ah\" markerWidth=\"10\" markerHeight=\"10\" refX=\"7\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#5A6B76\"><\u002Fpath><\u002Fmarker>\n        <\u002Fdefs>\n        <!-- range highlight band (y >= 0) -->\n        <rect x=\"140\" y=\"42\" width=\"20\" height=\"228\" fill=\"rgba(15,122,69,.12)\"><\u002Frect>\n        <!-- domain highlight band (x >= 1/2) -->\n        <rect x=\"197\" y=\"270\" width=\"703\" height=\"18\" fill=\"rgba(14,165,168,.14)\"><\u002Frect>\n        <!-- axes -->\n        <line x1=\"150\" y1=\"279\" x2=\"915\" y2=\"279\" stroke=\"#5A6B76\" stroke-width=\"2.5\" marker-end=\"url(#ah)\"><\u002Fline>\n        <line x1=\"150\" y1=\"279\" x2=\"150\" y2=\"30\" stroke=\"#5A6B76\" stroke-width=\"2.5\" marker-end=\"url(#ah)\"><\u002Fline>\n        <text x=\"922\" y=\"286\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"24\" fill=\"#1F2933\">x<\u002Ftext>\n        <text x=\"132\" y=\"34\" font-family=\"Georgia,serif\" font-style=\"italic\" font-size=\"24\" fill=\"#1F2933\">y<\u002Ftext>\n        <text x=\"128\" y=\"298\" font-family=\"sans-serif\" font-size=\"19\" fill=\"#8A97A4\">O<\u002Ftext>\n        <!-- curve y = sqrt(2x-1) -->\n        <path d=\"M197,279 L214,244 L233,224 L269,197 L305,179 L340,165 L390,146 L455,124 L545,99 L640,79 L780,54\" fill=\"none\" stroke=\"#1F6FB2\" stroke-width=\"4.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n        <!-- domain thick line + closed endpoint at x=1/2 -->\n        <line x1=\"197\" y1=\"279\" x2=\"905\" y2=\"279\" stroke=\"#0EA5A8\" stroke-width=\"7\"><\u002Fline>\n        <circle cx=\"197\" cy=\"279\" r=\"8\" fill=\"#0EA5A8\"><\u002Fcircle>\n        <text x=\"188\" y=\"303\" font-family=\"sans-serif\" font-size=\"19\" fill=\"#0B7E80\" text-anchor=\"middle\" font-weight=\"700\">½<\u002Ftext>\n        <text x=\"560\" y=\"303\" font-family=\"sans-serif\" font-size=\"21\" fill=\"#0B7E80\" font-weight=\"800\">Domain: x ≥ ½ &nbsp;{ x : x ≥ ½ }<\u002Ftext>\n        <!-- range thick line + endpoint at y=0 -->\n        <line x1=\"150\" y1=\"279\" x2=\"150\" y2=\"52\" stroke=\"#0F7A45\" stroke-width=\"7\"><\u002Fline>\n        <circle cx=\"150\" cy=\"279\" r=\"8\" fill=\"#0F7A45\"><\u002Fcircle>\n        <text x=\"165\" y=\"66\" font-family=\"sans-serif\" font-size=\"21\" fill=\"#0F7A45\" font-weight=\"800\">Range: y ≥ 0 &nbsp;{ y : y ≥ 0 }<\u002Ftext>\n        <!-- mapping example x=3 -->\n        <line x1=\"340\" y1=\"279\" x2=\"340\" y2=\"165\" stroke=\"#B0730C\" stroke-width=\"2\" stroke-dasharray=\"6 5\"><\u002Fline>\n        <line x1=\"340\" y1=\"165\" x2=\"150\" y2=\"165\" stroke=\"#B0730C\" stroke-width=\"2\" stroke-dasharray=\"6 5\"><\u002Fline>\n        <circle cx=\"340\" cy=\"165\" r=\"6.5\" fill=\"#FFC23C\" stroke=\"#B0730C\" stroke-width=\"2\"><\u002Fcircle>\n        <text x=\"340\" y=\"303\" font-family=\"sans-serif\" font-size=\"19\" fill=\"#B0730C\" text-anchor=\"middle\" font-weight=\"700\">3<\u002Ftext>\n        <text x=\"118\" y=\"171\" font-family=\"sans-serif\" font-size=\"18\" fill=\"#B0730C\" text-anchor=\"end\" font-weight=\"700\">≈2.24<\u002Ftext>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Worked example 14\" data-screen-label=\"WE14 domain range\" data-speaker-notes=\"Worked example 14. Find domain and range. For y equals root of 2x minus 1, the inside must be non-negative so 2x minus 1 is at least 0, giving x at least a half; the root is never negative so y is at least 0. For y equals 3x over 2x plus 1, the bottom cannot be zero so x is not minus a half; rearranging shows y cannot be three halves.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 14<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Determine the domain and range<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:28px 32px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:26px;font-weight:800;color:#0F7A45;\">a &nbsp; <span class=\"mvar\">y<\u002Fspan> = <span class=\"rt\">√<span style=\"border-top:2.5px solid;\">2<span class=\"mvar\">x<\u002Fspan> − 1<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:26px;line-height:1.6;\">Inside must be ≥ 0:<br>2<span class=\"mvar\">x<\u002Fspan> − 1 ≥ 0 ⇒ <span class=\"mvar\">x<\u002Fspan> ≥ <span class=\"frac\"><span class=\"num\">1<\u002Fspan><span class=\"den\">2<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div style=\"background:#E6F6F6;border-radius:12px;padding:14px 20px;font-size:25px;\">Domain: { <span class=\"mvar\">x<\u002Fspan> : <span class=\"mvar\">x<\u002Fspan> ≥ <span class=\"frac\"><span class=\"num\">1<\u002Fspan><span class=\"den\">2<\u002Fspan><\u002Fspan> }<\u002Fdiv>\n      <div style=\"font-size:26px;line-height:1.5;\">A √ gives only 0 or more, so:<\u002Fdiv>\n      <div style=\"background:#EAF6EE;border-radius:12px;padding:14px 20px;font-size:25px;\">Range: { <span class=\"mvar\">y<\u002Fspan> : <span class=\"mvar\">y<\u002Fspan> ≥ 0 }<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:20px;padding:28px 32px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:10px;\">\n      <div style=\"font-size:26px;font-weight:800;color:#0F7A45;\">b &nbsp; <span class=\"mvar\">y<\u002Fspan> = <span class=\"frac\"><span class=\"num\">3<span class=\"mvar\">x<\u002Fspan><\u002Fspan><span class=\"den\">2<span class=\"mvar\">x<\u002Fspan> + 1<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:25px;line-height:1.5;\">Bottom ≠ 0: &nbsp;2<span class=\"mvar\">x<\u002Fspan> + 1 ≠ 0 ⇒ <span class=\"mvar\">x<\u002Fspan> ≠ −<span class=\"frac\"><span class=\"num\">1<\u002Fspan><span class=\"den\">2<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div style=\"background:#E6F6F6;border-radius:12px;padding:12px 18px;font-size:24px;\">Domain: { <span class=\"mvar\">x<\u002Fspan> : <span class=\"mvar\">x<\u002Fspan> ≠ −<span class=\"frac\"><span class=\"num\">1<\u002Fspan><span class=\"den\">2<\u002Fspan><\u002Fspan> }<\u002Fdiv>\n      <details class=\"rvtoggle\"><summary style=\"background:#EAF6EE;border:2px solid #0F7A45;border-radius:12px;padding:12px 20px;font-size:24px;font-weight:800;color:#0F7A45;display:inline-flex;gap:10px;align-items:center;\"><span style=\"font-size:18px;\">▶<\u002Fspan><span class=\"rv-shut\">Reveal range working<\u002Fspan><span class=\"rv-open\">Range ↓<\u002Fspan><\u002Fsummary><div style=\"margin-top:12px;font-size:24px;line-height:1.6;background:#fff;border:1px solid #D7E7DD;border-radius:12px;padding:16px 20px;\">Make <span class=\"mvar\">x<\u002Fspan> the subject: <span class=\"mvar\">x<\u002Fspan> = <span class=\"frac\"><span class=\"num\">−<span class=\"mvar\">y<\u002Fspan><\u002Fspan><span class=\"den\">2<span class=\"mvar\">y<\u002Fspan> − 3<\u002Fspan><\u002Fspan><br>Bottom ≠ 0 ⇒ <span class=\"mvar\">y<\u002Fspan> ≠ <span class=\"frac\"><span class=\"num\">3<\u002Fspan><span class=\"den\">2<\u002Fspan><\u002Fspan><br><b>Range: { <span class=\"mvar\">y<\u002Fspan> : <span class=\"mvar\">y<\u002Fspan> ≠ <span class=\"frac\"><span class=\"num\">3<\u002Fspan><span class=\"den\">2<\u002Fspan><\u002Fspan> }<\u002Fb><\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Composite functions\" data-screen-label=\"Composite concept + drill\" data-speaker-notes=\"A composite function feeds one function's output into another. fg of x means do g first, then f. The letter closest to x acts first. Work from the inside out.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#B0730C;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">DRILL<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Composite functions — order matters<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:54px;margin-bottom:24px;\">fg(<span class=\"mvar\">x<\u002Fspan>): the <span style=\"color:#B0730C;\">letter next to <span class=\"mvar\">x<\u002Fspan><\u002Fspan> acts first<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1.05fr .95fr;gap:40px;flex:1;align-items:center;\">\n    <div style=\"display:flex;flex-direction:column;gap:18px;\">\n      <p style=\"font-size:30px;line-height:1.5;\">A <b>composite function<\u002Fb> puts the output of one function into another. Read <b>right to left<\u002Fb>:<\u002Fp>\n      <div style=\"background:#FFF6E6;border-radius:16px;padding:22px 28px;font-size:28px;line-height:1.5;\"><b>fg(<span class=\"mvar\">x<\u002Fspan>)<\u002Fb> = f( g(<span class=\"mvar\">x<\u002Fspan>) ) → do <b>g first<\u002Fb>, then <b>f<\u002Fb>.<\u002Fdiv>\n      <div style=\"background:#E4F0F9;border-radius:16px;padding:22px 28px;font-size:28px;line-height:1.5;\"><b>ff(<span class=\"mvar\">x<\u002Fspan>)<\u002Fb> = f( f(<span class=\"mvar\">x<\u002Fspan>) ) → apply <b>f twice<\u002Fb>.<\u002Fdiv>\n      <div style=\"background:#FFEEEB;border-radius:16px;padding:22px 28px;font-size:26px;line-height:1.4;color:#8B4034;\">⚠ fg(<span class=\"mvar\">x<\u002Fspan>) is <b>usually not<\u002Fb> the same as gf(<span class=\"mvar\">x<\u002Fspan>).<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:20px;padding:34px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:20px;align-items:center;\">\n      <div style=\"font-size:23px;font-weight:800;color:#8A97A4;letter-spacing:.06em;\">INSIDE-OUT ORDER<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:60px;height:60px;border-radius:14px;background:#FFC23C;color:#1F2933;font-weight:800;font-size:28px;display:flex;align-items:center;justify-content:center;\"><span class=\"mvar\">x<\u002Fspan><\u002Fspan><span style=\"font-size:24px;color:#5A6B76;\">→<\u002Fspan><span style=\"height:60px;border-radius:14px;background:#0EA5A8;color:#fff;font-weight:700;font-size:28px;display:flex;align-items:center;padding:0 20px;\">g<\u002Fspan><span style=\"font-size:24px;color:#5A6B76;\">→<\u002Fspan><span style=\"height:60px;border-radius:14px;background:#1F6FB2;color:#fff;font-weight:700;font-size:28px;display:flex;align-items:center;padding:0 20px;\">f<\u002Fspan><span style=\"font-size:24px;color:#5A6B76;\">→<\u002Fspan><span style=\"width:96px;height:60px;border-radius:14px;background:#0F7A45;color:#fff;font-weight:800;font-size:22px;display:flex;align-items:center;justify-content:center;\">fg(x)<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:25px;color:#5A6B76;text-align:center;\">g is nearest <span class=\"mvar\">x<\u002Fspan>, so g goes first.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Worked examples 15 &amp; 16\" data-screen-label=\"WE15-16 composite\" data-speaker-notes=\"Worked examples 15 and 16 on composite functions. WE15: f of x equals 2x minus 1, g of x equals x squared plus 6. fg of x is 2 times x squared plus 6 minus 1 equals 2x squared plus 11. ff of x is 2 times 2x minus 1 minus 1 equals 4x minus 3. WE16 evaluates numeric composites like gf of 4 equals minus 5, fg of 4 equals 3.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLES 15 &amp; 16<\u002Fspan><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">Composite functions — inside first<\u002Fspan><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px;flex:1;\">\n    <div style=\"background:#fff;border-radius:20px;padding:28px 32px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#0F7A45;\">WE15 · f(<span class=\"mvar\">x<\u002Fspan>) = 2<span class=\"mvar\">x<\u002Fspan> − 1, &nbsp;g(<span class=\"mvar\">x<\u002Fspan>) = <span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup> + 6<\u002Fdiv>\n      <div style=\"font-size:26px;line-height:1.7;\">\n        <b style=\"color:#1F6FB2;\">a<\u002Fb> fg(<span class=\"mvar\">x<\u002Fspan>) = 2(<span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup> + 6) − 1<br>\n        &nbsp;&nbsp;&nbsp;&nbsp;= 2<span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup> + 12 − 1 = <b>2<span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup> + 11<\u002Fb><br>\n        <b style=\"color:#1F6FB2;\">b<\u002Fb> ff(<span class=\"mvar\">x<\u002Fspan>) = 2(2<span class=\"mvar\">x<\u002Fspan> − 1) − 1<br>\n        &nbsp;&nbsp;&nbsp;&nbsp;= 4<span class=\"mvar\">x<\u002Fspan> − 2 − 1 = <b>4<span class=\"mvar\">x<\u002Fspan> − 3<\u002Fb>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border-radius:20px;padding:28px 32px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:10px;\">\n      <div style=\"font-size:24px;font-weight:800;color:#0F7A45;\">WE16 · f(<span class=\"mvar\">x<\u002Fspan>) = <span class=\"mvar\">x<\u002Fspan><sup>2<\u002Fsup> − 2<span class=\"mvar\">x<\u002Fspan>, &nbsp;g(<span class=\"mvar\">x<\u002Fspan>) = 3 − <span class=\"mvar\">x<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:25px;line-height:1.7;\">\n        <b style=\"color:#1F6FB2;\">a<\u002Fb> gf(4) = g[16−8] = g[8] = 3−8 = <b>−5<\u002Fb><br>\n        <b style=\"color:#1F6FB2;\">b<\u002Fb> fg(4) = f[3−4] = f[−1] = 1+2 = <b>3<\u002Fb><br>\n        <b style=\"color:#1F6FB2;\">c<\u002Fb> ff(−1) = f[1+2] = f[3] = 9−6 = <b>3<\u002Fb><br>\n        <b style=\"color:#1F6FB2;\">d<\u002Fb> gg(100) = g[3−100] = g[−97] = <b>100<\u002Fb>\n      <\u002Fdiv>\n      <div style=\"margin-top:auto;background:#FFF6E6;border-radius:12px;padding:12px 18px;font-size:23px;color:#8A5A08;\">Work the <b>inner<\u002Fb> function first, then feed its answer into the outer one.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Inverse functions\" data-screen-label=\"Inverse concept\" data-speaker-notes=\"An inverse function undoes the original. Two methods: reverse the flow diagram, or set y equals the function, make x the subject, then swap to x. Written f to the minus one.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\"><span style=\"width:52px;height:6px;background:#0EA5A8;border-radius:3px;\"><\u002Fspan><span style=\"font-size:26px;font-weight:700;letter-spacing:.14em;color:#0B7E80;\">CONCEPT<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:54px;margin-bottom:24px;\">Inverse function f<sup>−1<\u002Fsup> — two methods<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px;flex:1;\">\n    <div style=\"background:#E4F0F9;border-radius:20px;padding:32px 36px;display:flex;flex-direction:column;gap:14px;justify-content:center;\">\n      <div style=\"font-size:30px;font-weight:800;color:#1F6FB2;\">Method 1 · reverse the flow<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.5;\">Draw the function as a flow of operations, then <b>reverse the arrows<\u002Fb> and use the <b>inverse<\u002Fb> of each step.<\u002Fp>\n      <div style=\"background:#fff;border-radius:12px;padding:16px 20px;font-size:25px;line-height:1.5;\">×3 then −4 &nbsp;→&nbsp; reverse: <b>+4 then ÷3<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#EAF6EE;border-radius:20px;padding:32px 36px;display:flex;flex-direction:column;gap:14px;justify-content:center;\">\n      <div style=\"font-size:30px;font-weight:800;color:#0F7A45;\">Method 2 · reverse the mapping<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.5;\">Let <span class=\"mvar\">y<\u002Fspan> = f(<span class=\"mvar\">x<\u002Fspan>), <b>make <span class=\"mvar\">x<\u002Fspan> the subject<\u002Fb>, then rewrite with <span class=\"mvar\">x<\u002Fspan> as the input.<\u002Fp>\n      <div style=\"background:#fff;border-radius:12px;padding:16px 20px;font-size:25px;line-height:1.5;\"><span class=\"mvar\">y<\u002Fspan> = 3<span class=\"mvar\">x<\u002Fspan> − 4 → <span class=\"mvar\">x<\u002Fspan> = <span class=\"frac\"><span class=\"num\"><span class=\"mvar\">y<\u002Fspan> + 4<\u002Fspan><span class=\"den\">3<\u002Fspan><\u002Fspan> → f<sup>−1<\u002Fsup>(<span class=\"mvar\">x<\u002Fspan>) = <span class=\"frac\"><span class=\"num\"><span class=\"mvar\">x<\u002Fspan> + 4<\u002Fspan><span class=\"den\">3<\u002Fspan><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Builder: Inverse function\" data-screen-label=\"22.3 inverse builder\" data-speaker-notes=\"Interactive step-by-step builder for finding an inverse function by the mapping method. Press Next: write y equals the rule, swap so y maps back, make x the subject step by step, then rewrite in terms of x.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#0B2E45;color:#EAF4FB;overflow:hidden;\">\n  <div class=\"stut\" data-step=\"0\" data-max=\"5\" style=\"display:flex;flex-direction:column;height:100%;\">\n    <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:8px;\"><span style=\"white-space:nowrap;background:#3E9BE0;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">STEP-BY-STEP BUILDER<\u002Fspan><span style=\"font-size:24px;color:#8FB8D6;font-weight:500;\">Find the inverse by the mapping method<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:46px;margin-bottom:6px;color:#fff;\">Find f<sup>−1<\u002Fsup>(<span class=\"mvar\">x<\u002Fspan>) &nbsp;for&nbsp; f(<span class=\"mvar\">x<\u002Fspan>) = 3<span class=\"mvar\">x<\u002Fspan> − 4<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1.15fr .85fr;gap:36px;flex:1;min-height:0;\">\n      <div style=\"background:#08475f;border-radius:22px;padding:36px 44px;display:flex;flex-direction:column;justify-content:center;gap:22px;\">\n        <div class=\"sl\" data-min=\"0\" style=\"font-size:42px;font-weight:800;color:#fff;\">f(<span class=\"mvar\">x<\u002Fspan>) = 3<span class=\"mvar\">x<\u002Fspan> − 4<\u002Fdiv>\n        <div class=\"sl\" data-min=\"1\" style=\"font-size:40px;font-weight:700;color:#BFE3FF;\"><span style=\"color:#7FC4F5;\">let:<\u002Fspan>&nbsp; <span class=\"mvar\">y<\u002Fspan> = 3<span class=\"mvar\">x<\u002Fspan> − 4<\u002Fdiv>\n        <div class=\"sl\" data-min=\"2\" style=\"font-size:40px;font-weight:700;color:#BFE3FF;\"><span style=\"color:#7FC4F5;\">+4:<\u002Fspan>&nbsp; <span class=\"mvar\">y<\u002Fspan> + 4 = 3<span class=\"mvar\">x<\u002Fspan><\u002Fdiv>\n        <div class=\"sl\" data-min=\"3\" style=\"font-size:40px;font-weight:700;color:#BFE3FF;\"><span style=\"color:#7FC4F5;\">÷3:<\u002Fspan>&nbsp; <span class=\"mvar\">x<\u002Fspan> = <span class=\"frac\"><span class=\"num\"><span class=\"mvar\">y<\u002Fspan> + 4<\u002Fspan><span class=\"den\">3<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"sl\" data-min=\"4\" style=\"font-size:40px;font-weight:700;color:#BFE3FF;\"><span style=\"color:#7FC4F5;\">swap<\u002Fspan> <span class=\"mvar\">y<\u002Fspan> → <span class=\"mvar\">x<\u002Fspan><\u002Fdiv>\n        <div class=\"sl\" data-min=\"5\" style=\"font-size:42px;font-weight:800;color:#FFE08A;\">f<sup>−1<\u002Fsup>(<span class=\"mvar\">x<\u002Fspan>) = <span class=\"frac\"><span class=\"num\"><span class=\"mvar\">x<\u002Fspan> + 4<\u002Fspan><span class=\"den\">3<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"background:#08475f;border-radius:18px;padding:26px 30px;flex:1;display:flex;flex-direction:column;justify-content:center;\">\n          <div class=\"snote\" data-step=\"0\" style=\"display:block;\"><b style=\"color:#7FC4F5;font-size:26px;\">Start.<\u002Fb><div style=\"font-size:27px;line-height:1.5;margin-top:10px;\">We want the rule that <b>undoes<\u002Fb> f. Press <b>Next<\u002Fb> to build f<sup>−1<\u002Fsup> one step at a time.<\u002Fdiv><\u002Fdiv>\n          <div class=\"snote\" data-step=\"1\"><b style=\"color:#7FC4F5;font-size:26px;\">Step 1 · let <span class=\"mvar\">y<\u002Fspan> = f(<span class=\"mvar\">x<\u002Fspan>).<\u002Fb><div style=\"font-size:27px;line-height:1.5;margin-top:10px;\">Write the output as <span class=\"mvar\">y<\u002Fspan>. Now we will make <span class=\"mvar\">x<\u002Fspan> the subject.<\u002Fdiv><\u002Fdiv>\n          <div class=\"snote\" data-step=\"2\"><b style=\"color:#7FC4F5;font-size:26px;\">Step 2 · undo −4.<\u002Fb><div style=\"font-size:27px;line-height:1.5;margin-top:10px;\">Add 4 to both sides — the inverse of subtracting 4.<\u002Fdiv><\u002Fdiv>\n          <div class=\"snote\" data-step=\"3\"><b style=\"color:#7FC4F5;font-size:26px;\">Step 3 · undo ×3.<\u002Fb><div style=\"font-size:27px;line-height:1.5;margin-top:10px;\">Divide both sides by 3. Now <span class=\"mvar\">x<\u002Fspan> is the subject.<\u002Fdiv><\u002Fdiv>\n          <div class=\"snote\" data-step=\"4\"><b style=\"color:#7FC4F5;font-size:26px;\">Step 4 · swap the letter.<\u002Fb><div style=\"font-size:27px;line-height:1.5;margin-top:10px;\">The inverse takes <span class=\"mvar\">y<\u002Fspan> back to <span class=\"mvar\">x<\u002Fspan>. Rewrite it as a function of <span class=\"mvar\">x<\u002Fspan>.<\u002Fdiv><\u002Fdiv>\n          <div class=\"snote\" data-step=\"5\"><b style=\"color:#FFE08A;font-size:26px;\">Done!<\u002Fb><div style=\"font-size:27px;line-height:1.5;margin-top:10px;\">f<sup>−1<\u002Fsup>(<span class=\"mvar\">x<\u002Fspan>) = <span class=\"frac\"><span class=\"num\"><span class=\"mvar\">x<\u002Fspan> + 4<\u002Fspan><span class=\"den\">3<\u002Fspan><\u002Fspan>. Check: f(5)=11 and f<sup>−1<\u002Fsup>(11)=5 ✓<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:16px;\">\n          <button class=\"stut-prev\" style=\"flex:1;background:#0B2E45;border:2px solid #3E9BE0;color:#BFE3FF;font-weight:800;font-size:26px;padding:16px;border-radius:14px;cursor:pointer;\">‹ Back<\u002Fbutton>\n          <span class=\"stut-badge\" style=\"font-size:24px;font-weight:800;color:#8FB8D6;min-width:120px;text-align:center;\">Step 0 / 5<\u002Fspan>\n          <button class=\"stut-next\" style=\"flex:1;background:#3E9BE0;border:2px solid #3E9BE0;color:#fff;font-weight:800;font-size:26px;padding:16px;border-radius:14px;cursor:pointer;\">Next ›<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Worked examples 17 &amp; 18\" data-screen-label=\"WE17-18 inverse flow\" data-speaker-notes=\"Worked examples 17 and 18 find inverses using method 1, the flow diagram. These are the original textbook figures showing the forwa
