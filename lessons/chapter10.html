  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));

    // events at the element — warn only; real JS errors carry message/error.

    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    let template = JSON.parse(templateEl.textContent);

    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};

      const entry = manifest[uuid];

            (entry.compressed ? toBase64(finalBytes) : entry.data);

          const blob = new Blob([finalBytes], { type: entry.mime });

      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });

        resourceBlobs[blobUrls[uuid]] = blob;
      }

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

eorgia','Times New Roman',serif;\n}\n*{box-sizing:border-box;}\nsection{font-family:var(--body); color:var(--ink); -webkit-font-smoothing:antialiased;}\nh1,h2,h3,h4{font-family:var(--head); margin:0; line-height:1.05;}\np{margin:0;}\n.mvar{font-family:var(--mathf); font-style:italic;}\n@keyframes fadeUp{from{opacity:0; transform:translateY(26px);}to{opacity:1; transform:none;}}\n@keyframes popIn{0%{opacity:0; transform:scale(.72);}60%{opacity:1; transform:scale(1.06);}100%{opacity:1; transform:scale(1);}}\n@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}\n@keyframes spinIn{from{opacity:0; transform:rotate(-8deg) scale(.8);}to{opacity:1; transform:none;}}\n@media (prefers-reduced-motion:no-preference){\n  [data-deck-active] [data-anim]{animation:fadeUp .6s cubic-bezier(.34,1.56,.64,1) both;}\n  [data-deck-active] [data-anim2]{animation:fadeUp .6s .12s cubic-bezier(.34,1.56,.64,1) both;}\n  [data-deck-active] [data-anim3]{animation:fadeUp .6s .24s cubic-bezier(.34,1.56,.64,1) both;}\n  [data-deck-active] [data-anim4]{animation:fadeUp .6s .36s cubic-bezier(.34,1.56,.64,1) both;}\n  [data-deck-active] [data-pop]{animation:popIn .6s .1s cubic-bezier(.34,1.56,.64,1) both;}\n  [data-deck-active] [data-float]{animation:floatY 4.5s ease-in-out infinite;}\n}\n<\u002Fstyle>\n<script src=\"dc2bc836-bd2a-4cb7-b50d-3e5eb493c549\"><\u002Fscript>\n<script src=\"1442a50b-5a64-4776-9ef8-bb58d21e7dc8\"><\u002Fscript>\n<script type=\"application/json\" id=\"speaker-notes\">[\"Welcome to Chapter 10. This chapter has two big ideas: straight-line graphs and quadratic expressions & equations. The deck is interactive — flip cards, drag-and-drop, quizzes and a line explorer.\",\"These are the learning objectives for the chapter. By the end you should be able to do every one of these.\",\"Warm-up matching game. Drag each key term on the left onto its correct definition on the right. Correct matches lock in green; wrong ones flash red.\",\"Section 1: straight line graphs. Everything about drawing lines, reading their equations, and measuring them.\",\"Gradient = steepness = rise over run. Diagram shows the rise/run triangle. Worked example, then a check question they reveal.\",\"The equation of a straight line. m is the gradient, c is the y-intercept. Diagram links each letter to the graph.\",\"Midpoint = average of the coordinates. Diagram shows the midpoint halfway along a segment. Worked example and check.\",\"To draw a line, build a table of values: choose x-values, work out y from the equation, plot the points, join them with a straight line.\",\"Interactive: students drag point A and point B. The line, the gradient and the equation y=mx+c update live. Great for building intuition about positive, negative, steep and shallow gradients.\",\"To find gradient from a graph: pick two clear points, draw the rise/run triangle, divide rise by run. Watch the sign — up-hill is positive, down-hill is negative.\",\"When you only have coordinates, use the formula: gradient = (y2 minus y1) over (x2 minus x1). Subtract in the same order top and bottom.\",\"Rearrange any linear equation into y = mx + c to read off the gradient and intercept. Make y the subject first.\",\"Model worked solution revealed step by step. Find the equation of the line through (1,3) and (3,9). Reveal one step at a time to keep students thinking ahead.\",\"Parallel lines have equal gradients. Perpendicular gradients multiply to negative one — flip the fraction and change the sign (negative reciprocal).\",\"To find where a line crosses the axes: set x = 0 for the y-intercept, set y = 0 for the x-intercept. These two points are enough to sketch the line.\",\"Length of a line segment uses Pythagoras: draw a right triangle with the horizontal and vertical differences, then length = square root of (dx squared plus dy squared).\",\"Self-check practice. Students work out each midpoint, then tap to reveal. Encourage them to do all three before revealing.\",\"Multiple-choice quiz on straight lines. Students tap an answer; correct locks green, wrong flashes and lets them retry. Feedback appears below each question.\",\"Extended-tier questions on straight lines: perpendicular through a point, collinear points, and finding an unknown for perpendicularity. Try before revealing full worked solutions.\",\"Built-in scored exam for Lesson 10.1. 18 exam-style questions, one at a time, with a running score, instant feedback and explanations, and a final results screen. Students can retry.\",\"Section 2: quadratic expressions and equations. Expanding, squaring, factorising, and solving.\",\"Expand means multiply out brackets. The area model shows why: the rectangle area equals the sum of the four smaller areas.\",\"A quadratic expression has a squared term as its highest power. General form a x-squared plus b x plus c.\",\"A quadratic equation sets a quadratic expression equal to zero. Solving means finding the values of x (the roots) that make it true.\",\"The difference of two squares is a special pattern: a squared minus b squared factorises to (a+b)(a−b). Recognising it saves lots of work.\",\"Expand two brackets with FOIL or the grid method: every term in the first bracket multiplies every term in the second. Then collect like terms.\",\"Squaring a bracket is a special expansion. (a+b)² = a² + 2ab + b². The common mistake is forgetting the middle 2ab term.\",\"Factorising reverses expanding. For x² + bx + c, find two numbers that multiply to c and add to b. Those numbers go in the brackets.\",\"Flip-card practice. Students read the quadratic, factorise it in their head or on paper, then tap the card to flip and check. Twelve cards covering positive, negative, difference of squares and perfect squares.\",\"Mixed self-check grid. Includes ordinary quadratics, difference of two squares, and perfect squares. Students should identify the type first, then factorise, then reveal.\",\"To solve a quadratic equation: rearrange so it equals zero, factorise, then use the fact that if a product is zero one of the factors must be zero. Set each bracket to zero.\",\"Fully worked quadratic revealed one step at a time. This one needs rearranging first. Great for modelling the full method under exam conditions.\",\"Equations with algebraic fractions: multiply through by the denominators to clear the fractions, which often produces a quadratic to solve by factorising.\",\"Multiple-choice quiz on quadratics: expanding, difference of squares, factorising and solving. Instant feedback per question.\",\"Extended-tier quadratics: harder leading coefficient, difference of squares with coefficients, and an equation needing rearrangement. Reveal full solutions.\",\"Exam-style worded problems that build a quadratic from a real context. These pull straight-line and quadratic skills together. Reveal the full method.\",\"Built-in scored exam for Lesson 10.2. 18 exam-style questions covering expanding, factorising, difference of squares, perfect squares and solving. Running score, instant feedback, results screen and retry.\",\"All the key formulas from Chapter 10 in one place — a revision reference.\",\"Mixed final quiz pulling together both halves of the chapter. Instant feedback per question.\",\"Wrap-up. Recap the two big ideas and encourage students to revisit the interactive slides for revision.\"]<\u002Fscript>\n<script src=\"14cb073c-47f4-4477-bdb6-8dabd6b132ad\"><\u002Fscript>\n<\u002Fhelmet>\n\n<x-import component-from-global-scope=\"deck-stage\" from=\"484982fb-8e53-4c78-8fc4-0390c38b8939#/92e47ca2-bd50-4866-91a7-c5b8222ce30e.js#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\">\n\n<section data-label=\"Title\" data-speaker-notes=\"Welcome to Chapter 10. This chapter has two big ideas: straight-line graphs and quadratic expressions &amp; equations. The deck is interactive — flip cards, drag-and-drop, quizzes and a line explorer.\">\n  <div style=\"position:absolute; inset:0; background:radial-gradient(1200px 700px at 82% -10%, #FFE9C2 0%, rgba(255,233,194,0) 60%), radial-gradient(1000px 700px at -8% 110%, #D7F3F1 0%, rgba(215,243,241,0) 60%), var(--paper); overflow:hidden;\">\n    <!-- decorative floaties -->\n    <div data-float=\"\" style=\"position:absolute; top:120px; left:120px; width:150px; height:150px; border-radius:32px; background:#FFC23C; opacity:.22; transform:rotate(12deg);\"><\u002Fdiv>\n    <div data-float=\"\" style=\"position:absolute; bottom:150px; right:220px; width:120px; height:120px; border-radius:50%; background:#0EA5A8; opacity:.18;\"><\u002Fdiv>\n    <div data-float=\"\" style=\"position:absolute; top:180px; right:150px; width:0; height:0; border-left:60px solid transparent; border-right:60px solid transparent; border-bottom:104px solid #7C5CFF; opacity:.15;\"><\u002Fdiv>\n\n    <div style=\"position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; padding:0 150px;\">\n      <div data-anim=\"\" style=\"display:inline-flex; align-items:center; gap:18px; background:#fff; border:3px solid var(--teal); color:var(--tealD); font-family:var(--head); font-weight:600; font-size:34px; padding:14px 30px; border-radius:999px; width:max-content; box-shadow:0 10px 26px rgba(14,165,168,.18);\">\n        <span style=\"font-size:36px;\">📘<\u002Fspan> Cambridge IGCSE™ Mathematics\n      <\u002Fdiv>\n      <h1 data-anim2=\"\" style=\"font-size:132px; font-weight:700; letter-spacing:-2px; margin-top:36px; color:var(--ink);\">Chapter 10<\u002Fh1>\n      <h2 data-anim2=\"\" style=\"font-size:76px; font-weight:600; margin-top:6px; line-height:1.05; max-width:1300px;\">\n        <span style=\"color:var(--teal);\">Straight Lines<\u002Fspan> &amp; <span style=\"color:var(--grape);\">Quadratic Equations<\u002Fspan>\n      <\u002Fh2>\n      <p data-anim3=\"\" style=\"font-size:36px; color:var(--ink2); margin-top:34px; max-width:1150px; font-weight:600;\">\n        Plot it, find its gradient, expand it, factorise it, solve it — an interactive tour with flip cards, drag-and-drop, quizzes and a live graph explorer.\n      <\u002Fp>\n      <div data-anim4=\"\" style=\"display:flex; gap:20px; margin-top:52px;\">\n        <div style=\"display:flex; align-items:center; gap:14px; background:#fff; border:2px solid var(--line); border-radius:18px; padding:18px 26px; box-shadow:0 8px 20px rgba(31,41,51,.06);\">\n          <span style=\"width:52px; height:52px; border-radius:14px; background:#D7F3F1; display:flex; align-items:center; justify-content:center; font-size:34px;\">📈<\u002Fspan>\n          <span style=\"font-weight:800; font-size:36px; color:var(--tealD);\">10.1 Straight line graphs<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:14px; background:#fff; border:2px solid var(--line); border-radius:18px; padding:18px 26px; box-shadow:0 8px 20px rgba(31,41,51,.06);\">\n          <span style=\"width:52px; height:52px; border-radius:14px; background:#EBE5FF; display:flex; align-items:center; justify-content:center; font-size:34px;\">✳️<\u002Fspan>\n          <span style=\"font-weight:800; font-size:36px; color:var(--grapeD);\">10.2 Quadratics<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Objectives\" data-speaker-notes=\"These are the learning objectives for the chapter. By the end you should be able to do every one of these.\">\n  <div style=\"position:absolute; inset:0; background:var(--paper); padding:88px 120px 80px;\">\n    <div data-anim=\"\" style=\"display:flex; align-items:center; gap:20px;\">\n      <span style=\"width:70px; height:70px; border-radius:20px; background:var(--sun); display:flex; align-items:center; justify-content:center; font-size:38px; box-shadow:0 8px 18px rgba(255,194,60,.4);\">🎯<\u002Fspan>\n      <h1 style=\"font-size:66px; font-weight:700;\">What you'll be able to do<\u002Fh1>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:26px 40px; margin-top:52px;\">\n      <div data-anim2=\"\" style=\"background:#fff; border:2px solid var(--line); border-top:8px solid var(--teal); border-radius:22px; padding:34px 36px; box-shadow:0 10px 24px rgba(31,41,51,.06);\">\n        <div style=\"font-family:var(--head); font-weight:600; font-size:36px; color:var(--tealD); margin-bottom:18px;\">📈 Straight line graphs<\u002Fdiv>\n        <ul style=\"margin:0; padding-left:26px; font-size:36px; line-height:1.5; font-weight:600; color:var(--ink);\">\n          <li>Plot a line from a table of values<\u002Fli>\n          <li>Use <span class=\"mvar\">y<\u002Fspan> = <span class=\"mvar\">m<\u002Fspan><span class=\"mvar\">x<\u002Fspan> + <span class=\"mvar\">c<\u002Fspan> to read gradient &amp; intercept<\u002Fli>\n          <li>Find the gradient from a graph or two points<\u002Fli>\n          <li>Recognise parallel &amp; perpendicular lines<\u002Fli>\n          <li>Find the length &amp; midpoint of a segment<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div data-anim3=\"\" style=\"background:#fff; border:2px solid var(--line); border-top:8px solid var(--grape); border-radius:22px; padding:34px 36px; box-shadow:0 10px 24px rgba(31,41,51,.06);\">\n        <div style=\"font-family:var(--head); font-weight:600; font-size:36px; color:var(--grapeD); margin-bottom:18px;\">✳️ Quadratic expressions &amp; equations<\u002Fdiv>\n        <ul style=\"margin:0; padding-left:26px; font-size:36px; line-height:1.5; font-weight:600; color:var(--ink);\">\n          <li>Expand two brackets and simplify<\u002Fli>\n          <li>Square a binomial: (<span class=\"mvar\">a<\u002Fspan> + <span class=\"mvar\">b<\u002Fspan>)<sup>2<\u002Fsup><\u002Fli>\n          <li>Factorise quadratics &amp; the difference of two squares<\u002Fli>\n          <li>Solve quadratic equations by factorising<\u002Fli>\n          <li>Solve equations with algebraic fractions<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-anim4=\"\" style=\"margin-top:34px; background:linear-gradient(90deg,#EBE5FF,#D7F3F1); border-radius:20px; padding:26px 34px; display:flex; align-items:center; gap:20px;\">\n      <span style=\"font-size:34px;\">👆<\u002Fspan>\n      <span style=\"font-size:35px; font-weight:700; color:var(--ink);\">This deck is <b>interactive<\u002Fb> — look for cards to <b>flip<\u002Fb>, points to <b>drag<\u002Fb>, questions to <b>tap<\u002Fb>, and steps to <b>reveal<\u002Fb>.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Vocab match\" data-speaker-notes=\"Warm-up matching game. Drag each key term on the left onto its correct definition on the right. Correct matches lock in green; wrong ones flash red.\">\n  <div style=\"position:absolute; inset:0; background:var(--paper); padding:70px 100px 60px;\">\n    <div style=\"display:flex; align-items:center; gap:18px;\">\n      <span style=\"width:64px; height:64px; border-radius:18px; background:var(--grape); display:flex; align-items:center; justify-content:center; font-size:34px; box-shadow:0 8px 18px rgba(124,92,255,.35);\">✋<\u002Fspan>\n      <div>\n        <h1 style=\"font-size:56px; font-weight:700;\">Warm-up: match the words<\u002Fh1>\n        <p style=\"font-size:32px; color:var(--ink2); font-weight:700;\">Drag each term on the left onto its matching definition.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:360px 1fr; gap:44px; margin-top:40px; align-items:start;\">\n      <div style=\"display:flex; flex-direction:column; gap:18px;\">\n        <div style=\"font-family:var(--head); font-weight:600; font-size:29px; color:var(--ink2); text-transform:uppercase; letter-spacing:1px;\">Terms<\u002Fdiv>\n        <div draggable=\"true\" data-term=\"grad\" style=\"cursor:grab; background:#fff; border:3px solid var(--teal); color:var(--tealD); font-weight:800; font-size:36px; padding:20px 24px; border-radius:16px; box-shadow:0 6px 16px rgba(14,165,168,.18);\">Gradient<\u002Fdiv>\n        <div draggable=\"true\" data-term=\"yint\" style=\"cursor:grab; background:#fff; border:3px solid var(--sky); color:#1E6FA8; font-weight:800; font-size:36px; padding:20px 24px; border-radius:16px; box-shadow:0 6px 16px rgba(45,156,219,.18);\"><span class=\"mvar\">y<\u002Fspan>-intercept<\u002Fdiv>\n        <div draggable=\"true\" data-term=\"mid\" style=\"cursor:grab; background:#fff; border:3px solid var(--sun); color:#9A6A00; font-weight:800; font-size:36px; padding:20px 24px; border-radius:16px; box-shadow:0 6px 16px rgba(255,194,60,.22);\">Midpoint<\u002Fdiv>\n        <div draggable=\"true\" data-term=\"perp\" style=\"cursor:grab; background:#fff; border:3px solid var(--coral); color:#C23A2B; font-weight:800; font-size:36px; padding:20px 24px; border-radius:16px; box-shadow:0 6px 16px rgba(255,107,92,.18);\">Perpendicular<\u002Fdiv>\n        <div draggable=\"true\" data-term=\"quad\" style=\"cursor:grab; background:#fff; border:3px solid var(--grape); color:var(--grapeD); font-weight:800; font-size:36px; padding:20px 24px; border-radius:16px; box-shadow:0 6px 16px rgba(124,92,255,.18);\">Quadratic<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:16px;\">\n        <div style=\"font-family:var(--head); font-weight:600; font-size:29px; color:var(--ink2); text-transform:uppercase; letter-spacing:1px;\">Definitions — drop here<\u002Fdiv>\n        <div data-drop=\"mid\" style=\"border:3px solid var(--line); border-radius:16px; padding:20px 24px; background:#fff; display:flex; align-items:center; gap:18px; min-height:78px;\">\n          <span data-drop-slot=\"\" style=\"min-width:180px; font-size:29px; color:#B7C0C7; font-weight:700; border-right:2px dashed #DDD6C4; padding-right:16px;\">drop here<\u002Fspan>\n          <span style=\"font-size:31px; font-weight:600;\">The exact middle point of a line segment joining two points.<\u002Fspan>\n        <\u002Fdiv>\n        <div data-drop=\"quad\" style=\"border:3px solid var(--line); border-radius:16px; padding:20px 24px; background:#fff; display:flex; align-items:center; gap:18px; min-height:78px;\">\n          <span data-drop-slot=\"\" style=\"min-width:180px; font-size:29px; color:#B7C0C7; font-weight:700; border-right:2px dashed #DDD6C4; padding-right:16px;\">drop here<\u002Fspan>\n          <span style=\"font-size:31px; font-weight:600;\">An expression where the highest power of the variable is 2.<\u002Fspan>\n        <\u002Fdiv>\n        <div data-drop=\"grad\" style=\"border:3px solid var(--line); border-radius:16px; padding:20px 24px; background:#fff; display:flex; align-items:center; gap:18px; min-height:78px;\">\n          <span data-drop-slot=\"\" style=\"min-width:180px; font-size:29px; color:#B7C0C7; font-weight:700; border-right:2px dashed #DDD6C4; padding-right:16px;\">drop here<\u002Fspan>\n          <span style=\"font-size:31px; font-weight:600;\">How steep a line is — the rise divided by the run.<\u002Fspan>\n        <\u002Fdiv>\n        <div data-drop=\"perp\" style=\"border:3px solid var(--line); border-radius:16px; padding:20px 24px; background:#fff; display:flex; align-items:center; gap:18px; min-height:78px;\">\n          <span data-drop-slot=\"\" style=\"min-width:180px; font-size:29px; color:#B7C0C7; font-weight:700; border-right:2px dashed #DDD6C4; padding-right:16px;\">drop here<\u002Fspan>\n          <span style=\"font-size:31px; font-weight:600;\">Two lines that meet at a right angle (90°).<\u002Fspan>\n        <\u002Fdiv>\n        <div data-drop=\"yint\" style=\"border:3px solid var(--line); border-radius:16px; padding:20px 24px; background:#fff; display:flex; align-items:center; gap:18px; min-height:78px;\">\n          <span data-drop-slot=\"\" style=\"min-width:180px; font-size:29px; color:#B7C0C7; font-weight:700; border-right:2px dashed #DDD6C4; padding-right:16px;\">drop here<\u002Fspan>\n          <span style=\"font-size:31px; font-weight:600;\">Where the line crosses the vertical axis — the value of <span class=\"mvar\">c<\u002Fspan>.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"10.1 Divider\" data-speaker-notes=\"Section 1: straight line graphs. Everything about drawing lines, reading their equations, and measuring them.\">\n  <div style=\"position:absolute; inset:0; background:linear-gradient(135deg,#0EA5A8 0%,#0A7E80 100%); overflow:hidden;\">\n    <div data-float=\"\" style=\"position:absolute; top:-60px; right:-60px; width:360px; height:360px; border-radius:50%; background:rgba(255,255,255,.10);\"><\u002Fdiv>\n    <div data-float=\"\" style=\"position:absolute; bottom:-80px; left:120px; width:240px; height:240px; border-radius:40px; background:rgba(255,255,255,.08); transform:rotate(18deg);\"><\u002Fdiv>\n    <svg sc-camel-view-box=\"0 0 400 400\" style=\"position:absolute; right:150px; bottom:120px; width:520px; height:520px; opacity:.28;\">\n      <g stroke=\"#fff\" stroke-width=\"2\" fill=\"none\">\n        <line x1=\"40\" y1=\"360\" x2=\"380\" y2=\"360\"><\u002Fline><line x1=\"40\" y1=\"360\" x2=\"40\" y2=\"20\"><\u002Fline>\n        <line x1=\"40\" y1=\"360\" x2=\"360\" y2=\"60\" stroke-width=\"6\"><\u002Fline>\n      <\u002Fg>\n      <circle cx=\"120\" cy=\"285\" r=\"10\" fill=\"#FFC23C\"><\u002Fcircle><circle cx=\"280\" cy=\"135\" r=\"10\" fill=\"#FFC23C\"><\u002Fcircle>\n    <\u002Fsvg>\n    <div style=\"position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; padding:0 150px; color:#fff;\">\n      <div data-anim=\"\" style=\"font-family:var(--head); font-weight:600; font-size:46px; opacity:.9;\">Section 10.1<\u002Fdiv>\n      <h1 data-anim2=\"\" style=\"font-size:118px; font-weight:700; margin-top:8px; letter-spacing:-1px;\">Straight line graphs<\u002Fh1>\n      <p data-anim3=\"\" style=\"font-size:38px; font-weight:600; margin-top:24px; max-width:1000px; opacity:.95;\">Plot lines, read <span class=\"mvar\">y<\u002Fspan> = <span class=\"mvar\">m<\u002Fspan><span class=\"mvar\">x<\u002Fspan> + <span class=\"mvar\">c<\u002Fspan>, measure gradients, and find lengths &amp; midpoints.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Vocab · Gradient\" data-speaker-notes=\"Gradient = steepness = rise over run. Diagram shows the rise/run triangle. Worked example, then a check question they reveal.\">\n  <div style=\"position:absolute; inset:0; background:var(--paper); padding:64px 100px 56px;\">\n    <div style=\"display:flex; align-items:center; gap:16px;\">\n      <span style=\"background:var(--teal); color:#fff; font-family:var(--head); font-weight:600; font-size:29px; padding:8px 20px; border-radius:999px;\">KEY TERM · 10.1<\u002Fspan>\n      <h1 style=\"font-size:64px; font-weight:700; color:var(--tealD);\">Gradient<\u002Fh1>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1.15fr .85fr; gap:44px; margin-top:34px; align-items:start;\">\n      <div style=\"display:flex; flex-direction:column; gap:22px;\">\n        <div style=\"background:#fff; border:2px solid var(--line); border-left:8px solid var(--teal); border-radius:18px; padding:26px 30px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:31px; color:var(--teal); margin-bottom:8px;\">Definition<\u002Fdiv>\n          <p style=\"font-size:37px; font-weight:600; line-height:1.4;\">The <b>gradient<\u002Fb> tells you how steep a line is. It is the change in <span class=\"mvar\">y<\u002Fspan> (the <b>rise<\u002Fb>) divided by the change in <span class=\"mvar\">x<\u002Fspan> (the <b>run<\u002Fb>).<\u002Fp>\n          <div style=\"margin-top:16px; background:#EAF8F8; border-radius:14px; padding:18px 22px; font-family:var(--mathf); font-size:36px; display:flex; align-items:center; justify-content:center; gap:12px;\"><span>gradient <span class=\"mvar\">m<\u002Fspan> =<\u002Fspan><span style=\"display:inline-flex; flex-direction:column; align-items:center;\"><span style=\"border-bottom:2px solid var(--ink); padding:2px 10px 6px; line-height:1.2;\">change in&nbsp;<span class=\"mvar\">y<\u002Fspan><\u002Fspan><span style=\"padding:6px 10px 2px; line-height:1.2;\">change in&nbsp;<span class=\"mvar\">x<\u002Fspan><\u002Fspan><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:26px 30px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:31px; color:var(--sun); margin-bottom:8px;\">💡 Worked example<\u002Fdiv>\n          <p style=\"font-size:35px; font-weight:600; line-height:1.45;\">A line rises 6 units for every 3 units it runs across.<\u002Fp>\n          <p style=\"font-size:37px; font-weight:800; margin-top:8px; color:var(--tealD);\"><span class=\"mvar\">m<\u002Fspan> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 5px;text-align:center;\"><span style=\"border-bottom:2px solid currentColor;padding:0 9px 3px;line-height:1.12;\">6<\u002Fspan><span style=\"padding:3px 9px 0;line-height:1.12;\">3<\u002Fspan><\u002Fspan> = <b>2<\u002Fb> &nbsp;→ &nbsp;the line goes up 2 for every 1 across.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:22px;\">\n        <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:22px; display:flex; justify-content:center;\">\n          <svg sc-camel-view-box=\"0 0 340 300\" style=\"width:100%; max-width:360px;\">\n            <defs><\u002Fdefs>\n            <g stroke=\"#EFEADC\" stroke-width=\"1\">\n              <line x1=\"40\" y1=\"20\" x2=\"40\" y2=\"260\"><\u002Fline><line x1=\"100\" y1=\"20\" x2=\"100\" y2=\"260\"><\u002Fline><line x1=\"160\" y1=\"20\" x2=\"160\" y2=\"260\"><\u002Fline><line x1=\"220\" y1=\"20\" x2=\"220\" y2=\"260\"><\u002Fline><line x1=\"280\" y1=\"20\" x2=\"280\" y2=\"260\"><\u002Fline>\n              <line x1=\"40\" y1=\"20\" x2=\"300\" y2=\"20\"><\u002Fline><line x1=\"40\" y1=\"80\" x2=\"300\" y2=\"80\"><\u002Fline><line x1=\"40\" y1=\"140\" x2=\"300\" y2=\"140\"><\u002Fline><line x1=\"40\" y1=\"200\" x2=\"300\" y2=\"200\"><\u002Fline>\n            <\u002Fg>\n            <line x1=\"40\" y1=\"260\" x2=\"300\" y2=\"260\" stroke=\"#C3CBD1\" stroke-width=\"2.5\"><\u002Fline>\n            <line x1=\"40\" y1=\"20\" x2=\"40\" y2=\"260\" stroke=\"#C3CBD1\" stroke-width=\"2.5\"><\u002Fline>\n            <line x1=\"60\" y1=\"240\" x2=\"280\" y2=\"40\" stroke=\"var(--teal)\" stroke-width=\"5\"><\u002Fline>\n            <polyline points=\"100,200 220,200 220,80\" fill=\"none\" stroke=\"var(--coral)\" stroke-width=\"3.5\" stroke-dasharray=\"7 6\"><\u002Fpolyline>\n            <text x=\"160\" y=\"228\" fill=\"var(--coral)\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"20\" text-anchor=\"middle\">run = 3<\u002Ftext>\n            <text x=\"234\" y=\"145\" fill=\"var(--coral)\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"20\">rise = 6<\u002Ftext>\n            <circle cx=\"100\" cy=\"200\" r=\"7\" fill=\"var(--grape)\"><\u002Fcircle><circle cx=\"220\" cy=\"80\" r=\"7\" fill=\"var(--grape)\"><\u002Fcircle>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"background:linear-gradient(90deg,#EAF8F8,#fff); border:2px solid var(--teal); border-radius:18px; padding:24px 28px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:29px; color:var(--teal);\">✅ Quick check<\u002Fdiv>\n          <p style=\"font-size:35px; font-weight:700; margin-top:6px;\">A line rises 10 for a run of 4. What is its gradient?<\u002Fp>\n          <button data-reveal=\"#chk-grad\" data-show=\"Tap to reveal answer\" data-hide=\"Hide answer\" style=\"margin-top:14px; cursor:pointer; font-family:var(--head); font-weight:600; font-size:29px; background:var(--teal); color:#fff; border:none; padding:12px 24px; border-radius:12px;\">Tap to reveal answer<\u002Fbutton>\n          <div id=\"chk-grad\" data-shown=\"0\" style=\"display:none; margin-top:14px; font-size:36px; font-weight:800; color:var(--tealD);\"><span class=\"mvar\">m<\u002Fspan> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 5px;text-align:center;\"><span style=\"border-bottom:2px solid currentColor;padding:0 9px 3px;line-height:1.12;\">10<\u002Fspan><span style=\"padding:3px 9px 0;line-height:1.12;\">4<\u002Fspan><\u002Fspan> = <b>2.5<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Vocab · y = mx + c\" data-speaker-notes=\"The equation of a straight line. m is the gradient, c is the y-intercept. Diagram links each letter to the graph.\">\n  <div style=\"position:absolute; inset:0; background:var(--paper); padding:64px 100px 56px;\">\n    <div style=\"display:flex; align-items:center; gap:16px;\">\n      <span style=\"background:var(--sky); color:#fff; font-family:var(--head); font-weight:600; font-size:29px; padding:8px 20px; border-radius:999px;\">KEY TERM · 10.1<\u002Fspan>\n      <h1 style=\"font-size:54px; font-weight:700; color:#1E6FA8; white-space:nowrap;\">Equation of a line: <span class=\"mvar\">y<\u002Fspan> = <span class=\"mvar\">m<\u002Fspan><span class=\"mvar\">x<\u002Fspan> + <span class=\"mvar\">c<\u002Fspan><\u002Fh1>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1.15fr .85fr; gap:44px; margin-top:34px; align-items:start;\">\n      <div style=\"display:flex; flex-direction:column; gap:22px;\">\n        <div style=\"background:#fff; border:2px solid var(--line); border-left:8px solid var(--sky); border-radius:18px; padding:26px 30px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:31px; color:var(--sky); margin-bottom:8px;\">Definition<\u002Fdiv>\n          <p style=\"font-size:37px; font-weight:600; line-height:1.4;\">Every straight line can be written as <span class=\"mvar\" style=\"font-weight:800\">y<\u002Fspan> = <span class=\"mvar\" style=\"font-weight:800\">m<\u002Fspan><span class=\"mvar\" style=\"font-weight:800\">x<\u002Fspan> + <span class=\"mvar\" style=\"font-weight:800\">c<\u002Fspan>.<\u002Fp>\n          <div style=\"display:flex; gap:16px; margin-top:16px;\">\n            <div style=\"flex:1; background:#EAF8F8; border-radius:14px; padding:16px 18px; text-align:center;\"><div style=\"font-family:var(--mathf); font-style:italic; font-size:40px; color:var(--teal); font-weight:bold;\">m<\u002Fdiv><div style=\"font-size:29px; font-weight:800; margin-top:4px;\">gradient<\u002Fdiv><div style=\"font-size:26px; color:var(--ink2); font-weight:600;\">(steepness)<\u002Fdiv><\u002Fdiv>\n            <div style=\"flex:1; background:#EAF2FA; border-radius:14px; padding:16px 18px; text-align:center;\"><div style=\"font-family:var(--mathf); font-style:italic; font-size:40px; color:var(--sky); font-weight:bold;\">c<\u002Fdiv><div style=\"font-size:29px; font-weight:800; margin-top:4px;\"><span class=\"mvar\">y<\u002Fspan>-intercept<\u002Fdiv><div style=\"font-size:26px; color:var(--ink2); font-weight:600;\">(where it crosses)<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:26px 30px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:31px; color:var(--sun); margin-bottom:8px;\">💡 Worked example<\u002Fdiv>\n          <p style=\"font-size:36px; font-weight:600; line-height:1.45;\">In <span class=\"mvar\">y<\u002Fspan> = 3<span class=\"mvar\">x<\u002Fspan> + 2, the gradient is <b>3<\u002Fb> and the line crosses the <span class=\"mvar\">y<\u002Fspan>-axis at <b>(0, 2)<\u002Fb>.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:22px;\">\n        <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:22px; display:flex; justify-content:center;\">\n          <svg sc-camel-view-box=\"0 0 340 300\" style=\"width:100%; max-width:360px;\">\n            <g stroke=\"#EFEADC\" stroke-width=\"1\"><line x1=\"40\" y1=\"20\" x2=\"40\" y2=\"260\"><\u002Fline><line x1=\"110\" y1=\"20\" x2=\"110\" y2=\"260\"><\u002Fline><line x1=\"180\" y1=\"20\" x2=\"180\" y2=\"260\"><\u002Fline><line x1=\"250\" y1=\"20\" x2=\"250\" y2=\"260\"><\u002Fline><line x1=\"40\" y1=\"20\" x2=\"300\" y2=\"20\"><\u002Fline><line x1=\"40\" y1=\"90\" x2=\"300\" y2=\"90\"><\u002Fline><line x1=\"40\" y1=\"160\" x2=\"300\" y2=\"160\"><\u002Fline><line x1=\"40\" y1=\"230\" x2=\"300\" y2=\"230\"><\u002Fline><\u002Fg>\n            <line x1=\"40\" y1=\"260\" x2=\"300\" y2=\"260\" stroke=\"#C3CBD1\" stroke-width=\"2.5\"><\u002Fline><line x1=\"40\" y1=\"20\" x2=\"40\" y2=\"260\" stroke=\"#C3CBD1\" stroke-width=\"2.5\"><\u002Fline>\n            <line x1=\"40\" y1=\"215\" x2=\"300\" y2=\"35\" stroke=\"var(--sky)\" stroke-width=\"5\"><\u002Fline>\n            <circle cx=\"40\" cy=\"215\" r=\"8\" fill=\"var(--sky)\"><\u002Fcircle>\n            <text x=\"52\" y=\"208\" fill=\"#1E6FA8\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"20\">c = (0, 2)<\u002Ftext>\n            <text x=\"210\" y=\"110\" fill=\"var(--sky)\" font-family=\"Georgia\" font-style=\"italic\" font-weight=\"bold\" font-size=\"26\">y = mx + c<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"background:linear-gradient(90deg,#EAF2FA,#fff); border:2px solid var(--sky); border-radius:18px; padding:24px 28px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:29px; color:var(--sky);\">✅ Quick check<\u002Fdiv>\n          <p style=\"font-size:35px; font-weight:700; margin-top:6px;\">For <span class=\"mvar\">y<\u002Fspan> = −2<span class=\"mvar\">x<\u002Fspan> + 5, state the gradient and <span class=\"mvar\">y<\u002Fspan>-intercept.<\u002Fp>\n          <button data-reveal=\"#chk-mxc\" data-show=\"Tap to reveal answer\" data-hide=\"Hide answer\" style=\"margin-top:14px; cursor:pointer; font-family:var(--head); font-weight:600; font-size:29px; background:var(--sky); color:#fff; border:none; padding:12px 24px; border-radius:12px;\">Tap to reveal answer<\u002Fbutton>\n          <div id=\"chk-mxc\" data-shown=\"0\" style=\"display:none; margin-top:14px; font-size:35px; font-weight:800; color:#1E6FA8;\">gradient = −2, &nbsp; crosses at (0, 5)<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Vocab · Midpoint\" data-speaker-notes=\"Midpoint = average of the coordinates. Diagram shows the midpoint halfway along a segment. Worked example and check.\">\n  <div style=\"position:absolute; inset:0; background:var(--paper); padding:64px 100px 56px;\">\n    <div style=\"display:flex; align-items:center; gap:16px;\">\n      <span style=\"background:var(--sun); color:#5A4300; font-family:var(--head); font-weight:600; font-size:29px; padding:8px 20px; border-radius:999px;\">KEY TERM · 10.1<\u002Fspan>\n      <h1 style=\"font-size:64px; font-weight:700; color:#9A6A00;\">Midpoint<\u002Fh1>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1.15fr .85fr; gap:44px; margin-top:34px; align-items:start;\">\n      <div style=\"display:flex; flex-direction:column; gap:22px;\">\n        <div style=\"background:#fff; border:2px solid var(--line); border-left:8px solid var(--sun); border-radius:18px; padding:26px 30px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:31px; color:#9A6A00; margin-bottom:8px;\">Definition<\u002Fdiv>\n          <p style=\"font-size:37px; font-weight:600; line-height:1.4;\">The <b>midpoint<\u002Fb> is the point exactly halfway between two points. Average the <span class=\"mvar\">x<\u002Fspan>-coordinates and average the <span class=\"mvar\">y<\u002Fspan>-coordinates.<\u002Fp>\n          <div style=\"margin-top:16px; background:#FFF6E0; border-radius:14px; padding:16px 22px; font-family:var(--mathf); font-size:36px; text-align:center;\">midpoint = ( <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 5px;text-align:center;\"><span style=\"border-bottom:2px solid currentColor;padding:0 9px 3px;line-height:1.12;\"><span class=\"mvar\">x<\u002Fspan>₁ + <span class=\"mvar\">x<\u002Fspan>₂<\u002Fspan><span style=\"padding:3px 9px 0;line-height:1.12;\">2<\u002Fspan><\u002Fspan> , <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 5px;text-align:center;\"><span style=\"border-bottom:2px solid currentColor;padding:0 9px 3px;line-height:1.12;\"><span class=\"mvar\">y<\u002Fspan>₁ + <span class=\"mvar\">y<\u002Fspan>₂<\u002Fspan><span style=\"padding:3px 9px 0;line-height:1.12;\">2<\u002Fspan><\u002Fspan> )<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:26px 30px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:31px; color:var(--leaf); margin-bottom:8px;\">💡 Worked example<\u002Fdiv>\n          <p style=\"font-size:35px; font-weight:600; line-height:1.45;\">Midpoint of <b>(2, 1)<\u002Fb> and <b>(6, 5)<\u002Fb>:<\u002Fp>\n          <p style=\"font-size:36px; font-weight:800; margin-top:6px; color:#9A6A00;\">( <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 5px;text-align:center;\"><span style=\"border-bottom:2px solid currentColor;padding:0 9px 3px;line-height:1.12;\">2+6<\u002Fspan><span style=\"padding:3px 9px 0;line-height:1.12;\">2<\u002Fspan><\u002Fspan> , <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 5px;text-align:center;\"><span style=\"border-bottom:2px solid currentColor;padding:0 9px 3px;line-height:1.12;\">1+5<\u002Fspan><span style=\"padding:3px 9px 0;line-height:1.12;\">2<\u002Fspan><\u002Fspan> ) = <b>(4, 3)<\u002Fb><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:22px;\">\n        <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:22px; display:flex; justify-content:center;\">\n          <svg sc-camel-view-box=\"0 0 340 300\" style=\"width:100%; max-width:360px;\">\n            <g stroke=\"#EFEADC\" stroke-width=\"1\"><line x1=\"40\" y1=\"20\" x2=\"40\" y2=\"260\"><\u002Fline><line x1=\"110\" y1=\"20\" x2=\"110\" y2=\"260\"><\u002Fline><line x1=\"180\" y1=\"20\" x2=\"180\" y2=\"260\"><\u002Fline><line x1=\"250\" y1=\"20\" x2=\"250\" y2=\"260\"><\u002Fline><line x1=\"40\" y1=\"20\" x2=\"300\" y2=\"20\"><\u002Fline><line x1=\"40\" y1=\"90\" x2=\"300\" y2=\"90\"><\u002Fline><line x1=\"40\" y1=\"160\" x2=\"300\" y2=\"160\"><\u002Fline><line x1=\"40\" y1=\"230\" x2=\"300\" y2=\"230\"><\u002Fline><\u002Fg>\n            <line x1=\"40\" y1=\"260\" x2=\"300\" y2=\"260\" stroke=\"#C3CBD1\" stroke-width=\"2.5\"><\u002Fline><line x1=\"40\" y1=\"20\" x2=\"40\" y2=\"260\" stroke=\"#C3CBD1\" stroke-width=\"2.5\"><\u002Fline>\n            <line x1=\"90\" y1=\"220\" x2=\"250\" y2=\"80\" stroke=\"var(--sun)\" stroke-width=\"5\"><\u002Fline>\n            <circle cx=\"90\" cy=\"220\" r=\"8\" fill=\"var(--teal)\"><\u002Fcircle><text x=\"60\" y=\"245\" fill=\"var(--ink)\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"19\">(2,1)<\u002Ftext>\n            <circle cx=\"250\" cy=\"80\" r=\"8\" fill=\"var(--teal)\"><\u002Fcircle><text x=\"240\" y=\"70\" fill=\"var(--ink)\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"19\">(6,5)<\u002Ftext>\n            <circle cx=\"170\" cy=\"150\" r=\"10\" fill=\"var(--coral)\"><\u002Fcircle><text x=\"182\" y=\"150\" fill=\"var(--coral)\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"20\">(4,3)<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"background:linear-gradient(90deg,#FFF6E0,#fff); border:2px solid var(--sun); border-radius:18px; padding:24px 28px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:29px; color:#9A6A00;\">✅ Quick check<\u002Fdiv>\n          <p style=\"font-size:35px; font-weight:700; margin-top:6px;\">Find the midpoint of (1, 2) and (7, 8).<\u002Fp>\n          <button data-reveal=\"#chk-mid\" data-show=\"Tap to reveal answer\" data-hide=\"Hide answer\" style=\"margin-top:14px; cursor:pointer; font-family:var(--head); font-weight:600; font-size:29px; background:var(--sun); color:#5A4300; border:none; padding:12px 24px; border-radius:12px;\">Tap to reveal answer<\u002Fbutton>\n          <div id=\"chk-mid\" data-shown=\"0\" style=\"display:none; margin-top:14px; font-size:36px; font-weight:800; color:#9A6A00;\">( <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 5px;text-align:center;\"><span style=\"border-bottom:2px solid currentColor;padding:0 9px 3px;line-height:1.12;\">1+7<\u002Fspan><span style=\"padding:3px 9px 0;line-height:1.12;\">2<\u002Fspan><\u002Fspan> , <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 5px;text-align:center;\"><span style=\"border-bottom:2px solid currentColor;padding:0 9px 3px;line-height:1.12;\">2+8<\u002Fspan><span style=\"padding:3px 9px 0;line-height:1.12;\">2<\u002Fspan><\u002Fspan> ) = <b>(4, 5)<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Plotting a line\" data-speaker-notes=\"To draw a line, build a table of values: choose x-values, work out y from the equation, plot the points, join them with a straight line.\">\n  <div style=\"position:absolute; inset:0; background:var(--paper); padding:64px 100px 56px;\">\n    <div style=\"display:flex; align-items:center; gap:16px;\">\n      <span style=\"width:60px;height:60px;border-radius:16px;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:36px;\">📈<\u002Fspan>\n      <h1 style=\"font-size:60px; font-weight:700;\">Plotting a line from a table<\u002Fh1>\n    <\u002Fdiv>\n    <p style=\"font-size:35px; color:var(--ink2); font-weight:700; margin-top:12px;\">Draw <span class=\"mvar\">y<\u002Fspan> = 2<span class=\"mvar\">x<\u002Fspan> + 1 by making a table, plotting points, and joining them.<\u002Fp>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:44px; margin-top:30px; align-items:start;\">\n      <div style=\"display:flex; flex-direction:column; gap:22px;\">\n        <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:24px 28px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:31px; color:var(--teal); margin-bottom:12px;\">① Build the table (<span class=\"mvar\">y<\u002Fspan> = 2<span class=\"mvar\">x<\u002Fspan> + 1)<\u002Fdiv>\n          <sc-raw-table style=\"width:100%; border-collapse:collapse; font-size:36px; font-weight:700; text-align:center;\">\n            <sc-raw-tbody><sc-raw-tr style=\"background:#EAF8F8;\"><sc-raw-td style=\"border:2px solid #D6EBEB; padding:12px;\"><span class=\"mvar\">x<\u002Fspan><\u002Fsc-raw-td><sc-raw-td style=\"border:2px solid #D6EBEB; padding:12px;\">0<\u002Fsc-raw-td><sc-raw-td style=\"border:2px solid #D6EBEB; padding:12px;\">1<\u002Fsc-raw-td><sc-raw-td style=\"border:2px solid #D6EBEB; padding:12px;\">2<\u002Fsc-raw-td><sc-raw-td style=\"border:2px solid #D6EBEB; padding:12px;\">3<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n            <sc-raw-tr><sc-raw-td style=\"border:2px solid #D6EBEB; padding:12px;\"><span class=\"mvar\">y<\u002Fspan><\u002Fsc-raw-td><sc-raw-td style=\"border:2px solid #D6EBEB; padding:12px;\">1<\u002Fsc-raw-td><sc-raw-td style=\"border:2px solid #D6EBEB; padding:12px;\">3<\u002Fsc-raw-td><sc-raw-td style=\"border:2px solid #D6EBEB; padding:12px;\">5<\u002Fsc-raw-td><sc-raw-td style=\"border:2px solid #D6EBEB; padding:12px;\">7<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <\u002Fsc-raw-tbody><\u002Fsc-raw-table>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:24px 28px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:31px; color:var(--sun); margin-bottom:8px;\">② Plot &amp; join<\u002Fdiv>\n          <p style=\"font-size:34px; font-weight:600; line-height:1.45;\">Plot (0,1), (1,3), (2,5), (3,7). They line up — join them with a ruler and extend the line across the grid.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:linear-gradient(90deg,#EAF8F8,#fff); border:2px solid var(--teal); border-radius:16px; padding:20px 26px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:28px; color:var(--teal);\">✅ Try it<\u002Fdiv>\n          <p style=\"font-size:32px; font-weight:700; margin-top:4px;\">What is <span class=\"mvar\">y<\u002Fspan> when <span class=\"mvar\">x<\u002Fspan> = 5?<\u002Fp>\n          <button data-reveal=\"#plot-ans\" data-show=\"Reveal\" data-hide=\"Hide\" style=\"margin-top:10px; cursor:pointer; font-family:var(--head); font-weight:600; font-size:26px; background:var(--teal); color:#fff; border:none; padding:10px 22px; border-radius:11px;\">Reveal<\u002Fbutton>\n          <span id=\"plot-ans\" data-shown=\"0\" style=\"display:none; margin-left:16px; font-size:34px; font-weight:800; color:var(--tealD);\"><span class=\"mvar\">y<\u002Fspan> = 2(5)+1 = 11<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:20px; display:flex; justify-content:center; align-items:center;\">\n        <svg sc-camel-view-box=\"0 0 360 340\" style=\"width:100%; max-width:420px;\">\n          <g stroke=\"#EFEADC\" stroke-width=\"1\"><line x1=\"50\" y1=\"30\" x2=\"50\" y2=\"300\"><\u002Fline><line x1=\"120\" y1=\"30\" x2=\"120\" y2=\"300\"><\u002Fline><line x1=\"190\" y1=\"30\" x2=\"190\" y2=\"300\"><\u002Fline><line x1=\"260\" y1=\"30\" x2=\"260\" y2=\"300\"><\u002Fline><line x1=\"330\" y1=\"30\" x2=\"330\" y2=\"300\"><\u002Fline><line x1=\"50\" y1=\"30\" x2=\"330\" y2=\"30\"><\u002Fline><line x1=\"50\" y1=\"90\" x2=\"330\" y2=\"90\"><\u002Fline><line x1=\"50\" y1=\"150\" x2=\"330\" y2=\"150\"><\u002Fline><line x1=\"50\" y1=\"210\" x2=\"330\" y2=\"210\"><\u002Fline><line x1=\"50\" y1=\"270\" x2=\"330\" y2=\"270\"><\u002Fline><\u002Fg>\n          <line x1=\"50\" y1=\"300\" x2=\"330\" y2=\"300\" stroke=\"#C3CBD1\" stroke-width=\"2.5\"><\u002Fline><line x1=\"50\" y1=\"30\" x2=\"50\" y2=\"300\" stroke=\"#C3CBD1\" stroke-width=\"2.5\"><\u002Fline>\n          <text x=\"335\" y=\"305\" fill=\"#9AA7B0\" font-size=\"18\" font-weight=\"700\" font-family=\"Nunito\">x<\u002Ftext><text x=\"40\" y=\"26\" fill=\"#9AA7B0\" font-size=\"18\" font-weight=\"700\" font-family=\"Nunito\">y<\u002Ftext>\n          <line x1=\"50\" y1=\"285\" x2=\"290\" y2=\"45\" stroke=\"var(--teal)\" stroke-width=\"5\"><\u002Fline>\n          <circle cx=\"50\" cy=\"285\" r=\"7\" fill=\"var(--coral)\"><\u002Fcircle><circle cx=\"110\" cy=\"225\" r=\"7\" fill=\"var(--coral)\"><\u002Fcircle><circle cx=\"170\" cy=\"165\" r=\"7\" fill=\"var(--coral)\"><\u002Fcircle><circle cx=\"230\" cy=\"105\" r=\"7\" fill=\"var(--coral)\"><\u002Fcircle>\n          <text x=\"58\" y=\"280\" fill=\"var(--ink)\" font-size=\"16\" font-weight=\"700\" font-family=\"Nunito\">(0,1)<\u002Ftext>\n          <text x=\"238\" y=\"105\" fill=\"var(--ink)\" font-size=\"16\" font-weight=\"700\" font-family=\"Nunito\">(3,7)<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Line explorer\" data-speaker-notes=\"Interactive: students drag point A and point B. The line, the gradient and the equation y=mx+c update live. Great for building intuition about positive, negative, steep and shallow gradients.\">\n  <div style=\"position:absolute; inset:0; background:var(--paper); padding:56px 90px 48px;\">\n    <div style=\"display:flex; align-items:center; gap:16px;\">\n      <span style=\"width:60px;height:60px;border-radius:16px;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:36px;\">🕹️<\u002Fspan>\n      <div>\n        <h1 style=\"font-size:54px; font-weight:700; line-height:1.05;\">Line explorer<\u002Fh1>\n        <p style=\"font-size:31px; color:var(--ink2); font-weight:700; margin-top:4px;\">Drag <b style=\"color:var(--grape);\">A<\u002Fb> and <b style=\"color:var(--coral);\">B<\u002Fb> — watch the gradient &amp; equation change.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:auto 1fr; gap:50px; margin-top:24px; align-items:center;\">\n      <div style=\"display:flex; flex-direction:column; align-items:center;\">\n        <x-import component-from-global-scope=\"line-explorer\" w=\"560\" h=\"560\" hint-size=\"560px,560px\"><\u002Fx-import>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:22px;\">\n        <div style=\"background:#fff; border:2px solid var(--line); border-radius:20px; padding:28px 32px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:31px; color:var(--ink2);\">The two points<\u002Fdiv>\n          <div data-le-ab-mirror=\"\" style=\"font-size:40px; font-weight:800; margin-top:6px; color:var(--ink);\">A (−3, −1)   B (2, 4)<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:linear-gradient(135deg,#0EA5A8,#0A7E80); color:#fff; border-radius:20px; padding:28px 32px; box-shadow:0 12px 30px rgba(14,165,168,.28);\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:31px; opacity:.9;\">Gradient <span class=\"mvar\">m<\u002Fspan><\u002Fdiv>\n          <div data-le-grad-mirror=\"\" style=\"font-size:66px; font-weight:800; margin-top:2px; line-height:1;\">1<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:2px solid var(--grape); border-radius:20px; padding:28px 32px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:31px; color:var(--grapeD);\">Equation of the line<\u002Fdiv>\n          <div data-le-eq-mirror=\"\" style=\"font-family:var(--mathf); font-style:italic; font-size:52px; font-weight:bold; margin-top:4px; color:var(--grapeD);\">y = x + 2<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:29px; color:var(--ink2); font-weight:700;\">💡 Try making the gradient <b>negative<\u002Fb> (B below A), then <b>steep<\u002Fb>, then <b>zero<\u002Fb> (flat).<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Gradient from a graph\" data-speaker-notes=\"To find gradient from a graph: pick two clear points, draw the rise/run triangle, divide rise by run. Watch the sign — up-hill is positive, down-hill is negative.\">\n  <div style=\"position:absolute; inset:0; background:var(--paper); padding:64px 100px 56px;\">\n    <div style=\"display:flex; align-items:center; gap:16px;\">\n      <span style=\"width:60px;height:60px;border-radius:16px;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:36px;\">📐<\u002Fspan>\n      <h1 style=\"font-size:60px; font-weight:700;\">Finding gradient from a graph<\u002Fh1>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:44px; margin-top:30px; align-items:center;\">\n      <div style=\"display:flex; flex-direction:column; gap:20px;\">\n        <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:24px 30px;\">\n          <p style=\"font-size:36px; font-weight:700; line-height:1.4;\"><b style=\"color:var(--teal);\">Step 1.<\u002Fb> Pick two points the line passes through neatly.<\u002Fp>\n          <p style=\"font-size:36px; font-weight:700; line-height:1.4; margin-top:12px;\"><b style=\"color:var(--teal);\">Step 2.<\u002Fb> Count the <b style=\"color:var(--coral);\">rise<\u002Fb> (up/down) and the <b style=\"color:var(--coral);\">run<\u002Fb> (across).<\u002Fp>\n          <p style=\"font-size:36px; font-weight:700; line-height:1.4; margin-top:12px;\"><b style=\"color:var(--teal);\">Step 3.<\u002Fb> Divide: <span class=\"mvar\">m<\u002Fspan> = <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 5px;text-align:center;\"><span style=\"border-bottom:2px solid currentColor;padding:0 9px 3px;line-height:1.12;\">rise<\u002Fspan><span style=\"padding:3px 9px 0;line-height:1.12;\">run<\u002Fspan><\u002Fspan> .<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:18px;\">\n          <div style=\"flex:1; background:#E4F8EC; border:2px solid var(--leaf); border-radius:16px; padding:18px; text-align:center;\"><div style=\"font-size:44px;\">↗<\u002Fdiv><div style=\"font-size:30px; font-weight:800; color:#0F7A45;\">Uphill = positive<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1; background:#FFE7E2; border:2px solid var(--coral); border-radius:16px; padding:18px; text-align:center;\"><div style=\"font-size:44px;\">↘<\u002Fdiv><div style=\"font-size:30px; font-weight:800; color:#C23A2B;\">Downhill = negative<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:linear-gradient(90deg,#EAF8F8,#fff); border:2px solid var(--teal); border-radius:16px; padding:20px 26px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:28px; color:var(--teal);\">✅ From the graph<\u002Fdiv>\n          <p style=\"font-size:32px; font-weight:700; margin-top:4px;\">What is the gradient shown?<\u002Fp>\n          <button data-reveal=\"#gfg-ans\" data-show=\"Reveal\" data-hide=\"Hide\" style=\"margin-top:10px; cursor:pointer; font-family:var(--head); font-weig acity:0; transform:translateY(14px); transition:all .4s; background:linear-gradient(90deg,#EAF2FA,#fff); border:2px solid var(--sky); border-radius:16px; padding:22px 28px; font-size:33px; font-weight:800; color:#1E6FA8;\">🎉 Answer: &nbsp;<span class=\"mvar\">y<\u002Fspan> = 3<span class=\"mvar\">x<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:16px; margin-top:26px;\">\n      <button data-step-btn=\"\" data-start=\"Reveal step ▸\" data-more=\"Next step ▸\" data-done=\"All steps shown ✓\" style=\"cursor:pointer; font-family:var(--head); font-weight:600; font-size:31px; background:var(--sky); color:#fff; border:none; padding:14px 34px; border-radius:14px;\">Reveal step ▸<\u002Fbutton>\n      <button data-step-reset=\"\" style=\"cursor:pointer; font-family:var(--head); font-weight:600; font-size:31px; background:#fff; color:var(--ink2); border:2px solid var(--line); padding:14px 30px; border-radius:14px;\">↺ Reset<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Parallel &amp; perpendicular\" data-speaker-notes=\"Parallel lines have equal gradients. Perpendicular gradients multiply to negative one — flip the fraction and change the sign (negative reciprocal).\">\n  <div style=\"position:absolute; inset:0; background:var(--paper); padding:64px 100px 56px;\">\n    <div style=\"display:flex; align-items:center; gap:16px;\">\n      <span style=\"width:60px;height:60px;border-radius:16px;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:36px;\">📏<\u002Fspan>\n      <h1 style=\"font-size:60px; font-weight:700;\">Parallel &amp; perpendicular lines<\u002Fh1>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:30px; margin-top:22px; align-items:start;\">\n      <div style=\"background:#fff; border:2px solid var(--line); border-top:8px solid var(--leaf); border-radius:20px; padding:22px 28px;\">\n        <div style=\"font-family:var(--head); font-weight:600; font-size:36px; color:#0F7A45;\">Parallel ‖<\u002Fdiv>\n        <p style=\"font-size:30px; font-weight:700; margin-top:6px; line-height:1.35;\">Same steepness → <b>equal gradients<\u002Fb>. &nbsp;<span style=\"font-family:var(--mathf); background:#E4F8EC; border-radius:8px; padding:2px 12px;\"><span class=\"mvar\">m<\u002Fspan>₁ = <span class=\"mvar\">m<\u002Fspan>₂<\u002Fspan><\u002Fp>\n        <p style=\"font-size:28px; font-weight:700; margin-top:10px; color:var(--ink2);\">e.g. <span class=\"mvar\">y<\u002Fspan> = 2<span class=\"mvar\">x<\u002Fspan> + 1 ‖ <span class=\"mvar\">y<\u002Fspan> = 2<span class=\"mvar\">x<\u002Fspan> − 5<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:2px solid var(--line); border-top:8px solid var(--coral); border-radius:20px; padding:22px 28px;\">\n        <div style=\"font-family:var(--head); font-weight:600; font-size:36px; color:#C23A2B;\">Perpendicular ⟂<\u002Fdiv>\n        <p style=\"font-size:30px; font-weight:700; margin-top:6px; line-height:1.35;\">Meet at 90° → <b>negative reciprocals<\u002Fb>. &nbsp;<span style=\"font-family:var(--mathf); background:#FFE7E2; border-radius:8px; padding:2px 12px;\"><span class=\"mvar\">m<\u002Fspan>₁ × <span class=\"mvar\">m<\u002Fspan>₂ = −1<\u002Fspan><\u002Fp>\n        <p style=\"font-size:28px; font-weight:700; margin-top:10px; color:var(--ink2);\">Rule: <b>flip the fraction, change the sign.<\u002Fb><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1.05fr .95fr; gap:30px; margin-top:20px; align-items:stretch;\">\n      <div style=\"background:#fff; border:2px solid var(--line); border-radius:20px; padding:22px 28px;\">\n        <div style=\"font-family:var(--head); font-weight:600; font-size:31px; color:#C23A2B; margin-bottom:12px;\">🧮 Computing negative reciprocals<\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px;\">\n          <div style=\"display:flex; align-items:center; justify-content:center; gap:12px; background:#FFF6F4; border:2px solid #FBD9D2; border-radius:12px; padding:12px 14px; font-family:var(--mathf); font-size:31px;\"><span class=\"mvar\">m<\u002Fspan> = 2 <span style=\"color:var(--coral); font-weight:800;\">→<\u002Fspan> −<span style=\"display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle;\"><span style=\"border-bottom:2px solid currentColor; padding:0 7px 2px; line-height:1.1;\">1<\u002Fspan><span style=\"padding:2px 7px 0; line-height:1.1;\">2<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; justify-content:center; gap:12px; background:#FFF6F4; border:2px solid #FBD9D2; border-radius:12px; padding:12px 14px; font-family:var(--mathf); font-size:31px;\"><span class=\"mvar\">m<\u002Fspan> = −3 <span style=\"color:var(--coral); font-weight:800;\">→<\u002Fspan> <span style=\"display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle;\"><span style=\"border-bottom:2px solid currentColor; padding:0 7px 2px; line-height:1.1;\">1<\u002Fspan><span style=\"padding:2px 7px 0; line-height:1.1;\">3<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; justify-content:center; gap:12px; background:#FFF6F4; border:2px solid #FBD9D2; border-radius:12px; padding:12px 14px; font-family:var(--mathf); font-size:31px;\"><span class=\"mvar\">m<\u002Fspan> = <span style=\"display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle;\"><span style=\"border-bottom:2px solid currentColor; padding:0 7px 2px; line-height:1.1;\">3<\u002Fspan><span style=\"padding:2px 7px 0; line-height:1.1;\">4<\u002Fspan><\u002Fspan> <span style=\"color:var(--coral); font-weight:800;\">→<\u002Fspan> −<span style=\"display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle;\"><span style=\"border-bottom:2px solid currentColor; padding:0 7px 2px; line-height:1.1;\">4<\u002Fspan><span style=\"padding:2px 7px 0; line-height:1.1;\">3<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; justify-content:center; gap:12px; background:#FFF6F4; border:2px solid #FBD9D2; border-radius:12px; padding:12px 14px; font-family:var(--mathf); font-size:31px;\"><span class=\"mvar\">m<\u002Fspan> = −<span style=\"display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle;\"><span style=\"border-bottom:2px solid currentColor; padding:0 7px 2px; line-height:1.1;\">1<\u002Fspan><span style=\"padding:2px 7px 0; line-height:1.1;\">5<\u002Fspan><\u002Fspan> <span style=\"color:var(--coral); font-weight:800;\">→<\u002Fspan> 5<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:26px; font-weight:700; color:var(--ink2); margin-top:12px;\">Whole number <span class=\"mvar\">m<\u002Fspan>? Write it over 1 first: 2 = <span style=\"font-family:var(--mathf);\">2⁄1<\u002Fspan> → flip → −½.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:2px solid var(--line); border-radius:20px; padding:16px; display:flex; flex-direction:column; align-items:center; justify-content:center;\">\n        <div style=\"font-family:var(--head); font-weight:600; font-size:26px; color:var(--ink2); margin-bottom:6px;\">On a graph: they meet at 90°<\u002Fdiv>\n        <svg sc-camel-view-box=\"0 0 300 300\" style=\"width:100%; max-width:300px;\">\n          <g stroke=\"#EFEADC\" stroke-width=\"1\"><line x1=\"20\" y1=\"46\" x2=\"280\" y2=\"46\"><\u002Fline><line x1=\"20\" y1=\"98\" x2=\"280\" y2=\"98\"><\u002Fline><line x1=\"20\" y1=\"202\" x2=\"280\" y2=\"202\"><\u002Fline><line x1=\"20\" y1=\"254\" x2=\"280\" y2=\"254\"><\u002Fline><line x1=\"46\" y1=\"20\" x2=\"46\" y2=\"280\"><\u002Fline><line x1=\"98\" y1=\"20\" x2=\"98\" y2=\"280\"><\u002Fline><line x1=\"202\" y1=\"20\" x2=\"202\" y2=\"280\"><\u002Fline><line x1=\"254\" y1=\"20\" x2=\"254\" y2=\"280\"><\u002Fline><\u002Fg>\n          <line x1=\"20\" y1=\"150\" x2=\"284\" y2=\"150\" stroke=\"#B7C0C7\" stroke-width=\"2.5\"><\u002Fline>\n          <line x1=\"150\" y1=\"20\" x2=\"150\" y2=\"284\" stroke=\"#B7C0C7\" stroke-width=\"2.5\"><\u002Fline>\n          <line x1=\"98\" y1=\"254\" x2=\"202\" y2=\"46\" stroke=\"var(--teal)\" stroke-width=\"5\" stroke-linecap=\"round\"><\u002Fline>\n          <line x1=\"46\" y1=\"98\" x2=\"254\" y2=\"202\" stroke=\"var(--coral)\" stroke-width=\"5\" stroke-linecap=\"round\"><\u002Fline>\n          <path d=\"M158 134 L174 142 L166 158\" fill=\"none\" stroke=\"#1F2933\" stroke-width=\"2\"><\u002Fpath>\n          <circle cx=\"150\" cy=\"150\" r=\"5\" fill=\"#1F2933\"><\u002Fcircle>\n          <text x=\"206\" y=\"44\" fill=\"var(--tealD)\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\" font-weight=\"bold\">y = 2x<\u002Ftext>\n          <text x=\"196\" y=\"224\" fill=\"#C23A2B\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\" font-weight=\"bold\">y = −½x<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:18px; background:linear-gradient(90deg,#EAF8F8,#fff); border:2px solid var(--teal); border-radius:16px; padding:16px 26px;\">\n      <div style=\"font-size:31px; font-weight:800;\">✅ Quick check — perpendicular to <span class=\"mvar\">m<\u002Fspan> = 3?\n        <button data-reveal=\"#pp-ans\" data-show=\"Reveal\" data-hide=\"Hide\" style=\"margin-left:14px; cursor:pointer; font-family:var(--head); font-weight:600; font-size:26px; background:var(--teal); color:#fff; border:none; padding:9px 20px; border-radius:11px;\">Reveal<\u002Fbutton>\n        <span id=\"pp-ans\" data-shown=\"0\" style=\"display:none; margin-left:14px; color:var(--tealD);\">−⅓ &nbsp;(because 3 × −⅓ = −1)<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Crossing the axes\" data-speaker-notes=\"To find where a line crosses the axes: set x = 0 for the y-intercept, set y = 0 for the x-intercept. These two points are enough to sketch the line.\">\n  <div style=\"position:absolute; inset:0; background:var(--paper); padding:64px 100px 56px;\">\n    <div style=\"display:flex; align-items:center; gap:16px;\">\n      <span style=\"width:60px;height:60px;border-radius:16px;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:36px;\">✕<\u002Fspan>\n      <h1 style=\"font-size:60px; font-weight:700;\">Where a line crosses the axes<\u002Fh1>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:44px; margin-top:30px; align-items:center;\">\n      <div style=\"display:flex; flex-direction:column; gap:20px;\">\n        <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:24px 30px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:34px; color:var(--sky);\">Cross the <span class=\"mvar\">y<\u002Fspan>-axis<\u002Fdiv>\n          <p style=\"font-size:35px; font-weight:700; margin-top:6px;\">Put <span class=\"mvar\">x<\u002Fspan> = 0 into the equation.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:24px 30px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:34px; color:var(--coral);\">Cross the <span class=\"mvar\">x<\u002Fspan>-axis<\u002Fdiv>\n          <p style=\"font-size:35px; font-weight:700; margin-top:6px;\">Put <span class=\"mvar\">y<\u002Fspan> = 0 into the equation.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:2px solid var(--line); border-left:8px solid var(--sun); border-radius:18px; padding:24px 30px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:30px; color:var(--sun);\">💡 Example: <span class=\"mvar\">y<\u002Fspan> = 2<span class=\"mvar\">x<\u002Fspan> − 6<\u002Fdiv>\n          <p style=\"font-size:34px; font-weight:700; margin-top:6px; line-height:1.5;\"><span class=\"mvar\">x<\u002Fspan> = 0 → <span class=\"mvar\">y<\u002Fspan> = −6, so <b>(0, −6)<\u002Fb><br><span class=\"mvar\">y<\u002Fspan> = 0 → 0 = 2<span class=\"mvar\">x<\u002Fspan> − 6 → <span class=\"mvar\">x<\u002Fspan> = 3, so <b>(3, 0)<\u002Fb><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:20px; display:flex; justify-content:center;\">\n        <svg sc-camel-view-box=\"0 0 340 340\" style=\"width:100%; max-width:390px;\">\n          <g stroke=\"#EFEADC\" stroke-width=\"1\">\n            <line x1=\"14\" y1=\"14\" x2=\"14\" y2=\"320\"><\u002Fline><line x1=\"70\" y1=\"14\" x2=\"70\" y2=\"320\"><\u002Fline><line x1=\"126\" y1=\"14\" x2=\"126\" y2=\"320\"><\u002Fline><line x1=\"182\" y1=\"14\" x2=\"182\" y2=\"320\"><\u002Fline><line x1=\"238\" y1=\"14\" x2=\"238\" y2=\"320\"><\u002Fline><line x1=\"294\" y1=\"14\" x2=\"294\" y2=\"320\"><\u002Fline>\n            <line x1=\"14\" y1=\"30\" x2=\"320\" y2=\"30\"><\u002Fline><line x1=\"14\" y1=\"90\" x2=\"320\" y2=\"90\"><\u002Fline><line x1=\"14\" y1=\"150\" x2=\"320\" y2=\"150\"><\u002Fline><line x1=\"14\" y1=\"210\" x2=\"320\" y2=\"210\"><\u002Fline><line x1=\"14\" y1=\"270\" x2=\"320\" y2=\"270\"><\u002Fline>\n          <\u002Fg>\n          <line x1=\"20\" y1=\"90\" x2=\"328\" y2=\"90\" stroke=\"#B7C0C7\" stroke-width=\"2.5\"><\u002Fline>\n          <line x1=\"70\" y1=\"14\" x2=\"70\" y2=\"328\" stroke=\"#B7C0C7\" stroke-width=\"2.5\"><\u002Fline>\n          <polygon points=\"334,90 322,85 322,95\" fill=\"#B7C0C7\"><\u002Fpolygon><polygon points=\"70,8 65,20 75,20\" fill=\"#B7C0C7\"><\u002Fpolygon>\n          <text x=\"330\" y=\"108\" fill=\"#9AA7B0\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"16\">x<\u002Ftext>\n          <text x=\"52\" y=\"24\" fill=\"#9AA7B0\" font-family=\"Nunito\" font-weight=\"800\" font-size=\"16\">y<\u002Ftext>\n          <line x1=\" ; font-size:26px; background:var(--teal); color:#fff; border:none; padding:11px 22px; border-radius:11px;\">Reveal solution<\u002Fbutton>\n        <div id=\"exA2\" data-shown=\"0\" style=\"display:none; margin-top:14px; font-size:29px; font-weight:700; line-height:1.55; color:var(--ink);\">Grad AB = (8−2)/(3−1) = 3. Grad BC = (14−8)/(5−3) = 3. Equal gradients and share B → <b style=\"color:var(--tealD);\">collinear.<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:2px solid var(--line); border-left:8px solid var(--teal); border-radius:18px; padding:24px 28px;\">\n        <div style=\"font-size:31px; font-weight:800; line-height:1.4;\">Q3. The line through <b>(0, 3)<\u002Fb> and <b>(<span class=\"mvar\">k<\u002Fspan>, 11)<\u002Fb> has gradient 4. Find <span class=\"mvar\">k<\u002Fspan>.<\u002Fdiv>\n        <button data-reveal=\"#exA3\" data-show=\"Reveal solution\" data-hide=\"Hide solution\" style=\"margin-top:14px; cursor:pointer; font-family:var(--head); font-weight:600; font-size:26px; background:var(--teal); color:#fff; border:none; padding:11px 22px; border-radius:11px;\">Reveal solution<\u002Fbutton>\n        <div id=\"exA3\" data-shown=\"0\" style=\"display:none; margin-top:14px; font-size:29px; font-weight:700; line-height:1.55; color:var(--ink);\"><span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 5px;text-align:center;\"><span style=\"border-bottom:2px solid currentColor;padding:0 9px 3px;line-height:1.12;\">11 − 3<\u002Fspan><span style=\"padding:3px 9px 0;line-height:1.12;\"><span class=\"mvar\">k<\u002Fspan> − 0<\u002Fspan><\u002Fspan> = 4 → <span style=\"display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 5px;text-align:center;\"><span style=\"border-bottom:2px solid currentColor;padding:0 9px 3px;line-height:1.12;\">8<\u002Fspan><span style=\"padding:3px 9px 0;line-height:1.12;\"><span class=\"mvar\">k<\u002Fspan><\u002Fspan
