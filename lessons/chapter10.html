font-size:31px; color:var(--grapeD); margin-bottom:8px;\">Definition<\u002Fdiv>\n          <p style=\"font-size:37px; font-weight:600; line-height:1.4;\">An expression whose <b>highest power<\u002Fb> of the variable is <b>2<\u002Fb>. The general form is:<\u002Fp>\n          <div style=\"background:#EBE5FF; border-radius:14px; padding:18px; text-align:center; font-family:var(--mathf); font-size:38px; margin-top:14px;\"><span class=\"mvar\">a<\u002Fspan><span class=\"mvar\">x<\u002Fspan>² + <span class=\"mvar\">b<\u002Fspan><span class=\"mvar\">x<\u002Fspan> + <span class=\"mvar\">c<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:24px 30px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:30px; color:var(--sun); margin-bottom:10px;\">💡 Spot the quadratic<\u002Fdiv>\n          <div style=\"display:flex; gap:14px; flex-wrap:wrap;\">\n            <span style=\"background:#E4F8EC; color:#0F7A45; font-weight:800; font-size:31px; padding:10px 18px; border-radius:12px;\">✓ <span class=\"mvar\">x<\u002Fspan>² + 3<span class=\"mvar\">x<\u002Fspan> − 4<\u002Fspan>\n            <span style=\"background:#E4F8EC; color:#0F7A45; font-weight:800; font-size:31px; padding:10px 18px; border-radius:12px;\">✓ 2<span class=\"mvar\">x<\u002Fspan>² − 7<\u002Fspan>\n            <span style=\"background:#FFE7E2; color:#C23A2B; font-weight:800; font-size:31px; padding:10px 18px; border-radius:12px;\">✕ 5<span class=\"mvar\">x<\u002Fspan> + 1<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:22px;\">\n        <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:24px 28px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:29px; color:var(--ink2); margin-bottom:8px;\">The parts<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:10px; font-size:31px; font-weight:700;\">\n            <div><span style=\"font-family:var(--mathf); font-style:italic; color:var(--grape); font-weight:bold;\">a<\u002Fspan> — coefficient of <span class=\"mvar\">x<\u002Fspan>²<\u002Fdiv>\n            <div><span style=\"font-family:var(--mathf); font-style:italic; color:var(--coral); font-weight:bold;\">b<\u002Fspan> — coefficient of <span class=\"mvar\">x<\u002Fspan><\u002Fdiv>\n            <div><span style=\"font-family:var(--mathf); font-style:italic; color:var(--sky); font-weight:bold;\">c<\u002Fspan> — the constant term<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:linear-gradient(90deg,#EBE5FF,#fff); border:2px solid var(--grape); border-radius:18px; padding:24px 28px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:29px; color:var(--grapeD);\">✅ Quick check<\u002Fdiv>\n          <p style=\"font-size:34px; font-weight:700; margin-top:6px;\">In 3<span class=\"mvar\">x<\u002Fspan>² − 5<span class=\"mvar\">x<\u002Fspan> + 2, what is <span class=\"mvar\">a<\u002Fspan>, <span class=\"mvar\">b<\u002Fspan>, <span class=\"mvar\">c<\u002Fspan>?<\u002Fp>\n          <button data-reveal=\"#chk-qe\" data-show=\"Tap to reveal answer\" data-hide=\"Hide answer\" style=\"margin-top:12px; cursor:pointer; font-family:var(--head); font-weight:600; font-size:28px; background:var(--grape); color:#fff; border:none; padding:11px 22px; border-radius:12px;\">Tap to reveal answer<\u002Fbutton>\n          <div id=\"chk-qe\" data-shown=\"0\" style=\"display:none; margin-top:12px; font-size:35px; font-weight:800; color:var(--grapeD);\"><span class=\"mvar\">a<\u002Fspan> = 3, <span class=\"mvar\">b<\u002Fspan> = −5, <span class=\"mvar\">c<\u002Fspan> = 2<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Vocab · Quadratic equation\" data-speaker-notes=\"A quadratic equation sets a quadratic expression equal to zero. Solving means finding the values of x (the roots) that make it true.\">\n  <div style=\"position:absolute; inset:0; background:var(--paper); padding:64px 100px 56px;\">\n    <div style=\"display:flex; align-items:center; gap:16px;\">\n      <span style=\"background:var(--grape); color:#fff; font-family:var(--head); font-weight:600; font-size:29px; padding:8px 20px; border-radius:999px;\">KEY TERM · 10.2<\u002Fspan>\n      <h1 style=\"font-size:60px; font-weight:700; color:var(--grapeD);\">Quadratic equation<\u002Fh1>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1.1fr .9fr; gap:44px; margin-top:34px; align-items:start;\">\n      <div style=\"display:flex; flex-direction:column; gap:22px;\">\n        <div style=\"background:#fff; border:2px solid var(--line); border-left:8px solid var(--grape); border-radius:18px; padding:26px 30px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:31px; color:var(--grapeD); margin-bottom:8px;\">Definition<\u002Fdiv>\n          <p style=\"font-size:37px; font-weight:600; line-height:1.4;\">A quadratic expression set <b>equal to zero<\u002Fb>. Its solutions are called the <b>roots<\u002Fb>.<\u002Fp>\n          <div style=\"background:#EBE5FF; border-radius:14px; padding:18px; text-align:center; font-family:var(--mathf); font-size:38px; margin-top:14px;\"><span class=\"mvar\">a<\u002Fspan><span class=\"mvar\">x<\u002Fspan>² + <span class=\"mvar\">b<\u002Fspan><span class=\"mvar\">x<\u002Fspan> + <span class=\"mvar\">c<\u002Fspan> = 0<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:26px 30px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:31px; color:var(--sun); margin-bottom:8px;\">💡 Worked example<\u002Fdiv>\n          <p style=\"font-size:35px; font-weight:700; line-height:1.5;\"><span class=\"mvar\">x<\u002Fspan>² − 5<span class=\"mvar\">x<\u002Fspan> + 6 = 0 &nbsp;factorises to&nbsp; (<span class=\"mvar\">x<\u002Fspan>−2)(<span class=\"mvar\">x<\u002Fspan>−3) = 0<\u002Fp>\n          <p style=\"font-size:36px; font-weight:800; color:var(--grapeD); margin-top:6px;\">→ roots <span class=\"mvar\">x<\u002Fspan> = 2 or <span class=\"mvar\">x<\u002Fspan> = 3<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:22px;\">\n        <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:20px; display:flex; flex-direction:column; align-items:center;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:26px; color:var(--ink2); margin-bottom:8px;\">Roots = where the curve crosses <span class=\"mvar\">x<\u002Fspan><\u002Fdiv>\n          <svg sc-camel-view-box=\"0 0 300 200\" style=\"width:100%; max-width:300px;\">\n            <line x1=\"20\" y1=\"150\" x2=\"290\" y2=\"150\" stroke=\"#C3CBD1\" stroke-width=\"2\"><\u002Fline>\n            <polyline points=\"70,84 85,116 95,135 105,150 120,168 135,179 155,185 175,179 190,168 205,150 215,135 225,116 240,84\" fill=\"none\" stroke=\"var(--grape)\" stroke-width=\"4\" stroke-linejoin=\"round\"><\u002Fpolyline>\n            <circle cx=\"105\" cy=\"150\" r=\"8\" fill=\"var(--coral)\"><\u002Fcircle><circle cx=\"205\" cy=\"150\" r=\"8\" fill=\"var(--coral)\"><\u002Fcircle>\n            <text x=\"105\" y=\"176\" font-size=\"18\" font-weight=\"800\" fill=\"#C23A2B\" font-family=\"Nunito\" text-anchor=\"middle\">2<\u002Ftext>\n            <text x=\"205\" y=\"176\" font-size=\"18\" font-weight=\"800\" fill=\"#C23A2B\" font-family=\"Nunito\" text-anchor=\"middle\">3<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"background:linear-gradient(90deg,#EBE5FF,#fff); border:2px solid var(--grape); border-radius:18px; padding:24px 28px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:29px; color:var(--grapeD);\">✅ Quick check<\u002Fdiv>\n          <p style=\"font-size:34px; font-weight:700; margin-top:6px;\">If (<span class=\"mvar\">x<\u002Fspan> − 4)(<span class=\"mvar\">x<\u002Fspan> + 1) = 0, what are the roots?<\u002Fp>\n          <button data-reveal=\"#chk-qeq\" data-show=\"Tap to reveal answer\" data-hide=\"Hide answer\" style=\"margin-top:12px; cursor:pointer; font-family:var(--head); font-weight:600; font-size:28px; background:var(--grape); color:#fff; border:none; padding:11px 22px; border-radius:12px;\">Tap to reveal answer<\u002Fbutton>\n          <div id=\"chk-qeq\" data-shown=\"0\" style=\"display:none; margin-top:12px; font-size:35px; font-weight:800; color:var(--grapeD);\"><span class=\"mvar\">x<\u002Fspan> = 4 or <span class=\"mvar\">x<\u002Fspan> = −1<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Vocab · Difference of squares\" data-speaker-notes=\"The difference of two squares is a special pattern: a squared minus b squared factorises to (a+b)(a−b). Recognising it saves lots of work.\">\n  <div style=\"position:absolute; inset:0; background:var(--paper); padding:64px 100px 56px;\">\n    <div style=\"display:flex; align-items:center; gap:16px;\">\n      <span style=\"background:var(--coral); color:#fff; font-family:var(--head); font-weight:600; font-size:29px; padding:8px 20px; border-radius:999px;\">KEY TERM · 10.2<\u002Fspan>\n      <h1 style=\"font-size:58px; font-weight:700; color:#C23A2B;\">Difference of two squares<\u002Fh1>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1.1fr .9fr; gap:44px; margin-top:34px; align-items:start;\">\n      <div style=\"display:flex; flex-direction:column; gap:22px;\">\n        <div style=\"background:#fff; border:2px solid var(--line); border-left:8px solid var(--coral); border-radius:18px; padding:26px 30px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:31px; color:#C23A2B; margin-bottom:8px;\">The pattern<\u002Fdiv>\n          <div style=\"background:#FFE7E2; border-radius:14px; padding:20px; text-align:center; font-family:var(--mathf); font-size:36px;\"><span class=\"mvar\">a<\u002Fspan>² − <span class=\"mvar\">b<\u002Fspan>² = (<span class=\"mvar\">a<\u002Fspan> + <span class=\"mvar\">b<\u002Fspan>)(<span class=\"mvar\">a<\u002Fspan> − <span class=\"mvar\">b<\u002Fspan>)<\u002Fdiv>\n          <p style=\"font-size:31px; color:var(--ink2); font-weight:700; margin-top:12px;\">Two perfect squares with a <b>minus<\u002Fb> between them — no middle term.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:26px 30px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:31px; color:var(--sun); margin-bottom:8px;\">💡 Worked examples<\u002Fdiv>\n          <p style=\"font-size:36px; font-weight:700; line-height:1.55;\"><span class=\"mvar\">x<\u002Fspan>² − 9 = <b style=\"color:#C23A2B;\">(<span class=\"mvar\">x<\u002Fspan> + 3)(<span class=\"mvar\">x<\u002Fspan> − 3)<\u002Fb><br>4<span class=\"mvar\">x<\u002Fspan>² − 25 = <b style=\"color:#C23A2B;\">(2<span class=\"mvar\">x<\u002Fspan> + 5)(2<span class=\"mvar\">x<\u002Fspan> − 5)<\u002Fb><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:22px;\">\n        <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:22px; display:flex; flex-direction:column; align-items:center;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:25px; color:var(--ink2); margin-bottom:8px; text-align:center;\">Cut a square from a square<\u002Fdiv>\n          <svg sc-camel-view-box=\"0 0 260 200\" style=\"width:100%; max-width:260px;\">\n            <rect x=\"20\" y=\"20\" width=\"160\" height=\"160\" fill=\"#FFE7E2\" stroke=\"var(--coral)\" stroke-width=\"2.5\"><\u002Frect>\n            <rect x=\"120\" y=\"120\" width=\"60\" height=\"60\" fill=\"#FFFDF6\" stroke=\"var(--coral)\" stroke-width=\"2.5\" stroke-dasharray=\"5 4\"><\u002Frect>\n            <text x=\"70\" y=\"70\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"26\" fill=\"#C23A2B\">a²<\u002Ftext>\n            <text x=\"150\" y=\"155\" font-family=\"Georgia\" font-style=\"italic\" font-size=\"20\" fill=\"#C23A2B\">b²<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"background:linear-gradient(90deg,#FFE7E2,#fff); border:2px solid var(--coral); border-radius:18px; padding:24px 28px;\">\n          <div style=\"font-family:var(--head); font-weight:600; font-size:29px; color:#C23A2B;\">✅ Quick check<\u002Fdiv>\n          <p style=\"font-size:34px; font-weight:700; margin-top:6px;\">Factorise <span class=\"mvar\">x<\u002Fspan>² − 49.<\u002Fp>\n          <button data-reveal=\"#chk-dots\" data-show=\"Tap to reveal answer\" data-hide=\"Hide answer\" style=\"margin-top:12px; cursor:pointer; font-family:var(--head); font-weight:600; font-size:28px; background:var(--coral); color:#fff; border:none; padding:11px 22px; border-radius:12px;\">Tap to reveal answer<\u002Fbutton>\n          <div id=\"chk-dots\" data-shown=\"0\" style=\"display:none; margin-top:12px; font-size:35px; font-weight:800; color:#C23A2B;\">(<span class=\"mvar\">x<\u002Fspan> + 7)(<span class=\"mvar\">x<\u002Fspan> − 7)<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Expanding two brackets\" data-speaker-notes=\"Expand two brackets with FOIL or the grid method: every term in the first bracket multiplies every term in the second. Then collect like terms.\">\n  <div style=\"position:absolute; inset:0; background:var(--paper); padding:60px 100px 52px;\">\n    <div style=\"display:flex; align-items:center; gap:16px;\">\n      <span style=\"width:60px;height:60px;border-radius:16px;background:var(--grape);color:#fff;display:flex;align-items:center;justify-content:center;font-size:36px;\">✳️<\u002Fspan>\n      <h1 style=\"font-size:58px; font-weight:700;\">Expanding two brackets<\u002Fh1>\n    <\u002Fdiv>\n    <p style=\"font-size:34px; color:var(--ink2); font-weight:700; margin-top:10px;\">Every term in the first bracket multiplies every term in the second. Use the <b>grid<\u002Fb> to stay organised.<\u002Fp>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:40px; margin-top:26px; align-items:start;\">\n      <div style=\"background:#fff; border:2px solid var(--line); border-radius:18px; padding:26px 30px;\">\n        <div style=\"font-family:var(--head); font-weight:600; font-size:31px; color:var(--grapeD); margin-bottom:14px;\">Grid method: (<span class=\"mvar\">x<\u002Fspan> + 3)(<span class=\"mvar\">x<\u002Fspan> + 2)<\u002Fdiv>\n        <sc-raw-table style=\"width:100%; border-collapse:collapse; font-family:var(--mathf); font-size:36px; text-align:center;\">\n          <sc-raw-tbody><sc-raw-tr><sc-raw-td style=\"border:2px solid #E7E2D4; padding:14px; background:#F6F3FF;\"><\u002Fsc-raw-td><sc-raw-td style=\"border:2px solid #E7E2D4; padding:14px; background:#F6F3FF; font-style:italic;\">x<\u002Fsc-raw-td><sc-raw-td style=\"border:2px solid #E7E2D4; padding:14px; background:#F6F3FF;\">+3<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <sc-raw-tr><sc-raw-td style=\"border:2px solid #E7E2D4; padding:14px; background:#F6F3FF; font-style:italic;\">x<\u002Fsc-raw-td><sc-raw-td style=\"border:2px solid #E7E2D4; padding:14px; color:var(--grapeD); font-weight:bold;\">x²<\u002Fsc-raw-td><sc-raw-td style=\"border:2px solid #E7E2D4; padding:14px;\">3x<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <sc-raw-tr><sc-raw-td style=\"border:2px solid #E7E2D4; padding:14px; background:#F6F3FF;\">+2<\u002Fsc-raw-td><sc-raw-td style=\"border:2px solid #E7E2D4; padding:14px;\">2x<\u002Fsc-raw-td><sc-raw-td style=\"border:2px solid #E7E2D4; padding:14px;\">6<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n        <\u
