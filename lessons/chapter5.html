      html: `<ul>
          <li><b>Numerator</b> — the top number of a fraction (how many parts you have)</li>
          <li><b>Denominator</b> — the bottom number of a fraction (how many equal parts the whole is split into)</li>
          <li><b>Equivalent fractions</b> — fractions that represent the same value, e.g. 1/2 = 2/4 = 3/6</li>
          <li><b>Common denominator</b> — a shared denominator used to add or subtract fractions</li>
          <li><b>Lowest terms (simplest form)</b> — when the numerator and denominator share no common factor other than 1</li>
          <li><b>Mixed number</b> — a whole number combined with a fraction, e.g. 2¾</li>
        </ul>`,
      formula: "3/4 → numerator 3, denominator 4"

    {
      type: "quiz",

      title: "Vocabulary check",
      question: "Which fraction is 18/24 written in its simplest form?",
      options: ["9/12", "6/8", "3/4", "2/3"],
      correct: 2,
      explain: "HCF of 18 and 24 is 6. 18÷6=3, 24÷6=4, giving 3/4 — and 3 and 4 share no common factor other than 1."
    },

    {
      type: "content",
      tag: "Fraction operations",
      title: "Adding and subtracting fractions",
      html: `<p>To add or subtract fractions, they must share a <b>common denominator</b>:</p>`,
