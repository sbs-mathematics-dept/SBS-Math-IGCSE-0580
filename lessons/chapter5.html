  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ction data-label=\"Title\" data-screen-label=\"01 Title\" data-speaker-notes=\"Welcome. This chapter pulls together fractions, percentages and standard form. We'll build the vocabulary first, then work through each idea with visuals and practice.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:radial-gradient(circle at 78% 18%, #FFFFFF 0%, #FAF7F1 60%);color:#20303C;font-family:Nunito,sans-serif;padding:96px 110px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:36px;letter-spacing:6px;color:#1FA39C;text-transform:uppercase;\">Chapter 5 · IGCSE Mathematics<\u002Fdiv>\n    <h1 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:118px;line-height:1.02;margin:24px 0 0;max-width:1300px;\">Fractions, Percentages &amp; Standard Form<\u002Fh1>\n    <p style=\"font-size:36px;color:#64727C;margin:34px 0 0;max-width:1000px;\">An interactive lesson — tap, shade and reveal your way through the whole chapter.<\u002Fp>\n    <div style=\"position:absolute;right:90px;bottom:90px;display:flex;gap:30px;align-items:flex-end;\">\n      <frac-circle parts=\"2\" filled=\"0\" color=\"#1FA39C\" size=\"150\"><\u002Ffrac-circle>\n      <frac-circle parts=\"4\" filled=\"0,1,2\" color=\"#3E6FE0\" size=\"180\"><\u002Ffrac-circle>\n      <frac-circle parts=\"8\" filled=\"0,1,2,3,4\" color=\"#EE7B4E\" size=\"210\"><\u002Ffrac-circle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Objectives\" data-screen-label=\"02 Objectives\" data-speaker-notes=\"Quick tour of what students will be able to do by the end. Don't dwell — this is a map, not the journey.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:84px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#1FA39C;text-transform:uppercase;\">Get ready<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:68px;margin:10px 0 40px;\">In this chapter you will…<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px 64px;font-size:38px;line-height:1.35;\">\n      <div style=\"display:flex;gap:20px;align-items:flex-start;\"><span style=\"color:#2FA56A;font-weight:800;flex:0 0 auto;\">✓<\u002Fspan><span>Find equivalent fractions and simplify them<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:flex-start;\"><span style=\"color:#2FA56A;font-weight:800;flex:0 0 auto;\">✓<\u002Fspan><span>Add, subtract, multiply and divide fractions and mixed numbers<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:flex-start;\"><span style=\"color:#2FA56A;font-weight:800;flex:0 0 auto;\">✓<\u002Fspan><span>Find a fraction of a number<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:flex-start;\"><span style=\"color:#2FA56A;font-weight:800;flex:0 0 auto;\">✓<\u002Fspan><span>Find a percentage of a number<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:flex-start;\"><span style=\"color:#2FA56A;font-weight:800;flex:0 0 auto;\">✓<\u002Fspan><span>Find one number as a percentage of another<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:flex-start;\"><span style=\"color:#2FA56A;font-weight:800;flex:0 0 auto;\">✓<\u002Fspan><span>Calculate percentage increases and decreases<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:flex-start;\"><span style=\"color:#2FA56A;font-weight:800;flex:0 0 auto;\">✓<\u002Fspan><span>Calculate reverse percentages<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:flex-start;\"><span style=\"color:#2FA56A;font-weight:800;flex:0 0 auto;\">✓<\u002Fspan><span>Use standard form and calculate with it<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Warm-up\" data-screen-label=\"03 Warm-up\" data-speaker-notes=\"Matching game. Click two cards that have the same value. Equivalent fractions reduce to the same simplest form — that's the link. Let students try before revealing the logic.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-end;\">\n      <div>\n        <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#1FA39C;text-transform:uppercase;\">Warm-up<\u002Fdiv>\n        <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:60px;margin:8px 0 0;\">Match the equal values<\u002Fh2>\n      <\u002Fdiv>\n      <div data-counter=\"\" style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:38px;color:#3E6FE0;\">0 / 6 pairs found<\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:34px;color:#64727C;margin:14px 0 24px;\">Click two cards that are worth the same. Equivalent fractions simplify to the same thing.<\u002Fp>\n    <pair-match style=\"flex:1;\">\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:22px;height:100%;\">\n        <div data-match=\"half\" style=\"background:#fff;border:3px solid #E7E0D4;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:54px;\"><f-r n=\"1\" d=\"2\"><\u002Ff-r><\u002Fdiv>\n        <div data-match=\"3q\" style=\"background:#fff;border:3px solid #E7E0D4;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:54px;\"><f-r n=\"9\" d=\"12\"><\u002Ff-r><\u002Fdiv>\n        <div data-match=\"2t\" style=\"background:#fff;border:3px solid #E7E0D4;border-radius:20px;display:flex;align-items:center;just <f-r n=\"12\" d=\"16\"><\u002Ff-r><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fpair-match>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Vocabulary\" data-screen-label=\"04 Vocab section\" data-speaker-notes=\"Section divider. Nine key words. Each is a flip card — read the word, ask students to predict the meaning, then click to flip and reveal the definition, an example and a picture.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#1FA39C;color:#fff;font-family:Nunito,sans-serif;padding:96px 110px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden;\">\n    <div class=\"c5deco\" style=\"position:absolute;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.12);top:90px;right:150px;\"><\u002Fdiv>\n    <div class=\"c5deco\" style=\"position:absolute;width:96px;height:96px;border-radius:50%;background:rgba(255,255,255,.10);bottom:120px;right:340px;animation-delay:.9s;\"><\u002Fdiv>\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:36px;letter-spacing:6px;opacity:.85;text-transform:uppercase;\">Part 1<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:120px;margin:18px 0 0;\">Key Vocabulary<\u002Fh2>\n    <p style=\"font-size:38px;opacity:.92;margin:30px 0 0;max-width:1050px;\">Nine words to know before we begin. <strong>Tap each card<\u002Fstrong> to flip it and reveal the meaning, an example and a picture.<\u002Fp>\n    <div style=\"position:absolute;right:-40px;bottom:-40px;font-size:520px;font-family:Fredoka,sans-serif;font-weight:700;opacity:.10;line-height:.8;\">½<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Vocab · Fraction\" data-screen-label=\"05 Fraction\" data-speaker-notes=\"A fraction is part of a whole. Two numbers, a line between. Ask students to read the example before flipping.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font "4\" d=\"12\" color=\"#8765E0\"><\u002Ff-r><span style=\"color:#64727C;\">&amp;<\u002Fspan><f-r n=\"3\" d=\"12\" color=\"#8765E0\"><\u002Ff-r><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:.85;background:#F4F1FD;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;border-left:3px solid #E7E0D4;\"><frac-bar parts=\"3\" filled=\"0\" color=\"#3E6FE0\" size=\"300\"><\u002Ffrac-bar><frac-bar parts=\"4\" filled=\"0\" color=\"#EE7B4E\" size=\"300\"><\u002Ffrac-bar><frac-bar parts=\"12\" filled=\"0,1,2,3,4,5,6\" color=\"#8765E0\" size=\"300\"><\u002Ffrac-bar><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fflip-card>\n    <\u002Fdiv>\n    <div style=\"text-align:center;font-size:29px;color:#9aa4ac;font-weight:600;\">Tap the card to flip it<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Vocab · Mixed number\" data-screen-label=\"12 Mixed number\" data-speaker-notes=\"Mixed number = whole number plus a fraction, like 2 and a quarter. Two full pizzas and a quarter slice.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:60px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;\"><div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:31px;letter-spacing:4px;color:#1FA39C;text-transform:uppercase;\">Key Vocabulary<\u002Fdiv><div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:31px;color:#64727C;\">8 / 9<\u002Fdiv><\u002Fdiv>\n    <div style=\"flex:1;display:flex;align-items:center;justify-content:center;min-height:0;\">\n      <flip-card class=\"c5card\" style=\"width:1320px;height:600px;\">\n        <div slot=\"front\" style=\"background:linear-gradient(150deg,#27B4AC,#198A83);border-radius:36px;box-shadow:0 26px 60px rgba(31,163,156,.30);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:60px;\">\n          <div style=\"font-family:Fredoka,sans-serif;font-weight:500;font-size:31px;letter-spacing:3px;text-transform:uppercase;opacity:.85;\">Whole + fraction<\u002Fdiv>\n          <div style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:96px;line-height:1.05;text-align:center;\">Mixed<br>Number<\u002Fdiv>\n          <div style=\"font-family:Nunito;font-weight:700;font-size:29px;background:rgba(255,255,255,.16);padding:14px 30px;border-radius:999px;\">Tap to reveal the meaning ↻<\u002Fdiv>\n        <\u002Fdiv>\n        <div slot=\"back\" style=\"background:#fff;border:3px solid #E7E0D4;border-radius:36px;box-shadow:0 26px 60px rgba(32,48,60,.12);display:flex;overflow:hidden;\">\n          <div style=\"flex:1.1;padding:56px 56px;display:flex;flex-direction:column;justify-content:center;gap:26px;\">\n            <div style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:52px;color:#1FA39C;\">Mixed number<\u002Fdiv>\n            <div style=\"font-size:34px;line-height:1.4;\">A <strong>whole number<\u002Fstrong> written together with a <strong>fraction<\u002Fstrong>.<\u002Fdiv>\n            <div style=\"font-size:36px;color:#64727C;\"><span style=\"font-weight:800;color:#20303C;\">Example&nbsp;&nbsp;<\u002Fspan><span style=\"display:inline-flex;align-items:center;font-weight:700;color:#20303C;font-size:44px;\">2<f-r n=\"1\" d=\"4\" color=\"#3E6FE0\"><\u002Ff-r><\u002Fspan> &nbsp;means two wholes and a quarter.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:.95;background:#F2F6FE;display:flex;align-items:center;justify-content:center;gap:14px;border-left:3px solid #E7E0D4;\"><frac-circle parts=\"1\" filled=\"0\" color=\"#3E6FE0\" size=\"150\"><\u002Ffrac-circle><frac-circle parts=\"1\" filled=\"0\" color=\"#3E6FE0\" size=\"150\"><\u002Ffrac-circle><frac-circle parts=\"4\" filled=\"0\" color=\"#3E6FE0\" size=\"150\"><\u002Ffrac-circle><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fflip-card>\n    <\u002Fdiv>\n    <div style=\"text-align:center;font-size:29px;color:#9aa4ac;font-weight:600;\">Tap the card to flip it<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Vocab · Standard form\" data-screen-label=\"13 Standard form\" data-speaker-notes=\"Standard form writes huge or tiny numbers as a x 10 to a power, where a is between 1 and 10. We use it later in the chapter.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:60px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;\"><div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:31px;letter-spacing:4px;color:#1FA39C;text-transform:uppercase;\">Key Vocabulary<\u002Fdiv><div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:31px;color:#64727C;\">9 / 9<\u002Fdiv><\u002Fdiv>\n    <div style=\"flex:1;display:flex;align-items:center;justify-content:center;min-height:0;\">\n      <flip-card class=\"c5card\" style=\"width:1320px;height:600px;\">\n        <div slot=\"front\" style=\"background:linear-gradient(150deg,#27B4AC,#198A83);border-radius:36px;box-shadow:0 26px 60px rgba(31,163,156,.30);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:60px;\">\n          <div style=\"font-family:Fredoka,sans-serif;font-weight:500;font-size:31px;letter-spacing:3px;text-transform:uppercase;opacity:.85;\">For very big &amp; very small<\u002Fdiv>\n          <div style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:96px;line-height:1.05;text-align:center;\">Standard<br>Form<\u002Fdiv>\n          <div style=\"font-family:Nunito;font-weight:700;font-size:29px;background:rgba(255,255,255,.16);padding:14px 30px;border-radius:999px;\">Tap to reveal the meaning ↻<\u002Fdiv>\n        <\u002Fdiv>\n        <div slot=\"back\" style=\"background:#fff;border:3px solid #E7E0D4;border-radius:36px;box-shadow:0 26px 60px rgba(32,48,60,.12);display:flex;overflow:hidden;\">\n          <div style=\"flex:1.15;padding:56px 56px;display:flex;flex-direction:column;justify-content:center;gap:26px;\">\n            <div style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:52px;color:#1FA39C;\">Standard form<\u002Fdiv>\n            <div style=\"font-size:33px;line-height:1.4;\">A way of writing very large or very small numbers as <span style=\"font-weight:700;white-space:nowrap;\">a × 10<sup style=\"font-size:.6em\">n<\u002Fsup><\u002Fspan>, where <strong>1 ≤ a &lt; 10<\u002Fstrong>.<\u002Fdiv>\n            <div style=\"font-size:36px;color:#64727C;\"><span style=\"font-weight:800;color:#20303C;\">Example&nbsp;&nbsp;<\u002Fspan>320 000 &nbsp;becomes…<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:.95;background:#F4F1FD;display:flex;align-items:center;justify-content:center;border-left:3px solid #E7E0D4;\"><div style=\"font-family:Fredoka;font-weight:700;font-size:72px;color:#8765E0;\">3.2 × 10<sup style=\"font-size:.55em\">5<\u002Fsup><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fflip-card>\n    <\u002Fdiv>\n    <div style=\"text-align:center;font-size:29px;color:#9aa4ac;font-weight:600;\">Tap the card to flip it<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Vocab check\" data-screen-label=\"14 Vocab quiz\" data-speaker-notes=\"Quick check. Let students vote before clicking. The correct option highlights green; wrong picks turn red.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 110px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#1FA39C;text-transform:uppercase;\">Check your understanding<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:58px;margin:10px 0 8px;max-width:1500px;\">Which number tells you how many <span style=\"color:#1FA39C;\">equal parts<\u002Fspan> the whole is split into?<\u002Fh2>\n    <p style=\"font-size:36px;color:#64727C;margin:0 0 36px;\">Tap your answer.<\u002Fp>\n    <div style=\"max-width:1300px;\">\n      <mc-quiz accent=\"#1FA39C\" yes=\"Correct — the denominator is the bottom number.\" no=\"Not quite — it's the bottom number, the denominator.\">\n        <div slot=\"opt\">The numerator<\u002Fdiv>\n        <div slot=\"opt\" data-correct=\"\">The denominator<\u002Fdiv>\n        <div slot=\"opt\">The mixed number<\u002Fdiv>\n        <div slot=\"opt\">The standard form<\u002Fdiv>\n      <\u002Fmc-quiz>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!--VOCAB-->\n<section data-label=\"Fractions\" data-screen-label=\"15 Fractions section\" data-speaker-notes=\"Part 2. Now we use the vocabulary. A fraction describes part of a whole — start everything from a picture.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#3E6FE0;color:#fff;font-family:Nunito,sans-serif;padding:96px 110px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:36px;letter-spacing:6px;opacity:.85;text-transform:uppercase;\">Part 2<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:120px;margin:18px 0 0;\">Understanding Fractions<\u002Fh2>\n    <p style=\"font-size:38px;opacity:.92;margin:30px 0 0;max-width:1050px;\">Parts of a whole, equivalent fractions, and writing them in their simplest form.<\u002Fp>\n    <div style=\"position:absolute;right:90px;bottom:80px;display:flex;gap:26px;\">\n      <frac-circle parts=\"3\" filled=\"0\" color=\"#fff\" size=\"150\"><\u002Ffrac-circle>\n      <frac-circle parts=\"6\" filled=\"0,1,2,3\" color=\"#fff\" size=\"180\"><\u002Ffrac-circle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Parts of a whole\" data-screen-label=\"16 Parts of a whole\" data-speaker-notes=\"A fraction is equal parts of one whole. Bottom = how many equal parts; top = how many we take. Pizza makes it concrete.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#3E6FE0;text-transform:uppercase;\">Understanding Fractions<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:62px;margin:8px 0 30px;\">A fraction is a part of a whole<\u002Fh2>\n    <div style=\"flex:1;display:flex;gap:64px;align-items:center;min-height:0;\">\n      <div style=\"flex:1.1;display:flex;flex-direction:column;gap:28px;font-size:33px;line-height:1.45;\">\n        <div>Split one whole into <strong>equal<\u002Fstrong> parts. The fraction tells you how many of those parts you are talking about.<\u002Fdiv>\n        <div style=\"display:flex;gap:22px;align-items:center;background:#fff;border:3px solid #E7E0D4;border-radius:20px;padding:26px 32px;\">\n          <span style=\"font-weight:800;font-size:64px;display:inline-flex;\"><f-r n=\"3\" d=\"8\" color=\"#3E6FE0\"><\u002Ff-r><\u002Fspan>\n          <div style=\"font-size:34px;color:#64727C;\"><strong style=\"color:#F2B33D;\">3<\u002Fstrong> = parts we take (numerator)<br><strong style=\"color:#EE7B4E;\">8<\u002Fstrong> = equal parts in the whole (denominator)<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;justify-content:center;\"><img src=\"4d9c1b1f-1695-4602-aefd-7e70c2f6d8c7\" alt=\"pizza cut into equal slices\" style=\"max-width:100%;max-height:560px;object-fit:contain;border-radius:18px;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Build a fraction\" data-screen-label=\"17 Build a fraction\" data-speaker-notes=\"Interactive. Click slices to shade them. The fraction updates live and shows the simplified form when possible. Try 4/8, 2/6, 3/9 with the class.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#3E6FE0;text-transform:uppercase;\">Your turn · interactive<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:62px;margin:8px 0 6px;\">Build a fraction — tap the slices<\u002Fh2>\n    <p style=\"font-size:36px;color:#64727C;margin:0 0 10px;\">Click parts of each shape to shade them. Watch the fraction build itself — and simplify.<\u002Fp>\n    <div style=\"flex:1;display:flex;gap:80px;align-items:center;justify-content:center;min-height:0;\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:18px;\"><frac-circle parts=\"8\" filled=\"0,1,2\" color=\"#3E6FE0\" size=\"340\" interactive=\"\" readout=\"\"><\u002Ffrac-circle><div style=\"font-size:29px;color:#9aa4ac;font-weight:600;\">Eighths<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:18px;\"><frac-circle parts=\"6\" filled=\"0,1\" color=\"#EE7B4E\" size=\"340\" interactive=\"\" readout=\"\"><\u002Ffrac-circle><div style=\"font-size:29px;color:#9aa4ac;font-weight:600;\">Sixths<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:18px;\"><frac-bar parts=\"10\" filled=\"0,1,2,3,4\" color=\"#2FA56A\" size=\"420\" interactive=\"\" readout=\"\"><\u002Ffrac-bar><div style=\"font-size:29px;color:#9aa4ac;font-weight:600;\">Tenths<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Equivalent fractions\" data-screen-label=\"18 Equivalent fractions\" data-speaker-notes=\"Multiply or divide top AND bottom by the same number to get an equivalent fraction. The shaded area never changes.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#3E6FE0;text-transform:uppercase;\">Understanding Fractions<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:62px;margin:8px 0 24px;\">Equivalent fractions<\u002Fh2>\n    <div style=\"display:flex;gap:60px;align-items:center;margin-bottom:24px;\">\n      <div style=\"font-size:33px;line-height:1.45;flex:1;\">Multiply <strong>or<\u002Fstrong> divide the top and bottom by the <strong>same<\u002Fstrong> number. The value — the shaded amount — stays exactly the same.<\u002Fdiv>\n      <img src=\"d254ae75-e398-4ba7-8043-ae58f5ad19aa\" alt=\"equivalent fraction pizzas\" style=\"max-height:220px;border-radius:16px;\">\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:center;gap:40px;background:#fff;border:3px solid #E7E0D4;border-radius:24px;padding:34px;flex:1;min-height:0;\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:14px;\"><frac-circle parts=\"2\" filled=\"0\" color=\"#3E6FE0\" size=\"230\"><\u002Ffrac-circle><span style=\"font-weight:800;font-size:44px;display:inline-flex;\"><f-r n=\"1\" d=\"2\" color=\"#3E6FE0\"><\u002Ff-r><\u002Fspan><\u002Fdiv>\n      <div style=\"text-align:center;color:#64727C;font-weight:700;font-size:36px;\">×2 top &amp; bottom<br>→<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:14px;\"><frac-circle parts=\"4\" filled=\"0,1\" color=\"#3E6FE0\" size=\"230\"><\u002Ffrac-circle><span style=\"font-weight:800;font-size:44px;display:inline-flex;\"><f-r n=\"2\" d=\"4\" color=\"#3E6FE0\"><\u002Ff-r><\u002Fspan><\u002Fdiv>\n      <div style=\"text-align:center;color:#64727C;font-weight:700;font-size:36px;\">×2 again<br>→<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:14px;\"><frac-circle parts=\"8\" filled=\"0,1,2,3\" color=\"#3E6FE0\" size=\"230\"><\u002Ffrac-circle><span style=\"font-weight:800;font-size:44px;display:inline-flex;\"><f-r n=\"4\" d=\"8\" color=\"#3E6FE0\"><\u002Ff-r><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Simplest form\" data-screen-label=\"19 Simplifying\" data-speaker-notes=\"To simplify, divide top and bottom by their highest common factor. Reveal the working step by step.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#3E6FE0;text-transform:uppercase;\">Worked example<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:62px;margin:8px 0 10px;\">Writing a fraction in its simplest form<\u002Fh2>\n    <p style=\"font-size:38px;color:#64727C;margin:0 0 30px;\">Simplify <span style=\"display:inline-flex;font-weight:800;color:#20303C;vertical-align:middle;\"><f-r n=\"18\" d=\"24\"><\u002Ff-r><\u002Fspan> &nbsp;— divide top and bottom by their highest common factor.<\u002Fp>\n    <div style=\"flex:1;min-height:0;\">\n      <reveal-box accent=\"#3E6FE0\" label=\"Reveal the working\">\n        <div style=\"display:flex;flex-direction:column;gap:22px;font-size:38px;\">\n          <div style=\"display:flex;align-items:center;gap:22px;background:#fff;border:3px solid #E7E0D4;border-radius:18px;padding:24px 30px;\"><span style=\"color:#64727C;font-weight:700;min-width:230px;\">HCF of 18 and 24<\u002Fspan><s ct — divide top and bottom by 6.\" no=\"Not quite — the HCF of 12 and 30 is 6, giving 2/5.\">\n        <div slot=\"opt\"><span style=\"display:inline-flex;align-items:center;\"><f-r n=\"6\" d=\"15\"><\u002Ff-r><\u002Fspan>&nbsp;&nbsp;(only divided by 2)<\u002Fdiv>\n        <div slot=\"opt\" data-correct=\"\"><span style=\"display:inline-flex;align-items:center;\"><f-r n=\"2\" d=\"5\"><\u002Ff-r><\u002Fspan><\u002Fdiv>\n        <div slot=\"opt\"><span style=\"display:inline-flex;align-items:center;\"><f-r n=\"4\" d=\"10\"><\u002Ff-r><\u002Fspan>&nbsp;&nbsp;(only divided by 3)<\u002Fdiv>\n        <div slot=\"opt\"><span style=\"display:inline-flex;align-items:center;\"><f-r n=\"1\" d=\"3\"><\u002Ff-r><\u002Fspan><\u002Fdiv>\n      <\u002Fmc-quiz>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Fractions &amp; decimals\" data-screen-label=\"20b Fractions and decimals\" data-speaker-notes=\"0580 link. A fraction is just a division, so it converts to a decimal. Decimals convert back by writing over a power of ten and simplifying. Mention recurring decimals.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#3E6FE0;text-transform:uppercase;\">Understanding Fractions<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:62px;margin:8px 0 26px;\">Fractions and decimals<\u002Fh2>\n    <div style=\"flex:1;display:flex;gap:30px;min-height:0;\">\n      <div style=\"flex:1;background:#fff;border:3px solid #E7E0D4;border-radius:22px;padding:38px;display:flex;flex-direction:column;justify-content:center;gap:18px;\">\n        <div style=\"font-family:Fredoka;font-weight:700;font-size:34px;color:#3E6FE0;\">Fraction → decimal<\u002Fdiv>\n        <div style=\"font-size:36px;color:#64727C;line-height:1.4;\">Divide the top by the bottom.<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:20px;font-weight:800;font-size:42px;\"><f-r n=\"3\" d=\"8\" color=\"#3E6FE0\"><\u002Ff-r><span style=\"color:#64727C;\">=<\u002Fspan><span>3 ÷ 8<\u002Fspan><span style=\"color:#64727C;\">=<\u002Fspan><span style=\"color:#2FA56A;\">0.375<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;background:#fff;border:3px solid #E7E0D4;border-radius:22px;padding:38px;display:flex;flex-direction:column;justify-content:center;gap:18px;\">\n        <div style=\"font-family:Fredoka;font-weight:700;font-size:34px;color:#EE7B4E;\">Decimal → fraction<\u002Fdiv>\n        <div style=\"font-size:36px;color:#64727C;line-height:1.4;\">Write over its place value, then simplify.<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:18px;font-weight:800;font-size:42px;flex-wrap:wrap;\"><span style=\"color:#EE7B4E;\">0.45<\u002Fspan><span style=\"color:#64727C;\">=<\u002Fspan><f-r n=\"45\" d=\"100\"><\u002Ff-r><span style=\"color:#2FA56A;\">=<\u002Fspan><f-r n=\"9\" d=\"20\" color=\"#2FA56A\"><\u002Ff-r><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:24px;background:#F4F1FD;border:3px solid #D6CAF6;border-radius:18px;padding:24px 32px;display:flex;align-items:center;gap:26px;font-size:34px;\">\n      <span style=\"font-family:Fredoka;font-weight:700;color:#8765E0;font-size:36px;white-space:nowrap;\">Recurring decimals<\u002Fspan>\n      <span style=\"color:#64727C;\">Some fractions never stop:<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:14px;font-weight:800;font-size:34px;\"><f-r n=\"1\" d=\"3\"><\u002Ff-r><span style=\"color:#64727C;\">=<\u002Fspan><span>0.333…<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Calculating\" data-screen-label=\"21 Calculating section\" data-speaker-notes=\"Part 3. The four operations with fractions, plus finding a fraction of an amount.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#3E6FE0;color:#fff;font-family:Nunito,sans-serif;padding:96px 110px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:36px;letter-spacing:6px;opacity:.85;text-transform:uppercase;\">Part 3<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:120px;margin:18px 0 0;\">Calculating with Fractions<\u002Fh2>\n    <p style=\"font-size:38px;opacity:.92;margin:30px 0 0;max-width:1050px;\">× &nbsp; ÷ &nbsp; + &nbsp; − &nbsp;— and finding a fraction of an amount.<\u002Fp>\n    <div style=\"position:absolute;right:90px;bottom:80px;font-family:Fredoka;font-weight:700;font-size:150px;opacity:.16;\">×÷<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Multiplying\" data-screen-label=\"22 Multiplying fractions\" data-speaker-notes=\"Multiply straight across: tops together, bottoms together, then simplify. No common denominator needed.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#3E6FE0;text-transform:uppercase;\">Calculating with Fractions<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:62px;margin:8px 0 8px;\">Multiplying fractions<\u002Fh2>\n    <p style=\"font-size:38px;color:#64727C;margin:0 0 26px;\">Multiply <strong>straight across<\u002Fstrong> — tops together, bottoms together — then simplify.<\u002Fp>\n    <div style=\"display:flex;align-items:center;justify-content:center;gap:30px;background:#fff;border:3px solid #E7E0D4;border-radius:24px;padding:30px;font-weight:800;font-size:56px;margin-bottom:24px;\">\n      <f-r n=\"2\" d=\"3\" color=\"#3E6FE0\"><\u002Ff-r><span style=\"color:#64727C;\">×<\u002Fspan><f-r n=\"3\" d=\"5\" color=\"#EE7B4E\"><\u002Ff-r><span style=\"color:#64727C;\">=<\u002Fspan><f-r n=\"2×3\" d=\"3×5\"><\u002Ff-r><span style=\"color:#64727C;\">=<\u002Fspan><f-r n=\"6\" d=\"15\"><\u002Ff-r><span style=\"color:#2FA56A;\">=<\u002Fspan><f-r n=\"2\" d=\"5\" color=\"#2FA56A\"><\u002Ff-r>\n    <\u002Fdiv>\n    <div style=\"flex:1;min-height:0;\">\n      <reveal-box accent=\"#3E6FE0\" label=\"Try it: 3/4 × 8/9\">\n        <div style=\"display:flex;align-items:center;gap:26px;font-weight:800;font-size:48px;background:#EFF8F2;border:3px solid #BFE6CE;border-radius:18px;padding:26px 34px;\">\n          <f-r n=\"3\" d=\"4\"><\u002Ff-r><span style=\"color:#64727C;\">×<\u002Fspan><f-r n=\"8\" d=\"9\"><\u002Ff-r><span style=\"color:#64727C;\">=<\u002Fspan><f-r n=\"24\" d=\"36\"><\u002Ff-r><span style=\"color:#2FA56A;\">=<\u002Fspan><f-r n=\"2\" d=\"3\" color=\"#2FA56A\"><\u002Ff-r>\n        <\u002Fdiv>\n      <\u002Freveal-box>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Dividing\" data-screen-label=\"23 Dividing fractions\" data-speaker-notes=\"Keep, Change, Flip: keep the first, change divide to multiply, flip the second. Then multiply across.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#3E6FE0;text-transform:uppercase;\">Calculating with Fractions<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:62px;margin:8px 0 22px;\">Dividing fractions — Keep, Change, Flip<\u002Fh2>\n    <div style=\"display:flex;gap:20px;margin-bottom:26px;\">\n      <div style=\"flex:1;background:#fff;border:3px solid #E7E0D4;border-radius:18px;paddin style=\"flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;min-height:0;\">\n      <div style=\"background:#fff;border:3px solid #E7E0D4;border-radius:20px;padding:30px;display:flex;flex-direction:column;justify-content:center;gap:14px;text-align:center;\"><div style=\"font-family:Fredoka;font-weight:700;font-size:54px;color:#EE7B4E;\">10%<\u002Fdiv><div style=\"display:inline-flex;justify-content:center;font-weight:800;font-size:40px;\"><f-r n=\"1\" d=\"10\"><\u002Ff-r><\u002Fdiv><div style=\"font-size:34px;color:#3E6FE0;font-weight:700;\">0.1<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:3px solid #E7E0D4;border-radius:20px;padding:30px;display:flex;flex-direction:column;justify-content:center;gap:14px;text-align:center;\"><div style=\"font-family:Fredoka;font-weight:700;font-size:54px;color:#EE7B4E;\">25%<\u002Fdiv><div style=\"display:inline-flex;justify-content:center;font-weight:800;font-size:40px;\"><f-r n=\"1\" d=\"4\"><\u002Ff-r><\u002Fdiv><div style=\"font-size:34px;color:#3E6FE0;font-weight:700;\">0.25<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:3px solid #E7E0D4;border-radius:20px;padding:30px;display:flex;flex-direction:column;justify-content:center;gap:14px;text-align:center;\"><div style=\"font-family:Fredoka;font-weight:700;font-size:54px;color:#EE7B4E;\">50%<\u002Fdiv><div style=\"display:inline-flex;justify-content:center;font-weight:800;font-size:40px;\"><f-r n=\"1\" d=\"2\"><\u002Ff-r><\u002Fdiv><div style=\"font-size:34px;color:#3E6FE0;font-weight:700;\">0.5<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:3px solid #E7E0D4;border-radius:20px;padding:30px;display:flex;flex-direction:column;justify-content:center;gap:14px;text-align:center;\"><div style=\"font-family:Fredoka;font-weight:700;font-size:54px;color:#EE7B4E;\">75%<\u002Fdiv><div style=\"display:inline-flex;justify-content:center;font-weight:800;font-size:40px;\"><f-r n=\"3\" d=\"4\"><\u002Ff-r><\u002Fdiv><div style=\"font-size:34px;color:#3E6FE0;font-weight:700;\">0.75<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:40px;margin-top:24px;font-size:34px;color:#64727C;\"><div>↳ <strong style=\"color:#20303C;\">% → fraction:<\u002Fstrong> write over 100, then simplify.<\u002Fdiv><div>↳ <strong style=\"color:#20303C;\">% → decimal:<\u002Fstrong> divide by 100.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Fraction → %\" data-screen-label=\"30 Fraction to percent\" data-speaker-notes=\"Multiply the fraction by 100. 7/20 × 100 = 35%. Or make an equivalent fraction over 100.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#EE7B4E;text-transform:uppercase;\">Worked example<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:62px;margin:8px 0 8px;\">Converting a fraction to a percentage<\u002Fh2>\n    <p style=\"font-size:38px;color:#64727C;margin:0 0 28px;\">Write <span style=\"display:inline-flex;font-weight:800;color:#20303C;vertical-align:middle;\"><f-r n=\"7\" d=\"20\"><\u002Ff-r><\u002Fspan> as a percentage — multiply by 100.<\u002Fp>\n    <div style=\"flex:1;min-height:0;\">\n      <reveal-box accent=\"#EE7B4E\" label=\"Reveal the working\">\n        <div style=\"display:flex;flex-direction:column;gap:18px;\">\n          <div style=\"display:flex;align-items:center;gap:22px;font-weight:800;font-size:46px;background:#fff;border:3px solid #E7E0D4;border-radius:16px;padding:24px 30px;\"><f-r n=\"7\" d=\"20\"><\u002Ff-r><span style=\"color:#64727C;\">× 100 =<\u002Fspan><f-r n=\"700\" d=\"20\"><\u002Ff-r><span style=\"color:#64727C;\">= 35<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:22px;font-weight:800;font-size:46px;background:#FDF1EA;border:3px solid #F6CBB2;border-radius:16px;padding:24px 30px;\"><span style=\"font-size:36px;color:#EE7B4E;font-weight:700;\">Answer<\u002Fspan><span style=\"color:#EE7B4E;font-size:56px;font-family:Fredoka;\">35%<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Freveal-box>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"% of amount\" data-screen-label=\"31 Percent of an amount\" data-speaker-notes=\"Find 1% by dividing by 100, then scale. Or use a decimal multiplier. 15% of 240 = 36.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#EE7B4E;text-transform:uppercase;\">Percentages<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:62px;margin:8px 0 8px;\">Finding a percentage of an amount<\u002Fh2>\n    <p style=\"font-size:38px;color:#64727C;margin:0 0 26px;\">Find <strong>15%<\u002Fstrong> of <strong>240<\u002Fstrong>.<\u002Fp>\n    <div style=\"flex:1;min-height:0;\">\n      <reveal-box accent=\"#EE7B4E\" label=\"Reveal two methods\">\n        <div style=\"display:flex;gap:24px;\">\n          <div style=\"flex:1;background:#fff;border:3px solid #E7E0D4;border-radius:18px;padding:28px;\"><div style=\"font-family:Fredoka;font-weight:700;font-size:36px;color:#EE7B4E;margin-bottom:14px;\">Build-up method<\u002Fdiv><div style=\"font-size:36px;line-height:1.6;\">10% of 240 = 24<br>5% of 240 = 12<br><strong>15% = 24 + 12 = 36<\u002Fstrong><\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1;background:#EFF8F2;border:3px solid #BFE6CE;border-radius:18px;padding:28px;\"><div style=\"font-family:Fredoka;font-weight:700;font-size:36px;color:#2FA56A;margin-bottom:14px;\">Multiplier method<\u002Fdiv><div style=\"font-size:36px;line-height:1.6;\">15% = 0.15<br>0.15 × 240<br><strong>= 36<\u002Fstrong><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Freveal-box>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Increase / decrease\" data-screen-label=\"32 Percentage change\" data-speaker-notes=\"Percentage change = change ÷ original × 100. Always over the ORIGINAL amount.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#EE7B4E;text-transform:uppercase;\">Percentages<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:62px;margin:8px 0 24px;\">Percentage increase &amp; decrease<\u002Fh2>\n    <div style=\"background:#20303C;color:#fff;border-radius:22px;padding:34px 44px;display:flex;align-items:center;justify-content:center;gap:30px;font-family:Fredoka;font-weight:700;font-size:46px;margin-bottom:26px;\">% change<span style=\"opacity:.6;\">=<\u002Fspan><f-r n=\"change\" d=\"original&nbsp;amount\" color=\"#F2B33D\"><\u002Ff-r><span style=\"opacity:.6;\">× 100<\u002Fspan><\u002Fdiv>\n    <div style=\"flex:1;min-height:0;\">\n      <reveal-box accent=\"#EE7B4E\" label=\"Example: price rises £40 → £50\">\n        <div style=\"display:flex;align-items:center;gap:22px;font-weight:800;font-size:42px;background:#EFF8F2;border:3px solid #BFE6CE;border-radius:18px;padding:26px 34px;flex-wrap:wrap;\"><span style=\"font-size:34px;color:#64727C;font-weight:700;\">change = 10<\u002Fspan><f-r n=\"10\" d=\"40\"><\u002Ff-r><span style=\"color:#64727C;\">× 100 =<\u002Fspan><span style=\"color:#2FA56A;\">25% increase<\u002Fspan><\u002Fdiv>\n      <\u002Freveal-box>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Change by %\" data-screen-label=\"33 Multiplier\" data-speaker-notes=\"Increase by 20%: ×1.20. Decrease by 20%: ×0.80. One step with a multiplier.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#EE7B4E;text-transform:uppercase;\">Percentages<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:62px;margin:8px 0 26px;\">Increasing &amp; decreasing with a multiplier<\u002Fh2>\n    <div style=\"flex:1;display:flex;gap:30px;min-height:0;\">\n      <div style=\"flex:1;background:#EFF8F2;border:3px solid #BFE6CE;border-radius:22px;padding:40px;display:flex;flex-direction:column;justify-content:center;gap:18px;\"><div style=\"font-family:Fredoka;font-weight:700;font-size:40px;color:#2FA56A;\">Increase by 20%<\u002Fdiv><div style=\"font-size:34px;color:#64727C;\">multiplier = 1 + 0.20 = <strong style=\"color:#20303C;\">1.20<\u002Fstrong><\u002Fdiv><div style=\"font-size:38px;font-weight:800;\">£250 × 1.20 = £300<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1;background:#FDF1EA;border:3px solid #F6CBB2;border-radius:22px;padding:40px;display:flex;flex-direction:column;justify-content:center;gap:18px;\"><div style=\"font-family:Fredoka;font-weight:700;font-size:40px;color:#EE7B4E;\">Decrease by 20%<\u002Fdiv><div style=\"font-size:34px;color:#64727C;\">multiplier = 1 − 0.20 = <strong style=\"color:#20303C;\">0.80<\u002Fstrong><\u002Fdiv><div style=\"font-size:38px;font-weight:800;\">£250 × 0.80 = £200<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Reverse %\" data-screen-label=\"34 Reverse percentage\" data-speaker-notes=\"Working backwards. If a price after 20% increase is £300, divide by the multiplier 1.20 to get the original £250.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#EE7B4E;text-transform:uppercase;\">Percentages · challenge<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:62px;margin:8px 0 8px;\">Reverse percentages<\u002Fh2>\n    <p style=\"font-size:38px;color:#64727C;margin:0 0 26px;\">After a <strong>20% increase<\u002Fstrong>, a coat costs <strong>£300<\u002Fstrong>. What was the original price?<\u002Fp>\n    <div style=\"flex:1;min-height:0;\">\n      <reveal-box accent=\"#EE7B4E\" label=\"Reveal the working\">\n        <div style=\"display:flex;flex-direction:column;gap:18px;font-size:38px;\">\n          <div style=\"display:flex;align-items:center;gap:20px;background:#fff;border:3px solid #E7E0D4;border-radius:16px;padding:24px 30px;\"><span style=\"color:#64727C;font-weight:700;min-width:340px;\">£300 represents<\u002Fspan><strong>120% of the original<\u002Fstrong><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:20px;background:#EFF8F2;border:3px solid #BFE6CE;border-radius:16px;padding:24px 30px;\"><span style=\"color:#2FA56A;font-weight:700;min-width:340px;\">Divide by the multiplier<\u002Fspan><strong style=\"font-size:40px;\">£300 ÷ 1.20 = £250<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Freveal-box>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Percentages in words\" data-screen-label=\"34b Percentage word problem\" data-speaker-notes=\"0580 worded percentage change. Find the actual change, then divide by the ORIGINAL value and multiply by 100. House: change 4800 over 120000 gives 4%.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#EE7B4E;text-transform:uppercase;\">Problem solving · 0580<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:58px;margin:8px 0 8px;\">Percentages in words<\u002Fh2>\n    <p style=\"font-size:37px;color:#64727C;margin:0 0 26px;line-height:1.4;\">The value of a house increased from <strong>$120 000<\u002Fstrong> to <strong>$124 800<\u002Fstrong>. What percentage increase is this?<\u002Fp>\n    <div style=\"flex:1;min-height:0;\">\n      <reveal-box accent=\"#EE7B4E\" label=\"Reveal the working\">\n        <div style=\"display:flex;flex-direction:column;gap:16px;font-size:38px;\">\n          <div style=\"display:flex;align-items:center;gap:20px;background:#fff;border:3px solid #E7E0D4;border-radius:16px;padding:22px 30px;\"><span style=\"color:#64727C;font-weight:700;min-width:300px;\">Actual increase<\u002Fspan><strong>124 800 − 120 000 = 4800<\u002Fstrong><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:20px;background:#fff;border:3px solid #E7E0D4;border-radius:16px;padding:22px 30px;font-weight:800;\"><span style=\"color:#64727C;font-weight:700;min-width:300px;\">Over the original × 100<\u002Fspan><f-r n=\"4800\" d=\"120 000\"><\u002Ff-r><span style=\"color:#64727C;\">× 100<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:20px;background:#FDF1EA;border:3px solid #F6CBB2;border-radius:16px;padding:22px 30px;\"><span style=\"color:#EE7B4E;font-weight:700;min-width:300px;\">Answer<\u002Fspan><strong style=\"color:#EE7B4E;font-size:44px;font-family:Fredoka;\">4% increase<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Freveal-box>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Percentages · quiz\" data-screen-label=\"35 Percentages quiz\" data-speaker-notes=\"Check. 30% of 80 = 24.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 110px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#EE7B4E;text-transform:uppercase;\">Check your understanding<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:58px;margin:10px 0 8px;\">What is <span style=\"color:#EE7B4E;\">30%<\u002Fspan> of 80?<\u002Fh2>\n    <p style=\"font-size:36px;color:#64727C;margin:0 0 36px;\">Tap your answer.<\u002Fp>\n    <div style=\"max-width:1000px;\">\n      <mc-quiz accent=\"#EE7B4E\" yes=\"Correct — 0.30 × 80 = 24.\" no=\"Not quite — 10% is 8, so 30% is 24.\">\n        <div slot=\"opt\">16<\u002Fdiv>\n        <div slot=\"opt\" data-correct=\"\">24<\u002Fdiv>\n        <div slot=\"opt\">2.4<\u002Fdiv>\n        <div slot=\"opt\">240<\u002Fdiv>\n      <\u002Fmc-quiz>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Standard Form\" data-screen-label=\"36 Standard form section\" data-speaker-notes=\"Part 5. A neat way to write very big and very small numbers using powers of 10.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#8765E0;color:#fff;font-family:Nunito,sans-serif;padding:96px 110px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:36px;letter-spacing:6px;opacity:.9;text-transform:uppercase;\">Part 5<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:130px;margin:18px 0 0;\">Standard Form<\u002Fh2>\n    <p style=\"font-size:38px;opacity:.95;margin:30px 0 0;max-width:1100px;\">Writing very large and very small numbers as <span style=\"font-weight:700;white-space:nowrap;\">a × 10<sup style=\"font-size:.6em\">n<\u002Fsup><\u002Fspan>.<\u002Fp>\n    <div style=\"position:absolute;right:100px;bottom:90px;font-family:Fredoka;font-weight:700;font-size:130px;opacity:.18;\">10ⁿ<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"The rule\" data-screen-label=\"37 Standard form rule\" data-speaker-notes=\"The first number a must be at least 1 and less than 10. n is the power of ten. Positive n = big, negative n = small.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#8765E0;text-transform:uppercase;\">Standard Form<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:62px;margin:8px 0 30px;\">The standard form rule<\u002Fh2>\n    <div style=\"display:flex;justify-content:center;align-items:center;gap:0;background:#fff;border:3px solid #E7E0D4;border-radius:24px;padding:50px;margin-bottom:30px;\">\n      <span style=\"font-family:Fredoka;font-weight:700;font-size:120px;color:#3E6FE0;\">a<\u002Fspan>\n      <span style=\"font-family:Fredoka;font-weight:700;font-size:90px;color:#64727C;margin:0 24px;\">× 10<\u002Fspan>\n      <span style=\"font-family:Fredoka;font-weight:700;font-size:120px;color:#EE7B4E;position:relative;top:-44px;\">n<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:30px;font-size:38px;\">\n      <div style=\"flex:1;background:#F2F6FE;border:3px solid #C9D9F8;border-radius:18px;padding:28px;\"><strong style=\"color:#3E6FE0;font-size:38px;\">a<\u002Fstrong> &nbsp;is a number with <strong>1 ≤ a &lt; 10<\u002Fstrong> — exactly one digit before the decimal point.<\u002Fdiv>\n      <div style=\"flex:1;background:#F4F1FD;border:3px solid #D6CAF6;border-radius:18px;padding:28px;\"><strong style=\"color:#EE7B4E;font-size:38px;\">n<\u002Fstrong> &nbsp;is the power of 10. <strong>Positive<\u002Fstrong> for big numbers, <strong>negative<\u002Fstrong> for small.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Large numbers\" data-screen-label=\"38 Large numbers\" data-speaker-notes=\"Move the decimal point left until one digit remains in front. Count the jumps — that's the positive power.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#8765E0;text-transform:uppercase;\">Worked example<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:62px;margin:8px 0 8px;\">Writing large numbers in standard form<\u002Fh2>\n    <p style=\"font-size:38px;color:#64727C;margin:0 0 26px;\">Write <strong>6 240 000<\u002Fstrong> in standard form.<\u002Fp>\n    <div style=\"flex:1;min-height:0;\">\n      <reveal-box accent=\"#8765E0\" label=\"Reveal the working\">\n        <div style=\"display:flex;flex-direction:column;gap:18px;font-size:38px;\">\n          <div style=\"background:#fff;border:3px solid #E7E0D4;border-radius:16px;padding:24px 30px;\">Move the point so one digit stays in front: <strong>6.24<\u002Fstrong><\u002Fdiv>\n          <div style=\"background:#fff;border:3px solid #E7E0D4;border-radius:16px;padding:24px 30px;\">Count the jumps left: <strong style=\"color:#8765E0;\">6 places<\u002Fstrong><\u002Fdiv>\n          <div style=\"background:#F4F1FD;border:3px solid #D6CAF6;border-radius:16px;padding:24px 30px;font-weight:800;font-size:48px;color:#8765E0;\">6.24 × 10⁶<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Freveal-box>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Small numbers\" data-screen-label=\"39 Small numbers\" data-speaker-notes=\"For small numbers move the point right; the power is negative. 0.00045 = 4.5 × 10 to the minus 4.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#8765E0;text-transform:uppercase;\">Worked example<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:62px;margin:8px 0 8px;\">Writing small numbers in standard form<\u002Fh2>\n    <p style=\"font-size:38px;color:#64727C;margin:0 0 26px;\">Write <strong>0.00045<\u002Fstrong> in standard form.<\u002Fp>\n    <div style=\"flex:1;min-height:0;\">\n      <reveal-box accent=\"#8765E0\" label=\"Reveal the working\">\n        <div style=\"display:flex;flex-direction:column;gap:18px;font-size:38px;\">\n          <div style=\"background:#fff;border:3px solid #E7E0D4;border-radius:16px;padding:24px 30px;\">Move the point right to get <strong>4.5<\u002Fstrong><\u002Fdiv>\n          <div style=\"background:#fff;border:3px solid #E7E0D4;border-radius:16px;padding:24px 30px;\">Jumps right = 4, so the power is <strong style=\"color:#8765E0;\">negative<\u002Fstrong><\u002Fdiv>\n          <div style=\"background:#F4F1FD;border:3px solid #D6CAF6;border-radius:16px;padding:24px 30px;font-weight:800;font-size:48px;color:#8765E0;\">4.5 × 10⁻⁴<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Freveal-box>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"× and ÷\" data-screen-label=\"40 Multiply / divide\" data-speaker-notes=\"Multiply the front numbers, add the powers. Divide the fronts, subtract the powers. Adjust so a stays between 1 and 10.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#8765E0;text-transform:uppercase;\">Standard Form<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:62px;margin:8px 0 26px;\">Multiplying &amp; dividing in standard form<\u002Fh2>\n    <div style=\"flex:1;display:flex;gap:30px;min-height:0;\">\n      <div style=\"flex:1;background:#fff;border:3px solid #E7E0D4;border-radius:22px;padding:40px;display:flex;flex-direction:column;justify-content:center;gap:20px;\"><div style=\"font-family:Fredoka;font-weight:700;font-size:38px;color:#3E6FE0;\">Multiply → add powers<\u002Fdiv><div style=\"font-size:36px;color:#64727C;line-height:1.5;\">(3 × 10⁴) × (2 × 10³)<\u002Fdiv><div style=\"font-size:34px;font-weight:800;\">= 6 × 10⁷<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1;background:#fff;border:3px solid #E7E0D4;border-radius:22px;padding:40px;display:flex;flex-direction:column;justify-content:center;gap:20px;\"><div style=\"font-family:Fredoka;font-weight:700;font-size:38px;color:#EE7B4E;\">Divide → subtract powers<\u002Fdiv><div style=\"font-size:36px;color:#64727C;line-height:1.5;\">(8 × 10⁹) ÷ (2 × 10⁵)<\u002Fdiv><div style=\"font-size:34px;font-weight:800;\">= 4 × 10⁴<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Standard form · quiz\" data-screen-label=\"41 Standard form quiz\" data-speaker-notes=\"Check. 52000 = 5.2 × 10^4.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:72px 110px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#8765E0;text-transform:uppercase;\">Check your understanding<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:58px;margin:10px 0 8px;\">Write <span style=\"color:#8765E0;\">52 000<\u002Fspan> in standard form.<\u002Fh2>\n    <p style=\"font-size:36px;color:#64727C;margin:0 0 36px;\">Tap your answer.<\u002Fp>\n    <div style=\"max-width:1100px;\">\n      <mc-quiz accent=\"#8765E0\" yes=\"Correct — 5.2 with the point moved 4 places.\" no=\"Not quite — one digit before the point: 5.2 × 10⁴.\">\n        <div slot=\"opt\">52 × 10³<\u002Fdiv>\n        <div slot=\"opt\" data-correct=\"\">5.2 × 10⁴<\u002Fdiv>\n        <div slot=\"opt\">5.2 × 10³<\u002Fdiv>\n        <div slot=\"opt\">5.2 × 10⁻⁴<\u002Fdiv>\n      <\u002Fmc-quiz>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Do you know…?\" data-screen-label=\"42 Summary\" data-speaker-notes=\"Recap the big ideas. Read across the cards. This mirrors the original 'do you know' summary slide.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#20303C;color:#fff;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#5BD0C8;text-transform:uppercase;\">Recap<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:64px;margin:8px 0 36px;\">Do you know…?<\u002Fh2>\n    <div style=\"flex:1;display:grid;grid-template-columns:repeat(2,1fr);gap:24px;min-height:0;\">\n      <div style=\"background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.14);border-radius:20px;padding:30px 34px;display:flex;gap:22px;align-items:center;\"><span style=\"font-family:Fredoka;font-weight:700;font-size:46px;color:#5BD0C8;\">①<\u002Fspan><span style=\"font-size:36px;line-height:1.35;\">Equivalent fractions share the same value — simplify by dividing top &amp; bottom by the HCF.<\u002Fspan><\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.14);border-radius:20px;padding:30px 34px;display:flex;gap:22px;align-items:center;\"><span style=\"font-family:Fredoka;font-weight:700;font-size:46px;color:#7FA0F0;\">②<\u002Fspan><span style=\"font-size:36px;line-height:1.35;\">Multiply across; for ÷ use Keep–Change–Flip; for +/− make a common denominator.<\u002Fspan><\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.14);border-radius:20px;padding:30px 34px;display:flex;gap:22px;align-items:center;\"><span style=\"font-family:Fredoka;font-weight:700;font-size:46px;color:#F2A074;\">③<\u002Fspan><span style=\"font-size:36px;line-height:1.35;\">Per cent means out of 100. Use a decimal multiplier to find, increase or decrease.<\u002Fspan><\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.14);border-radius:20px;padding:30px 34px;display:flex;gap:22px;align-items:center;\"><span style=\"font-family:Fredoka;font-weight:700;font-size:46px;color:#B49BF0;\">④<\u002Fspan><span style=\"font-size:36px;line-height:1.35;\">Standard form is a × 10ⁿ with 1 ≤ a &lt; 10 — positive power for big, negative for small.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Are you able to…?\" data-screen-label=\"43 Closing checklist\" data-speaker-notes=\"Self-assessment. Students tick what they can now do. Mirrors the original closing checklist. Encourage them to revisit any unchecked skill.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:radial-gradient(circle at 80% 15%,#FFFFFF,#FAF7F1 60%);color:#20303C;font-family:Nunito,sans-serif;padding:72px 100px;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"font-family:Fredoka,sans-serif;font-weight:600;font-size:34px;letter-spacing:4px;color:#1FA39C;text-transform:uppercase;\">Chapter 5 · Wrap-up<\u002Fdiv>\n    <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:64px;margin:8px 0 14px;\">Are you able to…?<\u002Fh2>\n    <p style=\"font-size:34px;color:#64727C;margin:0 0 28px;\">Tap each skill you can now do with confidence.<\u002Fp>\n    <div style=\"flex:1;display:grid;grid-template-columns:1fr 1fr;gap:16px 40px;min-height:0;align-content:center;\">\n      <label class=\"chk\" style=\"display:flex;gap:18px;align-items:center;font-size:35px;background:#fff;border:3px solid #E7E0D4;border-radius:16px;padding:18px 24px;cursor:pointer;\"><input type=\"checkbox\" style=\"width:30px;height:30px;accent-color:#2FA56A;flex:0 0 auto;\">Simplify fractions and find equivalent ones<\u002Flabel>\n      <label class=\"chk\" style=\"display:flex;gap:18px;align-items:center;font-size:35px;background:#fff;border:3px solid #E7E0D4;border-radius:16px;padding:18px 24px;cursor:pointer;\"><input type=\"checkbox\" style=\"width:30px;height:30px;accent-color:#2FA56A;flex:0 0 auto;\">Add, subtract, multiply &amp; divide fractions<\u002Flabel>\n      <label class=\"chk\" style=\"display:flex;gap:18px;align-items:center;font-size:35px;background:#fff;border:3px solid #E7E0D4;border-radius:16px;padding:18px 24px;cursor:pointer;\"><input type=\"checkbox\" style=\"width:30px;height:30px;accent-color:#2FA56A;flex:0 0 auto;\">Find a fraction of an amount<\u002Flabel>\n      <label class=\"chk\" style=\"display:flex;gap:18px;align-items:center;font-size:35px;background:#fff;border:3px solid #E7E0D4;border-radius:16px;padding:18px 24px;cursor:pointer;\"><input type=\"checkbox\" style=\"width:30px;height:30px;accent-color:#2FA56A;flex:0 0 auto;\">Find a percentage of an amount<\u002Flabel>\n      <label class=\"chk\" style=\"display:flex;gap:18px;align-items:center;font-size:35px;background:#fff;border:3px solid #E7E0D4;border-radius:16px;padding:18px 24px;cursor:pointer;\"><input type=\"checkbox\" style=\"width:30px;height:30px;accent-color:#2FA56A;flex:0 0 auto;\">Calculate percentage increase, decrease &amp; reverse<\u002Flabel>\n      <label class=\"chk\" style=\"display:flex;gap:18px;align-items:center;font-size:35px;background:#fff;border:3px solid #E7E0D4;border-radius:16px;padding:18px 24px;cursor:pointer;\"><input type=\"checkbox\" style=\"width:30px;height:30px;accent-color:#2FA56A;flex:0 0 auto;\">Write &amp; calculate with standard form<\u002Flabel>\n    <\u002Fdiv>\n    <div style=\"text-align:center;font-family:Fredoka;font-weight:600;font-size:36px;color:#1FA39C;margin-top:22px;\">Well done — that's Chapter 5! 🎉<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<section data-label=\"Quiz: Chapter 5\" data-screen-label=\"44 Built-in quiz\" data-speaker-notes=\"Built-in scored quiz — 20 questions on fractions, percentages and standard form, including multiplying and dividing in standard form. One at a time, running score, instant feedback, and a retry.\">\n  <div style=\"width:100%;height:100%;box-sizing:border-box;background:#FAF7F1;color:#20303C;font-family:Nunito,sans-serif;padding:56px 90px;display:flex;flex-direction:column;overflow:auto;\">\n    <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:20px;\">\n      <span style=\"width:60px;height:60px;border-radius:16px;background:#1FA39C;color:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;\">📝<\u002Fspan>\n      <div>\n        <h2 style=\"font-family:Fredoka,sans-serif;font-weight:700;font-size:54px;margin:0;\">Chapter 5 — built-in quiz<\u002Fh2>\n        <div style=\"font-size:28px;color:#64727C;font-weight:700;margin-top:4px;\">20 questions · instant feedback · scored — includes × and ÷ in standard form.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <x-import component-from-global-scope=\"exam-quiz\" set=\"ch5\" hint-size=\"100%,840px\"><\u002Fx-import>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!--SLIDES-END-->\n<\u002Fx-import>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount(){ this._buildGrid(); }\n  componentDidUpdate(){ this._buildGrid(); }\n  _buildGrid(){\n    const grid = document.getElementById('pctGrid');\n    if(!grid || grid._built) return;\n    grid._built = true;\n    const readout = document.getElementById('pctReadout');\n    let count = 0;\n    const cells = [];\n    for(let i=0;i<100;i++){\n      const c = document.createElement('div');\n      const on = i < 45;            // start at 45 to match the example\n      if(on) count++;\n      c.style.cssText = 'border-radius:4px;cursor:pointer;transition:background .1s;background:'+(on?'#EE7B4E':'#fff')+';border:2px solid #E7E0D4;';\n      c.dataset.on = on ? '1':'';\n      c.addEventListener('click',()=>{\n        const isOn = c.dataset.on==='1';\n        c.dataset.on = isOn ? '' : '1';\n        c.style.background = isOn ? '#fff' : '#EE7B4E';\n        count += isOn ? -1 : 1;\n        if(readout) readout.textContent = count + '%';\n      });\n      cells.push(c); grid.appendChild(c);\n    }\n  }\n  renderVals(){ return {}; }\n}\n<\u002Fscript>\n\n\n\n<style>\n#penCanvas{position:fixed;inset:0;z-index:2147483640;pointer-events:none;touch-action:auto;}\n#penBar{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:2147483647;\n  display:flex;flex-wrap:wrap;justify-content:center;align-items:stretch;gap:5px;padding:5px 7px;border-radius:14px;\n  background:linear-gradient(135deg,rgba(43,70,128,.62),rgba(27,79,138,.52) 45%,rgba(104,78,180,.57));\n  -webkit-backdrop-filter:blur(16px) saturate(165%);backdrop-filter:blur(16px) saturate(165%);\n  border:1px solid rgba(255,255,255,.4);\n  box-shadow:0 6px 26px rgba(48,62,150,.45),0 1px 6px rgba(0,0,0,.25),inset 0 1px 1px rgba(255,255,255,.55);\n  max-width:calc(100vw - 16px);font-family:'Inter',system-ui,sans-serif;}\n.pen-group{display:flex;align-items:center;gap:4px;flex:0 0 auto;}\n.pen-sep{width:1px;align-self:stretch;flex:0 0 auto;margin:1px;background:linear-gradient(rgba(255,255,255,0),rgba(255,255,255,.55),rgba(255,255,255,0));}\n.pen-btn{appearance:none;-webkit-appearance:none;cursor:pointer;font-family:inherit;touch-action:manipulation;\n  flex:0 0 auto;min-width:30px;height:32px;padding:3px 5px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;\n  color:#fff;font-size:10px;font-weight:700;line-height:1.02;background:linear-gradient(160deg,rgba(255,255,255,.24),rgba(255,255,255,.06));\n  border:1px solid rgba(255,255,255,.28);box-shadow:inset 0 1px 1px rgba(255,255,255,.45),0 1px 3px rgba(0,0,0,.16);\n  transition:transform .1s,box-shadow .12s,background .12s;user-select:none;-webkit-user-select:none;text-shadow:0 1px 1px rgba(0,0,0,.4);}\n.pen-btn:active{transform:scale(.92);}\n.pen-btn svg{width:13px;height:13px;stroke:#fff;pointer-events:none;}\n.pen-btn span{pointer-events:none;}\n.pen-btn.active{background:linear-gradient(160deg,rgba(255,255,255,.42),rgba(255,255,255,.18));box-shadow:inset 0 1px 1px rgba(255,255,255,.65),0 0 0 1.5px rgba(255,255,255,.6),0 2px 8px rgba(0,0,0,.28);}\n.pen-toggle{min-width:36px;}\n.pen-toggle .st{font-size:11px;font-weight:800;}\n#penStateTxt{color:#ffe08a;}\n.pen-toggle.active #penStateTxt{color:#c6f6d5;}\n.pen-swatch{appearance:none;-webkit-appearance:none;padding:0;flex:0 0 auto;min-width:24px;height:32px;border-radius:8px;cursor:pointer;touch-action:manipulation;border:1px solid rgba(255,255,255,.4);\n  box-shadow:inset 0 1px 2px rgba(255,255,255,.5),inset 0 -2px 4px rgba(0,0,0,.28),0 1px 3px rgba(0,0,0,.2);transition:transform .1s,box-shadow .12s;}\n.pen-swatch:active{transform:scale(.92);}\n.pen-swatch.active{transform:translateY(-1px);box-shadow:0 0 0 2px #fff,inset 0 1px 2px rgba(255,255,255,.5),0 2px 8px rgba(0,0,0,.32);}\n#penDragGhost{position:fixed;z-index:2147483645;pointer-events:none;opacity:.9;transform:translate(-50%,-50%);\n  background:#fff;border:3px solid #7C5CFF;border-radius:12px;padding:8px 14px;font-weight:800;\n  font-family:'Inter',system-ui,sans-serif;box-shadow:0 8px 22px rgba(0,0,0,.25);}\n@media(max-width:640px){#penBar{bottom:10px;gap:4px;padding:4px 5px;}.pen-btn{min-width:28px;height:30px;}.pen-btn svg{width:12px;height:12px;}.pen-swatch{min-width:22px;height:30px;}.pen-toggle{min-width:34px;}}\n@media print{#penBar,#penCanvas{disp
