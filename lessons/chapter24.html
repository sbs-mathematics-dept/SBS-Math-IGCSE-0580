800;color:#FFD98A;\">Tree diagrams<\/div>\n      <div style=\"font-size:25px;line-height:1.7;\"><b>Along<\/b> a path \u2192 <b>multiply<\/b> (AND)<br><b>Between<\/b> paths \u2192 <b>add<\/b> (OR)<br>Branches from a point <b>sum to 1<\/b><br>Without replacement \u2192 <b>denominators drop<\/b><\/div>\n    <\/div>\n    <div style=\"background:rgba(255,255,255,.1);border-radius:18px;padding:26px 30px;display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:26px;font-weight:800;color:#FFD98A;\">Set notation<\/div>\n      <div style=\"font-size:25px;line-height:1.7;\"><b>\u222a<\/b> union = or/both \u00b7 <b>\u2229<\/b> intersection = both<br><b>A\u2032<\/b> = not A \u00b7 <b>n(A)<\/b> = number in A<br>P(event) = <span class=\"frac\"><span class=\"num\">n(event)<\/span><span class=\"den\">n(\u2130)<\/span><\/span><\/div>\n    <\/div>\n    <div style=\"background:rgba(255,255,255,.1);border-radius:18px;padding:26px 30px;display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:26px;font-weight:800;color:#FFD98A;\">Complement<\/div>\n      <div style=\"font-size:25px;line-height:1.7;\">P(A\u2032) = <b>1 \u2212 P(A)<\/b><br>Handy for \u201c<b>at least one<\/b>\u201d:<br>P(\u22651) = 1 \u2212 P(none)<\/div>\n    <\/div>\n    <div style=\"background:rgba(255,255,255,.1);border-radius:18px;padding:26px 30px;display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"font-size:26px;font-weight:800;color:#FFD98A;\">Conditional probability<\/div>\n      <div style=\"font-size:25px;line-height:1.7;\">P(B | A) = <span class=\"frac\"><span class=\"num\">P(A \u2229 B)<\/span><span class=\"den\">P(A)<\/span><\/span> = <span class=\"frac\"><span class=\"num\">n(A \u2229 B)<\/span><span class=\"den\">n(A)<\/span><\/span><br>\u201cGiven\u201d = <b>shrink the world to A<\/b><\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Well done\" data-screen-label=\"Closing\" data-speaker-notes=\"Well done. You have covered probability with tree diagrams, Venn diagrams, and two-way tables, including conditional probability. Keep practising by drawing the diagrams and labelling every branch and region.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:96px 110px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#4A3C9E;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:70px;bottom:-20px;opacity:.16;\"><svg viewBox=\"0 0 300 260\" width=\"360\" height=\"320\"><circle cx=\"120\" cy=\"130\" r=\"95\" fill=\"#D6409F\"><\/circle><circle cx=\"200\" cy=\"130\" r=\"95\" fill=\"#F5B833\"><\/circle><\/svg><\/div>\n  <div style=\"position:relative;z-index:1;max-width:1200px;\">\n    <div style=\"font-size:30px;font-weight:600;letter-spacing:.06em;color:#FFC23C;margin-bottom:20px;\">CHAPTER 24 COMPLETE<\/div>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:104px;line-height:1.02;margin-bottom:28px;\">Well done! \ud83c\udf89<\/h2>\n    <p style=\"font-size:34px;color:#E4DFFA;line-height:1.45;margin-bottom:34px;\">You can now use tree diagrams, Venn diagrams and two-way tables to find the probability of combined and conditional events \u2014 and explain every step.<\/p>\n    <div style=\"display:flex;gap:18px;flex-wrap:wrap;\">\n      <div style=\"background:rgba(255,255,255,.14);border-radius:14px;padding:18px 28px;font-size:26px;font-weight:700;\">\u2713 12 key words<\/div>\n      <div style=\"background:rgba(255,255,255,.14);border-radius:14px;padding:18px 28px;font-size:26px;font-weight:700;\">\u2713 Animated tree &amp; Venn diagrams<\/div>\n      <div style=\"background:rgba(255,255,255,.14);border-radius:14px;padding:18px 28px;font-size:26px;font-weight:700;\">\u2713 2 step-by-step builders<\/div>\n      <div style=\"background:rgba(255,255,255,.14);border-radius:14px;padding:18px 28px;font-size:26px;font-weight:700;\">\u2713 18 exam questions<\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<\/x-import>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const nums = (s) => ((s||'').toString().match(/-?\\d+(\\.\\d+)?/g) || []).map(Number);\n    document.addEventListener('click', (e) => {\n      const btn = e.target.closest('.quiz-check');\n      if (btn) {\n        const box = btn.closest('.quiz');\n        const input = box.querySelector('.quiz-input');\n        const fb = box.querySelector('.quiz-feedback');\n        const mode = btn.dataset.mode || 'num';\n        let ok = false;\n        if (mode === 'text') {\n          const norm = (s) => (s||'').toLowerCase().replace(/\\s+/g,'');\n          const wants = (btn.dataset.answer||'').split('|').map(norm);\n          ok = wants.includes(norm(input.value));\n        } else {\n          // numeric: accept fraction a/b, decimals, or matching integer list\n          const raw = (input.value||'').trim();\n          const want = nums(btn.dataset.answer);\n          const tol = parseFloat(btn.dataset.tol || '0.02');\n          // evaluate a single fraction or decimal in the input\n          let val = null;\n          const fm = raw.match(/^(-?\\d+(?:\\.\\d+)?)\\s*\\/\\s*(-?\\d+(?:\\.\\d+)?)$/);\n          if (fm) { val = parseFloat(fm[1]) / parseFloat(fm[2]); }\n          else if (/^-?\\d+(\\.\\d+)?$/.test(raw)) { val = parseFloat(raw); }\n          const target = parseFloat(btn.dataset.value);\n          if (val !== null && !isNaN(target)) {\n            ok = Math.abs(val - target) <= tol;\n          } else {\n            const got = nums(raw);\n            ok = got.length >= want.length && want.length > 0 &&\n                 [...want].sort((a,b)=>a-b).every((v,i)=>Math.abs(v-[...got].sort((a,b)=>a-b)[i])<=tol+Math.abs(v)*0.001);\n          }\n        }\n        if (ok) {\n          input.style.borderColor = '#0F7A45'; input.style.background = '#E4F8EC';\n          fb.style.color = '#0F7A45'; fb.textContent = '\u2713 Correct \u2014 well done!';\n        } else {\n          input.style.borderColor = '#C23A2B'; input.style.background = '#FFF1EE';\n          fb.style.color = '#C23A2B';\n          fb.textContent = input.value.trim() ? '\u2717 Not yet \u2014 try again or reveal the working.' : 'Type your answer first.';\n        }\n        return;\n      }\n      const nav = e.target.closest('.stut-next, .stut-prev');\n      if (nav) {\n        const tut = nav.closest('.stut');\n        const max = parseInt(tut.dataset.max || '1', 10);\n        let step = parseInt(tut.dataset.step || '0', 10);\n        step += nav.classList.contains('stut-next') ? 1 : -1;\n        step = Math.max(0, Math.min(max, step));\n        this.setStep(tut, step);\n      }\n    });\n    document.querySelectorAll('.stut').forEach((t) => this.setStep(t, parseInt(t.dataset.step||'0',10)));\n  }\n\n  setStep(tut, step) {\n    tut.dataset.step = step;\n    const max = parseInt(tut.dataset.max || '1', 10);\n    tut.querySelectorAll('.sl').forEach((l) => {\n      const min = parseInt(l.dataset.min || '0', 10);\n      l.style.opacity = step >= min ? '1' : '0';\n    });\n    tut.querySelectorAll('.snote').forEach((n) => {\n      n.style.display = parseInt(n.dataset.step,10) === step ? 'block' : 'none';\n    });\n    const prev = tut.querySelector('.stut-prev');\n    const next = tut.querySelector('.stut-next');\n    if (prev) prev.style.opacity = step === 0 ? '.4' : '1';\n    if (next) next.style.opacity = step === max ? '.4' : '1';\n    const badge = tut.querySelector('.stut-badge');\n    if (badge) badge.textContent = 'Step ' + step + ' / ' + max;\n  }\n}\n<\/script>\n\n\n\n<script>\n(function () {\n  if (window.__sbsSlideGuard) return; window.__sbsSlideGuard = true;\n  var DECK_SAFE = 'a[href],button,input,select,textarea,summary,label,'\n                + 'video[controls],audio[controls],[role=\"button\"],[onclick],'\n                + '[tabindex]:not([tabindex^=\"-\"]),[contenteditable]:not([conten  aria-label=\"Annotation tools\">\n  <div class=\"pen-group\"><button class=\"pen-btn pen-toggle\" data-act=\"toggle\" type=\"button\" title=\"Pen on/off\"><span class=\"st\">Pen:<\/span><span class=\"st\" id=\"penStateTxt\">off<\/span><\/button><\/div>\n  <div class=\"pen-sep\"><\/div>\n  <div class=\"pen-group\" id=\"penSwatches\">\n    <div class=\"pen-swatch\" data-color=\"#E23B3B\" title=\"Red\"    style=\"background:linear-gradient(160deg,#ff6a6a,#c31d1d);\"><\/div>\n    <div class=\"pen-swatch\" data-color=\"#2D7DF6\" title=\"Blue\"   style=\"background:linear-gradient(160deg,#6aa8ff,#1c5fd6);\"><\/div>\n    <div class=\"pen-swatch\" data-color=\"#0FB07A\" title=\"Green\"  style=\"background:linear-gradient(160deg,#3fd6a3,#0a8e63);\"><\/div>\n    <div class=\"pen-swatch\" data-color=\"#F5B301\" title=\"Yellow\" style=\"background:linear-gradient(160deg,#ffd54a,#e09b00);\"><\/div>\n    <div class=\"pen-swatch\" data-color=\"#17181D\" title=\"Black\"  style=\"background:linear-gradient(160deg,#4a4d57,#111318);\"><\/div>\n  <\/div>\n  <div class=\"pen-sep\"><\/div>\n  <div class=\"pen-group\">\n    <button class=\"pen-btn\" data-act=\"hilite\" type=\"button\" title=\"Highlighter\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m9 11 6-6 4 4-6 6\"/><path d=\"M9 11l-3 3v3h3l3-3\"/><path d=\"M5 21h7\"/><\/svg><span>Hi-lite<\/span><\/button>\n    <button class=\"pen-btn\" data-act=\"erase\" type=\"button\" title=\"Eraser\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m4 15 5-5 8 8-3 3H7z\"/><path d=\"M14 6l3-3 4 4-3 3\"/><path d=\"M6 21h14\"/><\/svg><span>Erase<\/span><\/button>\n    <button class=\"pen-btn\" data-act=\"undo\" type=\"button\" title=\"Undo\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" strok ar SIZES = { pen:3, hilite:18, erase:26 };\n    function pt(e){ return { x:e.clientX, y:e.clientY }; }\n    function style(s){ ctx.lineCap='round'; ctx.lineJoin='round';\n      if(s.tool==='erase'){ctx.globalCompositeOperation='destination-out';ctx.globalAlpha=1;ctx.lineWidth=s.size;ctx.strokeStyle='rgba(0,0,0,1)';}\n      else if(s.tool==='hilite'){ctx.globalCompositeOperation='source-over';ctx.globalAlpha=0.32;ctx.lineWidth=s.size;ctx.strokeStyle=s.color;}\n      else{ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.lineWidth=s.size;ctx.strokeStyle=s.color;} }\n    function seg(s,a,b){style(s);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}\n    function dot(s,p){style(s);ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.7,s.size/2),0,Math.PI*2);ctx.fillStyle=(s.tool==='erase')?'rgba(0,0,0,1)':s.color;ctx.fill();}\n    function drawStroke(s){ if(!s.points.length)return; if(s.points.length===1){dot(s,s.points[0]);return;} for(var i=1;i<s.points.length;i++)seg(s,s.points[i-1],s.points[i]); }\n    function hardClear(){ ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width,canvas.height); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over'; }\n    function redraw(){ hardClear(); for(var i=0;i<strokes.length;i++)drawStroke(strokes[i]); ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over'; }\n    function size(){ dpr=Math.max(1,window.devicePixelRatio||1); var w=window.innerWidth,h=window.innerHeight; canvas.style.width=w+'px'; canvas.style.height=h+'px'; canvas.width=Math.floor(w*dpr); canvas.height=Math.floor(h*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); redraw(); }\n    canvas.addEventListener('pointerdown', function(e){ if(state.mode!=='draw')return; e.preventDefault(); drawing=true; activeId=e.pointerId; try{canvas.setPointerCapture(e.pointerId);}catch(x){} var sz=SIZES[state.tool]||SIZES.pen; current={tool:state.tool,color:state.color,size:sz,points:[pt(e)]}; dot(current,current.points[0]); });\n    canvas.addEventListener('pointermove', function(e){ if(!drawing||e.pointerId!==activeId)return; e.preventDefault(); var evs=(e.getCoalescedEvents&&e.getCoalescedEvents().length)?e.getCoalescedEvents():[e]; for(var k=0;k<evs.length;k++){var p=pt(evs[k]);var last=current.points[current.points.length-1];if(Math.abs(p.x-last.x)+Math.abs(p.y-last.y)<0.4)continue;current.points.push(p);seg(current,last,p);} });\n    function endStroke(e){ if(!drawing||(e&&e.pointerId!==activeId))return; drawing=false; activeId=null; if(current&&current.points.length)strokes.push(current); current=null; }\n    canvas.addEventListener('pointerup', endStroke); canvas.addEventListener('pointercancel', endStroke);\n    function setMode(mm){ state.mode=mm; document.body.classList.toggle('pen-draw',mm==='draw'); toggleBtn.classList.toggle('active',mm==='draw'); toggleBtn.setAttribute('aria-pressed',mm==='draw'?'true':'false'); stateTxt.textContent=mm==='draw'?'on':'off'; handBtn.classList.toggle('active',mm==='browse'); }\n    function setTool(t){ state.tool=t; hiliteBtn.classList.toggle('active',t==='hilite'); eraseBtn.classList.toggle('active',t==='erase'); if(state.mode!=='draw') setMode('draw'); }\n    function pickColor(sw){ state.color=sw.getAttribute('data-color'); swatches.forEach(function(x){x.classList.remove('active');}); sw.classList.add('active'); setTool('pen'); }\n    function doAct(a){ if(a==='toggle')setMode(state.mode==='draw'?'browse':'draw'); else if(a==='hand')setMode('browse'); else if(a==='hilite')setTool('hilite'); else if(a==='erase')setTool('erase'); else if(a==='undo'){if(strokes.length){strokes.pop();redraw();}} else if(a==='clear'){strokes=[];current=null;drawing=false;hardClear();} }\n    var lastTap=0;\n    function fire(t){ var b=t.closest&&t.closest('[data-act]'); if(b){doAct(b.getAttribute('data-act'));return true;} var sw=t.closest&&t.closest('.pen-swatch'); if(sw){pickColor(sw);return true;} return false; }\n    bar.addEventListener('pointerup', function(e){ if(fire(e.target)){ e.preventDefault(); e.stopPropagation(); lastTap=Date.now(); } }, {passive:false});\n    bar.addEventListener('click', function(e){ if(Date.now()-lastTap<700){e.stopPropagation();return;} if(fire(e.target))e.stopPropagation(); });\n    bar.addEventListener('pointerdown', function(e){ e.stopPropagation(); });\n    document.addEventListener('keydown', function(e){ if(e.key==='Escape')setMode('browse'); if((e.ctrlKey||e.metaKey)&&(e.key==='z'||e.key==='Z')){ if(state.mode==='draw'&&strokes.length){e.preventDefault();strokes.pop();redraw();} } });\n    document.addEventListener('slidechange', function(){ strokes=[]; current=null; drawing=false; hardClear(); });\n    window.addEventListener('resize', function(){ clearTimeout(rt); rt=setTimeout(size,120); });\n    window.addEventListener('orientationchange', function(){ clearTimeout(rt); rt=setTimeout(size,200); });\n    swatches[0].classList.add('active'); state.color=swatches[0].getAttribute('data-color');\n    setMode('browse'); size();\n  } catch (err) { /* never surface as a bundle error */ }\n})();\n<\/script>\n<\/body><\/html>"</script>
