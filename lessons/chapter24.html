32;0.46;0.9;0.95;1\" dur=\"6s\" repeatCount=\"indefinite\"><\/animate>\n          <line x1=\"156\" y1=\"77\" x2=\"270\" y2=\"45\" stroke=\"#8A97A4\" stroke-width=\"2.5\"><\/line><line x1=\"156\" y1=\"83\" x2=\"270\" y2=\"115\" stroke=\"#8A97A4\" stroke-width=\"2.5\"><\/line>\n          <line x1=\"156\" y1=\"217\" x2=\"270\" y2=\"185\" stroke=\"#8A97A4\" stroke-width=\"2.5\"><\/line><line x1=\"156\" y1=\"223\" x2=\"270\" y2=\"255\" stroke=\"#8A97A4\" stroke-width=\"2.5\"><\/line>\n          <text x=\"205\" y=\"48\" font-size=\"15\" fill=\"#B0730C\" font-weight=\"700\">\u00bd<\/text><text x=\"205\" y=\"118\" font-size=\"15\" fill=\"#B0730C\" font-weight=\"700\">\u00bd<\/text>\n          <text x=\"205\" y=\"188\" font-size=\"15\" fill=\"#B0730C\" font-weight=\"700\">\u00bd<\/text><text x=\"205\" y=\"258\" font-size=\"15\" fill=\"#B0730C\" font-weight=\"700\">\u00bd<\/text>\n          <text x=\"278\" y=\"50\" font-size=\"18\" font-weight=\"800\" fill=\"#5A6B76\">H<\/text><text x=\"278\" y=\"120\" font-size=\"18\" font-weight=\"800\" fill=\"#5A6B76\">T<\/text>\n          <text x=\"278\" y=\"190\" font-size=\"18\" font-weight=\"800\" fill=\"#5A6B76\">H<\/text><text x=\"278\" y=\"260\" font-size=\"18\" font-weight=\"800\" fill=\"#5A6B76\">T<\/text>\n        <\/g>\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;0;0;1;1;0\" keyTimes=\"0;0.32;0.5;0.6;0.9;1\" dur=\"6s\" repeatCount=\"indefinite\"><\/animate>\n          <text x=\"320\" y=\"50\" font-size=\"15\" font-weight=\"800\" fill=\"#0F7A45\">HH = \u00bc<\/text>\n          <text x=\"320\" y=\"120\" font-size=\"15\" font-weight=\"800\" fill=\"#0F7A45\">HT = \u00bc<\/text>\n          <text x=\"320\" y=\"190\" font-size=\"15\" font-weight=\"800\" fill=\"#0F7A45\">TH = \u00bc<\/text>\n          <text x=\"320\" y=\"260\" font-size=\"15\" font-weight=\"800\" fill=\"#0F7A45\">TT = \u00bc<\/text>\n        <\/g>\n      <\/svg>\n    <\/div>\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:20px 24px;font-size:25px;line-height:1.5;\">Each path = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span> \u00d7 <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span> = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">4<\/span><\/span>.<\/div>\n      <details class=\"rvtoggle\"><summary style=\"background:#0F7A45;color:#fff;font-size:25px;font-weight:700;padding:15px 22px;border-radius:14px;text-align:center;\">\u25b6 Reveal (a) &amp; (b)<\/summary>\n        <div style=\"margin-top:14px;background:#EAF6EE;border-radius:16px;padding:20px 24px;font-size:24px;line-height:1.7;\"><b>(a)<\/b> P(TT) = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span> \u00d7 <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span> = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">4<\/span><\/span><br><b>(b)<\/b> P(HT or TH) = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">4<\/span><\/span> + <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">4<\/span><\/span> = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span><\/div>\n      <\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Worked example 3\" data-screen-label=\"WE3 calves\" data-speaker-notes=\"Worked example 3. A tree shows male and female calves over three pregnancies, each equally likely. Find P at least one female, P exactly two female, and P first and last the same sex. Watch the tree build to eight equally likely outcomes.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:23px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 3<\/span><span style=\"font-size:24px;color:#8A97A4;\">Three calves \u2014 M or F equally likely<\/span><\/div>\n  <div style=\"background:#fff;border-radius:16px;padding:14px 26px;box-shadow:0 3px 18px rgba(22,55,95,.06);border-left:6px solid #0F7A45;margin-bottom:14px;\"><p style=\"font-size:25px;line-height:1.4;\">Find P(<b>a<\/b>) at least one female \u00b7 (<b>b<\/b>) exactly two female \u00b7 (<b>c<\/b>) first and last the same sex. Each birth: P(M) = P(F) = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span>.<\/p><\/div>\n  <div style=\"display:grid;grid-template-columns:1.05fr .95fr;gap:30px;flex:1;align-items:center;\">\n    <div style=\"background:#fff;border-radius:18px;padding:14px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;align-items:center;justify-content:center;height:100%;\">\n      <svg viewBox=\"0 0 460 340\" width=\"100%\" style=\"max-height:500px;\">\n        <text x=\"470\" y=\"16\" font-size=\"13\" font-weight=\"700\" fill=\"#5A6B76\" text-anchor=\"end\">MMM\u2026<\/text>\n        <circle cx=\"24\" cy=\"170\" r=\"5\" fill=\"#4A3C9E\"><\/circle>\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;1;1;1;1;0\" keyTimes=\"0;0.14;0.4;0.85;0.92;1\" dur=\"6.5s\" repeatCount=\"indefinite\"><\/animate>\n          <line x1=\"29\" y1=\"167\" x2=\"90\" y2=\"90\" stroke=\"#4A3C9E\" stroke-width=\"2.5\"><\/line><line x1=\"29\" y1=\"173\" x2=\"90\" y2=\"250\" stroke=\"#4A3C9E\" stroke-width=\"2.5\"><\/line>\n          <text x=\"94\" y=\"92\" font-size=\"16\" font-weight=\"800\" fill=\"#4A3C9E\">M<\/text><text x=\"94\" y=\"256\" font-size=\"16\" font-weight=\"800\" fill=\"#D6409F\">F<\/text>\n        <\/g>\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;0;1;1;1;0\" keyTimes=\"0;0.28;0.42;0.85;0.92;1\" dur=\"6.5s\" repeatCount=\"indefinite\"><\/animate>\n          <line x1=\"104\" y1=\"88\" x2=\"220\" y2=\"50\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/line><line x1=\"104\" y1=\"92\" x2=\"220\" y2=\"130\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/line>\n          <line x1=\"104\" y1=\"248\" x2=\"220\" y2=\"210\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/line><line x1=\"104\" y1=\"252\" x2=\"220\" y2=\"290\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/line>\n          <text x=\"224\" y=\"52\" font-size=\"15\" font-weight=\"800\" fill=\"#5A6B76\">M<\/text><text x=\"224\" y=\"135\" font-size=\"15\" font-weight=\"800\" fill=\"#5A6B76\">F<\/text>\n          <text x=\"224\" y=\"212\" font-size=\"15\" font-weight=\"800\" fill=\"#5A6B76\">M<\/text><text x=\"224\" y=\"295\" font-size=\"15\" font-weight=\"800\" fill=\"#5A6B76\">F<\/text>\n        <\/g>\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;0;0;1;1;0\" keyTimes=\"0;0.42;0.56;0.66;0.92;1\" dur=\"6.5s\" repeatCount=\"indefinite\"><\/animate>\n          <line x1=\"238\" y1=\"49\" x2=\"360\" y2=\"30\" stroke=\"#C9C2F0\" stroke-width=\"1.8\"><\/line><line x1=\"238\" y1=\"51\" x2=\"360\" y2=\"70\" stroke=\"#C9C2F0\" stroke-width=\"1.8\"><\/line>\n          <line x1=\"238\" y1=\"129\" x2=\"360\" y2=\"110\" stroke=\"#C9C2F0\" stroke-width=\"1.8\"><\/line><line x1=\"238\" y1=\"131\" x2=\"360\" y2=\"150\" stroke=\"#C9C2F0\" stroke-width=\"1.8\"><\/line>\n          <line x1=\"238\" y1=\"209\" x2=\"360\" y2=\"190\" stroke=\"#C9C2F0\" stroke-width=\"1.8\"><\/line><line x1=\"238\" y1=\"211\" x2=\"360\" y2=\"230\" stroke=\"#C9C2F0\" stroke-width=\"1.8\"><\/line>\n          <line x1=\"238\" y1=\"289\" x2=\"360\" y2=\"270\" stroke=\"#C9C2F0\" stroke-width=\"1.8\"><\/line><line x1=\"238\" y1=\"291\" x2=\"360\" y2=\"310\" stroke=\"#C9C2F0\" stroke-width=\"1.8\"><\/line>\n          <text x=\"368\" y=\"35\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">MMM<\/text><text x=\"368\" y=\"75\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">MMF<\/text>\n          <text x=\"368\" y=\"115\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">MFM<\/text><text x=\"368\" y=\"155\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">MFF<\/text>\n          <text x=\"368\" y=\"195\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">FMM<\/text><text x=\"368\" y=\"235\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">FMF<\/text>\n          <text x=\"368\" y=\"275\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">FFM<\/text><text x=\"368\" y=\"315\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">FFF<\/text>\n        <\/g>\n      <\/svg>\n    <\/div>\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:18px 24px;font-size:24px;line-height:1.5;\">Every path has probability <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span> \u00d7 <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span> \u00d7 <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span> = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">8<\/span><\/span>.<\/div>\n      <details class=\"rvtoggle\"><summary style=\"background:#0F7A45;color:#fff;font-size:25px;font-weight:700;padding:15px 22px;border-radius:14px;text-align:center;\">\u25b6 Reveal a, b, c<\/summary>\n        <div style=\"margin-top:14px;background:#EAF6EE;border-radius:16px;padding:18px 24px;font-size:23px;line-height:1.7;\"><b>(a)<\/b> P(\u22651 F) = 1 \u2212 P(MMM) = 1 \u2212 <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">8<\/span><\/span> = <span class=\"frac\"><span class=\"num\">7<\/span><span class=\"den\">8<\/span><\/span><br><b>(b)<\/b> exactly 2 F (MFF, FMF, FFM) = <span class=\"frac\"><span class=\"num\">3<\/span><span class=\"den\">8<\/span><\/span><br><b>(c)<\/b> 1st &amp; last same (MMM,MFM,FMF,FFF) = <span class=\"frac\"><span class=\"num\">4<\/span><span class=\"den\">8<\/span><\/span> = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span><\/div>\n      <\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Builder: Tree probability\" data-screen-label=\"Builder: Tree\" data-speaker-notes=\"Step-by-step builder for finding a probability from a tree. Choose the paths that work, multiply along each path, then add the paths together.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#EAF3FF;color:#12324F;overflow:hidden;\">\n  <div class=\"stut\" data-step=\"0\" data-max=\"5\" style=\"display:flex;flex-direction:column;height:100%;\">\n    <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#1F6FB2;color:#fff;font-weight:700;font-size:23px;letter-spacing:.06em;padding:9px 22px;border-radius:999px;\">STEP-BY-STEP BUILDER<\/span><span style=\"font-size:24px;color:#3E6C93;\">Probability from a tree<\/span><span class=\"stut-badge\" style=\"margin-left:auto;font-size:24px;font-weight:800;color:#1F6FB2;background:#fff;padding:8px 20px;border-radius:999px;box-shadow:0 2px 12px rgba(22,55,95,.08);\">Step 0 / 5<\/span><\/div>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:42px;margin-bottom:8px;\">Spinner: P(red) = <span class=\"frac\" style=\"font-size:.7em;\"><span class=\"num\">2<\/span><span class=\"den\">5<\/span><\/span>. Spin twice \u2014 find P(exactly one red).<\/h2>\n    <div style=\"display:grid;grid-template-columns:1.05fr .95fr;gap:34px;flex:1;min-height:0;align-items:center;\">\n      <div style=\"background:#fff;border-radius:20px;padding:26px;box-shadow:0 4px 22px rgba(22,55,95,.08);display:flex;align-items:center;justify-content:center;height:100%;\">\n        <svg viewBox=\"0 0 400 280\" width=\"100%\" style=\"max-height:100%;\">\n          <circle cx=\"30\" cy=\"140\" r=\"6\" fill=\"#1F6FB2\"><\/circle>\n          <line x1=\"36\" y1=\"137\" x2=\"150\" y2=\"70\" stroke=\"#1F6FB2\" stroke-width=\"3\"><\/line><line x1=\"36\" y1=\"143\" x2=\"150\" y2=\"210\" stroke=\"#1F6FB2\" stroke-width=\"3\"><\/line>\n          <text x=\"80\" y=\"90\" font-size=\"18\" fill=\"#B0730C\" font-weight=\"700\">\u2156<\/text><text x=\"80\" y=\"195\" font-size=\"18\" fill=\"#B0730C\" font-weight=\"700\">\u2157<\/text>\n          <circle cx=\"150\" cy=\"70\" r=\"6\" fill=\"#C23A2B\"><\/circle><text x=\"158\" y=\"76\" font-size=\"18\" font-weight=\"800\" fill=\"#C23A2B\">R<\/text>\n          <circle cx=\"150\" cy=\"210\" r=\"6\" fill=\"#0F7A45\"><\/circle><text x=\"158\" y=\"216\" font-size=\"18\" font-weight=\"800\" fill=\"#0F7A45\">G<\/text>\n          <line x1=\"156\" y1=\"67\" x2=\"280\" y2=\"45\" stroke=\"#8A97A4\" stroke-width=\"2.5\"><\/line><line x1=\"156\" y1=\"73\" x2=\"280\" y2=\"105\" stroke=\"#8A97A4\" stroke-width=\"2.5\"><\/line>\n          <line x1=\"156\" y1=\"207\" x2=\"280\" y2=\"185\" stroke=\"#8A97A4\" stroke-width=\"2.5\"><\/line><line x1=\"156\" y1=\"213\" x2=\"280\" y2=\"245\" stroke=\"#8A97A4\" stroke-width=\"2.5\"><\/line>\n          <text x=\"212\" y=\"48\" font-size=\"14\" fill=\"#B0730C\" font-weight=\"700\">\u2156<\/text><text x=\"212\" y=\"108\" font-size=\"14\" fill=\"#B0730C\" font-weight=\"700\">\u2157<\/text>\n          <text x=\"212\" y=\"188\" font-size=\"14\" fill=\"#B0730C\" font-weight=\"700\">\u2156<\/text><text x=\"212\" y=\"248\" font-size=\"14\" fill=\"#B0730C\" font-weight=\"700\">\u2157<\/text>\n          <text x=\"286\" y=\"50\" font-size=\"16\" font-weight=\"800\" fill=\"#5A6B76\">R<\/text><text x=\"286\" y=\"110\" font-size=\"16\" font-weight=\"800\" fill=\"#5A6B76\">G<\/text>\n          <text x=\"286\" y=\"190\" font-size=\"16\" font-weight=\"800\" fill=\"#5A6B76\">R<\/text><text x=\"286\" y=\"250\" font-size=\"16\" font-weight=\"800\" fill=\"#5A6B76\">G<\/text>\n          <g class=\"sl\" data-min=\"2\" style=\"opacity:0;\"><text x=\"315\" y=\"110\" font-size=\"15\" font-weight=\"800\" fill=\"#1F6FB2\">RG \u2713<\/text><\/g>\n          <g class=\"sl\" data-min=\"3\" style=\"opacity:0;\"><text x=\"315\" y=\"190\" font-size=\"15\" font-weight=\"800\" fill=\"#1F6FB2\">GR \u2713<\/text><\/g>\n        <\/svg>\n      <\/div>\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <div class=\"snote\" data-step=\"0\" style=\"background:#fff;border-radius:16px;padding:22px 26px;font-size:28px;line-height:1.5;box-shadow:0 3px 16px rgba(22,55,95,.06);\"><b>The idea.<\/b> \u201cExactly one red\u201d means <b>red then green<\/b>, OR <b>green then red<\/b>. Press <b>Next \u25b6<\/b>.<\/div>\n        <div class=\"snote\" data-step=\"1\" style=\"background:#fff;border-radius:16px;padding:22px 26px;font-size:28px;line-height:1.5;box-shadow:0 3px 16px rgba(22,55,95,.06);\"><b>Step 1 \u2014 Find the paths.<\/b> Two paths work: <b>R,G<\/b> and <b>G,R<\/b>.<\/div>\n        <div class=\"snote\" data-step=\"2\" style=\"background:#fff;border-radius:16px;padding:22px 26px;font-size:28px;line-height:1.5;box-shadow:0 3px 16px rgba(22,55,95,.06);\"><b>Step 2 \u2014 Multiply path R,G.<\/b> <span class=\"frac\"><span class=\"num\">2<\/span><span class=\"den\">5<\/span><\/span> \u00d7 <span class=\"frac\"><span class=\"num\">3<\/span><span class=\"den\">5<\/span><\/span> = <span class=\"frac\"><span class=\"num\">6<\/span><span class=\"den\">25<\/span><\/span>.<\/div>\n        <div class=\"snote\" data-step=\"3\" style=\"background:#fff;border-radius:16px;padding:22px 26px;font-size:28px;line-height:1.5;box-shadow:0 3px 16px rgba(22,55,95,.06);\"><b>Step 3 \u2014 Multiply path G,R.<\/b> <span class=\"frac\"><span class=\"num\">3<\/span><span class=\"den\">5<\/span><\/span> \u00d7 <span class=\"frac\"><span class=\"num\">2<\/span><span class=\"den\">5<\/span><\/span> = <span class=\"frac\"><span class=\"num\">6<\/span><span class=\"den\">25<\/span><\/span>.<\/div>\n        <div class=\"snote\" data-step=\"4\" style=\"background:#fff;border-radius:16px;padding:22px 26px;font-size:28px;line-height:1.5;box-shadow:0 3px 16px rgba(22,55,95,.06);\"><b>Step 4 \u2014 Add the paths.<\/b> \u201cOR\u201d \u2192 add: <span class=\"frac\"><span class=\"num\">6<\/span><span class=\"den\">25<\/span><\/span> + <span class=\"frac\"><span class=\"num\">6<\/span><span class=\"den\">25<\/span><\/span>.<\/div>\n        <div class=\"snote\" data-step=\"5\" style=\"background:#DFF3E7;border-radius:16px;padding:22px 26px;font-size:28px;line-height:1.5;box-shadow:0 3px 16px rgba(22,55,95,.06);\"><b>Step 5 \u2014 Answer.<\/b> P(exactly one red) = <span class=\"frac\"><span class=\"num\">12<\/span><span class=\"den\">25<\/span><\/span>. \u2713<\/div>\n        <div style=\"display:flex;gap:14px;margin-top:6px;\">\n          <button class=\"stut-prev\" style=\"flex:1;background:#fff;color:#1F6FB2;border:2px solid #1F6FB2;font-size:26px;font-weight:700;padding:14px;border-radius:14px;cursor:pointer;\">\u25c0 Back<\/button>\n          <button class=\"stut-next\" style=\"flex:2;background:#1F6FB2;color:#fff;border:none;font-size:26px;font-weight:700;padding:14px;border-radius:14px;cursor:pointer;\">Next \u25b6<\/button>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Your turn \u00b7 Trees\" data-screen-label=\"Your turn: Trees\" data-speaker-notes=\"Your turn on tree diagrams. Students calculate combined probabilities, then reveal the answers.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:60px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:18px;\"><span style=\"white-space:nowrap;background:#0EA5A8;color:#fff;font-weight:700;font-size:23px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">YOUR TURN<\/span><span style=\"font-size:24px;color:#8A97A4;\">Multiply along, add between<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;flex:1;\">\n    <div style=\"background:#fff;border-radius:18px;padding:26px 28px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"font-size:25px;font-weight:800;color:#0EA5A8;\">Q1<\/div>\n      <p style=\"font-size:26px;line-height:1.4;\">A coin is tossed twice. Find P(two heads).<\/p>\n      <details class=\"rvtoggle\" style=\"margin-top:auto;\"><summary style=\"font-size:22px;color:#0EA5A8;font-weight:700;\">Reveal answer<\/summary><div style=\"margin-top:10px;background:#E6F6F6;border-radius:10px;padding:14px 18px;font-size:25px;\"><span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span> \u00d7 <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span> = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">4<\/span><\/span><\/div><\/details>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:26px 28px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"font-size:25px;font-weight:800;color:#0EA5A8;\">Q2<\/div>\n      <p style=\"font-size:26px;line-height:1.4;\">P(rain) = 0.3 each day. Find P(rain on both of two days).<\/p>\n      <details class=\"rvtoggle\" style=\"margin-top:auto;\"><summary style=\"font-size:22px;color:#0EA5A8;font-weight:700;\">Reveal answer<\/summary><div style=\"margin-top:10px;background:#E6F6F6;border-radius:10px;padding:14px 18px;font-size:25px;\">0.3 \u00d7 0.3 = <b>0.09<\/b><\/div><\/details>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:26px 28px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"font-size:25px;font-weight:800;color:#0EA5A8;\">Q3<\/div>\n      <p style=\"font-size:26px;line-height:1.4;\">Two coins. Find P(at least one head).<\/p>\n      <details class=\"rvtoggle\" style=\"margin-top:auto;\"><summary style=\"font-size:22px;color:#0EA5A8;font-weight:700;\">Reveal answer<\/summary><div style=\"margin-top:10px;background:#E6F6F6;border-radius:10px;padding:14px 18px;font-size:25px;\">1 \u2212 <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">4<\/span><\/span> = <span class=\"frac\"><span class=\"num\">3<\/span><span class=\"den\">4<\/span><\/span><\/div><\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Part 3 \u00b7 Venn diagrams\" data-screen-label=\"Divider: 24.3\" data-speaker-notes=\"Section divider for calculating probability from Venn diagrams using set notation.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#4A3C9E;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:90px;top:40px;font-family:Fredoka,system-ui,sans-serif;font-size:340px;line-height:1;color:rgba(255,194,60,.16);font-weight:600;\">03<\/div>\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-size:26px;font-weight:600;letter-spacing:.16em;color:#FFC23C;margin-bottom:20px;\">PART 3 \u00b7 SECTION 24.3<\/div>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:104px;line-height:1.02;margin-bottom:24px;\">Venn diagrams<\/h2>\n    <p style=\"font-size:34px;color:#E4DFFA;max-width:1120px;line-height:1.4;\">Fill each region with how many, then read union, intersection and complement to find probabilities.<\/p>\n  <\/div>\n<\/section>\n\n<section data-label=\"Drill: Set notation\" data-screen-label=\"Drill: Set notation\" data-speaker-notes=\"Memory drill for set notation. n of A is the number in A. A union B is A or B or both. A intersection B is both. A prime is not A. The universal set is the rectangle.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:64px 90px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:20px;\"><span style=\"white-space:nowrap;background:#B0730C;color:#fff;font-weight:700;font-size:23px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">DRILL<\/span><span style=\"font-size:24px;color:#8A97A4;\">Read the set-language symbols<\/span><\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:52px;margin-bottom:26px;\">The five symbols you must know<\/h2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;\">\n    <div style=\"background:#EDEAFA;border-radius:18px;padding:24px 30px;display:flex;gap:22px;align-items:center;\"><span style=\"font-size:44px;font-weight:800;color:#4A3C9E;font-family:Georgia,serif;min-width:90px;text-align:center;\">n(A)<\/span><span style=\"font-size:27px;color:#33454F;\">the <b>number of elements<\/b> in set A.<\/span><\/div>\n    <div style=\"background:#EDEAFA;border-radius:18px;padding:24px 30px;display:flex;gap:22px;align-items:center;\"><span style=\"font-size:44px;font-weight:800;color:#4A3C9E;min-width:90px;text-align:center;\">A \u222a B<\/span><span style=\"font-size:27px;color:#33454F;\"><b>union<\/b> \u2014 in A <b>or<\/b> B or both.<\/span><\/div>\n    <div style=\"background:#EDEAFA;border-radius:18px;padding:24px 30px;display:flex;gap:22px;align-items:center;\"><span style=\"font-size:44px;font-weight:800;color:#4A3C9E;min-width:90px;text-align:center;\">A \u2229 B<\/span><span style=\"font-size:27px;color:#33454F;\"><b>intersection<\/b> \u2014 in <b>both<\/b> A and B.<\/span><\/div>\n    <div style=\"background:#EDEAFA;border-radius:18px;padding:24px 30px;display:flex;gap:22px;align-items:center;\"><span style=\"font-size:44px;font-weight:800;color:#4A3C9E;min-width:90px;text-align:center;\">A\u2032<\/span><span style=\"font-size:27px;color:#33454F;\"><b>complement<\/b> \u2014 <b>not<\/b> in A.<\/span><\/div>\n    <div style=\"grid-column:1 / -1;background:#4A3C9E;border-radius:18px;padding:22px 30px;color:#fff;font-size:28px;text-align:center;line-height:1.4;\"><b style=\"color:#FFD98A;\">Probability =<\/b> &nbsp;P(event) = <span class=\"frac\"><span class=\"num\">n(event)<\/span><span class=\"den\">n(\u2130)<\/span><\/span> &nbsp;\u2014 the count in the region <b>over<\/b> the total.<\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Venn regions\" data-screen-label=\"24.3 Venn concept\" data-speaker-notes=\"Watch the three regions light up: the intersection is the overlap, the union is everything in the circles, and the complement of the union is outside both. Each has its own probability.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:16px;\"><span style=\"width:46px;height:6px;background:#4A3C9E;border-radius:3px;\"><\/span><span style=\"font-size:24px;font-weight:700;letter-spacing:.14em;color:#4A3C9E;\">CONCEPT \u00b7 24.3<\/span><\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:50px;margin-bottom:22px;\">Three regions light up in turn<\/h2>\n  <div style=\"display:grid;grid-template-columns:1.2fr .8fr;gap:40px;flex:1;align-items:center;\">\n    <div style=\"background:#fff;border-radius:18px;padding:24px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;align-items:center;justify-content:center;height:100%;\">\n      <svg viewBox=\"0 0 380 240\" width=\"100%\" style=\"max-height:440px;\">\n        <defs><clipPath id=\"cA\"><circle cx=\"150\" cy=\"120\" r=\"78\"><\/circle><\/clipPath><\/defs>\n        <rect x=\"10\" y=\"15\" width=\"360\" height=\"210\" rx=\"8\" fill=\"#FBFAFF\" stroke=\"#C9C2F0\" stroke-width=\"2\"><\/rect>\n        <!-- intersection -->\n        <g opacity=\"0\"><circle cx=\"225\" cy=\"120\" r=\"78\" fill=\"#4A3C9E\" fill-opacity=\"0.7\" clip-path=\"url(#cA)\"><\/circle><animate attributeName=\"opacity\" values=\"0;1;1;0;0;0;0\" keyTimes=\"0;0.12;0.28;0.34;0.6;0.9;1\" dur=\"6s\" repeatCount=\"indefinite\"><\/animate><\/g>\n        <!-- union -->\n        <g opacity=\"0\"><circle cx=\"150\" cy=\"120\" r=\"78\" fill=\"#0F7A45\" fill-opacity=\"0.5\"><\/circle><circle cx=\"225\" cy=\"120\" r=\"78\" fill=\"#0F7A45\" fill-opacity=\"0.5\"><\/circle><animate attributeName=\"opacity\" values=\"0;0;0;1;1;0;0\" keyTimes=\"0;0.28;0.34;0.4;0.58;0.64;1\" dur=\"6s\" repeatCount=\"indefinite\"><\/animate><\/g>\n        <!-- complement -->\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;0;0;0;0;1;1;0\" keyTimes=\"0;0.34;0.58;0.62;0.66;0.72;0.9;1\" dur=\"6s\" repeatCount=\"indefinite\"><\/animate>\n          <mask id=\"notU\"><rect x=\"10\" y=\"15\" width=\"360\" height=\"210\" fill=\"#fff\"><\/rect><circle cx=\"150\" cy=\"120\" r=\"78\" fill=\"#000\"><\/circle><circle cx=\"225\" cy=\"120\" r=\"78\" fill=\"#000\"><\/circle><\/mask>\n          <rect x=\"10\" y=\"15\" width=\"360\" height=\"210\" rx=\"8\" fill=\"#C23A2B\" fill-opacity=\"0.5\" mask=\"url(#notU)\"><\/rect>\n        <\/g>\n        <circle cx=\"150\" cy=\"120\" r=\"78\" fill=\"none\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/circle>\n        <circle cx=\"225\" cy=\"120\" r=\"78\" fill=\"none\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/circle>\n        <text x=\"100\" y=\"90\" font-size=\"22\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#5A6B76\" font-weight=\"bold\">A<\/text>\n        <text x=\"262\" y=\"90\" font-size=\"22\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#5A6B76\" font-weight=\"bold\">B<\/text>\n        <text x=\"22\" y=\"36\" font-size=\"18\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#5A6B76\">\u2130<\/text>\n      <\/svg>\n    <\/div>\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:20px 26px;font-size:26px;line-height:1.45;\"><span style=\"display:inline-block;width:18px;height:18px;background:#4A3C9E;border-radius:4px;vertical-align:middle;margin-right:8px;\"><\/span><b>A \u2229 B<\/b> \u2014 the overlap (both).<\/div>\n      <div style=\"background:#EAF6EE;border-radius:16px;padding:20px 26px;font-size:26px;line-height:1.45;\"><span style=\"display:inline-block;width:18px;height:18px;background:#0F7A45;border-radius:4px;vertical-align:middle;margin-right:8px;\"><\/span><b>A \u222a B<\/b> \u2014 everything in the circles.<\/div>\n      <div style=\"background:#FDECE9;border-radius:16px;padding:20px 26px;font-size:26px;line-height:1.45;\"><span style=\"display:inline-block;width:18px;height:18px;background:#C23A2B;border-radius:4px;vertical-align:middle;margin-right:8px;\"><\/span><b>(A \u222a B)\u2032<\/b> \u2014 outside both.<\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Worked example 4\" data-screen-label=\"WE4 fruit veg\" data-speaker-notes=\"Worked example 4. 25 people were asked about liking fruit and vegetables. 15 like vegetables, 18 like fruit, everyone likes at least one. Fill the Venn: overlap is 18 plus 15 minus 25 equals 8. Then fruit only is 10, veg only is 7. Find P both and P either.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:23px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 4<\/span><span style=\"font-size:24px;color:#8A97A4;\">Fruit &amp; vegetables \u2014 animated Venn<\/span><\/div>\n  <div style=\"background:#fff;border-radius:16px;padding:14px 26px;box-shadow:0 3px 18px rgba(22,55,95,.06);border-left:6px solid #0F7A45;margin-bottom:14px;\"><p style=\"font-size:25px;line-height:1.4;\">25 people: <b>15<\/b> like vegetables, <b>18<\/b> like fruit, everyone likes at least one. Find P(both) and P(either).<\/p><\/div>\n  <div style=\"display:grid;grid-template-columns:1.15fr .85fr;gap:34px;flex:1;align-items:center;\">\n    <div style=\"background:#fff;border-radius:18px;padding:16px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;align-items:center;justify-content:center;height:100%;\">\n      <svg viewBox=\"0 0 400 260\" width=\"100%\" style=\"max-height:440px;\">\n        <defs><clipPath id=\"cF\"><circle cx=\"160\" cy=\"130\" r=\"82\"><\/circle><\/clipPath><\/defs>\n        <rect x=\"10\" y=\"15\" width=\"380\" height=\"230\" rx=\"8\" fill=\"#FBFAFF\" stroke=\"#C9C2F0\" stroke-width=\"2\"><\/rect>\n        <text x=\"22\" y=\"38\" font-size=\"18\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#5A6B76\">\u2130<\/text>\n        <circle cx=\"160\" cy=\"130\" r=\"82\" fill=\"#D6409F\" fill-opacity=\"0.4\"><\/circle>\n        <circle cx=\"245\" cy=\"130\" r=\"82\" fill=\"#F5B833\" fill-opacity=\"0.45\"><\/circle>\n        <circle cx=\"160\" cy=\"130\" r=\"82\" fill=\"none\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/circle>\n        <circle cx=\"245\" cy=\"130\" r=\"82\" fill=\"none\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/circle>\n        <text x=\"95\" y=\"70\" font-size=\"22\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#8a2168\" font-weight=\"bold\">F<\/text>\n        <text x=\"300\" y=\"70\" font-size=\"22\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#8a5a08\" font-weight=\"bold\">V<\/text>\n        <!-- overlap first -->\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;1;1;1;1;0\" keyTimes=\"0;0.18;0.4;0.85;0.92;1\" dur=\"6s\" repeatCount=\"indefinite\"><\/animate><text x=\"195\" y=\"140\" font-size=\"30\" font-weight=\"800\" fill=\"#4A3C9E\">8<\/text><\/g>\n        <!-- fruit only -->\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;0;1;1;1;0\" keyTimes=\"0;0.38;0.52;0.85;0.92;1\" dur=\"6s\" repeatCount=\"indefinite\"><\/animate><text x=\"120\" y=\"140\" font-size=\"30\" font-weight=\"800\" fill=\"#8a2168\">10<\/text><\/g>\n        <!-- veg only -->\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;0;0;1;1;0\" keyTimes=\"0;0.52;0.66;0.72;0.92;1\" dur=\"6s\" repeatCount=\"indefinite\"><\/animate><text x=\"285\" y=\"140\" font-size=\"30\" font-weight=\"800\" fill=\"#8a5a08\">7<\/text><\/g>\n      <\/svg>\n    <\/div>\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:18px 24px;font-size:24px;line-height:1.5;\">Overlap = 18 + 15 \u2212 25 = <b>8<\/b>. Then F only = 18 \u2212 8 = <b>10<\/b>, V only = 15 \u2212 8 = <b>7<\/b>.<\/div>\n      <details class=\"rvtoggle\"><summary style=\"background:#0F7A45;color:#fff;font-size:25px;font-weight:700;padding:15px 22px;border-radius:14px;text-align:center;\">\u25b6 Reveal answers<\/summary>\n        <div style=\"margin-top:14px;background:#EAF6EE;border-radius:16px;padding:18px 24px;font-size:24px;line-height:1.7;\"><b>(a)<\/b> P(both) = <span class=\"frac\"><span class=\"num\">8<\/span><span class=\"den\">25<\/span><\/span> = <b>0.32<\/b><br><b>(b)<\/b> P(either) = <span class=\"frac\"><span class=\"num\">10 + 8 + 7<\/span><span class=\"den\">25<\/span><\/span> = <span class=\"frac\"><span class=\"num\">25<\/span><span class=\"den\">25<\/span><\/span> = <b>1<\/b><\/div>\n      <\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Worked example 5\" data-screen-label=\"WE5 transport\" data-speaker-notes=\"Worked example 5. 30 people and three sets: bus, metro, E-hail. Fill the three-set Venn from the middle out: all three is 3, then the pairs, then singles. Find how many use none, and some probabilities. Watch the regions fill from the centre.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:23px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 5<\/span><span style=\"font-size:24px;color:#8A97A4;\">Three-set Venn \u2014 fill from the middle<\/span><\/div>\n  <div style=\"background:#fff;border-radius:16px;padding:12px 24px;box-shadow:0 3px 18px rgba(22,55,95,.06);border-left:6px solid #0F7A45;margin-bottom:12px;\"><p style=\"font-size:23px;line-height:1.35;\">30 people: 16 Bus, 10 Metro, 8 E-hail; 3 use all; 4 Bus &amp; Metro only; 3 Metro &amp; E-hail only; 4 Bus &amp; E-hail only.<\/p><\/div>\n  <div style=\"display:grid;grid-template-columns:1.1fr .9fr;gap:30px;flex:1;align-items:center;\">\n    <div style=\"background:#fff;border-radius:18px;padding:14px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;align-items:center;justify-content:center;height:100%;\">\n      <svg viewBox=\"0 0 400 300\" width=\"100%\" style=\"max-height:480px;\">\n        <rect x=\"10\" y=\"10\" width=\"380\" height=\"280\" rx=\"8\" fill=\"#FBFAFF\" stroke=\"#C9C2F0\" stroke-width=\"2\"><\/rect>\n        <text x=\"22\" y=\"32\" font-size=\"18\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#5A6B76\">\u2130<\/text>\n        <circle cx=\"150\" cy=\"120\" r=\"90\" fill=\"#D6409F\" fill-opacity=\"0.32\"><\/circle>\n        <circle cx=\"250\" cy=\"120\" r=\"90\" fill=\"#F5B833\" fill-opacity=\"0.36\"><\/circle>\n        <circle cx=\"200\" cy=\"200\" r=\"90\" fill=\"#4A3C9E\" fill-opacity=\"0.28\"><\/circle>\n        <text x=\"95\" y=\"80\" font-size=\"20\" font-weight=\"800\" fill=\"#8a2168\">B<\/text>\n        <text x=\"290\" y=\"80\" font-size=\"20\" font-weight=\"800\" fill=\"#8a5a08\">M<\/text>\n        <text x=\"196\" y=\"285\" font-size=\"20\" font-weight=\"800\" fill=\"#4A3C9E\">E<\/text>\n        <!-- centre all three -->\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;1;1;1;1;0\" keyTimes=\"0;0.14;0.4;0.9;0.95;1\" dur=\"7s\" repeatCount=\"indefinite\"><\/animate><text x=\"194\" y=\"150\" font-size=\"24\" font-weight=\"800\" fill=\"#1F2933\">3<\/text><\/g>\n        <!-- pairs -->\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;0;1;1;1;0\" keyTimes=\"0;0.3;0.44;0.9;0.95;1\" dur=\"7s\" repeatCount=\"indefinite\"><\/animate>\n          <text x=\"194\" y=\"108\" font-size=\"22\" font-weight=\"800\" fill=\"#8a5a08\">4<\/text>\n          <text x=\"150\" y=\"185\" font-size=\"22\" font-weight=\"800\" fill=\"#8a2168\">4<\/text>\n          <text x=\"240\" y=\"185\" font-size=\"22\" font-weight=\"800\" fill=\"#4A3C9E\">3<\/text>\n        <\/g>\n        <!-- singles -->\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;0;0;1;1;0\" keyTimes=\"0;0.44;0.58;0.66;0.95;1\" dur=\"7s\" repeatCount=\"indefinite\"><\/animate>\n          <text x=\"110\" y=\"120\" font-size=\"22\" font-weight=\"800\" fill=\"#8a2168\">11<\/text>\n          <text x=\"285\" y=\"120\" font-size=\"22\" font-weight=\"800\" fill=\"#8a5a08\">6<\/text>\n          <text x=\"196\" y=\"235\" font-size=\"22\" font-weight=\"800\" fill=\"#4A3C9E\">4<\/text>\n        <\/g>\n        <!-- outside -->\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;0;0;0;1;1;0\" keyTimes=\"0;0.44;0.58;0.7;0.78;0.95;1\" dur=\"7s\" repeatCount=\"indefinite\"><\/animate><text x=\"360\" y=\"280\" font-size=\"22\" font-weight=\"800\" fill=\"#C23A2B\">4<\/text><\/g>\n      <\/svg>\n    <\/div>\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:18px 24px;font-size:23px;line-height:1.5;\">Fill <b>middle \u2192 pairs \u2192 singles<\/b>. B only = 16\u2212(4+3+4) = <b>11<\/b>. Total inside = 26, so <b>outside = 4<\/b>.<\/div>\n      <details class=\"rvtoggle\"><summary style=\"background:#0F7A45;color:#fff;font-size:25px;font-weight:700;padding:15px 22px;border-radius:14px;text-align:center;\">\u25b6 Reveal answers<\/summary>\n        <div style=\"margin-top:14px;background:#EAF6EE;border-radius:16px;padding:18px 24px;font-size:23px;line-height:1.7;\"><b>(b)<\/b> none = <b>4<\/b><br><b>(c i)<\/b> P(bus &amp; metro) = <span class=\"frac\"><span class=\"num\">4<\/span><span class=\"den\">30<\/span><\/span> = <span class=\"frac\"><span class=\"num\">2<\/span><span class=\"den\">15<\/span><\/span><br><b>(c ii)<\/b> P(bus only) = <span class=\"frac\"><span class=\"num\">11<\/span><span class=\"den\">30<\/span><\/span><br><b>(c iii)<\/b> P(none) = <span class=\"frac\"><span class=\"num\">4<\/span><span class=\"den\">30<\/span><\/span> = <span class=\"frac\"><span class=\"num\">2<\/span><span class=\"den\">15<\/span><\/span><\/div>\n      <\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Your turn \u00b7 Venn\" data-screen-label=\"Your turn: Venn\" data-speaker-notes=\"Your turn on Venn diagrams. Students read regions and calculate probabilities, then reveal the answers.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:60px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#0EA5A8;color:#fff;font-weight:700;font-size:23px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">YOUR TURN<\/span><span style=\"font-size:24px;color:#8A97A4;\">Use this Venn: n(\u2130)=20<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:.8fr 1.2fr;gap:34px;flex:1;align-items:center;\">\n    <div style=\"background:#fff;border-radius:18px;padding:20px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;align-items:center;justify-content:center;height:100%;\">\n      <svg viewBox=\"0 0 340 240\" width=\"100%\" style=\"max-height:360px;\">\n        <rect x=\"10\" y=\"15\" width=\"320\" height=\"210\" rx=\"8\" fill=\"#FBFAFF\" stroke=\"#C9C2F0\" stroke-width=\"2\"><\/rect>\n        <text x=\"22\" y=\"38\" font-size=\"18\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#5A6B76\">\u2130<\/text>\n        <circle cx=\"135\" cy=\"120\" r=\"76\" fill=\"#D6409F\" fill-opacity=\"0.35\"><\/circle>\n        <circle cx=\"215\" cy=\"120\" r=\"76\" fill=\"#F5B833\" fill-opacity=\"0.4\"><\/circle>\n        <circle cx=\"135\" cy=\"120\" r=\"76\" fill=\"none\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/circle>\n        <circle cx=\"215\" cy=\"120\" r=\"76\" fill=\"none\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/circle>\n        <text x=\"80\" y=\"80\" font-size=\"22\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#8a2168\" font-weight=\"bold\">A<\/text>\n        <text x=\"255\" y=\"80\" font-size=\"22\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#8a5a08\" font-weight=\"bold\">B<\/text>\n        <text x=\"105\" y=\"130\" font-size=\"26\" font-weight=\"800\" fill=\"#8a2168\">7<\/text>\n        <text x=\"170\" y=\"130\" font-size=\"26\" font-weight=\"800\" fill=\"#4A3C9E\">4<\/text>\n        <text x=\"235\" y=\"130\" font-size=\"26\" font-weight=\"800\" fill=\"#8a5a08\">5<\/text>\n        <text x=\"300\" y=\"215\" font-size=\"24\" font-weight=\"800\" fill=\"#C23A2B\">4<\/text>\n      <\/svg>\n    <\/div>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;\">\n      <div style=\"background:#fff;border-radius:16px;padding:22px 24px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:10px;\"><div style=\"font-size:24px;font-weight:800;color:#0EA5A8;\">Q1 \u00b7 P(A \u2229 B)<\/div><details class=\"rvtoggle\"><summary style=\"font-size:22px;color:#0EA5A8;font-weight:700;\">Reveal<\/summary><div style=\"margin-top:8px;background:#E6F6F6;border-radius:10px;padding:12px 16px;font-size:24px;\"><span class=\"frac\"><span class=\"num\">4<\/span><span class=\"den\">20<\/span><\/span> = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">5<\/span><\/span><\/div><\/details><\/div>\n      <div style=\"background:#fff;border-radius:16px;padding:22px 24px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:10px;\"><div style=\"font-size:24px;font-weight:800;color:#0EA5A8;\">Q2 \u00b7 P(A \u222a B)<\/div><details class=\"rvtoggle\"><summary style=\"font-size:22px;color:#0EA5A8;font-weight:700;\">Reveal<\/summary><div style=\"margin-top:8px;background:#E6F6F6;border-radius:10px;padding:12px 16px;font-size:24px;\"><span class=\"frac\"><span class=\"num\">16<\/span><span class=\"den\">20<\/span><\/span> = <span class=\"frac\"><span class=\"num\">4<\/span><span class=\"den\">5<\/span><\/span><\/div><\/details><\/div>\n      <div style=\"background:#fff;border-radius:16px;padding:22px 24px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:10px;\"><div style=\"font-size:24px;font-weight:800;color:#0EA5A8;\">Q3 \u00b7 P(A only)<\/div><details class=\"rvtoggle\"><summary style=\"font-size:22px;color:#0EA5A8;font-weight:700;\">Reveal<\/summary><div style=\"margin-top:8px;background:#E6F6F6;border-radius:10px;padding:12px 16px;font-size:24px;\"><span class=\"frac\"><span class=\"num\">7<\/span><span class=\"den\">20<\/span><\/span><\/div><\/details><\/div>\n      <div style=\"background:#fff;border-radius:16px;padding:22px 24px;box-shadow:0 3px 18px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:10px;\"><div style=\"font-size:24px;font-weight:800;color:#0EA5A8;\">Q4 \u00b7 P((A \u222a B)\u2032)<\/div><details class=\"rvtoggle\"><summary style=\"font-size:22px;color:#0EA5A8;font-weight:700;\">Reveal<\/summary><div style=\"margin-top:8px;background:#E6F6F6;border-radius:10px;padding:12px 16px;font-size:24px;\"><span class=\"frac\"><span class=\"num\">4<\/span><span class=\"den\">20<\/span><\/span> = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">5<\/span><\/span><\/div><\/details><\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Part 4 \u00b7 Conditional\" data-screen-label=\"Divider: 24.4\" data-speaker-notes=\"Section divider for conditional probability using trees, Venn diagrams and two-way tables.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#4A3C9E;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:90px;top:40px;font-family:Fredoka,system-ui,sans-serif;font-size:340px;line-height:1;color:rgba(255,194,60,.16);font-weight:600;\">04<\/div>\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-size:26px;font-weight:600;letter-spacing:.16em;color:#FFC23C;margin-bottom:20px;\">PART 4 \u00b7 SECTION 24.4<\/div>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:104px;line-height:1.02;margin-bottom:24px;\">Conditional probability<\/h2>\n    <p style=\"font-size:34px;color:#E4DFFA;max-width:1120px;line-height:1.4;\">\u201cGiven that A has happened\u201d \u2014 using tree diagrams, Venn diagrams and two-way tables.<\/p>\n  <\/div>\n<\/section>\n\n<section data-label=\"Independent vs dependent\" data-screen-label=\"24.4 Concept\" data-speaker-notes=\"For independent events the second probability is unchanged. For dependent events, such as taking balls without replacement, the first event changes the second probability because the totals change.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:16px;\"><span style=\"width:46px;height:6px;background:#4A3C9E;border-radius:3px;\"><\/span><span style=\"font-size:24px;font-weight:700;letter-spacing:.14em;color:#4A3C9E;\">CONCEPT \u00b7 24.4<\/span><\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:50px;margin-bottom:26px;\">Does the first event change the second?<\/h2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:30px;flex:1;\">\n    <div style=\"background:#EAF6EE;border-radius:20px;padding:32px 36px;display:flex;flex-direction:column;gap:16px;\">\n      <div style=\"font-size:32px;font-weight:800;color:#0F7A45;\">Independent<\/div>\n      <p style=\"font-size:27px;line-height:1.5;color:#33454F;\">The second probability is the <b>same<\/b> whatever happened first.<\/p>\n      <div style=\"background:#fff;border-radius:14px;padding:18px 22px;font-size:26px;line-height:1.4;\">Roll two dice: P(2nd is 6) = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">6<\/span><\/span>, no matter the first.<\/div>\n      <div style=\"margin-top:auto;font-size:25px;color:#0F7A45;font-weight:700;\">With replacement \u2192 independent.<\/div>\n    <\/div>\n    <div style=\"background:#FDECE9;border-radius:20px;padding:32px 36px;display:flex;flex-direction:column;gap:16px;\">\n      <div style=\"font-size:32px;font-weight:800;color:#C23A2B;\">Dependent<\/div>\n      <p style=\"font-size:27px;line-height:1.5;color:#33454F;\">The first event <b>changes<\/b> the second probability.<\/p>\n      <div style=\"background:#fff;border-radius:14px;padding:18px 22px;font-size:26px;line-height:1.4;\">3 fruits, take 2: after taking the apple, only <b>2 fruits<\/b> remain to choose from.<\/div>\n      <div style=\"margin-top:auto;font-size:25px;color:#C23A2B;font-weight:700;\">Without replacement \u2192 dependent.<\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Drill: Conditional formula\" data-screen-label=\"Drill: Conditional formula\" data-speaker-notes=\"Memory drill for the conditional probability formula. P of B given A equals P of A and B over P of A. In set language it is P of A intersection B over P of A. It means shrink the world down to A.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:64px 90px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:20px;\"><span style=\"white-space:nowrap;background:#B0730C;color:#fff;font-weight:700;font-size:23px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">DRILL<\/span><span style=\"font-size:24px;color:#8A97A4;\">The conditional probability formula<\/span><\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:52px;margin-bottom:30px;\">\u201cGiven\u201d means shrink the world<\/h2>\n  <div style=\"display:grid;grid-template-columns:1.1fr .9fr;gap:36px;flex:1;align-items:center;\">\n    <div style=\"display:flex;flex-direction:column;gap:20px;\">\n      <div style=\"background:#4A3C9E;border-radius:18px;padding:30px 36px;color:#fff;font-size:38px;text-align:center;line-height:1.5;\">P(B | A) = <span class=\"frac\"><span class=\"num\">P(A \u2229 B)<\/span><span class=\"den\">P(A)<\/span><\/span><\/div>\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:22px 28px;font-size:27px;line-height:1.5;\">The line <b>|<\/b> means \u201c<b>given<\/b>\u201d. We already know A happened, so we only look <b>inside A<\/b>.<\/div>\n      <div style=\"background:#FFF4E0;border-radius:16px;padding:20px 26px;font-size:25px;color:#8A5A08;line-height:1.4;\">Using counts: P(B | A) = <span class=\"frac\"><span class=\"num\">n(A \u2229 B)<\/span><span class=\"den\">n(A)<\/span><\/span>.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:24px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;align-items:center;justify-content:center;height:100%;\">\n      <svg viewBox=\"0 0 300 220\" width=\"100%\" style=\"max-height:340px;\">\n        <defs><clipPath id=\"cGA\"><circle cx=\"120\" cy=\"115\" r=\"72\"><\/circle><\/clipPath><\/defs>\n        <rect x=\"10\" y=\"15\" width=\"280\" height=\"190\" rx=\"8\" fill=\"#FBFAFF\" stroke=\"#C9C2F0\" stroke-width=\"2\" opacity=\"0.4\"><\/rect>\n        <circle cx=\"120\" cy=\"115\" r=\"72\" fill=\"#4A3C9E\" fill-opacity=\"0.18\" stroke=\"#4A3C9E\" stroke-width=\"2.5\"><\/circle>\n        <circle cx=\"185\" cy=\"115\" r=\"72\" fill=\"none\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/circle>\n        <circle cx=\"185\" cy=\"115\" r=\"72\" fill=\"#4A3C9E\" fill-opacity=\"0.7\" clip-path=\"url(#cGA)\"><\/circle>\n        <text x=\"75\" y=\"80\" font-size=\"22\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#4A3C9E\" font-weight=\"bold\">A<\/text>\n        <text x=\"215\" y=\"80\" font-size=\"22\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#8A97A4\" font-weight=\"bold\">B<\/text>\n        <text x=\"150\" y=\"205\" font-size=\"16\" fill=\"#4A3C9E\" font-weight=\"700\" text-anchor=\"middle\">world shrinks to A; count the overlap<\/text>\n      <\/svg>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Worked example 6\" data-screen-label=\"WE6 bag balls\" data-speaker-notes=\"Worked example 6. A bag has 12 blue and 9 green balls, total 21. Two balls are taken without replacement, so the tree probabilities change on the second stage: denominators drop from 21 to 20. Watch the dependent tree build and find P blue-blue, P green-green, and P one of each.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:23px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 6<\/span><span style=\"font-size:24px;color:#8A97A4;\">Balls without replacement \u2014 dependent tree<\/span><\/div>\n  <div style=\"background:#fff;border-radius:16px;padding:14px 26px;box-shadow:0 3px 18px rgba(22,55,95,.06);border-left:6px solid #0F7A45;margin-bottom:14px;\"><p style=\"font-size:25px;line-height:1.4;\">21 balls: <b>12 blue<\/b>, <b>9 green<\/b>. Take two <b>without replacing<\/b>. Find P(BB), P(GG), P(one of each).<\/p><\/div>\n  <div style=\"display:grid;grid-template-columns:1.15fr .85fr;gap:34px;flex:1;align-items:center;\">\n    <div style=\"background:#fff;border-radius:18px;padding:16px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;align-items:center;justify-content:center;height:100%;\">\n      <svg viewBox=\"0 0 440 300\" width=\"100%\" style=\"max-height:440px;\">\n        <text x=\"120\" y=\"18\" font-size=\"15\" font-weight=\"700\" fill=\"#5A6B76\" text-anchor=\"middle\">1st ball (\u00f721)<\/text>\n        <text x=\"300\" y=\"18\" font-size=\"15\" font-weight=\"700\" fill=\"#5A6B76\" text-anchor=\"middle\">2nd ball (\u00f720)<\/text>\n        <circle cx=\"40\" cy=\"150\" r=\"6\" fill=\"#4A3C9E\"><\/circle>\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;1;1;1;1;0\" keyTimes=\"0;0.16;0.4;0.9;0.95;1\" dur=\"6.5s\" repeatCount=\"indefinite\"><\/animate>\n          <line x1=\"46\" y1=\"147\" x2=\"160\" y2=\"80\" stroke=\"#4A3C9E\" stroke-width=\"3\"><\/line><line x1=\"46\" y1=\"153\" x2=\"160\" y2=\"220\" stroke=\"#4A3C9E\" stroke-width=\"3\"><\/line>\n          <text x=\"88\" y=\"100\" font-size=\"17\" fill=\"#B0730C\" font-weight=\"700\">12/21<\/text><text x=\"88\" y=\"200\" font-size=\"17\" fill=\"#B0730C\" font-weight=\"700\">9/21<\/text>\n          <circle cx=\"160\" cy=\"80\" r=\"6\" fill=\"#1F6FB2\"><\/circle><text x=\"168\" y=\"86\" font-size=\"19\" font-weight=\"800\" fill=\"#1F6FB2\">B<\/text>\n          <circle cx=\"160\" cy=\"220\" r=\"6\" fill=\"#0F7A45\"><\/circle><text x=\"168\" y=\"226\" font-size=\"19\" font-weight=\"800\" fill=\"#0F7A45\">G<\/text>\n        <\/g>\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;0;1;1;1;0\" keyTimes=\"0;0.32;0.48;0.9;0.95;1\" dur=\"6.5s\" repeatCount=\"indefinite\"><\/animate>\n          <line x1=\"166\" y1=\"77\" x2=\"300\" y2=\"45\" stroke=\"#8A97A4\" stroke-width=\"2.5\"><\/line><line x1=\"166\" y1=\"83\" x2=\"300\" y2=\"115\" stroke=\"#8A97A4\" stroke-width=\"2.5\"><\/line>\n          <line x1=\"166\" y1=\"217\" x2=\"300\" y2=\"185\" stroke=\"#8A97A4\" stroke-width=\"2.5\"><\/line><line x1=\"166\" y1=\"223\" x2=\"300\" y2=\"255\" stroke=\"#8A97A4\" stroke-width=\"2.5\"><\/line>\n          <text x=\"222\" y=\"48\" font-size=\"15\" fill=\"#C23A2B\" font-weight=\"700\">11/20<\/text><text x=\"222\" y=\"118\" font-size=\"15\" fill=\"#C23A2B\" font-weight=\"700\">9/20<\/text>\n          <text x=\"222\" y=\"188\" font-size=\"15\" fill=\"#C23A2B\" font-weight=\"700\">12/20<\/text><text x=\"222\" y=\"258\" font-size=\"15\" fill=\"#C23A2B\" font-weight=\"700\">8/20<\/text>\n          <text x=\"308\" y=\"50\" font-size=\"17\" font-weight=\"800\" fill=\"#5A6B76\">B<\/text><text x=\"308\" y=\"120\" font-size=\"17\" font-weight=\"800\" fill=\"#5A6B76\">G<\/text>\n          <text x=\"308\" y=\"190\" font-size=\"17\" font-weight=\"800\" fill=\"#5A6B76\">B<\/text><text x=\"308\" y=\"260\" font-size=\"17\" font-weight=\"800\" fill=\"#5A6B76\">G<\/text>\n        <\/g>\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;0;0;1;1;0\" keyTimes=\"0;0.32;0.52;0.62;0.9;1\" dur=\"6.5s\" repeatCount=\"indefinite\"><\/animate>\n          <text x=\"345\" y=\"50\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">BB<\/text>\n          <text x=\"345\" y=\"120\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">BG<\/text>\n          <text x=\"345\" y=\"190\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">GB<\/text>\n          <text x=\"345\" y=\"260\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">GG<\/text>\n        <\/g>\n      <\/svg>\n    <\/div>\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"background:#FDECE9;border-radius:16px;padding:18px 24px;font-size:24px;line-height:1.5;color:#8B2F22;\"><b>Notice:<\/b> the 2nd-stage denominator is <b>20<\/b>, not 21 \u2014 one ball is gone.<\/div>\n      <details class=\"rvtoggle\"><summary style=\"background:#0F7A45;color:#fff;font-size:25px;font-weight:700;padding:15px 22px;border-radius:14px;text-align:center;\">\u25b6 Reveal answers<\/summary>\n        <div style=\"margin-top:14px;background:#EAF6EE;border-radius:16px;padding:18px 24px;font-size:23px;line-height:1.75;\"><b>P(BB)<\/b> = <span class=\"frac\"><span class=\"num\">12<\/span><span class=\"den\">21<\/span><\/span> \u00d7 <span class=\"frac\"><span class=\"num\">11<\/span><span class=\"den\">20<\/span><\/span> = <span class=\"frac\"><span class=\"num\">11<\/span><span class=\"den\">35<\/span><\/span><br><b>P(GG)<\/b> = <span class=\"frac\"><span class=\"num\">9<\/span><span class=\"den\">21<\/span><\/span> \u00d7 <span class=\"frac\"><span class=\"num\">8<\/span><span class=\"den\">20<\/span><\/span> = <span class=\"frac\"><span class=\"num\">6<\/span><span class=\"den\">35<\/span><\/span><br><b>P(one of each)<\/b> = <span class=\"frac\"><span class=\"num\">18<\/span><span class=\"den\">35<\/span><\/span><\/div>\n      <\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Builder: Conditional\" data-screen-label=\"Builder: Conditional\" data-speaker-notes=\"Step-by-step builder for conditional probability from a two-way table. Read the given row, find the overlap, then divide.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#EAF3FF;color:#12324F;overflow:hidden;\">\n  <div class=\"stut\" data-step=\"0\" data-max=\"7\" style=\"display:flex;flex-direction:column;height:100%;\">\n    <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#1F6FB2;color:#fff;font-weight:700;font-size:23px;letter-spacing:.06em;padding:9px 22px;border-radius:999px;\">STEP-BY-STEP BUILDER<\/span><span style=\"font-size:24px;color:#3E6C93;\">Conditional probability<\/span><span class=\"stut-badge\" style=\"margin-left:auto;font-size:24px;font-weight:800;color:#1F6FB2;background:#fff;padding:8px 20px;border-radius:999px;box-shadow:0 2px 12px rgba(22,55,95,.08);\">Step 0 / 7<\/span><\/div>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:40px;margin-bottom:8px;\">Find P(likes tea | is a child)<\/h2>\n    <div style=\"display:grid;grid-template-columns:1.05fr .95fr;gap:34px;flex:1;min-height:0;align-items:center;\">\n      <div style=\"background:#fff;border-radius:20px;padding:26px;box-shadow:0 4px 22px rgba(22,55,95,.08);display:flex;align-items:center;justify-content:center;height:100%;position:relative;\">\n        <div class=\"snote\" data-step=\"0\" style=\"background:#EDEAFA;border-radius:16px;padding:30px 34px;font-size:29px;line-height:1.55;max-width:460px;\"><b>The problem.<\/b> 60 people were asked: tea or coffee?<br>\u2022 <b>20 children<\/b> \u2014 12 chose tea, 8 chose coffee.<br>\u2022 <b>40 adults<\/b> \u2014 18 chose tea, 22 chose coffee.<br><br>We will build a <b>two-way table<\/b>, then find P(tea | child).<\/div>\n        <table class=\"sl\" data-min=\"1\" style=\"border-collapse:collapse;font-size:26px;\">\n          <tbody><tr><td style=\"border:2px solid #C9C2F0;padding:16px 22px;\"><\/td><td style=\"border:2px solid #C9C2F0;padding:16px 22px;background:#EDEAFA;font-weight:800;\">Tea<\/td><td style=\"border:2px solid #C9C2F0;padding:16px 22px;background:#EDEAFA;font-weight:800;\">Coffee<\/td><td style=\"border:2px solid #C9C2F0;padding:16px 22px;background:#EDEAFA;font-weight:800;\">Total<\/td><\/tr>\n          <tr><td style=\"border:2px solid #C9C2F0;padding:16px 22px;background:#EDEAFA;font-weight:800;\">Child<\/td><td style=\"border:2px solid #C9C2F0;padding:16px 22px;font-weight:800;color:#1F6FB2;\"><span class=\"sl\" data-min=\"2\">12<\/span><\/td><td style=\"border:2px solid #C9C2F0;padding:16px 22px;\"><span class=\"sl\" data-min=\"2\">8<\/span><\/td><td style=\"border:2px solid #C9C2F0;padding:16px 22px;font-weight:800;color:#0F7A45;\"><span class=\"sl\" data-min=\"3\">20<\/span><\/td><\/tr>\n          <tr><td style=\"border:2px solid #C9C2F0;padding:16px 22px;background:#EDEAFA;font-weight:800;\">Adult<\/td><td style=\"border:2px solid #C9C2F0;padding:16px 22px;\"><span class=\"sl\" data-min=\"2\">18<\/span><\/td><td style=\"border:2px solid #C9C2F0;padding:16px 22px;\"><span class=\"sl\" data-min=\"2\">22<\/span><\/td><td style=\"border:2px solid #C9C2F0;padding:16px 22px;\"><span class=\"sl\" data-min=\"3\">40<\/span><\/td><\/tr>\n          <tr><td style=\"border:2px solid #C9C2F0;padding:16px 22px;background:#EDEAFA;font-weight:800;\">Total<\/td><td style=\"border:2px solid #C9C2F0;padding:16px 22px;\"><span class=\"sl\" data-min=\"4\">30<\/span><\/td><td style=\"border:2px solid #C9C2F0;padding:16px 22px;\"><span class=\"sl\" data-min=\"4\">30<\/span><\/td><td style=\"border:2px solid #C9C2F0;padding:16px 22px;\"><span class=\"sl\" data-min=\"4\">60<\/span><\/td><\/tr>\n        <\/tbody><\/table>\n      <\/div>\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <div class=\"snote\" data-step=\"0\" style=\"background:#fff;border-radius:16px;padding:22px 26px;font-size:28px;line-height:1.5;box-shadow:0 3px 16px rgba(22,55,95,.06);\"><b>Read the problem first.<\/b> We are told about children and adults, and tea and coffee. Press <b>Next \u25b6<\/b> to build the table.<\/div>\n        <div class=\"snote\" data-step=\"1\" style=\"background:#fff;border-radius:16px;padding:22px 26px;font-size:28px;line-height:1.5;box-shadow:0 3px 16px rgba(22,55,95,.06);\"><b>Step 1 \u2014 Draw the grid.<\/b> Two rows (Child, Adult) and two columns (Tea, Coffee), plus a <b>Total<\/b> row and column.<\/div>\n        <div class=\"snote\" data-step=\"2\" style=\"background:#fff;border-radius:16px;padding:22px 26px;font-size:28px;line-height:1.5;box-shadow:0 3px 16px rgba(22,55,95,.06);\"><b>Step 2 \u2014 Fill the given numbers.<\/b> 12 &amp; 8 for children; 18 &amp; 22 for adults.<\/div>\n        <div class=\"snote\" data-step=\"3\" style=\"background:#fff;border-radius:16px;padding:22px 26px;font-size:28px;line-height:1.5;box-shadow:0 3px 16px rgba(22,55,95,.06);\"><b>Step 3 \u2014 Row totals.<\/b> Child: 12 + 8 = <b>20<\/b>. Adult: 18 + 22 = <b>40<\/b>.<\/div>\n        <div class=\"snote\" data-step=\"4\" style=\"background:#fff;border-radius:16px;padding:22px 26px;font-size:28px;line-height:1.5;box-shadow:0 3px 16px rgba(22,55,95,.06);\"><b>Step 4 \u2014 Column totals.<\/b> Tea 30, Coffee 30, grand total <b>60<\/b>. The table is complete.<\/div>\n        <div class=\"snote\" data-step=\"5\" style=\"background:#fff;border-radius:16px;padding:22px 26px;font-size:28px;line-height:1.5;box-shadow:0 3px 16px rgba(22,55,95,.06);\"><b>Step 5 \u2014 Shrink the world.<\/b> \u201cGiven a child\u201d \u2192 use the <b>Child row<\/b> only. Numerator <span style=\"color:#1F6FB2;font-weight:800;\">12<\/span>, denominator <span style=\"color:#0F7A45;font-weight:800;\">20<\/span>.<\/div>\n        <div class=\"snote\" data-step=\"6\" style=\"background:#fff;border-radius:16px;padding:22px 26px;font-size:28px;line-height:1.5;box-shadow:0 3px 16px rgba(22,55,95,.06);\"><b>Step 6 \u2014 Divide.<\/b> P(tea | child) = <span class=\"frac\"><span class=\"num\">12<\/span><span class=\"den\">20<\/span><\/span>.<\/div>\n        <div class=\"snote\" data-step=\"7\" style=\"background:#DFF3E7;border-radius:16px;padding:22px 26px;font-size:28px;line-height:1.5;box-shadow:0 3px 16px rgba(22,55,95,.06);\"><b>Step 7 \u2014 Simplify.<\/b> <span class=\"frac\"><span class=\"num\">12<\/span><span class=\"den\">20<\/span><\/span> = <span class=\"frac\"><span class=\"num\">3<\/span><span class=\"den\">5<\/span><\/span> = <b>0.6<\/b>. \u2713<\/div>\n        <div style=\"display:flex;gap:14px;margin-top:6px;\">\n          <button class=\"stut-prev\" style=\"flex:1;background:#fff;color:#1F6FB2;border:2px solid #1F6FB2;font-size:26px;font-weight:700;padding:14px;border-radius:14px;cursor:pointer;\">\u25c0 Back<\/button>\n          <button class=\"stut-next\" style=\"flex:2;background:#1F6FB2;color:#fff;border:none;font-size:26px;font-weight:700;padding:14px;border-radius:14px;cursor:pointer;\">Next \u25b6<\/button>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Worked example 7\" data-screen-label=\"WE7 tablets Venn\" data-speaker-notes=\"Worked example 7. 50 students: 36 tablet, 20 laptop, 12 neither. Find the overlap: 50 minus 12 is 38 use at least one; 36 plus 20 is 56, so 56 minus 38 is 18 use both. Then answer the conditional parts using the Venn diagram.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:23px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 7<\/span><span style=\"font-size:24px;color:#8A97A4;\">Conditional from a Venn diagram<\/span><\/div>\n  <div style=\"background:#fff;border-radius:16px;padding:14px 26px;box-shadow:0 3px 18px rgba(22,55,95,.06);border-left:6px solid #0F7A45;margin-bottom:14px;\"><p style=\"font-size:25px;line-height:1.4;\">50 students: <b>36<\/b> use tablets (T), <b>20<\/b> use laptops (L), <b>12<\/b> use neither. Find P(T | L) and P(L\u2032 | T).<\/p><\/div>\n  <div style=\"display:grid;grid-template-columns:1fr .95fr;gap:34px;flex:1;align-items:center;\">\n    <div style=\"background:#fff;border-radius:18px;padding:16px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;align-items:center;justify-content:center;height:100%;\">\n      <svg viewBox=\"0 0 400 250\" width=\"100%\" style=\"max-height:420px;\">\n        <defs><clipPath id=\"cT\"><circle cx=\"165\" cy=\"120\" r=\"85\"><\/circle><\/clipPath><\/defs>\n        <rect x=\"10\" y=\"12\" width=\"380\" height=\"226\" rx=\"8\" fill=\"#FBFAFF\" stroke=\"#C9C2F0\" stroke-width=\"2\"><\/rect>\n        <text x=\"22\" y=\"34\" font-size=\"18\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#5A6B76\">\u2130<\/text>\n        <circle cx=\"165\" cy=\"120\" r=\"85\" fill=\"#D6409F\" fill-opacity=\"0.35\"><\/circle>\n        <circle cx=\"250\" cy=\"120\" r=\"85\" fill=\"#F5B833\" fill-opacity=\"0.4\"><\/circle>\n        <circle cx=\"165\" cy=\"120\" r=\"85\" fill=\"none\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/circle>\n        <circle cx=\"250\" cy=\"120\" r=\"85\" fill=\"none\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/circle>\n        <text x=\"95\" y=\"66\" font-size=\"22\" font-weight=\"800\" fill=\"#8a2168\">T<\/text>\n        <text x=\"305\" y=\"66\" font-size=\"22\" font-weight=\"800\" fill=\"#8a5a08\">L<\/text>\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;1;1;1;1;0\" keyTimes=\"0;0.18;0.4;0.85;0.92;1\" dur=\"6s\" repeatCount=\"indefinite\"><\/animate><text x=\"200\" y=\"130\" font-size=\"30\" font-weight=\"800\" fill=\"#4A3C9E\">18<\/text><\/g>\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;0;1;1;1;0\" keyTimes=\"0;0.38;0.52;0.85;0.92;1\" dur=\"6s\" repeatCount=\"indefinite\"><\/animate><text x=\"120\" y=\"130\" font-size=\"28\" font-weight=\"800\" fill=\"#8a2168\">18<\/text><text x=\"290\" y=\"130\" font-size=\"28\" font-weight=\"800\" fill=\"#8a5a08\">2<\/text><\/g>\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;0;0;1;1;0\" keyTimes=\"0;0.52;0.66;0.72;0.92;1\" dur=\"6s\" repeatCount=\"indefinite\"><\/animate><text x=\"360\" y=\"228\" font-size=\"26\" font-weight=\"800\" fill=\"#C23A2B\">12<\/text><\/g>\n      <\/svg>\n    <\/div>\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:18px 24px;font-size:24px;line-height:1.5;\">Both = 36 + 20 \u2212 38 = <b>18<\/b>. T only = 18, L only = 2, neither = 12.<\/div>\n      <details class=\"rvtoggle\"><summary style=\"background:#0F7A45;color:#fff;font-size:25px;font-weight:700;padding:15px 22px;border-radius:14px;text-align:center;\">\u25b6 Reveal conditional answers<\/summary>\n        <div style=\"margin-top:14px;background:#EAF6EE;border-radius:16px;padding:18px 24px;font-size:24px;line-height:1.7;\"><b>P(T | L)<\/b> = <span class=\"frac\"><span class=\"num\">n(T \u2229 L)<\/span><span class=\"den\">n(L)<\/span><\/span> = <span class=\"frac\"><span class=\"num\">18<\/span><span class=\"den\">20<\/span><\/span> = <span class=\"frac\"><span class=\"num\">9<\/span><span class=\"den\">10<\/span><\/span><br><b>P(L\u2032 | T)<\/b> = <span class=\"frac\"><span class=\"num\">18<\/span><span class=\"den\">36<\/span><\/span> = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span><\/div>\n      <\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Worked example 8\" data-screen-label=\"WE8 two-way table\" data-speaker-notes=\"Worked example 8. A two-way table of Grade 10 and 11 students by device. Add the totals, then read conditional probabilities from the given row or column. Watch the totals fill in.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:23px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 8<\/span><span style=\"font-size:24px;color:#8A97A4;\">Conditional from a two-way table<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.15fr .85fr;gap:34px;flex:1;align-items:center;\">\n    <div style=\"background:#fff;border-radius:18px;padding:20px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;align-items:center;justify-content:center;height:100%;\">\n      <table style=\"border-collapse:collapse;font-size:25px;\">\n        <tbody><tr><td style=\"border:2px solid #C9C2F0;padding:14px 20px;\"><\/td><td style=\"border:2px solid #C9C2F0;padding:14px 20px;background:#4A3C9E;color:#fff;font-weight:800;\">Phone<\/td><td style=\"border:2px solid #C9C2F0;padding:14px 20px;background:#4A3C9E;color:#fff;font-weight:800;\">Tablet<\/td><td style=\"border:2px solid #C9C2F0;padding:14px 20px;background:#4A3C9E;color:#fff;font-weight:800;\">PC<\/td><td style=\"border:2px solid #C9C2F0;padding:14px 20px;background:#B0730C;color:#fff;font-weight:800;\">Total<\/td><\/tr>\n        <tr><td style=\"border:2px solid #C9C2F0;padding:14px 20px;background:#EDEAFA;font-weight:800;\">Grade 10<\/td><td style=\"border:2px solid #C9C2F0;padding:14px 20px;\">200<\/td><td style=\"border:2px solid #C9C2F0;padding:14px 20px;\">330<\/td><td style=\"border:2px solid #C9C2F0;padding:14px 20px;\">120<\/td><td style=\"border:2px solid #C9C2F0;padding:14px 20px;font-weight:800;color:#B0730C;\">650<\/td><\/tr>\n        <tr><td style=\"border:2px solid #C9C2F0;padding:14px 20px;background:#EDEAFA;font-weight:800;\">Grade 11<\/td><td style=\"border:2px solid #C9C2F0;padding:14px 20px;\">250<\/td><td style=\"border:2px solid #C9C2F0;padding:14px 20px;\">320<\/td><td style=\"border:2px solid #C9C2F0;padding:14px 20px;\">80<\/td><td style=\"border:2px solid #C9C2F0;padding:14px 20px;font-weight:800;color:#B0730C;\">650<\/td><\/tr>\n        <tr><td style=\"border:2px solid #C9C2F0;padding:14px 20px;background:#B0730C;color:#fff;font-weight:800;\">Total<\/td><td style=\"border:2px solid #C9C2F0;padding:14px 20px;font-weight:800;color:#B0730C;\">450<\/td><td style=\"border:2px solid #C9C2F0;padding:14px 20px;font-weight:800;color:#B0730C;\">650<\/td><td style=\"border:2px solid #C9C2F0;padding:14px 20px;font-weight:800;color:#B0730C;\">200<\/td><td style=\"border:2px solid #C9C2F0;padding:14px 20px;font-weight:800;color:#4A3C9E;\">1300<\/td><\/tr>\n      <\/tbody><\/table>\n    <\/div>\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:18px 24px;font-size:24px;line-height:1.5;\">For \u201cgiven Grade 11\u201d, use the <b>Grade 11 total = 650<\/b> as the denominator.<\/div>\n      <details class=\"rvtoggle\"><summary style=\"background:#0F7A45;color:#fff;font-size:25px;font-weight:700;padding:15px 22px;border-radius:14px;text-align:center;\">\u25b6 Reveal answers<\/summary>\n        <div style=\"margin-top:14px;background:#EAF6EE;border-radius:16px;padding:18px 24px;font-size:23px;line-height:1.75;\"><b>(a)<\/b> P(phone | G11) = <span class=\"frac\"><span class=\"num\">250<\/span><span class=\"den\">650<\/span><\/span> = <span class=\"frac\"><span class=\"num\">5<\/span><span class=\"den\">13<\/span><\/span><br><b>(b)<\/b> P(PC | G10) = <span class=\"frac\"><span class=\"num\">120<\/span><span class=\"den\">650<\/span><\/span> = <span class=\"frac\"><span class=\"num\">12<\/span><span class=\"den\">65<\/span><\/span><br><b>(c)<\/b> P(G11 | tablet) = <span class=\"frac\"><span class=\"num\">320<\/span><span class=\"den\">650<\/span><\/span> = <span class=\"frac\"><span class=\"num
