document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:34px 38px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;flex-direction:column;gap:12px;\"><span style=\"font-family:Fredoka;font-weight:700;font-size:44px;color:#C23A2B;line-height:1;\">4<\/span><div style=\"font-size:32px;font-weight:800;\">Conditional probability<\/div><p style=\"font-size:26px;color:#5A6B76;line-height:1.35;\">Use trees, Venn diagrams and two-way tables for \u201cgiven that\u201d problems.<\/p><\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"How to use this deck\" data-screen-label=\"Legend\" data-speaker-notes=\"Explain the five coloured labels: key words, drills, worked examples, your turn, and the type-your-answer quiz, plus the blue step-by-step builders and the animated diagrams.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:84px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:14px;\">\n    <span style=\"width:52px;height:6px;background:#4A3C9E;border-radius:3px;\"><\/span>\n    <span style=\"font-size:26px;font-weight:700;letter-spacing:.14em;color:#4A3C9E;\">LEGEND<\/span>\n  <\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:58px;margin-bottom:36px;\">Five kinds of slide<\/h2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;flex:1;\">\n    <div style=\"background:#fff;border-radius:18px;padding:30px 34px;display:flex;gap:24px;align-items:center;box-shadow:0 2px 16px rgba(22,55,95,.05);\"><span style=\"flex-shrink:0;background:#4A3C9E;color:#fff;font-weight:700;font-size:22px;letter-spacing:.06em;padding:10px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:29px;color:#5A6B76;\">A maths word explained simply, with a picture and an example.<\/span><\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:30px 34px;display:flex;gap:24px;align-items:center;box-shadow:0 key words are the language of probability. Each gets its own slide with a picture and an example.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#4A3C9E;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:90px;top:40px;font-family:Fredoka,system-ui,sans-serif;font-size:340px;line-height:1;color:rgba(255,194,60,.16);font-weight:600;\">01<\/div>\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-size:26px;font-weight:600;letter-spacing:.16em;color:#FFC23C;margin-bottom:20px;\">PART 1<\/div>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:104px;line-height:1.02;margin-bottom:24px;\">Key vocabulary<\/h2>\n    <p style=\"font-size:34px;color:#E4DFFA;max-width:1080px;line-height:1.4;\">The 12 words you need for this chapter, each explained in plain English with a picture and an example.<\/p>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Probability\" data-screen-label=\"Vocab: Probability\" data-speaker-notes=\"Probability is a number between 0 and 1 that tells you how likely an event is. 0 means impossible, 1 means certain, one half means an even chance.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#4A3C9E;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">1 / 12 \u00b7 Probability<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:74px;line-height:1;margin-bottom:10px;\">Probability<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:26px;\">/ prob-uh-BIL-i-tee / \u00b7 noun<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#4A3C9E;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">A number from <b>0 to 1<\/b> that says <b>how likely<\/b> something is. 0 = impossible, 1 = certain, <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span> = even chance.<\/p>\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:24px 28px;font-size:30px;line-height:1.4;\"><span style=\"font-weight:700;color:#4A3C9E;\">Example&nbsp;&nbsp;<\/span>P(heads) = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span> when you flip a fair coin.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:36px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;flex-direction:column;justify-content:center;gap:22px;\">\n      <svg viewBox=\"0 0 420 90\" width=\"100%\">\n        <rect x=\"10\" y=\"30\" width=\"400\" height=\"30\" rx=\"6\" fill=\"url(#pgrad)\"><\/rect>\n        <defs><linearGradient id=\"pgrad\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\"><stop offset=\"0\" stop-color=\"#C23A2B\"><\/stop><stop offset=\"0.5\" stop-color=\"#F5B833\"><\/stop><stop offset=\"1\" stop-color=\"#0F7A45\"><\/stop><\/linearGradient><\/defs>\n        <line x1=\"10\" y1=\"24\" x2=\"10\" y2=\"66\" stroke=\"#1F2933\" stroke-width=\"2\"><\/line>\n        <line x1=\"210\" y1=\"24\" x2=\"210\" y2=\"66\" stroke=\"#1F2933\" stroke-width=\"2\"><\/line>\n        <line x1=\"410\" y1=\"24\" x2=\"410\" y2=\"66\" stroke=\"#1F2933\" stroke-width=\"2\"><\/line>\n        <text x=\"10\" y=\"18\" font-size=\"18\" font-weight=\"700\" fill=\"#C23A2B\" text-anchor=\"middle\">0<\/text>\n        <text x=\"210\" y=\"18\" font-size=\"18\" font-weight=\"700\" fill=\"#B0730C\" text-anchor=\"middle\">\u00bd<\/text>\n        <text x=\"410\" y=\"18\" font-size=\"18\" font-weight=\"700\" fill=\"#0F7A45\" text-anchor=\"middle\">1<\/text>\n        <text x=\"10\" y=\"82\" font-size=\"15\" fill=\"#5A6B76\" text-anchor=\"middle\">impossible<\/text>\n        <text x=\"210\" y=\"82\" font-size=\"15\" fill=\"#5A6B76\" text-anchor=\"middle\">even chance<\/text>\n        <text x=\"410\" y=\"82\" font-size=\"15\" fill=\"#5A6B76\" text-anchor=\"middle\">certain<\/text>\n      <\/svg>\n      <div style=\"font-size:25px;color:#5A6B76;text-align:center;line-height:1.4;\">Every probability lives on this <b>0 \u2192 1<\/b> line.<\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Outcome\" data-screen-label=\"Vocab: Outcome\" data-speaker-notes=\"An outcome is a single possible result of an experiment. When you roll a dice, one outcome is a 4.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#4A3C9E;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">2 / 12 \u00b7 Probability<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:80px;line-height:1;margin-bottom:10px;\">Outcome<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:26px;\">/ OWT-kum / \u00b7 noun<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#4A3C9E;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">One <b>possible result<\/b> of an experiment or trial.<\/p>\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:24px 28px;font-size:30px;line-height:1.4;\"><span style=\"font-weight:700;color:#4A3C9E;\">Example&nbsp;&nbsp;<\/span>Rolling a dice has 6 outcomes: 1, 2, 3, 4, 5, 6. Getting a <b>4<\/b> is one outcome.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:36px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;\">\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;\">\n        <div style=\"width:74px;height:74px;border-radius:12px;background:#F1ECFF;border:2px solid #C9C2F0;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:#8A97A4;\">1<\/div>\n        <div style=\"width:74px;height:74px;border-radius:12px;background:#F1ECFF;border:2px solid #C9C2F0;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:#8A97A4;\">2<\/div>\n        <div style=\"width:74px;height:74px;border-radius:12px;background:#F1ECFF;border:2px solid #C9C2F0;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:#8A97A4;\">3<\/div>\n        <div style=\"width:74px;height:74px;border-radius:12px;background:#4A3C9E;border:2px solid #4A3C9E;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:#fff;box-shadow:0 4px 14px rgba(74,60,158,.4);\">4<\/div>\n        <div style=\"width:74px;height:74px;border-radius:12px;background:#F1ECFF;border:2px solid #C9C2F0;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:#8A97A4;\">5<\/div>\n        <div style=\"width:74px;height:74px;border-radius:12px;background:#F1ECFF;border:2px solid #C9C2F0;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:#8A97A4;\">6<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Event\" data-screen-label=\"Vocab: Event\" data-speaker-notes=\"An event is one or more outcomes you are interested in. Getting an even number when you roll a dice is an event made of three outcomes: 2, 4 and 6.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#4A3C9E;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">3 / 12 \u00b7 Probability<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:82px;line-height:1;margin-bottom:10px;\">Event<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:26px;\">/ ee-VENT / \u00b7 noun<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#4A3C9E;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">One or more <b>outcomes you care about<\/b>. An event can be a group of outcomes.<\/p>\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:24px 28px;font-size:30px;line-height:1.4;\"><span style=\"font-weight:700;color:#4A3C9E;\">Example&nbsp;&nbsp;<\/span>\u201cRoll an <b>even number<\/b>\u201d is the event {2, 4, 6}, so P(even) = <span class=\"frac\"><span class=\"num\">3<\/span><span class=\"den\">6<\/span><\/span> = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span>.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:36px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;align-items:center;justify-content:center;\">\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;\">\n        <div style=\"width:74px;height:74px;border-radius:12px;background:#F1ECFF;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:#8A97A4;\">1<\/div>\n        <div style=\"width:74px;height:74px;border-radius:12px;background:#D6409F;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:#fff;\">2<\/div>\n        <div style=\"width:74px;height:74px;border-radius:12px;background:#F1ECFF;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:#8A97A4;\">3<\/div>\n        <div style=\"width:74px;height:74px;border-radius:12px;background:#D6409F;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:#fff;\">4<\/div>\n        <div style=\"width:74px;height:74px;border-radius:12px;background:#F1ECFF;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:#8A97A4;\">5<\/div>\n        <div style=\"width:74px;height:74px;border-radius:12px;background:#D6409F;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:#fff;\">6<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Sample space\" data-screen-label=\"Vocab: Sample space\" data-speaker-notes=\"The sample space is the set of all possible outcomes. You can list it or show it in a table or a tree diagram.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#4A3C9E;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">4 / 12 \u00b7 Probability<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:66px;line-height:1.05;margin-bottom:10px;\">Sample space<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:26px;\">/ SAM-pul spays / \u00b7 noun<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#4A3C9E;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">The <b>list of every possible outcome<\/b>. Show it as a list, a table, or a tree.<\/p>\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:24px 28px;font-size:29px;line-height:1.4;\"><span style=\"font-weight:700;color:#4A3C9E;\">Example&nbsp;&nbsp;<\/span>Flip a coin: the sample space is <b>{Heads, Tails}<\/b>.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:30px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;align-items:center;justify-content:center;\">\n      <table style=\"border-collapse:collapse;font-size:24px;\">\n        <tbody><tr><td style=\"border:2px solid #C9C2F0;padding:12px 16px;background:#4A3C9E;color:#fff;font-weight:700;\">coin \\ dice<\/td><td style=\"border:2px solid #C9C2F0;padding:12px 16px;background:#EDEAFA;font-weight:700;\">1<\/td><td style=\"border:2px solid #C9C2F0;padding:12px 16px;background:#EDEAFA;font-weight:700;\">2<\/td><td style=\"border:2px solid #C9C2F0;padding:12px 16px;background:#EDEAFA;font-weight:700;\">3<\/td><\/tr>\n        <tr><td style=\"border:2px solid #C9C2F0;padding:12px 16px;background:#EDEAFA;font-weight:700;\">H<\/td><td style=\"border:2px solid #C9C2F0;padding:12px 16px;\">H1<\/td><td style=\"border:2px solid #C9C2F0;padding:12px 16px;\">H2<\/td><td style=\"border:2px solid #C9C2F0;padding:12px 16px;\">H3<\/td><\/tr>\n        <tr><td style=\"border:2px solid #C9C2F0;padding:12px 16px;background:#EDEAFA;font-weight:700;\">T<\/td><td style=\"border:2px solid #C9C2F0;padding:12px 16px;\">T1<\/td><td style=\"border:2px solid #C9C2F0;padding:12px 16px;\">T2<\/td><td style=\"border:2px solid #C9C2F0;padding:12px 16px;\">T3<\/td><\/tr>\n      <\/tbody><\/table>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Tree diagram\" data-screen-label=\"Vocab: Tree diagram\" data-speaker-notes=\"A tree diagram shows combined events as branches. Each branch is an outcome, and you write the probability on the branch.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#4A3C9E;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">5 / 12 \u00b7 Tree diagrams<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:66px;line-height:1.05;margin-bottom:10px;\">Tree diagram<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:26px;\">/ tree DY-uh-gram / \u00b7 noun<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#4A3C9E;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">A picture of <b>branches<\/b> showing every outcome of <b>combined events<\/b>. Write each probability <b>on its branch<\/b>.<\/p>\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:24px 28px;font-size:29px;line-height:1.4;\"><span style=\"font-weight:700;color:#4A3C9E;\">Use it to&nbsp;&nbsp;<\/span><b>multiply along<\/b> branches and <b>add<\/b> between them.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:30px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;align-items:center;justify-content:center;\">\n      <svg viewBox=\"0 0 300 220\" width=\"100%\" style=\"max-height:280px;\">\n        <circle cx=\"40\" cy=\"110\" r=\"5\" fill=\"#4A3C9E\"><\/circle>\n        <line x1=\"45\" y1=\"108\" x2=\"150\" y2=\"55\" stroke=\"#4A3C9E\" stroke-width=\"2.5\"><\/line>\n        <line x1=\"45\" y1=\"112\" x2=\"150\" y2=\"165\" stroke=\"#4A3C9E\" stroke-width=\"2.5\"><\/line>\n        <text x=\"88\" y=\"72\" font-size=\"17\" fill=\"#B0730C\" font-weight=\"700\">\u00bd<\/text>\n        <text x=\"88\" y=\"150\" font-size=\"17\" fill=\"#B0730C\" font-weight=\"700\">\u00bd<\/text>\n        <circle cx=\"150\" cy=\"55\" r=\"5\" fill=\"#D6409F\"><\/circle><text x=\"160\" y=\"60\" font-size=\"20\" font-weight=\"800\" fill=\"#D6409F\">H<\/text>\n        <circle cx=\"150\" cy=\"165\" r=\"5\" fill=\"#F5B833\"><\/circle><text x=\"160\" y=\"170\" font-size=\"20\" font-weight=\"800\" fill=\"#B0730C\">T<\/text>\n        <line x1=\"155\" y1=\"53\" x2=\"240\" y2=\"25\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/line>\n        <line x1=\"155\" y1=\"57\" x2=\"240\" y2=\"85\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/line>\n        <line x1=\"155\" y1=\"163\" x2=\"240\" y2=\"135\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/line>\n        <line x1=\"155\" y1=\"167\" x2=\"240\" y2=\"195\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/line>\n        <text x=\"248\" y=\"30\" font-size=\"16\" fill=\"#5A6B76\">H<\/text><text x=\"248\" y=\"90\" font-size=\"16\" fill=\"#5A6B76\">T<\/text>\n        <text x=\"248\" y=\"140\" font-size=\"16\" fill=\"#5A6B76\">H<\/text><text x=\"248\" y=\"200\" font-size=\"16\" fill=\"#5A6B76\">T<\/text>\n      <\/svg>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Venn diagram\" data-screen-label=\"Vocab: Venn diagram\" data-speaker-notes=\"A Venn diagram uses overlapping circles inside a rectangle to show how sets relate. The rectangle is the universal set.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#4A3C9E;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">6 / 12 \u00b7 Venn diagrams<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:66px;line-height:1.05;margin-bottom:10px;\">Venn diagram<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:26px;\">/ ven DY-uh-gram / \u00b7 noun<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#4A3C9E;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\"><b>Overlapping circles<\/b> inside a rectangle showing how <b>sets<\/b> overlap. The rectangle <b>\u2130<\/b> is everything (the universal set).<\/p>\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:24px 28px;font-size:29px;line-height:1.4;\"><span style=\"font-weight:700;color:#4A3C9E;\">The overlap&nbsp;&nbsp;<\/span>is where both are true (the <b>intersection<\/b>).<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:30px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;align-items:center;justify-content:center;\">\n      <svg viewBox=\"0 0 300 210\" width=\"100%\" style=\"max-height:280px;\">\n        <rect x=\"10\" y=\"15\" width=\"280\" height=\"180\" rx=\"8\" fill=\"#FBFAFF\" stroke=\"#C9C2F0\" stroke-width=\"2\"><\/rect>\n        <text x=\"22\" y=\"38\" font-size=\"20\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#5A6B76\">\u2130<\/text>\n        <circle cx=\"120\" cy=\"108\" r=\"70\" fill=\"#D6409F\" fill-opacity=\"0.55\"><\/circle>\n        <circle cx=\"185\" cy=\"108\" r=\"70\" fill=\"#F5B833\" fill-opacity=\"0.6\"><\/circle>\n        <text x=\"80\" y=\"80\" font-size=\"24\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#8a2168\" font-weight=\"bold\">A<\/text>\n        <text x=\"215\" y=\"80\" font-size=\"24\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#8a5a08\" font-weight=\"bold\">B<\/text>\n      <\/svg>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Union\" data-screen-label=\"Vocab: Union\" data-speaker-notes=\"The union of A and B, written A cup B, is everything in A or B or both.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#4A3C9E;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">7 / 12 \u00b7 Venn diagrams<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:72px;line-height:1;margin-bottom:10px;\">Union &nbsp;<span style=\"color:#4A3C9E;\">A \u222a B<\/span><\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:26px;\">/ YOON-yun / \u00b7 noun<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#4A3C9E;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">Everything in <b>A or B or both<\/b>. Think of the word \u201c<b>or<\/b>\u201d.<\/p>\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:24px 28px;font-size:29px;line-height:1.4;\"><span style=\"font-weight:700;color:#4A3C9E;\">Memory hook&nbsp;&nbsp;<\/span>\u222a looks like a <b>cup<\/b> that holds <b>everything<\/b>.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:30px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;align-items:center;justify-content:center;\">\n      <svg viewBox=\"0 0 300 210\" width=\"100%\" style=\"max-height:280px;\">\n        <rect x=\"10\" y=\"15\" width=\"280\" height=\"180\" rx=\"8\" fill=\"#FBFAFF\" stroke=\"#C9C2F0\" stroke-width=\"2\"><\/rect>\n        <circle cx=\"120\" cy=\"108\" r=\"70\" fill=\"#4A3C9E\" fill-opacity=\"0.55\"><\/circle>\n        <circle cx=\"185\" cy=\"108\" r=\"70\" fill=\"#4A3C9E\" fill-opacity=\"0.55\"><\/circle>\n        <text x=\"80\" y=\"80\" font-size=\"24\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#fff\" font-weight=\"bold\">A<\/text>\n        <text x=\"215\" y=\"80\" font-size=\"24\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#fff\" font-weight=\"bold\">B<\/text>\n        <text x=\"150\" y=\"200\" font-size=\"17\" fill=\"#4A3C9E\" font-weight=\"700\" text-anchor=\"middle\">all shaded = A \u222a B<\/text>\n      <\/svg>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Intersection\" data-screen-label=\"Vocab: Intersection\" data-speaker-notes=\"The intersection of A and B, written A cap B, is only what is in both A and B \u2014 the overlap.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#4A3C9E;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">8 / 12 \u00b7 Venn diagrams<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:60px;line-height:1.05;margin-bottom:10px;\">Intersection &nbsp;<span style=\"color:#4A3C9E;\">A \u2229 B<\/span><\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:26px;\">/ in-ter-SEK-shun / \u00b7 noun<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#4A3C9E;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">Only what is in <b>both A and B<\/b> \u2014 the <b>overlap<\/b>. Think of the word \u201c<b>and<\/b>\u201d.<\/p>\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:24px 28px;font-size:29px;line-height:1.4;\"><span style=\"font-weight:700;color:#4A3C9E;\">Memory hook&nbsp;&nbsp;<\/span>\u2229 looks like a <b>cap<\/b> / bridge joining <b>both<\/b>.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:30px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;align-items:center;justify-content:center;\">\n      <svg viewBox=\"0 0 300 210\" width=\"100%\" style=\"max-height:280px;\">\n        <defs><clipPath id=\"capA\"><circle cx=\"120\" cy=\"108\" r=\"70\"><\/circle><\/clipPath><\/defs>\n        <rect x=\"10\" y=\"15\" width=\"280\" height=\"180\" rx=\"8\" fill=\"#FBFAFF\" stroke=\"#C9C2F0\" stroke-width=\"2\"><\/rect>\n        <circle cx=\"120\" cy=\"108\" r=\"70\" fill=\"none\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/circle>\n        <circle cx=\"185\" cy=\"108\" r=\"70\" fill=\"none\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/circle>\n        <circle cx=\"185\" cy=\"108\" r=\"70\" fill=\"#4A3C9E\" fill-opacity=\"0.7\" clip-path=\"url(#capA)\"><\/circle>\n        <text x=\"80\" y=\"80\" font-size=\"24\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#5A6B76\" font-weight=\"bold\">A<\/text>\n        <text x=\"215\" y=\"80\" font-size=\"24\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#5A6B76\" font-weight=\"bold\">B<\/text>\n        <text x=\"150\" y=\"200\" font-size=\"17\" fill=\"#4A3C9E\" font-weight=\"700\" text-anchor=\"middle\">only the overlap = A \u2229 B<\/text>\n      <\/svg>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Complement\" data-screen-label=\"Vocab: Complement\" data-speaker-notes=\"The complement of A, written A prime, is everything NOT in A. P of A prime equals 1 minus P of A.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#4A3C9E;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">9 / 12 \u00b7 Venn diagrams<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:64px;line-height:1.05;margin-bottom:10px;\">Complement &nbsp;<span style=\"color:#4A3C9E;\">A\u2032<\/span><\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:26px;\">/ KOM-pli-ment / \u00b7 noun<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#4A3C9E;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">Everything that is <b>NOT in A<\/b>. Think of the word \u201c<b>not<\/b>\u201d.<\/p>\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:24px 28px;font-size:30px;line-height:1.4;\"><span style=\"font-weight:700;color:#4A3C9E;\">Key rule&nbsp;&nbsp;<\/span>P(A\u2032) = 1 \u2212 P(A).<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:30px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;align-items:center;justify-content:center;\">\n      <svg viewBox=\"0 0 300 210\" width=\"100%\" style=\"max-height:280px;\">\n        <defs><mask id=\"notA\"><rect x=\"10\" y=\"15\" width=\"280\" height=\"180\" fill=\"#fff\"><\/rect><circle cx=\"150\" cy=\"105\" r=\"62\" fill=\"#000\"><\/circle><\/mask><\/defs>\n        <rect x=\"10\" y=\"15\" width=\"280\" height=\"180\" rx=\"8\" fill=\"#4A3C9E\" fill-opacity=\"0.55\" mask=\"url(#notA)\"><\/rect>\n        <rect x=\"10\" y=\"15\" width=\"280\" height=\"180\" rx=\"8\" fill=\"none\" stroke=\"#C9C2F0\" stroke-width=\"2\"><\/rect>\n        <circle cx=\"150\" cy=\"105\" r=\"62\" fill=\"#fff\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/circle>\n        <text x=\"143\" y=\"112\" font-size=\"24\" font-style=\"italic\" font-family=\"Georgia,serif\" fill=\"#5A6B76\" font-weight=\"bold\">A<\/text>\n        <text x=\"150\" y=\"200\" font-size=\"17\" fill=\"#4A3C9E\" font-weight=\"700\" text-anchor=\"middle\">shaded outside = A\u2032 (not A)<\/text>\n      <\/svg>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Independent\" data-screen-label=\"Vocab: Independent\" data-speaker-notes=\"Two events are independent if one does not affect the other. Tossing a coin twice: the first toss does not change the second.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#4A3C9E;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">10 / 12 \u00b7 Conditional<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:62px;line-height:1.05;margin-bottom:10px;\">Independent<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:26px;\">/ in-di-PEN-dent / \u00b7 adjective<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#4A3C9E;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">One event <b>does not affect<\/b> the other. The chances <b>stay the same<\/b>.<\/p>\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:24px 28px;font-size:29px;line-height:1.4;\"><span style=\"font-weight:700;color:#4A3C9E;\">Example&nbsp;&nbsp;<\/span>Tossing a coin twice \u2014 the first toss doesn't change the second. <b>Replace<\/b> = independent.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:36px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;\">\n      <div style=\"font-size:64px;\">\ud83e\ude99 &nbsp; \ud83e\ude99<\/div>\n      <div style=\"font-size:28px;font-weight:800;color:#4A3C9E;\">P(6) = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">6<\/span><\/span> &nbsp;every roll<\/div>\n      <div style=\"font-size:24px;color:#5A6B76;text-align:center;line-height:1.4;\">The dice has no memory \u2014 each roll is fresh.<\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Dependent\" data-screen-label=\"Vocab: Dependent\" data-speaker-notes=\"Two events are dependent if the first changes the probability of the second. Taking balls from a bag without replacing them makes the events dependent.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#4A3C9E;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">11 / 12 \u00b7 Conditional<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:66px;line-height:1.05;margin-bottom:10px;\">Dependent<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:26px;\">/ di-PEN-dent / \u00b7 adjective<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#4A3C9E;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">The first event <b>changes<\/b> the probability of the second.<\/p>\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:24px 28px;font-size:28px;line-height:1.4;\"><span style=\"font-weight:700;color:#4A3C9E;\">Example&nbsp;&nbsp;<\/span>Take a ball and <b>don't<\/b> put it back \u2014 fewer balls left, so the next probability changes. <b>Without replacement<\/b> = dependent.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:36px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;\">\n      <div style=\"display:flex;gap:14px;align-items:center;font-size:26px;font-weight:800;\"><span style=\"color:#4A3C9E;\">Start<\/span> <span style=\"color:#8A97A4;\">21 balls<\/span><\/div>\n      <div style=\"font-size:40px;\">\ud83d\udd35\ud83d\udd35\ud83d\udd35\ud83d\udfe2\ud83d\udfe2<\/div>\n      <div style=\"font-size:26px;color:#C23A2B;font-weight:800;\">\u2193 take one, don't replace<\/div>\n      <div style=\"display:flex;gap:14px;align-items:center;font-size:26px;font-weight:800;\"><span style=\"color:#4A3C9E;\">Now<\/span> <span style=\"color:#8A97A4;\">20 balls<\/span><\/div>\n      <div style=\"font-size:23px;color:#5A6B76;text-align:center;\">The denominator changed from 21 to 20.<\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Word: Conditional probability\" data-screen-label=\"Vocab: Conditional\" data-speaker-notes=\"Conditional probability is the probability of B given that A has already happened, written P of B given A. Use the formula P of A and B over P of A.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:70px 96px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:26px;\"><span style=\"white-space:nowrap;background:#4A3C9E;color:#fff;font-weight:700;font-size:24px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">KEY WORD<\/span><span style=\"font-size:24px;color:#8A97A4;font-weight:500;\">12 / 12 \u00b7 Conditional<\/span><\/div>\n  <div style=\"display:grid;grid-template-columns:1.02fr .98fr;gap:56px;flex:1;align-items:start;\">\n    <div>\n      <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:52px;line-height:1.08;margin-bottom:10px;\">Conditional probability<\/h2>\n      <div style=\"font-size:26px;color:#8A97A4;font-family:Fredoka,system-ui,sans-serif;font-style:italic;margin-bottom:26px;\">/ kun-DISH-un-ul / \u00b7 noun phrase<\/div>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.1em;color:#4A3C9E;margin-bottom:10px;\">IN SIMPLE WORDS<\/div>\n      <p style=\"font-size:33px;line-height:1.4;margin-bottom:24px;\">The probability of <b>B given that A has happened<\/b> \u2014 written <b>P(B | A)<\/b>. The \u201c|\u201d means \u201c<b>given<\/b>\u201d.<\/p>\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:22px 28px;font-size:30px;line-height:1.5;text-align:center;\"><b>P(B | A)<\/b> = <span class=\"frac\"><span class=\"num\">P(A \u2229 B)<\/span><span class=\"den\">P(A)<\/span><\/span><\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:22px;padding:36px;box-shadow:0 4px 24px rgba(22,55,95,.07);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;\">\n      <div style=\"background:#EDEAFA;border-radius:14px;padding:20px 28px;font-size:27px;text-align:center;line-height:1.5;\">\u201cWhat is P(late) <b>given<\/b> it rained?\u201d<\/div>\n      <div style=\"font-size:40px;color:#4A3C9E;\">\ud83c\udf27\ufe0f \u2192 \u23f0<\/div>\n      <div style=\"font-size:24px;color:#5A6B76;text-align:center;line-height:1.4;\">We already <b>know A happened<\/b>, so we only look inside A.<\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Part 2 \u00b7 Tree diagrams\" data-screen-label=\"Divider: 24.1\" data-speaker-notes=\"Section divider for using tree diagrams to show and calculate the outcomes of combined events.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:Nunito,system-ui,sans-serif;background:#4A3C9E;color:#FFFDF6;overflow:hidden;position:relative;\">\n  <div style=\"position:absolute;right:90px;top:40px;font-family:Fredoka,system-ui,sans-serif;font-size:340px;line-height:1;color:rgba(255,194,60,.16);font-weight:600;\">02<\/div>\n  <div style=\"position:relative;z-index:1;\">\n    <div style=\"font-size:26px;font-weight:600;letter-spacing:.16em;color:#FFC23C;margin-bottom:20px;\">PART 2 \u00b7 SECTIONS 24.1 &amp; 24.2<\/div>\n    <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:96px;line-height:1.02;margin-bottom:24px;\">Tree diagrams<\/h2>\n    <p style=\"font-size:34px;color:#E4DFFA;max-width:1120px;line-height:1.4;\">Show every outcome of combined events on branches \u2014 then multiply along the branches to find probabilities.<\/p>\n  <\/div>\n<\/section>\n\n<section data-label=\"Sample space \u2192 tree\" data-screen-label=\"24.1 Concept\" data-speaker-notes=\"A sample space table and a tree diagram both show all outcomes of rolling a dice and flipping a coin. The tree grows in stages: first the dice, then the coin on each branch. Watch the animation build the tree.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:16px;\"><span style=\"width:46px;height:6px;background:#4A3C9E;border-radius:3px;\"><\/span><span style=\"font-size:24px;font-weight:700;letter-spacing:.14em;color:#4A3C9E;\">CONCEPT \u00b7 24.1<\/span><\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:50px;margin-bottom:22px;\">A tree grows in stages<\/h2>\n  <div style=\"display:grid;grid-template-columns:1fr 1.15fr;gap:40px;flex:1;align-items:center;\">\n    <div style=\"display:flex;flex-direction:column;gap:16px;\">\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:22px 28px;font-size:27px;line-height:1.5;\">Each <b>stage<\/b> of the experiment adds a new set of <b>branches<\/b>. Two coin tosses \u2192 2 then 2 = <b>4 outcomes<\/b>.<\/div>\n      <div style=\"background:#fff;border-radius:16px;padding:22px 28px;box-shadow:0 3px 18px rgba(22,55,95,.06);font-size:27px;line-height:1.5;\">Read each complete <b>path<\/b> from left to right to get one outcome, e.g. <b>H then T<\/b>.<\/div>\n      <div style=\"background:#FFF4E0;border-radius:16px;padding:20px 26px;font-size:25px;color:#8A5A08;line-height:1.4;\">Label every branch clearly and keep the branches <b>evenly spaced<\/b>.<\/div>\n    <\/div>\n    <div style=\"background:#fff;border-radius:18px;padding:24px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;align-items:center;justify-content:center;height:100%;\">\n      <svg viewBox=\"0 0 360 260\" width=\"100%\" style=\"max-height:440px;\">\n        <text x=\"120\" y=\"24\" font-size=\"16\" font-weight=\"700\" fill=\"#5A6B76\" text-anchor=\"middle\">1st toss<\/text>\n        <text x=\"280\" y=\"24\" font-size=\"16\" font-weight=\"700\" fill=\"#5A6B76\" text-anchor=\"middle\">2nd toss<\/text>\n        <circle cx=\"40\" cy=\"130\" r=\"6\" fill=\"#4A3C9E\"><\/circle>\n        <!-- stage 1 -->\n        <g opacity=\"0\"><line x1=\"46\" y1=\"127\" x2=\"150\" y2=\"70\" stroke=\"#4A3C9E\" stroke-width=\"3\"><\/line><text x=\"90\" y=\"88\" font-size=\"16\" fill=\"#B0730C\" font-weight=\"700\">\u00bd<\/text><circle cx=\"150\" cy=\"70\" r=\"6\" fill=\"#D6409F\"><\/circle><text x=\"158\" y=\"76\" font-size=\"20\" font-weight=\"800\" fill=\"#D6409F\">H<\/text><animate attributeName=\"opacity\" values=\"0;1;1;1;0\" keyTimes=\"0;0.2;0.45;0.92;1\" dur=\"5s\" repeatCount=\"indefinite\"><\/animate><\/g>\n        <g opacity=\"0\"><line x1=\"46\" y1=\"133\" x2=\"150\" y2=\"190\" stroke=\"#4A3C9E\" stroke-width=\"3\"><\/line><text x=\"90\" y=\"180\" font-size=\"16\" fill=\"#B0730C\" font-weight=\"700\">\u00bd<\/text><circle cx=\"150\" cy=\"190\" r=\"6\" fill=\"#F5B833\"><\/circle><text x=\"158\" y=\"196\" font-size=\"20\" font-weight=\"800\" fill=\"#B0730C\">T<\/text><animate attributeName=\"opacity\" values=\"0;1;1;1;0\" keyTimes=\"0;0.2;0.45;0.92;1\" dur=\"5s\" repeatCount=\"indefinite\"><\/animate><\/g>\n        <!-- stage 2 -->\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;0;1;1;0\" keyTimes=\"0;0.45;0.6;0.92;1\" dur=\"5s\" repeatCount=\"indefinite\"><\/animate>\n          <line x1=\"156\" y1=\"67\" x2=\"290\" y2=\"40\" stroke=\"#8A97A4\" stroke-width=\"2.5\"><\/line><text x=\"220\" y=\"46\" font-size=\"14\" fill=\"#B0730C\" font-weight=\"700\">\u00bd<\/text><text x=\"298\" y=\"45\" font-size=\"18\" fill=\"#5A6B76\" font-weight=\"700\">H<\/text>\n          <line x1=\"156\" y1=\"73\" x2=\"290\" y2=\"100\" stroke=\"#8A97A4\" stroke-width=\"2.5\"><\/line><text x=\"220\" y=\"98\" font-size=\"14\" fill=\"#B0730C\" font-weight=\"700\">\u00bd<\/text><text x=\"298\" y=\"105\" font-size=\"18\" fill=\"#5A6B76\" font-weight=\"700\">T<\/text>\n          <line x1=\"156\" y1=\"187\" x2=\"290\" y2=\"160\" stroke=\"#8A97A4\" stroke-width=\"2.5\"><\/line><text x=\"220\" y=\"166\" font-size=\"14\" fill=\"#B0730C\" font-weight=\"700\">\u00bd<\/text><text x=\"298\" y=\"165\" font-size=\"18\" fill=\"#5A6B76\" font-weight=\"700\">H<\/text>\n          <line x1=\"156\" y1=\"193\" x2=\"290\" y2=\"220\" stroke=\"#8A97A4\" stroke-width=\"2.5\"><\/line><text x=\"220\" y=\"218\" font-size=\"14\" fill=\"#B0730C\" font-weight=\"700\">\u00bd<\/text><text x=\"298\" y=\"225\" font-size=\"18\" fill=\"#5A6B76\" font-weight=\"700\">T<\/text>\n        <\/g>\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;0;0;1;1;0\" keyTimes=\"0;0.45;0.62;0.72;0.92;1\" dur=\"5s\" repeatCount=\"indefinite\"><\/animate><text x=\"330\" y=\"42\" font-size=\"15\" font-weight=\"800\" fill=\"#0F7A45\">HH<\/text><text x=\"330\" y=\"105\" font-size=\"15\" font-weight=\"800\" fill=\"#0F7A45\">HT<\/text><text x=\"330\" y=\"165\" font-size=\"15\" font-weight=\"800\" fill=\"#0F7A45\">TH<\/text><text x=\"330\" y=\"225\" font-size=\"15\" font-weight=\"800\" fill=\"#0F7A45\">TT<\/text><\/g>\n      <\/svg>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Worked example 1\" data-screen-label=\"WE1 coin x3\" data-speaker-notes=\"Worked example 1. Draw a tree diagram for tossing a coin three times. The tree doubles at each stage: 2, then 4, then 8 outcomes. Watch it build stage by stage, then read the eight combinations.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:14px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:23px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 1<\/span><span style=\"font-size:24px;color:#8A97A4;\">Toss a coin three times \u2014 animated tree<\/span><\/div>\n  <div style=\"background:#fff;border-radius:16px;padding:16px 28px;box-shadow:0 3px 18px rgba(22,55,95,.06);border-left:6px solid #0F7A45;margin-bottom:14px;\"><p style=\"font-size:27px;line-height:1.4;\">Draw a tree diagram to show all outcomes for tossing a coin <b>three times<\/b>. Use <b>H<\/b> for heads and <b>T<\/b> for tails.<\/p><\/div>\n  <div style=\"display:grid;grid-template-columns:1.5fr .5fr;gap:30px;flex:1;align-items:center;\">\n    <div style=\"background:#fff;border-radius:18px;padding:16px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;align-items:center;justify-content:center;height:100%;\">\n      <svg viewBox=\"0 0 520 340\" width=\"100%\" style=\"max-height:520px;\">\n        <text x=\"90\" y=\"18\" font-size=\"15\" font-weight=\"700\" fill=\"#5A6B76\" text-anchor=\"middle\">1st<\/text>\n        <text x=\"230\" y=\"18\" font-size=\"15\" font-weight=\"700\" fill=\"#5A6B76\" text-anchor=\"middle\">2nd<\/text>\n        <text x=\"370\" y=\"18\" font-size=\"15\" font-weight=\"700\" fill=\"#5A6B76\" text-anchor=\"middle\">3rd<\/text>\n        <text x=\"470\" y=\"18\" font-size=\"15\" font-weight=\"700\" fill=\"#5A6B76\" text-anchor=\"middle\">Result<\/text>\n        <circle cx=\"30\" cy=\"170\" r=\"6\" fill=\"#4A3C9E\"><\/circle>\n        <!-- stage 1 -->\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;1;1;1;1;0\" keyTimes=\"0;0.14;0.4;0.85;0.92;1\" dur=\"6.5s\" repeatCount=\"indefinite\"><\/animate>\n          <line x1=\"36\" y1=\"167\" x2=\"90\" y2=\"90\" stroke=\"#4A3C9E\" stroke-width=\"2.5\"><\/line><line x1=\"36\" y1=\"173\" x2=\"90\" y2=\"250\" stroke=\"#4A3C9E\" stroke-width=\"2.5\"><\/line>\n          <text x=\"96\" y=\"90\" font-size=\"17\" font-weight=\"800\" fill=\"#D6409F\">H<\/text><text x=\"96\" y=\"256\" font-size=\"17\" font-weight=\"800\" fill=\"#B0730C\">T<\/text>\n        <\/g>\n        <!-- stage 2 -->\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;0;1;1;1;0\" keyTimes=\"0;0.28;0.42;0.85;0.92;1\" dur=\"6.5s\" repeatCount=\"indefinite\"><\/animate>\n          <line x1=\"104\" y1=\"88\" x2=\"220\" y2=\"50\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/line><line x1=\"104\" y1=\"92\" x2=\"220\" y2=\"130\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/line>\n          <line x1=\"104\" y1=\"248\" x2=\"220\" y2=\"210\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/line><line x1=\"104\" y1=\"252\" x2=\"220\" y2=\"290\" stroke=\"#8A97A4\" stroke-width=\"2\"><\/line>\n          <text x=\"226\" y=\"52\" font-size=\"16\" font-weight=\"800\" fill=\"#5A6B76\">H<\/text><text x=\"226\" y=\"135\" font-size=\"16\" font-weight=\"800\" fill=\"#5A6B76\">T<\/text>\n          <text x=\"226\" y=\"212\" font-size=\"16\" font-weight=\"800\" fill=\"#5A6B76\">H<\/text><text x=\"226\" y=\"295\" font-size=\"16\" font-weight=\"800\" fill=\"#5A6B76\">T<\/text>\n        <\/g>\n        <!-- stage 3 -->\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;0;0;1;1;0\" keyTimes=\"0;0.42;0.56;0.66;0.92;1\" dur=\"6.5s\" repeatCount=\"indefinite\"><\/animate>\n          <line x1=\"238\" y1=\"49\" x2=\"360\" y2=\"30\" stroke=\"#C9C2F0\" stroke-width=\"1.8\"><\/line><line x1=\"238\" y1=\"51\" x2=\"360\" y2=\"70\" stroke=\"#C9C2F0\" stroke-width=\"1.8\"><\/line>\n          <line x1=\"238\" y1=\"129\" x2=\"360\" y2=\"110\" stroke=\"#C9C2F0\" stroke-width=\"1.8\"><\/line><line x1=\"238\" y1=\"131\" x2=\"360\" y2=\"150\" stroke=\"#C9C2F0\" stroke-width=\"1.8\"><\/line>\n          <line x1=\"238\" y1=\"209\" x2=\"360\" y2=\"190\" stroke=\"#C9C2F0\" stroke-width=\"1.8\"><\/line><line x1=\"238\" y1=\"211\" x2=\"360\" y2=\"230\" stroke=\"#C9C2F0\" stroke-width=\"1.8\"><\/line>\n          <line x1=\"238\" y1=\"289\" x2=\"360\" y2=\"270\" stroke=\"#C9C2F0\" stroke-width=\"1.8\"><\/line><line x1=\"238\" y1=\"291\" x2=\"360\" y2=\"310\" stroke=\"#C9C2F0\" stroke-width=\"1.8\"><\/line>\n          <text x=\"366\" y=\"34\" font-size=\"14\" fill=\"#5A6B76\">H<\/text><text x=\"366\" y=\"74\" font-size=\"14\" fill=\"#5A6B76\">T<\/text>\n          <text x=\"366\" y=\"114\" font-size=\"14\" fill=\"#5A6B76\">H<\/text><text x=\"366\" y=\"154\" font-size=\"14\" fill=\"#5A6B76\">T<\/text>\n          <text x=\"366\" y=\"194\" font-size=\"14\" fill=\"#5A6B76\">H<\/text><text x=\"366\" y=\"234\" font-size=\"14\" fill=\"#5A6B76\">T<\/text>\n          <text x=\"366\" y=\"274\" font-size=\"14\" fill=\"#5A6B76\">H<\/text><text x=\"366\" y=\"314\" font-size=\"14\" fill=\"#5A6B76\">T<\/text>\n        <\/g>\n        <!-- results -->\n        <g opacity=\"0\"><animate attributeName=\"opacity\" values=\"0;0;0;0;1;1;0\" keyTimes=\"0;0.42;0.56;0.66;0.74;0.92;1\" dur=\"6.5s\" repeatCount=\"indefinite\"><\/animate>\n          <text x=\"440\" y=\"34\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">HHH<\/text><text x=\"440\" y=\"74\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">HHT<\/text>\n          <text x=\"440\" y=\"114\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">HTH<\/text><text x=\"440\" y=\"154\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">HTT<\/text>\n          <text x=\"440\" y=\"194\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">THH<\/text><text x=\"440\" y=\"234\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">THT<\/text>\n          <text x=\"440\" y=\"274\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">TTH<\/text><text x=\"440\" y=\"314\" font-size=\"14\" font-weight=\"800\" fill=\"#0F7A45\">TTT<\/text>\n        <\/g>\n      <\/svg>\n    <\/div>\n    <div style=\"display:flex;flex-direction:column;gap:16px;\">\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:22px 24px;font-size:26px;line-height:1.5;\">The tree <b>doubles<\/b> each toss: 2 \u2192 4 \u2192 <b>8<\/b> outcomes.<\/div>\n      <details class=\"rvtoggle\"><summary style=\"background:#0F7A45;color:#fff;font-size:25px;font-weight:700;padding:15px 22px;border-radius:14px;text-align:center;\">\u25b6 Reveal how to draw<\/summary>\n        <div style=\"margin-top:14px;background:#EAF6EE;border-radius:16px;padding:20px 24px;font-size:24px;line-height:1.55;\">Dot for the 1st toss \u2192 two branches (H, T) \u2192 repeat at the end of <b>every<\/b> branch for the 2nd and 3rd tosses. 2\u00d72\u00d72 = <b>8<\/b> paths.<\/div>\n      <\/details>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Drill: Tree rules\" data-screen-label=\"Drill: Tree rules\" data-speaker-notes=\"Memory drill for tree diagrams. Multiply probabilities ALONG a path for AND. Add the path results for OR. The probabilities on branches from one point add up to 1.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:64px 90px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:20px;\"><span style=\"white-space:nowrap;background:#B0730C;color:#fff;font-weight:700;font-size:23px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">DRILL<\/span><span style=\"font-size:24px;color:#8A97A4;\">Tree diagram rules<\/span><\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:52px;margin-bottom:28px;\">AND \u00d7 \u00b7 OR + \u00b7 branches = 1<\/h2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;flex:1;\">\n    <div style=\"background:#EDEAFA;border-radius:20px;padding:32px;display:flex;flex-direction:column;gap:14px;justify-content:center;\"><div style=\"font-size:40px;font-weight:800;color:#4A3C9E;\">\u00d7<\/div><div style=\"font-size:30px;font-weight:800;\">\u201cAND\u201d \u2192 multiply<\/div><div style=\"font-size:25px;color:#5A6B76;line-height:1.4;\">Go <b>along<\/b> a path: multiply the branch probabilities. P(H then T) = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span> \u00d7 <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span> = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">4<\/span><\/span>.<\/div><\/div>\n    <div style=\"background:#EAF6EE;border-radius:20px;padding:32px;display:flex;flex-direction:column;gap:14px;justify-content:center;\"><div style=\"font-size:40px;font-weight:800;color:#0F7A45;\">+<\/div><div style=\"font-size:30px;font-weight:800;\">\u201cOR\u201d \u2192 add<\/div><div style=\"font-size:25px;color:#5A6B76;line-height:1.4;\">Different paths that both work: <b>add<\/b> their results. P(HT or TH) = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">4<\/span><\/span> + <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">4<\/span><\/span> = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span>.<\/div><\/div>\n    <div style=\"background:#FFF4E0;border-radius:20px;padding:32px;display:flex;flex-direction:column;gap:14px;justify-content:center;\"><div style=\"font-size:40px;font-weight:800;color:#B0730C;\">= 1<\/div><div style=\"font-size:30px;font-weight:800;\">Branches sum to 1<\/div><div style=\"font-size:25px;color:#5A6B76;line-height:1.4;\">The branches leaving <b>one point<\/b> always add to <b>1<\/b>. Use this to find a missing branch.<\/div><\/div>\n  <\/div>\n  <div style=\"margin-top:22px;background:#4A3C9E;border-radius:16px;padding:20px 30px;color:#fff;font-size:28px;text-align:center;line-height:1.4;\"><b style=\"color:#FFD98A;\">Say it \u2014<\/b> \u201c<b>Along<\/b> is times, <b>between<\/b> is plus.\u201d<\/div>\n<\/section>\n\n<section data-label=\"24.2 Probability from trees\" data-screen-label=\"24.2 Concept\" data-speaker-notes=\"To find the probability of a combination, multiply the probabilities along the branches. For independent events P of A and B equals P of A times P of B. For mutually exclusive events P of A or B equals P of A plus P of B.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:56px 84px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:16px;\"><span style=\"width:46px;height:6px;background:#4A3C9E;border-radius:3px;\"><\/span><span style=\"font-size:24px;font-weight:700;letter-spacing:.14em;color:#4A3C9E;\">CONCEPT \u00b7 24.2<\/span><\/div>\n  <h2 style=\"font-family:Fredoka,system-ui,sans-serif;font-weight:600;font-size:50px;margin-bottom:22px;\">Multiply along the branches<\/h2>\n  <div style=\"display:grid;grid-template-columns:1.15fr .85fr;gap:40px;flex:1;align-items:center;\">\n    <div style=\"background:#fff;border-radius:18px;padding:24px;box-shadow:0 3px 20px rgba(22,55,95,.06);display:flex;align-items:center;justify-content:center;height:100%;\">\n      <svg viewBox=\"0 0 380 240\" width=\"100%\" style=\"max-height:420px;\">\n        <circle cx=\"30\" cy=\"120\" r=\"6\" fill=\"#4A3C9E\"><\/circle>\n        <line x1=\"36\" y1=\"117\" x2=\"150\" y2=\"60\" stroke=\"#4A3C9E\" stroke-width=\"3\"><\/line>\n        <line x1=\"36\" y1=\"123\" x2=\"150\" y2=\"180\" stroke=\"#4A3C9E\" stroke-width=\"3\"><\/line>\n        <text x=\"80\" y=\"76\" font-size=\"18\" fill=\"#B0730C\" font-weight=\"700\"><tspan>\u2159<\/tspan><\/text>\n        <text x=\"80\" y=\"165\" font-size=\"16\" fill=\"#B0730C\" font-weight=\"700\">\u215a<\/text>\n        <circle cx=\"150\" cy=\"60\" r=\"6\" fill=\"#D6409F\"><\/circle><text x=\"158\" y=\"66\" font-size=\"18\" font-weight=\"800\" fill=\"#D6409F\">5<\/text>\n        <circle cx=\"150\" cy=\"180\" r=\"6\" fill=\"#F5B833\"><\/circle><text x=\"158\" y=\"186\" font-size=\"18\" font-weight=\"800\" fill=\"#B0730C\">not 5<\/text>\n        <line x1=\"156\" y1=\"57\" x2=\"270\" y2=\"40\" stroke=\"#8A97A4\" stroke-width=\"2.5\"><\/line>\n        <line x1=\"156\" y1=\"63\" x2=\"270\" y2=\"95\" stroke=\"#8A97A4\" stroke-width=\"2.5\"><\/line>\n        <text x=\"205\" y=\"40\" font-size=\"15\" fill=\"#B0730C\" font-weight=\"700\">\u00bd<\/text>\n        <text x=\"205\" y=\"95\" font-size=\"15\" fill=\"#B0730C\" font-weight=\"700\">\u00bd<\/text>\n        <text x=\"278\" y=\"45\" font-size=\"17\" font-weight=\"800\" fill=\"#0F7A45\">H<\/text>\n        <text x=\"278\" y=\"100\" font-size=\"17\" font-weight=\"800\" fill=\"#5A6B76\">T<\/text>\n        <path d=\"M300,42 Q345,60 300,58\" fill=\"none\"><\/path>\n        <text x=\"300\" y=\"42\" font-size=\"17\" font-weight=\"800\" fill=\"#0F7A45\">P(5,H) = \u2159 \u00d7 \u00bd = <\/text>\n        <text x=\"215\" y=\"150\" font-size=\"20\" font-weight=\"800\" fill=\"#0F7A45\">\u2159 \u00d7 \u00bd = <tspan font-family=\"Georgia,serif\">1/12<\/tspan><\/text>\n      <\/svg>\n    <\/div>\n    <div style=\"display:flex;flex-direction:column;gap:16px;\">\n      <div style=\"background:#EDEAFA;border-radius:16px;padding:22px 28px;font-size:27px;line-height:1.55;\"><b>Independent<\/b> events:<br>P(A <b>and<\/b> B) = P(A) \u00d7 P(B)<\/div>\n      <div style=\"background:#EAF6EE;border-radius:16px;padding:22px 28px;font-size:27px;line-height:1.55;\"><b>Mutually exclusive<\/b> events:<br>P(A <b>or<\/b> B) = P(A) + P(B)<\/div>\n      <div style=\"background:#FFF4E0;border-radius:16px;padding:20px 26px;font-size:25px;color:#8A5A08;line-height:1.4;\">P(throw a 5 <b>and<\/b> get a Head) = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">6<\/span><\/span> \u00d7 <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">2<\/span><\/span> = <span class=\"frac\"><span class=\"num\">1<\/span><span class=\"den\">12<\/span><\/span>.<\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<section data-label=\"Worked example 2\" data-screen-label=\"WE2 two coins\" data-speaker-notes=\"Worked example 2. Two coins are tossed together. Draw a tree diagram to find the probability of two tails, and of one head and one tail. Watch the tree build, then reveal the probability working.\" style=\"box-sizing:border-box;width:100%;height:100%;padding:52px 80px;display:flex;flex-direction:column;font-family:Nunito,system-ui,sans-serif;background:#FFFDF6;color:#1F2933;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:12px;\"><span style=\"white-space:nowrap;background:#0F7A45;color:#fff;font-weight:700;font-size:23px;letter-spacing:.06em;padding:9px 20px;border-radius:999px;\">WORKED EXAMPLE 2<\/span><span style=\"font-size:24px;color:#8A97A4;\">Two coins tossed together<\/span><\/div>\n  <div
